front:
  text: 雙聲疊韻法平聲章灼良切先雙聲章灼良略是雙聲正紐入聲為首到紐平聲為首章略切後疊韻灼略章良是疊韻雙聲平聲為首疊韻入聲為首上聲掌章兩切先雙聲章掌良兩是雙聲正紐平聲為首到紐上聲為首掌良切後疊韻掌兩章良是疊韻雙聲平聲為首疊韻上聲為首去聲障章餉切先雙聲章障傷餉是雙聲正紐平聲為首到紐去聲為首障傷切後疊韻障餉章傷是疊韻雙聲平聲為首疊韻去聲為首入聲灼章略切灼良切先雙聲章灼良略是雙聲正紐平聲為首到紐入聲為首後疊韻灼略章良是疊韻雙聲平聲為首疊韻入聲為首平聲廳剔靈切先雙聲廳剔靈歷是雙聲正紐入聲為首到紐平聲為首廳歷切後疊韻剔歷廳靈是疊韻雙聲平聲為首疊韻入聲為首上聲頲廳井切先雙聲廳頲精井是雙聲正紐平聲為首到紐上聲為首頲精切後疊韻頲井廳精是疊韻雙聲平聲為首疊韻上聲為首去聲聽剔徑切先雙聲廳剔徑擊是雙聲正紐入聲為首到紐上聲為首聽擊切後疊韻剔擊廳徑是疊韻雙聲去聲為首疊韻入聲為首入聲剔廳歷切先雙聲廳剔靈歷是雙聲正紐平聲為首到紐平聲為首剔靈切後疊韻剔歷廳靈是疊韻雙聲去聲為首疊韻入聲為首
