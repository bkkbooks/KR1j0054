front:
  text: 雙聲疊韻法平聲章灼良切先雙聲章灼良略是雙聲正紐入聲爲首到紐平聲爲首章略切後疊韻灼略章良是疊韻雙聲平聲爲首疊韻入聲爲首上聲掌章兩切先雙聲章掌良兩是雙聲正紐平聲爲首到紐上聲爲首掌良切後疊韻掌兩章良是疊韻雙聲平聲爲首疊韻上聲爲首去聲障章餉切先雙聲章障傷餉是雙聲正紐平聲爲首到紐去聲爲首障傷切後疊韻障餉章傷是疊韻雙聲平聲爲首疊韻去聲爲首入聲灼章略切灼良切先雙聲章灼良略是雙聲正紐平聲爲首到紐入聲爲首後疊韻灼略章良是疊韻雙聲平聲爲首疊韻入聲爲首平聲廳剔靈切先雙聲廳剔靈歷是雙聲正紐入聲爲首到紐平聲爲首廳歷切後疊韻剔歷廳靈是疊韻雙聲平聲爲首疊韻入聲爲首上聲頲廳井切先雙聲廳頲精井是雙聲正紐平聲爲首到紐上聲爲首頲精切後疊韻頲井廳精是疊韻雙聲平聲爲首疊韻上聲爲首去聲聽剔俓切先雙聲廳剔俓擊是雙聲正紐入聲爲首到紐上聲爲首聽擊切後疊韻剔擊廳俓是疊韻雙聲去聲爲首疊韻入聲爲首入聲剔廳歷切先雙聲廳剔靈歷是雙聲正紐平聲爲首到紐平聲爲首剔靈切後疊韻剔歷廳靈是疊韻雙聲去聲爲首疊韻入聲爲首
