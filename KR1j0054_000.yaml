body:
  text: 六書一曰象形象物之形作字日月之字是也二曰會意比類爲字止戈爲武人言爲信是也三曰諧聲取譬相成江河之字是也四曰指事指事爲字上下之字是也五曰假借本無其字依聲託事令長之字是也六曰轉注左轉爲考右轉爲老是也八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隷書辯字五音法凡呼吸文字即有五音脣聲舌聲牙聲喉聲齒聲等一脣聲并餅脣聲淸也二舌聲靈歷舌聲淸也三齒聲陟珍齒聲濁也四牙聲迦佉牙聲濁也五喉聲綱各喉聲濁也辯十四聲例法一開口聲阿哥河等並開口聲二合口聲菴甘堪語等並是合口聲三蹴口聲憂丘鳩休等能所俱重也四撮脣聲烏姑乎枯能所俱重五開脣聲波坡摩婆能所俱輕六隨鼻聲灼蒿考姑等能所俱重也七舌根聲奚雞溪等能所俱重八蹴舌下卷聲伊酌等能所重九垂舌聲遮車奢者能所俱輕十齒聲止其始等能所俱輕也十一牙聲迦佉俄等能所俱輕十二齶聲鴞嚚等能所輕十三喉聲鴉加瘕等能所俱輕十四者牙齒齊呼開口送聲吒沙拏茶能所俱輕辯四聲輕淸重濁法平聲上輕淸璡將鄰反美石也珍陟鄰反珍寶也陳直鄰反陳說也椿勅倫反椿木名弘戸肱反弘大也龜居追反黿龜也貟王權反貟位也禋於鄰反祭敬也孚撫夫反孚信也鄰力珍反鄰近也從疾容反依從也峯敷容反山峯也江古雙反江海也降下江反降伏也妃芳非反妃后也伊於之反伊因也微無非反微妙也家古牙反家舎也施式支反施設也民彌鄰反民人也同徒紅反同合也重濁之職而反之往也眞只人反眞正也辰食鄰反辰巳也春昌倫反春陽也洪戸公反洪大也諄章倫反諄至也生殷於斤反殷大也倫力迍反倫理也風方隆反風化也松詳容反松柏也飛匪肥反飛翔也夫甫于反夫妻也分府文反分別也其巨之反其辭也杭戸郎反杭州也衣於機反衣服也眉武悲反眉目也無武夫反有無也文武分反文字也傍步光反傍近也平聲下輕淸淸七情反淸濁也仙相然反仙騰也砧知林反砧杵也孃女良反耶孃也緜彌鞭反緜絮也朝知遥反朝旦也幽於虬反幽冥也牆疾羊反牆壁也箋則前反箋注也愆去乾反愆過也衫所從反衫衣也名武并反姓名也并府盈反并州也輕去盈反輕重也傾去營反傾盡也徼古堯反徼幸也翹渠遥反翹舉也璿似縁反美玉也晴疾精反晴明也羌去羊反羌狄也重濁靑倉經反靑色也先蘇前反先後也針職婬反針線也瓤汝羊反瓜子也眠莫邊反眠卧也昭止遥反明昭也詶市州反詶荅也川昌專反山川也詳似羊反詳審也坊府良反坊巷也憂於牛反憂愁也氈諸延反氈毯也鉛與專反鉛錫也三蘇甘反三數也明武兵反光明也兵補縈反軍兵也卿去京反公卿也嬌舉喬反女字也泉聚縁反水泉也餳徐盈反餳飴也匡去王反匡正也上聲輕淸丑勅柳反乙丑也餅必茗反餅果也冢知勇反冢宅也昌狡反脯也昶勅兩反豁昶也丈直兩反丈夫也久永反明也豕式是反豕猪也鄙方美反鄙陋也邇兒氏反邇近也敢古覽反敢果也梗古杏反梗直也皿武永反器皿也起墟里反起發也美無鄙反美好也緊居忍反緊堅也畎古泫反畎取水免無兖反免止也杏何梗反杏果也氏匙止反姓氏也旨職雉反旨美也重濁甫方主反甫姓也引於軫反延引也䑕舒吕反蟲䑕也尾無匪反首尾也比卑里反比校也謹居隱反謹愼也汝如與反汝爾也卷居轉反卷書也晚無逺反早晚也雨于矩反風雨也耿古幸反耿憂也幸何耿反幸甚也猛莫幸反猛勇也􅜻神旨反取食也始詩止反終始也豈氣幾反豈安也倣方兩反倣學也止諸市反停止也里良已反鄰里也姊將已反姊妹也柹鋤里反果木也去聲輕淸魅美祕反精魅也快苦夬反快心也避婢義反迴避也譬疋義反譬喻也臂卑義反手臂也赴撫遇反赴奔也惠胡桂反惠仁也弊毗計反弊固也胏芳昧反胏府也浚私閏反水名也絹去面反綾絹也宋蘇統反人姓也壞懷怪反毀壞也怪古壞反怪異也替他計反替廢也至之利反至到也縣玄絢反州縣也甑子孕反盆甑也濟子計反濟定也字疾四反文字也四思二反數四也重濁味無沸反五味也蒯苦壞反蒯姓也瑞是僞反祥瑞也志之利反志望也吏力值反公吏也賦府遇反詩賦也衞羽制反衞護也誓時制反誓也廢方袂反廢止也舜舒閏反堯舜也眷几倦切眷屬也送蘇弄反送到也㑹胡外反集會也膾古兊反魚膾也態他代反妓態也廟苗召反神廟也釧川絹反釵釧也再作代反再又也寺辭吏反寺舍也伺相吏反伺候也刵仍吏反􅎒耳也入聲輕淸格古陌反格令也角古岳反角芒也嶽五角反山嶽也邈莫角反邈逺也學戸角反學效也疋譬吉反疋偶也必卑吉反必然也穴胡決反窟穴也淡古穴反誤明也薛思列反人姓也籍秦昔反典籍也悉息七反悉來也一於質反一數也擲雉戟反擲投也重濁博補各反博學也閣古洛反樓閣也鄂五各反鄂國名莫忙各反人姓也鶴下各反靈鶴也訖居乙反訖畢也出赤律反出進也
