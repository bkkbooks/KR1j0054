front:
  text: 廣韻上聲卷第三多動董第一獨用之隴腫第二獨用古項講第三獨用諸氏紙第四旨止同用職雉旨第五諸市止第六無匪尾第七獨用魚舉語第八獨用虞矩麌第九姥同用莫補姥第十徂禮薺第十一獨用鞋買蟹第十二駭同用諧楷駭第十三呼猥賄第十四海同用呼改海第十五之忍軫第十六準同用之尹準第十七武粉吻第十八隱同用於謹隱第十九虞逺阮第二十混很同用乎本混第二十一乎墾很第二十二河滿旱第二十三緩同胡用管緩第二十四山板潸第二十五産同所用簡産第二十六先典銑第二十七獮同息用淺獮第二十八蘇鳥篠第二十九小同私用兆小第三十苦絞巧第三十一獨用乎老晧第三十二獨用古我哿第三十三果同古用火果第三十四莫下馬第三十五獨余用兩養第三十六蕩同用徒朗蕩第三十七古杏梗第三十八耿靜同用古幸耿第三十九疾郢靜第四十戸鼎迥第四十一獨用蒸上拯第四十二等同用多肯等第四十三云乆有第四十四厚黝同用乎口厚第四十五於糾黝第四十六七稔寢第四十七獨古用橝感第四十八敢同用姑覽敢第四十九以冉琰第五十忝儼同用他點忝第五十一冝奄儼第五十二下斬豏第五十三檻范乎同用黯檻第五十四防鋄范第五十五一董督也正也固也又姓飂叔安裔子董父實甚好龍帝舜嘉焉賜姓曰董出隴西濟隂二望多動切七蝀螮蝀虹也又音東箽亦姓又竹器也心亂蕫薡蕫草似蒲而細又藕根䵔攏䵔不上鼓鳴也蠓列子曰蠛蠓生朽壤之上因雨而生覩陽而死莊子謂之醯雞莫孔切七物上白醭鸏水鳥又音蒙濛濛澒大水又莫紅切朦大皃曚暡曚曰未明也懵心亂皃孔孔穴也又空也甚也亦姓殷湯之後本自帝嚳次妃簡狄吞乙卵生契賜姓子氏至成湯以其祖吞乙卵而生故名履字天乙後代以子加乙始爲孔氏至宋孔父嘉遭華父督之難其子奔魯故孔子生於魯康董切二倥倥偬事多搏擊先孔切三箸桶檧又蘇公切侗直也一曰長大他孔切四桶木桶又音動曈曈曨欲曙又音童聾捅捅進前也緫聚束也合也皆也衆也作孔切十五揔上同㹅俗嵸巃嵸山皃㢔衆立總總角本亦作緫蓯菶蓯草皃鬷爾雅云軌鬷一名素華猣犬生三子翪鳥飛竦趐上下也所謂鵲鶪醜其飛也䁓方言云南人竊視㷓煴也說文曰然麻䒱也又靑公切屋㑹又且公切􅭿關西呼輪曰􅭿偬倥偬澒說文曰丹沙所化爲水銀也又濛傾大水胡孔切五鴻鴻濛又音紅蟲甲類􅺏鳴聲咏􅺏也汞水銀滓蓊蓊鬱烏孔切九滃大水皃暡氣盛皃郺郺郺多皃又音邕濃勜勜劜屈強皃劜音軋䈵竹盛又音翁䐥䐥臭皃出字林塕塕埲塵起然煙氣􅳉奴動切一琫佩刀飾也邊孔切四菶草盛􅬓小兒皮屨又巴講切俸屏俸又扶用切曨曈曨力董切九襱袴也又直隴切巃巃嵸竉孔竉籠竹器又龍聾二音攏攏略又拗攏籌也謂酒律𢤱𢤱悷不調儱儱侗未成器也龓乗馬又牽也說文兼有也嗊羅嗊歌曲出告㓜童文呼孔切二心神恍愡皃動躁也出也作也摇也徒揔切九􅏒古文酮酒壞又音同姛項直皃眮瞋目詷訂詷訂音挺桶木器又他孔切挏推引也漢有挏馬官作酒又音同硐安硐鍯硐見馬融長笛賦菶蒲蠓切草盛皃又方孔切三唪大笑也埲塕埲塵起二腫疾也說文癰也釋名曰腫鍾也寒熱氣鍾聚也之隴切六種種類也又之用切踵足後又繼也趾也頻也說文追也一曰往來皃歱說文跟也㣫相跡也喠喠􅵥欲吐寵寵愛也丑隴切三小兒行皃埫埫塎不安隴說文云天水大坂也亦州漢汧縣後魏置東秦州又改爲隴州因山名之力踵切三壠說文曰丘壠也方言曰秦晉之間冢謂之隴亦作壟書傳曰畒壟也㙙塗也擁手擁說文作􅗙抱也又擁劒蟲形似蟹崔豹古今注云一名執火其螯赤故謂之執火於隴切三上同壅壅堨亦塞也障也又音邕宂宂散也亦官名續漢志曰先獵一曰大儺逐疫鬼穴從僕射將之逐鬼干禁中俗作冗而隴切十二上同穁稻䅌不肖也一曰傝劣也或作㯓茸又作􆈬􅻛鳥細毛也氄上同軵推車或作搑水牛䑕拒也亦作軵輕也搑推擣皃也又而容切重多也厚也善也愼也直隴切又直龍直用二切四􅚸遟也襱袴也又來公力董二切又作鮦魚名又直柳切冢大也周禮天官冢宰說文曰髙墳也釋名曰冢腫也象山頂之髙腫起知隴切二塚俗奉與也獻也禄也說文承也扶隴切二唪口髙皃出埤蒼捧兩手承也敷奉切一勇輁軸所以支棺悚怖也息拱切十竦敬也國語云竦善抑惡慫驚也聳髙也說文曰生而聾曰聳絆前兩足㩳執也駷何休云馬摇銜走也愯懼也亦作􅋏傱傱傱走意又先項切䙕襌衣洶洶溶水皃許拱切三詾詾嚇也又音凶兇恐懼說文曰擾恐也左傳曰曹人兇懼又音凶覂覆也或作又作泛此覂駕之馬非良者說文曰反覆也方勇切二上同湩都􅣽切濁多也此是冬字上聲一􅣽莫湩切􅣽鴟鳥又莫項切二䏵豐大䅃穫也渠隴切又渠恭切一小鳥飛也充隴切二喠氣急之皃說文曰㡓也職勇切二上同又且勇切䙕子冢切襌衣又息拱切一三講告也謀也論也說文曰和解也古項切四港水派傋􅷗傋不媚皃又虚項切耩耕也㭋杖也打也步項切八棒上同棓上同魏志云曹操爲北部尉門左右縣五色棓各十枚玤周邑地名又珠次玉􅸡􅸡慃很戾蚌蛤也蜯上同䎧䎧䥯器出埤蒼慃􅸡慃很戾烏項切一􅷗􅷗傋武項切二􅣽􅣽䲭鳥項頸項說文曰頭後也釋名曰項又池爾切􅨓􅨓狼褆衣服端下姼方言云南楚人謂婦妣曰母姼也䟗䟗尌也謂立也積聚也靡無也偃也又靡曼美色也說文曰披靡也文彼切七行皃猶遟遟也骳骳屈曲也􅭷乗輿金耳又美爲切熟寐也又莫禮切蘼薔蘼藥名又亡爲切彼對此之稱甫委切五㗗相分解也柀木名爾雅云柀煔佊埤蒼云佊邪也停𬒳寢衣也又姓呂氏春秋有大夫被瞻皮彼切又皮義切二罷遣有罪又平陂薄解二切毀壞也破也缺也虧也許委切十燬水盛檓爾雅云檓大椒毇說文曰米一斛舂爲八斗上同又於詭切義見下文譭謗也譖也㩓手㩓傷也烜周禮有司烜氏以陽燧取火於日以鑒取水於月說文曰惡也一曰人皃委委曲也亦委積又屬也棄也隨也任也又姓漢有太原太守委進出風俗通於詭切五骫骨曲又姓出纂文說文曰鷙鳥食巳吐其皮毛如丸又許以切蜲黍負爾雅云蛜威委黍字或從虫䍴羊相䍴跪拜也去委切又渠委切二刖一足詭詐也又横財物爲詭遇也過委切十九垝垝垣毀垣也又作陒陒上同䣀陸䣀山名出山海經攱枕也䤥戾鋸齒也說文曰臿屬一曰瑩鐡也觤羊角不齊恑變也悔也蛫蟹也祪毀廟之祖庪爾雅云祭山曰庪縣䃽庋並上同洈水名出南郡東洈山至華容縣入江也蟡長八尺一首二身似蛇以名呼之可取魚鼈􅸭子玉篇云布穀也姽宋玉神女賦曰旣姽嬧於幽靜說文曰閑體行姽姽也桅短矛或作說文曰桅黄木可染佹戾也髓說文作􅾸骨中脂也息委切五嶲越嶲郡靃靃靡草木弱皃䭉餹䬾方言云餅􅸷滑也絫說文曰増也十黍之重也力委切六累上同又良僞切樏似盤中有隔也又音縲䉂法者䉂可以網人心厽說文曰絫坺土爲牆壁垒說文曰垒墼也技藝也說文巧也渠綺切六妓女樂徛立也伎侣也錡釡也又魚綺切䗁蟬也倚依倚也又姓楚左史倚相於綺切五猗猗狔猶窈窕也又於羈切椅椅柅又於冝切旖旖旎旌旗從風皃輢車輢掎牽一脚說文云偏引也居綺切七剞剖劂曲刀庋又音詭一足又作踦踦公羊傳曰相與踦閭而語閉一扇一人在内一人在外㱦弃也又丘知九竒二切攲持去也又居冝切綺文繒又姓漢四皓有綺里季墟彼切七婍皃好碕碕礒石皃又起冝巨支二切䞚行皃㥓減又去奇切儉意也觭牛角又丘竒切㾨痤也喪也又於蟹切螘爾雅曰蚍蜉大螘小者螘魚倚切十二蟻上同蛾上同見禮錡三足釡一曰蘭錡兵藏又姓武王分殷人六族有錡氏後漢有錡嵩礒碕礒齮齧也艤整舟向岸檥上同說文魚羈切榦也㠖岌㠖山髙皃轙說文曰車衡載轡者羛羛陽郷名在魏郡䰙釡也亦作鈘說文曰三足鍑也一曰滫米器也蔿草也又姓左傅晉大夫蔿伯韋委切九鄬地名儰不安也䧦地名花也榮也口咼䦱闢也國語曰䦱門與之言又姓薳草又姓左傳楚有薳氏代爲大夫寪說文云屋皃觜喙也即委切二㭰上同說文識也一曰藏也蘂花外曰蕚花内曰蘂如累切四蕊草木叢生皃甤說文曰草木實甤甤也又人佳切橤茸也垂也又佩垂皃此止也雌氏切九跐蹈也又阻買切佌小舞皃玼玉色鮮又千禮切泚水淸又千禮切馬名小皃淺渡也直大也說文火介切瞋大聲也豸蟲豸爾雅云有足曰蟲無足曰豸說文云獸長行豸豸然欲有所司殺形池爾切十二褫奪衣易曰以訟受服終朝三褫之陊山崩也說文大可切落也䊓黏也踶踶跋用心力皃莊子曰踶跋爲義傂佌傂參差皃杝析薪又敕氏切阤落也說文云小崩也䚦角端不正說文敕豕切角傾也􅞧解廌又宅買切又作褆好衣徥行皃朝鮮語也徙移也斯氏切五壐說文曰王者印也所以主土从土爾聲璽籀文小兒詩云彼有屋本亦作佌佌又音此小皃又千禮切酏酏酒移爾切九迆邐迆連接匜柸匜有柄可以注水又音移衪衣中袖也肔引腸莊子云萇弘肔崔譔注云肔裂也又敕紙切崺峛崺沙丘狀峛音邐扡加也又離也又弋支切或作拸㥴不憂事也又弋支切孈多態邐邐迤力紙切三峛峛崺㸚㸚尒布明白象形也躧躧步也又作蹝說文曰舞履也所綺切十上同灑灑埽又所買切纚韜髮者又颯纚長紳皃縰上同釃分也見漢書溝洫志說文曰下酒也一曰醇也􅨌鞮屬屣履不躡跟矖視也簁籮也說文曰簁箄竹器也使也從也職也并弭切十俾上同說文曰益也一曰俾門侍人鞞刁鞞又蒲迷補茗二切箄竹器又卑篦二音黍屬又蒲賣切髀股也又步米切崥山足􅤴爾雅曰􅤴䑕莞郭璞曰亦莞屬纎細似龍鬚可以爲席客扶持爾汝也說文作云麗猶靡麗也兒氏切四尒義與爾同說文曰詞之必然也又虜姓二氏尒朱氏本北秀容人也居尒朱川因以爲氏後魏書官氏志尒綿氏後改爲綿氏也邇近也上同渳水皃說文㱃也綿婢切十一弭弓末又息也亦無縁弓也濔水流皃瀰詩曰河水瀰瀰水盛皃也芈羊鳴一曰楚姓敉撫也愛也安也侎上同葞爾雅云葞春草本草云芒草也蝆爾雅注云今米榖中蠹小黒蟲是也䦵力褊又乃禮切㥝止也婢女之下也便俾切二庳下也或作埤又音卑說文曰中伏舎也一曰屋庳侈奢也泰也大也尺氏切十五姼姑姼輕薄皃又美也又叱渉切􅨩上同鉹甑也誃說文曰離別也㢋廣也國語曰俠溝而㢋我㢁上同垑恃土地也懘又昌厲切㶴盛也袳衣長亦作袲又宋地名袲上同豕也恀恃也又音帋哆張口又丑加昌者二切弛釋也說文云弓解也施是切三豕豬也阤壞也又音豸紫間色也又姓出何氏姓苑將此切九訿訿毀訾上同啙窳也又子西切水名在長沙跐行皃茈茈薑又茈草也呰口毀說文苛也㧗捽也又子禮側買二切捶擊也之累切五箠䇿也小巵出說文䮔馬小皃又子垂切沝二水又音􅓵揣度也試也量也除也初委切又丁果切二㪜試也牸豚或作隨婢切一舓以舌取物神帋切四􅜻上同舐俗􅨓獸名似狐出則有兵㧗拳加人也側氏切又音紫二跐蹈也又音紫㱟枝折匹靡切三紴水波錦文又補柯切披開也又偏羈切諀諀訾惡言匹婢切六庀具也疕瘡上甲亦頭瘍又卑履切仳仳離別之意䚹具也吡訾也出莊子雞頭也羊捶切六䔺草木葉初出皃芛爾雅云蕍芛葟華榮撱撱棄又撞䝐小豶亦作瘡裂惢疑也才捶切一跬舉一足丘弭切四䞨上同頗弁皃又舉頭皃䠑䠑踽開足之皃狔猗狔從風皃女氏切三旎旖旎抳掎抳硊磈硊石皃魚毀切四頠閑習容止姽好皃又過委切􅸭布榖鳥跪張跪亦作渠委切又去委切一褫敕豸切衣絮偏也又池豸二音一㨖指也說文刺也陟侈切二䘢去涕也興倚切一企企望也丘弭切又去智切二跋踶跋山海經云有跋踵國人行脚跟不著地如人之跋足也又去智巨支二切菙周禮有菙氏燋焌用荆菙之類時髓切二㥨㥨不恱也枳木名似橘居帋切又諸氏切一五旨說文云美也从匕日又志也亦作見經典職雉切八指手指也又示也厈也恉意也祁地名䛗訐發人之惡厎平也致也說文云柔石也砥砥礪也說文同上茋茋蒻小苹視比也瞻也效也承矢切三眡眎並古文美好色說文曰甘也从羊从大羊在六畜主給膳也美與善同意無鄙切五媺上同周禮地官云一曰媺宫室􅣕獸似牛渼渼陂在京兆鄠縣媄字様云顔色姝好也鄙陋也又邊鄙也方美切四啚說文嗇也娝姓出何承天纂文痞病也又音否兕爾雅曰兕似牛郭璞曰一角青色重千斤徐姊切七􅴩上同古文俗羠犍羊又以脂切薙燒草又直履他計二切䒨蒿也几案屬周禮司几筵掌五几凢朝覲大饗射封國命諸侯設左右玉几祀先王亦如之諸侯祭祀右彫几筵國賔于牖前左形几甸役右漆几喪事右素几吉事變几凶事仍几或作机居履切九􅕱爾雅云􅕱大􅍪旄毛狗足麂上同㞦女㞦山名弱水所出机說文曰木也山海經曰族蔨之山多松栢机桓䢳地名獸名如兎喙蛇尾見則有煌災㞛赤㞛也䂹石墮聲也爾雅曰男子謂女子先生爲將几切二千億也亦歸縣在歸州袁山松云屈原此縣人被放來因名其地與同音風俗通云千生万万生億億生兆兆生京京生生垓垓生壤壤生溝溝生澗澗生正正生載載地不能載也匕匕匙通俗文曰匕首劒屬其頭類匕短而便用故曰匕首卑履切十妣爾雅曰父曰考母曰妣又甫至切秕穅秕比校也並也爾雅曰北方有比肩民焉迭食而迭望蓋半體人也又毗鼻邲三音䃾以豚祀司命也沘水名出廬江灊縣入芍陂今謂之渒水也枇禮記注云所以載牲體朼上同疕頭瘍髀股外又旁禮切軌法也車跡也說文曰車轍也居洧切十三簋簠簋祭噐受斗二升内圎外方曰簋朹古文晷日影也又規也厬厬泉或作爾雅云水醮曰厬謂水醮盡也上同宄内盗也匭匣也唐垂栱元年置匭於朝令上表者投之有延恩通玄招諌申冤等匹匭也古文說文云匭皆古文簋字頯小頭又巨追切氿水涯枯土爾雅曰氿泉穴岀穴出仄出也跡洧水名在鄭榮美切四鮪魚名痏瘡痏䵋黃色矢陳也誓也正也直也說文曰弓弩矢也古者夷牟初作矢式視切四又作並俗􅧚說文曰糞也本亦作矢俗作屎屎俗本許伊切雉爾雅曰雉絶有力奮謂最健鬪也又陳也度也王肅云城髙一丈曰堵三堵曰雉直几切三滍水名在魯陽薙芟草又辛薙辛夷別名又音替死說文曰澌也人所離也息姊切一牝扶履切又毗忍切一履踐也禄也幸也福也字書云草曰扉麻曰屨皮曰履黄帝臣於則所造又姓出姓苑力几切一水說文曰準也北方之行也釋名曰水準也準平物也式軌切一壘說文曰軍壁也又重壘亦姓後趙録有壘澄本姓裴氏力軌切十四蜼似猴仰鼻而尾長尾端有𡵨說文惟季切又音柚猚上同櫐藤爾雅曰諸慮山櫐蘽上同㶟水出鴈門𡻭𡻭㠑山皃轠轠轤車屬鸓飛生鳥名飛且乳一曰鼯䑕毛紫赤色似蝠而長藟葛藟葉似艾或作虆誄銘誄誄壘也壘述前人之功德周禮曰小史掌卿大夫之喪讀誄也說文曰誄謚也耒田器又盧對切讄禱也􅚦飛􅚦獸揆度也求癸切五楑木名又音葵􅭛悸也又巨佳切細也又聚惟切湀泉出也說文曰湀辟深水處也趡走也又魯地名千水切三踓蹵細計柅絡絲柎易曰繫于金柅女履切又音尼一癸辰名爾雅太歳在癸曰昭陽古作癸又姓姓苑云出齊癸公後居誄切二湀通流否塞也符鄙切又方乆切八痞腹内結痛圮岸毀又覆也仳離也又方比切殍草木枯落也又音孚㡜裂䤏覆也或作㩺方言云器破而未離南楚之間謂之㩺又匹支芳鄙二切㠑𡻭㠑山皃徂累切一嚭大也匹鄙切五秠一稃二米又孚悲切疕頭瘍崩也又匹支符鄙二切蕊草木實節生如壘切三甤說文曰草木實甤甤也繠垂也唯諾也以水切又音惟八蓶草似馬韭而黄可食䲊蟹子又他果切壝埒也又音遺瀢魚盛皃孈愚戇多態又尤卦切㨊棄也踓走也又千水切㰻㰻㰳驢鳴於几切一濢汁漬也遵誄切四噿鳥噿嗺山狀臎肥皃黹鍼縷所紩周禮祭社稷五祀則用黹冕也豬几切四刺夂後至也㨖挃也移𧖟就寛楮几切一止切一䁤恚視火癸切又火季切一䣀山名曁軌切一跽䠆跽曁几切一巋巋然髙峻皃又小山而衆曰巋丘軌切二蘬蘢古大者曰蘬六止停也足也禮也息也待也留也諸市切十畤說文云天地五帝所基止祭也右扶風有五畤又時止切沚釋名曰沚止也小可以止息其上說文曰小渚曰沚洔上同說文曰水暫益且止未減也茞香草字林云蘪蕪別名又昌待切趾足也址基址阯交阯郡劉欣期交州記云交阯之人出南定縣足骨無節身有毛卧者更扶始得起山海經云交脛國爲人交脛郭璞云脚脛曲戾相交所以謂雕題交阯也芷白芷藥名又芷陽縣名厎定也又厎柱也市說文云買賣所之也周禮曰司市掌市之治教政形量度禁令大市日側而市百族爲主朝市朝時而市商賈爲主夕市夕時而市販夫販婦爲主古吏考曰神農作市丗本曰祝融作市時止切三恃依也賴也畤又諸市切徵五音配夏亦作徵見經典省陟里切又竹凌切三言也出方言㨖指也喜喜樂又聞喜縣在絳州漢武帝幸左邑聞南越破遂改爲聞喜縣禮記曰人喜則斯陶陶斯咏虚里切又香忌切三憙恱也又許忌切蟢蟢子蟲俗紀極也㑹也事也理也識也亦經紀又十二年曰紀又姓出丹陽居理切四己身己爾雅曰太歳在巳曰屠維說文云女字也說也以用也與也爲也古作㠯羊己切七㠯古文巳止也此也甚也訖也又音似苡薏苡蓮實也又芣苡馬蕮也又名車前亦名當道好生道間故曰當道江東呼爲蝦蟆衣山東謂之牛舌苢上同佁癡也說文讀若騃又夷在切大堅說文曰㱾大剛卯以逐鬼鬽也似嗣也類也象也詳里切十五佀上同祀年也又祭祀禩並上同姒夏姓一曰娣姒長婦曰姒㓜婦曰娣巳辰名爾雅曰太歳在巳曰大荒落耜耒耜丗本曰倕作耜古史考曰神農作耜上同汜水名在河南成臯縣說文曰水別復入水也一曰汜窮瀆也詩曰江有汜洍說文曰水也一曰詩曰江有洍泤上同又羊己切鈶鋌鈶􅝤鹿一歳曰􅬨一歳曰􅝤史史籍說文作㕜記事者也亦姓周卿史佚之後出建康又漢複姓五氏丗本衞有史朝朱駒漢書藝文志有靑史氏著書又有新豐令王史音吴有東萊太守太史慈晉有東萊侯史光踈士切四使役也令也又踈事切駛疾也又音去聲􅤩香之美者耳辝也說文云主聽也而止切五洱水名出罷谷山又而志切駬騄駬周穆王馬名䋙䋙䋙轡盛皃􅴄䑕名里周禮五家爲鄰五鄰爲里風俗通云五家爲軌十軌爲里里者正也五十家共居正也又姓左傳晉大夫里克又漢複姓有相里氏良士切十裏中里說文曰衣内也鯉魚名悝憂也詩云悠悠我悝又口回切李果名亦行李又姓風俗通云李伯陽之後出隴西趙郡頓丘渤海中山襄城江夏梓潼范陽廣漢梁國南陽十二望㾖病也理料理義理又正也文也說文曰治玉也亦姓臯陶爲大理因官氏焉殷有理徴娌妯娌俚賴也聊也又南人蠻屬也亭名在西鄂一曰邑名枲麻有子曰枲無子曰苴也胥里切七萆胡萆􅓥不安皃又作偲䈚竹萌也又音待葸質慤皃又畏懼也諰言且思之說文曰石利也始初也詩止切一歭說文䠧也歭躇不前也直里切九跱上同峙具也又峻峙痔病也㣥待也儲也具也又看所望而往洔水中髙土又音止畤儲秲稻名秲􅢸痔詩曰痔乃錢鎛痔具也亦作㣥起興也作也立也發也又姓出何氏姓苑墟里切六邔縣名在南郡又渠記切杞木名又苟杞春名天精子夏名苟杞葉秋名却老枝冬名地骨根又國名夏之後也亦姓杞梁是也屺山無草木玘佩玉芭白粱粟也士說文曰事也數始於一終於十从一十孔子曰推十合一爲士又姓左傳晉大夫士蔿又漢複姓二氏古今人表有士思癸又士貞氏晉康公庶子士貞之後鉏里切五仕仕宦􅏄果名􅩖砌也閾也戺上同俟待也亦作竢又姓風俗通云有俟子古賢人著書又虜複姓二氏後魏書云俟畿氏後改爲畿氏俟奴氏後改爲俟氏又虜三字姓三氏俟力伐氏後改爲鮑氏俟伏斤氏後改爲㐲氏周書太祖賜韓褒姓侯吕陵氏牀史切又音祈七竢上同涘水岸涯也騃趨行皃西京賦曰羣獸駓騃又吾駭切繩履不來也說文引詩曰不不來以來矣聲說文同上子子息環濟要略曰子猶孳也孳恤下之稱也亦辰名爾雅云太歳在子曰困敦又殷姓又漢複姓十一氏左傳鄭大夫子人九魯大夫子服氏子家羈莊子有子桑扈皇子告敖何氏姓苑有子乾子仲子工子革子臧子師等氏即里切八㜽古文仔說文克也本又音兹虸虸蚄蟲耔擁苗本也秄上同梓木名楸屬杍工木匠或作梓矣說文云語巳詞也于紀切二蒿也擬度也魚紀切六儗僭也薿草盛皃又魚力切孴盛也譺議也欺也調也又魚記切禾盛齒齒録也年也又牙齒昌里切二紕績苧一紕出新字林恥慙也敕里切三祉福也禄也褫徹衣又奪衣又直追池耳二切㓼割聲初紀切三欼齧也㱀上同滓澱也阻史切五牀簀又側几切榧木名子可食療白蟲蜰爾雅云蜚蠦蜰郭璞云即負盤臭蟲又音肥䕁草也蜚蟲名咸蜚又扶沸切韙是也于鬼切十三煒光煒暐暐曄偉大也瑋玉名葦蘆葦椲木名可屈爲盂韡華盛皃􅰜大風皃媁醜也愇字書云恨也鍏方言云臿宋魏之間或謂之鍏逆追鬼鬼之爲言歸也居偉切一􅳐蛇􅳐許偉切五􅛚齊人云火震雷也虫鱗介楤名卉百草楤名又音諱顗靖也樂也說文曰謹莊皃魚豈切二螘螘子蟲豨楚人呼豬亦作狶虚豈切五俙僾俙􅽵􅽵鼻又虚几切霼靉霼唏哀而不泣磈磈硊石山皃又危也於鬼切二嵔嵔崔山髙曲下膹􅌜多汁浮鬼切六䆏稻紫莖不黏也又扶畏切橨船邊木也蟦蠀螬別名又扶沸切陫陋也又作䨾又符沸切䒈船䒁釘䒈八語說文論也魚巨切十二篽說文曰禁苑也籞上同又池水中編竹籬養魚圉養馬又姓左傳有大夫圉公陽敔柷敔樂器釋名曰敔衙也衙止也所以止樂也圄囹圄周獄名又守也衙行皃楚詞云導飛廉之衙衙又音牙齬齟齬不相當也或作鉏鋙說文曰齬齒不相值也鋙鉏鋙不相當也䥏上同禦禁也止也應也當也說文祠也蘌蘌蘙吕字林云脊骨也說文作吕又作膂亦姓太嶽爲禹心吕之臣故封吕侯後因爲氏出東平力舉切十三膂上同旅師旅說文曰軍五百人也亦姓漢功臣表有旅卿封昌平侯俗作􅞊筲器祣祭山川名案論語只作旅穭自生稻也梠桶端連綿木名說文楣也儢儢拒心不欲爲也出文字指歸侣伴侣㭚木名可爲箭笴郘亭名絽絣也晉大夫名佇乆立也直吕切九竚上同芧草也可以爲繩苧上同紵麻紵杼說文曰機之持緯者又神與切羜生羔五月宁門屏之間禮云天子當宁而立眝說文日長眙也一曰張眼也與善也待也說文曰黨與也余吕切又余譽二音七与上同古文歟歎也又音余予郭璞云予猶與也又弋諸切藇蕃蕪亦作穥又徐吕切㦛說文曰趣步㦛㦛也䰞說文曰烹也章与切烹普庚切四煑上同陼丘也說文曰如渚者陼丘水中髙者也渚沚也釋名曰小洲曰渚渚遮也能遮水使旁迴也又水名出常山汝尒也亦水名山海經曰汝水出天息山亦州名春秋時爲王畿及鄭楚之地左傳楚襲梁及霍漢爲梁縣後魏屬汝北郡隋移伊州於陸潬縣北遂改爲汝州又姓左傳晉有汝寛人渚切六肗魚不鮮茹乾菜也臭也貪也雜糅也又而恕切㼋乾菜􅭓􅭓黏也㝱楚人呼寐暑熱也舒吕切五䑕小獸名善爲盗說文曰穴蟲之緫名也黍說文云禾屬而黏也引孔子曰黍可爲酒故从禾入水也􅡂􅡂蝜癙癙病杵丗本曰羅父作杵曰昌與切二處居也止也制也息也留也定也說文又作処亦姓風俗通云漢有北海太守處興貯居也積也丁吕切九上同棺衣褚裝衣說文曰㡒也所以盛米也䍆上同著著任又張慮切直略切詝有所知也䘢䘢衣諝才智之稱私吕切九胥上同又思余切㥠上同稰熟穫醑簏酒湑露皃糈說文云糧也又音所楈木也祭具楮木名丑吕切三柠上同禇姓出河南本自殷後宋恭公子石食采於褚其德可師号曰褚師因而命氏也又張呂切女禮記曰女者如也如男子之教尼吕切又尼慮切二籹粔籹許許可也與也聽也亦州名本爲許國大嶽之胤周武王伐紂所封漢爲潁川郡周爲許州又姓出髙陽汝南本自姜姓炎帝之後太嶽之胤其後因封爲氏虚吕切二鄦地名也出史記巨大也亦姓漢有巨武爲荆州刺史其吕切十八拒拒捍也又格也違也秬秬黒黍也距雞距􅟉上同炬火炬粔新字解訓曰粔籹膏環飛天上神獸鹿頭龍身說文曰鐘鼓之柎也飾爲猛獸釋名曰横曰栒縱曰􅶅上同俗作鐻上同鉅澤名又大也苣苣蕂胡麻駏駏驉􅛧苦􅛧江東呼爲苦蕒罟也詎豈也又音遽歫書傳云至也䶙齗腫所說文云伐木聲也詩曰伐木所所又處所也詩曰獻于公所亦姓漢有諫議大夫所忠踈舉切七所俗糈祭神米也齭齒傷醋也說文音楚疋記也又山於切盨說文曰盨負戴器也䝪齎財問十楚萇楚亦荆楚又州本漢射陽縣地春秋時屬吴秦屬九江郡晉爲山陽縣武德初改爲楚州又姓左傳趙襄子家臣楚隆創舉切八礎柱下石也齭齒傷醋也齼上同􅮽說文曰㑹五綵鮮皃引詩云衣裳􅮽􅮽䙘埤蒼云鮮也一曰美好皃憷痛也出音譜濋水名阻隔也憂也側吕切二俎俎豆齟齟齬牀吕切二鉏鉏鋙不相當也咀咀嚼慈吕切六沮止也又七余子預二切怚憍也又子據切袓㜺也說文曰事好也又子邪切跙行不進皃雅出前也又前結切擊也於許切二肩骨舉擎也又立也言也動也說文本作舉又姓出姓苑居許切十莒草名亦國名又姓嬴姓之後漢有緱氏令莒誦櫸木名筥筐筥􅞠飲牛筐行皃弆藏也柜柜柳䢹亭名在長沙郡共輿皃叙次弟爾雅曰叙緒也又姓徐吕切十一緒由緒說文曰絲耑也亦姓藇姓也已上三字並出何氏姓苑序庠序又爾雅曰東西牆謂之序溆水浦也抒渫水俗作汿又神吕切嶼海中洲也鱮魚名酒之美也本亦作藇詩云釃酒有藇予也履屬去除也說文从大口也羌舉切又丘據切五麮麥粥汁弆藏也又音莒􅎕􅎕蚊繼入也又音踈紓緩也神與切又音舒三抒左傳云難必抒矣抒除也又音序杼橡也野田野承與切又與者切二墅田廬皴皮裂七與切一苴履中草子與切又子余切三咀㕮咀淸藥也又慈吕切㕮音甫䃊䃊場外名也九麌牡鹿又麌羣聚皃虞矩切三俁俁俁容皃大也詩曰碩人俁俁􅢕􅢕􅢕笑皃羽舒也聚也亦鳥長毛也又官名羽林監應劭漢官儀曰羽林者言其爲國羽翼如林盛也皆冠鶡冠亦姓左傳鄭大夫羽頡又虜姓後魏書羽弗氏後改爲羽氏又音芋王矩切十五禹舒也字林云蟲名又姓夏禹之後王僧孺百家譜云蘭陵蕭道遊娶禹氏女也雨元命包曰隂陽和爲雨大戴禮云天地之氣和則雨說文云水从雲下也一象天門象雲水霝其間也宇宇宙也又大也說文曰屋邊也易曰上棟下宇亦姓出何氏姓苑又虜複姓宇文氏出自炎帝其後以有甞草之功鮮卑呼草爲俟汾遂号爲俟汾氏後丗通稱宇文蓋音訛也代爲鮮卑單于㝢上同瑀石似玉也祤祋祤縣名在馮翊又況羽切栩栩陽地名又況羽切鄅鄅子國在琅耶其後以國爲姓頨孔子頭也說文云頭妍也又讀若翩楀木名又音矩萭說文艸也䣁亭名在南陽聥張耳有所聞入音矩䨞雨皃聚衆也共也斂也說文㑹也邑落云聚慈庾切一鄹亭名在新豐甫始也大也我也衆也說文曰男子之美稱也字从父用又姓風俗通云甫俁之後方矩切十九脯乾脯東方朔云乾肉爲脯禮記曰牛脩鹿脯田豕脯斧斧鉞周書曰神農作陶冶斤斧頫說文低頭也太史公書頫仰字如此俯上同漢書又作俛今音免府官府說文曰府文書藏也風俗通曰府聚也公卿牧守道德之所聚也又舎也亦姓風俗通云漢有司徒椽府悝腑藏腑本作府俗加月簠簠簋又音膚黼白黑文也爾雅曰斧謂之黼謂畫斧形因名云蜅小蟹莆萐莆堯之瑞草爾雅曰蠸輿父守瓜郭璞云今瓜中黄甲小蟲喜食瓜葉故曰守瓜字或从虫俌俌輔也出埤蒼㕮㕮咀父尼父尚父皆男子之美稱又漢複姓三氏孔子弟子有宰父黒漢有臨淄主父偃左傳宋有皇父充石宋之公族也漢初有皇父鸞自魯徙居茂陵改父爲甫後漢安定太守㒞始居安定朝那代爲西州著姓又徙居京兆又音釡䃊蚥蜛蚥螳蜋别名鯆大魚郙亭名也在上蔡武止戈爲武又迹也曲禮曰堂上接武又州名本自白馬互地魏文徙武都郡於美陽今好畤縣界武都古城是也後魏平仇池山築城置武都鎭即今州是也亦姓風俗通云宋武功之後漢有武臣又漢複姓六氏漢有乗黄令武安恭出自武安君白起之後風俗通云漢武強侯王梁其後因封爲氏世本云夏時有武羅國其後氏焉何氏姓苑有廣武氏出自陳餘之後又武成氏武仲氏又虜複姓西秦録有武都氏文甫切二十四舞歌舞左傳曰舞所以節八音而行八風也周禮曰樂師掌國學之政以教國子小舞也山海經曰帝後八子始爲舞又姓出何氏姓苑儛上同嫵嫵媚侮侮慢也侵也輕也牎中網也憮憮然失意皃說文愛也一曰不動也㒇上同珷珷玞石次玉碔上同廡堂下也􆈿籀文甒甖甒潕水名在南陽鵡鸚鵡鳥名能言䳇上同􅤷愛也說文撫也膴土地腴美膴膴然也瞴微視之皃娬好也敄彊也䒉長艇船也䍙雉網蕃滋生長說文豐也隷省作無今借爲有無字父說文曰父矩也家長率教者扶雨切十五輔毗輔又助也弼也亦姓左傳晉大夫輔躒又智果以智伯必二其宗改爲輔氏䩉頰骨􅷯上同腐朽也敗也說文爛也鳼越鳥滏水名在鄴山海經云神箘之山釜水出焉䭸牡馬㕮㕮咀嚼也又音甫蚥蟾蜍别名㾈病腫也說文病也秿禾穳積也鬴說文鍑屬又覆鬴九河之一名釡上同古史考云黃帝始造釡䪔尻衣撫安存也又持也循也方武切十三上同弣弓把中也上同說文又方九切刀握也拊拍也說文揗也殕食上生白毛䋨䋨綿俌輔也又音甫剖判也又普厚切䌗絲䯽說文云髪皃又歩侯切草䞤健也亦作柱廣雅曰楹謂之柱又姓出何氏姓苑直注切三跓勇足嵀天嵀案爾雅曰霍山爲南嶽郭璞云即天柱山字俗從山詡和也普也遍也大也禮云詡謂敏而有勇況羽切十二殷冠名􅒐上同姁吕氏春秋云姁姁然相樂也又漢髙后字娥姁說文嫗也栩柞木名說文云杼也其實早一曰様様音象珝玉名欨說文吹也一曰笑意又火于切祤祋祤縣在馮翊咻噢咻病聲喣呈示䧁郷名在安邑煦温也又香句切豎立也又童僕之未冠者又姓左傳鄭有大夫豎拊臣庾切四竪俗樹扶樹裋敝布襦也庾倉庾又姓出潁川新野二望本自堯時爲掌庾大夫因氏焉以主切十二窳器空中亦病也上同抌刺也㤤懼也百草愈差也賢也勝也瘉病也說文曰病瘳也㼌微弱本不勝末貐獸名龍首食人說文曰䝟貐以貙虎爪食人迅走也楰䑕梓似山楸而黑也斞說文量也主掌也領也典也守也君也說文曰鏺小火主又姓出姓苑之庾切五麈鹿屬華國志曰郪縣冝君山出麈尾枓斟水器也宔說文曰宗廟室袥或作砫炷燈炷又音注傴不伸也尪也荀卿子曰周公傴背於武切三噢噢咻病聲迂曲迴皃齲齒病後漢梁兾妻能爲愁眉啼䊋齲齒笑折腰歩驅雨切三踽䠑踽又獨行皃竘巧也又音口拄拄從旁栺知庾切四柱柱夫草一名摇車也說文曰有所絶止而識之也􅚍􅚍點義與上同乳柔也而主切三擩擩取物也醹厚酒窶貧無禮也其矩切二貗爾雅云貒子貗數說文計也所矩切又所句所角二切二籔窶籔四足九也矩法也常也俱雨切十一榘上同說文又其吕切踽獨行又驅雨切枸木名出蜀子可食江南謂之木蜜其木近酒能薄酒味也萭姓漢有萭章人音禹聥張耳有所聞䅓曲枝果也􅨎曲羽又求俱切楀楀氏木名又音禹蒟蒟醬出蜀其葉似桑實似椹又音句椇枳椇取收也受也七庾切一縷絲縷力主切十三􅖮贏􅖮縣名在交阯僂僂傴疾也褸襤褸衣敝說文衽也簍小筐嶁岣嶁衡山别名謱覼謱委曲慺姓出纂文漊說文曰雨漊漊也一曰汝南人謂飲酒習之不醉爲漊􅬹鳥今云郭公也㜢女人惡稱小蒿草蔞草可亨魚又力俱切絆前兩足相庾切二䅡草名䝒小母豬也雛禹切二上同十姥老母或作姆女師也亦天姥山也又姓出何承天纂文莫補切六莽宿草又音蟒䥈鈷䥈又言蟒媽母也峔慈母山名在丹陽亦作姥俗從山􅤷愛也又音武土釋名曰土吐也吐萬物也文字指歸無點他魯切四吐口吐亦虜複姓三氏後魏書有吐奚吐難吐萬氏又虜三字姓二氏慕容廆庶長兄吐谷渾後將所部居西零以西甘衳之南極乎曰蘭數千里其孫葉廷曰禮云孫子得以王父字爲氏遂以吐谷渾爲氏又後魏書吐伏盧氏稌稌稻芏草名似莧生海邊可爲席杜甘棠子似梨又塞也澀也又杜仲藥名亦姓本自帝堯劉累之後出京梨濮陽襄陽三望漢有街史大夫杜周以南陽豪族徙茂陵始居京兆徒古切九靯韛靫别名一云靯􅫜𤬪瓶也塡也􅩹塞也閉也肚腹肚又當古切􅪂桑皮荰杜衡香草似葵山海經云可以治癭帶之令人便馬馬亦善走都似細辛而氣小異字俗從廾土土田地主也夲音吐魯鈍也又國名伯禽之後以國爲姓出扶風又羌複姓有魯歩氏郎古切十七櫓城上守禦望樓釋名曰櫓露也露上無覆屋也說文云大盾也滷鹹滷虜虜掠又獲也服也擄虜掠戓從手㢚庵舎􅳻摇動樐彭排艣所以進船鐪釡屬蓾杜衡别名上同鹵鹵簿令㔪匐也鏀鏀以木爲刀柄㭩木名可染繒䲐魚名蔖草死爾雅曰蓾蔖郭璞云作履苴草采古切二草履覩見也當古切十一睹上同暏詰朝欲明賭戲賭堵垣堵又姓左傳鄭有堵叔又音者肚腹肚又徒古切帾幡也標記物之處也㕆美石又音怙楮木名又音禇􅪂桑皮又音杜䁈梁公子名仇䏿古故也又姓周大王去邠適歧稱古公其後氏焉蜀志有廣漢功曹古牧又漢複姓晏子春秋有齊勇士古冶子又虜三字姓後漢書有古口引氏公戸切二十一皷說文曰郭也春分之音萬物郭皮甲而岀故謂之鼔周禮六鼔靁鼔靈鼓路鼔鼖鼔鼛鼔晉鼔亦作鼓鼓說文曰撃鼓也瞽無目股髀股􅨨上同罟網罟蠱疑也又蠱毒也又卦名蠱事也估市稅盬鹽池又左傳曰盬其腦杜預云盬𠯗也又詩傳云盬不固也鈷鈷䥈羖羖䍽羊說文曰夏羊牡曰羖􅗑俗詁詁訓牯牯牛賈啇賈又古下切夃多債利也又古乎切沽屠沽焸人名岀漢書壅蔽器也說文作五數也又姓左傳有五奢亦漢複姓四氏漢有五鹿充宗風俗通云氏於職焉三烏五鹿是也趙有將軍五鳩盧國語云楚昭王時有五參蹇姓苑有五里氏疑古切五午交也又辰名爾雅云太歳在午曰敦牂旿明也伍行五說文曰相參伍也周禮曰五人爲伍仵偶敵又伍仵皆姓出姓苑簿簿籍又車駕次第爲鹵簿裴古切二部部伍又部曲粗麤也略也徂古切又于胡切五麆大也駔駿馬又徂㓪切伹淺也觕牛角直下祖祖禰又始也法也本也上也又姓祖巳之後岀范陽則古切六珇珪上起又美好組組綬又綸組東海中草名蒩茅藉䔃說文菜也靻靻勒名虎獸名說文曰虎山獸之君淮南子曰虎嘯谷風至又姓風俗通曰漢有合浦太守虎旗其先八元伯虎之後呼古切七琥發兵符有虎文周禮云白琥禮西方戽戽斗舟中渫水器又音戸滸水岸地名萀虎豆名俗加廾䗂蠅虎蟲俗加虫隖村隖亦壁壘說文曰小障也一曰􅋻城也安古切十塢上同通俗文曰營居曰塢戴延西征記曰蠡城川南有金門塢鄔郡名又姓鄔郡太守司馬牟之後因以爲氏瑦石似玉也䃖小障也出埤蒼頭巾溩水溩䛩相毀皃走輕䡧車頭中也苦麤也勤也患也說文曰大苦苓也康杜切二竹名怒恚也奴古切又奴故切五弩弓弩古史考曰黃帝作弩砮石可爲矢鏃又乃胡切努努力水弩蟲俗從虫戸說文云戸護也半門爲戸侯古切二十三楛木名堪爲矢榦書云荆州所貢詩䟽云東夷之所貢扈跋扈猶強梁也又有扈國名亦姓風俗通云趙有扈又虜三字姓有扈地干氏怙恃怙鄠縣名在京兆府夲夏之扈國秦爲鄠縣也帍巾也祜福也昈文彩狀又明也􅧓山卑而大曰􅧓岵山多草木芐地黄雇說文曰九雇農桑候鳥扈民不婬者也春雇鳻鶞夏雇竊玄秋雇竊藍冬雇竊黄棘雇竊丹行雇唶唶宵雇嘖嘖桑雇竊脂老雇鴳也􅟾上同亦作鳸亦同西京記云枹土含婟婟惜又音互戽抒也㕆美石又丁古切洿洿深皃貪也酤一宿酒又音姑滬靈龜負書出玄滬水簄海中取魚竹名曰簄普博也大也徧也又姓後魏十姓獻帝次兄爲普氏亦虜複姓周書辛威賜姓普屯氏又虜三字姓周書楊忠賜姓普六如氏後魏書有普陋如氏滂古切五溥大也廣也誧文字音義云大也助也浦風土記云大水有小口别通曰浦說文濵也又姓晉起居注有浦選烳火行皃補補綴說文曰完衣也博古切三譜籍録圃園圃說文種菜曰圃亦姓又博故切十一薺甘菜徂禮切五􅚝魚名常以春時出九江鱭上同癠病也方言曰生而不長也啙弱也又子西兹此二切禮說文曰履也所以事神致福也釋名曰禮體也得其事體也又姓左傳有衛大夫禮孔盧啓切十六礼古文竹名蠡蠡吾縣名在涿郡又彭蠡澤名􅿍小船補也澧水名在武陵又水名出衡山亦姓出何氏姓苑醴醴酒亦醴泉縣屬京兆府本漢谷口縣也屬馮翊至後魏置寧夷縣隋改醴泉因周體泉官名也鱧說文鱯也鱺上同說文鮦也欚江中大舩名盠簞也劙刀刺又力移切豊行禮之器布也說文數也又音離欐小舩又力計切體體身也又生也他禮切八軆俗醍醍酒又音啼涕目汁䪆䪆輭皃挮去淚緹纁又音啼横首杖名䫌傾頭匹米切一濟定也止也齊也亦濟濟多威儀皃又水名出王屋亦州本齊地秦屬東郡宋於此置碻磝戍後魏於此置濟北郡周武帝置肥城郡武德改爲濟州或作又姓出姓苑襄城人也子禮切又音霽五㧗殺也又側買切䍤手榒酒又作櫅癠生而不長夘事之制也說文音卿邸舎也又姓風俗通云漢上郡太守邸杜俗從互餘同都禮切十三底下也止也作底非也詆呰也訶也䏄耳膿坻隴阪又支氏切抵擠也擲也牴角觸觝上同柢本也根也弤埤蒼云舜弓名㪆隱也堤滯也軧大車後也弟兄弟爾雅曰男子先生爲兄後生爲弟徒禮切又特計切七娣娣姒悌愷悌詩作豈弟毛萇云豈樂也弟易也䑯䑯船遞更代也又亭繼切㼵小瓫媞好人安詳之容皃又啼是二音禰祖禰亦姓出平原魏有禰衡亦作餘同奴禮切十三嬭楚人呼母又奴蟹切䦵智少力劣苨薺苨䪆輭皃􅠩􅠩􅠩濃露也亦作泥瀰水流也坭地名髪皃薾華茂也檷絡絲趺也鑈上同轡垂也洗洗浴又姓先禮切又音銑二洒上同又所賣切泚水清也于禮切四玼玉色緀帛文皃皉白色啓開也發也别也刻也說文教也俗作唘康禮切十二􅯆兵欄說文曰傳信也綮㦸支一曰㦸衣卟問卜也又工兮切䭬首至地也稽上同又古兮切晵說文云雨而晝姓也又姓後燕有將軍啓倫或作啓闙埤蒼與啓亦同启說文開也䏿肥腸又口系切㒅開衣領也䡔至也礙也徯待也胡禮切八謑恥辱所以安重船又音糸上同涀水名在髙陵說文待也匸有所藏也􆈞目動米榖實說文作米又胡姓莫禮切七眯物入目中䋛繡文如聚米出說文洣水名在荼陵蔝蔝子菜寐不覺䱊魚子陛階陛也傍禮切八梐梐枑行馬髀髀股䯗上同㙄下也􅤴􅤴䑕莞見爾雅可爲席又必鼻切牛馬行㒅開腳行也可也尒也烏弟切二噟聲堄埤堄女墻研啓切六㪒㪏㪒擊聲掜不從也觬角曲䘽袜䘽袿衣飾也晲明也亦作㪏補米切二明白十二蟹水蟲仙方云投於漆中化爲水服之長生以黒犬血灌之三日燒之諸䑕畢至胡買切七䲒說文上同解曉也又解廌仁獸似牛一角亦姓自唐叔虞食邑於解今解縣也晉有解狐解楊出鴈門又虜複姓魏書有解批氏又佳買古賣二切獬字林字様俱作解廌廣雅作陸作獬豸也澥渤澥嶰山澗間又懈谷名案漢書只作解谷小谿買說文市也莫蟹切五嘪羊聲蕒吴人呼苦􅛧㵋水名鷶鷶􅸭鳥名􅛠戾也苦蟹切三意難說文作􅮻艸盛上出也挴貪也燘燘爛也又呼猥切䜸豆碎萁也骽骽股也吐猥切八腿俗聉聉顡癡瘨皃說文五滑切無知意也顡音隗僓長好皃脮腲脮㟎㟎㠑山高皃㱣㱬㱣㞂㞇㞂行病瘣木病無枝胡罪切九溾溾浽穢濁也㱱㱱㱣䜋列也玉篇云譯也說文云中止也又胡對切匯回也廆晉有大單于遼東郡公慕容瘣䕇爾雅云䕇懷羊又音瑰輠車轉之皃郲不平䫥大頭說文曰頭不正也口猥切五㚍㚍㚍多皃傀俗作傀儡子也顝首大骨又口瓦切磈磈礧石也亦作䏨都罪切五䇏木實垂皃重皃頧頭不正皃謉謉諢謔言出聲譜餧飢也一曰魚敗曰餧奴罪切八餒上同浽溾妥娞㛱娞風動皃鮾魚敗脮上同㼏傷瓜陟賄切假髪髻也一頠頭也一曰閑習五罪切又五毀切七顡聉顡說文音聵癡頭不聦明也隗陮隗髙也亦姓出天水後漢有隗嚻峞峞􅐑山皃嵬山皃又玉回切䫥頭不正也又口猥切䃬衆石皃皠霜雪白狀七罪切八􅗍新水狀也上同漼水深皃璀玉名物粗也䊫赤米鏙鏙錯鱗甲皃琲珠五百枚蒲罪切三痱痱癗起令虚摧山林崇積皃子罪切二洅說文云雷震洅洅本作代切倄痛而叫也于罪切一十五海說文曰天池也以納百川者亦州禹貢徐州之域七國時屬楚秦爲薛郡漢爲東海郡後魏爲海州亦姓呼改切三醢肉醬亦作醯橀榽橀木名似檀齊人諺云上山斫檀榽橀先殫愷樂也康也左氏傳云八愷苦亥切九凱上同颽南風亦作凱塏爽塏髙地爽明塏燥也暟美鎧甲之别名闓開也亦音開䐩肉美輆輆軩不平宰冢宰又制也亦姓孔子弟子宰予作亥切四縡載也䏁半聾字林云秦晉聽而不聦聞而不達曰䏁載年也出方言又音再駘疲也鈍也駘蕩春色皃亦官名徒亥切又音臺十一殆危也近也待待擬也俟也怠懈怠迨及也上同紿欺言詐見又絲勞也䈚竹筍詒相欺軩輆軩不平言不上乃語辭也汝也奴亥切三迺古文鼐鼎大者曰鼐又奴代切改更也又姓秦有大夫改産古亥切三頦頰頦又戸垓切絠解繩說文云彈彄也亥辰名爾雅云也歳在亥曰大淵獻亦姓戰國䇿晉有亥唐胡改切四侅竒侅非常㧡動也堅神人啡出唾聲匹愷切一采事也又取也亦姓風俗通云漢有度遼將軍采皓倉宰切七採取也俗綵綾綵寀寮寀官也彩光彩䰂髪䰂又七代切􅺴恨也茞香草也昌紿切一等齊也多改切又多肯切一䆀禾傷雨也莫亥切又莫代切二貪在居也存也昨宰切一俖不肯也普乃切二朏說文云月未盛之明又音斐欸相然譍也於改切四㕈藏也毐嫪毐秦人名又音哀挨擊也佁癡也夷在切一㘆㘆言不止也亥切一疓病也見尸子如亥切一連絲釣曰出字苑來改切二唻囉唻歌聲又力諧切䑂肥也與改切二上同倍子本等也薄亥切三菩說文曰草也蓓黃蓓草也十六軫動也車後横木也又姓今吳縣有之俗從尓餘同章忍切二十三縝結也單也又丑珍切胗胗皮外小起說文曰脣瘍也又音緊疹籀文畛田間道又音眞賑隱賑說文富也又之刄切㐱說文曰稠髮也引詩曰㐱髮如雲亦作鬒鬒上同槙木密又丁堅切紾軍衣或作縝縝上同􅢂告也診候脤又視也驗也袗說文云玄服也亦作裖裖上同敐􅚳􅚳敐敐喜恱皃􅚳音田眕目有所恨而止又厚重也䪾顔色䪾䫰愼事也黰黒皃駗馬色也纑也稹緻也又聚物􅷾新生羽而飛也辴大笑丑忍切一腎五藏之一也時忍切六蜃大蛤說文曰雉入水所化又時刃切祳祭餘肉說文云社肉盛之以蜃故謂之祳天子所以親遺同姓脤上同㰮指而笑也鋠玉篇云圎鐡忍強也有所含忍而軫切三荵說文曰荵冬草也爾雅曰蒡隱荵郭璞云似蘇有毛涊水名在上黨矤說文曰况也詞也从矢取詞之所之如矢也式忍切六矧訠並上同哂笑也弞笑不壞顔頣舉眉視人嶙嶾嶙山髙皃良忍切五僯慙恥少髪皃橉門限也又牛車絶橉又力進切撛扶也紖牛紖直引切四䏖杖痕腫處說文音酳瘢也一曰遽也䀕瞋怒目皃眹目童子也又吉凶形兆謂之兆朕緊紉急也居忍切四胗脣瘍也又之忍切並俗盡竭也終也慈忍切又即忍切二濜濜溳水流急皃㯸埤蒼云盂也即忍切二盡曲禮曰虚坐盡前又慈忍切牝牝牡毗忍切又扶履切四􅩋去膝蓋骨形名臏上同猵獺屬又音邊釿齊也說文曰劑斷也宜引切五磭大脣齒齊齗犬爭皃听口大皃笉笑皃七忍切一窘急迫也渠殞切十僒上同莙牛藻也㖥吐皃㻒玉名箘竹名菌地菌又姓出姓苑䐃腸中脂也蔨爾雅曰蔨鹿靃郭璞云今鹿豆也葉似大豆根黃而香蔓延生蜠爾雅曰貝大而險者曰蜠又音囷引爾雅曰長也說文曰開弓也余忍切又徐刃切十四上同玉篇云挽弓也蚓蚯蚓又余刃切螾螾衍蛐蜒又餘刃切說文上同弞笑不壞顔大笑又音衍伸又布也䏖當脊肉也濥水門又引水也說文曰水脈行地中濥濥也廴長行之皃戭長槍也又弋淺切縯齊武王名鈏爾雅曰錫謂之鈏靷說文曰引軸也又餘刃切愍悲也憐也眉殞切十四慜聦也憫憫黙亦憂也閔傷也病也又姓孔子弟子閔損敏疾也敬也聦也達也敃說文強也暋上同潣水流浼浼皃簢竹名可以爲席爾雅曰簢筡中言其中空筡音塗或作上同􅣕獸如牛也細罔車兔下革也鰵海魚泯水皃亦滅也盡也武盡切又彌鄰切十細理僶僶俛笢竹膚黽黽池縣在河南府俗作㫣又音緬澠上同又音繩䟨蹄甲刡刡削車兔下軛也䐇䐇合殞歿也于敏切七溳濜溳波相次也磒石落隕墜也落也霣說文雨也齊人謂靁爲霣一曰雲轉起也愪憂也荺爾雅云荺茭蔈葦根可食者曰茭茭胡狡切十七準均也平也度也又樂器名狀如瑟長丈而十三弦隱九尺以應黃鐘之律之尹切又音拙四准俗埻射的周禮或作準純縁也又音淳尹正也誠也進也說文治也又姓出天水河間周有尹吉甫又漢複姓齊定王時有尹文子著書又漢書百官表曰内史周官秦因之掌治京師武帝更名曰京兆尹應劭曰河南尹所以治周地秦兼天下置三川守河洛伊也漢更名河南太守也丗祖徙都雒陽改爲尹余準切八䪳面斜允信也狁獫狁馻馬毛逆玧充耳玉􅣡進也􅮤蟲名筍竹萌思尹切九笋俗􆁎驚詞鵻說文曰祝鳩也隼鷙鳥也說文同上箰箰律簨簨虡釋名曰所以懸鼔者橫曰簨簨峻也上髙峻也縱曰虡虡舉也在旁舉簨也上同亦同又作栒蝡淮南子曰蠉飛蝡動或作蠕而允切又而兖切一蠢岀也爾雅云作也動也蠢不愻也尺尹切九古文䐏肥也踳踳駮相乖舛也蠢蠢蠢擾動皃朐漢朐䏰縣名在巴東郡地下濕多朐䏰蟲䏰音閠偆厚也富也又癡準切僢相背亂也盾千盾也食尹切四揗摩也吮吮舐也楯欄檻偆厚也富也癡準切一耣束也力準切二􅾂上同毛聚而尹切一束縛丘尹切一螼蚯蚓也爾雅曰螼蚓蜸蚕弃忍切三皮厚皃行皃又去刃切賰賱賰富有式允切一脪腫起興腎切二㾙上同濜濜溳水勢鉏紖切一屒重脣黏好說文伏皃一曰屋宇珍忍切一十八吻口吻武粉切七􆈩上同刎刎頸抆拭也伆離也又武弗切勽覆也蘠粉愽物志曰燒鉛成胡粉又曰紂作粉方吻切三黺黺綵文扮扮動又握也又房吻切憤懣也房吻切十四上同扮握也㿎病悶鼢字林云地中行䑕百勞所作亦作蚡蚡上同墳土膏肥也魵鰕又音忿鱝鱝魚圎如盤口在腹下尾上有毒弅莊子有隱弅之丘也轒轒䡝車名膹切熟肉也盛榖囊滿而裂也坋說文曰塵也一曰大防也又歩寸切忿怒也敷粉切又敷問切二魵鰕别名惲謀也議也亦厚重也於粉切十蕰藏也說文曰積也春秋傳曰蕰利生孽俗作藴藴俗韞韞櫝緼枲麻褞褞袿䡝轒䡝車名賱賱賰富也醖釀也又於問切揾拄也齳無齒魚吻切五上同夽大也喗大口走皃又丘粉切抎有所失云粉切四䫟說文曰面色顚分皃上同􅯠病也走皃丘粉切二左傳云無勇之束縛也十九隱藏也痛也私也安也定也又微也又姓吴志有廷尉左監隱蕃於謹切十一磤雷聲胗皮外小起䌥縫衣相著㥯謹也櫽說文括也嶾嶾嶙山皃丄匿也㶏水名㐆歸依也又於機切􅨴車聲謹絜也愼也居隱切十一黏皃㹏牛馴也槿木槿櫬也又名蕣一曰朝華一曰日及亦曰王蒸又曰赤堇堇菜也說文作黏土也又音芹上同漌清也慬慤也卺以瓢爲酒器㛰禮用之也上同菦菜名角齊多皃仄謹切二草木衆齊本又音赾跛行皃丘謹切一近迫也幾也其謹切又其斳切二瘽病也齔毀齒俗作齔初謹切又初靳切一听笑皃牛謹切一䘆蚚蚓也吴楚呼爲寒䘆休謹切又虚偃切一二十阮姓出陳留虞逺切三小皃邧秦邑名說文云鄭邑也逺遥逺也雲阮切二面不正偃偃仰又息也說文僵也又姓左傳舒庸舒鳩並偃姓於幰切十二㫃旗旌旒之䞁物相當也鶠鳯也郾縣名褗衣領堰壅水也又於䢖切匽隱也鄢鄭楚地名左傳曰晉侯鄭伯戰于鄢陵鼴鼴䑕似䑕形大如牛好偃河而飲水也蝘蜩螗别名又爾雅云蝘蜓守宫也鰋魚名湕水名居偃切五矛吃語也揵難也舉也蹇跛也屯難也亦卦名又居免切寋女字亦姓今蜀人有之其偃切四楗關楗鍵上同􅼽倨也言脣急皃去偃切一語偃切四巘山形如甑露齒說文作屵屵磭又大脣皃磭音綽幰蒼頡篇云帛張車上爲幰虚偃切四攇手約物䘆寒䘆又休謹切䜢䜢搏很戾晚暮也無逺切七娩婉娩媚也又忙件切挽引也輓上同㿸皮恱也又無願切㝃子母相解又音免脕色肥澤又音曼反反覆又不順也府逺切六䡊車耳曰䡊阪大陂不平坂上同返還也橎木名黄豆求晚切四圈獸闌又姓後漢末圈稱字幼舉撰陳留風俗傳圈氏本氏於其國又其卷切菌蕈也又求敏切卷風俗傳云陳留太守琅邪徐焉改圈姓卷氏字異音同婉順也美也於阮切二十菀紫菀藥名又菀荗木也又姓左傳齊大夫菀何忌苑園苑白虎通云苑囿所以在東方者謂飬萬物東方物所生也踠體屈蜿蜿蟺蚯蚓也亦作䖤䖤上同畹田三十畒王逸云十二畒也琬珪也宛宛然說文曰屈艸自覆也又姓左傳有宛春惌說文同上又周禮注云惌小孔貌倇歡樂䩩䩩量物之䩩也上同䘼襪也又安院切夗卧轉皃䩩底履名晼晼晚睕乖也又無媚也船木䛄慰也又於万切䅚相近皃去阮切六绻繾綣謹慎虇蘆筍裷幭也䊎粉也黏暅日氣況晚切又古鄧切七䁔大目咺兒啼不止朝鮮云也烜光明愃寛心又音宣大視諼詐也飯餐飯禮云三飯是扶晚切又扶万切四軬車軬笲竹器所以盛棗脩䪻無髮二十一混混流一曰混沌隂陽未分胡本切十六鯶魚名渾渾元又戸昆切緷大束焜火光說文煌也倱倱伅四凶之一春秋作混沌棍木名䫟頭面形圎也睔大目又古悶切㮯木未破也䚠角圎皃亦上同醨酒相沃䧰大阜掍掍同睴視皃煇煇煌光又音揮翉飛起又走也普本切忖思也倉本切三截也刌細切又割也夲本末又始也下也舊也說文曰木下曰夲从木一在其下俗作本夲自音叨布忖切六畚草器上同笨竹裏又蒲本切㡷戎姓苯苯䔿草叢生也損减也傷也蘇夲切四㾕㾕􅱵惡寒䐣臏屬􅍧切熟肉更煑也􅰙􅰙減也兹損切六撙挫趨禮曰恭敬撙節鄭玄云撙猶趨也噂噂􅊱譐上同䔿草叢生皃僔衆也穩持穀聚亦安穩烏本切三喗小口㒚㒚㒚囤小廩也徒損切九𥫱籧也說文篅也盾趙盾人名沌混沌坉上同庉樓牆遁遁逃又音鈍遯上同㡒貯也又張倫支旬二切鱒說文曰赤目魚也才本切一􅕐禹父名亦作骸尚書本作鯀古本切十二㯻大束衮天子服也緄帶也鯀說文曰魚也亦作鮌輥車轂齊等皃緷爾雅云百羽也蓘穮蓘壅飬苗惃惃亂丨上下相通䃂石聲錕車釭畽畽行無廉隅他衮切四肉吨氣相衝也黗黒狀閫閫門限也苦本切十壼居也廣也又宫中道篆又稛成熟又縛衣也裍成就悃至誠􅝋秃頭又口沒切梱樴弋門橛齫齫齦齒起皃硱碖碅石落皃畽行無廉隅盧本切四惀心思求曉事睔睔目皃碖碖硱石落皃獖守犬蒲本切四笨竹裏又晉書有兖州四伯豫章太守史疇以大肥爲笨伯㨧車弓体麤皃又劣也懣愁悶也模本切又亡頓莫旱二切一㶧㶧熱也乃本切一結也虚本切二惛惛懣忽疾皃也二十二很很戾也俗作佷胡墾切二䓳䓳似蓍花青白墾力也耕也治也康很切四懇懇惻至誠也又信也齦齧也豤豕食皃䫀頰後古很切二詪難語皃二十三旱不雨胡笴切五􅦾山名在南鄭皔白皃䓍草名䛞大言亶信也厚也大也多也榖也俗作亶多旱切又遮連切八􅓠病也嬗媛也笪持也笞也又都達切疸黄病又音旦觛小觶又音但狚獦狚獸担笞也坦平也安也明也寛也他但切二䦔闑也門傍之橛所以止扉散散誕說文作􅤖分離也又作散雜肉也今通作散又姓史記文王四友散宜生蘇旱切又蘇汗切十一􅤖散並見上注饊饊飯糤上同鏾弩牙緩也繖繖絲綾今作繖蓋字䉈䈓䉈桃支竹名傘􅏛蓋鳥形又思旰切扇但語辝又空也徒也徒旱切十一蜑南方夷袒袒裼又除鴈切襢上同又陟扇切誕大也育也欺也信也潬水中沙爲潬今河陽縣南有中潬城䩥馬帶繵束腰大帶膻說文云肉膻也僤疾也本音去聲觛小觶瓉圭瓉秬鬯宗廟之盛禮周禮云裸圭有瓉以肆先王藏旱切三䟎散走又則捍切禶祭笴箭笴古旱切又音哿十二簳上同皯面黒又工旦切䵟上同亦同稈禾莖秆上同仠仠長􅗰衆草莖也矸矸擊衦摩展衣也又音幹上同嬾隋也落旱切五懶俗􅶊飯相著也上同讕謾讕侃強直也又侃侃和樂皃空旱切二衎信言又苦汗切䍐希也亦鳥網又姓左傳鄭有䍐氏出自穆公以王父字爲氏代爲卿大夫又羌複姓有䍐井氏說文作或作罕呼旱切七蔊菜味辛也厂說文云山石之崖巖灘水濡而乾說文呼旰他丹二切暵日乾也父呼旰也焊火乾也熯上同又呼旰又善二切䰖款皃作旱切二十四緩舒也又虜姓緩稽氏後改爲緩氏胡管切十四澣濯也浣上同綄候風羽出淮南子又音桓㬊玉篇云㬊明也又姓晉有西中郎將㬊清䁔目眥說文火晚切大目也大視梡木名又束薪又苦管切棵斷木䝹小有財也鰀魚名嵈山名晥縣名䈠䈠簡也短促也不長也都管切四􅠊上同斷斷絶俗作㫁断又徒管切轉籰椀器物烏管切三盌上同䝹䝹小有賄疃說文曰禽獸所踐處也詩曰町疃鹿場毛萇云町疃鹿迹也亦作畽吐緩切四上同瘓痶瘓皃䠪行速算物之數也蘇管切三匴器也冠箱也篹籮屬管樂器也主當也又姓出平原周文王子管叔之後古滿切十二筦上同脘胃府輨車轂端鐵盥洗也又公玩切琯玉琯又姓痯病也郭璞云賢人失志懷憂病也悹悹悹憂無告也詩傳云悹悹無所依又音灌䩪車鞁具也錧車具䗆雨下蟲名䘾袴襱也卵說文曰凡物無乳者卵生盧管切一款誠也叩也至也重也愛也苦管切八歀上同欵俗窾空也䥗䥗鏠梡虞爼名形有足如案棵斷木也䲌魚名煗說文曰温也乃管切七㬉上同暖亦同煖火氣亦上同又音暄餪女嫁三日送食曰餪渜湯也稬方言云沛國呼稻也纂集也作管切八􅗋鋋也又子筭切纉繼也儧聚也籫竹器鄼五百家也又五鄉爲鄼周禮曰四里爲鄼五鄼爲鄙又子旰切繤繤組夲亦作纂古文伴侶也依也蒲旱切三㚘說文云並行也从兩夫輦字从此拌棄也又音潘滿盈也充也亦姓出山陽風俗通荊蠻有瞞氏音舛變爲滿魏有滿寵莫旱切五懣煩悶古文竹器鏋金粄屑米餅也博管切五䉽䬳上同瓪牡瓦也又音板昄均大也鄹字林云亭名在新豐辝纂切一斷絶也徒管切三䪗履後帖也縀上同攤按也奴但切一坢平坦坢也普伴切二走皃二十五潸淚下皃數板切又音刪一綰繫也烏板切一版說文判也布綰切六板上同蝂蝂蝜蟲瓪瓪瓦昄大也又扶板切鈑鉼金䩆䩆面皺側板切三拃拃模䎒鷙飛赧慙而面赤俗作赧奴板切四䩆㫱温濕戁悚懼又音蹨僩武猛皃一曰寛大下赧切又音簡五憪寛大猛也捍捍握摇動橌大木也睆大目也戸板切七睅目出皃黄蒸子也鯇魚名又胡本切䴷䴷子麥麴類皖明星莞莞爾而笑阪阪别名扶板切又音返三昄大也又音板魬魚名矕視皃武板切二􅮳草可染子可食􅨭􅨭齒不正士板切二䗃蟲名五板切一㹽齧也初板切一眅目中白皃普板切一撰撰述雛鯇切二饌盤饌二十六産生也又大籥似笛三孔而短又姓何氏姓苑云彭城人所簡切十簅大籥或從竹摌以手㧡物㹌畜㹌畜牲嵼􅑬嵼汕魚浮水上滻水名在京兆㦃全德又音剗粟馬名限度也齊也界也胡簡切五硍石聲䁂䁂無畏視也㹂牛㹂很不從牽䦘門閾又作痕並俗本只作限武簡切一簡札也牒也略也釋名曰簡間也編之扁扁有間也又姓左氏傳魯大夫簡叔蜀志簡雍傳云本幽州人姓耿後音訛改爲簡古限切七㶕洗米僴武猛皃帬襵柬分别也一曰縣名在新寧說文本从束八八分也暕隂旦日明揀揀擇剗剗削初限切六鏟平木器也丳炙肉丳也羼說又曰羊相厠也从羴在尸下尸屋也一曰相出前也㦃全德䐮皮䐮棧閣也亦姓魏有任城棧潛土限切八㟞山皃也嶘上同轏車名士所乗也孱孱陵古縣名在武陵又士連切􅟅書傳云見也說文云具也輚埤蒼云臥車也亦兵車又儀禮注云載柩車也虥虎竊毛謂之虥眼眼目也五限切一醆酒濁微淸阻限切四琖玉琖小杯盞􅊦並上同㦃全德初綰切二䃺粟齦齒聲起限切一二十七銑說文曰金之澤者一曰小鑿一曰鐘兩角謂之銑先典切十一洗姑洗律名跣跣足毨書曰鳥獸毛毨傳云毨理也毛更生整理姺古國名燹字統云野火也箲箲帚飯具筅上同㭠棗木草名魚名腆厚也善也忘也至也他典切十五痶痶瘓病也圢坦也淟淟涊熱風町町疃鹿迹上同錪小釡靦面慙㥏說文曰靑徐謂慙曰㥏琠玉名蚕爾雅曰螼蚓蜸蚕郭璞云即䖤蟺也江東呼寒蚓䠄行跡行皃賟腆富晪玉篇云明也典主也常也法也經也又姓魏志有典韋多殄切五蕇葶􅏣頰後也又古很切錪小釡又他典切􅥯大篋蝘蝘蜓於殄切五躽身向前也視也宴安也又烏見切嬿嬿婉又烏見切殄絶也俗作徒典切三蜓蝘蜓一名守宫愽物志云以器養之食以朱沙體盡赤重七斤擣物杵以點女人體終身不滅婬則點滅故号守宫漢武試之驗也又音廷跈蹈也繭𧖟繭古典切十三絸古文蠒俗皮起趼上同小束俗垷塗尼又大坂在隴西筧以竹通水襺纊著衣也拭面挸上同古文峴峻嶺胡典切十三臔肉急哯小兒歐乳也又不顧而吐晛日出好皃又乃見切垷又古典切蜆爾雅曰蜆縊女郭璞云小黒蟲赤頭喜自經死故曰縊女俔譬喻又苦甸切顈顈綴黒白睍小目皃詪爭語㦓意難嫢細腰皃顯明也著也光也覿也又姓風俗通云有顯甫爲周卿呼典切五韅在背曰韅在胷曰靷在腹曰鞅在足曰絆蜆小蛤抮引戾㬎衆明也微妙也從日中見絲今作㬎又五合切㨠塗也彌殄切四芇相當也又亡弦切丏不見也眄斜視又亡見切撚以指撚物乃殄切四涊淟涊蹨蹂蹨又而善切跈蹈也編編綃方典切一曰次第也又卑連切十一匾匾㔸薄也㔸湯奚切編褰裳上同萹萹茿草豆名上同惼愝惼性狹碥乗車石也扁扁署門戸糄燒稻作米泫露光又泫然涕流皃胡畎切十四鉉鼎耳說文云舉鼎也㻆玉皃贙獸名似犬多力出西海一曰對爭也到一虎者非也埍女牢也亦作妶又姑泫切繯韋昭云繯繫也䀏說文云目摇也目童子又胡㳙切鞙䪎鞙刀鞘也說文曰大車縛軛靻也䩙上同隕坑也車上同䭴馬一歳也􅖱水小流也深尺廣尺曰􅖱姑泫切八畎上同􅎌古文詃誘也埍女牢罥挂也上同汱爾雅墜也又伏水也辮說文交也薄泫切七艑吴船􅴴蜀人呼鹽扁姓也盧醫扁鵲是也又方典切㲢㲢毛領骨風病也骨生皃犬狗有懸蹄者曰犬廣雅云殷虞晉獒楚獚韓獹宋㹱並良犬苦泫切一不動牽繭切四豤齧也䵖穄別名也蜸蜸蚕蚯蚓齞開口見齒研峴切一二十八獮秋獵曰獮獮殺也息淺切十三􅿘並上同見說文鮮少也尠俗尟寡也癬癬疥燹字林云逆燒又音銑􅲼上同䉳䉳今人戸版籍也音牽上聲廯屋廪蛇蘚苔蘚演廣也亦水長流皃以淺切八衍達也亦姓字統云水朝宗於海故從水行縯長也蔩土瓜大笑戭長槍又檮戭八元名􅣓螾􅣓蟲􅨪上同踐蹋踐慈演切七諓蹈也餞酒食送人又疾箭切俴淺也小痒蹈也㣤跡也展舒也整也審也適也說文作㞡轉也又姓魯孝公之子子展之後知演切十㞡上同搌束縛又丑善切皽皮寛輾輾轉又虜複姓後魏輾遟氏改爲展氏紾轉繩也又音軫㠭極巧視之又祝戰切㜊㜊奵好皃蟲名襢襢衣皃耳門旨善切十七以槌去牛勢樿木名禮記用之爲杓說文曰倨視人也饘饘粥又音氊醆杯又側限切皽皮寛又知善切燀又昌善切義見下文䆄束也䡀裸形無可蔽也䁴說文曰視而不止上同橏木廇䎒武也又鷙鳥擊勢也㔊擊也上同嫸偏忮趁踐也亦作碾尼展切三􅱢車轢物或作碾㞋柔弱淺不深也士演切一闡大也明也開也昌善切九燀說文曰炊也春秋傳曰燀之以薪又然也又章善切繟寛綽䵐黄色幝車蔽詩曰檀車幝幝魯邑名灛汶水爲灛嘽寛綽名也樂記曰其聲嘽以緩􅥕偏緩又徐翦切遣送也縱也去演切八繾繾綣不相離皃又黏也䭤乾麫餅也也又式善切􅥕緩也徐翦切一輦人歩梚車又姓岀何氏姓苑力展切九大麥小然火也璉瑚璉鄻地名在周僆畜雙生子摙擔運物也蓮蓮芍縣名在馮翊又音憐膦膦輭無力齴齒露魚蹇切七巘山峯遃行皃嵃㟞嵃山形讞議獄玉甑甗器也周禮曰陶人爲甗甗無底甑也件分次也其輦切四􅑬􅑬嵼又音蹇鍵管籥鑳上同辯别也理也慧也說文治也符蹇切五辯俗辡罪人相訟又方免切辨别也說文判也又薄莧切諞巧佞言也又符沔切緬逺也說文曰微絲也彌兖切十沔漢水别名亦州名春秋鄖國之地戰國時屬楚秦屬南郡武德初平朱粲置沔州汅俗湎沈湎愐思也黽黽池縣名在河南府俗作澠又忘忍切勒靻名也偭背也勔勉也幕出玉篇褊衣急方緬切二㦚憂也亦曰急也臇􅌜少汁也子兖切三上同蟲食雋鳥肥也又姓漢有雋不疑徂兖切五隽俗大痒吮欶也又徐兖切葍菜名辡罪人相訟方免切又符蹇切四䁵蔽目說文曰皃𥘉生蔽目者覸視皃鴘埤蒼云鷹鷂二年色又云人姓兖州名尚書禹貢曰濟河惟兖州武王封周公於曲阜爲魯公秦爲薛郡後魏置南兖州於譙城又置西兖州於定陶城隋改爲魯州武德初平徐圎朗復爲兖州又姓出姓苑以轉切十濟水别名岀王屋也沇上同動也抁上同萒草名馻馬逆毛㕣山澗泥也紖小風臠肉臠說文曰臞也一曰切肉也力兖切四孌美好􅸸從也脟割也轉動也運也陟兖切二乗卷卷舒說文曰膝曲也居轉切六菤菤耳苓耳韏爾雅曰革中辨謂之韏車上所用皮也辨音片河東安邑聚名捲捲衣埢家土圈說文曰養畜閑也渠篆切又求晚切三蔨爾雅曰蔨鹿靃萒耎也輭柔也或从需餘同而兖切十七軟俗蝡蟲動㮕紅藍又㮕棗也䓴木耳碝碝石次玉瑌上同愞愞弱又奴亂反腝脚疾䞂䞂小有財物也耎說文曰稍前大也弱皃弱也又尼展切偄敬也亦弱也柔韋又作萒見正典田耎城下田也緛衣縫也舛剥也說文曰對卧也從夕㐄相背夕中几切㐄口瓦切昌兖切四喘喘息說文曰疾息也荈茗草名㪜揣也又初委切膞切肉市兖切七腨腨腸鄟地名􆉊說文曰小巵有蓋也歂口氣引皃踹腳跟草名生處無魚篆篆書持兖切七瑑璧上文也沌水名在江夏又徒混切摶周禮百羽爲摶十摶爲緷緷音渾又音鮌上同又作縳䧘道邊埤也堟耕土卷也剸細割旨兖切九剬上同孨孤露可憐說文曰謹也又莊眷切鱄魚名美也出洞庭湖竱等也膞切肉又市兖切開閉門利囚刑圎出古今音字小巵也又之累切選擇也思兖切又思絹切又思管切三罟也􅳢竹縁撰述也定也持也士免切五僎具也數也持也又子倫切具也見也魚名譔專教也又音詮蜎爾雅曰蜎蠉郭璞云井中小蛣蟩赤蟲一名子子又姓漢藝文志有老子弟子楚人蜎淵著蜎子十三篇狂兖切一蠉香兖切二走皃楩木名符善切又父綿切四急也諞巧言扁又辮篇二音免止也黜也脫也去也亦姓左傳衛大夫免餘亡辨切八娩婉娩媚也又音挽勉勗也勸也強也俛俯俛鮸魚名㝃生子㝃身冕冠冕絻上同又音問搌搌丑善切七䥀䥀物令長旌旗柱又幢徴二音蕆備也一曰去貨蚩神行㢟安歩行之又丑延切䩶驂具又丑井切鴘埤蒼云鷹鷂二年色披免切一㒄說文曰意膬也式善切三㜣女恣態又奴見切䁴視面色變也㫃旌旗之皃於蹇切三䟍走也嫣長皃邅移行除善切一棧士免切掤也一二十九篠細竹也先鳥切七上同魚名誘爲善也又小也謏上同䃤黑砥石也又思六切㩋打名皎月光詩云月岀皎兮古了切十二璬佩玉行縢脛布也䥵鐡文又呼了切㿟白也又匹白切皦明也皎也又珠玉白皃恔恔憭慧也繳纏也又音酌喪之降殺晈光明䘨小袴儌儌抄鳥說文曰長尾禽緫名也象形都了切九絹布頭也㣿垂心蔦樹上寄生釕釕鈌帶頭飾岀聲譜扚扚擊篇音患窕美色曰窕詩注云窈窕幽間也徒了切八牀子疁中穴誂弄也俗作挑說文曰相呼誘也掉摇尾又動嬥嬥嬥往來皃韓詩云嬥歌巴人歌也挑挑戰亦弄也輕也䂽磽䂽磽山田亦作䂪苦皎切二䂪上同湫湫隘子了切又子攸切五劋􅎒也說文絶也㭂木忽髙也㡑凶首飾似薺菜三十小微也私兆切三􅵐魚名䒕䒕草逺志也肇始也正也敏也長也治小切十一肁開也又姓戰國䇿趙有大夫肁賈兆十億曰兆說文分也姓也趙少也乆也字林云趍也亦州名春秋屬晉秦屬邯鄲郡後魏以廣阿城置殷州至齊改爲趙州又姓本自伯益孫造父善御幸於周穆王賜以趙城因封爲氏簡襄始大列爲諸侯今岀天水南陽金城下邳潁川五望旐旗旐爾雅曰長尋曰旐郭璞云帛全幅長八尺釋名龜虵爲旐旐兆也龜知氣兆之吉凶建之於後察事宜之形兆也狣犬有力也䍮羊子鮡魚名似鮎而大駣馬四歳垗葬地􅪃灼龜坼岀文字指歸沼池沼之少切三菬菬子草䈃竹縁夭屈也於兆切四殀殁也芺爾雅曰鉤芺郭璞云大如拇指中空莖頭有臺似薊初生可食仸仸僑不伸又尪弱皃巐意氣息皃丑小切一少不多也書沼切又式照切三䒚草名說文地名擾亂也順也說文作擾煩也而沼切七擾上同繞纏繞又姓左傳秦大夫繞朝遶圍遶嬈亂也牛馴說文作牛柔謹也爾雅注云即蒙貴也狀如蜼而小紫黑色可畜之健捕䑕亦作猱又諾髙切摽落也又拊心也字統云合作此􅗸符少切八上同見說文今從票餘同鰾魚鰾可作膠慓急性顠髮白又孚小切上同膘脅前又孚小切􅣻􅣻草又零落也糗也尺沼切五麨上同弨弓反曲又昌招切楢赤木名又音猶音酉眧弄人眧目也縹靑黄色也敷沼切八醥淸酒犥牛黄白色顠髮白皫鳥變色也篻實中竹名瞟埤蒼云一目病膘脅前又音􅣻眇說文曰一目小也亡沼切十渺渺㵿水皃訬耰也一曰訬獪草細淼大水杪梢也木末也秒大芒藐字書藐逺又亡角切吵雉聲篎笙管紹繼也又姓岀何氏姓苑市沼切五綤古文佋佋介袑袴上䙼玉篇云見也矯詐也說文曰揉箭箝也又姓左傳晉大夫矯文居夭切十二鱎白魚别名䚩角長敽盾也撟說文曰舉手也一曰撟擅也嬌女字又居喬切目重瞼也蟜山海經云野人身有獸文說文曰蟲也又姓後漢有蟜慎字彦仲譑多言􅻬國名孂竦身蹻驕也又其虘切表明也亦牋表釋名云下言於上曰表說文作上衣也古者衣裘以毛爲表也又姓岀姓苑陂矯切四上同古文䔸草名褾袖端方小切四字林云月有所察標標杪木末㟽峯頭藨草名可爲蓆平表切八上同殍餓死又音孚莩上同又音孚􅗸物落皃㰶歐吐㹾獪也似狐善睡鷕雉鳴也以沼切又羊水切七溔浩溔大水皃舀說文曰抒曰也㧒並上同肩骨䁘眇䁘目皃悄悄悄憂皃親小切三愀容色變也釥好也又淨剿絶也子小切八上同岀說文勦勞也又音巢漅水名魯地􅜷酒膘又符小切拭也镽長皃巨夭切一繚繚繞力小切九燎說文曰放火也左傳曰若火之燎于原長皃璙好皃憭慧也又音聊爒爒炙也僚朋也又音平聲䩍䩍䩍面白嫽嫽嫽好皃麃蒼頡篇云鳥毛變色本作皫滂表切又經典釋文云徐房表切劉普保切一闄隔也於小切一三十一巧好也能也善也苦絞切又巧僞苦敎切二䲾䲾婦鳥案爾雅注云鷦􅛯桃雀也俗呼爲巧婦字俗從鳥澩動水聲下巧切說文音學六㺒事露又好巧切說文音哮䕧草根亦竹筍也或作茭又音狡佼庸人之敏說文交也又古巧切䀊温器又公巧切䉰竹筍飽食多也博巧切三並古文㺒擾亂奴巧切三撓撓亂又音蒿獶犬驚說文又奴交切卯辰名爾雅曰太歳在卯曰單閼晉書樂志云正月之辰謂之寅寅津也謂物之津塗二月卯卯茂也言陽氣生而孳茂三月辰辰震也謂時物盡震而長四月巳巳起也物至此時畢盡而起五月午午長也大也言物皆長大六月未未味也言時物向成有滋味七月申申身也言時物身體皆成就八月酉酉緧也時物皆緧縮也九月戌戌滅也謂時物皆衰滅十月亥亥劾也言隂氣劾殺萬物十一月子子孳也謂陽氣至此更孳生十二月丑丑紐也謂終始之際故以結紐爲名也莫飽切七丣篆文緢旄也又絲名泖水名在吳華亭縣媌好皃又莫交切昴星名茆鳧葵說文作音柳絞縛也又姓出何氏姓苑古巧切十五狡狂也猾也疾也健也說文曰少狗也匈奴地有狡犬巨口黒身佼女字攪手動說文亂也䕧郭璞云江東呼藕根亦作茭又下巧切筊竹索也又音爻接物也鉸鉸刀器也姣妖媚烄烄木然也上同䀊濁也說文器也又胡巧切䉰竹筍㽱腹中急痛俗作㽲爪說文曰丮也覆手曰爪象形丮音戟側絞切八㕚古文說文曰手足甲也䝖䝖獠瑵玉名說文曰車蓋玉瑵笊笊籬頭抓亂搔搯也草也拗手拉於絞切五鴢鴢頭鵁似鳧而腳近尾靴韈亦從革見深目狕獸名鮑鮑魚又姓岀東海泰山河南三望本自夏禹之裔因封爲氏薄巧切四骲骨鏃臿地鞄柔革名齩齧也五巧切一䰫黠也士絞切二㑿㑿㑿長皃出聲譜煼熬也初爪切七􅵇炒並上同謅相弄􅱊乾也吵聲也本音眇䝤夷别名張絞切又盧晧切二獠上同擊也一云攬也亦作㪢山巧切一三十二晧光也明也日出皃也胡老切十六昊昊天說文作昦昦上同暭明也旰也曜也亦太皡又姓本出武落鍾離山黒穴中者見蜀録鎬鎬京浩浩汗大水皃又姓漢靑州刺史浩賞又漢複姓魯人浩星公治穀梁顥大也又天邊氣說文曰白皃楚詞曰天白顥顥南山四顥白首人也今或作晧灝灝溔水勢逺也鰝大鰕夰說文放也昦天字從此本音杲薃薃侯莎鄗光武立處邑名上同土釡亦作㙱網綴滈水名在京兆抱持也說文曰引取也薄浩切一老耆老亦姓左傳宋有老佐盧晧切十四䝤西南夷名獠上同轑車軸橑屋橑薝前木一曰蓋骨一曰欄也說文曰椽也潦雨水䕩乾梅栳栲栳柳器也木名廣大皃恅愺恅心亂無人䵏黄色澇水名又力到切討洽也誅也他浩切三套長也槄山楸又他刀切道理也路也直也衆妙皆道也說文曰所行道也一逹謂之道徒晧切七衟並古文稻秔稻禮記曰凡祭宗廟之禮稻曰嘉𬞞又姓何氏姓苑云今晉陵人駣馬四歳又音兆䆃禾一莖六穗也出字林镺長皃又奴晧切堖頭堖奴晧切九腦上同或從餘同􅑠亦同出周禮惱懊惱碯碼碯寶石镺長皃㺁雌狢上同㛴相㛴亂也說文曰有所恨痛也㛮兄㛮蘇老切七嫂上同㛐俗燥乾燥埽埽除掃上同􅭚蔜􅭚草倒仆也都晧切十一擣擣築㨶俗㠀說文曰海中往往有山可依止也又音鳥禂牲馬祭也䮻上同檮說文曰斷木也又音陶禱請也求福也㿒病也壔髙土懤憂也草說文作艸百卉也經典相承作草采老切七艸篆文隷變作卝懆憂心慅上同騲牝馬曰騲無人愺愺恅心亂早晨也子晧切十二澡澡洗藻文藻說文同下薻水草也齧人跳蟲抱朴子曰蝨攻君卧不獲安蚤上同又古借爲蚤暮字䲃魚名似鯉雞足璪玉名璅石次玉者棗果名史記曰楚莊王時有所愛馬啖以脯棗漢書曰安邑千樹棗等千戸侯又姓出穎川文士傳云棗氏本姓棘避難改焉繰紺色曰繰繅雜五綵文皁皁隷入槽屬亦黒繪俗作皂昨早切四草斗櫟子造造作又七到切艁艁舟以舟爲橋說文云古文造暠明白也古老切十一木名杲日岀又明白也稾禾稈人稾本草刱之本藁俗夰說文放也縞素也又音告槀槀本藥名㚖大白澤也菒乾草女石似玉好善也美也呼晧切又呼号切二􅤋人姓蓩毒草武道切又地名又亡毒切四䓮細草叢生媢夫妬婦也說文音冒􅜪重覆寶珍寶又瑞也符也道也禮記曰地不藏其寶又夭寶晉灼云天寶雞頭人身又姓出何氏姓苑博抱切十五珤古文保任也安也守也說文作􅍖養也亦姓吕氏春秋云楚有􅍖申爲文王傳也古文堢堢障小城堡上同褓襁褓緥說文曰小兒衣鴇鳥名亦作䳈䳡葆草盛皃又羽葆駂郭璞云今烏騘䎂彩羽宲藏也賲有也相次也襖袍襖烏晧切十四镺镺長也懊懊惱䐿藏肉又烏到切芺苦芺䴠麋子媪女老稱燠甚熟又音郁夭禮曰不殀夭本又於矯切㤇㤇正之皃郩邑名蝹蟲名如猿常地下食人腦䯠藏骨鳥名考校也成也引也亦瑕釁淮南子云夏后氏之璜不能無考是也又姓岀何氏姓苑苦浩切十古文栲木名山樗也槁木枯也說文作槀祰禱也說文曰告祭也洘水乾燺火乾丂氣欲舒皃䯪䯪大頭薧乾魚周禮曰辨魚物爲鱻薧注云薧乾也亦作槁又薧里字音蒿瓜蔓苖頭五老切二䯪大頭三十三哿嘉也古我切四舸楚以大船曰舸笴箭莖也又公旱切􅩮筍􅩮出南中瑳玉色鮮白千可切三䰈髪好皃也又昨何切硰硰石地名嚲垂下皃丁可切五䯬古文哆語聲又昌者切下脣垂皃癉勞也又怒也䫂醜皃縒鮮㓗皃也蘇可切又楚宜切三娑馺娑殿名又蘇哥切褨衣長皃爹北方人呼父徒可切九柁正舟木也俗從㐌餘同舵上同陊下坂皃又落也袉裾也拕引也沱瀢沱沙水往來皃又徒河切上同詑輕也我己稱又姓我子古賢者著書五可切五騀駊騀馬揺頭皃側弃也㧴差也硪吸硪山髙皃袉長舒皃吐可切又徒可切一㰁㰁椏樹斜來可切九鈞岀異字苑欏裂也砢磊砢石皃㦬㦬慙也玉篇又作曪色光明岀釋典相擊也亦斫也剆上同哆脣垂皃橠橠木盛皃奴可切六娜妸娜美皃㡅成也上同那俗言那事本音儺袲袲衣好皃荷負荷也胡可切又戸哥切二何上同㰤大笑虚我切五㗿上同㪃擊也㪋上同傾頭皃又音訶可許可也又虜複姓三氏周太保主雄賜姓可頻氏梁有河南王可沓振又有可達氏又虜三字姓三氏後魏書可地延氏改爲延氏又并州刺史男可朱渾買奴前燕慕容㒞皇后可足渾氏枯我切四岢岢嵐鎭在嵐州軻轗軻又音坷坷坎坷砢欲傾皃烏可切七椏㰁椏樹斜橠妸妸娜亦作婀娿人姓莊子有娿荷甘又音痾㫊旌旗㫊皃又猗蟻切袲左左右也亦姓齊之公族有左右公子後因氏焉又漢複姓二氏左傳宋公子目夷爲左師其後爲氏秦有左師觸龍晉先蔑爲左行其後爲氏漢有御史左行恢臧可切三㝾㝿㝾又子賀切􅚀戾也說文曰左手也象形三十四果果敢又勝也定也剋也亦木實爾雅曰果不熟爲荒俗作菓古火切十一菓見上注猓猓然獸名輠車脂角又音禍鐹刈鉤又古卧切划划刈裹苞裹又纏也蜾蜾蠃蟲也惈蒼頡篇果敢作此惈䴹餅䴹食粿淨米埵土埵丁果切十五鬌小兒翦髮爲鬌挆稱量冕前垂也朵木上垂也朶上同綞綞子綾岀字林揣揺也又初委切鍺車鐧小漄鈌也禾垂皃又丁官切㪜試也又初委切履跟縁也褍衣正幅也鎖鐡鎖也俗作鏁蘇果切十二瑣青瑣漢書儀曰黄門令日暮入對靑瑣丹墀拜名曰夕郎又瑣小皃溑水名葰葰人縣在上黨又蘇瓦切䈗竹名䵀說文曰小麥屑之覈魚名小石䣔亭名在河南惢心疑也又醉隨才棰二切動也􅩏貝聲墮落也徒果切又他果切十四垛射垛亦作垜長沙呼甌也䅜小積􆄡竹名􅢭上同履跟緣也或作䤻車轄又犂鎋岀玉篇憜嬾憜也說文曰不敬也惰上同嫷美也說文曰南楚人謂好曰嫷又吐卧切鬌又丁果切䲊魚子巳生又他果弋水二切嶞山髙妥安也他果切九媠好也隋裂肉也又徒果切䲊魚子巳生㟎山長皃墮倭墮髻也又徒果切橢器之狹長山皃鵎鳥名麼幺麼細小亡果切三曪日無色懡懡㦬人慙坐釋名曰坐挫也骨節挫屈也徂果切二古文㛂好皃五果切二木節也亦作裸赤體說文曰祖也郎果切九躶臝並上同卵又力管切瘰瘰􅊓病筋結也上同蓏果蓏說文曰木上曰果地上曰蓏應劭云木實曰果草實曰蓏張晏云有核曰果無核曰蓏蠃蜾蠃蒲盧郭璞云細腰蜂也腰螟蛉之子於空木中七日而成其子法言云螟蛉之子殪而逢蜾蠃祝曰類我類我乆則肖之婐婐㛂身弱好皃烏果切三倭倭墮又烏弋切置朔方部晉末赫連勃勃於州稱大夏爲後魏所滅置鎮又改爲夏州又胡駕古下二切廈廈屋寫憂也除也程也盡也又轉本曰寫悉姐切四案之別名瀉瀉水獸名好皃瓦切一乜蕃姓彌也切一且語辝七也切又子余切一㗿大笑許下切三閜大裂西說文曰覆也覆覈賈類皆從此社社稷又漢複姓二氏風俗通云齊昌徙居社南因以爲氏何氏姓苑云右扶風有焉又有社北氏常者切三器名􅨔宜􅨔善夢神見仙經跒跁跒行皃苦下切跁傍下切三䇑短人立也笆竹名岀蜀又音巴捨釋也書冶切五舎止息亦上同又音赦騇牝馬䬷䬼飫上同姐羌人呼母一曰慢也兹野切三抯取也又才也切飷無食味也把持也執也愽下切一踝足骨也胡瓦切十一稞淨穀䋀靑絲履又繩履地名黊鮮明黄色蘳說文曰黄華又音壊觟牝䍧羊生角者又楚冠名􅫛魚似鮎也大口又聲說文曰擊踝也輠轂頭轉皃䴹麫名寡鰥寡說文少也古瓦切八咼剔人肉置其骨剮俗􆁽老人柱杖㒀行皃􅯉羊角皃䈑䈅䈑收絲具觰牛角開瓦古史考曰夏時昆吾氏作瓦也五寡切二邷衞地若乾草又般若出釋典又虜複姓二氏周書若于惠傳曰其先與魏俱起以國爲姓後燕録有歩兵校尉若乆和人者切又人勺切三惹亂心應聲也鮓釋名曰鮓葅也以鹽米釀魚以爲葅側下切五㡸厏厊不合謯謯訝訶皃􅓕炭籠也又音鹺痄痄瘡不合觰牛角横都賈切又竹加切一槎逆斫本士下切又仕加切二厏厏厊奲寛大也昌者切五㨋擊也䰩醜䰩哆脣下垂皃又當可切撦裂開䋾䋾䋈相著皃竹下切一䋈奴下切一髁腰骨苦瓦切七跨腰跨又苦化切骻上同㡁㡁衿袍也銙帶飾帛衣㐄跨歩又口化切䂳好雌黄又瓦𥘉又七火切一榖南人食之或云茙葵丑寡切一葰葰人縣名沙瓦切三􅮱強事言語傻傻俏不仁奼嬌奼也丑下切又陟嫁切一藞玉篇云藞槎泥不熟皃盧下切三十六養育也樂也飾也字從羊食又姓孝子傳有養奮餘兩切七痒皮痒癢上同瀁混瀁水皃蛘蟻名說文曰㮻蛘也勨勉也又音象蟲名像似也徐兩切十一象說文曰象長鼻牙南越大獸三季一乳象耳牙四足之形爾雅曰南方之美者有梁山之犀象蟓桑上繭橡櫟實襐未笄冠者之首飾也勨勉也又音養鱌魚名似魟白鼻長也潒潒逺草名行也嶑山名㢡勸也助也成也譽也厲也即兩切六獎上同說文本作嗾大厲之也䉃剖竹未去節也又秦杖切槳檝屬㯍上同蔣國名亦姓風俗通云周公之胤又漢複姓漢有曲陽令蔣匠煕又子羊切㒳說文曰再也易云參天㒳地今通作兩良㢡切八兩上同說文曰二十四銖爲一兩脼膎脼􅧇松脂緉雙履蜽蛧蜽蟲名說文曰蛧蜽山川之精物也國語曰木石之怪夔蛧蜽亦作魍魎魎見上注㔝㔝勥力拒鞅牛羈也說文頸靻也於兩切十一柍木名秧秧穰禾稠也又音央䬬飽皃詇早知也岟岟山足駚駚鸗馬皃炴火光無資量謂無極限也怏怏悵也又於亮切紻冠纓勥迫也勉力也其兩切五彊說文云弓有力也或作強又姓前秦録有將軍強求又其良切弜弓有力也誩競言滰乾米之皃仰偃仰也說文舉也魚兩切三䒢昌蒲别名卬望也欲有所度磢瓦石洗物初兩切六㼽上同􅩊皮傷搶頭搶地見史記又七良七養切漺淨也愴愴怳失意皃又音創想思想也息兩切二鮝乾魚腊也掌手掌又姓晉有琅耶掌同前涼有燉煌掌據諸兩切三仉姓梁公子仉䁈後也反爪爽明也差也烈也猛也貴也踈兩切九上同􅥭屩中絞繩鷞鷞鳩塽塽塏髙也樉木名㼽半瓦漺淨也又初兩切䫪醜皃響聲也許兩切八饗歆饗蠁說文曰知聲蟲也䖮上同畗獻也祭也臨也向也歆也書傳云奉上謂之畗亨上同亦作享嚮爾雅兩階間謂之嚮本亦作郷又音向曏不乆也又音向敞髙也昌兩切七敞敞怳驚皃氅鶖鳥毛也上同屋也出方言又音唱䟫踞也又主尚直庚二切僘僘寛也繈絲有纇又孟康曰鏹錢貫也俗作鏹居兩切五鏹俗見上注襁襁褓負兒衣博物志云襁織縷爲之廣八寸長二尺以約小兒於背上膙筋頭憼敬也說文音景丈說文曰十尺爲丈直兩切四杖說文曰持也大戴禮曰武王踐阼爲杖之銘曰惡乎失道於嗜慾惡乎相忘於富貴吕氏春秋曰孔子見弟子抱杖而問其父母柱杖而問其兄弟曳杖而問其妻子尊卑之差也禮曰苴杖竹也削杖桐也仗憑仗本又音去聲㽴病也昶通也明也舒也丑兩切二鋹利也獷獷平縣在漁陽居往切又居猛切一壤土也書傳曰無塊曰壤風土記曰擊壤者以木作之前廣後銳長尺三四寸其形如履臘節僮少以爲戲也逸士傳曰堯時有壤父擊於康衢藝經曰擊壤古戲又漢複姓孔子弟子有壤駟赤如兩切八䖆䖆菜爲葅䑋肥蜀人云穰豐穰又汝羊切蠰蟲名似雞而小攘擾攘又汝羊切躟躟躟行疾皃􅙓惡雌黄賞賜也又吴姓有賞氏書兩切五􅴱日西食上同饟周人呼餉食曏少時也又火亮切髣髣髴亦作彷彿妃兩切六彷彷彿俗仿說文曰相似也紡績紡鶭鸅鸆鳥蒼黒色常在澤中俗呼爲護澤䲱上同网网置說文曰网庖羲所結繩以田以漁也丗本曰庖羲臣芒所作五經文字作罔俗作文兩切十二網上同罔上同又無也輞車輞棢上同惘惘然失志皃菵菵草誷誷誣上同耳疾蛧蛧蜽魍魍魎上同昉明也分网切四倣學也放上同瓬周禮有旊人爲簋者蓋埏埴之工又音甫枉邪曲也亦姓今號州有紆往切四曲浸佞人汪汪陶縣在鴈門又烏光切往之也去也行也至也于兩切二暀德也是也光也爾雅曰暀暀皇皇美也怳敞怳許昉切二夢中言也又火光切搶七兩切又初兩七羊二切二摤上同長大也又漢複姓晉有長兒魯少事智伯智伯絶之三年其後死智伯之難知文切又直張切一上登也升也時掌切又音尚二丄古文俇楚詞注云俇俇遑遽皃求往切一臩說文曰驚走也一曰往來皃俱往切四迋欺怨載器也岀埤蒼逛走皃􅯵姓也毗養切一䫪醜也初丈切二傸惡也三十七蕩大也又水名岀湯隂又姓宋之公族也徒朗切十二崵山名漢髙鳯隱處婸淫戲皃大竹筩潒水大之皃又洗潒也放或作婸愓不憂璗玉名說文曰金之美與玉同色者也盪滌盪揺動皃說文曰滌器也又吐浪切䑗舂也持米精也簜大竹嵣嵣㟐山皃顙額也蘇朗切四鼔匡木也上同磉柱下石也廣大也闊也古晃切二鄺姓岀廬江榜木片北朗切六牓題牓毛罽文螃陸居蝦蟆蒡牛蒡菜䰃䰃亂毛駔㑹馬市人又牡馬也子朗切三驡駚驡馬容髒骯髒體盤曩乆也奴朗切二灢泱灢水不淨見海賦沆沆瀣氣也胡朗切六骯骯髒體盤䟘伸脛也直項之皃蚢貝大者如車輞爾雅作魧吭聲也曭日不明他朗切十二儻倜儻不羈又他浪切偒長皃戃戃慌失意皃矘矘䁳目無睛說文曰大竹䇶也帑金帛舎又音奴爣爣朗火光寛明􅯸􅯸㬻月不明也㼒大瓜名又㼒㼒長皃㿩白㿩攩攩㨪搥打莽莫莽說文曰南昌謂犬善逐兔於艸中爲莽又姓前漢反者馬何羅後漢明德馬后恥與同宗改爲莾氏摸朗切又莫古切十茻說文曰衆艸也壾吴王孫休子名見吴志䁳無一睛䒎䒍䒎無色狀㬒日無光䥈鈷䥈又莫古切蟒虵最大者漭漭沆水大㟐㟐嵣山皃黨釋名曰五百家爲黨黨長也一聚所尊長也又輩也美也累也說文曰不鮮也多朗切五讜直言欓木名䣣地名說文作䣊草名朗明也亦姓岀姓苑盧黨切七朖誏並上同俍俍偒長皃崀嵻崀山空榔木名㝗㝩㝗空虚坱塵埃也烏朗切十姎女人自稱姎我又烏郎切映映㬒不明泱滃泱水皃咉咉咉咽悲也醠濁酒䇦竹名玉篇云䇦無色也盎盆也又烏浪切駚駚驡馬容軮軮軋聲也慷慷慨竭誠也苦朗切七忼上同嵻崀山空骯骯髒體盤䡉車䡉之名㝩㝩㝗空虛懬大也又丘廣切說文又口謗切㳹大水烏晃切二瀇水深廣皃晃明也暉也光也亦作晄胡廣切七幌帷幔也晉惠起居注云有雲母幌櫎兵欄榥讀書牀也滉滉瀁水皃攩搥打又吐朗切皝人名前燕慕容皝也吴人云髈囬朗切二䒍䒍䒎無色慌慌戃呼晃切七爌爌朗寛明也又苦晃切㝗也䁜䁳䁜目疾岀新字林㬻􅯸㬻月不明皃􅲿曰旱熱也夢言也䴚鹽澤也各朗切四㽘並上同䟘伸脛也䭹馬怒驚驡䭹也五朗切一奘大也徂朗切一蒼莽蒼麁朗切一汻姓今涇州有之呼朗切三酐苦酒鹵大也寛也怨也丘晃切三䡉䡉䡉也爌爌朗寛明也又火光三十八梗梗直也又桔梗藥名古杏切九挭挭槩大略哽哽咽郠邑名在莒綆井索鯁刺在喉又骨鯁謇諤之臣埂堤封吴人云也骾骨骾蟲名丙辰名爾雅云太歳在丙曰柔兆又光也明也又姓風俗通云齊有大夫丙歜兵永切九昞亮也亦作昺怲憂也邴邑名在泰山又姓左傳晉有大夫邴預又音柄炳炳煥明也秉執持又十六斗曰藪十藪曰秉又漢書有秉漢窉爾雅曰三月爲窉本亦作寎又兄病孚命區詠三切苪著也蛃蛃蟲名警寤也戒也居影切八儆上同景大也明也像也光也炤也又姓齊景公之後後漢有景丹境界也璥玉名蟼蛙屬㯳所以正弓岀周禮亦作檠憼敬也影形影於丙切八璟玉光彩岀埤蒼璄上同䭘飽亦作䭊摬中擊㲟毛車玉篇云刺也髙風省省署漢書曰舊名禁中避元后諱改爲省中又姓左傳宋大夫省臧所景切又息井切九眚過也災也㾪瘦㾪女省減也䚇䚇腳露也府今爲省字㼳㼬㼳有耳瓶渻水名亦丘名上同永長也引也逺也遐也亦姓岀何氏姓苑于憬切二栐木可爲笏􅩛小風許永切一皿器皿武永切三戸土穴􅰀盟也憬逺也俱永切六囧光也煚火也璟玉光臩驚走皃暻明也曲見悟也杏果名廣志曰滎陽有白杏鄴有赤杏黄杏何梗切三莕莕菜荇上同猛勇猛又嚴也害也惡也亦姓左傳晉大夫猛獲之後莫幸切六􅟑􅟑盯視皃蜢虴蜢蟲艋舴艋小船舴陟格切鱦蛙屬鄳縣名在江夏礦金璞也古猛切七鑛上同古文􅜿􅜿麥䵃上同獷犬也又居往切獷平縣名在漁陽也穬穀芒又曰稻不熟浜浦名布梗切又布耕切三㑟詐僞人也急皃盯盯􅟑張梗切一瑒祀宗廟圭名長一尺二寸徒杏切又音暢一䁝清潔烏猛切三㴄㴄澋水回旋也奣六合清朗打擊也徳冷切又都挺切一冷寒也魯打切又魯頂切一卝金玉未成器也乎䁝切二澋㴄澋水回旋也鮩鮊魚别名蒲猛切一然舉目也苦礦切又音句一檸木皮入酒浸治風拏梗切一三十九耿耿介也又耿耿不安也又姓晉大夫趙夙㓕耿因封焉遂以國爲氏古幸切三芋莖也猛視皃䁅武幸切三鼆句鼆魯邑名黽蛙屬幸說文作吉而免凶也以屰从夭夭死之事故死謂之不胡耿切四見上注倖儌倖㼬㼬㼳瓶有耳俱也或作併羅列也蒲幸切四􅪓蛤􅪓蠯上同螷亦同皏皏㿣蒲皃普幸切一四十靜安也謀也和也息也疾郢切十睜眳睜不恱視也􅒷清飾靖立也思也理也審也又姓齊靖郭君之後風俗通云單靖公之後妌女人貞絜也婧上同穽坑也阱上同猙獸如狐有翼又音爭竫停安整正也齊也之郢切二俗逞通也疾也盡也丑郢切六騁馳騁又走也裎襌衣悜慏悜意不盡也䩶驂具又丑善切睈視也又意不盡郢楚地以整切三浧泥也梬梬棗似柿而小痙風強病也巨郢切二涇玉篇云寒也潁水名在汝南亦州名禹貢豫州之境春秋時沈丘也秦爲潁川郡漢爲汝南郡之汝隂後魏置穎州餘頃切二穎禾末也穗也又姓左傳有穎考叔領理也録也說文項也良郢切六嶺山坡也裴潛廣州記云大庾始安臨賀桂陽掲陽爲五嶺與鄧德明南康記云别也阾古文柃木名可染袊衣袊禮云左執領不從衣䕘草名頸項也居郢切又巨成切一餅必郢切五屏蔽也爾雅曰屏謂之樹又廣雅曰罘罳謂之屏風俗通云卿大夫帷土以廉以自鄣蔽鉼鉼金謂之鈑周禮祭五帝則供鉼金併併合和也又必姓切䴵索䴵出食苑頃田百畝也去潁切六頔古文㩩竟也檾枲草苘䔛並上同井說文曰八家一井象􅌟韓形􅜍之象也古者伯益初作井今作井見經典省又姓姜子牙之後也左傳有井伯子郢切二邢地名廮安也又廮陶縣名在趙州於郢切五地名癭瘤也博物志云山居之人多癭疾氣滯氣請乞也求也問也謁也七靜切又疾盈疾姓二切二睛眳睛不恱目皃出字林又音精省察也審也息井切六渻說文曰少減也一曰水門又水丘前謂之渻丘睲睲睲照視惺惺悟出字林㮐爼几名悟皃俗眳眳睛亡井切二慏慏悜意不盡也徎雨後徑也文井切二通也四十一迥逺也戸頂切五冋空也炯光也明也又音熲泂詩云泂酌草名熲光也又輝也古迥切八炅光也又古惠切炯火明皃又音迥凔寒㯋篋名飽煛目驚皃􆂵似蛙茗茗草莫迥切七嫇嫇奵自持也酩酩酊瀴瀴涬大水皃溟上同眳眳睛姳姳好頂頂𩕳頭上說文顚也都挺切十三上同􅨉籕文奵嫇奵耵耵聹耳垢鼎說文云鼎三足兩耳和五味之寶器禹收九牧之金鑄鼎荆山之下薡草名酊酩酊濎濎濘水皃葶葶䔭毒草靪補履又音丁打擊也又都冷切㞟展也挺挺出說文拔也徒鼎切十二艇小船鋌金鋌梃木片娗長好皃町田畝又音汀霆疾雷又音庭莛草莖又音庭涏涇寒蜓蟲名又徒典切訂平議誔詭言珽玉名說文曰大圭長三尺抒上終葵首他鼎切十二圢平也脡脯朐侹長也直也代也敬也頲直也徎徑也壬善也町田塸艼葋也又秃鈴切田器小網䦐門上關汫汫濙小水皃徂醒切一濙汫濙烏迥切一謦謦欬也去挺切一𩕳頂𩕳乃挺切五聹耵聹䗿似蛙濘泥也又乃定切䔭葶䔭婞很也胡頂切七涬瀴涬大水皃魚名鋞似鐘而長脛腳脛又胡定切􅬝􅬝恨緈絓緈醒醉歇也蘇挺切二箵箵笭篝籠鞞刀室𥙷鼎切一褧褧衣說文檾也口迥切六檾枲屬苘上同烓行竈又烏圭切顈禪也絅衣剄斷首古挺切二烴焦臭頩斂容匹迥切一巊巊溟山水烟涬切三誣厭瀴瀴涬大水皃笭篝笭籠也力鼎切三小網冷寒也又姓前趙録有徐州刺史冷道字安義又盧打切竝比也蒲迥切四並上同鮩白魚名也併立竝又必姓切詗明悟了知也火㢠切一䀴直視皃也五剄切二小皃四十二拯救也助也無韻切音蒸上聲五抍撜並上同見說文􅹊軺車後登出字林氶晉譙王名庱亭名在吴晉陵丑丞切又恥陵切一殑殑殑欲死也其拯切一㱡殑㱡色庱切一四十三等齊也類也比也輩也多肯切一倗不肯也普等切二剻穆天子傳云西征至剻郭璞云國名也前漢書有剻成侯肯可也說文作肎骨間肉肎肎著也一曰骨無肉苦等切二肎上同能夷人語奴等切本又奴登切一四十四有有無又果也取也質也又也又姓孔子弟子有若又漢複姓有男氏禹後分封以國爲姓出史記云乆切九右左右也又漢複姓五氏左傳宋樂大心爲右師其後因官爲氏漢有中郎右師譚晉賈華爲右行因官爲氏漢有御史中丞右行綽何氏姓苑有右閭右扈右南等氏䳑鳥名似雉友朋友同志爲友㕛上同出說文䀁器也又余救切上同栯木名服之不妬又於六切䒴草名柳木名說文作桺小楊也从木丣聲丣古文酉餘倣此又姓出河東本自魯孝公子展之孫以王父字爲展氏至展禽食采於柳因爲氏魯爲楚滅柳氏入楚楚爲秦滅乃遷晉之解縣秦置河東郡故爲河東解縣人力乆切十四罶魚梁上同懰好也珋石之有光璧珋也說文本音留颺風皃嬼妖美又婺矛牙婦也䉧竹聲􅔺似䑕而大又音留熮火爛瀏水淸綹十絲爲綹􅬉載柩車也茆􅝀葵水草詩云言采其茆即蒓菜也又莫飽切狃相狎也女乆切十一紐結也鈕印鼻又姓何氏姓苑云今吴興人東晉有鈕滔也杻木名莥玉篇云鹿豆也􅚵爾雅云貍狐貒貈跡也扭扭手轉皃習也䏔食肉地名莥蔨實亦作丑辰名爾雅曰太歳在丑曰赤奮若敕乆切三杻杻械杽古文肘臂肘陟柳切四疛說文曰小腹痛上同扭扭按也又音紐朽腐也許乆切四㱙上同㽲病也殠臭也乆長乆也舉有切七九數也又漢複姓二氏何氏姓苑云昔岱縣人姓九百名里爲縣小吏而功曹姓萬縣中語曰九百小吏萬功曹列子秦穆公時九方臯一名甄菩相馬也玖玉名灸灸灼也又居又切韭說文曰菜名也一種而乆者故謂之韭象形在一之上一地也俗作韮女字也亦作奺􅵩姓出纂文首頭也始也書九切六首上同百人頭象形手手足守主守亦姓出姓苑䭭人初産子醜類也竅也釋名曰醜臭也如物臭穢也又虜複姓西秦録有下將軍醜門于弟昌九切三瑞草也魗棄也惡也又市籌切湫洩水瀆也在九切又子由子小切二愀變色也又鍬小切婦說文曰婦服也从女持帚洒埽也房九切十五螽負擔也荷也又受貸不償曰負背恩忘德曰負也萯玉萯草蝜􅡂蝜阜陵阜釋名曰土山曰阜阜厚也言髙厚也廣雅曰無石曰阜上同鷂別名也偩禮云禮樂偩天地之情香草盛也亦作䧞䧞上同㷆㷆熾菩香草又歩乃切􅣁䑕􅣁缶瓦器盆也史記云秦王趙王㑹于澠池藺相如使秦王擊缶是也詩䟽云缶者瓦器也所以盛酒漿秦人鼔之以節歌方乆切八缹蒸缹否說文不也又房彼切不弗也說文作鳥飛上翔不下來也从一一天也象形又甫鳩甫救二切鴀䳕鳩痞病也殕物敗也好色也糗乾飯屑也孟子曰舜糗飯茹菜又姓風俗通漢有糗宗爲嬴長去乆切一蹂踐也人九切十楺屈木煣上同輮車輞沑說文曰水吏也又温也􅚵獸跡又女九切葇葇䖆菜不切也禾韖車軔粈粽粈舅夫之父也亦母之兄弟又姓左傳秦大夫舅犯其九切十一倃說文毀也臼杵臼丗本曰雍父作臼又姓左傳宋華貙家臣臼任齨齒齨亦馬八歳俗作麔牝麋䳎鳥名似鳩有冠咎愆也惡也過也災也從人各各者相違也䊆糗米病也怨䛮毁也紂殷王号也方言云自關而東謂䋺曰紂俗作除柳切六䈙竹易根而死也鮦銅陽縣在汝南又直蒙切葤裹也棸姓也襄州有之又音籌小腹痛又腿後酉飽也老也就也首也又辰名爾雅曰太歳在酉曰作噩又姓魏有酉牧與乆切二十一丣古文誘導也引也教也進也說文曰相誅呼也䛻上同並見說文牖道也向也說文曰牖穿壁以木爲交䆫也禮曰蓽門閨竇蓬戸甕牖卣中形罇又音由槱積木燎以祭天地上同莠草也羑羑里文王所囚處人有羑水並在陽隂又姓也庮乆屋木也周禮曰牛夜鳴則庮鄭司農曰庮朽木臭也蜏朝生暮死蟲名㝌字書云貧病也說文云言意也琇玉名又音秀梄柞梄木遺也輶輕車又音由酒水名受俗納也承也盛也得也繼也殖酉切五壽壽考又州名楚孝烈王自陳徙都壽春號曰郢秦爲九江郡魏爲淮南郡梁爲南豫州周爲揚州隋平陳爲壽州亦靈壽木名生日南又姓王莽兖州牧壽良又漢複姓前漢燕王遣壽西長之長安蘇林云壽西姓也又承呪切􅗪水名在蜀亦地名也璹玉名又音孰綬組綬禮云天子玄公侯朱大夫純丗子綦士緼應劭漢官曰綬長一丈二尺法十二月廣三尺法天地人也滫溲麵說文曰乆泔也息有切四糔糔溲醙白酒絆前兩足又相主切䬀䬀瀏於柳切三䱂魚名懮懮受舒遟皃酒酒醴戰國䇿曰帝女儀狄作而進於禹亦云杜康作元命包曰酒乳也又酒泉縣在肅州匈奴傳云水甘如酒因以名之亦姓也子酉切一􅘞􅘞麵亦作溲踈有切一帚少康作箕帚之九切五箒俗鯞鱖鯞魚名晭明晭猛獸㤱小怒芳否切三紑鮮也又孚丘切霧掫持物相著側九切三搊搊扇別名蟲名聚名士九切一束初九切二上同秠爾雅曰一稃二米此亦黒黍漢和帝時任城生黒黍或三四實實二米得黍三斛八斗是芳婦切又匹几孚悲二切一四十五厚厚薄又重也廣也說文作曰山陵之也又姓岀姓苑胡口切七垕古文後先後說文遟也又胡豆切古文后君也又姓漢有少府后倉又音候郈郷名在東平又姓左傳魯大夫郈昭伯㖃欲吐又呼后切母父母老子注云母道也蒼頡篇云其中有兩點象人乳形豎通者即音無莫厚切十四牡牝牡某詔前人之言也拇大拇指也胟上同畝司馬法六尺爲歩歩百爲畝秦孝公之制二百四十歩爲畝也畮畞並古文莽草莽􅳎猦􅳎獸名病踇踇偶山名􅡑行皃䳇鸚䳇能言之鳥又音武部署也又姓出姓苑蒲口切十培培塿小阜或作㟝犃犃㸸偏髙又牛頭短䏽豕肉醬瓿瓿甊小甖䍌小缶䴺䴺􅲑餅篰牘也蔀蔀菜魚薺也易云豐其蔀王弼曰蔀覆瞹鄣光明之物又音剖婄婦人皃又音剖斗說文作十升也有柄象形石經作斗當口切八㪷俗枓柱上方木蚪蜊蚪蟲也阧阧峻陡上同抖抖擻舉皃襡衣袖又音蜀􅲑䴺􅲑天口切九飳上同妵人名左傳有華妵說文女字也黈冕前纊也水鳥黒色又大口切蘣好皃又木苖出斢斢㪹兵奪人物出字書鈄姓出姓苑䱏魚名苟苟且又姓出河内河南西河三望國語云本自黄帝之子漢有苟參古厚切十三玽石似玉狗狗犬垢塵垢笱笱屚縣名在交阯又魚笱取魚竹器上同耇耇老壽也詬詬恥也又呼候切枸枸𣏌茩薢茩岣岣嶁山巓扣打也豿熊虎之子藕爾雅曰荷芙蕖其根藕五口切六蕅上同偶合也匹也二也對也諧也耦耦耕也亦姓風俗通云宋卿華耦之後漢有侍中耦嘉髃肩前髃也㼴盎名㨐衣上擊也方垢切二掊擊也㝅乳也乃后切六㳶說文水也陾衆陾㛘女肥皃啂啂食物出新字林小皃叜老叜蘇后切十五叟上同上同亦從叟餘倣此嗾使大聲上同􅸴瞽􅸴舜父訹誘辝擻抖擻舉也藪藪澤爾雅有千數魯大野晉大陸秦楊陓宋孟諸楚雲夢吴越具區齊海隅燕昭余祁鄭圃田周焦護又十六斗田藪籔漉米器也字林云聦揔名也廀廣雅云隈也棷薪也駷馬揺銜走又思隴切橾車轂中空吼牛鳴呼后切七吽上同呴亦同㸸夔牛子也上同蚼蚍蜉名也又渠俱切㖃厚怒聲剖判也破也普后切五婄婦人皃蔀小席又音部䳝䳝雀名䯽髮皃歐吐也或作嘔烏后切又烏侯切七嘔上同毆歐擊也俗作敺㸸特牛又吼口二音􅖘山名在溧陽縣塸聚沙䙔㳄衣也又於侯切塿培塿郎斗切十嘍連嘍煩皃又力侯切簍籠也周禮作簝甊瓿甊甖􅞻􅢑􅞻糫餅嶁文字音義云山巓也㪹斢㪹兵奪人物出新字林謱謰謱小兒語又力侯切漊溝通水漊也䅹耕畦走趨也子苟切又音奏一口說文曰人所以言食也亦姓今同州有之苦后切九扣扣擊也亦作叩㸸犃㸸上同釦金飾叩叩頭噭先相噭可郷名竘健也又驅甫切䕆圎草褥也徒口切六酒噐也或作鍮水盥皃也說文同上揄揄引水鳥又他口切襡短衣鯫魚名一曰姓漢有鯫生又淺鯫小人仕垢切又七溝切一趣趣馬書傳云趣馬掌馬之官也倉苟切又七屢切三取又七庾切棷棨也又側溝切四十六黝黒也於紏切又於夷切七怮憂皃䬀䬀瀏風聲又於柳切蚴蚴蟉龍皃泑崑崙山下澤也眑幽静之皃愁皃糾督也恭也急也戾也俗作糺居黝切四赳武皃詩曰赳赳武夫朻爾雅曰朻者聊又居幽切􅍐􅍐取皃蟉蚴蟉龍皃渠黝切一四十七寑室也卧也七稔切九􅤑上同見說文寢上同見經典梫木名桂也㾛㾛痛又皃醜也說文曰病卧也覆也鋟爪刻鏤版又子廉切䤐小甜朕我也秦始皇二十六年始爲天子之稱直稔切六古文鰧魚名似鰕赤文出廣雅螣螣蛇栚說文曰槌之橫者關西謂之㯢顩顩頥醜皃坅坎也丘甚切一廩倉有屋曰廩力稔切八㐭上同懍敬也畏也菻菻蒿凜寒凜顲顲然作色皃火舒癛粟體罧積柴取魚斯甚切二伈伈伈恐皃踸踸踔行無常皃丑甚切三鍖鍖銋䫖䫖䫴自愞劣皃䤐小甜也子朕切四漸也漬也又子鴆切䭙濕通上也􆂋􆂋脣病也荏菜也又荏苒如甚切十四飪熟食餁上同䭃亦同又玉篇云飽也稔年也亦歳孰廣雅曰稔秋榖熟也栠木弱皃恁念也袵文字音義云臥席也䏕肉汁䇮字書云單席棯果木名爾雅云還味棯棗􅥷稍甚銋鍖銋腍味好枕枕席又姓出下邳章荏切又之賃切三䪴頭骨後䫬頭銳長也沈國名古作邥亦姓出吴興本自周文王第十子聃季食采於沈即汝南平輿沈亭是也子孫以國爲氏式任切又丈林切十四邥古文寀說文曰悉也知寀諟也審詳審也說文同上亦姓漢有辟陽侯審食其㰂木名山海經云煑其汁味甘可爲酒瞫竊視又姓後漢書云武落鍾離山有黒穴出四姓瞫氏相氏樊氏鄭氏也諗告也謀也深諫也又知甚切䰼大魚魫魚子淰淰㴸水動也禮運曰龍以爲畜故魚鮪不淰淰之言閃也㜤志下䀢瞚也大魚草名葚說文曰桑實也食荏切二上同俗又作椹椹本音砧甚劇過也說文曰尤安樂也常枕切二訦信也又市林切瀋汁也昌枕切一墋土也初朕切三醦酢甚磣食有沙磣拰拰搦尼凜切一噤寒而口閉渠飲切四䫴切齒怒也凚玉篇云寒極也唫說文云口急也錦釋名曰錦金也作之用功重其價如金故字從金帛居飲切一蕈菌生木上慈荏切一僸仰頭皃牛錦切又音禁二趛低頭疾行㾕寒病踈錦切三瘮上同槮木實名也稟供糓又與也筆錦切一㱃說文曰歠也於錦切三飲上同大水至又於感切品官品又類也衆庶也式也法也二口則生訟三口乃能品量又姓出何氏姓苑丕飲切一醜皃欽錦切二顉曲頤之皃又五感切廞大喪囊也許錦切又義今切一戡少斫也張甚切又音堪二㱽深擊說文曰下擊上也潭潭濼水動揺皃以荏切又徒南切一醜皃士㾕切一四十八感動也古禫切十一竹名亦作篢鱤魚名灝豆汁贑水名在南康又音紺䤗酒味淫也贛水名在豫章㔶方言云箱類又云覆頭也又音貢薏苡䃭石篋見封禪議灨水名禫除服祭名徒感切十六䊤糝䊤滓也䨢䨢䨴雲皃黮黭黮雲黒又他感切窞坎傍入也易曰入于坎窞髧髮垂萏菡萏荷花未舒􅣿上同倓安也竈突說文深也徐視醰長味嘾莊子曰太甘而嘾說文曰含深也贉買物先入直也譚大也又姓木名晻晻藹暗也冥也烏感切九黭黭黮揞手覆唵手進食也隌隌闇罯魚網黤青黒色也㞄㞄跛又蹇也大水至腩煑肉奴感切六湳水名在西河又姓䈒竹弱羽弱揇揇搦萳草長弱皃襑衣大他感切五醢亦作醓䏙肉汁嗿衆聲黮黭黮黒也又徒感切歜昌蒲葅徂感切四㣅弓弦㣅又作䰼大魚又才枕切㔆㔆又割翦出也慘憾慼也說文毒也七感切八㦧痛也朁說文曽也黲暗色說文曰淺青黒也又倉敢切㜗說文婪也傪好皃又音平聲噆銜也又子盍切䫩顉䫩揺頭又素慘切顉顉䫩五感切三㜝含怒皃嵁嵁崿山形姓也子感切三寁速也撍手動糂羹糂墨子曰孔子厄陳藜羮不糂也或作糝桑感切八糝上同糣糣䊤滓也顉㧲撼㧲揺動也槮郭璞云叢木於水中魚寒入其裏因以箔取之䫩顉䫩揺頭皃粽蜜藏木瓜坎險也陷也又小罍也形似壷苦感切十歁食未飽也惂憂困也又恨也輡輡􅸫車行不平錎字書云瑣連鐶也轗轗軻多迍埳埳陷顑顑顲瘦也竷舞曲名臽小穽名也頷漢書曰班超虎頭燕頷說文曰面黄也胡感切十六頜說文曰顄也害惡姓也撼撼動也淊水和泥或作菡菡萏欿欲得蜭爾雅云蜭毛蠹涵水入船又胡南切肣牛腹又音含說文曰嘾也草木之華未發圅然象形嘾乳汁狀岀莊子壅耳莟花開顄頥也又胡南切􅾉􅾉崿壈坎壈盧感切八燣黄焦􅸫輡􅸫浨藏梨汁也出字林醂桃葅顲靣黄醜說文曰靣顑顲也又力稔切皃漤鹽漬果黕滓垢也黒也都感切十耽虎視又丁含切玉篇云多也又丁含切衴埤蒼云被縁也䪴顲䪴醜也丼姓也瓭瓦屬抌刺也擊也也音由箴箱屬又作上同䫲食不飽呼唵切一四十九敢勇也犯也說文作進取也古覽切七上同籕文古文橄橄欖菓木名出交阯澉澉䭕無味䇞竹名實中㶒果決勇也賞敢切一覽視也又姓何氏姓苑云彭城人盧敢切六爁火爁擥手擥取攬上同欖橄欖罱罱網􅫠說文曰雚之初生一名薍一名鵻吐敢切八菼上同緂青黄色說文充三切白鮮衣皃􅢹上同毯毛席􅣞毳衣說文曰帛騅色也引詩曰毳衣如􅣞裧俗􅫏􅫏崯也又五今切膽肝膽都敢切六紞冕前垂也說文曰冕冠塞耳者䃫石䃫藥名出玉篇黵大汚垢黒䒞􅙛䒞藩又音沈􅦵應福鳥名噉噉食或作啖又姓前秦録有將軍噉鐡徒敢切八啖上同啗上同澹澹淡水皃淡音琰又恬靜又徒濫切竹名淡淊淡水滿皃又薄味也又徒濫切憺安緩又徒濫切惔上同黲日暗色倉敢切一㛧郷名在河東徛氏縣亦作㛧謨敢切二吴人呼哺皃也䭕澉䭕子敢切一槧削版牘才敢切又七廉切七豔切四鏨鏨鑿也又音慙嵌開張山皃出蒼頡篇㟛上同喊聲也呼覽切四嚂上同土之之堅也㯺上同周禮注云強㯺地之堅者又音檻埯坑今之窊掩是烏敢切二揜手揜物也􅫏􅫏嶮側穴口敢切二䖔甝屬五十琰玉名周禮曰琰圭九寸以冉切十一剡削也利也亦姓又時冉切疾行棪木名實似柰可食燄燄燄火𥘉著也淡澹淡水皃又徒敢切扊扊扅戸壯所以止扉或作剡移淊㶘淊水滿夵上大下小䎦䎦耜䌪續也斂收也又姓姚秦録有輔國將軍斂憲良冉切十三撿說文拱也薟白薟藥名又力瞻切蘞上同瀲瀲灎水溢皃或作澰獫犬長喙也又音險溓薄冰也嬚女字䭑廉也又小食也羷羊角三觠羷也䌞懸𧖟簿也㰈善美之名㯬功勤之稱險危也阻也難也虚檢切八獫獫狁玁上同㛍㛍姱性不端良又棄業切少氣也譣譣詖說文息廉切問也憸憸詖又息廉切胡被又音杴嶮嶮巇貶損也方斂切二􅵘說文曰傾覆也或同上颭風吹落水占琰切一顩不平丘檢切二嵰山髙顩顩魚檢切七广因巖爲屋隒山形似重甑嬐嬐然齊也䲓䲓鰅魚名出樂浪嶮嵰嶮山不平噞噞喁魚口上下皃儉約也少也饑饉也又姓出姓苑巨險切二芡說文云鷄頭也方言曰南楚謂之鷄頭北燕謂之䓈青徐淮泗之間謂之芡檢書檢印窠封題也又檢校俗作檢檢本音斂又姓出姓苑居奄切二瞼眼瞼黶靣有黒子於琰切八􅓙檿山桑厭厭魅也又於豔切魘睡中魘也又於協切厴蟹腹下厴擪持也又一牒切酓酒味苦也冉冉冉行皃又姓孔子弟子冉有而琰切十姌長好皃也又奴簟切苒草盛皃又荏苒猶展轉也染染色周禮染人掌染絲帛又姓石勒時有染閔濡也䎃䎃弱羽也柟木名䣸䣸味薄竹弱之皃諟也陜縣名在弘農亦州名周爲二伯分陜之地即虢國之上陽也秦屬三川郡漢弘農之陜縣後魏改爲陜州失冉切八睒暫見閃出門皃蕃姓亦作貧覢蒼頡篇云覢覢視皃㴸水動皃夾盗竊懷物不媚諂諂䛕丑琰切二讇上同奄忽也止也藏也取也遽也說文覆也大有餘也又姓左傳秦三良奄息衣儉切十七雲狀䣍國名㭺㭺柰閹閹閽掩閉取也說文云斂也小上曰掩揜說文曰自關以東謂取田揜一曰覆也裺衣縫縁也晻晻晻日無光渰雲雨皃詩云有渰淒淒罨鳥網又於劫烏合二切弇蓋也掩也媕女有心媕媕也屋雀也山弇山弇嵫山日没處掩光又於葉切漸漸次也進也稍也事之端先覩之始也地理志有漸江今之浙江也慈染切十礹蔪說文曰艸相蔪苞也埤蒼曰麥秀皃䟅說文進也嚵小食又初咸切䤔䤔䣸味薄鏨小鑿名螹說文曰螹離也槧說文曰牘樸也憸憸詖七漸切二䤘醋味食薄味也子冉切一脥腹下謙琰切一剡縣名屬㑹稽時染切一五十一忝辱也他玷切五䄼郷名在濟北蛇丘縣栝說文云炊竈木也銛取也又鍤屬又音纖悿悿弱淰水流皃乃玷切四㜤弱也亭名在鄭姌纖細又音冉點點畫多忝切五玷玉瑕􅫎老人面黒子㓠斫䍄說文缺也簟竹席徒玷切六扂閉戸上同驔驪馬黄脊㶘㶘滔水滿橝屋梠名又音潭嗛猿藏食處苦簟切四歉食不飽又苦減切慊慊恨膁腰左右虚肉處稴禾稀力忝切三溓薄水瓜名鼸䑕名胡忝切二㺌犬吠又胡斬切憯憯悽青忝切又七感切一孂竦身皃兼玷切一􅶦腦蓋也俗作明忝切又亡犯切二厸張口五十二儼敬也說文曰昂頭也一曰好皃魚掩切七广因巗爲屋􅿠掩􅿠癡㢂陖㢂礹礹齊曮日行欦欠崖丘广切三醜䇜小竹埯土覆於广切二翳五十三豏豆半生也下斬切八減減耗又古斬切㺝大齧物聲喊喊聲㺌犬吠不止健皃塗也甉瓦屋湛水皃又沒也安也亦姓後漢有大司農湛重徒減切又直心切三古文偡偡然齊整㦿牖也一曰小戸苦減切七􅢯􅢯􅢯意不安也歉食不飽撖撖危䫡靣長不安槏牖傍柱也鹼鹵也古斬切又七廉切四鹻鹹也減損也又姓漢有減宣竹名出玉篇瀺瀺灂士減切三嶃髙峻又士減切嵁嵁絶山皃臉臉䑎羮屬也力減切二醶醶䤘醋味斬周禮曰秋官掌戮掌斬側減切一䑎初減切二䤘酢味闞虎聲火斬切又苦暫切二欦笑也摻擥也詩曰摻執子之袪兮所斬切四㺑㺑㺝犬吠又山檻切醦醋味芟林木也黯黯然傷別皃說文云深黒也乙減切一喊聲也呼豏切一􅞍捕魚網也女減切三上同淰水無波也又乃玷切癡也丑減切二旵日光照也五十四檻闌也說文曰攏也一曰圈胡黤切十艦禦敵船四方施板以禦矢如牢壏堅土䊤也㔋利也濫泉正出也又盧暫切網車轞車聲㺝惡犬吠不止也撖姓也姓苑云今河内有之䫡長面皃丘檻切又五減切一㨻斬取山檻切二㺑㺝㺑犬聲黤靑黒色於檻切二黑敢黄黑敢人名說文曰黑敢者忘而息也醶酢漿初檻切一㺖小犬吠荒檻切二豃開險皃巉峻巉皃仕檻切一五十五范姓也出南陽濟陽二望本自陶唐氏之後隋會爲晉大夫食采於范其後氏焉防錽切六範法也常也式也前也軓說文云車軾前也周禮曰立當前軓笵說文云法也从竹竹簡書也犯干也侵也僭也勝也􅢮蜂也案禮云范則冠而蟬有緌字不從虫錽馬首飾西京賦云金錽鏤錫亡范切三􅶦腦蓋也俗作又明忝切刄也今河東謂淫腫爲府犯切一凵張口皃丘犯切二㧄以手㧄物釩釩拂峯犯切一行丑犯切二足望廣韻上聲卷第三
