front:
  text: 廣韻上聲卷第三多動董第一獨用之隴腫第二獨用古項講第三獨用諸氏紙第四旨止同用職雉旨第五諸市止第六無匪尾第七獨用魚舉語第八獨用虞矩麌第九姥同用莫補姥第十徂禮薺第十一獨用鞋買蟹第十二駭同用諧楷駭第十三呼猥賄第十四海同用呼改海第十五之忍軫第十六準同用之尹準第十七武粉吻第十八隱同用於謹隱第十九虞逺阮第二十混很同用乎本混第二十一乎墾很第二十二河滿旱第二十三緩同胡用管緩第二十四山板潸第二十五産同所用簡産第二十六先典銑第二十七獮同息用淺獮第二十八蘇鳥篠第二十九小同私用兆小第三十苦絞巧第三十一獨用乎老晧第三十二獨用古我哿第三十三果同古用火果第三十四莫下馬第三十五獨余用兩養第三十六蕩同用徒朗蕩第三十七古杏梗第三十八耿靜同用古幸耿第三十九疾郢靜第四十戶鼎迥第四十一獨用蒸上拯第四十二等同用多肯等第四十三云久有第四十四厚黝同用乎口厚第四十五於糾黝第四十六七稔寢第四十七獨古用橝感第四十八敢同用姑覽敢第四十九以冉琰第五十忝儼同用他點忝第五十一冝奄儼第五十二下斬豏第五十三檻范乎同用黯檻第五十四防鋄范第五十五一董督也正也固也又姓飂叔安裔子董父實甚好龍帝舜嘉焉賜姓曰董出隴西濟隂二望多動切七蝀螮蝀虹也又音東箽亦姓又竹器也心亂蕫薡蕫草似蒲而細又藕根䵔攏䵔不上鼓鳴也蠓列子曰蠛蠓生朽壤之上因雨而生覩陽而死莊子謂之醯雞莫孔切七物上白醭鸏水鳥又音蒙濛濛澒大水又莫紅切朦大貌曚暡曚曰未明也懵心亂貌孔孔穴也又空也甚也亦姓殷湯之後本自帝嚳次妃簡狄吞乙卵生契賜姓子氏至成湯以其祖吞乙卵而生故名履字天乙後代以子加乙始為孔氏至宋孔父嘉遭華父督之難其子奔魯故孔子生於魯康董切二倥倥偬事多搏擊先孔切三箸桶檧又蘇公切侗直也一曰長大他孔切四桶木桶又音動曈曈曨欲曙又音童聾捅捅進前也總聚束也合也皆也衆也作孔切十五揔上同總俗嵸巃嵸山貌㢔衆立總總角本亦作總蓯菶蓯草貌鬷爾雅云軌鬷一名素華猣犬生三子翪鳥飛竦趐上下也所謂鵲鶪醜其飛也䁓方言云南人竊視熜煴也説文曰然麻蒸也又靑公切屋會又且公切􅭿關西呼輪曰􅭿偬倥偬澒説文曰丹沙所化為水銀也又濛傾大水胡孔切五鴻鴻濛又音紅蟲甲類􅺏鳴聲咏􅺏也汞水銀滓蓊蓊鬱烏孔切九滃大水貌暡氣盛貌郺郺郺多貌又音雍濃勜勜劜屈強貌劜音軋䈵竹盛又音翁䐥䐥臭貌出字林塕塕埲塵起然煙氣􅳉奴動切一琫佩刀飾也邊孔切四菶草盛􅬓小兒皮屨又巴講切俸屏俸又扶用切曨曈曨力董切九襱袴也又直隴切巃巃嵸竉孔竉籠竹器又龍聾二音攏攏略又拗攏籌也謂酒律𢤱𢤱悷不調儱儱侗未成器也龓乘馬又牽也説文兼有也嗊羅嗊歌曲出告幼童文呼孔切二心神恍愡貌動躁也出也作也搖也徒揔切九􅏒古文酮酒壞又音同姛項直貌眮瞋目詷訂詷訂音挺桶木器又他孔切挏推引也漢有挏馬官作酒又音同硐安硐鍯硐見馬融長笛賦菶蒲蠓切草盛貌又方孔切三唪大笑也埲塕埲塵起二腫疾也説文癰也釋名曰腫鍾也寒熱氣鍾聚也之隴切六種種類也又之用切踵足後又繼也趾也頻也説文追也一曰往來貌踵説文跟也動相迹也喠喠􅵥欲吐寵寵愛也丑隴切三小兒行貌埫埫塎不安隴説文云天水大坂也亦州漢汧縣後魏置東秦州又改為隴州因山名之力踵切三壠説文曰丘壠也方言曰秦晉之間冢謂之隴亦作壟書傳曰畒壟也㙙塗也擁手擁説文作􅗙抱也又擁劒蟲形似蟹崔豹古今注云一名執火其螯赤故謂之執火於隴切三上同壅壅堨亦塞也障也又音雍冗冗散也亦官名續漢志曰先獵一曰大儺逐疫鬼穴從僕射將之逐鬼干禁中俗作冗而隴切十二上同穁稻䅌不肖也一曰傝劣也或作㯓茸又作􆈬􅻛鳥細毛也氄上同軵推車或作搑水牛鼠拒也亦作軵輕也搑推搗貌也又而容切重多也厚也善也愼也直隴切又直龍直用二切四􅚸遲也襱袴也又來公力董二切又作鮦魚名又直柳切冢大也周禮天官冢宰説文曰髙墳也釋名曰冢腫也象山頂之髙腫起知隴切二冢俗奉與也獻也祿也説文承也扶隴切二唪口髙貌出埤蒼捧兩手承也敷奉切一勇輁軸所以支棺悚怖也息拱切十竦敬也國語云竦善抑惡慫驚也聳髙也説文曰生而聾曰聳絆前兩足㩳執也駷何休云馬搖銜走也愯懼也亦作􅋏傱傱傱走意又先項切䙕襌衣洶洶溶水貌許拱切三訩訩嚇也又音凶凶恐懼説文曰擾恐也左傳曰曹人凶懼又音凶覂覆也或作又作泛此覂駕之馬非良者説文曰反覆也方勇切二上同湩都􅣽切濁多也此是冬字上聲一􅣽莫湩切􅣽鴟鳥又莫項切二朦豐大䅃穫也渠隴切又渠恭切一小鳥飛也充隴切二喠氣急之貌説文曰褌也職勇切二上同又且勇切䙕子冢切襌衣又息拱切一三講告也謀也論也説文曰和解也古項切四港水派傋􅷗傋不媚貌又虛項切耩耕也棒杖也打也步項切八棒上同棓上同魏志云曹操為北部尉門左右縣五色棓各十枚玤周邑地名又珠次玉􅸡􅸡慃很戾蚌蛤也蚌上同䎧䎧䥯器出埤蒼慃􅸡慃很戾烏項切一􅷗􅷗傋武項切二􅣽􅣽鴟鳥項頸項説文曰頭後也釋名曰項又池爾切􅨓􅨓狼褆衣服端下姼方言云南楚人謂婦妣曰母姼也䟗䟗尌也謂立也積聚也靡無也偃也又靡曼美色也説文曰披靡也文彼切七行貌猶遲遲也骳骳屈曲也􅭷乘輿金耳又美為切熟寐也又莫禮切蘼薔蘼藥名又亡為切彼對此之稱甫委切五㗗相分解也柀木名爾雅云柀煔佊埤蒼云佊邪也停𬒳寢衣也又姓呂氏春秋有大夫被瞻皮彼切又皮義切二罷遣有罪又平陂薄解二切毀壞也破也缺也虧也許委切十燬水盛檓爾雅云檓大椒毇説文曰米一斛舂為八斗上同又於詭切義見下文譭謗也譖也𢶙手𢶙傷也烜周禮有司烜氏以陽燧取火於日以鑒取水於月説文曰惡也一曰人貌委委曲也亦委積又屬也棄也隨也任也又姓漢有太原太守委進出風俗通於詭切五骫骨曲又姓出纂文説文曰鷙鳥食巳吐其皮毛如丸又許以切蜲黍負爾雅云蛜威委黍字或從蟲䍴羊相䍴跪拜也去委切又渠委切二刖一足詭詐也又橫財物為詭遇也過委切十九垝垝垣毀垣也又作陒陒上同䣀陸䣀山名出山海經攱枕也䤥戾鋸齒也説文曰臿屬一曰瑩鐡也觤羊角不齊恑變也悔也蛫蟹也祪毀廟之祖庪爾雅云祭山曰庪縣禔庋並上同洈水名出南郡東洈山至華容縣入江也蟡長八尺一首二身似蛇以名呼之可取魚鱉􅸭子玉篇云布穀也姽宋玉神女賦曰既姽嬧於幽靜説文曰間體行姽姽也桅短矛或作説文曰桅黃木可染佹戾也髓説文作􅾸骨中脂也息委切五嶲越嶲郡靃靃靡草木弱貌䭉糖䬾方言云餅􅸷滑也絫説文曰增也十黍之重也力委切六纍上同又良偽切樏似盤中有隔也又音縲虆法者虆可以網人心厽説文曰絫坺土為牆壁壘説文曰壘墼也技藝也説文巧也渠綺切六妓女樂徛立也伎侣也錡釡也又魚綺切䗁蟬也倚依倚也又姓楚左史倚相於綺切五猗猗狔猶窈窕也又於羈切椅椅柅又於冝切旖旖旎旌旗從風貌輢車輢掎牽一腳説文云偏引也居綺切七剞剖劂曲刀庋又音詭一足又作踦踦公羊傳曰相與踦閭而語閉一扇一人在內一人在外㱦棄也又丘知九竒二切攲持去也又居冝切綺文繒又姓漢四皓有綺里季墟彼切七婍貌好崎崎礒石貌又起冝巨支二切䞚行貌㥓減又去奇切儉意也觭牛角又丘竒切矮痤也喪也又於蟹切蟻爾雅曰蚍蜉大蟻小者蟻魚倚切十二蟻上同蛾上同見禮錡三足釡一曰蘭錡兵藏又姓武王分殷人六族有錡氏後漢有錡嵩礒崎礒齮齧也艤整舟向岸檥上同説文魚羈切幹也嶬岌嶬山髙貌轙説文曰車衡載轡者羛羛陽鄉名在魏郡䰙釡也亦作鈘説文曰三足鍑也一曰滫米器也蒍草也又姓左傅晉大夫蒍伯韋委切九鄬地名儰不安也鄬地名花也榮也口咼䦱闢也國語曰䦱門與之言又姓薳草又姓左傳楚有薳氏代為大夫寪説文云屋貌觜喙也即委切二㭰上同説文識也一曰藏也蘂花外曰蕚花內曰蘂如纍切四蕊草木叢生貌蕤説文曰草木實蕤蕤也又人佳切蕊茸也垂也又佩垂貌此止也雌氏切九跐蹈也又阻買切佌小舞貌玼玉色鮮又千禮切泚水淸又千禮切馬名小貌淺渡也直大也説文火介切瞋大聲也豸蟲豸爾雅云有足曰蟲無足曰豸説文云獸長行豸豸然欲有所司殺形池爾切十二褫奪衣易曰以訟受服終朝三褫之陊山崩也説文大可切落也䊓黏也踶踶跋用心力貌莊子曰踶跋為義傂佌傂參差貌杝析薪又敕氏切阤落也説文云小崩也䚦角端不正説文敕豕切角傾也􅞧解豸又宅買切又作褆好衣徥行貌朝鮮語也徙移也斯氏切五璽説文曰王者印也所以主土從土爾聲璽籀文小兒詩云彼有屋本亦作佌佌又音此小貌又千禮切酏酏酒移爾切九迆邐迆連接匜柸匜有柄可以注水又音移衪衣中袖也肔引腸莊子云萇弘肔崔撰注云肔裂也又敕紙切崺峛崺沙丘狀峛音邐扡加也又離也又弋支切或作拸㥴不憂事也又弋支切孈多態邐邐迤力紙切三峛峛崺㸚㸚爾布明白象形也屣屣步也又作屣説文曰舞履也所綺切十上同灑灑掃又所買切纚韜髮者又颯纚長紳貌縰上同釃分也見漢書溝洫志説文曰下酒也一曰醇也􅨌鞮屬屣履不躡跟矖視也篩籮也説文曰篩箄竹器也使也從也職也并弭切十俾上同説文曰益也一曰俾門侍人鞞刁鞞又蒲迷補茗二切箄竹器又卑篦二音黍屬又蒲賣切髀股也又步米切崥山足􅤴爾雅曰􅤴鼠莞郭璞曰亦莞屬纎細似龍鬚可以為席客扶持爾汝也説文作云麗猶靡麗也兒氏切四爾義與爾同説文曰詞之必然也又虜姓二氏爾朱氏本北秀容人也居爾朱川因以為氏後魏書官氏志爾綿氏後改為綿氏也邇近也上同渳水貌説文飲也綿婢切十一弭弓末又息也亦無緣弓也濔水流貌瀰詩曰河水瀰瀰水盛貌也芈羊鳴一曰楚姓敉撫也愛也安也侎上同葞爾雅云葞春草本草云芒草也蝆爾雅注云今米榖中蠹小黑蟲是也𩰞力褊又乃禮切㥝止也婢女之下也便俾切二庳下也或作埤又音卑説文曰中伏舍也一曰屋庳侈奢也泰也大也尺氏切十五姼姑姼輕薄貌又美也又叱涉切􅨩上同鉹甑也誃説文曰離別也㢋廣也國語曰俠溝而㢋我㢋上同垑恃土地也懘又昌厲切㶴盛也袳衣長亦作袲又宋地名袲上同豕也恀恃也又音紙哆張口又丑加昌者二切弛釋也説文云弓解也施是切三豕豬也阤壞也又音豸紫間色也又姓出何氏姓苑將此切九訿訿毀訾上同啙窳也又子西切水名在長沙跐行貌茈茈薑又茈草也呰口毀説文苛也扺捽也又子禮側買二切捶擊也之纍切五箠䇿也小巵出説文䮔馬小貌又子垂切沝二水又音􅓵揣度也試也量也除也初委切又丁果切二揣試也牸豚或作隨婢切一舐以舌取物神紙切四􅜻上同舐俗􅨓獸名似狐出則有兵扺拳加人也側氏切又音紫二跐蹈也又音紫㱟枝折匹靡切三紴水波錦文又補柯切披開也又偏羈切諀諀訾惡言匹婢切六庀具也疕瘡上甲亦頭瘍又卑履切仳仳離別之意庀具也吡訾也出莊子雞頭也羊捶切六䔺草木葉初出貌芛爾雅云蕍芛葟華榮撱撱棄又撞䝐小豶亦作瘡裂惢疑也才捶切一跬舉一足丘弭切四跬上同頗辨貌又舉頭貌䠑䠑踽開足之貌狔猗狔從風貌女氏切三旎旖旎抳掎抳硊磈硊石貌魚毀切四頠間習容止姽好貌又過委切􅸭布榖鳥跪張跪亦作渠委切又去委切一褫敕豸切衣絮偏也又池豸二音一㨖指也説文刺也陟侈切二䘢去涕也興倚切一企企望也丘弭切又去智切二跋踶跋山海經云有跋踵國人行腳跟不著地如人之跋足也又去智巨支二切菙周禮有菙氏燋焌用荆菙之類時髓切二㥨㥨不恱也枳木名似橘居紙切又諸氏切一五旨説文云美也從匕日又志也亦作見經典職雉切八指手指也又示也厈也恉意也祁地名䛗訐發人之惡砥平也致也説文云柔石也砥砥礪也説文同上茋茋蒻小蘋視比也瞻也效也承矢切三視視並古文美好色説文曰甘也從羊從大羊在六畜主給膳也美與善同意無鄙切五媺上同周禮地官云一曰媺宫室􅣕獸似牛渼渼陂在京兆鄠縣媄字樣云顔色姝好也鄙陋也又邊鄙也方美切四啚説文嗇也娝姓出何承天纂文痞病也又音否兕爾雅曰兕似牛郭璞曰一角青色重千斤徐姊切七􅴩上同古文俗羠犍羊又以脂切剃燒草又直履他計二切䒨蒿也几案屬周禮司几筵掌五几凡朝覲大饗射封國命諸侯設左右玉几祀先王亦如之諸侯祭祀右雕几筵國賔于牖前左形几甸役右漆几喪事右素几吉事變几凶事仍几或作機居履切九􅕱爾雅云􅕱大􅍪旄毛狗足麂上同㞦女㞦山名弱水所出機説文曰木也山海經曰族蔨之山多松柏機桓䢳地名獸名如兔喙蛇尾見則有煌災履赤履也䂹石墮聲也爾雅曰男子謂女子先生為將几切二千億也亦歸縣在歸州袁山松云屈原此縣人被放來因名其地與同音風俗通云千生万万生億億生兆兆生京京生生垓垓生壤壤生溝溝生澗澗生正正生載載地不能載也匕匕匙通俗文曰匕首劒屬其頭類匕短而便用故曰匕首卑履切十妣爾雅曰父曰考母曰妣又甫至切秕粳秕比校也並也爾雅曰北方有比肩民焉迭食而迭望蓋半體人也又毗鼻邲三音䃾以豚祀司命也沘水名出廬江灊縣入芍陂今謂之渒水也枇禮記注云所以載牲體朼上同疕頭瘍髀股外又旁禮切軌法也車迹也説文曰車轍也居洧切十三簋簠簋祭器受斗二升內圎外方曰簋朹古文晷日影也又規也厬厬泉或作爾雅云水醮曰厬謂水醮盡也上同宄內盜也匭匣也唐垂栱元年置匭於朝令上表者投之有延恩通玄招諌申冤等匹匭也古文説文云匭皆古文簋字頯小頭又巨追切氿水涯枯土爾雅曰氿泉穴出穴出仄出也迹洧水名在鄭榮美切四鮪魚名痏瘡痏䵋黃色矢陳也誓也正也直也説文曰弓弩矢也古者夷牟初作矢式視切四又作並俗􅧚説文曰糞也本亦作矢俗作屎屎俗本許伊切雉爾雅曰雉絶有力奮謂最健鬪也又陳也度也王肅云城髙一丈曰堵三堵曰雉直几切三滍水名在魯陽剃芟草又辛剃辛夷別名又音替死説文曰澌也人所離也息姊切一牝扶履切又毗忍切一履踐也祿也幸也福也字書云草曰扉麻曰屨皮曰履黃帝臣於則所造又姓出姓苑力几切一水説文曰準也北方之行也釋名曰水準也準平物也式軌切一壘説文曰軍壁也又重壘亦姓後趙録有壘澄本姓裴氏力軌切十四蜼似猴仰鼻而尾長尾端有𡵨説文惟季切又音柚猚上同櫐藤爾雅曰諸慮山櫐藟上同㶟水出鴈門𡻭𡻭嶵山貌轠轠轤車屬鸓飛生鳥名飛且乳一曰鼯鼠毛紫赤色似蝠而長藟葛藟葉似艾或作虆誄銘誄誄壘也壘述前人之功德周禮曰小史掌卿大夫之喪讀誄也説文曰誄諡也耒田器又盧對切讄禱也􅚦飛􅚦獸揆度也求癸切五楑木名又音葵􅭛悸也又巨佳切細也又聚惟切湀泉出也説文曰湀辟深水處也趡走也又魯地名千水切三踓蹴細計柅絡絲柎易曰繫于金柅女履切又音尼一癸辰名爾雅太歲在癸曰昭陽古作癸又姓姓苑云出齊癸公後居誄切二湀通流否塞也符鄙切又方久切八痞腹內結痛圮岸毀又覆也仳離也又方比切殍草木枯落也又音孚㡜裂圮覆也或作㩺方言云器破而未離南楚之間謂之㩺又匹支芳鄙二切嶵𡻭嶵山貌徂纍切一嚭大也匹鄙切五秠一稃二米又孚悲切疕頭瘍崩也又匹支符鄙二切蕊草木實節生如壘切三蕤説文曰草木實蕤蕤也繠垂也唯諾也以水切又音惟八蓶草似馬韭而黃可食䲊蟹子又他果切壝埒也又音遺瀢魚盛貌孈愚戇多態又尤卦切㨊棄也踓走也又千水切㰻㰻㰳驢鳴於几切一濢汁漬也遵誄切四噿鳥噿嗺山狀臎肥貌黹針縷所紩周禮祭社稷五祀則用黹冕也豬几切四刺夂後至也㨖挃也移𧖟就寬楮几切一止切一䁤恚視火癸切又火季切一䣀山名暨軌切一跽䠆跽暨几切一巋巋然髙峻貌又小山而衆曰巋丘軌切二蘬蘢古大者曰蘬六止停也足也禮也息也待也留也諸市切十畤説文云天地五帝所基止祭也右扶風有五畤又時止切沚釋名曰沚止也小可以止息其上説文曰小渚曰沚洔上同説文曰水暫益且止未減也茞香草字林云蘪蕪別名又昌待切趾足也址基址址交址郡劉欣期交州記云交址之人出南定縣足骨無節身有毛卧者更扶始得起山海經云交脛國為人交脛郭璞云腳脛曲戾相交所以謂雕題交址也芷白芷藥名又芷陽縣名砥定也又砥柱也市説文云買賣所之也周禮曰司市掌市之治教政形量度禁令大市日側而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主古吏考曰神農作市丗本曰祝融作市時止切三恃依也賴也畤又諸市切徵五音配夏亦作徵見經典省陟里切又竹凌切三言也出方言㨖指也喜喜樂又聞喜縣在絳州漢武帝幸左邑聞南越破遂改為聞喜縣禮記曰人喜則斯陶陶斯咏虛里切又香忌切三喜恱也又許忌切蟢蟢子蟲俗紀極也會也事也理也識也亦經紀又十二年曰紀又姓出丹陽居理切四己身己爾雅曰太歲在巳曰屠維説文云女字也説也以用也與也為也古作以羊己切七以古文巳止也此也甚也訖也又音似苡薏苡蓮實也又芣苡馬蕮也又名車前亦名當道好生道間故曰當道江東呼為蝦蟆衣山東謂之牛舌苡上同佁癡也説文讀若騃又夷在切大堅説文曰㱾大剛卯以逐鬼魅也似嗣也類也象也詳里切十五似上同祀年也又祭祀祀並上同姒夏姓一曰娣姒長婦曰姒幼婦曰娣巳辰名爾雅曰太歲在巳曰大荒落耜耒耜丗本曰倕作耜古史考曰神農作耜上同汜水名在河南成臯縣説文曰水別復入水也一曰汜窮瀆也詩曰江有汜洍説文曰水也一曰詩曰江有洍泤上同又羊己切鈶鋌鈶􅝤鹿一歲曰􅬨一歲曰􅝤史史籍説文作史記事者也亦姓周卿史佚之後出建康又漢復姓五氏丗本衛有史朝朱駒漢書藝文志有靑史氏著書又有新豐令王史音吳有東萊太守太史慈晉有東萊侯史光踈士切四使役也令也又踈事切駛疾也又音去聲􅤩香之美者耳辝也説文云主聽也而止切五洱水名出罷谷山又而志切駬騄駬周穆王馬名䋙䋙䋙轡盛貌􅴄鼠名里周禮五家為鄰五鄰為里風俗通云五家為軌十軌為里里者正也五十家共居正也又姓左傳晉大夫里克又漢復姓有相里氏良士切十裏中里説文曰衣內也鯉魚名悝憂也詩云悠悠我悝又口回切李果名亦行李又姓風俗通云李伯陽之後出隴西趙郡頓丘渤海中山襄城江夏梓潼范陽廣漢梁國南陽十二望㾖病也理料理義理又正也文也説文曰治玉也亦姓臯陶為大理因官氏焉殷有理徴娌妯娌俚賴也聊也又南人蠻屬也亭名在西鄂一曰邑名枲麻有子曰枲無子曰苴也胥里切七萆胡萆􅓥不安貌又作偲箈竹萌也又音待葸質慤貌又畏懼也諰言且思之説文曰石利也始初也詩止切一歭説文躇也歭躇不前也直里切九跱上同峙具也又峻峙痔病也㣥待也儲也具也又看所望而往洔水中髙土又音止畤儲秲稻名秲􅢸痔詩曰痔乃錢鎛痔具也亦作㣥起興也作也立也發也又姓出何氏姓苑墟里切六邔縣名在南郡又渠記切杞木名又苟杞春名天精子夏名苟杞葉秋名却老枝冬名地骨根又國名夏之後也亦姓杞梁是也屺山無草木玘佩玉芭白粱粟也士説文曰事也數始於一終於十從一十孔子曰推十合一為士又姓左傳晉大夫士蒍又漢復姓二氏古今人表有士思癸又士貞氏晉康公庶子士貞之後鉏里切五仕仕宦􅏄果名􅩖砌也閾也戺上同俟待也亦作俟又姓風俗通云有俟子古賢人著書又虜復姓二氏後魏書云俟畿氏後改為畿氏俟奴氏後改為俟氏又虜三字姓三氏俟力伐氏後改為鮑氏俟伏斤氏後改為伏氏周書太祖賜韓褒姓侯吕陵氏牀史切又音祈七俟上同涘水岸涯也騃趨行貌西京賦曰羣獸駓騃又吾駭切繩履不來也説文引詩曰不不來以來矣聲説文同上子子息環濟要略曰子猶孳也孳恤下之稱也亦辰名爾雅云太歲在子曰困敦又殷姓又漢復姓十一氏左傳鄭大夫子人九魯大夫子服氏子家羈莊子有子桑扈皇子告敖何氏姓苑有子乾子仲子工子革子臧子師等氏即里切八子古文仔説文克也本又音兹虸虸蚄蟲耔擁苗本也耔上同梓木名楸屬杍工木匠或作梓矣説文云語巳詞也于紀切二蒿也擬度也魚紀切六擬僭也薿草盛貌又魚力切孴盛也譺議也欺也調也又魚記切禾盛齒齒録也年也又牙齒昌里切二紕績苧一紕出新字林恥慙也敕里切三祉福也祿也褫徹衣又奪衣又直追池耳二切㓼割聲初紀切三啜齧也啜上同滓澱也阻史切五牀簀又側几切棐木名子可食療白蟲蜰爾雅云蜚蠦蜰郭璞云即負盤臭蟲又音肥䕁草也蜚蟲名咸蜚又扶沸切韙是也于鬼切十三煒光煒暐暐曄偉大也瑋玉名葦蘆葦椲木名可屈為盂韡華盛貌􅰜大風貌媁醜也愇字書云恨也鍏方言云臿宋魏之間或謂之鍏逆追鬼鬼之為言歸也居偉切一􅳐蛇􅳐許偉切五􅛚齊人云火震雷也蟲鱗介楤名卉百草楤名又音諱顗靖也樂也説文曰謹莊貌魚豈切二蟻蟻子蟲豨楚人呼豬亦作狶虛豈切五俙僾俙􅽵􅽵鼻又虛几切霼靉霼唏哀而不泣磈磈硊石山貌又危也於鬼切二嵔嵔崔山髙曲下膹􅌜多汁浮鬼切六䆏稻紫莖不黏也又扶畏切橨船邊木也蟦蠀螬別名又扶沸切陫陋也又作䨾又符沸切橨船䒁釘橨八語説文論也魚巨切十二篽説文曰禁苑也籞上同又池水中編竹籬養魚圉養馬又姓左傳有大夫圉公陽敔柷敔樂器釋名曰敔衙也衙止也所以止樂也圄囹圄周獄名又守也衙行貌楚詞云導飛廉之衙衙又音牙齬齟齬不相當也或作鉏鋙説文曰齬齒不相值也鋙鉏鋙不相當也鋙上同禦禁也止也應也當也説文祠也蘌蘌蘙吕字林云脊骨也説文作吕又作膂亦姓太嶽為禹心吕之臣故封吕侯後因為氏出東平力舉切十三膂上同旅師旅説文曰軍五百人也亦姓漢功臣表有旅卿封昌平侯俗作􅞊筲器祣祭山川名案論語只作旅穭自生稻也梠桶端連綿木名説文楣也儢儢拒心不欲為也出文字指歸侣伴侣㭚木名可為箭笴郘亭名絽絣也晉大夫名佇久立也直吕切九佇上同芧草也可以為繩苧上同紵麻紵杼説文曰機之持緯者又神與切羜生羔五月寧門屏之間禮云天子當寧而立眝説文日長眙也一曰張眼也與善也待也説文曰黨與也余吕切又余譽二音七與上同古文歟歎也又音余豫郭璞云豫猶與也又弋諸切藇蕃蕪亦作穥又徐吕切㦛説文曰趣步㦛㦛也煮説文曰烹也章與切烹普庚切四煮上同渚丘也説文曰如渚者渚丘水中髙者也渚沚也釋名曰小洲曰渚渚遮也能遮水使旁回也又水名出常山汝爾也亦水名山海經曰汝水出天息山亦州名春秋時為王畿及鄭楚之地左傳楚襲梁及霍漢為梁縣後魏屬汝北郡隋移伊州於陸灘縣北遂改為汝州又姓左傳晉有汝寬人渚切六肗魚不鮮茹乾菜也臭也貪也雜糅也又而恕切㼋乾菜􅭓􅭓黏也夢楚人呼寐暑熱也舒吕切五鼠小獸名善為盜説文曰穴蟲之總名也黍説文云禾屬而黏也引孔子曰黍可為酒故從禾入水也􅡂􅡂蝜癙癙病杵丗本曰羅父作杵曰昌與切二處居也止也制也息也留也定也説文又作處亦姓風俗通云漢有北海太守處興貯居也積也丁吕切九上同棺衣褚裝衣説文曰㡒也所以盛米也䍆上同著著任又張慮切直略切詝有所知也䘢䘢衣諝才智之稱私吕切九胥上同又思余切諝上同稰熟穫醑簏酒湑露貌糈説文云糧也又音所楈木也祭具楮木名丑吕切三柠上同禇姓出河南本自殷後宋恭公子石食采於褚其德可師號曰褚師因而命氏也又張呂切女禮記曰女者如也如男子之教尼吕切又尼慮切二籹粔籹許許可也與也聽也亦州名本為許國大嶽之胤周武王伐紂所封漢為潁川郡周為許州又姓出髙陽汝南本自薑姓炎帝之後太嶽之胤其後因封為氏虛吕切二鄦地名也出史記巨大也亦姓漢有巨武為荆州刺史其吕切十八拒拒捍也又格也違也秬秬黑黍也距雞距􅟉上同炬火炬粔新字解訓曰粔籹膏環飛天上神獸鹿頭龍身説文曰鐘鼓之柎也飾為猛獸釋名曰橫曰栒縱曰􅶅上同俗作鐻上同巨澤名又大也苣苣蕂胡麻駏駏驉􅛧苦􅛧江東呼為苦蕒罟也詎豈也又音遽歫書傳云至也䶙齗腫所説文云伐木聲也詩曰伐木所所又處所也詩曰獻于公所亦姓漢有諫議大夫所忠踈舉切七所俗糈祭神米也齭齒傷醋也説文音楚匹記也又山於切盨説文曰盨負戴器也䝪齎財問十楚萇楚亦荆楚又州本漢射陽縣地春秋時屬吳秦屬九江郡晉為山陽縣武德初改為楚州又姓左傳趙襄子家臣楚隆創舉切八礎柱下石也齭齒傷醋也齼上同􅮽説文曰會五綵鮮貌引詩云衣裳􅮽􅮽䙘埤蒼云鮮也一曰美好貌憷痛也出音譜濋水名阻隔也憂也側吕切二俎俎豆齟齟齬牀吕切二鉏鉏鋙不相當也咀咀嚼慈吕切六沮止也又七余子預二切怚憍也又子據切袓㜺也説文曰事好也又子邪切跙行不進貌雅出前也又前結切擊也於許切二肩骨舉擎也又立也言也動也説文本作舉又姓出姓苑居許切十莒草名亦國名又姓嬴姓之後漢有緱氏令莒誦櫸木名筥筐筥􅞠飲牛筐行貌弆藏也匱匱柳䢹亭名在長沙郡共輿貌敘次弟爾雅曰敘緒也又姓徐吕切十一緒由緒説文曰絲專也亦姓藇姓也已上三字並出何氏姓苑序庠序又爾雅曰東西牆謂之序溆水浦也抒泄水俗作汿又神吕切嶼海中洲也鱮魚名酒之美也本亦作藇詩云釃酒有藇豫也履屬去除也説文從大口也羌舉切又丘據切五麮麥粥汁弆藏也又音莒􅎕􅎕蚊繼入也又音踈紓緩也神與切又音舒三抒左傳云難必抒矣抒除也又音序杼橡也野田野承與切又與者切二墅田廬皴皮裂七與切一苴履中草子與切又子余切三咀㕮咀淸藥也又慈吕切㕮音甫䃊䃊場外名也九麌牡鹿又麌羣聚貌虞矩切三俁俁俁容貌大也詩曰碩人俁俁􅢕􅢕􅢕笑貌羽舒也聚也亦鳥長毛也又官名羽林監應劭漢官儀曰羽林者言其為國羽翼如林盛也皆冠鶡冠亦姓左傳鄭大夫羽頡又虜姓後魏書羽弗氏後改為羽氏又音芋王矩切十五禹舒也字林云蟲名又姓夏禹之後王僧孺百家譜云蘭陵蕭道遊娶禹氏女也雨元命包曰隂陽和為雨大戴禮云天地之氣和則雨説文云水從雲下也一象天門象雲水霝其間也宇宇宙也又大也説文曰屋邊也易曰上棟下宇亦姓出何氏姓苑又虜復姓宇文氏出自炎帝其後以有嘗草之功鮮卑呼草為俟汾遂號為俟汾氏後丗通稱宇文蓋音訛也代為鮮卑單于宇上同瑀石似玉也祤祋祤縣名在馮翊又況羽切栩栩陽地名又況羽切鄅鄅子國在琅耶其後以國為姓頨孔子頭也説文云頭妍也又讀若翩楀木名又音矩萭説文草也䣁亭名在南陽聥張耳有所聞入音矩䨞雨貌聚衆也共也斂也説文會也邑落云聚慈庾切一鄹亭名在新豐甫始也大也我也衆也説文曰男子之美稱也字從父用又姓風俗通云甫俁之後方矩切十九脯乾脯東方朔云乾肉為脯禮記曰牛修鹿脯田豕脯斧斧鉞周書曰神農作陶冶斤斧俯説文低頭也太史公書俯仰字如此俯上同漢書又作俯今音免府官府説文曰府文書藏也風俗通曰府聚也公卿牧守道德之所聚也又舍也亦姓風俗通云漢有司徒椽府悝腑藏腑本作府俗加月簠簠簋又音膚黼白黑文也爾雅曰斧謂之黼謂畫斧形因名云蜅小蟹莆萐莆堯之瑞草爾雅曰蠸輿父守瓜郭璞云今瓜中黃甲小蟲喜食瓜葉故曰守瓜字或從蟲俌俌輔也出埤蒼㕮㕮咀父尼父尚父皆男子之美稱又漢復姓三氏孔子弟子有宰父黑漢有臨淄主父偃左傳宋有皇父充石宋之公族也漢初有皇父鸞自魯徙居茂陵改父為甫後漢安定太守俊始居安定朝那代為西州著姓又徙居京兆又音釡䃊蚥蜛蚥螳蜋别名鯆大魚郙亭名也在上蔡武止戈為武又迹也曲禮曰堂上接武又州名本自白馬互地魏文徙武都郡於美陽今好畤縣界武都古城是也後魏平仇池山築城置武都鎮即今州是也亦姓風俗通云宋武功之後漢有武臣又漢復姓六氏漢有乘黃令武安恭出自武安君白起之後風俗通云漢武強侯王梁其後因封為氏世本云夏時有武羅國其後氏焉何氏姓苑有廣武氏出自陳餘之後又武成氏武仲氏又虜復姓西秦録有武都氏文甫切二十四舞歌舞左傳曰舞所以節八音而行八風也周禮曰樂師掌國學之政以教國子小舞也山海經曰帝後八子始為舞又姓出何氏姓苑儛上同嫵嫵媚侮侮慢也侵也輕也窗中網也憮憮然失意貌説文愛也一曰不動也儛上同碔碔玞石次玉碔上同廡堂下也􆈿籀文甒罌甒潕水名在南陽鵡鸚鵡鳥名能言鵡上同􅤷愛也説文撫也膴土地腴美膴膴然也瞴微視之貌嫵好也敄強也䒉長艇船也𦋡雉網蕃滋生長説文豐也隸省作無今借為有無字父説文曰父矩也家長率教者扶雨切十五輔毗輔又助也弼也亦姓左傳晉大夫輔躒又智果以智伯必二其宗改為輔氏䩉頰骨􅷯上同腐朽也敗也説文爛也鳼越鳥滏水名在鄴山海經云神箘之山釜水出焉䭸牡馬㕮㕮咀嚼也又音甫蚥蟾蜍别名府病腫也説文病也秿禾穳積也釜説文鍑屬又覆釜九河之一名釡上同古史考云黃帝始造釡䪔尻衣撫安存也又持也循也方武切十三上同弣弓把中也上同説文又方九切刀握也拊拍也説文揗也殕食上生白毛䋨䋨綿俌輔也又音甫剖判也又普厚切䋨絲䯽説文云髮貌又步侯切草𧾱健也亦作柱廣雅曰楹謂之柱又姓出何氏姓苑直注切三跓勇足嵀天嵀案爾雅曰霍山為南嶽郭璞云即天柱山字俗從山詡和也普也遍也大也禮云詡謂敏而有勇況羽切十二殷冠名􅒐上同姁吕氏春秋云姁姁然相樂也又漢髙后字娥姁説文嫗也栩柞木名説文云杼也其實早一曰樣樣音象珝玉名欨説文吹也一曰笑意又火于切祤祋祤縣在馮翊咻噢咻病聲喣呈示䧁鄉名在安邑煦溫也又香句切豎立也又童僕之未冠者又姓左傳鄭有大夫豎拊臣庾切四竪俗樹扶樹裋敝布襦也庾倉庾又姓出潁川新野二望本自堯時為掌庾大夫因氏焉以主切十二窳器空中亦病也上同抌刺也㥚懼也百草愈差也賢也勝也愈病也説文曰病瘳也㼌微弱本不勝末貐獸名龍首食人説文曰猰貐以貙虎爪食人迅走也楰鼠梓似山楸而黑也庾説文量也主掌也領也典也守也君也説文曰鏺小火主又姓出姓苑之庾切五麈鹿屬華國志曰郪縣冝君山出麈尾枓斟水器也宔説文曰宗廟室袥或作砫炷燈炷又音注傴不伸也尪也荀卿子曰周公傴背於武切三噢噢咻病聲迂曲回貌齲齒病後漢梁兾妻能為愁眉啼妝齲齒笑折腰步驅雨切三踽䠑踽又獨行貌竘巧也又音口拄拄從旁栺知庾切四柱柱夫草一名搖車也説文曰有所絶止而識之也􅚍􅚍點義與上同乳柔也而主切三擩擩取物也醹厚酒窶貧無禮也其矩切二貗爾雅云貒子貗數説文計也所矩切又所句所角二切二籔窶籔四足九也矩法也常也俱雨切十一矩上同説文又其吕切踽獨行又驅雨切枸木名出蜀子可食江南謂之木蜜其木近酒能薄酒味也萭姓漢有萭章人音禹聥張耳有所聞䅓曲枝果也􅨎曲羽又求俱切楀楀氏木名又音禹蒟蒟醬出蜀其葉似桑實似椹又音句椇枳椇取收也受也七庾切一縷絲縷力主切十三􅖮贏􅖮縣名在交址僂僂傴疾也褸襤褸衣敝説文衽也簍小筐嶁岣嶁衡山别名嘍覼嘍委曲慺姓出纂文漊説文曰雨漊漊也一曰汝南人謂飲酒習之不醉為漊􅬹鳥今云郭公也㜢女人惡稱小蒿草蔞草可亨魚又力俱切絆前兩足相庾切二䅡草名䝒小母豬也雛禹切二上同十姥老母或作姆女師也亦天姥山也又姓出何承天纂文莫補切六莽宿草又音蟒䥈鈷䥈又言蟒媽母也峔慈母山名在丹陽亦作姥俗從山􅤷愛也又音武土釋名曰土吐也吐萬物也文字指歸無點他魯切四吐口吐亦虜復姓三氏後魏書有吐奚吐難吐萬氏又虜三字姓二氏慕容廆庶長兄吐谷渾後將所部居西零以西甘衳之南極乎曰蘭數千里其孫葉廷曰禮云孫子得以王父字為氏遂以吐谷渾為氏又後魏書吐伏盧氏稌稌稻芏草名似莧生海邊可為席杜甘棠子似梨又塞也澀也又杜仲藥名亦姓本自帝堯劉纍之後出京梨濮陽襄陽三望漢有街史大夫杜周以南陽豪族徙茂陵始居京兆徒古切九靯韛靫别名一云靯􅫜瓨瓶也填也􅩹塞也閉也肚腹肚又當古切􅪂桑皮荰杜衡香草似葵山海經云可以治癭帶之令人便馬馬亦善走都似細辛而氣小異字俗從廾土土田地主也夲音吐魯鈍也又國名伯禽之後以國為姓出扶風又羌復姓有魯步氏郎古切十七櫓城上守禦望樓釋名曰櫓露也露上無覆屋也説文云大盾也滷鹹滷虜虜掠又獲也服也虜虜掠戓從手㢚庵舍􅳻搖動櫓彭排櫓所以進船鐪釡屬蓾杜衡别名上同鹵鹵簿令㔪匐也鏀鏀以木為刀柄㭩木名可染繒䲐魚名蔖草死爾雅曰蓾蔖郭璞云作履苴草采古切二草履覩見也當古切十一睹上同暏詰朝欲明賭戲賭堵垣堵又姓左傳鄭有堵叔又音者肚腹肚又徒古切帾幡也標記物之處也㕆美石又音怙楮木名又音禇􅪂桑皮又音杜䁈梁公子名仇䏿古故也又姓周大王去邠適歧稱古公其後氏焉蜀志有廣漢功曹古牧又漢復姓晏子春秋有齊勇士古冶子又虜三字姓後漢書有古口引氏公戶切二十一鼓説文曰郭也春分之音萬物郭皮甲而出故謂之鼓周禮六鼓靁鼓靈鼓路鼓鼖鼓鼛鼓晉鼓亦作鼓鼓説文曰擊鼓也瞽無目股髀股􅨨上同罟網罟蠱疑也又蠱毒也又卦名蠱事也估市稅盬鹽池又左傳曰盬其腦杜預云盬咂也又詩傳云盬不固也鈷鈷䥈羖羖䍽羊説文曰夏羊牡曰羖􅗑俗詁詁訓牯牯牛賈啇賈又古下切夃多債利也又古乎切沽屠沽焸人名出漢書壅蔽器也説文作五數也又姓左傳有五奢亦漢復姓四氏漢有五鹿充宗風俗通云氏於職焉三烏五鹿是也趙有將軍五鳩盧國語云楚昭王時有五參蹇姓苑有五里氏疑古切五午交也又辰名爾雅云太歲在午曰敦牂旿明也伍行五説文曰相參伍也周禮曰五人為伍仵偶敵又伍仵皆姓出姓苑簿簿籍又車駕次第為鹵簿裴古切二部部伍又部曲粗粗也略也徂古切又于胡切五麆大也駔駿馬又徂㓪切伹淺也粗牛角直下祖祖禰又始也法也本也上也又姓祖巳之後出范陽則古切六珇圭上起又美好組組綬又綸組東海中草名蒩茅藉䔃説文菜也靻靻勒名虎獸名説文曰虎山獸之君淮南子曰虎嘯谷風至又姓風俗通曰漢有合浦太守虎旗其先八元伯虎之後呼古切七琥發兵符有虎文周禮云白琥禮西方戽戽斗舟中泄水器又音戶滸水岸地名萀虎豆名俗加廾䗂蠅虎蟲俗加蟲塢村塢亦壁壘説文曰小障也一曰􅋻城也安古切十塢上同通俗文曰營居曰塢戴延西征記曰蠡城川南有金門塢塢郡名又姓塢郡太守司馬牟之後因以為氏瑦石似玉也塢小障也出埤蒼頭巾溩水溩䛩相毀貌走輕䡧車頭中也苦粗也勤也患也説文曰大苦苓也康杜切二竹名怒恚也奴古切又奴故切五弩弓弩古史考曰黃帝作弩砮石可為矢鏃又乃胡切努努力水弩蟲俗從蟲戶説文云戶護也半門為戶侯古切二十三楛木名堪為矢幹書云荆州所貢詩疏云東夷之所貢扈跋扈猶強梁也又有扈國名亦姓風俗通云趙有扈又虜三字姓有扈地干氏怙恃怙鄠縣名在京兆府夲夏之扈國秦為鄠縣也帍巾也祜福也昈文彩狀又明也􅧓山卑而大曰􅧓岵山多草木芐地黃雇説文曰九雇農桑候鳥扈民不淫者也春雇鳻鶞夏雇竊玄秋雇竊藍冬雇竊黃棘雇竊丹行雇唶唶宵雇嘖嘖桑雇竊脂老雇鴳也􅟾上同亦作鳸亦同西京記云枹土含婟婟惜又音互戽抒也㕆美石又丁古切汙汙深貌貪也酤一宿酒又音姑滬靈龜負書出玄滬水簄海中取魚竹名曰簄普博也大也遍也又姓後魏十姓獻帝次兄為普氏亦虜復姓周書辛威賜姓普屯氏又虜三字姓周書楊忠賜姓普六如氏後魏書有普陋如氏滂古切五溥大也廣也誧文字音義云大也助也浦風土記云大水有小口别通曰浦説文濵也又姓晉起居注有浦選烳火行貌補補綴説文曰完衣也博古切三譜籍録圃園圃説文種菜曰圃亦姓又博故切十一薺甘菜徂禮切五􅚝魚名常以春時出九江鱭上同癠病也方言曰生而不長也啙弱也又子西兹此二切禮説文曰履也所以事神致福也釋名曰禮體也得其事體也又姓左傳有衛大夫禮孔盧啓切十六禮古文竹名蠡蠡吾縣名在涿郡又彭蠡澤名􅿍小船補也澧水名在武陵又水名出衡山亦姓出何氏姓苑醴醴酒亦醴泉縣屬京兆府本漢谷口縣也屬馮翊至後魏置寧夷縣隋改醴泉因周體泉官名也鱧説文鱯也鱺上同説文鮦也欚江中大船名盠簞也劙刀刺又力移切豐行禮之器布也説文數也又音離欐小船又力計切體體身也又生也他禮切八體俗醍醍酒又音啼涕目汁䪆䪆軟貌挮去淚緹纁又音啼橫首杖名䫌傾頭匹米切一濟定也止也齊也亦濟濟多威儀貌又水名出王屋亦州本齊地秦屬東郡宋於此置碻磝戍後魏於此置濟北郡周武帝置肥城郡武德改為濟州或作又姓出姓苑襄城人也子禮切又音霽五扺殺也又側買切䍤手榒酒又作櫅癠生而不長卯事之制也説文音卿邸舍也又姓風俗通云漢上郡太守邸杜俗從互餘同都禮切十三底下也止也作底非也詆呰也訶也䏄耳膿坻隴阪又支氏切抵擠也擲也抵角觸抵上同柢本也根也弤埤蒼云舜弓名㪆隱也堤滯也軧大車後也弟兄弟爾雅曰男子先生為兄後生為弟徒禮切又特計切七娣娣姒悌愷悌詩作豈弟毛萇云豈樂也弟易也䑯䑯船遞更代也又亭繼切㼵小瓫媞好人安詳之容貌又啼是二音禰祖禰亦姓出平原魏有禰衡亦作餘同奴禮切十三嬭楚人呼母又奴蟹切𩰞智少力劣苨薺苨䪆軟貌􅠩􅠩􅠩濃露也亦作泥瀰水流也泥地名髮貌薾華茂也檷絡絲趺也鑈上同轡垂也洗洗浴又姓先禮切又音銑二灑上同又所賣切泚水清也于禮切四玼玉色緀帛文貌皉白色啓開也發也别也刻也説文教也俗作啓康禮切十二􅯆兵欄説文曰傳信也綮戟支一曰戟衣卟問卜也又工兮切稽首至地也稽上同又古兮切晵説文云雨而晝姓也又姓後燕有將軍啓倫或作啓闙埤蒼與啓亦同啓説文開也䏿肥腸又口系切㒅開衣領也䡔至也礙也徯待也胡禮切八謑恥辱所以安重船又音糸上同涀水名在髙陵説文待也匸有所藏也􆈞目動米榖實説文作米又胡姓莫禮切七眯物入目中䋛繡文如聚米出説文洣水名在荼陵蔝蔝子菜寐不覺䱊魚子陛階陛也傍禮切八梐梐枑行馬髀髀股髀上同陛下也􅤴􅤴鼠莞見爾雅可為席又必鼻切牛馬行㒅開腳行也可也爾也烏弟切二噟聲堄埤堄女墻研啓切六㪒㪏㪒擊聲掜不從也觬角曲䘽襪䘽袿衣飾也晲明也亦作㪏補米切二明白十二蟹水蟲仙方云投於漆中化為水服之長生以黑犬血灌之三日燒之諸鼠畢至胡買切七蟹説文上同解曉也又解豸仁獸似牛一角亦姓自唐叔虞食邑於解今解縣也晉有解狐解楊出鴈門又虜復姓魏書有解批氏又佳買古賣二切獬字林字樣俱作解豸廣雅作陸作獬豸也澥渤澥嶰山澗間又懈谷名案漢書只作解谷小溪買説文市也莫蟹切五嘪羊聲蕒吳人呼苦􅛧汨水名鷶鷶􅸭鳥名􅛠戾也苦蟹切三意難説文作􅮻草盛上出也挴貪也燘燘爛也又呼猥切䜸豆碎萁也腿腿股也吐猥切八腿俗聉聉顡癡癲貌説文五滑切無知意也顡音隗僓長好貌脮腲脮㟎㟎嶵山高貌㱣㱬㱣㞂㞇㞂行病瘣木病無枝胡罪切九溾溾浽穢濁也㱱㱱㱣䜋列也玉篇云譯也説文云中止也又胡對切匯回也廆晉有大單于遼東郡公慕容瘣䕇爾雅云䕇懷羊又音瑰輠車轉之貌郲不平䫥大頭説文曰頭不正也口猥切五㚍㚍㚍多貌傀俗作傀儡子也顝首大骨又口瓦切磈磈礧石也亦作𤷎都罪切五䇏木實垂貌重貌頧頭不正貌謉謉諢謔言出聲譜餧飢也一曰魚敗曰餧奴罪切八餒上同浽溾妥娞㛱娞風動貌鮾魚敗脮上同㼏傷瓜陟賄切假髮髻也一頠頭也一曰間習五罪切又五毀切七顡聉顡説文音聵癡頭不聰明也隗陮隗髙也亦姓出天水後漢有隗嚻峞峞􅐑山貌嵬山貌又玉回切䫥頭不正也又口猥切磈衆石貌皠霜雪白狀七罪切八􅗍新水狀也上同漼水深貌璀玉名物粗也䊫赤米鏙鏙錯鱗甲貌琲珠五百枚蒲罪切三痱痱癗起令虛摧山林崇積貌子罪切二洅説文云雷震洅洅本作代切倄痛而叫也于罪切一十五海説文曰天池也以納百川者亦州禹貢徐州之域七國時屬楚秦為薛郡漢為東海郡後魏為海州亦姓呼改切三醢肉醬亦作醯橀榽橀木名似檀齊人諺云上山斫檀榽橀先殫愷樂也康也左氏傳云八愷苦亥切九凱上同颽南風亦作凱塏爽塏髙地爽明塏燥也暟美鎧甲之别名闓開也亦音開䐩肉美輆輆軩不平宰冢宰又制也亦姓孔子弟子宰豫作亥切四縡載也䏁半聾字林云秦晉聽而不聰聞而不達曰䏁載年也出方言又音再駘疲也鈍也駘蕩春色貌亦官名徒亥切又音臺十一殆危也近也待待擬也俟也怠懈怠逮及也上同紿欺言詐見又絲勞也箈竹筍詒相欺軩輆軩不平言不上乃語辭也汝也奴亥切三乃古文鼐鼎大者曰鼐又奴代切改更也又姓秦有大夫改産古亥切三頦頰頦又戶垓切絠解繩説文云彈彄也亥辰名爾雅云也歲在亥曰大淵獻亦姓戰國䇿晉有亥唐胡改切四賅竒賅非常㧡動也堅神人啡出唾聲匹愷切一采事也又取也亦姓風俗通云漢有度遼將軍采皓倉宰切七採取也俗綵綾綵寀寮寀官也彩光彩䰂髮䰂又七代切􅺴恨也茞香草也昌紿切一等齊也多改切又多肯切一䆀禾傷雨也莫亥切又莫代切二貪在居也存也昨宰切一俖不肯也普乃切二朏説文云月未盛之明又音斐欸相然譍也於改切四庡藏也毐嫪毐秦人名又音哀挨擊也佁癡也夷在切一㘆㘆言不止也亥切一疓病也見尸子如亥切一連絲釣曰出字苑來改切二唻囉唻歌聲又力諧切䑂肥也與改切二上同倍子本等也薄亥切三菩説文曰草也蓓黃蓓草也十六軫動也車後橫木也又姓今吳縣有之俗從尓餘同章忍切二十三縝結也單也又丑珍切疹疹皮外小起説文曰脣瘍也又音緊疹籀文畛田間道又音真賑隱賑説文富也又之刃切鬒説文曰稠髮也引詩曰鬒髮如雲亦作鬒鬒上同槇木密又丁堅切紾軍衣或作縝縝上同􅢂告也診候脤又視也驗也袗説文云玄服也亦作裖裖上同敐􅚳􅚳敐敐喜恱貌􅚳音田眕目有所恨而止又厚重也䪾顔色䪾𩕔愼事也黰黑貌駗馬色也纑也稹緻也又聚物􅷾新生羽而飛也辴大笑丑忍切一腎五藏之一也時忍切六蜃大蛤説文曰雉入水所化又時刃切祳祭餘肉説文云社肉盛之以蜃故謂之祳天子所以親遺同姓脤上同㰮指而笑也鋠玉篇云圎鐡忍強也有所含忍而軫切三荵説文曰荵冬草也爾雅曰蒡隱荵郭璞云似蘇有毛涊水名在上黨矤説文曰况也詞也從矢取詞之所之如矢也式忍切六矧矧並上同哂笑也弞笑不壞顔頤舉眉視人嶙嶾嶙山髙貌良忍切五僯慙恥少髮貌橉門限也又牛車絶橉又力進切撛扶也紖牛紖直引切四䏖杖痕腫處説文音酳瘢也一曰遽也䀕瞋怒目貌眹目童子也又吉凶形兆謂之兆朕緊紉急也居忍切四疹脣瘍也又之忍切並俗盡竭也終也慈忍切又即忍切二濜濜溳水流急貌㯸埤蒼云盂也即忍切二盡曲禮曰虛坐盡前又慈忍切牝牝牡毗忍切又扶履切四􅩋去膝蓋骨形名臏上同猵獺屬又音邊釿齊也説文曰劑斷也宜引切五磭大脣齒齊齗犬爭貌聽口大貌笉笑貌七忍切一窘急迫也渠殞切十僒上同莙牛藻也㖥吐貌㻒玉名箘竹名菌地菌又姓出姓苑䐃腸中脂也蔨爾雅曰蔨鹿靃郭璞云今鹿豆也葉似大豆根黃而香蔓延生蜠爾雅曰貝大而險者曰蜠又音囷引爾雅曰長也説文曰開弓也余忍切又徐刃切十四上同玉篇云挽弓也蚓蚯蚓又余刃切蚓蚓衍蛐蜒又餘刃切説文上同弞笑不壞顔大笑又音衍伸又布也䏖當脊肉也濥水門又引水也説文曰水脈行地中濥濥也廴長行之貌戭長槍也又弋淺切縯齊武王名鈏爾雅曰錫謂之鈏靷説文曰引軸也又餘刃切愍悲也憐也眉殞切十四慜聰也憫憫默亦憂也閔傷也病也又姓孔子弟子閔損敏疾也敬也聰也達也暋説文強也暋上同浼水流浼浼貌簢竹名可以為席爾雅曰簢筡中言其中空筡音塗或作上同􅣕獸如牛也細罔車兔下革也鰵海魚泯水貌亦滅也盡也武盡切又彌鄰切十細理僶僶俯笢竹膚黽黽池縣在河南府俗作㫣又音緬澠上同又音繩䟨蹄甲刡刡削車兔下軛也䐇䐇合殞歿也于敏切七溳濜溳波相次也隕石落隕墜也落也霣説文雨也齊人謂靁為霣一曰雲轉起也愪憂也荺爾雅云荺茭蔈葦根可食者曰茭茭胡狡切十七準均也平也度也又樂器名狀如瑟長丈而十三弦隱九尺以應黃鐘之律之尹切又音拙四準俗埻射的周禮或作準純緣也又音淳尹正也誠也進也説文治也又姓出天水河間周有尹吉甫又漢復姓齊定王時有尹文子著書又漢書百官表曰內史周官秦因之掌治京師武帝更名曰京兆尹應劭曰河南尹所以治周地秦兼天下置三川守河洛伊也漢更名河南太守也丗祖徙都雒陽改為尹余準切八䪳面斜允信也狁獫狁馻馬毛逆玧充耳玉􅣡進也􅮤蟲名筍竹萌思尹切九笋俗􆁎驚詞隼説文曰祝鳩也隼鷙鳥也説文同上箰箰律簨簨虡釋名曰所以懸鼓者橫曰簨簨峻也上髙峻也縱曰虡虡舉也在旁舉簨也上同亦同又作栒蠕淮南子曰蠉飛蠕動或作蠕而允切又而兖切一蠢出也爾雅云作也動也蠢不遜也尺尹切九古文䐏肥也踳踳駮相乖舛也蠢蠢蠢擾動貌朐漢朐䏰縣名在巴東郡地下濕多朐䏰蟲䏰音閠偆厚也富也又癡準切僢相背亂也盾千盾也食尹切四揗摩也吮吮舐也楯欄檻偆厚也富也癡準切一耣束也力準切二􅾂上同毛聚而尹切一束縛丘尹切一螼蚯蚓也爾雅曰螼蚓蜸蠶棄忍切三皮厚貌行貌又去刃切賰賱賰富有式允切一脪腫起興腎切二脪上同濜濜溳水勢鉏紖切一屒重脣黏好説文伏貌一曰屋宇珍忍切一十八吻口吻武粉切七􆈩上同刎刎頸抆拭也伆離也又武弗切勽覆也蘠粉博物志曰燒鉛成胡粉又曰紂作粉方吻切三黺黺綵文扮扮動又握也又房吻切憤悶也房吻切十四上同扮握也㿎病悶蚡字林云地中行鼠百勞所作亦作蚡蚡上同墳土膏肥也魵蝦又音忿鱝鱝魚圎如盤口在腹下尾上有毒弅莊子有隱弅之丘也轒轒䡝車名膹切熟肉也盛榖囊滿而裂也坌説文曰塵也一曰大防也又步寸切忿怒也敷粉切又敷問切二魵蝦别名惲謀也議也亦厚重也於粉切十蕰藏也説文曰積也春秋傳曰蕰利生孽俗作藴藴俗韞韞櫝緼枲麻褞褞袿䡝轒䡝車名賱賱賰富也醖釀也又於問切揾拄也齳無齒魚吻切五上同夽大也喗大口走貌又丘粉切抎有所失云粉切四䫟説文曰面色顚分貌上同􅯠病也走貌丘粉切二左傳云無勇之束縛也十九隱藏也痛也私也安也定也又微也又姓吳志有廷尉左監隱蕃於謹切十一磤雷聲疹皮外小起縯縫衣相著㥯謹也櫽説文括也嶾嶾嶙山貌丄匿也濦水名㐆歸依也又於機切􅨴車聲謹潔也愼也居隱切十一黏貌㹏牛馴也槿木槿櫬也又名蕣一曰朝華一曰日及亦曰王蒸又曰赤堇堇菜也説文作黏土也又音芹上同漌清也慬慤也卺以瓢為酒器婚禮用之也上同菦菜名角齊多貌仄謹切二草木衆齊本又音赾跛行貌丘謹切一近迫也幾也其謹切又其斳切二瘽病也齔毀齒俗作齔初謹切又初靳切一聽笑貌牛謹切一蜸蚚蚓也吳楚呼為寒蜸休謹切又虛偃切一二十阮姓出陳留虞逺切三小貌邧秦邑名説文云鄭邑也逺遙逺也雲阮切二面不正偃偃仰又息也説文僵也又姓左傳舒庸舒鳩並偃姓於幰切十二偃旗旌旒之䞁物相當也鶠鳯也郾縣名褗衣領堰壅水也又於建切匽隱也鄢鄭楚地名左傳曰晉侯鄭伯戰于鄢陵鼴鼴鼠似鼠形大如牛好偃河而飲水也蝘蜩螳别名又爾雅云蝘蜓守宫也鰋魚名湕水名居偃切五矛吃語也揵難也舉也蹇跛也屯難也亦卦名又居免切寋女字亦姓今蜀人有之其偃切四楗關楗鍵上同􅼽倨也言脣急貌去偃切一語偃切四巘山形如甑露齒説文作屵屵磭又大脣貌磭音綽幰蒼頡篇云帛張車上為幰虛偃切四攇手約物蜸寒蜸又休謹切䜢䜢搏很戾晚暮也無逺切七娩婉娩媚也又忙件切挽引也挽上同㿸皮恱也又無願切娩子母相解又音免脕色肥澤又音曼反反覆又不順也府逺切六䡊車耳曰䡊阪大陂不平坂上同返還也橎木名黃豆求晚切四圈獸闌又姓後漢末圈稱字幼舉撰陳留風俗傳圈氏本氏於其國又其卷切菌菌也又求敏切卷風俗傳云陳留太守琅邪徐焉改圈姓卷氏字異音同婉順也美也於阮切二十菀紫菀藥名又菀荗木也又姓左傳齊大夫菀何忌苑園苑白虎通云苑囿所以在東方者謂飬萬物東方物所生也踠體屈蜿蜿蟺蚯蚓也亦作蜿蜿上同畹田三十畒王逸云十二畒也琬圭也宛宛然説文曰屈草自覆也又姓左傳有宛春惌説文同上又周禮注云惌小孔貌倇歡樂䩩䩩量物之䩩也上同䘼襪也又安院切卯卧轉貌䩩底履名晼晼晚睕乖也又無媚也船木䛄慰也又於万切䅚相近貌去阮切六綣繾綣謹慎虇蘆筍裷幭也䊎粉也黏暅日氣況晚切又古鄧切七䁔大目咺兒啼不止朝鮮云也烜光明愃寬心又音宣大視諼詐也飯餐飯禮云三飯是扶晚切又扶万切四軬車軬笲竹器所以盛棗修䪻無髮二十一混混流一曰混沌隂陽未分胡本切十六鯶魚名渾渾元又戶昆切緷大束焜火光説文煌也倱倱伅四凶之一春秋作混沌棍木名䫟頭面形圎也睔大目又古悶切㮯木未破也㮯角圎貌亦上同醨酒相沃䧰大阜掍掍同睴視貌輝輝煌光又音揮翉飛起又走也普本切忖思也倉本切三截也刌細切又割也夲本末又始也下也舊也説文曰木下曰夲從木一在其下俗作本夲自音叨布忖切六畚草器上同笨竹裏又蒲本切㡷戎姓苯苯䔿草叢生也損減也傷也蘇夲切四㾕㾕􅱵惡寒䐣臏屬􅍧切熟肉更煮也􅰙􅰙減也兹損切六撙挫趨禮曰恭敬撙節鄭玄云撙猶趨也噂噂􅊱噂上同䔿草叢生貌僔衆也穩持穀聚亦安穩烏本切三喗小口穩穩穩囤小廩也徒損切九囤籧也説文篅也盾趙盾人名沌混沌坉上同庉樓牆遁遁逃又音鈍遁上同㡒貯也又張倫支旬二切鱒説文曰赤目魚也才本切一􅕐禹父名亦作骸尚書本作鯀古本切十二㯻大束衮天子服也緄帶也鯀説文曰魚也亦作鮌輥車轂齊等貌緷爾雅云百羽也蓘穮蓘壅飬苗惃惃亂丨上下相通䃂石聲錕車釭畽畽行無廉隅他衮切四肉吨氣相衝也黗黑狀閫閫門限也苦本切十壼居也廣也又宫中道篆又稛成熟又縛衣也裍成就悃至誠􅝋秃頭又口沒切梱樴弋門橛齫齫齦齒起貌硱碖碅石落貌畽行無廉隅盧本切四惀心思求曉事睔睔目貌碖碖硱石落貌獖守犬蒲本切四笨竹裏又晉書有兖州四伯豫章太守史疇以大肥為笨伯㨧車弓體粗貌又劣也悶愁悶也模本切又亡頓莫旱二切一㶧㶧熱也乃本切一結也虛本切二惛惛悶忽疾貌也二十二很很戾也俗作佷胡墾切二䓳䓳似蓍花青白墾力也耕也治也康很切四懇懇惻至誠也又信也齦齧也豤豕食貌䫀頰後古很切二詪難語貌二十三旱不雨胡笴切五􅦾山名在南鄭皔白貌蔊草名䛞大言亶信也厚也大也多也榖也俗作亶多旱切又遮連切八􅓠病也嬗媛也笪持也笞也又都達切疸黃病又音旦觛小觶又音但狚獦狚獸擔笞也坦平也安也明也寬也他但切二䦔闑也門傍之橛所以止扉散散誕説文作􅤖分離也又作散雜肉也今通作散又姓史記文王四友散宜生蘇旱切又蘇汗切十一􅤖散並見上注饊饊飯糤上同鏾弩牙緩也繖繖絲綾今作繖蓋字䉈䈓䉈桃支竹名傘􅏛蓋鳥形又思旰切扇但語辝又空也徒也徒旱切十一蛋南方夷袒袒裼又除鴈切袒上同又陟扇切誕大也育也欺也信也灘水中沙為灘今河陽縣南有中灘城䩥馬帶繵束腰大帶膻説文云肉膻也僤疾也本音去聲觛小觶瓉圭瓉秬鬯宗廟之盛禮周禮云裸圭有瓉以肆先王藏旱切三趲散走又則捍切禶祭笴箭笴古旱切又音哿十二簳上同皯面黑又工旦切皯上同亦同稈禾莖秆上同仠仠長􅗰衆草莖也矸矸擊衦摩展衣也又音幹上同懶隋也落旱切五懶俗􅶊飯相著也上同讕謾讕侃強直也又侃侃和樂貌空旱切二衎信言又苦汗切罕希也亦鳥網又姓左傳鄭有罕氏出自穆公以王父字為氏代為卿大夫又羌復姓有罕井氏説文作或作罕呼旱切七蔊菜味辛也廠説文云山石之崖巖灘水濡而乾説文呼旰他丹二切暵日乾也父呼旰也焊火乾也熯上同又呼旰又善二切䰖款貌作旱切二十四緩舒也又虜姓緩稽氏後改為緩氏胡管切十四浣濯也浣上同綄候風羽出淮南子又音桓㬊玉篇云㬊明也又姓晉有西中郎將㬊清䁔目眥説文火晚切大目也大視梡木名又束薪又苦管切棵斷木䝹小有財也鰀魚名嵈山名晥縣名䈠䈠簡也短促也不長也都管切四􅠊上同斷斷絶俗作斷斷又徒管切轉籰碗器物烏管切三碗上同䝹䝹小有賄疃説文曰禽獸所踐處也詩曰町疃鹿場毛萇云町疃鹿迹也亦作畽吐緩切四上同瘓痶瘓貌躖行速算物之數也蘇管切三匴器也冠箱也纂籮屬管樂器也主當也又姓出平原周文王子管叔之後古滿切十二管上同脘胃府輨車轂端鐵盥洗也又公玩切琯玉琯又姓痯病也郭璞云賢人失志懷憂病也悹悹悹憂無告也詩傳云悹悹無所依又音灌䩪車鞁具也錧車具䗆雨下蟲名䘾袴襱也卵説文曰凡物無乳者卵生盧管切一款誠也叩也至也重也愛也苦管切八歀上同欵俗窾空也䥗䥗鏠梡虞爼名形有足如案棵斷木也䲌魚名暖説文曰溫也乃管切七暖上同暖亦同暖火氣亦上同又音暄餪女嫁三日送食曰餪渜湯也糯方言云沛國呼稻也纂集也作管切八􅗋鋋也又子算切纘繼也儧聚也籫竹器鄼五百家也又五鄉為鄼周禮曰四里為鄼五鄼為鄙又子旰切繤繤組夲亦作纂古文伴侶也依也蒲旱切三㚘説文云並行也從兩夫輦字從此拌棄也又音潘滿盈也充也亦姓出山陽風俗通荊蠻有瞞氏音舛變為滿魏有滿寵莫旱切五悶煩悶古文竹器鏋金粄屑米餅也博管切五粄粄上同瓪牡瓦也又音板昄均大也鄹字林云亭名在新豐辝纂切一斷絶也徒管切三𩏇履後帖也縀上同攤按也奴但切一坢平坦坢也普伴切二走貌二十五潸淚下貌數板切又音刪一綰繫也烏板切一版説文判也布綰切六板上同蝂蝂蝜蟲瓪瓪瓦昄大也又扶板切鈑鉼金䩆䩆面皺側板切三拃拃模䎒鷙飛赧慙而面赤俗作赧奴板切四䩆㫱溫濕戁悚懼又音蹨僩武猛貌一曰寬大下赧切又音簡五憪寬大猛也捍捍握搖動橌大木也睆大目也戶板切七睅目出貌黃蒸子也鯇魚名又胡本切䴷䴷子麥麴類皖明星莞莞爾而笑阪阪别名扶板切又音返三昄大也又音板魬魚名矕視貌武板切二􅮳草可染子可食􅨭􅨭齒不正士板切二䗃蟲名五板切一㹽齧也初板切一眅目中白貌普板切一撰撰述雛鯇切二饌盤饌二十六産生也又大籥似笛三孔而短又姓何氏姓苑云彭城人所簡切十簅大籥或從竹摌以手㧡物㹌畜㹌畜牲嵼􅑬嵼汕魚浮水上滻水名在京兆㦃全德又音剗粟馬名限度也齊也界也胡簡切五硍石聲䁂䁂無畏視也㹂牛㹂很不從牽䦘門閾又作痕並俗本只作限武簡切一簡札也牒也略也釋名曰簡間也編之扁扁有間也又姓左氏傳魯大夫簡叔蜀志簡雍傳云本幽州人姓耿後音訛改為簡古限切七㶕洗米僴武猛貌裙褶柬分别也一曰縣名在新寧説文本從束八八分也暕隂旦日明揀揀擇剗剗削初限切六鏟平木器也丳炙肉丳也羼説又曰羊相厠也從羶在尸下尸屋也一曰相出前也㦃全德䐮皮䐮棧閣也亦姓魏有任城棧潛土限切八㟞山貌也嶘上同轏車名士所乘也孱孱陵古縣名在武陵又士連切􅟅書傳云見也説文云具也輚埤蒼云臥車也亦兵車又儀禮注云載柩車也虥虎竊毛謂之虥眼眼目也五限切一盞酒濁微淸阻限切四盞玉盞小杯盞􅊦並上同㦃全德初綰切二磨粟齦齒聲起限切一二十七銑説文曰金之澤者一曰小鑿一曰鐘兩角謂之銑先典切十一洗姑洗律名跣跣足毨書曰鳥獸毛毨傳云毨理也毛更生整理姺古國名燹字統云野火也箲箲帚飯具筅上同㭠棗木草名魚名腆厚也善也忘也至也他典切十五痶痶瘓病也町坦也淟淟涊熱風町町疃鹿迹上同錪小釡靦面慙㥏説文曰靑徐謂慙曰㥏琠玉名蠶爾雅曰螼蚓蜸蠶郭璞云即蜿蟺也江東呼寒蚓䠄行迹行貌賟腆富晪玉篇云明也典主也常也法也經也又姓魏志有典韋多殄切五蕇葶􅏣頰後也又古很切錪小釡又他典切􅥯大篋蝘蝘蜓於殄切五躽身向前也視也宴安也又烏見切嬿嬿婉又烏見切殄絶也俗作徒典切三蜓蝘蜓一名守宫博物志云以器養之食以朱沙體盡赤重七斤搗物杵以點女人體終身不滅淫則點滅故號守宫漢武試之驗也又音廷跈蹈也繭𧖟繭古典切十三絸古文繭俗皮起趼上同小束俗垷塗尼又大坂在隴西筧以竹通水襺纊著衣也拭面挸上同古文峴峻嶺胡典切十三臔肉急哯小兒歐乳也又不顧而吐晛日出好貌又乃見切垷又古典切蜆爾雅曰蜆縊女郭璞云小黑蟲赤頭喜自經死故曰縊女俔譬喻又苦甸切顈顈綴黑白睍小目貌詪爭語㒄意難嫢細腰貌顯明也著也光也覿也又姓風俗通云有顯甫為周卿呼典切五韅在背曰韅在胸曰靷在腹曰鞅在足曰絆蜆小蛤抮引戾顯衆明也微妙也從日中見絲今作顯又五合切塓塗也彌殄切四芇相當也又亡弦切丏不見也眄斜視又亡見切撚以指撚物乃殄切四涊淟涊蹨蹂蹨又而善切跈蹈也編編綃方典切一曰次第也又卑連切十一匾匾㔸薄也㔸湯奚切編褰裳上同萹萹茿草豆名上同惼愝惼性狹碥乘車石也扁扁署門戶糄燒稻作米泫露光又泫然涕流貌胡畎切十四鉉鼎耳説文云舉鼎也㻆玉貌贙獸名似犬多力出西海一曰對爭也到一虎者非也埍女牢也亦作妶又姑泫切繯韋昭云繯繫也眴説文云目搖也目童子又胡涓切鞙䪎鞙刀鞘也説文曰大車縛軛靻也䩙上同隕坑也車上同𩡧馬一歲也􅖱水小流也深尺廣尺曰􅖱姑泫切八畎上同􅎌古文詃誘也埍女牢罥挂也上同汱爾雅墜也又伏水也辮説文交也薄泫切七艑吳船􅴴蜀人呼鹽扁姓也盧醫扁鵲是也又方典切㲢㲢毛領骨風病也骨生貌犬狗有懸蹄者曰犬廣雅云殷虞晉獒楚獚韓獹宋㹱並良犬苦泫切一不動牽繭切四豤齧也䵖穄別名也蜸蜸蠶蚯蚓齞開口見齒研峴切一二十八獮秋獵曰獮獮殺也息淺切十三􅿘並上同見説文鮮少也鮮俗鮮寡也癬癬疥燹字林云逆燒又音銑􅲼上同䉳䉳今人戶版籍也音牽上聲廯屋廪蛇蘚苔蘚演廣也亦水長流貌以淺切八衍達也亦姓字統云水朝宗於海故從水行縯長也蔩土瓜大笑戭長槍又檮戭八元名􅣓蚓􅣓蟲􅨪上同踐踏踐慈演切七諓蹈也餞酒食送人又疾箭切俴淺也小癢蹈也㣤迹也展舒也整也審也適也説文作展轉也又姓魯孝公之子子展之後知演切十展上同搌束縛又丑善切皽皮寬輾輾轉又虜復姓後魏輾遲氏改為展氏紾轉繩也又音軫㠭極巧視之又祝戰切㜊㜊奵好貌蟲名袒袒衣貌耳門旨善切十七以槌去牛勢樿木名禮記用之為杓説文曰倨視人也饘饘粥又音氊盞杯又側限切皽皮寬又知善切燀又昌善切義見下文䆄束也䡀裸形無可蔽也䁴説文曰視而不止上同橏木廇䎒武也又鷙鳥擊勢也㔊擊也上同嫸偏忮趁踐也亦作碾尼展切三􅱢車轢物或作碾㞋柔弱淺不深也士演切一闡大也明也開也昌善切九燀説文曰炊也春秋傳曰燀之以薪又然也又章善切繟寬綽䵐黃色幝車蔽詩曰檀車幝幝魯邑名灛汶水為灛嘽寬綽名也樂記曰其聲嘽以緩􅥕偏緩又徐翦切遣送也縱也去演切八繾繾綣不相離貌又黏也𩝡乾麵餅也也又式善切􅥕緩也徐翦切一輦人步梚車又姓出何氏姓苑力展切九大麥小然火也璉瑚璉鄻地名在周僆畜雙生子摙擔運物也蓮蓮芍縣名在馮翊又音憐膦膦軟無力齴齒露魚蹇切七巘山峯遃行貌嵃㟞嵃山形讞議獄玉甑甗器也周禮曰陶人為甗甗無底甑也件分次也其輦切四􅑬􅑬嵼又音蹇鍵管籥鑳上同辨别也理也慧也説文治也符蹇切五辨俗辡罪人相訟又方免切辨别也説文判也又薄莧切諞巧佞言也又符沔切緬逺也説文曰微絲也彌兖切十沔漢水别名亦州名春秋鄖國之地戰國時屬楚秦屬南郡武德初平朱粲置沔州汅俗湎沈湎愐思也黽黽池縣名在河南府俗作澠又忘忍切勒靻名也偭背也勔勉也幕出玉篇褊衣急方緬切二㦚憂也亦曰急也臇􅌜少汁也子兖切三上同蟲食雋鳥肥也又姓漢有雋不疑徂兖切五雋俗大癢吮欶也又徐兖切葍菜名辡罪人相訟方免切又符蹇切四䁵蔽目説文曰貌𥘉生蔽目者覸視貌鴘埤蒼云鷹鷂二年色又云人姓兖州名尚書禹貢曰濟河惟兖州武王封周公於曲阜為魯公秦為薛郡後魏置南兖州於譙城又置西兖州於定陶城隋改為魯州武德初平徐圎朗復為兖州又姓出姓苑以轉切十濟水别名出王屋也沇上同動也抁上同萒草名馻馬逆毛公山澗泥也紖小風臠肉臠説文曰臞也一曰切肉也力兖切四孌美好􅸸從也脟割也轉動也運也陟兖切二乘卷卷舒説文曰膝曲也居轉切六菤菤耳苓耳韏爾雅曰革中辨謂之韏車上所用皮也辨音片河東安邑聚名捲捲衣埢家土圈説文曰養畜間也渠篆切又求晚切三蔨爾雅曰蔨鹿靃萒耎也軟柔也或從需餘同而兖切十七軟俗蠕蟲動㮕紅藍又㮕棗也䓴木耳碝碝石次玉瑌上同愞愞弱又奴亂反腝腳疾䞂䞂小有財物也耎説文曰稍前大也弱貌弱也又尼展切偄敬也亦弱也柔韋又作萒見正典田耎城下田也緛衣縫也舛剝也説文曰對卧也從夕跨相背夕中几切跨口瓦切昌兖切四喘喘息説文曰疾息也荈茗草名揣揣也又初委切膞切肉市兖切七腨腨腸鄟地名􆉊説文曰小巵有蓋也歂口氣引貌踹腳跟草名生處無魚篆篆書持兖切七瑑璧上文也沌水名在江夏又徒混切摶周禮百羽為摶十摶為緷緷音渾又音鮌上同又作縳䧘道邊埤也堟耕土卷也剸細割旨兖切九剬上同孨孤露可憐説文曰謹也又莊眷切鱄魚名美也出洞庭湖竱等也膞切肉又市兖切開閉門利囚刑圎出古今音字小巵也又之纍切選擇也思兖切又思絹切又思管切三罟也􅳢竹緣撰述也定也持也士免切五僎具也數也持也又子倫切具也見也魚名撰專教也又音詮蜎爾雅曰蜎蠉郭璞云井中小蛣蟩赤蟲一名子子又姓漢藝文志有老子弟子楚人蜎淵著蜎子十三篇狂兖切一蠉香兖切二走貌楩木名符善切又父綿切四急也諞巧言扁又辮篇二音免止也黜也脫也去也亦姓左傳衛大夫免餘亡辨切八娩婉娩媚也又音挽勉勗也勸也強也俯俯俯鮸魚名娩生子娩身冕冠冕絻上同又音問搌搌丑善切七捵捵物令長旌旗柱又幢徴二音蕆備也一曰去貨蚩神行㢟安步行之又丑延切䩶驂具又丑井切鴘埤蒼云鷹鷂二年色披免切一㒄説文曰意膬也式善切三㜣女恣態又奴見切䁴視面色變也偃旌旗之貌於蹇切三䟍走也嫣長貌邅移行除善切一棧士免切掤也一二十九篠細竹也先鳥切七上同魚名誘為善也又小也謏上同䃤黑砥石也又思六切㩋打名皎月光詩云月出皎兮古了切十二璬佩玉行縢脛布也䥵鐡文又呼了切皎白也又匹白切皎明也皎也又珠玉白貌恔恔憭慧也繳纏也又音酌喪之降殺晈光明䘨小袴僥僥抄鳥説文曰長尾禽總名也象形都了切九絹布頭也㣿垂心蔦樹上寄生釕釕鈌帶頭飾出聲譜扚扚擊篇音患窕美色曰窕詩注云窈窕幽間也徒了切八牀子疁中穴誂弄也俗作挑説文曰相呼誘也掉搖尾又動嬥嬥嬥往來貌韓詩云嬥歌巴人歌也挑挑戰亦弄也輕也䂽磽䂽磽山田亦作䂪苦皎切二䂪上同湫湫隘子了切又子攸切五劋􅎒也説文絶也𣏑木忽髙也幧凶首飾似薺菜三十小微也私兆切三􅵐魚名䒕䒕草逺志也肇始也正也敏也長也治小切十一肁開也又姓戰國䇿趙有大夫肁賈兆十億曰兆説文分也姓也趙少也久也字林云趍也亦州名春秋屬晉秦屬邯鄲郡後魏以廣阿城置殷州至齊改為趙州又姓本自伯益孫造父善御幸於周穆王賜以趙城因封為氏簡襄始大列為諸侯今出天水南陽金城下邳潁川五望旐旗旐爾雅曰長尋曰旐郭璞云帛全幅長八尺釋名龜蛇為旐旐兆也龜知氣兆之吉凶建之於後察事宜之形兆也狣犬有力也䍮羊子鮡魚名似鮎而大駣馬四歲垗葬地􅪃灼龜坼出文字指歸沼池沼之少切三菬菬子草䈃竹緣夭屈也於兆切四夭殁也芺爾雅曰鉤芺郭璞云大如拇指中空莖頭有臺似薊初生可食仸仸僑不伸又尪弱貌巐意氣息貌丑小切一少不多也書沼切又式照切三䒚草名説文地名擾亂也順也説文作擾煩也而沼切七擾上同繞纏繞又姓左傳秦大夫繞朝繞圍繞嬈亂也牛馴説文作牛柔謹也爾雅注云即蒙貴也狀如蜼而小紫黑色可畜之健捕鼠亦作猱又諾髙切摽落也又拊心也字統云合作此􅗸符少切八上同見説文今從票餘同鰾魚鰾可作膠慓急性顠髮白又孚小切上同膘脅前又孚小切􅣻􅣻草又零落也糗也尺沼切五麨上同弨弓反曲又昌招切楢赤木名又音猶音酉眧弄人眧目也縹靑黃色也敷沼切八醥淸酒犥牛黃白色顠髮白皫鳥變色也篻實中竹名瞟埤蒼云一目病膘脅前又音􅣻眇説文曰一目小也亡沼切十渺渺㵿水貌訬耰也一曰訬獪草細渺大水杪梢也木末也秒大芒藐字書藐逺又亡角切吵雉聲篎笙管紹繼也又姓出何氏姓苑市沼切五綤古文紹紹介袑袴上䙼玉篇云見也矯詐也説文曰揉箭箝也又姓左傳晉大夫矯文居夭切十二鱎白魚别名䚩角長敽盾也嬌説文曰舉手也一曰嬌擅也嬌女字又居喬切目重瞼也蟜山海經云野人身有獸文説文曰蟲也又姓後漢有蟜慎字彥仲譑多言􅻬國名孂竦身蹻驕也又其虘切表明也亦箋表釋名云下言於上曰表説文作上衣也古者衣裘以毛為表也又姓出姓苑陂矯切四上同古文䔸草名褾袖端方小切四字林云月有所察標標杪木末㟽峯頭藨草名可為席平表切八上同殍餓死又音孚莩上同又音孚􅗸物落貌㰶歐吐㹾獪也似狐善睡鷕雉鳴也以沼切又羊水切七溔浩溔大水貌舀説文曰抒曰也㧒並上同肩骨䁘眇䁘目貌悄悄悄憂貌親小切三愀容色變也釥好也又淨剿絶也子小切八上同出説文勦勞也又音巢漅水名魯地􅜷酒膘又符小切拭也镽長貌巨夭切一繚繚繞力小切九燎説文曰放火也左傳曰若火之燎于原長貌璙好貌憭慧也又音聊爒爒炙也僚朋也又音平聲䩍䩍䩍面白嫽嫽嫽好貌麃蒼頡篇云鳥毛變色本作皫滂表切又經典釋文云徐房表切劉普保切一闄隔也於小切一三十一巧好也能也善也苦絞切又巧偽苦教切二䲾䲾婦鳥案爾雅注云鷦􅛯桃雀也俗呼為巧婦字俗從鳥澩動水聲下巧切説文音學六㺒事露又好巧切説文音哮茭草根亦竹筍也或作茭又音狡佼庸人之敏説文交也又古巧切䀊溫器又公巧切䉰竹筍飽食多也博巧切三並古文㺒擾亂奴巧切三撓撓亂又音蒿獶犬驚説文又奴交切卯辰名爾雅曰太歲在卯曰單閼晉書樂志云正月之辰謂之寅寅津也謂物之津塗二月卯卯茂也言陽氣生而孳茂三月辰辰震也謂時物盡震而長四月巳巳起也物至此時畢盡而起五月午午長也大也言物皆長大六月未未味也言時物向成有滋味七月申申身也言時物身體皆成就八月酉酉緧也時物皆緧縮也九月戌戌滅也謂時物皆衰滅十月亥亥劾也言隂氣劾殺萬物十一月子子孳也謂陽氣至此更孳生十二月丑丑紐也謂終始之際故以結紐為名也莫飽切七丣篆文緢旄也又絲名泖水名在吳華亭縣媌好貌又莫交切昴星名茆鳧葵説文作音柳絞縛也又姓出何氏姓苑古巧切十五狡狂也猾也疾也健也説文曰少狗也胸奴地有狡犬巨口黑身佼女字攪手動説文亂也茭郭璞云江東呼藕根亦作茭又下巧切筊竹索也又音爻接物也鉸鉸刀器也姣妖媚烄烄木然也上同䀊濁也説文器也又胡巧切䉰竹筍㽱腹中急痛俗作㽱爪説文曰丮也覆手曰爪象形丮音戟側絞切八爪古文説文曰手足甲也䝖䝖獠瑵玉名説文曰車蓋玉瑵笊笊籬頭抓亂搔搯也草也拗手拉於絞切五鴢鴢頭鵁似鳧而腳近尾靴襪亦從革見深目狕獸名鮑鮑魚又姓出東海泰山河南三望本自夏禹之裔因封為氏薄巧切四骲骨鏃臿地鞄柔革名咬齧也五巧切一䰫黠也士絞切二㑿㑿㑿長貌出聲譜煼熬也初爪切七􅵇炒並上同謅相弄􅱊乾也吵聲也本音眇獠夷别名張絞切又盧晧切二獠上同擊也一云攬也亦作㪢山巧切一三十二晧光也明也日出貌也胡老切十六昊昊天説文作昦昦上同暭明也旰也曜也亦太皡又姓本出武落鍾離山黑穴中者見蜀録鎬鎬京浩浩汗大水貌又姓漢靑州刺史浩賞又漢復姓魯人浩星公治穀梁皓大也又天邊氣説文曰白貌楚詞曰天白皓皓南山四皓白首人也今或作晧灝灝溔水勢逺也鰝大蝦夰説文放也昦天字從此本音杲薃薃侯莎鄗光武立處邑名上同土釡亦作𧇼網綴滈水名在京兆抱持也説文曰引取也薄浩切一老耆老亦姓左傳宋有老佐盧晧切十四獠西南夷名獠上同轑車軸橑屋橑薝前木一曰蓋骨一曰欄也説文曰椽也潦雨水䕩乾梅栳栲栳柳器也木名廣大貌恅愺恅心亂無人䵏黃色潦水名又力到切討洽也誅也他浩切三套長也槄山楸又他刀切道理也路也直也衆妙皆道也説文曰所行道也一逹謂之道徒晧切七衟並古文稻粳稻禮記曰凡祭宗廟之禮稻曰嘉𬞞又姓何氏姓苑云今晉陵人駣馬四歲又音兆䆃禾一莖六穗也出字林镺長貌又奴晧切堖頭堖奴晧切九腦上同或從餘同􅑠亦同出周禮惱懊惱瑙碼瑙寶石镺長貌㺁雌狢上同惱相惱亂也説文曰有所恨痛也嫂兄嫂蘇老切七嫂上同嫂俗燥乾燥掃掃除掃上同􅭚蔜􅭚草倒仆也都晧切十一搗搗築㨶俗島説文曰海中往往有山可依止也又音鳥禱牲馬祭也禱上同檮説文曰斷木也又音陶禱請也求福也疛病也壔髙土懤憂也草説文作草百卉也經典相承作草采老切七草篆文隸變作草懆憂心慅上同騲牝馬曰騲無人愺愺恅心亂早晨也子晧切十二澡澡洗藻文藻説文同下薻水草也齧人跳蟲抱朴子曰蝨攻君卧不獲安蚤上同又古借為蚤暮字䲃魚名似鯉雞足璪玉名璅石次玉者棗果名史記曰楚莊王時有所愛馬啖以脯棗漢書曰安邑千樹棗等千戶侯又姓出穎川文士傳云棗氏本姓棘避難改焉繅紺色曰繅繅雜五綵文皂皂隸入槽屬亦黑繪俗作皂昨早切四草斗櫟子造造作又七到切艁艁舟以舟為橋説文云古文造皓明白也古老切十一木名杲日出又明白也稿禾稈人稿本草創之本藁俗夰説文放也縞素也又音告稿稿本藥名澤大白澤也菒乾草女石似玉好善也美也呼晧切又呼號切二􅤋人姓蓩毒草武道切又地名又亡毒切四䓮細草叢生媢夫妬婦也説文音冒􅜪重覆寶珍寶又瑞也符也道也禮記曰地不藏其寶又夭寶晉灼云天寶雞頭人身又姓出何氏姓苑博抱切十五珤古文保任也安也守也説文作􅍖養也亦姓吕氏春秋云楚有􅍖申為文王傳也古文堢堢障小城堡上同褓襁褓褓説文曰小兒衣鴇鳥名亦作鴇䳡葆草盛貌又羽葆駂郭璞云今烏驄䎂彩羽宲藏也賲有也相次也襖袍襖烏晧切十四镺镺長也懊懊惱䐿藏肉又烏到切芺苦芺䴠麋子媪女老稱燠甚熟又音郁夭禮曰不夭夭本又於矯切懊懊正之貌郩邑名蝹蟲名如猿常地下食人腦䯠藏骨鳥名考校也成也引也亦瑕釁淮南子云夏后氏之璜不能無考是也又姓出何氏姓苑苦浩切十古文栲木名山樗也稿木枯也説文作稿祰禱也説文曰告祭也洘水乾熇火乾丂氣欲舒貌䯪䯪大頭薧乾魚周禮曰辨魚物為鮮薧注云薧乾也亦作稿又薧里字音蒿瓜蔓苖頭五老切二䯪大頭三十三哿嘉也古我切四舸楚以大船曰舸笴箭莖也又公旱切􅩮筍􅩮出南中瑳玉色鮮白千可切三䰈髮好貌也又昨何切硰硰石地名嚲垂下貌丁可切五嚲古文哆語聲又昌者切下脣垂貌疸勞也又怒也䫂醜貌縒鮮潔貌也蘇可切又楚宜切三娑馺娑殿名又蘇哥切褨衣長貌爹北方人呼父徒可切九柁正舟木也俗從色餘同舵上同陊下坂貌又落也袉裾也拖引也沱瀢沱沙水往來貌又徒河切上同詑輕也我己稱又姓我子古賢者著書五可切五騀駊騀馬搖頭貌側棄也㧴差也硪吸硪山髙貌袉長舒貌吐可切又徒可切一㰁㰁丫樹斜來可切九鈞出異字苑欏裂也砢磊砢石貌㦬㦬慙也玉篇又作曪色光明出釋典相擊也亦斫也剆上同哆脣垂貌橠橠木盛貌奴可切六娜妸娜美貌㡅成也上同那俗言那事本音儺袲袲衣好貌荷負荷也胡可切又戶哥切二何上同呵大笑虛我切五㗿上同㪃擊也㪋上同傾頭貌又音訶可許可也又虜復姓三氏周太保主雄賜姓可頻氏梁有河南王可沓振又有可達氏又虜三字姓三氏後魏書可地延氏改為延氏又并州刺史男可朱渾買奴前燕慕容俊皇后可足渾氏枯我切四岢岢嵐鎮在嵐州軻轗軻又音坷坷坎坷砢欲傾貌烏可切七丫㰁丫樹斜橠妸妸娜亦作婀婀人姓莊子有婀荷甘又音痾㫊旌旗㫊貌又猗蟻切袲左左右也亦姓齊之公族有左右公子後因氏焉又漢復姓二氏左傳宋公子目夷為左師其後為氏秦有左師觸龍晉先蔑為左行其後為氏漢有御史左行恢臧可切三㝾跛㝾又子賀切􅚀戾也説文曰左手也象形三十四果果敢又勝也定也剋也亦木實爾雅曰果不熟為荒俗作果古火切十一果見上注猓猓然獸名輠車脂角又音禍鐹刈鉤又古卧切划划刈裹苞裹又纏也蜾蜾螺蟲也惈蒼頡篇果敢作此惈䴹餅䴹食粿淨米埵土埵丁果切十五鬌小兒翦髮為鬌挆稱量冕前垂也朵木上垂也朵上同綞綞子綾出字林揣搖也又初委切堵車鐧小漄鈌也禾垂貌又丁官切揣試也又初委切履跟緣也褍衣正幅也鎖鐡鎖也俗作鎖蘇果切十二瑣青瑣漢書儀曰黃門令日暮入對靑瑣丹墀拜名曰夕郎又瑣小貌溑水名葰葰人縣在上黨又蘇瓦切䈗竹名䵀説文曰小麥屑之核魚名小石䣔亭名在河南惢心疑也又醉隨才捶二切動也􅩏貝聲墮落也徒果切又他果切十四垛射垛亦作垜長沙呼甌也䅜小積􆄡竹名􅢭上同履跟緣也或作䤻車轄又犂轄出玉篇憜懶憜也説文曰不敬也惰上同嫷美也説文曰南楚人謂好曰嫷又吐卧切鬌又丁果切䲊魚子巳生又他果弋水二切嶞山髙妥安也他果切九媠好也隋裂肉也又徒果切䲊魚子巳生㟎山長貌墮倭墮髻也又徒果切橢器之狹長山貌鵎鳥名麼么麼細小亡果切三曪日無色懡懡㦬人慙坐釋名曰坐挫也骨節挫屈也徂果切二古文𡛖好貌五果切二木節也亦作裸赤體説文曰祖也郎果切九裸裸並上同卵又力管切瘰瘰􅊓病筋結也上同蓏果蓏説文曰木上曰果地上曰蓏應劭云木實曰果草實曰蓏張晏云有核曰果無核曰蓏螺蜾螺蒲盧郭璞云細腰蜂也腰螟蛉之子於空木中七日而成其子法言云螟蛉之子殪而逢蜾螺祝曰類我類我久則肖之婐婐𡛖身弱好貌烏果切三倭倭墮又烏弋切置朔方部晉末赫連勃勃於州稱大夏為後魏所滅置鎮又改為夏州又胡駕古下二切廈廈屋寫憂也除也程也盡也又轉本曰寫悉姐切四案之別名瀉瀉水獸名好貌瓦切一乜蕃姓彌也切一且語辝七也切又子余切一㗿大笑許下切三閜大裂西説文曰覆也覆核賈類皆從此社社稷又漢復姓二氏風俗通云齊昌徙居社南因以為氏何氏姓苑云右扶風有焉又有社北氏常者切三器名􅨔宜􅨔善夢神見仙經跒跁跒行貌苦下切跁傍下切三䇑短人立也笆竹名出蜀又音巴捨釋也書冶切五舍止息亦上同又音赦騇牝馬䬷䬼飫上同姐羌人呼母一曰慢也兹野切三抯取也又才也切飷無食味也把持也執也博下切一踝足骨也胡瓦切十一稞淨穀䋀靑絲履又繩履地名黊鮮明黃色蘳説文曰黃華又音壞觟牝牂羊生角者又楚冠名􅫛魚似鮎也大口又聲説文曰擊踝也輠轂頭轉貌䴹麵名寡鰥寡説文少也古瓦切八咼剔人肉置其骨剮俗􆁽老人柱杖㒀行貌􅯉羊角貌䈑籆䈑收絲具觰牛角開瓦古史考曰夏時昆吾氏作瓦也五寡切二邷衛地若乾草又般若出釋典又虜復姓二氏周書若于惠傳曰其先與魏俱起以國為姓後燕録有步兵校尉若久和人者切又人勺切三惹亂心應聲也鮓釋名曰鮓葅也以鹽米釀魚以為葅側下切五㡸厏厊不合謯謯訝訶貌􅓕炭籠也又音鹺痄痄瘡不合觰牛角橫都賈切又竹加切一槎逆斫本士下切又仕加切二厏厏厊奲寬大也昌者切五㨋擊也䰩醜䰩哆脣下垂貌又當可切扯裂開𥿃𥿃袽相著貌竹下切一袽奴下切一髁腰骨苦瓦切七跨腰跨又苦化切胯上同㡁㡁襟袍也銙帶飾帛衣跨跨步又口化切䂳好雌黃又瓦𥘉又七火切一榖南人食之或云茙葵丑寡切一葰葰人縣名沙瓦切三􅮱強事言語傻傻俏不仁奼嬌奼也丑下切又陟嫁切一藞玉篇云藞槎泥不熟貌盧下切三十六養育也樂也飾也字從羊食又姓孝子傳有養奮餘兩切七癢皮癢癢上同漾混漾水貌蛘蟻名説文曰㮻蛘也勨勉也又音象蟲名像似也徐兩切十一象説文曰象長鼻牙南越大獸三季一乳象耳牙四足之形爾雅曰南方之美者有梁山之犀象蟓桑上繭橡櫟實襐未笄冠者之首飾也勨勉也又音養鱌魚名似魟白鼻長也潒潒逺草名行也嶑山名獎勸也助也成也譽也厲也即兩切六獎上同説文本作嗾大厲之也䉃剖竹未去節也又秦杖切槳楫屬槳上同蔣國名亦姓風俗通云周公之胤又漢復姓漢有曲陽令蔣匠煕又子羊切兩説文曰再也易云參天兩地今通作兩良獎切八兩上同説文曰二十四銖為一兩脼膎脼􅧇松脂緉雙履蜽蛧蜽蟲名説文曰蛧蜽山川之精物也國語曰木石之怪夔蛧蜽亦作魍魎魎見上注㔝㔝勥力拒鞅牛羈也説文頸靻也於兩切十一柍木名秧秧穰禾稠也又音央䭘飽貌詇早知也岟岟山足駚駚鸗馬貌炴火光無資量謂無極限也怏怏悵也又於亮切紻冠纓勥迫也勉力也其兩切五強説文云弓有力也或作強又姓前秦録有將軍強求又其良切弜弓有力也競競言滰乾米之貌仰偃仰也説文舉也魚兩切三䒢昌蒲别名卬望也欲有所度磢瓦石洗物初兩切六㼽上同􅩊皮傷搶頭搶地見史記又七良七養切漺淨也愴愴恍失意貌又音創想思想也息兩切二鮝乾魚臘也掌手掌又姓晉有琅耶掌同前涼有燉煌掌據諸兩切三仉姓梁公子仉䁈後也反爪爽明也差也烈也猛也貴也踈兩切九上同􅥭屩中絞繩鷞鷞鳩塽塽塏髙也樉木名㼽半瓦漺淨也又初兩切䫪醜貌響聲也許兩切八饗歆饗蠁説文曰知聲蟲也蠁上同畗獻也祭也臨也向也歆也書傳云奉上謂之畗亨上同亦作享嚮爾雅兩階間謂之嚮本亦作鄉又音向嚮不久也又音向敞髙也昌兩切七敞敞恍驚貌氅鶖鳥毛也上同屋也出方言又音唱䟫踞也又主尚直庚二切僘僘寬也繈絲有纇又孟康曰鏹錢貫也俗作鏹居兩切五鏹俗見上注襁襁褓負兒衣博物志云襁織縷為之廣八寸長二尺以約小兒於背上膙筋頭憼敬也説文音景丈説文曰十尺為丈直兩切四杖説文曰持也大戴禮曰武王踐阼為杖之銘曰惡乎失道於嗜欲惡乎相忘於富貴吕氏春秋曰孔子見弟子抱杖而問其父母柱杖而問其兄弟曳杖而問其妻子尊卑之差也禮曰苴杖竹也削杖桐也仗憑仗本又音去聲疢病也昶通也明也舒也丑兩切二鋹利也獷獷平縣在漁陽居往切又居猛切一壤土也書傳曰無塊曰壤風土記曰擊壤者以木作之前廣後鋭長尺三四寸其形如履臘節僮少以為戲也逸士傳曰堯時有壤父擊於康衢藝經曰擊壤古戲又漢復姓孔子弟子有壤駟赤如兩切八䖆䖆菜為葅䑋肥蜀人云穰豐穰又汝羊切蠰蟲名似雞而小攘擾攘又汝羊切躟躟躟行疾貌􅙓惡雌黃賞賜也又吳姓有賞氏書兩切五􅴱日西食上同餉周人呼餉食嚮少時也又火亮切髣髣佛亦作倣佛妃兩切六倣倣佛俗仿説文曰相似也紡績紡鶭鸅鸆鳥蒼黑色常在澤中俗呼為護澤鶭上同网网置説文曰网庖羲所結繩以田以漁也丗本曰庖羲臣芒所作五經文字作罔俗作文兩切十二網上同罔上同又無也輞車輞棢上同惘惘然失志貌菵菵草誷誷誣上同耳疾蛧蛧蜽魍魍魎上同昉明也分网切四倣學也放上同瓬周禮有旊人為簋者蓋埏埴之工又音甫枉邪曲也亦姓今號州有紆往切四曲浸佞人汪汪陶縣在鴈門又烏光切往之也去也行也至也于兩切二暀德也是也光也爾雅曰暀暀皇皇美也恍敞恍許昉切二夢中言也又火光切搶七兩切又初兩七羊二切二摤上同長大也又漢復姓晉有長兒魯少事智伯智伯絶之三年其後死智伯之難知文切又直張切一上登也升也時掌切又音尚二丄古文俇楚詞注云俇俇遑遽貌求往切一臩説文曰驚走也一曰往來貌俱往切四迋欺怨載器也出埤蒼逛走貌􅯵姓也毗養切一䫪醜也初丈切二傸惡也三十七蕩大也又水名出湯隂又姓宋之公族也徒朗切十二崵山名漢髙鳯隱處婸淫戲貌大竹筒潒水大之貌又洗潒也放或作婸愓不憂璗玉名説文曰金之美與玉同色者也蕩滌蕩搖動貌説文曰滌器也又吐浪切䑗舂也持米精也簜大竹嵣嵣㟐山貌顙額也蘇朗切四鼓匡木也上同磉柱下石也廣大也闊也古晃切二鄺姓出廬江榜木片北朗切六榜題榜毛罽文螃陸居蝦蟆蒡牛蒡菜䰃䰃亂毛駔會馬市人又牡馬也子朗切三驡駚驡馬容髒骯髒體盤曩久也奴朗切二灢泱灢水不淨見海賦沆沆瀣氣也胡朗切六骯骯髒體盤䟘伸脛也直項之貌蚢貝大者如車輞爾雅作魧吭聲也曭日不明他朗切十二儻倜儻不羈又他浪切蕩長貌戃戃慌失意貌矘矘䁳目無睛説文曰大竹䇶也帑金帛舍又音奴爣爣朗火光寬明􅯸􅯸㬻月不明也㼒大瓜名又㼒㼒長貌㿩白㿩攩攩晃捶打莽莫莽説文曰南昌謂犬善逐兔於草中為莽又姓前漢反者馬何羅後漢明德馬后恥與同宗改為莾氏摸朗切又莫古切十茻説文曰衆草也壾吳王孫休子名見吳志䁳無一睛䒎䒍䒎無色狀㬒日無光䥈鈷䥈又莫古切蟒蛇最大者漭漭沆水大㟐㟐嵣山貌黨釋名曰五百家為黨黨長也一聚所尊長也又輩也美也纍也説文曰不鮮也多朗切五讜直言檔木名䣊地名説文作䣊草名朗明也亦姓出姓苑盧黨切七朖誏並上同俍俍蕩長貌崀嵻崀山空榔木名㝗㝩㝗空虛坱塵埃也烏朗切十姎女人自稱姎我又烏郎切映映㬒不明泱滃泱水貌咉咉咉咽悲也醠濁酒䇦竹名玉篇云䇦無色也盎盆也又烏浪切駚駚驡馬容軮軮軋聲也慷慷慨竭誠也苦朗切七慷上同嵻崀山空骯骯髒體盤䡉車䡉之名㝩㝩㝗空虛懬大也又丘廣切説文又口謗切㳹大水烏晃切二瀇水深廣貌晃明也暉也光也亦作晄胡廣切七幌帷幔也晉惠起居注云有雲母幌櫎兵欄榥讀書牀也滉滉漾水貌攩捶打又吐朗切皓人名前燕慕容皓也吳人云膀回朗切二䒍䒍䒎無色慌慌戃呼晃切七爌爌朗寬明也又苦晃切㝗也䁜䁳䁜目疾出新字林㬻􅯸㬻月不明貌􅲿曰旱熱也夢言也䴚鹽澤也各朗切四䴚並上同䟘伸脛也䭹馬怒驚驡䭹也五朗切一奘大也徂朗切一蒼莽蒼麁朗切一汻姓今涇州有之呼朗切三酐苦酒鹵大也寬也怨也丘晃切三䡉䡉䡉也爌爌朗寬明也又火光三十八梗梗直也又桔梗藥名古杏切九挭挭槩大略哽哽咽郠邑名在莒綆井索鯁刺在喉又骨鯁謇諤之臣埂堤封吳人云也鯁骨鯁蟲名丙辰名爾雅云太歲在丙曰柔兆又光也明也又姓風俗通云齊有大夫丙歜兵永切九昞亮也亦作昺怲憂也邴邑名在泰山又姓左傳晉有大夫邴預又音柄炳炳煥明也秉執持又十六斗曰藪十藪曰秉又漢書有秉漢窉爾雅曰三月為窉本亦作寎又兄病孚命區詠三切苪著也蛃蛃蟲名警寤也戒也居影切八警上同景大也明也像也光也照也又姓齊景公之後後漢有景丹境界也璥玉名蟼蛙屬檠所以正弓出周禮亦作檠憼敬也影形影於丙切八璟玉光彩出埤蒼璄上同䭘飽亦作䭘摬中擊㲟毛車玉篇云刺也髙風省省署漢書曰舊名禁中避元后諱改為省中又姓左傳宋大夫省臧所景切又息井切九眚過也災也㾪瘦㾪女省減也䚇䚇腳露也府今為省字㼳㼬㼳有耳瓶渻水名亦丘名上同永長也引也逺也遐也亦姓出何氏姓苑于憬切二栐木可為笏􅩛小風許永切一皿器皿武永切三戶土穴􅰀盟也憬逺也俱永切六囧光也煚火也璟玉光臩驚走貌暻明也曲見悟也杏果名廣志曰滎陽有白杏鄴有赤杏黃杏何梗切三莕莕菜荇上同猛勇猛又嚴也害也惡也亦姓左傳晉大夫猛獲之後莫幸切六􅟑􅟑盯視貌蜢虴蜢蟲艋舴艋小船舴陟格切鱦蛙屬鄳縣名在江夏礦金璞也古猛切七礦上同古文􅜿􅜿麥䵃上同獷犬也又居往切獷平縣名在漁陽也穬穀芒又曰稻不熟濱浦名布梗切又布耕切三㑟詐偽人也急貌盯盯􅟑張梗切一瑒祀宗廟圭名長一尺二寸徒杏切又音暢一䁝清潔烏猛切三㴄㴄澋水回旋也奣六合清朗打擊也德冷切又都挺切一冷寒也魯打切又魯頂切一草金玉未成器也乎䁝切二澋㴄澋水回旋也鮩鮊魚别名蒲猛切一然舉目也苦礦切又音句一檸木皮入酒浸治風拏梗切一三十九耿耿介也又耿耿不安也又姓晉大夫趙夙滅耿因封焉遂以國為氏古幸切三芋莖也猛視貌䁅武幸切三鼆句鼆魯邑名黽蛙屬幸説文作吉而免凶也以屰從夭夭死之事故死謂之不胡耿切四見上注幸僥幸㼬㼬㼳瓶有耳俱也或作併羅列也蒲幸切四􅪓蛤􅪓蠯上同螷亦同皏皏㿣蒲貌普幸切一四十靜安也謀也和也息也疾郢切十睜眳睜不恱視也􅒷清飾靖立也思也理也審也又姓齊靖郭君之後風俗通云單靖公之後妌女人貞潔也婧上同穽坑也阱上同猙獸如狐有翼又音爭竫停安整正也齊也之郢切二俗逞通也疾也盡也丑郢切六騁馳騁又走也裎襌衣悜慏悜意不盡也䩶驂具又丑善切睈視也又意不盡郢楚地以整切三浧泥也梬梬棗似柿而小痙風強病也巨郢切二涇玉篇云寒也潁水名在汝南亦州名禹貢豫州之境春秋時沈丘也秦為潁川郡漢為汝南郡之汝隂後魏置穎州餘頃切二穎禾末也穗也又姓左傳有穎考叔領理也録也説文項也良郢切六嶺山坡也裴潛廣州記云大庾始安臨賀桂陽揭陽為五嶺與鄧德明南康記云别也阾古文柃木名可染袊衣袊禮云左執領不從衣苓草名頸項也居郢切又巨成切一餅必郢切五屏蔽也爾雅曰屏謂之樹又廣雅曰罘罳謂之屏風俗通云卿大夫帷土以廉以自鄣蔽鉼鉼金謂之鈑周禮祭五帝則供鉼金併併合和也又必姓切餅索餅出食苑頃田百畝也去潁切六頔古文㩩竟也檾枲草苘檾並上同井説文曰八家一井象􅌟韓形􅜍之象也古者伯益初作井今作井見經典省又姓薑子牙之後也左傳有井伯子郢切二邢地名廮安也又廮陶縣名在趙州於郢切五地名癭瘤也博物志云山居之人多癭疾氣滯氣請乞也求也問也謁也七靜切又疾盈疾姓二切二睛眳睛不恱目貌出字林又音精省察也審也息井切六渻説文曰少減也一曰水門又水丘前謂之渻丘睲睲睲照視惺惺悟出字林杫爼几名悟貌俗眳眳睛亡井切二慏慏悜意不盡也徎雨後徑也文井切二通也四十一迥逺也戶頂切五坰空也炯光也明也又音熲泂詩云泂酌草名熲光也又輝也古迥切八炅光也又古惠切炯火明貌又音迥滄寒㯋篋名飽煛目驚貌􆂵似蛙茗茗草莫迥切七嫇嫇奵自持也酩酩酊瀴瀴涬大水貌溟上同眳眳睛姳姳好頂頂𩕳頭上説文顚也都挺切十三上同􅨉籕文奵嫇奵耵耵聹耳垢鼎説文云鼎三足兩耳和五味之寶器禹收九牧之金鑄鼎荆山之下薡草名酊酩酊濎濎濘水貌葶葶䔭毒草靪補履又音丁打擊也又都冷切㞟展也挺挺出説文拔也徒鼎切十二艇小船鋌金鋌梃木片娗長好貌町田畝又音汀霆疾雷又音庭莛草莖又音庭涏涇寒蜓蟲名又徒典切訂平議誔詭言珽玉名説文曰大圭長三尺抒上終葵首他鼎切十二町平也脡脯朐侹長也直也代也敬也頲直也徎徑也壬善也町田塸艼葋也又秃鈴切田器小網䦐門上關阱阱濙小水貌徂醒切一濙阱濙烏迥切一謦謦咳也去挺切一𩕳頂𩕳乃挺切五聹耵聹䗿似蛙濘泥也又乃定切䔭葶䔭婞很也胡頂切七涬瀴涬大水貌魚名鋞似鐘而長脛腳脛又胡定切􅬝􅬝恨緈絓緈醒醉歇也蘇挺切二箵箵笭篝籠鞞刀室輔鼎切一褧褧衣説文檾也口迥切六檾枲屬苘上同烓行竈又烏圭切顈禪也絅衣剄斷首古挺切二烴焦臭頩斂容匹迥切一巊巊溟山水煙涬切三誣厭瀴瀴涬大水貌笭篝笭籠也力鼎切三小網冷寒也又姓前趙録有徐州刺史冷道字安義又盧打切並比也蒲迥切四並上同鮩白魚名也併立並又必姓切詗明悟了知也火迥切一䀴直視貌也五剄切二小貌四十二拯救也助也無韻切音蒸上聲五拯撜並上同見説文􅹊軺車後登出字林氶晉譙王名庱亭名在吳晉陵丑丞切又恥陵切一殑殑殑欲死也其拯切一㱡殑㱡色庱切一四十三等齊也類也比也輩也多肯切一倗不肯也普等切二剻穆天子傳云西征至剻郭璞云國名也前漢書有剻成侯肯可也説文作肯骨間肉肯肯著也一曰骨無肉苦等切二肯上同能夷人語奴等切本又奴登切一四十四有有無又果也取也質也又也又姓孔子弟子有若又漢復姓有男氏禹後分封以國為姓出史記云久切九右左右也又漢復姓五氏左傳宋樂大心為右師其後因官為氏漢有中郎右師談晉賈華為右行因官為氏漢有御史中丞右行綽何氏姓苑有右閭右扈右南等氏䳑鳥名似雉友朋友同志為友㕛上同出説文䀁器也又余救切上同栯木名服之不妬又於六切䒴草名柳木名説文作柳小楊也從木丣聲丣古文酉餘倣此又姓出河東本自魯孝公子展之孫以王父字為展氏至展禽食采於柳因為氏魯為楚滅柳氏入楚楚為秦滅乃遷晉之解縣秦置河東郡故為河東解縣人力久切十四罶魚梁上同懰好也珋石之有光璧珋也説文本音留揚風貌嬼妖美又婺矛牙婦也䉧竹聲􅔺似鼠而大又音留熮火爛瀏水淸綹十絲為綹􅬉載柩車也茆􅝀葵水草詩云言采其茆即蓴菜也又莫飽切狃相狎也女久切十一紐結也鈕印鼻又姓何氏姓苑云今吳興人東晉有鈕滔也杻木名莥玉篇云鹿豆也􅚵爾雅云貍狐貒貈迹也扭扭手轉貌習也䏔食肉地名莥蔨實亦作丑辰名爾雅曰太歲在丑曰赤奮若敕久切三杻杻械杽古文肘臂肘陟柳切四疛説文曰小腹痛上同扭扭按也又音紐朽腐也許久切四㱙上同㽱病也殠臭也久長久也舉有切七九數也又漢復姓二氏何氏姓苑云昔岱縣人姓九百名里為縣小吏而功曹姓萬縣中語曰九百小吏萬功曹列子秦穆公時九方臯一名甄菩相馬也玖玉名灸灸灼也又居又切韭説文曰菜名也一種而久者故謂之韭象形在一之上一地也俗作韭女字也亦作奺􅵩姓出纂文首頭也始也書九切六首上同百人頭象形手手足守主守亦姓出姓苑䭭人初産子醜類也竅也釋名曰醜臭也如物臭穢也又虜復姓西秦録有下將軍醜門于弟昌九切三瑞草也魗棄也惡也又市籌切湫泄水瀆也在九切又子由子小切二愀變色也又鍬小切婦説文曰婦服也從女持帚灑掃也房九切十五螽負擔也荷也又受貸不償曰負背恩忘德曰負也萯玉萯草蝜􅡂蝜阜陵阜釋名曰土山曰阜阜厚也言髙厚也廣雅曰無石曰阜上同鷂別名也偩禮云禮樂偩天地之情香草盛也亦作䧞䧞上同㷆㷆熾菩香草又步乃切􅣁鼠􅣁缶瓦器盆也史記云秦王趙王會于澠池藺相如使秦王擊缶是也詩疏云缶者瓦器也所以盛酒漿秦人鼓之以節歌方久切八缹蒸缹否説文不也又房彼切不弗也説文作鳥飛上翔不下來也從一一天也象形又甫鳩甫救二切鴀䳕鳩痞病也殕物敗也好色也糗乾飯屑也孟子曰舜糗飯茹菜又姓風俗通漢有糗宗為嬴長去久切一蹂踐也人九切十楺屈木煣上同輮車輞沑説文曰水吏也又溫也􅚵獸迹又女九切葇葇䖆菜不切也禾韖車軔粈粽粈舅夫之父也亦母之兄弟又姓左傳秦大夫舅犯其九切十一咱説文毀也臼杵臼丗本曰雍父作臼又姓左傳宋華貙家臣臼任齨齒齨亦馬八歲俗作麔牝麋䳔鳥名似鳩有冠咎愆也惡也過也災也從人各各者相違也䊆糗米病也怨咱毁也紂殷王號也方言云自關而東謂緧曰紂俗作除柳切六䈙竹易根而死也鮦銅陽縣在汝南又直蒙切葤裹也棸姓也襄州有之又音籌小腹痛又腿後酉飽也老也就也首也又辰名爾雅曰太歲在酉曰作噩又姓魏有酉牧與久切二十一丣古文誘導也引也教也進也説文曰相誅呼也誘上同並見説文牖道也向也説文曰牖穿壁以木為交窗也禮曰蓽門閨竇蓬戶甕牖卣中形樽又音由槱積木燎以祭天地上同莠草也羑羑里文王所囚處人有羑水並在陽隂又姓也庮久屋木也周禮曰牛夜鳴則庮鄭司農曰庮朽木臭也蜏朝生暮死蟲名㝌字書云貧病也説文云言意也琇玉名又音秀梄柞梄木遺也輶輕車又音由酒水名受俗納也承也盛也得也繼也殖酉切五壽壽考又州名楚孝烈王自陳徙都壽春號曰郢秦為九江郡魏為淮南郡梁為南豫州周為揚州隋平陳為壽州亦靈壽木名生日南又姓王莽兖州牧壽良又漢復姓前漢燕王遣壽西長之長安蘇林云壽西姓也又承呪切􅗪水名在蜀亦地名也璹玉名又音孰綬組綬禮云天子玄公侯朱大夫純丗子綦士緼應劭漢官曰綬長一丈二尺法十二月廣三尺法天地人也滫溲麵説文曰久泔也息有切四糔糔溲醙白酒絆前兩足又相主切䬀䬀瀏於柳切三䱂魚名懮懮受舒遲貌酒酒醴戰國䇿曰帝女儀狄作而進於禹亦云杜康作元命包曰酒乳也又酒泉縣在肅州胸奴傳云水甘如酒因以名之亦姓也子酉切一􅘞􅘞麵亦作溲踈有切一帚少康作箕帚之九切五帚俗鯞鱖鯞魚名晭明晭猛獸𢠲小怒芳否切三紑鮮也又孚丘切霧掫持物相著側九切三搊搊扇別名蟲名聚名士九切一束初九切二上同秠爾雅曰一稃二米此亦黑黍漢和帝時任城生黑黍或三四實實二米得黍三斛八斗是芳婦切又匹几孚悲二切一四十五厚厚薄又重也廣也説文作曰山陵之也又姓出姓苑胡口切七垕古文後先後説文遲也又胡豆切古文后君也又姓漢有少府后倉又音候郈鄉名在東平又姓左傳魯大夫郈昭伯㖃欲吐又呼后切母父母老子注云母道也蒼頡篇云其中有兩點象人乳形豎通者即音無莫厚切十四牡牝牡某詔前人之言也拇大拇指也胟上同畝司馬法六尺為步步百為畝秦孝公之制二百四十步為畝也畝畞並古文莽草莽􅳎猦􅳎獸名病踇踇偶山名􅡑行貌鵡鸚鵡能言之鳥又音武部署也又姓出姓苑蒲口切十培培塿小阜或作培犃犃㸸偏髙又牛頭短䏽豕肉醬瓿瓿甊小罌瓿小缶䴺䴺􅲑餅篰牘也蔀蔀菜魚薺也易云豐其蔀王弼曰蔀覆曖鄣光明之物又音剖婄婦人貌又音剖斗説文作十升也有柄象形石經作斗當口切八斗俗枓柱上方木蚪蜊蚪蟲也陡陡峻陡上同抖抖擻舉貌襡衣袖又音蜀􅲑䴺􅲑天口切九飳上同妵人名左傳有華妵説文女字也黈冕前纊也水鳥黑色又大口切蘣好貌又木苖出斢斢㪹兵奪人物出字書鈄姓出姓苑䱏魚名苟苟且又姓出河內河南西河三望國語云本自黃帝之子漢有苟參古厚切十三玽石似玉狗狗犬垢塵垢笱笱屚縣名在交址又魚笱取魚竹器上同耇耇老壽也詬詬恥也又呼候切枸枸𣏌茩薢茩岣岣嶁山巔扣打也豿熊虎之子藕爾雅曰荷芙蕖其根藕五口切六蕅上同偶合也匹也二也對也諧也耦耦耕也亦姓風俗通云宋卿華耦之後漢有侍中耦嘉髃肩前髃也㼴盎名㨐衣上擊也方垢切二掊擊也㝅乳也乃后切六㳶説文水也陾衆陾㛘女肥貌啂啂食物出新字林小貌叟老叟蘇后切十五叟上同上同亦從叟餘倣此嗾使大聲上同􅸴瞽􅸴舜父訹誘辝擻抖擻舉也藪藪澤爾雅有千數魯大野晉大陸秦楊陓宋孟諸楚雲夢吳越具區齊海隅燕昭余祁鄭圃田周焦護又十六斗田藪籔漉米器也字林云聰揔名也廋廣雅云隈也棷薪也駷馬搖銜走又思隴切橾車轂中空吼牛鳴呼后切七吽上同詬亦同㸸夔牛子也上同蚼蚍蜉名也又渠俱切㖃厚怒聲剖判也破也普后切五婄婦人貌蔀小席又音部䳝䳝雀名䯽髮貌歐吐也或作嘔烏后切又烏侯切七嘔上同毆歐擊也俗作驅㸸特牛又吼口二音􅖘山名在溧陽縣塸聚沙䙔涎衣也又於侯切塿培塿郎斗切十嘍連嘍煩貌又力侯切簍籠也周禮作簝甊瓿甊罌􅞻􅢑􅞻糫餅嶁文字音義云山巔也㪹斢㪹兵奪人物出新字林嘍謰嘍小兒語又力侯切漊溝通水漊也耬耕畦走趨也子苟切又音奏一口説文曰人所以言食也亦姓今同州有之苦后切九扣扣擊也亦作叩㸸犃㸸上同扣金飾叩叩頭噭先相噭可鄉名竘健也又驅甫切䕆圎草褥也徒口切六酒器也或作鍮水盥貌也説文同上揄揄引水鳥又他口切襡短衣鯫魚名一曰姓漢有鯫生又淺鯫小人仕垢切又七溝切一趣趣馬書傳云趣馬掌馬之官也倉苟切又七屢切三取又七庾切棷棨也又側溝切四十六黝黑也於紏切又於夷切七怮憂貌䬀䬀瀏風聲又於柳切蚴蚴蟉龍貌泑崑崙山下澤也眑幽靜之貌愁貌糾督也恭也急也戾也俗作糾居黝切四赳武貌詩曰赳赳武夫朻爾雅曰朻者聊又居幽切􅍐􅍐取貌蟉蚴蟉龍貌渠黝切一四十七寢室也卧也七稔切九􅤑上同見説文寢上同見經典梫木名桂也㾛㾛痛又貌醜也説文曰病卧也覆也鋟爪刻鏤版又子廉切䤐小甜朕我也秦始皇二十六年始為天子之稱直稔切六古文鰧魚名似蝦赤文出廣雅螣螣蛇栚説文曰槌之橫者關西謂之㯢顩顩頥醜貌坅坎也丘甚切一廩倉有屋曰廩力稔切八廩上同懍敬也畏也菻菻蒿凜寒凜顲顲然作色貌火舒癛粟體罧積柴取魚斯甚切二伈伈伈恐貌踸踸踔行無常貌丑甚切三鍖鍖銋䫖䫖噤自愞劣貌䤐小甜也子朕切四漸也漬也又子鴆切䭙濕通上也􆂋􆂋脣病也荏菜也又荏苒如甚切十四飪熟食飪上同䭃亦同又玉篇云飽也稔年也亦歲孰廣雅曰稔秋榖熟也栠木弱貌恁念也袵文字音義云臥席也飪肉汁䇮字書云單席棯果木名爾雅云還味棯棗􅥷稍甚銋鍖銋腍味好枕枕席又姓出下邳章荏切又之賃切三䪴頭骨後䫬頭鋭長也沈國名古作邥亦姓出吳興本自周文王第十子聃季食采於沈即汝南平輿沈亭是也子孫以國為氏式任切又丈林切十四邥古文寀説文曰悉也知寀諟也審詳審也説文同上亦姓漢有辟陽侯審食其㰂木名山海經云煮其汁味甘可為酒瞫竊視又姓後漢書云武落鍾離山有黑穴出四姓瞫氏相氏樊氏鄭氏也諗告也謀也深諫也又知甚切鱗大魚魫魚子淰淰㴸水動也禮運曰龍以為畜故魚鮪不淰淰之言閃也㜤志下瞬瞚也大魚草名椹説文曰桑實也食荏切二上同俗又作椹椹本音砧甚劇過也説文曰尤安樂也常枕切二諶信也又市林切瀋汁也昌枕切一墋土也初朕切三醦酢甚磣食有沙磣拰拰搦尼凜切一噤寒而口閉渠飲切四噤切齒怒也凚玉篇云寒極也吟説文云口急也錦釋名曰錦金也作之用功重其價如金故字從金帛居飲切一菌菌生木上慈荏切一僸仰頭貌牛錦切又音禁二趛低頭疾行㾕寒病踈錦切三瘮上同槮木實名也稟供穀又與也筆錦切一飲説文曰啜也於錦切三飲上同大水至又於感切品官品又類也衆庶也式也法也二口則生訟三口乃能品量又姓出何氏姓苑丕飲切一醜貌欽錦切二顉曲頤之貌又五感切廞大喪囊也許錦切又義今切一戡少斫也張甚切又音堪二㱽深擊説文曰下擊上也潭潭濼水動搖貌以荏切又徒南切一醜貌士㾕切一四十八感動也古禫切十一竹名亦作篢鱤魚名灝豆汁贑水名在南康又音紺䤗酒味淫也贛水名在豫章㔶方言云箱類又云覆頭也又音貢薏苡䃭石篋見封禪議贛水名禫除服祭名徒感切十六䊤糝䊤滓也霮霮䨴雲貌黮黭黮雲黑又他感切窞坎傍入也易曰入于坎窞髧髮垂萏菡萏荷花未舒􅣿上同倓安也竈突説文深也徐視醰長味嘾莊子曰太甘而嘾説文曰含深也贉買物先入直也談大也又姓木名暗暗藹暗也冥也烏感切九黭黭黮掩手覆唵手進食也隌隌暗罯魚網黤青黑色也㞄㞄跛又蹇也大水至腩煮肉奴感切六湳水名在西河又姓䈒竹弱羽弱揇揇搦萳草長弱貌襑衣大他感切五醢亦作醓醓肉汁嗿衆聲黮黭黮黑也又徒感切歜昌蒲葅徂感切四㣅弓弦㣅又作鱗大魚又才枕切㔆㔆又割翦出也慘憾戚也説文毒也七感切八憯痛也朁説文曽也黲暗色説文曰淺青黑也又倉敢切㜗説文婪也傪好貌又音平聲噆銜也又子盍切䫩顉䫩搖頭又素慘切顉顉䫩五感切三媕含怒貌嵁嵁崿山形姓也子感切三寁速也撍手動糂羹糂墨子曰孔子厄陳藜羮不糂也或作糝桑感切八糝上同糣糣䊤滓也顉㧲撼㧲搖動也槮郭璞云叢木於水中魚寒入其裏因以箔取之䫩顉䫩搖頭貌粽蜜藏木瓜坎險也陷也又小罍也形似壷苦感切十歁食未飽也惂憂困也又恨也輡輡􅸫車行不平錎字書云瑣連鐶也轗轗軻多迍坎坎陷顑顑顲瘦也竷舞曲名臽小穽名也頷漢書曰班超虎頭燕頷説文曰面黃也胡感切十六頜説文曰顄也害惡姓也撼撼動也淹水和泥或作菡菡萏欿欲得蜭爾雅云蜭毛蠹涵水入船又胡南切肣牛腹又音含説文曰嘾也草木之華未發函然象形嘾乳汁狀出莊子壅耳莟花開顄頥也又胡南切􅾉􅾉崿壈坎壈盧感切八燣黃焦􅸫輡􅸫浨藏梨汁也出字林醂桃葅顲靣黃醜説文曰靣顑顲也又力稔切貌漤鹽漬果黕滓垢也黑也都感切十耽虎視又丁含切玉篇云多也又丁含切衴埤蒼云被緣也䪴顲䪴醜也井姓也瓭瓦屬抌刺也擊也也音由針箱屬又作上同䫲食不飽呼唵切一四十九敢勇也犯也説文作進取也古覽切七上同籕文古文橄橄欖果木名出交址澉澉䭕無味䇞竹名實中㴸果決勇也賞敢切一覽視也又姓何氏姓苑云彭城人盧敢切六爁火爁攬手攬取攬上同欖橄欖罱罱網􅫠説文曰雚之初生一名薍一名隼吐敢切八菼上同緂青黃色説文充三切白鮮衣貌􅢹上同毯毛席􅣞毳衣説文曰帛騅色也引詩曰毳衣如􅣞裧俗􅫏􅫏崯也又五今切膽肝膽都敢切六紞冕前垂也説文曰冕冠塞耳者䃫石䃫藥名出玉篇黵大汚垢黑莐􅙛莐藩又音沈􅦵應福鳥名噉噉食或作啖又姓前秦録有將軍噉鐡徒敢切八啖上同啖上同淡淡淡水貌淡音琰又恬靜又徒濫切竹名淡淹淡水滿貌又薄味也又徒濫切憺安緩又徒濫切惔上同黲日暗色倉敢切一㛧鄉名在河東徛氏縣亦作㛧謨敢切二吳人呼哺貌也䭕澉䭕子敢切一槧削版牘才敢切又七廉切七豔切四鏨鏨鑿也又音慙嵌開張山貌出蒼頡篇嵌上同喊聲也呼覽切四嚂上同土之之堅也㯺上同周禮注云強㯺地之堅者又音檻埯坑今之窊掩是烏敢切二掩手掩物也􅫏􅫏嶮側穴口敢切二䖔甝屬五十琰玉名周禮曰琰圭九寸以冉切十一剡削也利也亦姓又時冉切疾行棪木名實似奈可食焰焰焰火𥘉著也淡淡淡水貌又徒敢切扊扊扅戶壯所以止扉或作剡移淹㶘淹水滿夵上大下小䎦䎦耜䌪續也斂收也又姓姚秦録有輔國將軍斂憲良冉切十三撿説文拱也蘞白蘞藥名又力瞻切蘞上同瀲瀲灎水溢貌或作澰獫犬長喙也又音險溓薄冰也嬚女字䭑廉也又小食也羷羊角三觠羷也䌞懸𧖟簿也㰈善美之名㯬功勤之稱險危也阻也難也虛檢切八獫獫狁玁上同㛍㛍姱性不端良又棄業切少氣也譣譣詖説文息廉切問也憸憸詖又息廉切胡被又音杴嶮嶮巇貶損也方斂切二􅵘説文曰傾覆也或同上颭風吹落水占琰切一顩不平丘檢切二嵰山髙顩顩魚檢切七廣因巖為屋隒山形似重甑嬐嬐然齊也噞噞鰅魚名出樂浪嶮嵰嶮山不平噞噞喁魚口上下貌儉約也少也飢饉也又姓出姓苑巨險切二芡説文云雞頭也方言曰南楚謂之雞頭北燕謂之䓈青徐淮泗之間謂之芡檢書檢印窠封題也又檢校俗作檢檢本音斂又姓出姓苑居奄切二瞼眼瞼黶靣有黑子於琰切八􅓙檿山桑厭厭魅也又於豔切魘睡中魘也又於協切厴蟹腹下厴擪持也又一牒切酓酒味苦也冉冉冉行貌又姓孔子弟子冉有而琰切十姌長好貌也又奴簟切苒草盛貌又荏苒猶展轉也染染色周禮染人掌染絲帛又姓石勒時有染閔濡也䎃䎃弱羽也柟木名䣸䣸味薄竹弱之貌諟也陜縣名在弘農亦州名周為二伯分陜之地即虢國之上陽也秦屬三川郡漢弘農之陜縣後魏改為陜州失冉切八睒暫見閃出門貌蕃姓亦作貧覢蒼頡篇云覢覢視貌㴸水動貌夾盜竊懷物不媚諂諂諛丑琰切二讇上同奄忽也止也藏也取也遽也説文覆也大有餘也又姓左傳秦三良奄息衣儉切十七雲狀䣍國名㭺㭺奈閹閹閽掩閉取也説文云斂也小上曰掩掩説文曰自關以東謂取田掩一曰覆也裺衣縫緣也暗暗暗日無光淹雲雨貌詩云有淹淒淒罨鳥網又於劫烏合二切弇蓋也掩也媕女有心媕媕也屋雀也山弇山弇嵫山日沒處掩光又於葉切漸漸次也進也稍也事之端先覩之始也地理志有漸江今之浙江也慈染切十礹蔪説文曰草相蔪苞也埤蒼曰麥秀貌䟅説文進也饞小食又初咸切䤔䤔䣸味薄鏨小鑿名螹説文曰螹離也槧説文曰牘朴也憸憸詖七漸切二䤘醋味食薄味也子冉切一脥腹下謙琰切一剡縣名屬會稽時染切一五十一忝辱也他玷切五䄼鄉名在濟北蛇丘縣栝説文云炊竈木也銛取也又鍤屬又音纖悿悿弱淰水流貌乃玷切四㜤弱也亭名在鄭姌纖細又音冉點點畫多忝切五玷玉瑕􅫎老人面黑子㓠斫䍄説文缺也簟竹席徒玷切六扂閉戶上同驔驪馬黃脊㶘㶘滔水滿橝屋梠名又音潭嗛猿藏食處苦簟切四歉食不飽又苦減切慊慊恨膁腰左右虛肉處稴禾稀力忝切三溓薄水瓜名鼸鼠名胡忝切二㺌犬吠又胡斬切憯憯悽青忝切又七感切一孂竦身貌兼玷切一􅶦腦蓋也俗作明忝切又亡犯切二厸張口五十二儼敬也説文曰昂頭也一曰好貌魚掩切七廣因巗為屋􅿠掩􅿠癡堆陖堆礹礹齊曮日行欦欠崖丘廣切三醜䇜小竹埯土覆於廣切二翳五十三豏豆半生也下斬切八減減耗又古斬切㺝大齧物聲喊喊聲㺌犬吠不止健貌塗也甉瓦屋湛水貌又沒也安也亦姓後漢有大司農湛重徒減切又直心切三古文偡偡然齊整㦿牖也一曰小戶苦減切七􅢯􅢯􅢯意不安也歉食不飽撖撖危䫡靣長不安槏牖傍柱也鹼鹵也古斬切又七廉切四鹻鹹也減損也又姓漢有減宣竹名出玉篇瀺瀺灂士減切三嶄髙峻又士減切嵁嵁絶山貌臉臉䑎羮屬也力減切二醶醶䤘醋味斬周禮曰秋官掌戮掌斬側減切一䑎初減切二䤘酢味闞虎聲火斬切又苦暫切二欦笑也摻攬也詩曰摻執子之袪兮所斬切四㺑㺑㺝犬吠又山檻切醦醋味芟林木也黯黯然傷別貌説文云深黑也乙減切一喊聲也呼豏切一􅞍捕魚網也女減切三上同淰水無波也又乃玷切癡也丑減切二旵日光照也五十四檻闌也説文曰攏也一曰圈胡黤切十艦禦敵船四方施板以禦矢如牢壏堅土䊤也㔋利也濫泉正出也又盧暫切網車轞車聲㺝惡犬吠不止也撖姓也姓苑云今河內有之䫡長面貌丘檻切又五減切一㨻斬取山檻切二㺑㺝㺑犬聲黤靑黑色於檻切二黑敢黃黑敢人名説文曰黑敢者忘而息也醶酢漿初檻切一㺖小犬吠荒檻切二豃開險貌巉峻巉貌仕檻切一五十五范姓也出南陽濟陽二望本自陶唐氏之後隋會為晉大夫食采於范其後氏焉防錽切六範法也常也式也前也軓説文云車軾前也周禮曰立當前軓笵説文云法也從竹竹簡書也犯干也侵也僭也勝也􅢮蜂也案禮云范則冠而蟬有緌字不從蟲錽馬首飾西京賦云金錽鏤錫亡范切三􅶦腦蓋也俗作又明忝切刃也今河東謂淫腫為府犯切一凵張口貌丘犯切二㧄以手㧄物釩釩拂峯犯切一行丑犯切二足望廣韻上聲卷第三
