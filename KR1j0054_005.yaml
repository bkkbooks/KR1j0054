front:
  text: 廣韻入聲卷第五烏谷屋第一獨用烏酷沃第二燭同用之欲燭第三古嶽覺第四獨用之日質第五術櫛同用食律術第六阻瑟櫛第七文弗物第八獨用許訖迄第九獨用魚厥月第十沒同用莫勃沒第十一胡葛曷第十二末同用莫割末第十三胡八黠第十四轄同用胡瞎轄第十五先結屑第十六薛同用私列薛第十七以灼藥第十八鐸同用徒各鐸第十九莫白陌第二十麥昔同用莫獲麥第二十一私積昔第二十二先擊錫第二十三獨用之弋職第二十四德同用多則德第二十五七入緝第二十六獨用胡閣合第二十七盍同胡用臘盍第二十八與涉葉第二十九帖同用他協帖第三十侯夾洽第三十一狎同用胡甲狎第三十二魚劫業第三十三乏同用房法乏第三十四一屋舍也具也淮南子曰舜築牆茨屋風俗通曰屋止也亦虜復姓後魏書官氏志云屋引氏後改為房氏烏谷切七籀文古文剭鄭玄注周禮云剭誅謂所殺不於市而以適甸師氏又音握􅪧地名墨刑名又音楃䑁䑁膏肥貌獨説文曰犬相得而鬪也羊為羣犬為獨一曰獨𤞞獸名如虎白身豕鬛馬尾出北嚻山𤞞音欲亦單獨又虜復姓有獨孤氏後魏書云西方獨孤渾氏後改為杜氏徒谷切三十黷垢也蒙也黑也讟謗讟髑髑髏髑上同殰殤胎讀讀誦櫝函也又曰小棺牘簡牘儥見也動也又音育㾄字書云怨痛也贕卵敗碡碌碡田器䢱遦也䮷騼䮷野馬皾滑也獸名如鼠襡襡韜藏又音蜀韣弓衣又之蜀切瓄圭名瀆説文曰溝也一曰邑中溝爾雅曰江河淮濟為四瀆􅭖説文曰通溝以防水豄古文韇箭筒嬻媟慢犢牛犢􅨰􅨰鳥也罜罜䍡魚罟㒔㒔㑛短醜貌櫝櫝匱榖五榖也又生也祿也善也説文曰續也百榖之總名今經典省作榖餘從殼者並同古祿切十七穀俗轂車轂榖木名瀔水名谷山谷亦善也窮也又姓漢有谷永又欲鹿二音瑴玉名又音角布鳥按爾雅只作榖殐死貌出廣雅鼠名䜼豆名多也䐨足跗𤞞獸如赤豹五尾又音欲動目䀰大目唂鳥名又作唃縠羅縠胡谷切十四槲木名斛十斗又虜復姓二氏後魏有尚書斛斯延齊有丞相咸陽王斛律金􅕪螻蛄水菜可食礐説文云石聲也觳周禮注云受二斗又苦角切蔛石草酒濁穀水聲䶜齒聲㽇瓦壞䈸箱䈸焀火貌哭哀聲空谷切八䍍朱燒瓦㲉卵也餅麴䧊大阜䵈枲未績者玨土墼麻秃説文云無髮也從人上象禾粟之形文字音義云蒼頡出見秃人伏於禾中因以制字又國語云史伯曰祝融之後八姓已董彭秃妘曹斟芉是也又虜復姓有秃髮氏其先壽􅞔之在孕其母胡棭氏因寢而産於被中朝鮮謂被為秃髮囚而姓焉秃髮烏孤以後魏元興元年稱王遷于樂都號涼及國滅入魏賜姓源氏他谷切五籀文䛢詆䛢狡猾杖指鵚鵚鶖烏也豰豰榖丁木切八啄啄木鳥豚尾下竅也俗衣至地也説文音斫擊聲竺竺厚剢刀鋤速疾也召也戚也徴也桑谷切十八遬籀文􅩼古文蔌郭璞云菜茹之揔名也詩云其䔩繼何傳謂菜肴也餗鼎實􅻶説文同上䗱蟲樕槲樕木豰動物豰丁木切㑛㒔㑛又音束梀赤梀木名麋鹿迹也藗白茅也殐殐嗽吮也多也棴棴常樹名涑水名在河東祿俸也善也福也録也又姓紂子祿父之後盧谷切四十七鹿獸名國語曰周穆王征犬戎得四白鹿四白狼而荒服不至又姓風俗通云漢有巴郡太守鹿旗漉滲漉又瀝也説文浚也一曰水下貌渌説文同上觻觻得縣名在張掖睩視貌䚄笑視龣東方音􅪀􅪀轤圎轉也或作樚轆上同㼾㼾甎􅑳舟名琭玉名老子曰琭琭如玉注云琭琭喻少簏箱簏説文云竹髙篋也籙説文同上螰䗱螰蟲蟪蛄也䍡罜䍡麓山足榖梁曰林屬於山曰麓麓古文碌多石貌盝去水也瀝也竭也或作漉􅜷上同騼野馬碌碌碡又音六逐簶弧簶箭室也出音譜䎼䎼聽似蜥蜴居樹上輒下囓人上樹垂頭聽聞哭聲乃去出字林谷漢書胸奴傳有谷蠡王蠡音離娽埤蒼云顓頊妻名説文云隨從也史記毛遂入楚謂十九人白公等娽娽可謂因人成事耳又力玉切案史記亦作録眼淨也摝振也周禮曰摝鐸鄭玄云掩上振之為摝祭也捕魚具也吳王孫休三子名白獸廘賈逵曰廘庾也角角里先生漢時四皓名又音覺見鬼録本也亦刻木也濼水名又音朴鏕巨鏕郡名案漢書只作鹿趢趢趗局小䎑水上飛也􅣗車聲㪖㪖聲􅻫大雨蔍蔍蔥草鄜地名嗀歐聲呼木切七豰獸名似豹而小食彌猴又名黃腰案説文作𧹲犬屬腰巳上黃腰巳下黑食母猴熇熱貌􅌜羮􅌜又火各切日出赤貌𧹲上同嚛大啜聲族宗族昨木切三銼銼􅟋釡屬鑿鑿鏤花葉又音昨瘯瘯瘰皮膚病也千木切六鏃碌鏃石貌蔟𧖟蔟又千候切趗趢趗局小貌梀短椽説文丑録切簇小竹鏃箭鏃作木切二鎐姓也出彭城暴日乾也蒲木切十二曝俗瀑瀑布水流下也䗱䗱蟲名㲫㲢㲫毛不理也朴爾雅云朴􅈪心又音卜僕侍從人也僕古文短人又倉候切菐瀆業行貌穙穙也撲打也普木切十一醭醋生白醭濼齊魯間水名左傳云公會齊侯于濼墣説文云塊也又匹角切草生穊也鼠名攴擊也凡從攴者作攴同撲拂著骲骨鏃名也淺黲黑也䴆鳥也卜卜筮龜曰卜著曰筮又姓孔子弟子卜商博木切十四濮水名出陳留郡入巨野亦州名古昆吾之墟左傳齊桓公會諸侯於鄄今鄄城縣是後漢獻帝時兖州刺史治於此後魏為濮陽郡隋初置濮州又姓出何氏姓苑䧤彭䧤蠻夷國名轐車伏免昌意妻也朴棫朴叢木又音僕朴樕小木也獛獛銘南極之夷尾長數寸巢居山林出山海經蹼足指間相著爾雅云鳧鴈醜其足蹼纀爾雅曰裳削幅謂之郭璞云削殺其幅深衣之裳襆上同鬚髯䪁䪁絡頭繩鳪鳪雉􅖂鳥􅖂水鳥似鶂而短頸腹翅紫白背上緑色又音剝木樹木説文曰木冒也冒地而生東方之行又姓木華字玄虛作海賦莫卜切十三沐沐浴説文曰濯髮也禮記曰頭有創則沐又姓風俗通曰漢有東平太守沐寵又漢復姓有沐簡氏何氏姓苑云今任城人朷朷桑毣思貌一曰毛濕也鶩鳧屬霂霡霂車轅名也㡔轅上絲也蓩毒草艒小艖鞪説文曰車軸束也楘屋架五楘詩曰五楘梁輈傳云楘歷録也蚞螇蚞蟲福德也祐也方六切十七腹腹肚復重衣幅絹幅又姓也輻車輻優葍葍爾雅曰葍蕾攴葍􅦣茅蝠説文曰蝙蝠伏翼也崔豹古今注云一名仙鼠實竹鍑説文云􅼤而大口者或作鍢又音富鶝戴勝別名踾踾踧聚貌輹車軸縛也菐瀆菐逼逼陽宋國楅束以木逼於牛角不令抵觸人草名伏匿藏也伺也隱也歷也釋名曰伏者何金氣伏藏之日金畏火故三伏皆庚日又姓出平昌夲自伏犧之後漢有伏勝文帝蒲輪徴不至房六切三十三復返也重也亦州名古竟陵縣春秋時屬楚秦屬南郡隋為江陽郡或德初為復州虙古虙犧字説文云虎貌又姓虙子賤是也服服事亦衣服又行也習也用也整也亦姓漢有江夏太守服徹古文茯茯苓馥香氣芬馥鵩不祥鳥鞴韋囊步靫蕧旋蕧藥名輹車輹免上同澓澓流又姓漢宣帝時有東海澓仲翁椱織椱卷繒者洑洄流箙盛弓弩器上同􅕈車笭間皮篋也音譜云病重發也鶝即戴勝也􅤻馬也􅠈地窒棴木出昆崘山也㚆行故道也説文作㚆畐滿也車具鞴並上同蔔蘆蔔菜也匐匍匐伏地貌又蒲北切鰒海魚名見鬼貌栿梁栿縮斂也退也短也亂也所六切十三莤説文曰禮祭束茆加于祼圭而灌鬯酒是為莤象神歆之也一曰榼上塞也風聲趜體不伸也趜渠六切樎馬櫪謖起也䎘鳥飛㩋擊聲蹜文字義云烏鵲醜其飛蹜在腹下也摍抽也顔叔子納鄰之嫠婦執燭燭盡摍屋以繼之蝍蚇蠖摵到也又子六切謏小也又蘇了切六數也力竹切二十二陸髙平曰陸又髙也厚也亦陸離參差也又姓出吳郡河南二望夲自古天子陸終後戮刑戮説文殺也爾雅病也戮上同勠勠力併力也又音留稑穜稑先種後熟曰穜後種先熟曰稑穋上同鵱鵱鷜野鵝蓼蓼莪詩傳云蓼長大貌上同􅳟􅳟良健馬鯥魚名似牛蛇尾出山海經蔏碌碌碡饘也鞫法用亂髮踘踘踏也間木名尼也泦水文趜困人又巨竹切麴麴蘖又姓出西平漢有麴演驅掬切五上同説文曰酒母也上同鞠姓也又居六切曲脊又渠六切熟成也殊六切八孰誰也淑善也孰門側堂崔豹古今注云臣來朝君至門外更詳熟所應對之事孰之言孰也上同璹玉名婌後宫女官名䃞石聲俶始也厚也作也動也昌六切五柷柷敔祝作樂也俗作拀又音祝琡璋大八寸曰琡又音祝踧至也埱氣出於地一曰始也育養也長也余六切二十四育稚也本亦同上鬻賣也亦作粥亦姓周有鬻熊為文王師案説文鬻夲音麋饘也粥上同説文鬻也䋭青經白緯䋭陽所織賣也重也長也動也説文衒也或作儥儥上同棛車覆欄也錥鵭錥溫器煜火光又耀也焴上同昱日光蒮爾雅云蒮山韭淯水名出攻離山蜟復蜟蟬未蛻者出論衡兩手捧物説文音掬堉地土肥也喅音聲生田􅻂望也又目明也逳步也轉也行也草名蘛茂也驧馬跳躍也説文曰馬曲脊也渠竹切十二上同趜趜趗䱡魚名鵴鵴鳩鳲鳩又音菊上同鞠踏鞠以革為之今通謂之毬子又菊麴二音毱皮毛丸也䗇説文曰䗇鼀蟾蜍以脰鳴者也踘踘踏也䜯谷名在上艾曲脊貌鼀䗇鼀七宿切三蹴踏蹴殧殄也肉骨肉如六切俗作宍三衄鼻出血俗作􅗮又尼六切鮞魚子一曰魚名粥糜也之六切五喌呼雞聲亦作咮祝巫祝又太祝令官名周禮曰太祝掌六祝之辭以事鬼神祈福祥求永貞亦貞亦音呪又姓後漢有司徒中山祝恬柷柷敔又音俶又爾雅曰柷州木髦柔英本亦作祝琡璋大八寸又音俶叔季父亦姓左傳魯公子叔弓之後光武破虜將軍叔壽又漢復姓二氏後漢有犍為叔先雄左傳魯有大夫叔仲小式竹切十三倏青黑繒倐倐忽大走疾也透驚也又他豆切虪爾雅云虪黑虎又音育跾疾也長也鮛爾雅曰鮥鮛鮪郭璞云鮪鱣屬也大者名王鮪小者名鮛鮪掓拾也疾也翛飛疾之貌又音蕭叔豆也菽上同㶖水波蓄蓄冬菜也許竹切又切六切十稸上同畜養也説文曰田畜也淮南子曰玄田為畜又丑六許救二切上同説文云魯郊禮畜從田從兹兹益也㜅媚也鄐晉邢侯邑又姓漢有鄐熙為東海太守荲羊蹄菜又丑六切蓫上同慉起也詩云不我能慉􅰮細視竹説文作冬生草也象形下垂者箁箬也史記曰渭川千畝竹其人與千戶侯等亦姓本薑姓封為孤竹君至伯夷叔齊之後以竹為氏今遼西孤竹城是後漢有下邳相竹曽張六切六竺天竺國名又姓出東莞後漢擬陽侯竺晏本姓竹報怨有仇以胄始名賢不改其族乃加二字以存夷齊而移於琅邪莒縣也又冬毒切厚也俗作笁築築似箏十三弦髙漸離善擊築説文曰以竹為五弦之樂也又爾雅曰築拾也又音逐水名築搗也古文茿萹茿也似藜赤莖生道傍可食蹙迫也促也近也急也子六切十七踧踧踖行而謹敬􅠸蝍􅠸蚇蠖也説文嗼也本音寂嘁嘁咨慙也噈歍噈口相就也摵到也槭木可作大車輮殧也􅩃取氣貌説文本才六切歍􅩃也笪也縬縮也又縬文也又側六切欻悲貌䐚膏澤也顣顣頞鼻頥促貌䙘好衣貌蹴踏也又七六切珿齊也初六切六矗直貌又敕六切􅐅廉謹貌衆也出字統或作閦小豆䎌飛貌肭朔而月見東方謂之縮肭女六切八恧慙也上同忸忸怩衄鼻出血又挫也又音肉䖡䖡􆀋即蚰蜒也䂇刺也沑蹜沑水文聚縬縬文也側六切二塞也蝮蝮蛇又姓乾封元年改武惟良為蝮氏芳福切八覆反覆又敗也倒也審也又敷救切蕧蕧盆草又音服􆃹廣雅曰假髻也副剖也又甎救切㙏地室􅠈上同葍葍舊草名又音富郁文也亦郁郅縣在北地又姓魯相有郁貢又虜三字姓二氏後魏書云蠕蠕姓郁久閭氏又北方郁原甄氏後改為甄氏於六切二十戫有文章也彧上同燠熱也又音奧栯栯李又音有俗作栯噢噢咿悲也墺墺襄䐿鳥胃薁櫻薁澳隈也水內曰澳隩上同又音奧䉛可以漉米愁貌􆄘姓出姓苑羔裘之縫又于逼切稶黍稷盛貌懊貪也愛也又音奧㰲吹氣也喉聲溫器肅恭也敬也戒也進也疾也又州名古月氏國地漢胸奴昆邪王殺休屠王并其衆來降遂置酒泉郡後魏以酒泉為甘州隋分福祿縣置肅州亦姓出姓苑息逐切二十三宿素也大也舍也説文作宿止也左傳曰一宿為舍再宿為信又姓風俗通云漢有鴈門太守宿詳又虜復姓後魏未有賊帥勤宿明達又虜三字姓後魏書宿六斤氏後改為宿氏又息救切蓿苜蓿史記云大宛國馬嗜目蓿漢使所得種於離宫夙早也説文作早敬也從丮持事雖夕不休早敬者也丮音戟又姓魯大夫季孫夙之後並古文出説文玊朽玉又琢玊工又姓後漢有玊況字文伯光武以為司徒鷫説文曰鷫鷞也五方神鳥也東方發明南方焦明西方鷫鷞北方幽昌中央鳯皇上同蟰蟰蛸俗呼喜子詩曰蟰蛸在戶又音蕭驌驌騻馬名䎘䎘䎘鳥羽聲又音縮風聲鱐魚臘䃤黑砥石又音篠朽玉又姓也潚深淸也亦姓漢有潚河橚木長貌㩋擊也䑿艒䑿船名㑉傗㑉不伸璛姓也㪩打也目釋名曰目默也默而內識也説文曰人眼象形重童子也莫六切十一睦親也敬也又和睦也亦西胡姓穆和也美也敬也厚也淸也又姓漢有穆生苜苜蓿蓿見爾雅注牧養也放也使也察也司也食也説文曰養牛人也又姓風俗通云漢有越嶲太守牧稂㙁㙁野殷近郊地名古文尚書作此㙁説文作坶繆禮記有繆公又姓也又靡幼切萺萺菜㣎説文曰細文也今作同㾇㾇病囿園囿于六切又于救切二哊吐聲蓄蓄冬菜詩曰我有旨蓄鄭玄云蓄聚美菜以禦冬月乏無時也本亦作畜丑六切十稸上同滀水聚苗蓨也又他六徒歷二切蓨音桃又音剔荲羊蹄菜蓫上同敊病敊貌傗傗㑉不伸鄐地名在晉矗直也齊也砡齊頭貌魚菊切一􅩃説文曰歍􅩃也才六切二沃灌也説文作又姓太甲子沃丁之後出風俗通烏酷切七鋈白金鱟魚名又音候䑁膏膜又音屋䁷瞋目觷治角也又戶角切䮸馬腹下聲毒痛也害也苦也憎也説文作毒厚也害人之草往往而生徒沃切八見上注􅗨萹竹草蝳蜘蛛玳玳瑁又音代纛左纛又徒兮切上同碡碌碡田器篤厚也説文曰馬行頓遲冬毒切十一竺地名説文厚也督率也勸也正也説文察也一曰目痛也又姓風俗通云漢有五原太守督俗作督衣背縫也並上同錖舌瓠玉篇云落石也裻新衣聲又先篤切凥俗酷虐也説文曰酒味厚也苦沃切六焅熱氣􅮘禾熟嚳帝嚳髙辛氏也説文曰急告之甚也硞碌硞石狀􅴀山貌鵠鳥名又姓姓苑云今東海人胡沃切八㿥鳥白也翯鳥肥澤也詩云白鳥翯翯又音學隺髙也灼也頶鼻髙貌門聲礐石礐僕僮僕説文曰給事者也漢書曰太僕秦官掌輿馬亦姓風俗通云漢有渾梁侯僕多又虜復姓後魏書僕蘭氏後改為僕氏蒲沃切六瞨古文鏷鏷鍏矢名案左傳曰魯莊公以金僕姑射南官長萬字不從金䗱䗱螺又䗱􅠠蟲轐車兔也䴆䴆􅖂洬雨聲先篤切二裻新衣聲梏手械紂所作也古沃切九牿牛馬牢也鵠鳱鵠鳥名似鵲䅵禾皮又地名告又音誥告上曰告發下曰誥郜國名又音誥祰説文云告祭也䧊説文云大阜也䶜治象牙也瑁玳瑁莫沃切又莫代切五􅦲門樞橫梁媢夫妬婦艒艒䑿船名萺草也熇熱也火酷切四臛羮􅌜又音郝嚛食新也歊氣出貌又音嚻褥小兒衣一曰小兒也內沃切又而蜀切四傉虜三字姓有庫傉官氏耨釋典云阿耨搙捻搙傶邑名又姓將毒切三穿也錊姓也襮黼領博沃切三犦犎牛出合浦郡􅖂鵅烏􅖂水鳥名濼水名在濟陽盧毒切又力各切一白牛五沃切又音嶽一三燭燈燭也禮曰嫁女之家三日不息燭丗本曰石季倫以蠟燭炊又姓左傳秦大夫燭之武之欲切十三屬付也足也會也官衆也儕等也經典作屬又音蜀屬俗矚視也䌵綴帶囑託也鸀鸀鳿鳥䟉小兒行貌㰲吹氣也噣噣鳥名蠾蚤也方言云鼅蛛自關而東趙魏之郊或謂之蠾蝓又音蜀韣弓衣又六欲切蠋螐蠋玉白虎通曰玉者象君子之德燥不輕濕不重是以君子寶之禮記曰執玉不趜又烈火燒之不熱者真玉也説文本作王隸加點以别王字魚欲切四獄臯陶所造説文確也從㹜從言二犬所以守也鳿鸀鳿鳥頊人頊䪴又音勗旭説文曰日旦出貌一曰明也許玉切五頊顓頊髙陽氏也又謹敬貌勗勉也顱出聲譜上同輂禹所乘直轅車説文曰大車駕馬也居玉切十二絭纕臂繩也又居願切鋦以鐡縛物挶持也􅍫斂手梮輿食器也䡞説文曰直轅車縳也㮂舉食者名䋰靴䋰子纏連者説文約也拲兩手共梏又巳奉切素屬曲角局曹局又分也説文促也渠玉切五局踡局又曲也俯也促也駶馬立不定局局促短小䎤耕也蜀巴蜀説文曰葵中蟲也淮南子云𧖟與蜀相類而愛憎異也亦作蠋市王切十二韣弓衣人徒谷切蠾蠾蝓蜘蛛㯮木似柳葉大也襡玉篇云長襦也連腰衣也襩上同㒔㒔㑛動貌襡短衣又大口切屬附也類也又音燭屬俗㻿玉㻿鐲溫器又直角切觸突也尺玉切四粗古文歜怒氣亦人名齊宣王時有髙士顔歜或作臅狼臅膏也辱恥辱又汚也惡也又姓出姓苑而蜀切十一蓐草蓐又薦也説文曰陳草復生也一曰蔟也褥氈褥鄏郟鄏地名在河南縟文采溽溽暑濕熱㦺矛戟技也媷懈憜也嗕囑嗕憐貌又西羌名黑垢大鼎束縛也又姓本自踈氏避難除足姓束左傳晉有束晳書玉切二㑛㒔㑛欲貪欲也余蜀切九浴洗浴説文曰灑身也灑先禮切鵒鴝鵒上同鋊炭鉤又銅屑也漢書曰磨錢取鋊輍車枕前也欲嗜欲𤞞獨𤞞獸谷山谷爾雅曰水注溪曰谷説文曰泉出通川為谷亦虜三字姓吐谷渾氏又音榖躅躑躅直録切三躅上同蠋蠋蟲名録采録説文曰金色也又録事職官要録云總録衆事力玉切十七渌渌水名在湘東又姓何氏姓苑有渌圖為顓頊師䚄眼曲䚄也緑靑黃色永徽二年始七品六品服緑飾以銀八品九品服靑飾以鍮石至文明元年又改靑服碧色醁美酒騄騄駬駿馬名娽隨從又音鹿菉菉蓐草逯謹也又姓風俗通云漢有大司空逯並後趙録有金紫光祿大夫廣平逯明西征記有逯明壘云是石勒十八騎中人䱚魚名籙圖籙碌碌石綵色本又音祿䟿恭䟿也􅮮謔也趢趢兒行㫽日暗㪖剝㪖又聲㪖曲委曲説文作象器曲受物之形又姓晉穆侯子成師封於曲沃後氏焉漢有代郡太守曲謙丘玉切四䱡魚名䒼𧖟薄漢書周勃織薄䒼為生亦作筁匤匤匣也瘃寒瘡也陟玉切七上同孎謹也又陟角切斸斫也又钁也钃上同欘枝上曲一曰斤柄豕行貌又丑足切足爾雅云趾足也又滿也止也從口止即玉切又將喻切二哫楚詞云哫訾憟斯玉逸謂承顔色也贖説文貿也神蜀切又音樹三􅼳􅼳鞮也又似足切䴰姓也梁四公子䴰䵎之後幞帊也又幞頭周武帝所制裁幅巾出四腳以幞頭乃名焉亦曰頭巾房王切二襆上同促近也速也至也迫也七玉切六誎飾也趗趗速迫也丳炙具㹱宋良犬又七雀切續繼也連也又姓舜七友有續牙似足切四俗風俗説文習也藚藚斷藥名一曰牛脣又名水􅼳白􅼳鞮也粟禾子也淮南子曰昔蒼頡作書而天雨粟又姓袁紹魏郡太守粟舉相玉切七􅰲上同見説文憟憟斯涑水名在河東又蘇侯切罽毛玉西番國名亦姓又香救切又新菊切㔄細切䪁絡牛頭封曲切一梀梀樗木名丑玉切七亍彳亍字書曰􅤽損米趢兒行豖行貌又知足切㙇牛馬所蹈之處豖説文曰豕絆足行豖豖也四覺曉也大也明也寤也知也古嶽切又古孝切十八斠平斗斛角芒也競也觸也説文曰獸角也又角抵戲漢武帝故事曰未央庭中設角扺戲角抵者六國時所造也使角力相抵觸亦大角軍器徐廣車服儀制曰角前丗書記所不載或云本出羌胡以驚中國之馬也又姓後漢有角善叔桷椽也較車箱又直也略也又古孝切較説文曰車騎上曲銅也與二玉相合為一與瑴上同䮸馬腹下聲䚫飾杖頭骨又胡歷切榷以木渡水今之略彴也捔掎捔榷揚榷大舉又音確䁷明也梏直也又古沃切傕後漢有李傕䮤馬白額龣樂器嶽五嶽也五角切八嶽上同樂音樂周禮有六樂雲門咸池大韶大夏大濩大武又姓出南陽夲自有殷微子之後宋戴公四丗孫樂莒為大司寇鸑鸑鷟鳯屬國語曰周之興也鸑鷟鳴于岐山俗作説文云面前嶽嶽也觷爾雅云角謂之觷治角也或作礐又音學捳抨捳㹊説文曰白牛也浞水濕士角切十二丵叢生草鋜銷足灂瀺灂鷟鸑鷟捔攙捔組織亦作澩山下有水冬無水篧魚罩音捉汋説文曰激水聲也一曰井一有水一無水為瀱汋齺齒相近貌速也或作簎取魚箔也捉捉搦也側角切七穛早熟榖􅧤上同穱稻處種麥斫斬又側略切篧魚罩蒵毒朔月一日又幽朔也命和叔宅朔方北方也又姓何氏姓苑云南陽人俗作所角切十二欶口吸也嗽上同矟矛屬通俗文曰矛丈八者謂之矟槊上同蒴蒴藥也數頻數簫説文曰以竿擊人又舞者所執又蘇雕切緘也槊木名揱纎也又長臂貌又音消㩋罘罕斫削也竹角切十九涿郡名諑訴也王逸注楚辭云諑猶僭也㧻擊也推也琢治玉孎謹孎卓髙也又姓蜀有卓王孫桌古文説文曰特止也啄鳥啄也又丁木切斀説文云去隂形啅衆口噣鳥生子能自食龍尾豚上同倬大也晫明也又敕角切打也菿説文云草大也本音一墣塞江圤上同猋猋猋紛紛衆多貌鞄攻皮之工謈自冤本蒲角切火裂玉篇云久視璞枇璞盈財殼皮甲又説文曰從上擊下也一曰素也苦角切十九毃毃打頭謹也善也願也誠也榷擊也又音角確靳固也或作碻碻上同皮乾㲉鳥卵觳盛脂器也燩廣雅云火乾物嶨爾雅云山多大石嶨礐上同塙髙也上同至也髙也硞固也説文曰幬帳之象隸省作􅿢埆墝埆不平鞭聲濁不淸也又姓漢書貨殖傳云濁氏以胃脯而連騎直角切十六擢拔也抽也出也濯浣濯又姓風俗通云濯輯之後鵫白鵫鳥嬥直好貌蒴鐲似鈴又音蜀􅠁爾雅云拘􅠁謂之定􅠁鋤也拘音劬本亦作斪斸斸陟玉切㺟獸名鸀小鳥似烏赤喙出西方蠗小蜃名鸐山雉長尾龍不安大雨㪬築也舂也本又敕角切渥霑濡於角切十七握持也偓偓促又姓列仙傳有偓佺箹小籥幄大帷三禮圖曰在上曰奕四旁及上曰帷上下四旁悉周曰幄楃説文曰木帳也喔雞聲又喔咿強顔貌鷽山鵲又音學藥白芷也腛厚脂刑也又作剭齷齷齪齒相近媉好貌英蒻龏燭蔽誇聲也䮸馬腹下鳴搦持也女角切又女厄切六掉正也又杖弔切𧣚屋角一曰調弓也上同搙揾也握也逴逺也一曰驚走又作趠敕角切五趠上同晫明也踔跛也㪬授也刺也㪬敊痛也敊丑六切犖駁犖牛雜色又卓犖也吕角切三𥒪𥒪確石相扣聲啅有才辨俗學説文與斆同覺悟也斆今音效又姓出姓苑胡覺切九確磽確説文曰礊石也嶨山多大石又音殼亦作礐鷽山鵲赤喙長尾知來而不知住澩㴄泉觷治角之工㿥鳥白又胡沃切翯鳥肥澤㕰怒聲許角切十豿豕聲急束翯鳥肥澤嗀歐吐左傳褚師聲子襪而登席公怒辭曰臣有足疾君將殼之説文從口草聲謞讒慝瀥瀥瀑水涌嚛醋味滈水貌娖辨也測角切八䃗䃗礫􅐅齒相近聲娕恭謹貌擉司馬彪住莊子云擉鱉刺鱉又音踔齱漢書云握齱急促也軬帶齪開孔具五質朴也主也信也平也謹也正也又姓漢書貨殖傳云質氏以灑削而鼎食注云理刀劔也之日切又音致十五晊大也郅郁郅古縣名又姓漢有郅都桎桎梏在足曰桎櫍椹行刑用斧櫍蛭水蛭博物志曰水蛭三斷而成三物騭駁馬又書曰惟天隂騭下民傳云騭定也劕劕劑劵也長曰劕短曰劑周禮作劕劑銍縣名䑇䑇䏷刀箭瘡藥鑕斧也野人之言懫止也礩柱下石也侄堅也又牢日説文曰實也太陽精不虧從口一象形人質切五馹驛傳也衵女人近身衣又女乙切㠴枕巾也臸到也實滿也誠也神質切一秩積也次也常也序也書曰望秩于山川直一切十二紩縫紩帙書帙亦謂之書衣又姓出纂文上同柣門限翐翐翐飛貌姪兄弟之子又音迭姪上同豑説文曰爵之次弟也帆索走貌大也悉説文云詳盡也息七切九膝説文曰脛節也膝上同蟋蟋蟀蛬也牛又作本草作膝上同䊝䊝􅔁聲僁僁㣯動也窸從穴出也一數之始也物之極也同也少也初也又虜三字姓後魏書一那婁氏後改為婁氏於悉切三一古文一專一又合也誠也輩也醇也又虜三字姓後魏書云一斗眷氏後改為明氏七數也親吉切十漆水名在岐又姓古有漆沈為魯相何氏姓苑云今豫章人又漢復姓孔子弟子漆雕開柒俗餘倣此膝地名在齊鳥名漆膠漆説文曰木汁可以髹物從木象漆如水滴而下也經典通用漆俗木名可為杖也草似蘇也
