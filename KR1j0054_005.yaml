body:
  text: 漆秦有娥臺匹偶也配也合也二也説文云四丈也從八匚八楪一匹俗作匹譬吉切四鷝鵯鶋鳥唾䏘牝䏘吉吉利又姓出馮翊尹吉甫之後漢有漢中太守吉恪居質切八趌趌􅨤怒走也狤狂也拮拮據手病詩傳云拮據撠挶也又音結走意郆郆成山潔水黑昵近也尼質切七昵上同衵近身服䵒膠䵒䵒上同𧈟小虻㥾愧㥾逸過也縱也奔也説文曰失也從是從兔兔謾也善逃也夷質切十二佚佚樂佾八佾之舞佾行列也溢滿溢軼車過又突也又同結切鎰國語云二十四兩為鎰又禮曰朝一溢米注謂二十兩曰鎰泆淫泆齸廣雅云麋鹿受食處劮劮豫欥辝也䭿馬走疾鴩餔鼓鳥也詰問也責讓也去吉切四蛣蛣蜣蜣蜋又蛣􅔒蝎也馬色趌趌􅨤怒走也又音吉欯笑也許吉切五欪訶也又丑律切咭笑又巨吉切恄怖也㣟行也抶打也丑栗切四嘻笑也眣目不正也跮也又丑利切栗堅也又果木也漢書曰燕秦千樹栗其人與千戶侯等又姓漢長安富室有栗氏力質切十九栗上同説文作此古文栗戰栗懼也溧溧水縣在宣州䬆颲颲暴風斷也削也鷅鶹鷅流離鳥溧溧冽寒風篥觱篥胡樂麜麕牡麌牡麜也也瑮王之英華羅列貌蒸栗色綵塛塞也搮以手理物䔁草名㗚嘍㗚言不了也㟳山窒窒塞也陟栗切又丁結切十二挃撞挃庢盩庢縣在京北銍刈也説文曰穫禾短鐮也又古縣名在譙秷刈禾聲愛觸忤人也㲳手拔物也㗧㗧咄吐呵也齧聲􅾯近也螲螻蛄短也疾病也急也秦悉切十一籀文嫉嫉妬楚詞注云害賢曰嫉害色曰妬蒺蒺䔧㑵廣雅云賊也爾雅云蒺䔧蝍蛆郭璞云似蝗大腹長角能食蛇腦亦作蜊揤揤拭愱愱毒苦也槉屋枅就語急㓼割聲也𥘉栗切四上同也䜉謅䜉隂私語也失錯也縱也式質切三室房也易曰穴居而野處後丗聖人易之以宮室釋名曰室實也人物實滿其中也周書曰黃帝始作宫室吕氏春秋曰髙元作宫室也􅮰刀􅮰堲夏后氏堲周燒士葬也資悉切八鼠聲唧啾唧聲㲺水潛摘蜻蛚别名蝍蝍飛蟲又音即楖楖栗木名蜜蜂所作食山海經云榖城之上足蜂蜜之廬亦蟲名彌畢切九􅼼上同謐靜也愼也安也䤉飲酒俱盡榓木榓樹名式器宓安也默也寧也止也淧淧溢也不測也必審也然也説文曰分極也從八弋卑吉切二十七畢竟也説文作畢曰罔也又姓出泰山本畢公髙之後晉有畢卓篳織荆門也説文曰藩手拔物也㗧㗧咄吐呵也齧聲􅾯近也螲螻蛄短也疾病也急也秦悉切十一籀文嫉嫉妬楚詞注云害賢曰嫉害色曰妬蒺蒺䔧㑵廣雅云賊也爾雅云蒺䔧蝍蛆郭璞云似蝗大腹長角能食蛇腦亦作蜊揤揤拭愱愱毒苦也槉屋枅就語急㓼割聲也𥘉栗切四上同也䜉謅䜉隂私語也失錯也縱也式質切三室房也易曰穴居而野處後丗聖人易之以宮室釋名曰室實也人物實滿其中也周書曰黃帝始作宫室吕氏春秋曰髙元作宫室也􅮰刀􅮰堲夏后氏堲周燒士葬也資悉切八鼠聲唧啾唧聲㲺水潛摘蜻蛚别名蝍蝍飛蟲又音即楖楖栗木名蜜蜂所作食山海經云榖城之上足蜂蜜之廬亦蟲名彌畢切九􅼼上同謐靜也愼也安也䤉飲酒俱盡榓木榓樹名式器宓安也默也寧也止也淧淧溢也不測也必審也然也説文曰分極也從八弋卑吉切二十七畢竟也説文作畢曰罔也又姓出泰山本畢公髙之後晉有畢卓篳織荆門也説文曰藩落也春秋傳曰篳門圭窬蓽上同韠胡服蔽膝説文曰紱也所以蔽前也下廣二尺上廣一尺其頸五寸一命緼韠再命赤韠俗作鞸㻫上同蹕漢書曰出稱警入言蹕顔師古曰警者戒肅也蹕止行人也蹕上同滭滭沸泉出貌亦作觱見詩俗作盡也鷝鷝鴋鳥名白面青色觱觱篥或作説文作觱云羌人所吹角屠觱以驚馬也珌佩刀上飾滭寒風熚火貌􅺊廣雅云母也彃射也㮿木名縪冠縫也説文止也鮅爾雅曰鮅鱒郭璞云似鯶子赤眼饆饆饠餌也鏎簡鏎爾雅曰簡謂之畢注謂簡札也俗從金棄糞器説文方干切箕屬道邊堂如墻也畫韋曰竈土祭罼兔罟姞姓一曰字史記云姞氏為后稷元妃巨乙切五佶正也間也鮚説文云蚌也漢律會稽獻鮚醬二升趌直行狤狂狤邲地名在鄭又美貌毗必切二十一比比次又毗妣鼻三音柲偶也馝香也又虜復姓後魏書馝邦氏後改為邦氏苾説文曰馨香也詩曰苾苾芬芬䩛車革佖有威儀也鮩魚名駜馬肥坒相連飶食之香者綼紷也又必覓切鮅魚名怭慢也泌水浹流又必媚切飲酒俱盡䖩黑蜂吡鳴吡吡亦作咇吹咇言不了妼女有容儀䫻大風也于筆切五説文曰水流也汩上同蒁草名㧒揘㧒擊貌率循也領也將也用也行也説文曰捕鳥篳也象絲罔上下其竿柄也俗作卛所律切十帥佩巾又將帥亦姓本姓師晉景帝諱改為帥氏晉有尚書郎帥昺又所類切蟀蟋蟀􅢊上同率先導割也斷也出埤蒼裾短衣咰咰飲酒貌行貌循也説文曰將衛也叱呵叱也又虜復姓九氏夏録有將作大匠叱干阿利西魏有開府叱奴興南陽公叱羅協後魏官氏志有叱吕叱門叱利叱李叱列叱盧等氏亦虜三字姓周有侍中叱伏列龜其傳云代郡西部人昌栗切一齧聲仕叱切一密説文云山脊也又靜也亦州名古姑幕城秦琅邪郡隋為密州因水以名之又姓漢有尚書密忠又漢復姓三氏何氏姓苑云密茅氏琅邪人又有密革氏密須氏俗作密美畢切十􅣊山刑如堂蔤荷本下白宓埤蒼云祕宓又音謐滵滵汩水流貌沕塵濁樒香木不見貌鳥名不可測量也弼輔也備也房密切十􅱶上同説文作此弼並古文䄶䄶禾重生􅜜輔也駜馬肥胇胇肸大貌邲地名佖威儀備也乙辰名爾雅云太歲在乙曰旃蒙亦姓前燕有護軍乙逸又虜復姓三氏後魏獻帝命叔父之胤曰乙旃氏後改為叔氏前燕録有髙麗王乙弗利後魏有都督乙千貴又虜三字姓有乙速孤氏於筆切三鳦燕也説文本作乙燕乙玄鳥也齊魯謂之乙取鳴自呼象形本烏轄切或從鳥亄貪也耴贅耴魚鳥狀也魚乙切又女涉切七聉無知意也㔎斷也水流貌圪髙貌舟行動筆秦蒙恬所造爾雅曰不律謂之筆韓詩外傳周舍為趙簡子臣墨筆操牘從君之後伺君過而書之鄙密切九潷去滓鉍矛柄柲柄也泌泌瀄水流方言刺也亦作祕咇咇㘉多言㻶青白玉管天之所授走也茁草于也徴筆切又鄒律莊月二切一肸肸蠁俗作肹羲乙切一暨姓也吳尚書暨豔居乙切又泉既二音一蛭蛭蝚丁悉切又之日切一獝狂也況必切一六術技術説文曰邑中道也又姓食聿切十一述著述説文循也又姓風俗通云魯大夫仲述之後也秫榖名术上同沭水名在琅邪今陽縣在海州噊爾雅曰危也又音聿袕爾雅袕謂之褮謂衣開孔也策音塋潏爾雅曰小沚曰坻人所為潏謂人力所作又音聿音譎鱊小魚名爾雅曰鱊鮬鱖鯞又音聿驈黑馬白髀又音聿􅛔􅛔蟥也又音聿橘果名周禮云橘踰淮而北為枳居聿切八􅮳草名繘汲綆又餘律切走意上同䤎醬也􅴚姓也出韻譜月在乙也崒山髙慈恤切四踤槯踤又觸也駭踏也誶讓也捽把捽聿循也遂也述也説文曰所以書也楚謂之聿吳謂之不律燕謂之弗秦謂之筆餘律切二十一鴪飛快燏火光遹述也自也一曰遵也鷸鳥名驈黑馬白髀又音述繘汲綆又音橘疾風潏水流貌矞説文曰以錐有所穿也一曰滿也霱霱雲瑞雲夲亦作矞􅛔􅛔蟥也建行貌芛草木初生欥詞也鱊小魚名噊鳥鳴䋖䋖長銉針銉飛出卒終也盡也子聿切又倉沒切又則骨切五終也䱣倏鮪別名㰵飲也玉篇云吮也啐啐律聲恤分賑辛聿切十五恤憂恤戍辰名爾雅太歲在戌曰閹茂又滅也訹謏訹誘也謏蘇了切珬珂屬靜也又音盍䳳小鳥名恤賑恤水流㖅口鳴㖅㖅海蟀銊鋸聲欰鳴欰欰不能行也頽下律律吕又律法也吕恤切八寽持取今寽禾是繂繩船上用亦作􅛢膟腸間脂説文曰血祭肉也又作䔞音譜云草子甲葎蔓草有刺竹也鳴也亦作黜貶下也亦作絀丑律切八怵怵惕走也炪火光䟣獸迹㤕憂心也又音窋􆁻獸名欪訶也又許吉切㤕憂心也竹律切八窋物在穴貌又丁骨切絀縫也䂐短貌㑁上同逫走貌面短貌泏水出貌术藥名直律切三􅙥上同炢煙出出進也見也逺也赤律切又赤季切一焌火燒亦火滅也倉聿切一􅵌吳人呼短側律切二雞兒出殼聲崛危崛山貌魚勿切一飛去貌許聿切四㤜狂也䬄小風貌深目貌七櫛梳也阻瑟切六楖上同見周禮瀄瀄汩水聲㘉咇㘉䄶輒禾重生䄶音弼擳挃擳瑟樂器丗本曰庖犧作瑟所櫛切六飋飋䫻風也蟋蟋蟀又音悉蝨蟣蝨淮南子云大厦成而燕雀相賀湯沭具而蟣蝨相弔俗作􆁮璱玉鮮潔貌今為之璱璱者其色碧也色也亦作齒聲崱瑟切一八物萬物也又旗名周禮雜帛為物説文曰牛為大物天地之數起於牽牛故從牛勿文弗切九勿無也莫也説文曰州里所建旗也象其柄有三遊雜帛幅半異所以趣民故遽稱勿勿又作􅻥􅻥上同芴土瓜岉崛岉髙貌伆離也又武粉切逺也曶尚冥也又音忽沕沕穆微也弗説文嬌也分勿切二十紱綬也黻黼黻綍大索葬者引車紼上同芾草木盛也市説文曰韠也上古衣蔽前而已市以象之天子朱市諸侯赤市大夫蔥衡從巾象連帶之形經典作芾韍上同不與弗同又府鳩方又二切􅞣姓也漢有九江太守􅞣修翇説文曰樂舞執全羽以祀社稷也周禮作柫連枷杖打榖者出方言大也佛婦人首飾冹寒冰貌帗毳也又音撥風貌笰輿後笰也熚鬼火説文作甶鬼頭鬱香草又氣也長也幽也滯也腐獸也悠思也説文曰木叢生者又姓出姓苑紆物切十二鬱俗灪灪滃大水爩煙氣飴和豆也黦黃黑色也𥑋小石菀藥草又音苑尉説文作尉從又持火所以申繒也亦姓古有尉繚子著書又虜復姓有尉遲氏其先魏氏之别尉遲部因而氏焉後單姓尉唐有將軍尉遲敬德又於魏切尉火展帛也説文本作尉見上注蔚草名又曰無子菣也亦州名春秋時屬晉後入趙秦滅趙為代郡東魏置北靈丘郡周宣帝置蔚州也説文云芳草也無左臂也九勿切又九月切十上同説文作此􅕒翟衣厥夏曰獯鬻殷曰鬼方周曰獫狁漢曰胸奴魏曰突厥出漢書音義又音蕨屈屈産地名出良馬亦姓楚有屈平又音詘鶌爾雅曰鶌鳩鶻鵃郭璞云似山鵲而小短尾青黑色多聲趉走貌豕土也􅕻剖􅕻曲刀䠎律䠇多力屈拗曲亦姓又虜復姓屈突氏又羌復姓有屈男氏區勿切三詘辝塞􅔒蛣􅔒蟲倔倔強衢物切九䠇足多力也崛山短而髙短尾鳥䘿衣短短尾犬堀説文曰突也引詩曰蜉蝣􅔒閲豕地掘掘地佛牟子曰漢明帝夢神人身有日光飛在殿前以問群臣傅毅對曰天竺有佛將其神也學記曰其施之也悖其求之也佛符弗切九怫怫鬱坲塵起􅔍山曲説文作岪山脅道也咈戻也䞞走貌刜斫也擊也玉篇云理也炥火貌䬍疾風許勿切六俗欻暴起疾也欻訶欻烼火煨起貌䬑風聲王勿切六擲也觱羌人吹角㧒揘㧒䁌䁌䁌見􆃾行也拂去也拭也除也擊也敷勿切十三韜髮嶏崩聲茀草多祓除災求福亦潔也又音廢艴淺色刜擊也斫也乀左戾曰乀䭮額前飾也佛髣佛亦作仿佛佛倣佛俗跳也崛危崛山貌魚勿切一九迄爾雅云至也許訖切九仡壯勇貌又魚訖切釳乘輿馬上插翟尾者曰方釳釳鐡也廣三寸又魚訖切肸肸蠁又許乙切忔喜也芞爾雅曰藕車芞輿郭璞云藕車香草又音乞䛥語瞋聲莔吳王孫休長子字也汔水涸盡訖止也居乙切五吃語難漢書曰司馬相如吃而善著書也扢摩也暨姓也吳有尚書暨豔䰴魚遊疙癡貌魚迄切五屹屹崒山貌圪髙士虎貌仡壯勇貌䞘行貌其迄切二􅠟也乞求也説文本作氣音氣今作乞取之乞又虜復姓晉有乞伏國仁太元十年稱秦王於金城去訖切三芞又許訖切契契丹夷名出字林十月范子計然云月者尺也尺者紀度而成數也王子年拾遺録曰水精為月魚厥切十一刖絶也斷足刑也又五刮切跀􅞨並上同見説文軏車轅端曲木也又五骨切抈折也扤動也又五骨切枂鞍枂鈅兵器玥神珠山也伐征也斬木也又自矜曰伐房越切十四茷大曰筏小曰乘之渡水筏上同罰罪罰元命包曰言為詈刀詈為罰罰之言陷於害閥閥閲自序垡耕土橃木橃説文曰海中大船也䑔舂米瞂盾也或作􅚛拔爾雅云拔龍葛也似葛蔓生葉細莖赤也茷茷茂貌藅藆藅草坺地名䣹酒一䣹也越墜也于也於也逺也走也逾也曰也揚也説文度也亦吳越又姓勾踐之後又虜三字姓後秦録有北梁州刺史越質詰歸王伐切十六􅫝説文踰也粵辝也于也戉説文曰大斧也司馬法曰夏執玄戉殷執自戚周左杖黃戉又作鉞鉞上同䋐紵布説文曰采彰也一曰車馬飾樾樹隂蚎蟛蚎似蟹而小曰辝也於也之也佇立也輕也璏劔鼻王熭暴乾木名􅴕螊􅴕蚌出魏書泧大水厥其也亦短也説文曰發石也又姓京兆人也漢賜衡山王妾厥氏居月切十九古文蹶失腳又走也速也嘉也説文僵也一曰跳也亦作蹶又音橛説文上同􅺻跳􅺻上同瘚氣逆劂刻刀蕨蕨菜蟨獸名走之則顚蛩蛩前足髙不得食而善走蟨常為蛩蛩取食蛩蛩負之而走也蟩蟩蜉蟲橛㭖也又其月切發石強力欮發也撅撅撥物也鱖魚名短也説文曰鉤識也從反象形嬄婦人貌於月切四飴和豆又作􅦑説文作噦逆氣又乙劣切黦黃黑色説文作黑有文也似角發物其月切十三鷢白鷢一名揚鳥似鷹尾上白善捕鼠也橛説又􅍻也一曰門梱亦作橛撅採撅亦樗蒲三采名蹶又音厥掘穿也趕舉尾走也憠強也磨趉行越橛株山名尾本亅説文曰鉤逆者謂之亅象形闕門觀也廣雅曰象魏闕也釋名曰闕在門兩旁中央闕然為道也又夫也過也不供也又姓出下邳漢有荆州刺史闕翊去月切三㵐水名在義陽􅕒􅕒狄衣周禮作闕禮記作屈髮頭毛也説文根也又姓漢有東海人髮福治詩又有不毛之地莊子謂之窮髮万伐切六説文同上古文發發起又舒也明也舉也闋也揚也説文曰射發也颰疾風冹寒冰又音弗襪足衣漢張釋之與玉生結襪望發切五襪襪並上同􅡚舉目使人㒝㒝羯東北夷名似髙麗䬂小風許月切六䟠走貌泧水貌狘獸名又走貌䎀飛貌㞽山貌謁請也告也白也又姓風俗通云漢有汝南太守謁渙於歇切五閼爾雅云太歲在卯曰單閼又於葛於連二切暍傷熱亦作暍􅿔説文曰屋迫也黦色壞也又於月切又紆物切歇氣泄也休息也又竭也許竭切五蠍螫人蟲猲猲獢短喙犬也上同艎大船訐面斥人以言論語注云訐謂攻發人隂私也居竭切又居列切六􅨤走貌羯犗羯揭揭起説文曰髙舉也俗鍻金鍻􅺭擔物也本亦作揭其謁切五揭上同竭盡也碣碣石海中山名今為碑碣字李斯造楬表楬閥閲目序名怖恨怒拂伐切一钀馬勒旁鐡語訐切一十一沒沈也又虜三字姓有沒路真氏出後魏書莫勃切六殁死也説文終也又作玉名內頭水中又烏沒切説文曰入水有所取也莈草也入水又出貌土骨切一骨説文曰肉之核也尸子曰徐偃玉有筋無骨亦見史記又姓古忽切十六縎縎結鶻鶻鳩又搰猾二音滑滑稽謂俳諧也䮩䮩獸出北海啒憂也淈説文濁也一曰滒淈又水出貌汩汩沒愲心亂蓇不實草膝病尳上同榾枸榾木也䓛刷也或從竹扢摩也㒴出也勃卒也又姓丗本朱右師之後又梁武帝改豫章王紂姓勃氏蒲沒切二十三渤渤澥海名又水貌􅖃􅖃馬獸名似馬牛尾一角又音雹説文曰吹釜溢也餑麵餑𡋯塵起馞木香悖逆也又音背䄶䄶稡禾所秀不成聚向上貌郣郡名浡浡然興作㲞毛短昏亂勃勃卒旋放之貌悖言亂㶿煙起貌桲桲果似孛星也又怪氣艴艴然不恱挬拔也脖胅臍蘩毋鵓鵓鳥咄呵也當沒切四柮榾柮木頭又五括切䮩獸出北海􅒸鳥鳴豫知吉凶也宊出貌他骨切六梲大杖也又音柮云不孝之子説文曰不順忽出也篆文從到子説文同上或從到古文子怢怢忽不悵也説文肆也䠈蹂也䠈前不進也突觸也欺也説文曰犬從穴中暫出也一曰滑也陀骨切十四揬搪揬腯説文曰牛羊曰肥豕曰腯鼵鳥鼠同穴其鳥曰鵌其鼠曰鼵鼵如人家鼠而短尾葖爾雅曰葖蘆萉郭璞云萉冝為蔔蘆蔔蕪菁屬紫華大根俗呼雹葖鶟鶟鶘鳥名似雉靑身白首堗竈堗漢書作突云曲突徙薪亡恩澤艒釣船鈯鈍也又小刃也耕耒開也棎瑣植又傳也凸凸出貌説文本他忽切義見上文鍎覆鍎內頭水中烏沒切九腽腽肭肥殟心悶嗢咽也又虜復姓後魏書有嗢盆氏又虜三字姓嗢石蘭氏䯉説文曰咽中息不利也本一滑切榅榅桲果似樝也揾手撩物貌淴水出聲馧馧馞大香忽倐忽又滅也忘也輕也又一𧖟為一忽十忽為一絲呼骨切十七曶尚冥也㾁狂病又音欻匫古器寣睡一覺笏一名手板品官所執天子以玉諸侯以象大夫魚須文竹士木可也釋名笏忽也有事書其上以備忽忘䩤急擷也擷呼結切曶説文曰出乞詞也篆文本作象氣出形逺也啒憂貌髙貌㦌寢熟微也豕屬惚恍惚亦作忽䬍疾風貌睡多兀髙貌又姓後漢改樂安王元覽為兀氏五忽切十六扤搖動杌樹無枝也屼屼秃山貌又五屼山名在犍為矹硉矹不貌䦍䦍括也又云㚔者鼿鼻也説文曰船行不安也𦨉俗危瓦危臬危瓦不安也㽾説文曰病也俗軏輗軏又音月􅚣蛤蟹刖刮刖又音月艾䪬桉物聲或作普沒切五昢明旦日出貌哱吹氣聲㛘㛘乳女字馞香貌䇶射勒沒切五䠈前不進也硉硉矹矹崖狀㪐㪐㩿不穩又不利也窟窟穴苦骨切十五顝大頭貌泏漚池􅝋白秃矻用心矻矻堀宋玉云堀堁揚塵又音掘説文曰目突出也本胡八切㧾擊也聖汝潁間謂致力於地曰聖㩿㪐㩿不穩土塞䯇力作秃山貌目突朏朏臀俗又作訥謇訥內骨切五訥訥口又女滑切肭腽肭抐內物水中殟窣勃窣穴中出也蘇骨切七􅲄麥屑上同㲞㲞毛貌鼻鳴鵓鳥屑動進貌説文本先節切猝倉猝暴疾也倉沒切五卒急也逺也又子沒切又將律切亡也摩也素也捽手捽也昨沒切六椊椊杌以柄內孔䚝角始生也崒崒屼山貌小骨麧麧糏漢書云食粳麧下沒切五􅿖栝也舂粟不潰也齕齧也又胡結切紇絲下也又孔子父名又虜復姓三氏北齊開府紇奚永樂又有紇于氏紇骨氏又虜三字姓後魏有賊師紇豆陵伊利又胡結切淈淈泥又古忽切搰掘地也戶骨切十扢摩也果子也出聲譜耳聲抇牽物動轉鶻鳥名鷹屬又骨猾二音膝病㨡手推也露出見字林滑滑亂也列子卒説文隸人給事者衣為卒卒衣有題識者臧沒切又將聿切三倅百人為倅周禮作卒稡䄶稡十二曷何也胡葛切十一褐衣褐説文云編枲襪也一曰短衣毼毛布鶡鳥似雞也鬪必至死蝎蟲名爾雅曰蝤蠐蝎又曰蝎桑蟲餲餅名䫘䫘健也又音􅐳􅐳􅚯肩骨骱骨堅㮫木轉貌鞨靺鞨蕃人名出北土䫘䫘健也許葛切八訶也喝上同猲恐又音歇犬臭氣㿣白色暍熱貌香氣又呼蓋切出字林怛悲慘也當割切十􅜢驚􅜢妲妲己紂妃呾相呵炟火起䵣莫䵣縣在五原狚獦狚獸名似狼而赤出山海經笪竹䉬菌靼柔革也又之列切闥門內他達切十三㒓佅㒓撻打撻躂足跌澾泥滑獺水狗魚名文字音義云蹈也從反止羍小羊也亦作幸上同達佻達往來貌又唐割切汏汏過噧多言也遏遮也絶也止也烏葛切十一齃鼻齃頞上同堨擁堨閼止也塞也又於連切胺肉敗臭論語作餲食臭也餲食傷臭又於介於罽二切靄雲狀又於蓋切咹小語大呼用力屋迫剌僻也戾也盧達切十六揧研破辣辛辣藾藾蒿瘌癆瘌不調攋撥攋手披也糲粗糲癩疥癩又音賴􅦟廣雅曰痷也亦獄室也轢車轔著又歷洛二音狒著䶛齧聲㻝玉名目不正楋木名蝲蝲蟽渴飢渴又虜復姓二氏後魏書渴侯氏後改為緱氏渴單氏後改為單氏亦虜三字姓後魏書北方渴燭渾氏後改為朱氏苦曷切八渴古文􅿔內熱病也䳚䳚鴠嵑嵑嶭山貌磕石聲䯋肩髆䅥禾長也達通達亦姓出何氏姓苑又虜復姓三氏後魏憲帝弟為達奚氏又達勃氏後改為裒氏周文帝達步妃生齊煬王憲唐割切二薘馬舄草名巀巀嶭山名在右扶風才割切又才結切四噆嘈噆鼓聲或作啈囐上同㩵擊也嶭五割切又五結切十三䡾車載髙也屵髙山狀枿伐木餘枿􅤁頭戴貌説文曰伐木餘也櫱上同書作蘖古文從木無頭􅮛毀讀曰􅮛㩵擊也又才割切戒也説文曰語相訶距也歹説文曰骨之􅋊也凡從歹者今亦歹頇無髮齾獸食之餘曰齾葛葛藟廣雅云苑童寄生葛也一名寓木又名寄屑亦姓後漢有潁川太守葛興古達切十䈓䈓䉈桃枝竹名獦獦狚獸也割剝也害也斷也􅎒也馬走疾也丐乞也亦作丐又音蓋輵轇輵戟形也又轇輵驅馳貌鄉名在南陽禾長也㵧水名又㶀㵧波勢也躠跋躠行貌桑割切九薩釋典云菩薩菩普也薩濟也能普濟衆生也摋抹摋公羊傳曰宋萬臂摋仇牧碎首何休云側手曰摋􅔁放也若􅔁蔡叔是也説文曰䊝􅔁散之也音變攃攃攃聲䉈䈓䉈桃枝竹也失俗云辣足動草聲七曷切三穀屬出淮南子礤粗礤捺手按奴曷切三痛也蛆􅯟螫藒菜似蕨生水中矛割切一十三末木上也無也弱也逺也端也亦姓姓苑云夲姓秣氏後去禾又虜三字姓後燕録襄城公末那樓雷莫撥切二十七昧星也易曰日中見昧案音義云字林作昧斗杓後星王肅音妹䫘健也䀛逺視又不正視又莫拜切䴲麵也醬也秣馬食穀也秣上同捕鰌竹器靺靺鞨蕃人出北土韎韎韐大帶苜説文曰目不正粖糜也又亡結切上同米和細屑鮇魚名眛目不正也抹抹摋摩也妹妹嬉桀妻佅佅㒓肥貌又西夷樂名怽忘也抹切也瀎塗拭􅵒鳥名沫水沫一曰水名在蜀又武泰切色不深也襪襪肚枂去樹皮又柮枂柱頭木五活切一柮藏活切一撥理也絶也除也北未切十六癶足刺癶也袚蠻夷蔽膝茇蓽苃鉢鉢器也亦作鉢顔師古注漢書曰鉢食器也鉢上同鳥名又音拔鱍魚棹尾也䢌急走多鬢貌襏襏襫蓑雨衣也帗一幅巾㤄意不恱貌大船名驋馬怒筏箄筏䰖姊末切六拶逼拶𣴖𣴖濺刺不淨也蹙行貌出新字林水湍頭起括檢也結也至也古活切二十一活水流聲又乎括切上同髺結髺檜木名柏葉松身又工外切栝上同見書聒聲擾䒷説文曰䒷蔞果裸也􅌝􅌝藪同上鴰鶬鴰韓詩云孔子渡江見之異衆莫能名孔子嘗聞河上人歌曰鴰兮鶻兮逆毛衰兮一身九尾長兮鴰也萿爾雅曰萿麋舌郭璞云今麋舌草春生葉有似於舌適疾也銛説文曰斷也佸會計曰佸頢小頭貌劊斷也葀菝葀瑞草䯏骨端懖愚懖無知説文曰善自用之意也引啇書曰今汝懖懖古文筈箭筈受弦處闊廣也逺也疏也苦括切六蛞蝦蟆子名筈箭筈又音栝適疾也又音栝䟯就䟯瓜活不死也又水流聲戶括切八􅣇水流聲䄆祠也越鄭玄云瑟下孔又云翦蒲為席又音粵或作趏鬠似組束髮佸佸會秳春榖不潰也姡姡􅌤也又音刮奪左傳曰一與一奪徒活切八上同強取也古奪字古周書曰􅴠攘矯虔亦姓脫肉去骨亦姓出姓苑又土活切挩解挩莌活莌草生江南痥馬脛傷也鮵爾雅曰鰹大鮦小者鮵豁豁達呼括切八􅣲上同奯大開目也濊水聲上同泧瀎泧欿水眓説文曰視髙貌斡轉也烏括切九焥火煙出䩊日開貌捾捾取也上同嬒方言云嬒可憎也或作懀又烏外切䁊目深黑貌睕小嫵媚也𥄗説文云捾目也繓結繓也子括切三撮撮挽牽也又七活切攥手把鏺兩刃刈也普活切説文又讀若撥十三撥芟撥踏草聲㧊推㧊䣪酒氣醅酘酒水􅲺目􅲺眛不明貌鱍魚掉尾又音撥衣袂也無色䍨牯羊謶人言侻侻可也一曰輕他括切五挩除也誤也遺也又解挩或作脫脫骨去肉又徒活切莌又徒活切梲大棒亦木梲又音拙捋手捋也取也摩也或作寽郎括切五􅽒削􅽒也蛶蚵蛶蟲又音劣㸹駁㸹㭩木名又音劣掇拾掇也丁括切八剟削也擊也鵽鵽雀又當刮切腏挑取骨間肉也祋祋祤縣名又都外切咄又都骨切裰補裰破衣也敠􅍞敠知輕重也又敠食不喚自來撮六十四黍為圭四圭為撮撮手取倉括切二襊緇布冠詩作撮跋跋躠行貌又躐也蒲撥切二十五䟛行貌上同上同魃旱魃舍也將行祭名䣪酒氣馛香氣炦火氣颰風貌癹除草説文音鏺妭鬼婦文字指歸云女妭秃無髮所居之處天不雨説文曰婦人美貌犮犬走貌䚨弋鳥具説又音廢拔回拔又虜復姓三氏後魏有都督拔略昶出賀拔勝傳又有夏州刺史拔也惡蚝官氏志有柯拔氏又虜三字姓後魏書拔列蘭氏後改為梁氏又蒲八切胈夏禹治水腓無胈脛無毛韋昭云胈股上小毛也鈸鈴鈸鳥名似鳬䮂䮂䮧蕃中馬也菝菝葀瑞草坺一臿土也又音伐雲氣茇草木根也䯋肩髆十四黠黠慧也又堅黑也胡八切四齧聲麻莖䦖門聲札簡札釋名曰札櫛也編之如櫛齒相比也又牒也署也側八切六𣧖疾蚻小蟬扎纒弓弝也鳥雜蒼色扎扎拔也出家語拔拔擢又盡也蒲八切又蒲撥切三菝菝􅿌狗脊根可作飲䂒短人􅧜徑也恪八切十二擖説文刮也一曰撻也劼用力又固也愼也勤也鬝秃鬝也上同判巧判㓤剝㓤硈石狀説文堅也一曰突也􅿌菝􅿌草䂒䂒短人咭鼠鳴擊也滑利也亦州名春秋時為衛國秦為東郡後魏以東郡屬司州周改為滑州因滑臺以為名又姓風俗通云漢有詹事滑典又音骨滑稽也戶八切八猾狡猾書傳云猾亂也䱻魚名鳥翼出入有光音如鴛鴦見則天下大旱出山海經磆磆石藥螖蟛螖似蟹而小䴳麴名走鶻鶻鳩又音骨榾八數也博拔切十􅦩馬八歲杷無齒杷也捌上同扒破聲㺴玉名釛金類哵哵哵鳥玐玉聲釟治金窡説文曰穴中見也丁滑切五説文曰口滿食娺婠娺好貌鵽黃雀聉無所聞也婠烏八切六取物也嗢咽也又烏沒切䯉説文曰咽中息不利也穵手穵為穴嗗飲聲豽獸名似狸蒼黑無前足善捕鼠説文作貀女骨切四貀上同訥言逆下也又女骨切肭腽肭肥貌齒利又磣初八切七䕓草䕓察監察也諦也知也至也審也案説文云察覆也察言微親察也今通用亦姓出何氏姓苑察上同木名􅕉視􅕉羅鬼亦作劀説文曰刮去惡瘡肉也周禮曰劀殺之齊古滑切三俗鱊魚名戛揩也常也禮也説文戟也古黠切十八扴揩扴物也圿垢圿秸説文曰禾稿去其皮祭天以為席也鴶鴶鵴鳲鳩楔櫻桃又先結切秸秸稿骱骱䯦小骨鞂草鞂砎礣砎小石忦恨也嘎嘎嘎鳥聲刮也利也􅤛􅤛􅧗鳥又音潔袺執衽又音結㮖鼓也磍輵磍搖目吐舌又感怨貌頡漢書有羹頡侯軋車輾鳥黠切十圠山曲堰拔草心也嫼嫉怒猰猰貐獸名食人迅走猰上同穵説文云空大也目相戲貌䰲䱀䰲魚名窫窫窳國名殺殺命説文戮也所八切七煞俗鎩鳥羽病又長刃矛也水也帴二幅蔱莁荑榝似茱茰而實赤又山列切㑻㑻健貌莫八切七䀣惡視齂氣息䯦䯦骱小骨黑也睰視睰礣礣砎小石傄呼八切二䀨視也埤蒼云怒視貌痆瘡痛女黠切三上同奴人衣􅝨屈也五骨切三聉無知之意􅫣無耳吳楚語也䯇力作也口滑切又音窟一汃西極水名普八切四齒聲石破聲車破聲茁草初生鄒滑切一十五轄車軸頭鐡胡瞎切十五舝上同出説文轄上同説文車聲也一曰轄鍵也齒聲鶷鶷􅗾鳥名似伯勞而小砎礣砎硬也礣慕轄切螻蛄别名石似玉也野蘇囚突出也縖束物也食飽拾用力手􅗾乙轄切五䦪門扇聲􅕫駱駝鳴也咀相呼聲又當辣切劜劜齾器缺也五轄切四聐聐顡無所聞也秃鬐􅝝山中絶貌剎剎柱也初轄切一䓭掃地惡草木虎止樂器亦名敔也枯轄切四楬上同見禮磍剝也趏走貌瞎一目盲亦作瞿許轄切四齒堅聲秃貌㔠力作㔠㔠獺獸名他轄切又他達切一刮刮削古䫄切五鴰鶬鴰鳥毛逆九屋又音括劀利也又古滑切䄆禳祠名趏走貌又枯轄切頢短面貌也下刮切七言不了又不淨繒細敵盡貌舌塞口説文作􅡜話括之類從此姡面姡咶息也䫄䫄頢強可貌丑刮切二鵽爾雅曰鵽鴆寇雉郭璞云鵽大如鴿似雌雉鼠腳無後指岐尾為鳥憨急羣飛出北方沙漠地下刮切又丁括切三窡穴中出貌錣䇿端有鐡刷刷拭也數滑切又所劣切一刖去足亦刖危之貌五刮切又音月四䎳説文曰墮耳也㱚獸食殘貌䚴詞也䵵黑也初刮切二䥷斷也又之芮切斫莫轄切四帓帓帶帕帕額首飾㩢打㩢妠婠妠小兒肥貌女刮切三也亦作袦下人帶襦名捌方言云無齒杷百轄切二㭭木名􅧗􅤛􅧗鳥名似鳧古轄切四擖刮聲也又揵也架也折也秃貌猰雜也􆇫秦人云切草查轄切三耫農具也㳐㳐㳐水流也哳嘲哳鳥鳴也陟轄切四好出證俗文貨也眣目露貌出聲類細毛也而轄切十六屑動作屑屑又清也敬也顧也勞也説文作屑先結切十一楔木楔揳㩢揳不方正也蹩􅍷旋行榍木名説文限也糏米麥破也僁動草聲又云鷙鳥之聲又僁僁呻吟也亦作偰㒝偰淨也㴽瀎㴽水草臆中脂㨝揲㨝切割也刻也近也迫也義也説文折也千結切八㗫小語齒也竊盜也又淺也柣爾雅曰柣謂之閾又音秩沏水聲䟙䟙跌察説文曰言微親察也又音察結締也古屑切十五潔説文曰麻一專也潔淸也經典用潔䥛鎌别名也鍥上同桔桔梗􅥱􅥱橰汲水具也走貌􅤛􅤛􅧗鳥名􅧗古轄切袺詩傳云執衽曰袺拮手口共有所作詩曰豫手拮據狤狤獸名魝割治魚也頭傾貌蠸蟲名節操也制也止也驗也説文曰竹約也子結切十三説文曰瑞信也凡從弓今作下癤瘡癤蝍蝍蛆蜈蚣又音節楶屋梁上木小灑㸅燭餘岊髙山貌説文曰束髮少小也䲙魚名幯幯拭説文治也本房六切小衣血釋名曰血濊也出於肉流而濊濊也呼決切十二惡貌䆷穿貌䆷上同䆷闕䆷無門戶也泬泬寥空貌疦瘡裏空也又音玦瞲驚視貌決莊子云決起而搶榆枋決小飛貌䛎怒呵䒸草貌坹穴也闋終也若穴切四湀爾雅云湀闢流川又揆圭二音缺器破䆷無門戶也玦珮如環而有缺逐臣賜玦義取與之訣别也古穴切二十六潏泉出貌又水名在京兆又音聿䀗目患譎譎詐訣訣別􅬇環有舌也觼上同出説文鐍亦同又扃鐍出莊子駃駃騠良馬生七日超母也明菜花黃芵上同赽馬疾行也鴂鶗鴂鳥名關西曰巧婦關東曰鸋鴂春分鳴則衆芳生秋分鳴則衆芳歇鈌刺也又乙穴切獸名似狸決流行也廬江有決水出大别山又斷也破也俗作決觖觖望怨望也又羌瑞切騤爾雅馬回毛在背曰騤􅼶􅼶音光亦作闋廣㭈碗也又小盂也疦説文也蚗蛥蚗蟪蛄蟲名趹足疾譎譎妄語也􅰁衣袖䏐孔䏐抉縱弦彄也穴窟也丹穴山名鳳皇所出胡決切四坹空深貌袕説文縷一枚也袕鬼衣又長衣也抉抉出於決切六䆷穿貌妜姢也火光也目深貌䆷説文曰深抉也姪姪娣公羊傳云兄之子徒結切三十五眣目出昳日昊胅骨胅凸髙起垤蟻封又曰冢前闕也耋老也八十為耋亦作耊迭遞也更也道也跌跌踢又差跌也絰縗絰驖馬赤黑也嵽嵽嵲髙山軼車相過又音逸䭿馬行疾也關鄭城門也左傳作桔柣瓞瓜瓞嘻笑也又齧也易云履虎尾不嘻人亨又火至丑栗二切墆貯也止也戜剝也又國名在三苗國東出山海經苵爾雅曰蕛苵郭璞云蕛似稗布地生穢草镻爾雅镻蝁注云蝮屬大眼最有毒今淮南人呼蝁子鴩爾雅云鴩飾叔荎刺榆又音治齧堅聲又作一切擲也恎惡恎詄忘念摕捎取鳥名堅山貌泆泆蕩􅭏炮􅭏趃大走㦅㦅㦅不自安也鐡説文云黑金也神異經云南方有獸名曰齧鐡大如水牛色如漆食鐡飲水其糞可作兵器其利如鋼也又虜復姓赫連勃勃改其支庶為鐡伐氏云庶朕宗族子孫剛鋭如鐡皆堪伐人也又作鐡俗作鐡他結切八鐵古文僣僣侻狡猾餮貪食説文作飻貪也飻上同蛈爾雅曰王蛈蝪郭璞云即螲蟷似鼅蛛在穴中有蓋今河北人呼蛈蝪捅貌出字林驖馬赤黑也纈綵纈胡結切二十一䦖䦖義見字擷捋取又虎結切􅰐縛頡頡頏詩傳云飛而上曰頡飛而下曰頑説文曰頡直項也又姓風俗通有頡衛古之賢者頁頭也齕齧也又乎沒切紇絲下也又乎沒切襭以衣衽盛物也潔爾雅河名即九河之一也又古節切䁾目赤蘢古草也鼠名又胡狄切翓翓飛上下䐼膜䐼㹂牛很又口殄切奊頭邪籺屑米門聲麥不破核邀核涅水名出東郡又水中黑土奴結切十二捏捏捺菜似蒜生水邊坦塞也圼上同爾雅云大管曰簥其中曰小者曰篎􅚿􅚿然疲役又乃叶切礬石别名疾病㖏㖏呵腫也草也􅎒廣雅云盛也斷也或作截餘倣此昨結切七傍出前也岊山峯又子結切巀巀嶭山名文藏活切蠞蠞似蟹生海中草食齧噬也亦姓莊子有齧缺五結切十三霓虹又音倪霓寒蜩又音倪嵲嵽嵲槷危槷臬禮注云門橛也爾雅云在牆者曰楎在地者曰臬嶭巀嶭又五割切臲臲卼不安書作杌􅥳􅥳見上注䘽裗䘽山髙貌説文作本音孽闑門閫中也􅝝屼􅝝山貌蔑無也説文曰勞目無精也從苜戍人勞則蔑然也苜音未莫結切二十三懱輕蔑目赤説文云目眵也俗作䁾㩢㩢揳不方正也蠛蠛蠓篾竹皮幭帊幞鱴鱴魛今鮆魚也緬細也出蒼頡篇衊汗血也出説文䩏䩏小也即列切㒝㒝僣多詐汗面火不明貌覕不相見貌工雀莊子謂之禾也鴓繼英鳥名瀎瀎泧糏也頡粖糜也又亡達切上同彆弓戾或作方結切九䋢挽又普蔑切閉闔也塞也俗作閉又博計切刀飾名大也䌘繩編劔帶㭭㭭柲也䘷䘷袖褾袂也㔡大力之貌噎食塞又作咽烏結切六䊦粽屬㝣靜也又音翳蠮蠮螉􅧝獸名似牛白首四角出山海經咽哽咽猰猰犺不仁苦結切九䫔䫔短貌挈提挈又持也㼤㼤瓶受一斗也􅩉􅩉多節目也練結切契契闊又苦討切栔爾雅云栔滅殄絶也鍥刻也又斷絶也又古屑切蛪蛪蠅蟲又蛪蚼似蟬而小㚛肥狀虎結切六䩤急繫擷又胡結切􅰐􅰐束又下結切褉褉襦䙽見撇小擊又略也引也亦作撇普蔑切十丿左戻􅞕􅞕然瞋也瞥暫見亦作又芳滅切馝小香也䋢韻略云馭右回又方結切嫳輕薄之貌䫾䫾小風貌鐅江南呼鍬刃瞥瞥日落勢也蹩蹩躠旋行貌一曰跛也蒲結切十四㮰反手擊也䫔戾不正馝香也又音瞥咇咇語也又口香苾菜名説文曰馨香也又頻必切馝香也胇胇㚛肥也飶香食蛂蛂蟥蛢甲蟲也柲支柲醜氣襒襒衣亦作􅗓窒塞也丁結切又陟栗切七蛭水蛭又音質㗧㗧咄嘻蛇蛭氏蕃姓門下入􅩉多節目也練結切七戾罪也曲也戻至盩並又力計切捩拗捩出玉篇綟麻綟唳嘍唳鳥聲盩綬色也左曰也十七薛國名亦姓出河東新蔡沛國髙平四望本自黃帝任姓之後裔孫奚仲居薛歷夏殷周六十四代為諸侯周末為楚所滅後遂氏焉説文作草也私列切十九田器紲繫也左傳曰臣負羇紲杜預云紲馬韁也亦作絏俗作靾緤上同褻衷衣辥説文􅓧也凡從辥者經典通作薛泄漏泄也歇也亦作泄又姓左傳鄭大夫泄駕又餘制切泄治井亦除去又姓泄子古賢者出韓子禼字林云蟲名也又殷祖也或作偰又作契古文媟狎也慢也説文嬻也齛亦作齥爾雅云羊曰齥䊝𥻦䊝注暬晦也絬堅絬㡜殘帛又音雪疶痢也亦作㔎斷也列行次也位序也又陳也布也説文作􅍌分解也亦姓鄭有列禦寇著書十八篇良辥切二十􅍌上同迾遮遏蛚蜻蛚蟋蟀鮤刀魚也一名鱴刀今鮆魚也烈光也業也又忠烈又猛也熱也火也洌水淸也潔也冽寒也裂擘裂破也左傳曰裂裳帛而與之茢禮記云桃茢可以為帚除不祥説文芀也颲風雨暴至鴷啄木栵細栗爾雅云栵栭今江東呼為栭栗楚呼為茅栗也㤡憂心挒埤蒼云搩也􆄔次第馳馬塍也水流貌姴美也䅀説文曰黍穰也哲智也陟列切五哲哲並上同嚞古文蜇螫也亦作蛆傑英傑特立也又俊也渠列切十四桀磔也又夏王名竭盡也舉也碣説文曰特立之石也又東海有碣石山楬有所表識説文櫫也春秋傳曰楬而書之榤雞栖於榤揭髙舉又朅許二音渴水盡也嵥嵥髙貌滐水激回出海賦櫭木釘名偈武也杰梁四公子名䨲杰也搩強暴熱釋名曰熱爇也如火所燒爇如列切二􅚿疲役貌晢光也旨熱切九晣上同浙江名在東陽一曰浙米也折拗折又虜復姓南涼秃髮傉擅立其妻折屈氏為皇后又常列切靼柔皮古文靼俗䏳脟皮也晣目明舌口中舌也山海經云長舌山有獸名長舌狀如禺而四耳出則郡多水又姓左傳越大夫舌庸也食列切四揲數蓍又思頰切蛥蛥蚗蟪蛄别名鞨治皮亦作㓭折斷而猶連也説文斷也又作常列切一孽臣僕庶孽之事謂賤子也猶樹之有孽生也説文曰庶子也魚列切十二糱麴櫱説文曰牙米也讞正獄説文作􅮙議􅓧也與法同意􅮙上同蠥妖蠥説文曰衣服歌謡草木之怪謂之襖禽獸蟲蝗之怪謂之蠥孽俗闑門中礙也山髙貌説文作危髙也又藝哲切钀馬勒傍鐡櫱櫱餘又姓何氏姓苑云東莞人本姓薛避仇改之䶬龍鬐脊上䶬䶬又丁篋切䡾髙貌滅盡也絶也亡列切二搣手拔又摩也扺也椊也朅説文去也丘竭切又去謁切五揭髙舉也又擔也藒藒車香草愒息也􅤎玉篇云􅤎界也鷩雉屬似山雞而小周禮有鷩冕並列切七鱉魚鱉俗作鱉蟞虌蕨菜鄨水名在牂牁大阜憋急性貌䳤鵂鶹絶斷也作絶非情雪切一蕝束茅表位子恱切又子芮切三絶絶斷物也隔雪凝雨也元命包曰隂凝為雪釋名曰雪綏也水下遇寒氣而凝綏綏然下也又拭也除也相絶切四雪上同出説文㡜㡜縷桃花今製綾花㩨滅㩨皮破丑恱切一恱喜也脫也樂也服也經典通用説又姓後燕録有恱綰弋雪切七説姓傳説之後又失爇始鋭二切閲簡閲也又閥閲蛻蟬去皮也又他卧他外舒芮三切娧姚娧美好又他會切草名似芹䓲草生而新達曰䓲也缺少也説文曰器破也傾雪切二蒛蒛葐草也噦逆氣乙劣切一爇燒也如劣切五焫上同見禮蚋蚊蚋又如鋭切㨎括也訥言遲聲説告也釋名曰説者述也宣述人意也失爇切又恱稅二音一拙不巧也職恱切十一炪説文曰火光也䂐短也梲梁上楹蝃蜘蛛凖應劭云凖頰權凖也李斐云凖鼻也又章允切䫎頭短􅵌倔􅵌短貌䪼面秀骨􅙐醎葅䖦蟲啜大飲昌恱切二啜茹也輟止也巳也陟劣切十五畷田間道又竹芮切惙疲也憂也餟祭酹也又竹芮切罬捕鳥覆車罔一名罦剟説文刋也醊醊連祭也啜言多不正䞵跳也綴連補也又竹芮切掇拾取又丁活切腏骨間髓也車具叕連也茅蜘蛛説文曰蟊作罔蛛蟊也又壯殺切劣弱也鄙也少也力輟切十三上同埒馬埒亦崖也還也堤也爾雅山上有水埒又孟康云等􅋻垣也䟹䟹跳踉見出字統鋝説文曰十一銖二十五分之十三周禮曰重三鋝又音刷脟脅肉㸹牛白脊出字林蛶爾雅曰蛶􅲈何㲕毛色班也浖隈隅也哷雞鳴㭩木名又音捋禾麥知多少瞥暫見亦作説文曰過目也又目翳也芳滅切又芳結切四潎漂潎又匹蔽切憋怒也又卑列切枯病别異也離也解也説文作剮又姓何氏姓苑云揚州人皮列切又彼列切二大山名書亦作别轍車轍直列切五徹通也明也道也達也又丑列切撤發撤又去也經典通用徹徹水澄㯙棗也䇷分䇷一云分契方别切五上同莂種穊移蒔也扒擘也别分别刷掃也清也所劣切四刷上同鳥理毛也小飲孑單也居列切六訐訐發人私釨句子戟也趌趌􅺻跳貌䅥長禾揭揭起設置也陳也合也識列切二蔎香草呐嗗呐聲不出女劣切又女鬱切一􅡚舉目使人許劣切六小風貌盡也滅滅也小飛鳥吷飲也説文與啜同妜鼻目間輕薄曰妜也於恱切一蹶有所犯災紀劣切又居月又居衛二切五豕發土也角觸䞵小跳罬罦也又陟劣切茁草生貌側劣切又側滑切二䵵短黑貌也膬耎而易破七絶切四絟細布别名石破敠斷敠絶蠽茅蠽似蟬而小列切八上同小雞説文少也摘去也𣧖木死説文曰束髮少小也鳴摋茱茰山列切又音殺一焆煙氣於列切二怒􅋄草初生貌丑列切七撤抽撤硩擲也周禮有硩蔟氏徹通也䚢䚢聅司馬法曰小罪聅聅謂以箭貫耳䒆船行娎喜貌計列切二焎火氣啜説文曰嘗也爾雅曰茹也禮曰啜菽飲水殊雪切一䥷割斷聲厠列切一㿱枯也寺絶切二􅔼江􅔼似蝤蛑生海中掣挽也昌列切又昌制切二瘛瘛癡小兒病又昌制切抴亦作拽拖也羊列切又余丗切一城門中板也土列切十八藥説文云治病草禮云醫不三丗不服其藥又姓後漢有南陽太守河內藥嵩以灼切三十一躍跳躍也止也進也礿祭名禴上同蘥燕麥鑰關鑰內肉及菜湯中薄出之瀹上同又漬也草瀹上同亦水名在泚陽亦作􅖐􅖐水名爚煜耀光明櫟櫟陽縣名在京兆又音歷籥量器名䋤白䋤縞也岸上見也説文作敫光景流貌籥樂器郭璞云如笛三孔而短小廣雅云七孔幕屋也出新字林矐視貌􅭃􅭧􅭃螢火別名纅絲色鸙鷚鸙鳥㜰㜰媄之貌仰也䟑趠䟑行貌㿑淫㿑病也門籥門門籥視不定躍登也履也出走也䖃䖃䖃風吹水貌略簡略謀略又求也法也要也又姓何氏姓苑云零陵人離灼切九䌎紩擽字統云擊也掠抄掠劫人財物㗉爾雅云利也晉有禇㗉䂮上同􅨑渠􅨑蜉蜉蟲朝生暮死亦作􅶗䀩説文曰眄也方言云視也䛚約䛚歎美也腳釋名曰腳卻也以其坐時卻在後也居勺切五腳俗蹻走蹻蹻貌郤節也又去約切屩草履也灼燒也炙也熱也之若切十六斫刀斫又漠復姓有斫胥氏何氏姓苑云今平陽人彴橫木渡水㣿痛也勺挹取也又周公樂名又音杓酌酌酒又益也挹也行也取也霑也繳矰繳説文作生絲縷也焯火氣䅵五穀皮又音桔妁媒妁説文曰酌也斟酌二姓也又音杓謶欺也䉛玉篇云􅜷米具犳獸名䶂鼠屬玉篇云禈衣齊地名爍灼爍書藥切七鑠銷鑠獡犬驚㜰美好也爚倏爚光貌又音藥䁻美目䟏動也又音櫟若如也順也汝也辝也又杜若香草亦姓魯人也又虜三字姓後魏書若口引氏後改為寇氏而灼切十一弱劣弱鄀地名在襄陽箬竹箬蒻荷莖入泥之處又菜名楉楉榴安石榴也溺水名出龍道山其水不勝鴻毛又奴歷切䐞脆腝説文曰肉表革裏也惹䛳惹叒搏桑叒木足下又綽寬也昌約切四繛古文婥婥約美貌磭大脣屵磭貌又魚偃切約約束又儉也少也又姓韓子有古賢者約續於略切又於笑切二藥白芷葉卻退也去約切四却俗地名在河東食瘡疾虐酷虐説文作殘也魚約切三磭大脣貌又音綽瘧病也妁媒妁市若切又音酌六勺周禮梓人為飲器勺一升又漢復姓殷人六族有長勺尾勺二氏又音酌汋瀱汋又土角切杓杯杓仢仢約流星芍芍藥蕭該云芍藥香草可和食芍張略切藥良約切又芍陂在淮南七削切又蓮芍縣名在馮翊之若切又􅝀茈草名胡了切㲋説文曰獸也似兔青色而大象形頭與兔同足與鹿同丑略切六㲋上同婼叔孫婼魯大夫説文曰不順也逴略逴行貌辵説文云乍行乍止從彳止聲蠚蟲行毒亦作蠚又火各切削刻削息約切一斫斬也側略切一爵封也禮含文嘉曰殷爵三等周爵五等白虎通曰三等法三光五等法五行也淮南子曰爵祿者人臣之銜轡也文字音義曰爵量也量其職盡其才也又禮器周禮曰享先王以玉爵即略切七古文雀鳥雀禮記云雀入大木為蛤爝炬火莊子云日月出矣而爝火不息又音嚼燋火未然也㩱捎也䶂鼠似兔而小也皭靖也埤蒼曰白色也在爵切三嚼噬嚼爝炬火鵲淮南子云鵲知太歲之所字林作鵲七雀切舄人姓纂文云古鵲字趞行貌㹱宋國良大碏敬也又人名衛大夫石碏芍陂名在壽春皵皮皴爾雅云棤皵謂木皮甲錯踖陵也馺也䇎驚也䱜魚名出東海噱嗢噱笑不止其虐切九蹻舉足髙又居勺切􅵍須臾亦倦也天神蟲又丘良切説文曰口上阿也一曰笑貌臄説文並同上醵合錢飲酒䐘䐘䐘大笑也嬳作姿態也憂縛切四上同彠度也又乙􅉑切臒大也善也縛繫也符钁切一矆大視貌許縛切四矆上同彏弓弦急貌又居縛切戄驚戄又曰遽視籰説文曰牧絲者也亦作篗五縛切五上同籰子菜筌取魚器也䢲行不住䢲䢲天下玃大猿也説文曰大母猴也居縛切十一貜上同説文曰榖貜也􅴦大步钁説文曰大鉏也方言云關東名曰鹵斫也攫搏也矍説文云隹鳥欲逸走也從又持之矍矍也一曰視遽貌健貌彏弓弦急貌躩盤辟貌三首鳥􅵂車輞芍芍藥香草張略切七著服文於身又直略張豫二切説文云斫也櫡説文曰斫謂之櫡鐯钁也􅺸上同擆置也擊也著附也直略切一躩説文云足躩如也丘縛切二往也戄大視具籰切五大步又居縛切健貌又居縛切𨟠鄉名貜大猿又居縛切逽走逽女略切三閠閭牽引也蹃踐也􅱠美雨孚縛切一謔戲謔虛約切一十九鐸太鈴也軍法用之又木鐸金鈴木舌釋名鐸度也號令之限度也又姓左傳晉大夫釋遏寇徒落切十五剫治木也説文判也爾雅曰木謂之剫度度量也又音渡􅴇忖􅴇踱跣足踏地澤楚詞云冬冰之各澤襗褻衣顱欺也􅝿􅝿胡履也䐾肫䐾無檢限也㤞徴也亦作􅗘喥口喥喥無度仛他輅莫無也定也説文本模故切日旦冥也從日古茻中茻音莽又州名開元十三年改鄭州去邑亦姓楚莫敖之後又虜復姓五氏西秦録有左衛將軍莫者羖羝南涼州刺史莫侯悌眷後魏末有亂寇莫折念生又有莫輿氏莫盧氏又虜三字姓周太祖賜廣寧禓纂姓莫胡盧氏也慕各切十六幕帷幕又姓鄚縣名在河間又姓膜肉膜鏌鏌鎁劔名摸摸􅟥又莫胡切漠沙漠又施也也瘼病也寞寂寞説文作嗼瞙字統云目不明嗼鼽嚏塻舍塻亦塵塻死也説文作㱳云死􅓦㱳也定也見文動落零落草曰零木曰落又始也聚落也左傳注云宫室始成祭之為落亦姓出姓苑又漢復姓二氏漢有博士落姑仲異益部耆舊傳有閬中落下閎善歷也盧各切三十四絡絡絲又姓烙燒烙洛水名書曰導落自熊耳漢書作雒珞瓔珞也酪乳酪樂喜樂又五角五教二切説文云兩也轢陵轢又音歷笿籠笿硌磊硌駱白馬黑鬛曰駱又姓出東陽吳有駱統大白􅛘生革去皮節又剔也鉻説文􅚎也馲馲駝又音託驝上同鮥魚名又五格切䶅鼠名又下各切雒字林鵋鶀鳥又姓駱絡雒並出姓苑㰚出音譜謊狂言躒晉大夫名輔躒夲又音歷鵅鳥􅖂水鳥􅓼治病又音料􅿗殂也大貌挌打也􅣍似黑文赤頭濼水名在濟南又音祿袼䙔袼䀩大目閣漢宫殿疏曰天祿閣騏驎閣蕭何造以藏祕書賢才也又姓急就章有閣并訴格樹枝胳胳腋袼袼𧜥也又袂也恪敬也又姓晉有中郎令恪啓若各切三恪愙並上同咢徒擊鼓謂之咢詩云或歌或咢説文作咢譁訟也五各切二十五愕驚也鄂國名在武昌又姓漢安平侯卾君諤謇諤直言説文曰刀劔刃也説文曰似蜥蜴長一丈水潛吞人即浮出日南上同遌心不欲見而見曰遌萼花萼鍔劔端籀文崿崖崿鶚鳥名鰐魚名噩爾雅曰太歲在酉曰作噩亦作咢齶口中齗齶出字統齶上同顎嚴敬曰顎山峯鑩以鐡作鉤物也偔多也堮坼堮上同㮙穽也湂水名面大貌匹各切十五奤俗濼陂濼䨰上同粕糟粕膊説文曰薄脯膊之屋上􅿤割肉𩌏車覆軛搏擊也胉脅也蒪蒪苴大蘘荷名􅡺􅡺齒相也蘀也舂也飛去也又步各切惡不善也説文曰過也烏各切又烏故切四惡俗堊白土蝁蛇名泊止也傍各切十一亳國名春秋時陳地漢為沛之譙縣魏為譙郡晉為南兖州齊為亳州箔簾箔薄厚薄説文曰林薄也又姓漢文帝母薄氏礴盤礴簿蠶具􅫜􅫜䩣􅓏也鑮似鍾而大踄蹈也魚似鯉一目也餺餺餅亦作􅌜羹􅌜呵各切又火酷切十一鄗縣名漢光武改為髙邑壑溝也谷也坑也虛也壑上同蠚螫也亦作蠚謞讒慝郝姓也殷帝乙時有子期封太原郝鄉後因氏焉鰝爾雅云大蝦也出海中似蝗長二三尺靑州有之熇熱貌又火沃切嗃嚴厲貌易云家人嗃嗃矐重目又失明也索盡也散也又繩索亦姓出燉煌蘇各切又所戟切六􅟥摸􅟥溹水名在滎陽又所戟切􅤼􅤼􅝿草名㮦白㮦水名涸水竭也下各切十一鶴似鵠長喙左傳曰衛懿公好鶴有乘鶴軒貈説文曰似狐善睡獸也穆天子傳曰天子獵於滲澤得玄貈以祭河宗周禮曰貉踰汶則死此地氣然也貉狢並上同􅏖􅏖澤冰貌佫人姓出纂文䮤説文曰死名一曰馬白額􅻂望也䅂似黍而小䶅鼠出胡地昨昨日隔一宵又羌復姓有昨和氏在各切二十酢酬酢蒼頡篇云主答客曰酬客報主人曰酢莋縣名在越嶲怍慙怍穿鑿鏨也古史考曰孟莊子作笮竹索西南夷尋之以渡水筰上同柞木名又音作㸲山牛岝岝萼山髙䣢地名在蜀亦姓出蒼頡篇飵楚人相謁食麥饘曰飵草繩㡗筰縆也秨禾稼動搖砟石上又人名葃茹草又士革切鈼鉹也吳人云也博廣也大也通也從十敷亦州名春秋時齊之聊攝也秦為東郡地隋為博州因博平縣以名焉又姓古有博勞善相馬也補各切二十髆胸髆搏手擊爆迫於火也鎛鐘磬上橫木也又田器也詩曰庤乃錢鎛㗘㗘㗱㗱貌㗱姊入切上同襮衣領鑮大鍾簙六簙棊類出説文丗夲曰烏曹作簙書本多單作博䗚䗚蟭螳蜋卵也猼犬名䍸䍸䍫獸名似羊九尾四耳其目在背出山海經䍫徒何切欂欂櫨枅也車下索也溥水名䶈䶈鼠餺餺飥䙏短袂衫􅡺蠶具名吳人用諾説文應也奴各切一霍揮霍爾雅曰霍山為南嶽又姓武王弟霍叔之後虛郭切十二靃地名説文曰飛聲也雨而雙飛者其聲靃然霩雲消貌䁨驚視藿豆葉又香草矐目開彉張也説文曰弩滿也又郭廓二音彍上同攉攉盤手戲瀖瀖泋衆波聲劐裂也癨吐病郭城郭也釋名曰郭廓也廓落在城外也丗本曰鯀作郭亦姓出太原河南潁川東郡馮翊五望本自王季之後又云氏於居者城郭園池是也案説文作為居作為氏也古博切十並見上注崞縣名在代州又山名椁禮曰殷人棺椁又木名槨上同彉弓張説文曰弩滿也彍上同埻埻端國名又音蟈耳矌雘丹也烏郭切六蠖蚇蠖屈伸蟲名味薄臒羮肉玉篇云善肉鸌水鳥嬳恐嬳穫刈也胡郭切十鑊鼎鑊戄心動也穫穫落木名穫禾火穫禾火熱濩説文曰雨流霤下貌擭柞擭淺則施之䨥䨥大雨㾰廓空逺廓空也大也虛也亦州名漢西羌地前涼湟河郡周為廓州也苦郭切六鞹皮去毛漷水名在魯又許虢切􅒠解也裂也籗爾雅注云捕魚籠亦作籗又仕角切噋𫾣噋噋聲也亦作㗥瓁朴瓁五郭切一硦硦石聲盧穫切音廓一㘀鳴㘀㘀亦作嗽祖郭切一二十陌阡陌南北為阡東西為陌莫白切十八帞頭巾袹袹復􅙵靜也㱳上同貘食鐡獸似熊黃黑色一曰白豹蛨虴蛨蟲貊鸞貊佰一百為一佰也驀騎驀𩢷𩢷驢父牛母亦作馲􅦢􅦢上同嗼詩云盈盈一水間嗼嗼不得語貉北方獸洦水淺貌擊也越銆銆刃軍器磔張也開也爾雅曰祭風曰磔陟格切十一虴虴蛨舴舴艋小船𩢷戇鳥雞屬馲馲􅦢顱腦蓋黏貌嫡孎嫡窟也杔杔櫨壓酒器也白西方色又告也語也亦姓秦帥有白乙丙傍陌切五帛幣帛尚書大傳曰舜修五禮五玉三帛又姓出吳神仙傳有帛和舶海中大船鮊魚名草爾雅曰帛似帛俗從廾伯長也又侯伯周書曰率衆時作謂之伯亦姓左傳晉有大夫伯宗又漢復姓二氏韓子有伯夫氏墨家流莊子有伯成子髙博陌切八迫逼也近也急也附也敀上同百數名又姓秦有大夫百里奚柏木名五經通義曰諸侯墓樹柏又姓晉趙王倫母曰柏夫人亦作柏湐洦湐淺水􅴓藍之别名㼣㼿㼣井甃劇增也一曰艱也又姓史記燕有劇辛竒逆切六屐履屐車􅤕倦􅤕􅿣勞也噱戲噱戟刀戟説文作戟有枝兵也釋名曰戟格也傍有枝格也典略曰昔周有雍狐之戟屈盧之矛孤父之戈几劇切八撠持也大藥名獸相踦丮持也􅿣勞也又其戟切髭􅧞求也山戟切又蘇各切六索上同䞽僵仆溹水名碎石隕聲􅭁煮米多水柵村柵説文曰豎編木測戟切三䜺磨豆簎刺也國語曰籍魚鱉也嚄嚄嘖大喚胡伯切二誇貌嘖側伯切八迮迫迮窄狹窄笮矢箙又屋上版又迫也又姓吳有笮融亦作􅪩㳻遮水諎大聲亦作唶舴舴艋蚱蚱蟬齚齧也鋤陌切五齰上同咋㕭咋多聲㕭烏交切泎瀺泎水落地聲岝岝㟯山貌隙壁孔也怨也間也綺戟切七郤姓出濟隂河南二望左傳晉有大夫郤獻子俗從吝綌絺綌􅵍廣雅云勞也極也疲也又大笑嫌恨􅽘西方小貌火笑額釋名曰額鄂也有垠鄂也説文作額顙也五陌切六額上同䱮􅱚䱮魚名峉岝峉或作㟯詻鄭玄云詻詻教令嚴䩹補履逆也􅚏也亂也范曄漢書周防字偉公少孤微常修逆旅以俟過客而不待其報冝戟切六屰説文曰不順也縌漢書古佩襚也㘙説文云呻也紱維嘔客賔客苦格切四喀吐聲礊堅也揢手把著也啞笑聲烏格切二飢虩懼也許郤切一􅠂裂也亦作坼餘倣此丑格切六半步腦蓋㿭皴㿭開韄韄佩刀飾乙白切一拍打也普伯切十魄魂魄怕憺怕靜也皛亦打出蜀都賦又胡了切又莫百切敀大打也疾也又音赴珀琥珀風入水貌破物也洦淺水赫赤也發也明也亦盛貌又虜復姓有赫連氏其先胸奴右賢王去卑之後劉元海之族也勃勃以後魏天賜四年稱王於朔方國號夏都以子從母之姓非禮也乃云王者繼天為子是為徽赫實與天連因改姓曰赫連氏呼格切五爀火也嚇怒也􅩴􅩴赤紙目赤垎土乾也胡格切四䞦䞦倒地楁鞍楁挽車當胸橫木格式也度也量也書傳云來也爾雅云至也亦格五博屬行箭但行梟以格殺漢吾丘壽王善之又姓東觀漢記有侍御史東平相格班古伯切十四􅛕至也亦作假茖山蔥骼骨骼觡鹿角􅱚􅱚䱮魚名鵅鵋􅠿鳥名挌擊也鬪也止也正也格擊也鬪也亦作㪾蛒蠀别名碎麥擊也海魚似鯾肥美鉻陳公鉤也謋謀然虎伯切八唬上同漷水名在東海又音廊砉又呼臭切出莊子飛疾也湱漰湱波激水也硅硅破心驚宅居也説文云宅託也人所投託也釋名曰宅擇也擇吉處而營之也瑒伯切十三㡯古文擇選擇澤潤澤又恩也亦陂澤釋名曰下有水曰澤又州名秦為上黨郡後魏為建興郡周為澤州取濩澤以名之亦姓出姓苑鳥名毛備五色翟陽翟縣名亦姓唐有陜州刺史翟璋又音狄䕪䕪蕮藥草車前別名檡檡棘善理堅刃者可以為射決出儀禮鸅鸅鸆即護田也􅭕􅭕韄刀飾蠌螖蠌襗袗襗土得水也虢國名周封虢仲於西虢秦屬三川郡義寧元年為鳳林郡武德初為鼎州又為虢州亦姓左傳晉大夫虢射也古伯切五乎打之類㶁水裂多言貌唬鳥啼擭手取也一虢切五濩濩澤縣在澤州又音護彠視遽韄刀飾把中皮也㠛陂名又村名在吳王舊城側也蹃踐也女白切二搦捉搦又正也天神蟲名擭切二􅒠解本欂欂櫨戶上木弼戟切二説文曰壁柱也二十一麥白虎通曰麥金也金王而生火王而死又姓隋有將軍麥鐡杖嶺南人俗作麥莫獲切八説文曰血理之分哀行體者又作脈經典亦作脈周禮曰以鹹養脈釋名曰脈幕也幕絡一體也脈上同脈籕文霢霢霂亦作霡眽説文曰日才視也覛爾雅云相也説文本莫狄切哀視也籀文獲得也又臧獲方言云荆淮海岱雜齊之間罵奴曰臧罵婢曰獲亦姓宋大夫尹獲之後胡麥切八畫計䇿也分也又胡卦切嫿分明好貌劃錐刀刻鱯魚名彠度也又烏虢切㗲㗲嘖叫也咟上國蟈螻蟈蛙别名古獲切十六馘􅎒耳又獲也或作聝聝上國幗婦人喪冠膕曲腳中也上同埻埻端國名出山海經摑打也亦作漍水挻䂸䂸破慖悖也嘓口嘓嘓煩也䬎䬎赤氣熱風之怪讗讗嚄疾言大血檗黃檗俗作蘗博厄切五擘分擘薜爾雅云山芹當歸也又曰山麻也癖豆中小硬者出新字林糪飯半生貌䌟織絲為帶蒲革切四繴罿也翻車欂欂櫨又木名也賾探賾士革切七鰿爾雅曰貝小者鰿郭璞云今細貝亦有紫色者出日南又音迹葃茹菜又音藉㣱容尋常人矠以又矛取物也耫灰中種也嘖㗲嘖叫也責求也側革切十一頗頭不正貌簀牀簀幘冠幘漢書曰幘古卑賤執事不冠者祈服之説文曰髮有巾曰幘嘖大呼聲謮謮怒説文同上債負財􅜽小貝也子魚子脯出新字林嫧鮮好咋大聲䟄急走也出字林查獲切二䟄䟄黠貌出方言謀也籌也釋名曰䇿書教令於上所以驅䇿諸下也又馬箠也楚革切十四册簡册説文曰符命也諸侯進受於王也象其札一長一短中有二編之形笧古文嫧健急貌齰齒相值也策卜筮策也告也矠矛也憡憡痛皟淨也㥽耿介正也捒扶捒也柵豎木立柵又村柵礊鞭貌楷革切六説文曰裘裏也𩱘上同緙紩也又織緯罊器空諽謹也剨破聲呼麥切二十一繣徽繣乖違飛聲㦎不慧又㦎㦎辨快出音譜劃作事又音畫捇捇掘土又裂也掝裂也𠸹大笑貌礊鞭聲又口革切䐸曲腳中也焃赤掝擘也又于馘切裂帛聲辛目病湱漍湱水出西豁痛䦝䦝門水貌䬉熱䬉刀破核實也下革切九繳衣繳衣領中骨又音酌䃒石地翮鳥羽㮝木名核果中核崔豹古今注云烏孫國有青田核莫測其樹實之形至中國者得其核耳大如六升瓠空之以盛水俄而成酒味甚醇厚燒麥滆湖名在常州義興縣蒚蒲臺頭名隔塞也古核切十六膈胸膈搹扼也出儀禮鬲縣名在太原又鬲津九河名又姓殷末賢人膠鬲之後又音歷鼎屬也槅車槅革改也獸皮也兵革也亦姓漢功臣表有煮棗侯革朱子竹障出通俗文智也諽謹也轡首虎聲䨣雨也瞔翅也􅱚魚也嗝雉鳴摘手取也陟革切又他歷切九謫責也又丈厄切謫上同大怒張耳棏蠶棏或作硬貌䊞黏䊞厇張厇矺磓也厄災也説文隘也於革切十四厄上同扼持也握也捉也扼上同軛車軛厄限也礙也又危也迫也塞也豟爾雅曰豕絶有力豟又云彘大五尺為豟呝呝喔鳥聲鼠屬貖上同蚅蚅鳥蠋大如指似蠶飢貌啞笑聲視梀木名山責切十四小雨􅱵瘮􅱵寒貌䨛霰摵殞落貌訴驚懼貌又音素擌黐擌捕鳥捒捒擇取物也􅧞求也取也好也索上同溹溹溹雨下貌堅硬􅊒虎驚貌又許逆切㳻説文曰所以􅗙水也􅚹射中聲也普麥切二糪飯半生熟爾雅云米者謂之糪虉爾雅云虉綬虉小草雜色似綬五革切又五狄切四鳽鵁鶄又音堅䩹履頭㣂㣂補也礐礐硞水石聲也力摘切二􅩯􅩯礋打草田器出字林掝裂聲也簪摑切一𢷾拂著又捎𢷾也出通俗文砂獲切一足長貌求獲切一疒疾也尼厄切又仕莊切三炙餅餌名眲耳目不相信出列子二十二昔往也始也為一昔之期明日也説文作昔乾肉也又姓漢有烏傷令昔登思積切十四籕文臘乾肉見經典惜吝惜説文痛也潟鹹土磶柱下石舄履也崔豹古今注云以木置履下乾臘不畏泥濕故曰舄也上同蕮車前草鬄説文髲也䯜胯骨間也水鳥焟火乾棤皮甲錯也積聚也資昔切又資賜切十八脊背脊釋名曰脊積也積續骨莭終上下也説文作背吕也蹐蹐地小步借假借也又資夜切迹足迹迹上同速籕文踖踧踖敬貌又秦昔切鴒一名雍􅖥又名錢毌大於燕頸下有錢文亦作鶺鰿爾雅曰貝小者鰿郭璞云今細貝亦有紫色者出日南􅜽上同􅠧魚名鯽上同迹詩傳云不迹不循道也小水襀襞也䃊䃊庴縣在臨卭益增也進也伊昔切八諡笑貌嗌喉也漢宣帝崩昌邑王至京師不哭云嗌痛地名齸爾雅曰麋鹿曰齸牛曰並吞芻而反出嚼之也膉肥也益母草爾雅注只作益鼠名繹理也陳也長也大也終也充也説文云抽絲也羊益切三十三睪引繒貌説文曰司視也從目從㚔令吏將曰捕臯人也亦揔也俗作奕奕美貌又博奕奕大也又輕麗貌又行也盛也帟小幕曰帟譯傳言周禮有象胥傳四夷之言東方曰寄南方曰象西方曰狄鞮北方曰譯懌恱也樂也改也斁猒也驛驛馬嶧山名在魯醳苦酒腋肘腋掖持臂又縣名又掖庭也一曰正門之旁小門也亦姓𧜥𧜥縫易變易又始也改也奪也轉也亦水名出涿郡安閻山見水經亦州名漢書趙分晉得中山秦為上谷郡漢置涿郡隋為易州因水名之又姓齊大夫易牙又盈義切液津液又姓急就章有液客調痬病相染也蜴蜥蜴埸壃埸圛説文云回行也啇書曰圛圛者升雲半有半無襗衣襦射無射九月律墿道也焲火光襗重祭名殷曰肜周曰襗亦作繹㴒浟㴒水貌燡火甚之貌耕也又音釋交㘁㘁川災也出字林光貌釋捨也解也散也清也廢也服也又姓施隻切十六釋説文曰漬米也檡梬棗適樂也善也悟也往也又姓奭盛也又驚視貌又邵公名説文作奭郝人姓又呼各切睗睒睗急視晹日無光嫁也耕貌螫蟲行毒亦作螫􅚎剃髮又音逖盜竊懷物也從兩入弘農陜字從此冟餅堅柔相著䁺視貌衡雨衣尺家語曰布手知尺舒肱知尋説苑曰度量衡以粟生之十粟為一分十分為一寸十寸為一尺昌石切十一赤南方色又姓出姓苑又漢復姓二氏莊子有赤張滿稽郭象注云赤張姓也韓子曰智伯以鍾遺仇繇赤章枝諫仇繇令不受烾古文蚇蚇蠖蟲名易亦作尺斥逐也逺也又斥候説文曰郤行也從廣屰屰音逆斥上同澤白澤郝鄉名滷鹵滷姓也獸也石釋名曰山體為石亦州名秦伐趙取離石周因邑以名州又姓左傳有衛大夫石碏又漢復姓二氏孔子弟子有石作蜀何氏姓苑有石牛氏常隻切七碩大也祏説文云宗廟主一曰大夫以祏為主鉐鍮鉐䄷説文云百二十斤也鼫鼫鼠螻蛄䲽鳥名隻一也説文曰鳥一枚也從又持佳持一隹曰隻二隻曰雙之石切十三適往也又施隻切又都歷切炙説文曰炮肉也從肉在火上墌基址托拾也拓上同跖足履踐也楚人謂跳躍曰跖跖上同説文曰足下也蟅􅡂負蟲亦作蟅又音柘䨥䨥大雨䞠行也􅷘仄也𧜥袖也擲投也搔也振也直炙切七擲上同出説文䵂麩䵂躑躑躅行不進也蹢上同蠋蟲名潪土得水也皵皮細起七迹切八磧砂磧刺穿也又七四切趚䟐趚行貌涑水名在北䟄倉卒裙衸嫧嫧娕齊謹席薦席又藉也大戴禮曰武王踐阼有席名亦姓出安定其先姓藉避項羽名改姓席氏晉有席坦祥易切六夕期也字從半月又姓漢書巴郡蠻渠帥七姓有羅朴督鄂度夕龔也朴普卜切蜀有尚書令夕斌穸窀穸窀厚也穸夜也汐潮汐鄉名席大也籍簿籍秦音切十三踖踐也上同藉狼藉又姓左傳晉大夫藉談又慈夜切藉藉田藉借也談文曰帝藉千畝也古者使民如借故謂之藉也宋書藉田令古官也於周為甸師塉薄也瘠病也瘦也庴縣名在清河又七削切獵獸名似能出山海經葃茹草膌膌腹䣢地名在蜀簎打也劈撫心也房益切九椑棺也躃躃倒闢啓也開也辟便辟又法也五刑有大辟從阜辛所以制節其罪也從口用法也㱸㱸㱤欲死之貌弓弭萆雨衣毛役古從人今從彳説文曰戍邊也營隻切十二䓈燕人呼芡又羊捶切疫説文云民皆疾也魚名有四足出文字集略坄喪家塊竈説文曰陶竈窗也垼上同炈亦同􅝣􅝣鳩鳥鈠小矛䨥大雨豛豬之别名􆈗蟲名瞁驚視許役切二眼也辟爾雅皇王后辟君也亦除也又姓漢有富室辟子方又有辟閭彬必益切七璧白虎通曰璧者外圜象天內方象地爾雅曰肉倍好謂之璧肉邊好孔也鐴鐴土犂耳躄跛躄説文作􅵋人不能行也􅵋上同襞襞衣説曰曰韏衣也治也僻誤也邪僻也芳辟切四辟上同見詩癖腹病廦牆也麝麝香也食亦切又食夜切二射丗本曰逢蒙作射又姓吳有中書郎射慈又神柘切又羊謝羊益二切碧色也説文曰石之靑美者又八品九品服色代靑也紀年曰惠成王七年雨碧于郢彼役切一黏黐竹益切一彳説文云小步也象人脛丑亦切二􅤕瓶也卷之役切一􅡚小動七役切二小行二十三錫賜也與也亦鉛錫玄中記曰鉛錫之精為婢又姓吳志云漢末有錫光先擊切十三析分也字從木斥破木也又爾雅曰析木謂之津注云即漢津也亦姓風俗通云齊大夫析歸父析俗裼袒衣晳人白色也緆細布􅻢説文同上􅔼􅔼蜴菥菥蓂大薺淅淅米惁敬也㱤㱸㱤欲死之貌激疾波又姓淮南王傳有激章古歷切九擊打也墼土墼轚舟車獥狼子敫敬也草名揚貌鸄鳥名似烏霹霹靂普擊切七劈剖也裂也破也澼莊子洴澼絖漂絮者憵急速䤨裁木為器癖痃癖病僻邪僻靂霹靂郎擊切四十五䟐䟐趚行貌趚七昔切酈縣名在南陽亦姓又力知切癧瘰癧轢車踐又音洛鎘鎘鎗䥶上同礫釋名曰小石曰礫瓅珠瓅秝稀踈櫪馬櫪䍽羖䍽櫟木名柞屬又音藥櫟陽縣名魚名亦作􅱚歷經歷又次也數也近也行也過也又歷日續漢書律歷志云黃帝造歷丗本曰容成造歷尸子曰羲和造歷或作曆曆見上注藶葶藶子瀝滴瀝磿石聲寥寂寥無人又深也又音聊鬲爾雅曰鼎款足者謂之鬲説文作鬲鼎屬實五觳斗二升曰觳象腹交文三足今亦作鬲鬲瓦器説文同上又作鬲蒚山蒜皪的皪白狀視明貌䍥羃䍥煙狀躒動也䟏上同齒病説文云玉名曆治也攊擊口也𩧂馬色纏裹䤙䤙酪滓履下䐎強脂下酒剆劙開鳥名觻角鋒雜糅食名擽捎也濼一名貫衆葉圎鋭莖毛黑布地生冬不死一名貫渠又音藥蝷爾雅曰蟿螽螇蝷亦作蚸的指的又明也説文作的都歷切二十六適從也又之石始石二切嫡正也君也甋瓴甋磚也靮馬韁鏑箭鏃馰馰顱馬白額又作的滴水滴也亦作肑腹下肉也弔至也又音釣芍蓮中子也亦作的見爾雅蹢蹄也詩云有豕白蹢䶂鼠名又音灼玓玓瓅明珠色出説文樀屋梠雉屬􅙏魚擊網也磓上同扚引也量也啇本也魡魚名㣿㣿痛至也杓柄末橫木檄符檄説文曰二尺書也胡狄切八覡巫覡男曰巫女曰覡薂的薂蓮實也見爾雅鼠名鸄鳥似烏蒼白色獥狼子又音叫音激椺鐘椺又胡老切䚫以角飾杖策頭鷁水鳥也博物志曰鷁雄雌相視則孕或曰雄鳴上風雌鳴下風亦孕五歷切五鶂上同説文又作鷊艗艗舟舟頭為鷁首石地惡虉虉綬草荻萑也徒歷切二十九狄北狄又姓春秋時狄國之後漢有博士狄山敵匹也當也輩也主也籊竹竿貌又他歷切翟翟雉又姓漢有上蔡翟方進迪進也道也蹈也覿見也􅹩上同笛樂器風俗通云武帝時丘仲所作也晉協律中郎列和善吹笛也笛上同出周禮糴市穀米又姓國語有晉大夫糴茂糴俗郵鄉名在髙陵滌洗也除也淨也蓧盛種器也蔋草木旱死也踧詩曰踧踧周道䌦䌦緑色鰍東海有馬鰍魚䵂䵂麩樀屋梠又音的頔好貌梑臧槹爾雅釋木曰狄臧槹是也䊮穀粟之名䢮雨也㹍特牛苖苖蓨草滷鹹也宙説文曰行宙宙也逖逺也他歷切二十逖古文倜倜儻不羈躍跳貌躍上同剔解骨上同䛢狡猾惕怵惕憂也又愛也䯜骨間黃汁硩周禮硩蔟氏掌覆妖鳥之巢又丑列切摘發也動也説文曰拓果樹實也一曰指近之也又張革切踢䟣踢獸名左右有首出山海經䚐説文云目赤也又前歷切􅚎説文云剃髮也望見火貌蓨苖蓨草籊竹竿貌惕勞也欶也失意視貌績緝也功業也繼也事也成也則歷切四績功也樍柳木别名鳥也燩乾燥也苦擊切九􅠎傍擊􅌛攻也漢書云攻苦􅌛淡喫喫食上同矛也敕也吹器惄心之飢也憂也思也奴歷切四古文溺溺水古作休又音弱又姓也愵憂貌寂靜也安也前歷切五􅜝上同􅓦亦同嗼無聲䚐目赤又音逖覓求也莫狄切二十三覛上同説文曰邪視也幎覆也亦作幂幦車覆軨也􅍜上同䮭馬多惡也糸細絲也微也連也冪冪蓋羃覆食巾又羃㒿婦人所戴汨汨泳永羅水名在豫章屈原所沈之處汨漞並上同坰文字音義云以巾覆從一下垂䖑説文云白虎也蓂菥蓂白豕黑頭覭小貌䌐綱繩黑靑䈿䈿濗瀝濗水淺蝀蟲名塓塗也甓瓴甓㼾甎扶歷切四鸊鸊鷈鳥名似鳧而小足近尾或作鸊椑大棺㱸㱸㱤欲死之貌壁説文云垣也釋名曰壁辟也辟禦風寒也漢官典職曰省中皆胡粉壁紫素界之畫古烈士亦州名本漢宕渠地武德初為壁州北激切六鼊鼂鼊似龜而漫胡無指爪其甲有黑珠文如玳瑁可飾物繴爾雅繴謂之今覆車鳥網也又核切廦室屋綼紷綼絮也邪獸獸身鳥喙闃寂靜也苦鶪切二䠐踞也郹邑名在蔡古闃切七狊説文云犬視貌亦獸名猿屬脣厚而碧色鶪伯勞湨水名在溫縣鼳爾雅曰鼠身長須秦人謂之小驢郭璞云似鼠而馬蹄一歲千斤為物殘賊犑爾雅云犑牛黠戚親戚又姓漢有臨轅侯戚鰓倉歷切十一戚憂也懼也􅿏説文曰夜戒守鼓也鼜上同鏚干鏚斧鉞本亦作戚色敗䙾面柔詩本或作戚施戚戚痛蟾蜍別名草也磩碝磩石次玉也赥笑聲許激切九鬩一也很也戾也又相怨也矛也左思吳都賦云長短兵亦作􅧿沐遽也私訟䈪籮屬㦦心不安也去涕㦦惶恐􅧿矛也呼狊切七砉砉然物相離聲瞁驚視眼也狊犬視也焱火華又火焰也殈鳥卵破也痛也丑歷切又丑力切二福二十四職爾雅云職主也常也博雅云業也字林云記微也又姓周禮有職方氏其後因官為姓風俗通云漢有山陽令職洪之翼切九職俗戠説文云一職識字從此織組織説文曰作布帛總名􅕄油敗蟙蟙蟔蟲蝙蝠別名也草名似酸漿亦作蘵䐈脯長尺有二寸曰䐈儀禮作膱樴樴杙直正也又姓楚人直弓之後漢有御史大夫直不疑除力切四犆犆牛也䐈肥腸山直力筋也又姓黃帝佐力牧之後林直切九朸縣名在平原屴屴崱山貌仂不懈鳨似鳧而小亦作趙魏間呼棘出方言水凝合貌脛交遼東犬名敕誡也正也固也勞也理也書也急也今相承用勑勑本音賚恥力切十四敕上同飭牢密又整備也淔水名趩行聲栻局又木名侙意慎侙又惕也􅠃鸂􅠃鷘上同恜從也慎也慗從也遫張也荲蒴別名㽚田器又地名陟升也進也竹力切二稙早種禾食飲食大戴禮曰食穀者智惠而巧古史考曰古者茹毛飲血燧人鑽火而人始裹肉而燔之曰炮及神農時人方食穀加米干燒石之上而食之及黃帝始有釜甑火食之道成矣又戲名博屬又用也偽也亦姓風俗通云漢有博士食于公河內人乘力切二蝕日蝕也説文云敗瘡也釋名曰日月虧曰蝕稍小侵虧如蟲食草木之葉也息止也又嬎息也説文喘也亦姓姓苑云今襄陽人又漢復姓前漢書有河內息夫躬相即切十一㮩木名鄎新鄎縣在豫州瘜惡肉蒠菲蒠菜熄蓄火􅶘􅶘肉䭒食也㴧水簨鳥食實實也是也常職切八湜水淸也殖多也生也植種植也立志也置也埴黏土古文㨁拄杖曰㨁遈流行識説文云常也一曰知也賞職切十式法也敬也用也度也又姓出何氏姓苑拭拭刷上同軾車前飾裝飾方言云趙魏間呼經而未緯者曰機鉽鼎鉽也烒火貌􅱴草名赩大赤也許極切五衋傷痛其心􆉏赤黑貌斜視瞋怒貌崱崱屴山貌士力切四嶷溭溭淢水勢萴草也極中也至也終也窮也髙也逺也説文棟也渠力切一匿藏也微也亡也隱也隂姦也女力切六蟲食病􅉶上同㥾愧也恧慙也又女六切魚名測度也初力切六惻愴也畟畟畟陳器狀説文曰治稼畟畟進也詩云畟畟良耜又音即耜也翼羽翼説文翅也又恭也美也助也亦州名在隴右因翼水為名又姓晉翼侯之後漢有諫議大夫翼奉説文同上􅢅古文䴬麥䴬隿繳射也或作弋藕翹㚤婦宫也漢有鉤㚤夫人居鉤㚤宫漢書亦作弋潩水名出密縣大隗山杙果名如梨亦橛也芅今羊桃也或曰鬼桃葉似桃而花白㔴説文云田器也􅱸趨進􅱸如也疾趨􅰨黍稷蕃蕪貌亦作翼蛡蛡蛡蟲行貌缶甕骨也心動瀷水聚缺盆骨也大鼎熼火光釴鼎附耳在外也癢淫蟲也耕也䴬禾䴬行䘝衣䘝黓酒色即就也今也舍也半也説文作即食也亦姓風俗通有單父令即賣又漢復姓有城陽相齊人即墨成子力切十六即上同稷五穀之揔名一曰黍屬周禮注云社稷土穀之神有德者配食焉共工氏之子曰句龍食於社有厲山氏之子曰柱食於稷湯遷之而祀棄俗作稷亦姓后稷之後㮨木名似松㹄牛名蝍蝍蛆蟲名又子結切楖楖裴縣在魏郡裴房非切畟又初力切蹙迫急鯽魚名犬生三子堲風堲又子栗切䐚膏澤唧唧聲也鴒亦作鶺揤捽也逼迫也彼側切十逼上同皕二百幅行縢名楅束也又音福䮠駝䮠湢湢㳁水驚起勢也䫾風也㘠姓也又閉也皀皀粒域居也邦也雨逼切十四蜮短狐蟲又音或罭魚網棫木叢㚜字林云大力貌􅫁鶝􅫁鳥瓦器琙人名漢有公孫琙羔裘之縫又音洫緎縫也亦同上䮙馬走魊小兒鬼淢溭淢波勢叢也洫溝洫況逼切十四侐靜也侐上同閾門限古文􅴗舉目使人㰲㰲聲吹貌頭痛羔裘之縫緎縫也亦同上羽聲聲也淢疾流赭色堛土田芳逼切十三愊悃愊至誠踾踏地聲坼也飽貌揊擊聲稫稫稜禾密滿也副析也禮云為天子削瓜者副之巾以絺畐道滿也䦼地裂也亦作㽬多也密也疈周禮曰以疈辜祭四方百物稄稫稄阻力切十一一本作此􅉴日􅉴又旁也傾也不正也打也仄仄陋説文云側傾也􅻈日在西方㳁湢㳁水勢萴廣雅云附子一歲曰萴子二歲曰烏喙三歲曰附子四歲曰烏頭五歲曰天雄側傍側夨説文云傾頭也籀文愎很也符逼切八腷腷臆意不泄也􅻘火乾肉也􅟺上同版出通俗文馥香又音復踾踏地聲鶝鶝􅫁鳥嶷岐嶷詩曰克岐克嶷魚力切五薿茂盛㘈説文曰小兒有知也引詩云克岐克㘈懝有所識也觺觺嶽角貌堲疾也秦力切又將七切又牆資切三垐以土增道打也又音側丁力切又丁六切三毛少滴水少䁇細視也亡逼切一瀷水潦積聚昌力切又音翼二字統云耕也二十五德德行又惠也升也福也亦州名秦為齊郡地漢為平原郡武德初為德州因安德縣以名之多則切九德古文觻縣名在張掖漢書作得䙷説文取也今作得同得得失淂水貌又丁力切行約也取也則法則子德切三古文􅋿籀文勒鄴中記曰石虎諱勒呼馬勒為轡盧則切十二肋脅肋釋名曰肋勒也所以檢勒五藏也扐筮者著蓍指間仂禮祭用數之仂艻蘿艻香草朸説文曰木之理也平原有朸縣􅴯美石次玉玏上同泐凝合㔹功大説文曰材十人也阞地脈理坼竻竹根忒差也他德切六㧹打也慝惡也貣從人求物也䁿欲臥也㥂㥂㥂快也刻刻鏤又剝也苦得切五克能也勝也説文作肩也剋剋己又必也殺也急也勀目強罵女老亦作娔特特牛又獨也亦姓左傳晉大夫特宫徒得切九貣假貣謂從官借本賈也亦從人求物也又音忒􅠀食禾葉蟲􅬑上同樴杙也鈍也棏木名鴏鴏􅠍又徒戴切螣螣蛇黑北方色呼北切三潶水名在雍州㱄唾聲墨筆墨又姓墨翟是也亦即墨縣名莫北切十二默説文曰犬暫逐人也又靜也或作默冒干也又莫報切蟔蟙蟔蟲即蝙蝠纆索也万虜復姓北齊特進万俟普俟音其方言同上艒艒釣艇􅾫姓也䁇暫視欲臥也一賊盜也説文作賊則也昨則切七上同鱡烏鱡魚崔豹古今注云一名河伯度事小史鰂上同蠈食禾節蟲亦作賊博雅云測也草名塞滿也窒也隔也蘇則切又蘇載切五上同見説文寨安也㥶實也書曰剛而㥶上同見説文北南北亦奔也又髙麗姓又漢復姓七氏左傳衛大夫北宫貞子莊子有北門成漢有北唐子真治京氏易丗本云晉有髙人隱於此唐因以為氏晏子云齊有北郭先生名騷古有北人無擇淸身潔己疾丗之濁自投淸冷之淵姓苑有北鄉北野氏博墨切二蟲似蟹四足蔔蘆蔔蒲北切十三蔔上同僰僰道縣在犍為又丁壯貌亦醜也亦作􅤵又符逼切匐匍匐上同踣斃也倒也襲因也及也重也合也入也又㭺襲説文曰左衽袍也隰原隰亦州名左傳曰重耳居蒲即隰川縣故蒲城是也漢為蒲子縣後魏齊周之間為沁州隋為隰州以州前有泉下濕蓋取下濕之義名之又姓齊有大夫隰朋鰼爾雅云鰼鰌今泥鰌也又山海經云鰼魚狀如鵲而有十翼鱗在翼端聲如鵲騽馬豪骭又驪馬黃脊飁颯飁大風槢堅木名􅨊鴣􅨊鳥名茵水草出埤蒼簷修船具也䒁上同褶袴褶霫雴霫大雨集聚也會也就也成也安也同也衆也本作雧字林云羣鳥駐木上亦州名漢宕渠縣梁為東巴州恭帝為集州以有集水名之又姓風俗通云漢有外黃令集一秦入切九輯和也楫舟楫又音接集説文云三合也從入一象三合之形合僉之類皆從此又子入切説文云詞之集也菩也鏶鐡鍱慹怖也箿箿覆也又子立切入得也內也納也人執切二草説文云二十并也今作草直以為二十字揖揖遜又進也説文云攘也一曰手著胸曰揖伊入切二挹酌也溼水霑也失入切三濕上同見經典又他合切䏉牛耳動也㗱㗘㗱噍貌子入切㗘昔博十一潗泉出䌖合也又蠻夷貨名湒雨貌咠又七入切蓻草生多貌􅸩襟緣葺茨也䁒眨䁒澀俗鈒戟也鋋也雭小雨聲澀不滑㒊不及翜疾飛吸內息許及切十二吸上同歙説文曰縮鼻也後漢有來歙又舒涉切州名翕火炙一曰起也又斂也合也動也聚也盛也言翕言翕䛅語聲也潝水流貌熻熻熱嬆莊嚴翖漢有侯翖地名闟戟名曰闟鳥名戢止也斂也阻立切九淚出貌􅟲角多貌􅋾上同㗊衆口蕺菜名濈和也喻也霵雨下又士邑切邑縣邑周禮曰四井為邑又漢復姓有邑由氏楚大夫養由氏之後避仇改焉於汲切八悒憂悒唈嗚唈短氣裛裛香又於怯切浥濕潤䓃䓃煙茹熟䭂食䭂湁湁潗沸貌丑入切三雴大雨漐汗出貌煜火貌為立切四曄曄曄又筠輒切熠熠耀螢火又羊入切騽馬豪骭又音習熠熠耀螢火羊入切二孴多貌孨戢孨聚貌尼立切五㵫潗㵫水文貌濕囚囚囚私取貌又女洽切霵暴雨貌仕戢切二䯂盛衆貌鵖亦鴔皮及切一鵖彼及切二皀穀香也㞚㞚㞏初戢切四􅕜􅕜㙷重纍土也䙄重緣行貌卙字統云會聚也昌汁切一二十七合合同亦器名亦六合天地四方對也又州名秦為巴郡宋為宕渠郡後魏置合州蓋涪漢二水合流之處因以名之又姓左傳宋有大夫合左師又漢復姓髙帝功臣表有合博虞侯閣切又音閣十一郃郃陽縣在同州又虜復姓後魏書大莫干氏後改為郃氏又音閣榙榙􅳏果名似李出埤蒼䢔䢔遝行相及也拾拾棔木也詥諧也亦作合耠耕也會也齧聲也草盒盒盤覆也閣爾雅曰小閨謂之閣古沓切十九鴿鳥名合合集又音䢔敆合會也鉿二尺鋌鮯魚名六足鳥尾出山海經蛤蚌蛤郃水名又縣名又音䢔浩浩亹地名亹音門匌周匝也頜頜頷頤傍佮併佮聚㧁閉戶曰㧁􅾄目睫長拾劔柙又巨業切㠷以席載穀鞈防捍韐韎韐大帶口亦同上答當也亦作答都合切十二畣爾雅曰俞畣然也􅹍跛行貌搭打也出音譜答正名云小豆褡橫褡小被㜓面㜓姶貌㾑肥㾑㽺出字林嗒舐嗒犬食㿯皮㿯榙榙􅳏木名趿進足蘇合切十一颯風聲靸小兒履或作上同馺馬行疾霅廣雅曰雨霅霅又音讋􅧁説文云􅧁三十也今作卅直為三十字㚫媕㚫女字􅾄􅾄眼睫長衆行貌鈒鈒鏤沓重也合也又語多沓沓也又虜復姓後魏書沓盧氏後改為沓氏徒合切十八誻噂誻亦作沓􅊱遝䢔遝㧺指㧺㭼柱上木也涾沸溢􅤥馺􅤥馬行龖龍飛之狀􆂆儑􆂆不著事也譶疾言􅳏榙􅳏踏齧踏䂿舂巳復搗之為䂿誻妄言子絹出字林􅫘東魯人呼蘆蔔曰菈􅫘䗘蟲眔目相見錔器物錔頭他合切二十二嚃啜也䓠菜生水中㛥安貌説文曰俯伏也一曰意伏也踏著地帳上覆鞜革履玩飛貌漯水名在平原濕上同狧犬食􅞌上同䶀鼓聲也佮合也䵬晉書有兖州八伯太山羊曼為䵬伯食也車釭也㭼柱㭼頭䍝相罯䍝出字林濌積厚鳥名䈋竹名雜匝也集也猝也穿也説文曰五綵相合也徂合切七韴斷聲磼磼嶫山髙雥羣鳥蓵戶簾止也又才含切䣟亭名在貝丘匝遍也周也子答切十匝上同咂入口噆蚊蟲噆人聲魳魚名䍼羊腌嘁歍嘁沞湆沞才濕䞙䞙急走拉折也敗也摧也盧合切十一搚上同㩉亦同摺敗也飛貌磖磖磼𦑲初飛貌菈菈􅫘秦人呼蘿蔔歁不滿㕇石聲納內也又姓出何氏姓苑奴答切八䪏腝貌蒳字統云香草異物志云葉如栟櫚而小子似檳榔可食軜驂馬內轡繫軾前者衲補衲紩也魶魚名似鱉無甲有尾口在腹下妠姶妠聚物㨥打㨥溘至也奄也依也口答切七死見楚詞本作溘㧁閉戶聲山左右有岸容容合相當也匌匌匝也歁歁歞癡貌姶美好貌烏合切十三短氣罨網又一劫切罯覆蓋也又烏敢切媕女有心媕媕也㔩㔩彩婦人髻飾花也庵庵低又屋跛車具又小兒履名􅨢調色畫繒出郭調字指搕以手盍也又搕𢶍糞也鞥皮裏角也佮姓也欱大啜也呼合切四㽺病劣貌嗽㾑寒㾑日中見絲凡作顯同五合切十礏磼礏哈魚多貌儑􆂆儑衆聲砐峇砐礘動礘礘亦作硆㾑寒㾑病䑥船貌魥魚名䟃走也赴會也七合切二㜗婪㜗遪裹遪士合切一唈爾雅云僾唈也烏答切一二十八盍何不也説文作盍覆也爾雅合也胡臘切十闔閶闔説文云門扇也一曰閉也俗嗑噬嗑卦名蓋苫蓋靜也篕籧篨也㧁纂文云姓也􅥇説文云地名也熆吹火也臘臘蠟盧盍切十四臘俗齧聲䶘上同鑞錫鑞蠟蜜蠟蠟俗擸折也又擸𢶍破壞也㿴皮瘦寬貌𦑲鳥飛搚摺搚相和􅪨飛初起貌繒邋邋遢行貌㿴㿴都搕切十一耷大耳􅒽手打也㩉上同矺擲地聲又竹亞切亦作矺相著聲一曰鉤也笚竹相擊䓠菜生水中又荷覆水褡橫褡小被𩌇熱𩌇𩌇榻牀也吐盍切十九㯓上同兩槽大船毾毾㲪鰈比目魚別名魼上同鰨魚名似鮎四足􅺀􅺀布傝傝隸亦傝儜劣又傝􅳇不謹貌狧犬食上同多言古盍切莫大羽飛貌鞳鏜鞳鍾聲又他答切塔浮圖搭摸搭嗒嗒然忘懷也遢邋遢不謹事馬行不進大啜呼盍切三􅾿魶􅾿魚名出山海經㽺肥㽺魶魚名奴盍切三笝纜舟竹索也踏踐也徒盍切十躢上同見公羊傳闒門樓上屋説文曰樓上戶也爛也墮也忘語也譫多言又作䍇瓶𦑲𦑲鳥飛䈳窗扇􅪨􅪨􅳇傝􅳇不謹貌私盍切七食貌𢶍搕𢶍糞又才盍切􅧁三十行貌靸靸鞋起也出新字林儑傝儑不著事也五盍切二睡䨿惡也又姓出纂文今北海有之才盍切二𢶍擸𢶍和雜䫦䫦車頷骨古盍切八多言又音盍嗑上同蓋姓也漢有蓋寬饒字書作􅥇閘閉門鉀鉀爐䗘䗘􅥇地名榼酒器也苦盍切六磕石聲􅜵􅜵襠廅廅崩損也䶀鼓聲䶀􅮣車聲鰪鰪鱂魚名安盍切四盦説文云覆蓋也廅山旁穴短氣也又烏合切囃助舞聲也倉雜切三石多貌䵽鼓聲砝石聲居盍切二鳥名譫多言也章盍切一二十九葉枝葉又姓吳志孫堅傳有都尉葉雄與涉切又式涉切十楪楪榆縣名在雲中揲度揲鍱銅鍱偞偞偞輕薄美好貌枼薄也㯿柶端又力葉切煠煠爚䈎篇簿書䈎説文籥也殜病也接交也持也合也會也又姓三輔決録有接昕子即葉切十一椄續木睫目睫釋名曰捷插也插於眶也説文作睫目旁毛也睫上同楫舟楫楫上同婕婕妤亦作倢妤菨莕菨水草可食􅟫􅟫㳧才有水貌鯜魚名箑竹箑又所甲切攝兼也録也書涉切八灄水名在西陽葉縣名在汝州又余涉切歙黟歙又許及切欇爾雅欇虎櫐郭璞云今虎豆纏蔓林樹而生莢有毛刺又音涉目動之貌弽射決張弓又童子佩之韘上同涉歷也徒行渡水也亦漳水別名涉縣是也又姓左傳晉大夫涉他時攝切四上同出説文欇虎櫐也又書涉切䤮鐵䤮獵取獸白虎通曰四時之田揔名為獵為田除害也尸子曰虙羲氏之丗天下多獸故教人以獵也良涉切二十二鬣須鬣説文曰髮鬣鬣也鬣長毛説文同上又作鬣躐踐也䁽目暗日暗擸説文曰理持也儠説文云長狀儠儠也犣牛牡又旄牛名䪉䪉馬靻也㼲蹈瓦聲䉭編竹為之鱲魚名齧聲羸􅽳削也擇也邋邁也㯿柶端木也䜲谷名䃳䃳崨山之連接巤本也又鼠毛獦戎姓俗作田獦字非捷獲也佽也疾也剋也勝也成也説文曰獵也軍獲得也春秋傳曰齊人來獻戎捷又姓漢書藝文志捷子齊人著書疾葉切八疌説文疾也寁速也亟也倢斜出也又利也便也崨崨䃳山連延也踕足疾䌖合也逺方物也誱多言也又口誱䐑細切肉也直葉切三㙷下入又直立切殜殗殜病頰面也古協切九籀文鋏長鋏劔名策箸策又古洽切梜上同見禮莢蓂莢榆莢又姓出平陽丗本有晉大夫莢成僖子也蛺蛺蝶硤硤硤多言也亦作硤穧穧音劑愜心伏也又快也苦協切八愜上同悏快也㾜説文曰病息也篋藏也篋箱篋㤲説文曰思貌㛍得志㛍㛍又呼協切牒書版曰牒又虜姓後魏書牒云氏後改為牒氏徒協切三十喋便語蹀􅞃蹀諜反間又譜諜也堞城上垣小走聲㲲細毛布上同褻重衣疊重也墮也明也纍也積也説文云楊雄説以為古理官決罪三日得其宜乃行之從晶從冝亡新以為疊從三日太盛改為三田亦州名禹貢梁州之域自秦至魏諸羌據焉周武帝始逐諸羌乃置疊州蓋以山重疊而名之疊上同鍱廣雅鋌也懾懾也説文懼也䠟説文曰䠟足也㥈安也又齒廉切簸牃牀版褋襌衣墊地名在巴中惵思懼貌褶夾也又似入切車聲蝶蛺蝶又丈甲切䴑鳥名狀似鵲赤黑色兩首四足可以禦火出山海經揲摺揲㩹挂㩹黔首出音譜䁋目䁋治苶病劣貌莊子曰苶然疲役奴協切又音涅十五埝陷聲晦冥又私列切聲絶捻指捻錜小釘慹不動貌又之涉切敜説文云塞也書曰敜乃穽攝攝然天下安出漢書㘨深也籋小箱亦作銸鑈上同惗相憶鞍薄也出字林菍草燮和也説文從言又炎蘇協切十六屧屐也履中薦也屟上同躞躞蹀韘韘韝射具􅊅石似玉熟也文字指歸從辛又炎鞢䩞鞢鞍具出新字林徢徢行走貌使也又人耴切牒小契蝶蛺蝶蟲名上同䕈草名洽舟行也㼲蹈瓦聲也盧協切四竹裏黑也多言耳垂聑耳垂貌丁愜切十二多言打也笘折竹箠也喋血流貌又田叶切㝪下也跕墮落䩞䩞鞢鞍具衣領㑙低㑙也遂走也涉血流貌又時懾切蓵草簾在協切一浹洽也通也徹也浹辰十二日也子協切三又音狎㼪半瓦弽弓弽呼牒切四䁋閉一目㛍少氣貌偞偞卑遂遂走也先頰切一三十一洽和也合也霑也侯夾切十四洽上同狹隘狹陜狹並上同祫祭名峽巫峽山名硤硤石縣亦州名秦將白起攻楚燒夷陵即其地魏武於此置臨江郡後魏為拓州取開拓之義周以居三峽之口因為峽州也也齒曲生又缺也相著烚火烚珨霎小雨山洽切七歃歃血又山輒切箑扇之別名箑上同萐萐莆瑞草王者孝德至則萐莆生於廚其葉大如門不搖自扇飲食喢喢㗙小人言也獸名箚刺著竹洽切三忽觸人也斑身小蟲跛行貌烏洽切四凹下也或作凹浥波下又濕貌圔圔窊聲下䀴埤蒼云視貌五夾切一五味調肉菜出文字音義丑囚切一三十二狎習也説文曰犬可習也胡甲切十一翈翮上短羽霅衆言聲又丈甲切霅陽部在樂浪又音颯冰凍相著柙檻也所以藏虎兕也出説文匣箱匣也虎習搏也􅦆􅦆鞢􅫅􅫅喜炠火貌又呼甲切笚竹名丈甲切六喋喋喋鳧鴈食也喋所甲切擖押擖重接貌霅霅陽縣名又水名在吳興水名鞢􅦆鞢鴨水鳥或作􅝶烏甲切六壓鎮也降也笮也壞也庘屋壞也拶人神脈刺穴閘開閉門出説文押押署文字指歸云押字才能也甲甲兵又狎也鎧也亦甲子爾雅曰太歲在甲曰閼逢又姓左傳鄭大夫甲石甫古狎切十胛背胛梜木理亂押押籬壁也山側鉀鎧屬今單作甲玾玉名漢書人名􅷘􅴿􅴿䩖胡履翣翣形如扇以木為匡禮天子八諸侯六卿大夫四士二丗本曰武王作翣所甲切八豕母喋喋喋帹面衣翜捷也䬊風疾㞚薄㞚􅿉行􅿉􅿉呷喤呷衆聲説文曰吸呷也呼甲切四譀誇誕䛅言翕䛅語聲􅸢􅸢􅸢鼻息三十三業事也大也敘也次也始也敬也嚴也説文作大版也所以飾縣鐘鼓捷業如鋸齒以白畫之象其鉏鋙相承也詩曰巨業維樅又爾雅曰大版謂之業郭璞云築牆版也俗作業魚怯切十五業見上注鄴縣名在相州又姓風俗通云漢有梁令鄴風驜驜驜馬髙大嶪岌嶪山貌􅱅續也䧨危貌㗼㗼動貌引也樂也𩼋魚盛懼也魚名鸈鳥名知人吉凶澲橫水大版脅胸脅虛業切九􅫆􅫆氣上同愶以威力相恐也㢵弓弽貌嗋口嗋嚇莊子曰余口張而不嗋熁火氣熁上水流拹説文曰摺也一曰拉也怯畏也去劫切九怯上同抾挹也呿臥聲又音去魥以竹貫魚為乾出復州界胠胠篋見莊子崖㾀病劣欠氣劫強取也説文曰人欲劫以力脅止曰劫或曰以力止去曰劫俗作劫居怯切九衱衣領夾上同蜐南越志云石蜐生石上形如龜腳得春雨則生也跲躓也又巨業切鉣帶鐵砝硬也䌜縫也䀷視貌腌鹽漬魚也於業切十四𩸆上同罨魚網又烏合切裛書囊也文字集略云裛坌衣香文於及於輒二切㽢耕種殗殗殜不動貌㡋幧頭也浥潤也􅯹相著䤶椎䤶田器車具又於合切臭也餣餌也粢也䁆閉目殜殗殜亦作余業切二樂器跲躓也巨業切五拾劔匣昅㬤昅極極插笈書笈又初洽其輒二切三十四乏匱也房法切三泛水聲又孚𣑽切姂好貌法則也數也常也又姓左傳齊襄王法章之後秦滅齊子孫不敢稱故以法為氏宣帝時徙三輔代為二千石後漢有扶風法雄法子真並有傳方乏切二法上同矢貌孚法切一猲恐受財史記云恐猲諸侯起法切又呼葛切二姂好貌䎎飛上貌女法切三水貌靜䎎飛上貌丑法切一廣韻入聲卷第五
