body:
  text: 㯃秦有娥臺匹偶也配也合也二也說文云四丈也从八匚八楪一匹俗作疋譬吉切四鷝鵯鶋鳥唾䏘牝䏘吉吉利又姓出馮翊尹吉甫之後漢有漢中太守吉恪居質切八趌趌􅨤怒走也狤狂也拮拮据手病詩傳云拮据撠挶也又音結走意郆郆成山洁水黒暱近也尼質切七昵上同衵近身服䵒膠䵒䵑上同䘌小蝱㥾愧㥾逸過也縱也奔也說文曰失也从是从兔兔謾也善逃也夷質切十二佚佚樂佾八佾之舞佾行列也溢滿溢軼車過又突也又同結切鎰國語云二十四兩爲鎰又禮曰朝一溢米注謂二十兩曰鎰泆淫泆齸廣雅云麋鹿受食處劮劮豫欥辝也䭿馬走疾䳀餔鼓鳥也詰問也責讓也去吉切四蛣蛣蜣蜣蜋又蛣􅔒蝎也馬色趌趌􅨤怒走也又音吉欯笑也許吉切五欪訶也又丑律切咭笑又巨吉切恄怖也㣟行也抶打也丑栗切四咥笑也眣目不正也跮也又丑利切栗堅也又果木也漢書曰燕秦千樹栗其人與千戸侯等又姓漢長安富室有栗氏力質切十九㮚上同說文作此古文慄戰慄懼也溧溧水縣在宣州䬆颲颲暴風斷也削也鷅鶹鷅流離鳥凓凓冽寒風篥觱篥胡樂麜麕牡麌牡麜也也瑮王之英華羅列皃蒸栗色綵塛塞也搮以手理物䔁草名㗚嘍㗚言不了也㟳山窒窒塞也陟栗切又丁結切十二挃撞挃庢盩庢縣在京北銍刈也說文曰穫禾短鐮也又古縣名在譙秷刈禾聲愛觸忤人也㲳手拔物也㗧㗧咄吐呵也齧聲􅾯近也螲螻蛄短也疾病也急也秦悉切十一籀文嫉嫉妬楚詞注云害賢曰嫉害色曰妬蒺蒺䔧㑵廣雅云賊也爾雅云蒺䔧蝍蛆郭璞云似蝗大腹長角能食蛇腦亦作䖿揤揤拭愱愱毒苦也槉屋枅就語急㓼割聲也𥘉栗切四上同也䜉謅䜉隂私語也失錯也縱也式質切三室房也易曰穴居而野處後丗聖人易之以宮室釋名曰室實也人物實滿其中也周書曰黄帝始作宫室吕氏春秋曰髙元作宫室也􅮰刀􅮰堲夏后氏堲周燒士葬也資悉切八䑕聲唧啾唧聲㲺水潜摘蜻蛚别名蝍蝍飛蟲又音即楖楖栗木名蜜蜂所作食山海經云榖城之上足蜂蜜之廬亦蟲名彌畢切九􅼼上同謐靜也愼也安也䤉飲酒俱盡榓木榓樹名式器宓安也黙也寧也止也淧淧溢也不測也必審也然也說文曰分極也从八弋卑吉切二十七畢竟也說文作畢曰罔也又姓出泰山本畢公髙之後晉有畢卓篳織荆門也說文曰藩手拔物也㗧㗧咄吐呵也齧聲􅾯近也螲螻蛄短也疾病也急也秦悉切十一籀文嫉嫉妬楚詞注云害賢曰嫉害色曰妬蒺蒺䔧㑵廣雅云賊也爾雅云蒺䔧蝍蛆郭璞云似蝗大腹長角能食蛇腦亦作䖿揤揤拭愱愱毒苦也槉屋枅就語急㓼割聲也𥘉栗切四上同也䜉謅䜉隂私語也失錯也縱也式質切三室房也易曰穴居而野處後丗聖人易之以宮室釋名曰室實也人物實滿其中也周書曰黄帝始作宫室吕氏春秋曰髙元作宫室也􅮰刀􅮰堲夏后氏堲周燒士葬也資悉切八䑕聲唧啾唧聲㲺水潜摘蜻蛚别名蝍蝍飛蟲又音即楖楖栗木名蜜蜂所作食山海經云榖城之上足蜂蜜之廬亦蟲名彌畢切九􅼼上同謐靜也愼也安也䤉飲酒俱盡榓木榓樹名式器宓安也黙也寧也止也淧淧溢也不測也必審也然也說文曰分極也从八弋卑吉切二十七畢竟也說文作畢曰罔也又姓出泰山本畢公髙之後晉有畢卓篳織荆門也說文曰藩落也春秋傳曰篳門圭窬蓽上同韠胡服蔽膝說文曰紱也所以蔽前也下廣二尺上廣一尺其頸五寸一命緼韠再命赤韠俗作鞸㻫上同䟆漢書曰出稱警入言䟆顔師古曰警者戒肅也䟆止行人也蹕上同滭滭沸泉岀皃亦作觱見詩俗作盡也鷝鷝鴋鳥名白面青色觱觱篥或作說文作觱云羌人所吹角屠觱以驚馬也珌佩刀上飾㓖寒風熚火皃􅺊廣雅云母也彃射也㮿木名縪冠縫也說文止也鮅爾雅曰鮅鱒郭璞云似鯶子赤眼饆饆饠餌也鏎簡鏎爾雅曰簡謂之畢注謂簡札也俗從金弃糞器說文方干切箕屬道邊堂如墻也畫韋曰竈土祭罼兔罟姞姓一曰字史記云姞氏爲后稷元妃巨乙切五佶正也閑也鮚說文云蚌也漢律會稽獻鮚醬二升趌直行狤狂狤邲地名在鄭又美皃毗必切二十一比比次又毗妣鼻三音柲偶也馝香也又虜複姓後魏書馝邦氏後改爲邦氏苾說文曰馨香也詩曰苾苾芬芬䩛車革佖有威儀也鮩魚名駜馬肥坒相連飶食之香者綼紷也又必覓切鮅魚名怭慢也泌水浹流又必媚切飲酒俱盡䖩黒蜂吡鳴吡吡亦作咇吹咇言不了妼女有容儀䫻大風也于筆切五說文曰水流也汩上同蒁草名㧒揘㧒擊皃率循也領也將也用也行也說文曰捕鳥篳也象絲罔上下其竿柄也俗作卛所律切十帥佩巾又將帥亦姓本姓師晉景帝諱改爲帥氏晉有尚書郎帥昺又所類切蟀蟋蟀􅢊上同䢦先導割也斷也出埤蒼裾短衣咰咰飲酒皃行皃循也說文曰將衞也叱呵叱也又虜複姓九氏夏録有將作大匠叱干阿利西魏有開府叱奴興南陽公叱羅協後魏官氏志有叱吕叱門叱利叱李叱列叱盧等氏亦虜三字姓周有侍中叱伏列龜其傳云代郡西部人昌栗切一齧聲仕叱切一密說文云山脊也又靜也亦州名古姑幕城秦琅邪郡隋爲密州因水以名之又姓漢有尚書密忠又漢複姓三氏何氏姓苑云密茅氏琅邪人又有密革氏密須氏俗作宻美畢切十􅣊山刑如堂蔤荷本下白宓埤蒼云祕宓又音謐滵滵汩水流皃沕塵濁樒香木不見皃鳥名不可測量也弼輔也備也房密切十􅱶上同說文作此㢸並古文䄶䄶禾重生􅜜輔也駜馬肥胇胇肸大皃邲地名佖威儀備也乙辰名爾雅云太歳在乙曰旃蒙亦姓前燕有護軍乙逸又虜複姓三氏後魏獻帝命叔父之胤曰乙旃氏後改爲叔氏前燕録有髙麗王乙弗利後魏有都督乙千貴又虜三字姓有乙速孤氏於筆切三鳦燕也說文本作乙燕乙玄鳥也齊魯謂之乙取鳴自呼象形本烏轄切或从鳥亄貪也耴贅耴魚鳥狀也魚乙切又女渉切七聉無知意也㔎斷也水流皃圪髙皃舟行動筆秦蒙恬所造爾雅曰不律謂之筆韓詩外傳周舎爲趙簡子臣墨筆操牘從君之後伺君過而書之鄙密切九潷去滓鉍矛柄柲柄也泌泌瀄水流方言刺也亦作秘咇咇㘉多言㻶青白玉管天之所授走也茁草于也徴筆切又鄒律莊月二切一肸肸蠁俗作肹羲乙切一曁姓也吴尚書曁豔居乙切又泉旣二音一蛭蛭蝚丁悉切又之日切一獝狂也況必切一六術技術說文曰邑中道也又姓食聿切十一述著述說文循也又姓風俗通云魯大夫仲述之後也秫榖名术上同沭水名在琅邪今陽縣在海州噊爾雅曰危也又音聿袕爾雅袕謂之褮謂衣開孔也筞音塋潏爾雅曰小沚曰坻人所爲潏謂人力所作又音聿音譎鱊小魚名爾雅曰鱊鮬鱖鯞又音聿驈黒馬白髀又音聿􅛔􅛔蟥也又音聿橘果名周禮云橘踰淮而北爲枳居聿切八􅮳草名繘汲綆又餘律切走意上同䤎醬也􅴚姓也岀韻譜月在乙也崒山髙慈䘏切四踤槯踤又觸也駭蹋也誶讓也捽把捽聿循也遂也述也說文曰所以書也楚謂之聿吴謂之不律燕謂之弗秦謂之筆餘律切二十一鴪飛快燏火光遹述也自也一曰遵也鷸鳥名驈黒馬白髀又音述繘汲綆又音橘疾風潏水流皃矞說文曰以錐有所穿也一曰滿也霱霱雲瑞雲夲亦作矞􅛔􅛔蟥也䢖行皃芛草木初生欥詞也鱊小魚名噊鳥鳴䋖䋖長銉針銉飛出卒終也盡也子聿切又倉没切又則骨切五終也䱣儵鮪別名㰵飲也玉篇云吮也啐啐律聲䘏分賑辛聿切十五恤憂恤戍辰名爾雅太歳在戌曰閹茂又滅也訹謏訹誘也謏蘇了切珬珂屬靜也又音盍䳳小鳥名賉賑賉水流㖅口鳴㖅㖅海蟀銊鋸聲欰鳴欰欰不能行也頽下律律吕又律法也吕䘏切八寽持取今寽禾是繂繩船上用亦作􅛢膟腸間脂說文曰血祭肉也又作䔞音譜云草子甲葎蔓草有刺竹也鳴也亦作黜貶下也亦作絀丑律切八怵怵惕走也炪火光䟣獸跡㤕憂心也又音窋􆁻獸名欪訶也又許吉切㤕憂心也竹律切八窋物在穴皃又丁骨切絀縫也䂐短皃㑁上同逫走皃面短皃泏水出皃术藥名直律切三􅙥上同炢煙出出進也見也逺也赤律切又赤季切一焌火燒亦火滅也倉聿切一􅵌吴人呼短側律切二雞兒出㱿聲崛危崛山皃魚勿切一飛去皃許聿切四㤜狂也䬄小風皃深目皃七櫛梳也阻瑟切六楖上同見周禮瀄瀄汩水聲㘉咇㘉䄶輒禾重生䄶音弼擳挃擳瑟樂器丗本曰庖犧作瑟所櫛切六飋飋䫻風也蟋蟋蟀又音悉蝨蟣蝨淮南子云大厦成而燕雀相賀湯沭具而蟣蝨相弔俗作􆁮璱玉鮮絜皃今爲之璱璱者其色碧也色也亦作齒聲崱瑟切一八物萬物也又旗名周禮雜帛爲物說文曰牛爲大物天地之數起於牽牛故從牛勿文弗切九勿無也莫也說文曰州里所建旗也象其柄有三㳺雜帛幅半異所以趣民故遽稱勿勿又作􅻥􅻥上同芴土瓜岉崛岉髙皃伆離也又武粉切逺也昒尚冥也又音忽沕沕穆微也弗說文撟也分勿切二十紱綬也黻黼黻綍大索葬者引車紼上同芾草木盛也市說文曰韠也上古衣蔽前而已市以象之天子朱市諸侯赤市大夫葱衡从巾象連帶之形經典作芾韍上同不與弗同又府鳩方又二切􅞣姓也漢有九江太守􅞣修翇說文曰樂舞執全羽以祀社稷也周禮作柫連枷杖打榖者出方言大也髴婦人首飾冹寒冰皃帗毳也又音撥風皃笰輿後笰也熚鬼火說文作甶鬼頭鬱香草又氣也長也幽也滯也腐獸也悠思也說文曰木叢生者又姓出姓苑紆物切十二欝俗灪灪滃大水爩煙氣飴和豆也黦黄黒色也䃶小石菀藥草又音苑尉說文作尉从又持火所以申繒也亦姓古有尉繚子著書又虜複姓有尉遟氏其先魏氏之别尉遟部因而氏焉後單姓尉唐有將軍尉遟敬德又於魏切熨火展帛也說文本作尉見上注蔚草名又曰無子菣也亦州名春秋時屬晉後入趙秦滅趙爲代郡東魏置北靈丘郡周宣帝置蔚州也說文云芳草也無左臂也九勿切又九月切十上同說文作此􅕒翟衣厥夏曰獯鬻殷曰鬼方周曰獫狁漢曰匈奴魏曰突厥岀漢書音義又音蕨屈屈産地名出良馬亦姓楚有屈平又音詘鶌爾雅曰鶌鳩鶻鵃郭璞云似山鵲而小短尾青黒色多聲趉走皃豕土也􅕻剖􅕻曲刀䠎律䠇多力屈拗曲亦姓又虜複姓屈突氏又羌複姓有屈男氏區勿切三詘辝塞􅔒蛣􅔒蟲倔倔強衢物切九䠇足多力也崛山短而髙短尾鳥䘿衣短短尾犬堀說文曰突也引詩曰蜉蝣􅔒閱豕地掘掘地佛牟子曰漢明帝夢神人身有日光飛在殿前以問群臣傅毅對曰天竺有佛將其神也學記曰其施之也悖其求之也佛符弗切九怫怫鬱坲塵起􅔍山曲說文作岪山脅道也咈戻也䞞走皃刜斫也擊也玉篇云理也炥火皃䬍疾風許勿切六俗欻暴起疾也㗵訶㗵烼火煨起皃䬑風聲王勿切六擲也觱羌人吹角㧒揘㧒䁌䁌䁌見􆃾行也拂去也拭也除也擊也敷勿切十三韜髮嶏崩聲茀草多祓除灾求福亦絜也又音廢艴淺色刜擊也斫也乀左戾曰乀䭮額前飾也髴髣髴亦作仿佛彿彷彿俗跳也崛危崛山皃魚勿切一九迄爾雅云至也許訖切九仡壯勇皃又魚訖切釳乗輿馬上揷翟尾者曰方釳釳鐡也廣三寸又魚訖切肸肸蠁又許乙切忔喜也䒗爾雅曰藕車䒗輿郭璞云藕車香草又音乞䛥語瞋聲莔吴王孫休長子字也汔水涸盡訖止也居乙切五吃語難漢書曰司馬相如吃而善著書也扢摩也曁姓也吴有尚書曁豔䰴魚游疙癡皃魚迄切五屹屹崪山皃圪髙士虎皃仡壯勇皃䞘行皃其迄切二􅠟也乞求也說文本作气音氣今作乞取之乞又虜複姓晉有乞伏國仁太元十年稱秦王於金城去訖切三䒗又許訖切契契丹夷名出字林十月范子計然云月者尺也尺者紀度而成數也王子年拾遺録曰水精爲月魚厥切十一刖絶也斷足刑也又五刮切跀􅞨並上同見說文軏車轅端曲木也又五骨切抈折也扤動也又五骨切枂鞍枂鈅兵器玥神珠山也伐征也斬木也又自矜曰伐房越切十四茷大曰筏小曰乗之渡水栰上同罰罪罰元命包曰言爲詈刀詈爲罰罰之言陷於害閥閥閱自序垡耕土橃木橃說文曰海中大舡也䑔舂米瞂盾也或作􅚛拔爾雅云拔龍葛也似葛蔓生葉細莖赤也茷茷茂皃藅藆藅草坺地名䣹酒一䣹也越墜也于也於也逺也走也逾也曰也揚也說文度也亦吴越又姓勾踐之後又虜三字姓後秦録有北梁州刺史越質詰歸王伐切十六􅫝說文踰也粤辝也于也戉說文曰大斧也司馬法曰夏執玄戉殷執自戚周左杖黃戉又作鉞鉞上同䋐紵布說文曰采彰也一曰車馬飾樾樹隂蚎蟚蚎似蟹而小曰辝也於也之也竚立也輕也璏劔鼻王熭暴乾木名􅴕螊􅴕蚌岀魏書泧大水厥其也亦短也說文曰發石也又姓京兆人也漢賜衡山王妾厥氏居月切十九古文蹶失腳又走也速也嘉也說文僵也一曰跳也亦作蹷又音橛說文上同􅺻跳􅺻上同瘚氣逆劂刻刀蕨蕨菜蟨獸名走之則顚蛩蛩前足髙不得食而善走蟨常爲蛩蛩取食蛩蛩負之而走也蟩蟩蜉蟲橜㭖也又其月切發石強力欮發也撅撅撥物也鱖魚名短也說文曰鉤識也从反象形嬄婦人皃於月切四飴和豆又作􅦑說文作噦逆氣又乙劣切黦黃黒色說文作黒有文也似角發物其月切十三鷢白鷢一名揚鳥似鷹尾上白善捕䑕也橜說又􅍻也一曰門梱亦作橛撅採撅亦樗蒲三采名蹷又音厥掘穿也赶舉尾走也憠強也磨䞷行越橛株山名尾本亅說文曰鉤逆者謂之亅象形闕門觀也廣雅曰象魏闕也釋名曰闕在門兩旁中央闕然爲道也又夫也過也不供也又姓出下邳漢有荆州刺史闕翊去月切三㵐水名在義陽􅕒􅕒狄衣周禮作闕禮記作屈髮頭毛也說文根也又姓漢有東海人髮福治詩又有不毛之地莊子謂之窮髮万伐切六說文同上古文發發起又舒也明也舉也闋也揚也說文曰䠶發也颰疾風冹寒冰又音弗韤足衣漢張釋之與玉生結韤望發切五韈襪並上同􅡚舉目使人㒝㒝羯東北夷名似髙麗䬂小風許月切六䟠走皃泧水皃狘獸名又走皃䎀飛皃㞽山皃謁請也告也白也又姓風俗通云漢有汝南太守謁渙於歇切五閼爾雅云太歳在卯曰單閼又於葛於連二切暍傷熱亦作㷎􅿔說文曰屋迫也黦色壞也又於月切又紆物切歇氣洩也休息也又竭也許竭切五蠍螫人蟲猲猲獢短喙犬也上同艎大船訐面斥人以言論語注云訐謂攻發人隂私也居竭切又居列切六􅨤走皃羯犗羯揭揭起說文曰髙舉也俗鍻金鍻􅺭擔物也本亦作揭其謁切五揭上同竭盡也碣碣石海中山名今爲碑碣字李斯造楬表楬閥閱目序名怖恨怒拂伐切一钀馬勒旁鐡語訐切一十一没沈也又虜三字姓有沒路眞氏出後魏書莫勃切六殁死也說文終也又作玉名内頭水中又烏沒切說文曰入水有所取也莈草也入水又出皃土骨切一骨說文曰肉之覈也尸子曰徐偃玉有筋無骨亦見史記又姓古忽切十六縎縎結鶻鶻鳩又搰猾二音滑滑稽謂俳諧也䮩䮩獸出北海啒憂也淈說文濁也一曰滒淈又水出皃汩汩沒愲心亂蓇不實草膝病㾶上同榾枸榾木也䓛刷也或從竹扢摩也㒴岀也勃卒也又姓丗本朱右師之後又梁武帝改豫章王紂姓勃氏蒲沒切二十三渤渤澥海名又水皃􅖃􅖃馬獸名似馬牛尾一角又音雹說文曰吹釜溢也餑麵餑𡋯塵起馞木香悖逆也又音背䄶䄶稡禾所秀不成聚向上皃郣郡名浡浡然興作㲞毛短昬亂㪍㪍卒旋放之皃誖言亂㶿煙起皃桲桲果似孛星也又怪氣艴艴然不恱挬抜也脖胅臍蘩毋鵓鵓鳥咄呵也當沒切四柮榾柮木頭又五括切䮩獸出北海􅒸鳥鳴豫知吉凶也宊出皃他骨切六梲大杖也又音柮云不孝之子說文曰不順忽岀也篆文从到子說文同上或从到古文子㥆㥆忽不悵也說文肆也䠈蹂也䠈前不進也突觸也欺也說文曰犬从穴中暫出也一曰滑也陀骨切十四揬搪揬腯說文曰牛羊曰肥豕曰腯鼵鳥䑕同穴其鳥曰䳜其䑕曰鼵鼵如人家䑕而短尾葖爾雅曰葖蘆萉郭璞云萉冝爲菔蘆菔蕪菁屬紫華大根俗呼雹葖鶟鶟鶘鳥名似雉靑身白首堗竈堗漢書作突云曲突徙薪亡㤙澤艒釣船鈯鈍也又小刄也耕耒開也𣔻瑣植又傳也凸凸出皃說文本他忽切義見上文鍎覆鍎内頭水中烏沒切九腽腽肭肥殟心悶嗢咽也又虜複姓後魏書有嗢盆氏又虜三字姓嗢石蘭氏䯉說文曰咽中息不利也本一滑切榅榅桲果似樝也揾手撩物皃淴水出聲馧馧馞大香忽倐忽又滅也忘也輕也又一𧖟爲一忽十忽爲一絲呼骨切十七昒尚冥也㾁狂病又音欻匫古器寣睡一覺笏一名手板品官所執天子以玉諸侯以象大夫魚須文竹士木可也釋名笏忽也有事書其上以備忽忘䩐急擷也擷呼結切曶說文曰岀乞詞也篆文本作象气出形逺也啒憂皃髙皃㦌寢熟微也豕屬惚恍惚亦作忽䬍疾風皃睡多兀髙皃又姓後漢改樂安王元覽爲兀氏五忽切十六扤揺動杌樹無枝也屼屼秃山皃又五屼山名在犍爲矹硉矹不皃䦍䦍括也又云㚔者鼿鼻也說文曰船行不安也䑢俗危瓦危臬危瓦不安也㽾說文曰病也俗軏輗軏又音月􅚣蛤蟹刖刮刖又音月艾䪬桉物聲或作普沒切五昢明旦日出皃哱吹氣聲㛘㛘乳女字馞香皃䇶射勒沒切五䠈前不進也硉硉矹矹崖狀㪐㪐㩿不穩又不利也窟窟穴苦骨切十五顝大頭皃泏漚池􅝋白秃矻用心矻矻堀宋玉云堀堁揚塵又音掘說文曰目突出也本胡八切㧾撃也圣汝潁間謂致力於地曰圣㩿㪐㩿不穩土塞䯇力作秃山皃目突朏朏臀俗又作訥謇訥内骨切五㕯㕯口又女滑切肭腽肭抐内物水中殟窣勃窣穴中出也蘇骨切七􅲄麥屑上同㲞㲞毛皃鼻鳴鵓鳥㞕動進皃說文本先節切猝倉猝暴疾也倉沒切五卒急也逺也又子沒切又將律切亡也摩也素也捽手捽也昨沒切六椊椊杌以柄内孔䚝角始生也崪崪屼山皃小骨麧麧糏漢書云食糠麧下沒切五􅿖栝也舂粟不潰也齕齧也又胡結切紇絲下也又孔子父名又虜複姓三氏北齊開府紇奚永樂又有紇于氏紇骨氏又虜三字姓後魏有賊師紇豆陵伊利又胡結切淈淈泥又古忽切搰掘地也戸骨切十扢摩也果子也出聲譜耳聲抇牽物動轉鶻鳥名鷹屬又骨猾二音膝病㨡手推也露出見字林滑滑亂也列子卒說文隷人給事者衣爲卒卒衣有題識者臧沒切又將聿切三倅百人爲倅周禮作卒稡䄶稡十二曷何也胡葛切十一褐衣褐說文云編枲襪也一曰短衣毼毛布鶡鳥似鷄也鬪必至死蝎蟲名爾雅曰蝤蠐蝎又曰蝎桑蟲餲餅名䫘䫘健也又音􅐳􅐳􅚯肩骨骱骨堅㮫木轉皃鞨靺鞨蕃人名岀北土䫘䫘健也許葛切八訶也喝上同猲恐又音歇犬臭氣㿣白色暍熱皃香氣又呼蓋切岀字林怛悲慘也當割切十􅜢驚􅜢妲妲己紂妃呾相呵炟火起䵣莫䵣縣在五原狚獦狚獸名似狼而赤出山海經笪竹䉬蕈靼柔革也又之列切闥門内他達切十三㒓佅㒓撻打撻躂足跌澾泥滑獺水狗魚名文字音義云蹈也從反止羍小羊也亦作幸上同達佻達往來皃又唐割切汏汏過噧多言也遏遮也絶也止也烏葛切十一齃鼻齃頞上同堨擁堨閼止也塞也又於連切胺肉敗臭論語作餲食臭也餲食傷臭又於介於罽二切靄雲狀又於蓋切咹小語大呼用力屋迫剌僻也戾也盧達切十六揧研破辢辛辢䓶䓶蒿瘌癆瘌不調攋撥攋手披也糲麤糲癩疥癩又音賴􅦟廣雅曰痷也亦獄室也轢車轔著又歷洛二音狒著䶛齧聲㻝玉名目不正楋木名蝲蝲蟽渴飢渴又虜複姓二氏後魏書渴侯氏後改爲緱氏渴單氏後改爲單氏亦虜三字姓後魏書北方渇燭渾氏後改爲朱氏苦曷切八㵣古文􅿔内熱病也䳚䳚鴠嵑嵑嶭山皃磕石聲䯋肩髆䅥禾長也達通達亦姓出何氏姓苑又虜複姓三氏後魏憲帝弟爲達奚氏又達勃氏後改爲裒氏周文帝達歩妃生齊煬王憲唐割切二薘馬舄草名巀巀嶭山名在右扶風才割切又才結切四噆嘈噆鼔聲或作啈囐上同㩵擊也嶭五割切又五結切十三䡾車載髙也屵髙山狀枿伐木餘枿􅤁頭戴皃說文曰伐木餘也櫱上同書作蘖古文從木無頭􅮛毀讀曰􅮛㩵擊也又才割切戒也說文曰語相訶距也歺說文曰骨之􅋊也凡從歺者今亦歹頇無髮齾獸食之餘曰齾葛葛藟廣雅云苑童寄生葛也一名寓木又名寄屑亦姓後漢有潁川太守葛興古達切十䈓䈓䉈桃枝竹名獦獦狚獸也割剥也害也斷也􅎒也馬走疾也匃乞也亦作丐又音蓋輵轇輵戟形也又轇輵驅馳皃郷名在南陽禾長也㵧水名又㶀㵧波勢也躠跋躠行皃桑割切九薩釋典云菩薩菩普也薩濟也能普濟衆生也摋抺摋公羊傳曰宋萬臂摋仇牧碎首何休云側手曰摋􅔁放也若􅔁蔡叔是也說文曰䊝􅔁散之也音變攃攃攃聲䉈䈓䉈桃枝竹也失俗云辢足動草聲七曷切三穀屬岀淮南子礤麤礤捺手按奴曷切三痛也蛆􅯟螫䔾菜似蕨生水中矛割切一十三末木上也無也弱也逺也端也亦姓姓苑云夲姓秣氏後去禾又虜三字姓後燕録襄城公末那樓雷莫撥切二十七昩星也易曰日中見昩案音義云字林作昧斗杓後星王肅音妹䫘健也䀛逺視又不正視又莫拜切䴲麫也醬也䬴馬食穀也秣上同捕鰌竹器靺靺鞨蕃人岀北土韎韎韐大帶苜說文曰目不正粖糜也又亡結切上同米和細屑鮇魚名眛目不正也抺抺摋摩也妹妹嬉桀妻佅佅㒓肥皃又西夷樂名怽忘也抺切也瀎塗拭􅵒鳥名沫水沫一曰水名在蜀又武泰切色不深也袜袜肚枂去樹皮又柮枂柱頭木五活切一柮藏活切一撥理也絶也除也北未切十六癶足刺癶也袚蠻夷蔽膝茇蓽苃鉢鉢器也亦作盋顔師古注漢書曰盋食器也盋上同鳥名又音抜鱍魚棹尾也䢌急走多鬢皃襏襏襫蓑雨衣也帗一幅巾㤄意不恱皃大船名驋馬怒筏箄筏䰖姉末切六拶逼拶㳨㳨濺刺不淨也蹙行皃岀新字林水湍頭起括檢也結也至也古活切二十一活水流聲又乎括切上同髺結髺檜木名柏葉松身又工外切栝上同見書聒聲擾䒷說文曰䒷蔞果臝也􅌝􅌝藪同上鴰鶬鴰韓詩云孔子渡江見之異衆莫能名孔子甞聞河上人歌曰鴰兮鶻兮逆毛衰兮一身九尾長兮鴰也萿爾雅曰萿麋舌郭璞云今麋舌草春生葉有似於舌适疾也銛說文曰斷也佸㑹計曰佸頢小頭皃劊斷也葀菝葀瑞草䯏骨端懖愚懖無知說文曰善自用之意也引啇書曰今汝懖懖古文筈箭筈受弦處闊廣也逺也䟽也苦括切六蛞蝦蟆子名筈箭筈又音栝适疾也又音栝䟯就䟯瓜活不死也又水流聲戸括切八􅣇水流聲䄆祠也越鄭玄云瑟下孔又云翦蒲爲席又音粤或作趏鬠似組束髮佸佸㑹秳春榖不潰也姡姡􅌤也又音刮奪左傳曰一與一奪徒活切八上同強取也古奪字古周書曰􅴠攘矯䖍亦姓脫肉去骨亦姓出姓苑又土活切挩解挩莌活莌草生江南痥馬脛傷也鮵爾雅曰鰹大鮦小者鮵豁豁達呼括切八􅣲上同奯大開目也濊水聲上同泧瀎泧欿水眓說文曰視髙皃斡轉也烏括切九焥火煙出䩊日開皃捾捾取也上同嬒方言云嬒可憎也或作懀又烏外切䁊目深黒皃睕小嫵媚也䀑說文云捾目也繓結繓也子括切三撮撮挽牽也又七活切攥手把鏺兩刄刈也普活切說文又讀若撥十三撥芟撥蹋草聲㧊推㧊䣪酒氣醅酘酒水􅲺目􅲺眛不明皃鱍魚掉尾又音撥衣袂也無色䍨牯羊謶人言侻侻可也一曰輕他括切五挩除也誤也遺也又解挩或作脫脫骨去肉又徒活切莌又徒活切梲大棒亦木梲又音拙捋手捋也取也摩也或作寽郎括切五􅽒削􅽒也蛶蚵蛶蟲又音劣㸹駁㸹㭩木名又音劣掇拾掇也丁括切八剟削也擊也鵽鵽雀又當刮切腏挑取骨間肉也祋祋祤縣名又都外切咄又都骨切裰補裰破衣也敠􅍞敠知輕重也又敠食不喚自來撮六十四黍爲圭四圭爲撮撮手取倉括切二襊緇布冠詩作撮跋跋躠行皃又躐也蒲撥切二十五䟛行皃上同上同魃旱魃舎也將行祭名䣮酒氣馛香氣炦火氣颰風皃癹除草說文音鏺妭鬼婦文字指歸云女妭秃無髪所居之處天不雨說文曰婦人美皃犮犬走皃䚨弋鳥具說又音廢拔廻拔又虜複姓三氏後魏有都督拔略昶出賀抜勝傳又有夏州刺史拔也惡蚝官氏志有柯拔氏又虜三字姓後魏書拔列蘭氏後改爲梁氏又蒲八切胈夏禹治水腓無胈脛無毛韋昭云胈股上小毛也鈸鈴鈸鳥名似鳬䮂䮂䮧蕃中馬也菝菝葀瑞草坺一臿土也又音伐雲氣茇草木根也䯋肩髆十四黠黠慧也又堅黒也胡八切四齧聲麻莖䦖門聲札簡札釋名曰札櫛也編之如櫛齒相比也又牒也署也側八切六㱜疾蚻小蟬紮纒弓弝也鳥雜蒼色扎扎拔也出家語拔拔擢又盡也蒲八切又蒲撥切三菝菝􅿌狗脊根可作飲䂒短人􅧜勁也恪八切十二擖說文刮也一曰撻也劼用力又固也愼也勤也鬝秃鬝也上同判巧判㓤剥㓤硈石狀說文堅也一曰突也􅿌菝􅿌草䂒䂒短人咭䑕鳴擊也滑利也亦州名春秋時爲衛國秦爲東郡後魏以東郡屬司州周改爲滑州因滑臺以爲名又姓風俗通云漢有詹事滑典又音骨滑稽也戸八切八猾狡猾書傳云猾亂也䱻魚名鳥翼岀入有光音如鴛鴦見則天下大旱出山海經磆磆石藥螖蟚螖似蟹而小䴳麴名走鶻鶻鳩又音骨榾八數也博拔切十􅦩馬八歳朳無齒杷也捌上同扒破聲㺴玉名釛金類哵哵哵鳥玐玉聲釟治金窡說文曰穴中見也丁滑切五說文曰口滿食娺婠娺好皃鵽黄雀聉無所聞也婠烏八切六取物也嗢咽也又烏沒切䯉說文曰咽中息不利也穵手穵爲穴嗗飲聲豽獸名似狸蒼黒無前足善捕䑕說文作貀女骨切四貀上同㕯言逆下也又女骨切肭腽肭肥皃齒利又磣初八切七䕓草䕓察監察也諦也知也至也審也案說文云察覆也詧言微親詧也今通用亦姓岀何氏姓苑詧上同木名􅕉視􅕉羅鬼亦作劀說文曰刮去惡瘡肉也周禮曰劀殺之齊古滑切三俗鱊魚名戛揩也常也禮也說文戟也古黠切十八扴揩扴物也圿垢圿稭說文曰禾槀去其皮祭天以爲席也鴶鴶鵴鳲鳩楔櫻桃又先結切秸秸槀骱骱䯦小骨鞂草鞂砎礣砎小石忦恨也嘎嘎嘎鳥聲刮也利也􅤛􅤛􅧗鳥又音絜袺執衽又音結㮖鼓也磍輵磍揺目吐舌又感怨皃頡漢書有羹頡侯軋車輾鳥黠切十圠山曲堰拔草心也嫼嫉怒䝟䝟貐獸名食人迅走猰上同穵說文云空大也目相戲皃䰲䱀䰲魚名窫窫窳國名殺殺命說文戮也所八切七煞俗鎩鳥羽病又長刄矛也水也帴二幅蔱莁荑榝似茱茰而實赤又山列切㑻㑻健皃莫八切七䀣惡視齂氣息䯦䯦骱小骨黒也睰視睰礣礣砎小石傄呼八切二䀨視也埤蒼云怒視皃痆瘡痛女黠切三上同奴人衣􅝨屈也五骨切三聉無知之意􅫣無耳吳楚語也䯇力作也口滑切又音窟一汃西極水名普八切四齒聲石破聲車破聲茁草初生鄒滑切一十五鎋車軸頭鐡胡瞎切十五舝上同出說文轄上同說文車聲也一曰轄鍵也齒聲鶷鶷􅗾鳥名似伯勞而小砎礣砎硬也礣慕轄切螻蛄别名石似玉也野蘇囚突出也縖束物也食飽拾用力手􅗾乙鎋切五䦪門扇聲􅕫駱駝鳴也咀相呼聲又當辢切劜劜齾器缺也五鎋切四聐聐顡無所聞也秃鬐􅝝山中絶皃刹刹柱也初鎋切一䓭掃地惡草木虎止樂器亦名敔也枯鎋切四楬上同見禮磍剥也趏走皃瞎一目盲亦作瞿許鎋切四齒堅聲秃皃㔠力作㔠㔠獺獸名他鎋切又他達切一刮刮削古䫄切五鴰鶬鴰鳥毛逆九屋又音括劀利也又古滑切䄆禳祠名趏走皃又枯鎋切頢短面皃也下刮切七言不了又不淨繒細敌盡皃舌塞口說文作􅡜話括之類从此姡面姡咶息也䫄䫄頢強可皃丑刮切二鵽爾雅曰鵽鴆寇雉郭璞云鵽大如鴿似雌雉䑕腳無後指岐尾爲鳥憨急羣飛出北方沙漠地下刮切又丁括切三窡穴中出皃錣䇿端有鐡刷刷拭也數滑切又所劣切一刖去足亦刖危之皃五刮切又音月四䎳說文曰墮耳也㱚獸食殘皃䚴詞也䵵黒也初刮切二㔍斷也又之芮切斫莫鎋切四帓帓帶帕帕額首飾㩢打㩢妠婠妠小兒肥皃女刮切三也亦作袦下人帶襦名捌方言云無齒杷百鎋切二㭭木名􅧗􅤛􅧗鳥名似鳧古鎋切四擖刮聲也又揵也架也折也秃皃猰雜也􆇫秦人云切草查鎋切三耫農具也㳐㳐㳐水流也哳嘲哳鳥鳴也陟鎋切四好出證俗文貨也眣目露皃出聲類細毛也而轄切十六屑動作屑屑又清也敬也顧也勞也說文作屑先結切十一楔木楔揳㩢揳不方正也蹩􅍷旋行榍木名說文限也糏米麥破也僁動草聲又云鷙鳥之聲又僁僁呻吟也亦作偰㒝偰淨也㴽瀎㴽水草臆中脂㨝揲㨝切割也刻也近也迫也義也說文折也千結切八㗫小語齒也竊盜也又淺也柣爾雅曰柣謂之閾又音秩沏水聲䟙䟙跌詧說文曰言微親詧也又音察結締也古屑切十五絜說文曰麻一耑也潔淸也經典用絜䥛鎌别名也鍥上同桔桔梗􅥱􅥱橰汲水具也走皃􅤛􅤛􅧗鳥名􅧗古轄切袺詩傳云執衽曰袺拮手口共有所作詩曰予手拮据狤狤獸名魝割治魚也頭傾皃蠸蟲名節操也制也止也驗也說文曰竹約也子結切十三說文曰瑞信也凡從弓今作下癤瘡癤蝍蝍蛆蜈蚣又音節楶屋梁上木小灑㸅燭餘岊髙山皃說文曰束髮少小也䲙魚名幯幯拭說文治也本房六切小衣血釋名曰血濊也岀於肉流而濊濊也呼決切十二惡皃䆷穿皃䆝上同䦑闕䦑無門戸也泬泬寥空皃疦瘡裏空也又音玦瞲驚視皃決莊子云決起而搶榆枋決小飛皃䛎怒呵䒸草皃坹穴也闋終也若穴切四湀爾雅云湀闢流川又揆圭二音缺器破䦑無門戸也玦珮如環而有缺逐臣賜玦義取與之訣别也古穴切二十六潏泉出皃又水名在京兆又音聿䀗目患譎譎詐訣訣別􅬇環有舌也觼上同出說文鐍亦同又扃鐍岀莊子駃駃騠良馬生七日超母也明菜花黃芵上同赽馬疾行也鴂鶗鴂鳥名關西曰巧婦關東曰鸋鴂春分鳴則衆芳生秋分鳴則衆芳歇鈌刺也又乙穴切獸名似狸決流行也廬江有決水出大别山又斷也破也俗作决觖觖望怨望也又羌瑞切騤爾雅馬回毛在背曰騤􅼶􅼶音光亦作闋廣㭈椀也又小盂也疦說文也蚗蛥蚗蟪蛄蟲名趹足疾憰憰妄語也􅰁衣袖䏐孔䏐抉縱弦彄也穴窟也丹穴山名鳳皇所出胡決切四坹空深皃䋉說文縷一枚也袕鬼衣又長衣也抉抉出於決切六䆕穿皃妜姢也火光也目深皃䆢說文曰深抉也姪姪娣公羊傳云兄之子徒結切三十五眣目岀昳日昊胅骨胅凸髙起垤蟻封又曰冢前闕也耋老也八十爲耋亦作耊迭遞也更也道也跌跌踢又差跌也絰縗絰驖馬赤黒也嵽嵽嵲髙山軼車相過又音逸䭿馬行疾也関鄭城門也左傳作桔柣瓞瓜瓞咥笑也又齧也易云履虎尾不咥人亨又火至丑栗二切墆貯也止也戜剥也又國名在三苗國東岀山海經苵爾雅曰蕛苵郭璞云蕛似稗布地生穢草镻爾雅镻蝁注云蝮屬大眼最有毒今淮南人呼蝁子䳀爾雅云鴩飾叔荎刺榆又音治齧堅聲又作一切擿也恎惡恎詄忘念摕捎取鳥名堅山皃泆泆蕩􅭏砲􅭏趃大走㦅㦅㦅不自安也鐡說文云黒金也神異經云南方有獸名曰齧鐡大如水牛色如漆食鐡飲水其糞可作兵器其利如鋼也又虜複姓赫連勃勃改其支庶爲鐡伐氏云庶朕宗族子孫剛銳如鐡皆堪伐人也又作鐡俗作鐡他結切八銕古文僣僣侻狡猾餮貪食說文作飻貪也飻上同蛈爾雅曰王蛈蝪郭璞云即螲蟷似鼅鼄在穴中有蓋今河北人呼蛈蝪捅皃出字林驖馬赤黒也纈綵纈胡結切二十一䦖䦖義見字擷捋取又虎結切􅰐縛頡頡頏詩傳云飛而上曰頡飛而下曰頑說文曰頡直項也又姓風俗通有頡衞古之賢者頁頭也齕齧也又乎沒切紇絲下也又乎沒切襭以衣衽盛物也絜爾雅河名即九河之一也又古節切䁾目赤蘢古草也䑕名又胡狄切翓翓飛上下䐼膜䐼㹂牛很又口殄切奊頭邪籺屑米門聲麥不破覈邀覈涅水名岀東郡又水中黒土奴結切十二捏捏捺菜似蒜生水邊坦塞也圼上同爾雅云大管曰簥其中曰小者曰篎􅚿􅚿然疲役又乃叶切礬石别名疾病㖏㖏呵腫也草也􅎒廣雅云盛也斷也或作截餘倣此昨結切七傍出前也岊山峯又子結切巀巀嶭山名文藏活切蠞蠞似蟹生海中草食齧噬也亦姓莊子有齧缺五結切十三霓虹又音倪蜺寒蜩又音倪嵲嵽嵲槷危槷臬禮注云門橜也爾雅云在牆者曰楎在地者曰臬嶭巀嶭又五割切臲臲卼不安書作杌􅥳􅥳見上注䘽裗䘽山髙皃說文作本音孼闑門閫中也􅝝屼􅝝山皃蔑無也說文曰勞目無精也从苜戍人勞則蔑然也苜音未莫結切二十三懱輕蔑目赤說文云目眵也俗作䁾㩢㩢揳不方正也蠛蠛蠓篾竹皮幭帊幞鱴鱴魛今鮆魚也緬細也出蒼頡篇衊汗血也出說文䩏䩏小也即列切㒝㒝僣多詐汗面火不明皃覕不相見皃工雀莊子謂之禾也鴓繼英鳥名瀎瀎㳚糏也頡粖糜也又亡達切上同㢼弓戾或作方結切九䋢輓又普蔑切閉闔也塞也俗作閉又博計切刀飾名大也䌘繩編劔帶㭭㭭柲也䘷䘷袖褾袂也㔡大力之皃噎食塞又作咽烏結切六䊦糉屬㝣静也又音翳蠮蠮螉􅧝獸名似牛白首四角出山海經咽哽咽猰猰犺不仁苦結切九䫔䫔短皃挈提挈又持也㼤㼤瓶受一斗也􅩉􅩉多節目也練結切契契闊又苦討切栔爾雅云栔滅殄絶也鍥刻也又斷絶也又古屑切蛪蛪蠅蟲又蛪蚼似蟬而小㚛肥狀虎結切六䩤急繫擷又胡結切􅰐􅰐束又下結切褉褉襦䙽見撆小擊又略也引也亦作撇普蔑切十丿左戻􅞕􅞕然瞋也瞥暫見亦作又芳滅切䭱小香也䋢韻略云馭右廻又方結切嫳輕薄之皃䫾䫾小風皃鐅江南呼鍫刄瞥瞥日落勢也蹩蹩躠旋行皃一曰跛也蒲結切十四㮰反手擊也䫔戾不正䭱香也又音瞥咇咇語也又口香苾菜名說文曰馨香也又頻必切馝香也䏟䏟㚛肥也飶香食蛂蛂蟥蛢甲蟲也柲支柲醜氣襒襒衣亦作􅗓窒塞也丁結切又陟栗切七蛭水蛭又音質㗧㗧咄咥蛇蛭氏蕃姓門下入􅩉多節目也練結切七戾罪也曲也戻至盭並又力計切捩拗捩出玉篇綟麻綟唳嘍唳鳥聲盭綬色也左曰也十七薛國名亦姓出河東新蔡沛國髙平四望本自黃帝任姓之後裔孫奚仲居薛歷夏殷周六十四代爲諸侯周末爲楚所滅後遂氏焉說文作艸也私列切十九田器紲繫也左傳曰臣負羇紲杜預云紲馬韁也亦作絏俗作靾緤上同䙝衷衣辥說文􅓧也凡從辥者經典通作薛泄漏泄也歇也亦作洩又姓左傳鄭大夫洩駕又餘制切渫治井亦除去又姓渫子古賢者出韓子禼字林云蟲名也又殷祖也或作偰又作契古文媟狎也慢也說文嬻也齛亦作齥爾雅云羊曰齥䊝䊛䊝注暬晦也絬堅絬㡜殘帛又音雪疶痢也亦作㔎斷也列行次也位序也又陳也布也說文作􅍌分解也亦姓鄭有列禦寇著書十八篇良辥切二十􅍌上同迾遮遏蛚蜻蛚蟋蟀鮤刀魚也一名鱴刀今鮆魚也烈光也業也又忠烈又猛也熱也火也洌水淸也潔也冽寒也裂擘裂破也左傳曰裂裳帛而與之茢禮記云桃茢可以爲帚除不祥說文芀也颲風雨暴至鴷啄木栵細栗爾雅云栵栭今江東呼爲栭栗楚呼爲茅栗也㤠憂心挒埤蒼云搩也􆄔次第馳馬塍也水流皃姴美也䅀說文曰黍穰也哲智也陟列切五悊喆並上同嚞古文蜇螫也亦作蛆傑英傑特立也又俊也渠列切十四桀磔也又夏王名竭盡也舉也碣說文曰特立之石也又東海有碣石山楬有所表識說文櫫也春秋傳曰楬而書之榤鷄栖於榤揭髙舉又朅許二音渴水盡也嵥嵥髙皃滐水激迴出海賦櫭木釘名偈武也杰梁四公子名䨲杰也搩強暴熱釋名曰熱爇也如火所燒爇如列切二􅚿疲役皃晢光也旨熱切九晣上同浙江名在東陽一曰浙米也折拗折又虜複姓南涼秃髪傉擅立其妻折屈氏爲皇后又常列切靼柔皮古文䩢俗䏳脟皮也䀿目明舌口中舌也山海經云長舌山有獸名長舌狀如禺而四耳出則郡多水又姓左傳越大夫舌庸也食列切四揲數蓍又思頰切蛥蛥蚗蟪蛄别名鞨治皮亦作㓭折斷而猶連也說文斷也又作常列切一孼臣僕庶孼之事謂賤子也猶樹之有孼生也說文曰庶子也魚列切十二糱麴櫱說文曰牙米也讞正獄說文作􅮙議􅓧也與法同意􅮙上同蠥妖蠥說文曰衣服謌謡艸木之怪謂之袄禽獸蟲蝗之怪謂之蠥㜸俗闑門中礙也山髙皃說文作危髙也又藝哲切钀馬勒傍鐡櫱櫱餘又姓何氏姓苑云東莞人本姓薛避仇改之䶬龍鬐脊上䶬䶬又丁篋切䡾髙皃滅盡也絶也亡列切二搣手拔又摩也㧗也椊也朅說文去也丘竭切又去謁切五揭髙舉也又擔也藒藒車香草愒息也􅤎玉篇云􅤎界也鷩雉屬似山雞而小周禮有鷩冕並列切七鼈魚鼈俗作鱉蟞虌蕨菜鄨水名在牂牁大阜憋急性皃䳤鵂鶹絕斷也作絶非情雪切一蕝束茅表位子恱切又子芮切三㔢㔢斷物也隔雪凝雨也元命包曰隂凝爲雪釋名曰雪綏也水下遇寒氣而凝綏綏然下也又拭也除也相絶切四䨮上同出說文㡜㡜縷桃花今製綾花㨹滅㨹皮破丑恱切一恱喜也脫也樂也服也經典通用說又姓後燕録有恱綰弋雪切七說姓傳說之後又失爇始銳二切閱簡閱也又閥閱蛻蟬去皮也又他卧他外舒芮三切娧姚娧美好又他㑹切草名似芹䓲草生而新達曰䓲也缺少也說文曰器破也傾雪切二蒛蒛葐草也噦逆氣乙劣切一爇燒也如劣切五焫上同見禮蜹蚊蜹又如銳切㨎括也㕯言遟聲說告也釋名曰說者述也宣述人意也失爇切又恱稅二音一拙不巧也職恱切十一炪說文曰火光也䂐短也梲梁上楹蝃蜘蛛凖應劭云凖頰權凖也李斐云凖鼻也又章允切䫎頭短􅵌倔􅵌短皃䪼面秀骨􅙐醎葅䖦蟲歠大飲昌恱切二啜茹也輟止也巳也陟劣切十五畷田間道又竹芮切惙疲也憂也餟祭酹也又竹芮切罬捕鳥覆車罔一名罦剟說文刋也醊醊連祭也啜言多不正䟾跳也綴連補也又竹芮切掇拾取又丁活切腏骨間髓也車具叕連也茅蜘蛛說文曰蟊作罔蛛蟊也又壯殺切劣弱也鄙也少也力輟切十三上同埒馬埒亦厓也還也堤也爾雅山上有水埒又孟康云等􅋻垣也䟹䟹跳踉見出字統鋝說文曰十一銖二十五分之十三周禮曰重三鋝又音刷脟脅肉㸹牛白脊出字林蛶爾雅曰蛶􅲈何㲕毛色班也浖隈隅也哷鷄鳴㭩木名又音捋禾麥知多少瞥暫見亦作說文曰過目也又目翳也芳滅切又芳結切四潎漂潎又匹蔽切憋怒也又卑列切枯病别異也離也解也說文作剮又姓何氏姓苑云揚州人皮列切又彼列切二大山名書亦作别轍車轍直列切五徹通也明也道也達也又丑列切撤發撤又去也經典通用徹澈水澄㯙棗也䇷分䇷一云分契方别切五上同莂種穊移蒔也扒擘也别分别㕞埽也清也所劣切四刷上同鳥理毛也小飲孑單也居列切六訐訐發人私釨句子㦸也趌趌􅺻跳皃䅥長禾揭揭起設置也陳也合也識列切二蔎香草呐嗗呐聲不出女劣切又女鬰切一􅡚舉目使人許劣切六小風皃盡也烕烕也小飛鳥吷飲也說文與歠同妜鼻目間䡖薄曰妜也於恱切一蹶有所犯灾紀劣切又居月又居衞二切五豕發土也角觸䞵小跳罬罦也又陟劣切茁草生皃側劣切又側滑切二䵵短黒皃也膬耎而易破七絶切四絟細布别名石破敠斷敠絶蠽茅蠽似蟬而小列切八上同小鷄說文少也摘去也㱜木死說文曰束髮少小也鳴摋茱茰山列切又音殺一焆煙氣於列切二怒􅋄草初生皃丑列切七撤抽撤硩擿也周禮有硩蔟氏徹通也䚢䚢聅司馬法曰小罪聅聅謂以箭貫耳䒆船行娎喜皃計列切二焎火氣啜說文曰甞也爾雅曰茹也禮曰啜菽飲水殊雪切一㔍割斷聲厠列切一㿱枯也寺絶切二􅔼江􅔼似蝤蛑生海中掣挽也昌列切又昌制切二瘛瘛癡小兒病又昌制切抴亦作拽拕也羊列切又余丗切一城門中板也土列切十八藥說文云治病艸禮云醫不三丗不服其藥又姓後漢有南陽太守河内藥崧以灼切三十一躍跳躍也止也進也礿祭名禴上同蘥燕麥鑰關鑰内肉及菜湯中薄出之瀹上同又漬也卄瀹上同亦水名在泚陽亦作􅖐􅖐水名爚煜燿光明櫟櫟陽縣名在京兆又音歷龠量器名䋤白䋤縞也岸上見也說文作敫光景流皃籥樂器郭璞云如笛三孔而短小廣雅云七孔幕屋也出新字林矐視皃􅭃􅭧􅭃螢火別名纅絲色鸙鷚鸙鳥㜰㜰媄之皃仰也䟑趠䟑行皃㿑淫㿑病也門龠門門龠視不定䠯登也履也出走也䖃䖃䖃風吹水皃略簡略謀略又求也法也要也又姓何氏姓苑云零陵人離灼切九䌎紩擽字統云擊也掠抄掠劫人財物㗉爾雅云利也晉有禇㗉䂮上同􅨑渠􅨑蜉蜉蟲朝生暮死亦作􅶗䀩說文曰眄也方言云視也䛚約䛚歎美也腳釋名曰腳卻也以其坐時卻在後也居勺切五脚俗蹻走蹻蹻皃郤節也又去約切屩草履也灼燒也炙也熱也之若切十六斫刀斫又漠複姓有斫胥氏何氏姓苑云今平陽人彴橫木渡水㣿痛也勺挹取也又周公樂名又音杓酌酌酒又益也挹也行也取也霑也繳矰繳說文作生絲縷也焯火氣䅵五穀皮又音桔妁媒妁說文曰酌也斟酌二姓也又音杓謶欺也䉛玉篇云􅜷米具犳獸名䶂䑕屬玉篇云禈衣齊地名爍灼爍書藥切七鑠銷鑠獡犬驚㜰美好也爚儵爚光皃又音藥䁻美目䟏動也又音櫟若如也順也汝也辝也又杜若香草亦姓魯人也又虜三字姓後魏書若口引氏後改爲宼氏而灼切十一弱劣弱鄀地名在襄陽箬竹箬蒻荷莖入泥之處又菜名楉楉榴安石榴也溺水名出龍道山其水不勝鴻毛又奴歷切䐞脆腝說文曰肉表革裏也惹䛳惹叒搏桑叒木足下又綽寛也昌約切四繛古文婥婥約美皃磭大脣屵磭皃又魚偃切約約束又儉也少也又姓韓子有古賢者約續於略切又於笑切二葯白芷葉卻退也去約切四却俗地名在河東食瘡疾虐酷虐說文作殘也魚約切三磭大脣皃又音綽瘧病也妁媒妁市若切又音酌六勺周禮梓人爲飲器勺一升又漢複姓殷人六族有長勺尾勺二氏又音酌汋瀱汋又土角切杓杯杓仢仢約流星芍芍藥蕭該云芍藥香草可和食芍張略切藥良約切又芍陂在淮南七削切又蓮芍縣名在馮翊之若切又􅝀茈草名胡了切㲋說文曰獸也似兔青色而大象形頭與兔同足與鹿同丑略切六㚟上同婼叔孫婼魯大夫說文曰不順也逴略逴行皃辵說文云乍行乍止从彳止聲蠚蟲行毒亦作蠚又火各切削刻削息約切一斮斬也側略切一爵封也禮含文嘉曰殷爵三等周爵五等白虎通曰三等法三光五等法五行也淮南子曰爵禄者人臣之銜轡也文字音義曰爵量也量其職盡其才也又禮器周禮曰享先王以玉爵即略切七古文雀鳥雀禮記云雀入大木爲蛤爝炬火莊子云日月出矣而爝火不息又音嚼燋火未然也㩱捎也䶂䑕似兔而小也皭靖也埤蒼曰白色也在爵切三嚼噬嚼爝炬火鵲淮南子云鵲知太歳之所字林作䧿七雀切舄人姓纂文云古鵲字趞行皃㹱宋國良大碏敬也又人名衞大夫石碏芍陂名在壽春皵皮皴爾雅云棤皵謂木皮甲錯踖陵也馺也䇎驚也䱜魚名出東海噱嗢噱笑不止其虐切九蹻舉足髙又居勺切􅵍須臾亦倦也天神蟲又丘良切說文曰口上阿也一曰笑皃臄說文並同上醵合錢飲酒䐘䐘䐘大笑也嬳作姿態也憂縛切四上同彠度也又乙􅉑切臒大也善也縛繫也符钁切一䂄大視皃許縛切四矆上同彏弓弦急皃又居縛切戄驚戄又曰遽視籰說文曰牧絲者也亦作篗五縛切五上同籰子菜筌取魚器也䢲行不住䢲䢲天下玃大猨也說文曰大母猴也居縛切十一貜上同說文曰榖貜也􅴦大歩钁說文曰大鉏也方言云關東名曰鹵斫也攫搏也矍說文云隹鳥欲逸走也从又持之矍矍也一曰視遽皃健皃彏弓弦急皃躩盤辟皃三首鳥􅵂車輞芍芍藥香草張略切七著服文於身又直略張豫二切說文云斫也櫡說文曰斫謂之櫡鐯钁也􅺸上同擆置也擊也著附也直略切一躩說文云足躩如也丘縛切二往也戄大視具籰切五大歩又居縛切健皃又居縛切䣤郷名貜大猨又居縛切逽走逽女略切三閠閭牽引也蹃踐也􅱠美雨孚縛切一謔戲謔虚約切一十九鐸太鈴也軍法用之又木鐸金鈴木舌釋名鐸度也號令之限度也又姓左傳晉大夫釋遏宼徒落切十五剫治木也說文判也爾雅曰木謂之剫度度量也又音渡􅴇忖􅴇踱跣足蹋地凙楚詞云冬冰之各凙襗褻衣顱欺也􅝿􅝿胡履也䐾肫䐾無檢限也㤞徴也亦作􅗘喥口喥喥無度仛他輅莫無也定也說文本模故切日旦冥也从日古茻中茻音莽又州名開元十三年改鄭州去邑亦姓楚莫敖之後又虜複姓五氏西秦録有左衛將軍莫者羖羝南涼州刺史莫侯悌眷後魏末有亂宼莫折念生又有莫輿氏莫盧氏又虜三字姓周太祖賜廣寧禓纂姓莫胡盧氏也慕各切十六幕帷幕又姓鄚縣名在河間又姓膜肉膜鏌鏌鎁劔名摸摸􅟥又莫胡切漠沙漠又施也也瘼病也寞寂寞說文作嗼瞙字統云目不明嗼鼽嚏塻舎塻亦塵塻死也說文作㱳云死􅓦㱳也定也見文動落零落草曰零木曰落又始也聚落也左傳注云宫室始成祭之爲落亦姓出姓苑又漢複姓二氏漢有博士落姑仲異益部耆舊傳有閬中落下閎善歷也盧各切三十四絡絡絲又姓烙燒烙洛水名書曰導落自熊耳漢書作雒珞瓔珞也酪乳酪樂喜樂又五角五教二切說文云兩也轢陵轢又音歷笿籠笿硌磊硌駱白馬黒鬛曰駱又姓出東陽吴有駱統大白􅛘生革去皮節又剔也鉻說文􅚎也馲馲駝又音託驝上同鮥魚名又五格切䶅䑕名又下各切雒字林鵋䳢鳥又姓駱絡雒並出姓苑㰚出音譜謊狂言躒晉大夫名輔躒夲又音歷鵅鳥􅖂水鳥􅓼治病又音料􅿗殂也大皃挌打也􅣍似黒文赤頭濼水名在濟南又音禄袼䙔袼䀩大目閣漢宫殿䟽曰天禄閣騏驎閣蕭何造以藏祕書賢才也又姓急就章有閣并訴格樹枝胳胳腋袼袼䘸也又袂也恪敬也又姓晉有中郞令恪啓若各切三㤩愙並上同咢徒擊皷謂之咢詩云或歌或咢說文作㖾譁訟也五各切二十五愕驚也鄂國名在武昌又姓漢安平侯卾君諤謇諤直言說文曰刀劔刄也說文曰似蜥蜴長一丈水潛吞人即浮出日南上同遌心不欲見而見曰遌萼花萼鍔劔端籀文崿崖崿鶚鳥名鰐魚名噩爾雅曰太歳在酉曰作噩亦作咢㗁口中齗㗁出字統齶上同顎嚴敬曰顎山峯鑩以鐡作鉤物也偔多也堮坼堮上同㮙穽也湂水名面大皃匹各切十五奤俗濼陂濼䨰上同粕糟粕膊說文曰薄脯膊之屋上􅿤割肉䪙車覆軛搏擊也胉脅也蒪蒪苴大蘘荷名􅡺􅡺齒相也蘀也舂也飛去也又歩各切惡不善也說文曰過也烏各切又烏故切四悪俗堊白土蝁蛇名泊止也傍各切十一亳國名春秋時陳地漢爲沛之譙縣魏爲譙郡晉爲南兖州齊爲亳州箔簾箔薄厚薄說文曰林薄也又姓漢文帝母薄氏礴盤礴簿蠶具􅫜􅫜䩣􅓏也鑮似鍾而大踄蹈也魚似鯉一目也䭦䭦餅亦作􅌜羹􅌜呵各切又火酷切十一鄗縣名漢光武改爲髙邑壑溝也谷也坑也虚也㕡上同蠚螫也亦作蠚謞䜛慝郝姓也殷帝乙時有子期封太原郝郷後因氏焉鰝爾雅云大鰕也出海中似蝗長二三尺靑州有之熇熱皃又火沃切嗃嚴厲皃易云家人嗃嗃矐重目又失明也索盡也散也又繩索亦姓出燉煌蘇各切又所㦸切六􅟥摸􅟥溹水名在滎陽又所㦸切􅤼􅤼􅝿草名㮦白㮦水名涸水竭也下各切十一鶴似鵠長喙左傳曰衞懿公好鶴有乗鶴軒貈說文曰似狐善睡獸也穆天子傳曰天子獵於滲澤得玄貈以祭河宗周禮曰貉踰汶則死此地氣然也貉狢並上同􅏖􅏖澤冰皃佫人姓出纂文䮤說文曰死名一曰馬白頟􅻂望也䅂似黍而小䶅䑕出胡地昨昨日隔一宵又羌複姓有昨和氏在各切二十酢酬酢蒼頡篇云主荅客曰酬客報主人曰酢莋縣名在越嶲怍慙怍穿鑿鏨也古史考曰孟莊子作笮竹索西南夷尋之以渡水筰上同柞木名又音作㸲山牛岝岝萼山髙䎰地名在蜀亦姓岀蒼頡篇飵楚人相謁食麥饘曰飵草繩㡗䋏縆也秨禾稼動摇砟石上又人名葃茹草又士革切鈼鉹也吳人云也博廣也大也通也從十尃亦州名春秋時齊之聊攝也秦爲東郡地隋爲博州因博平縣以名焉又姓古有博勞善相馬也補各切二十髆胷髆搏手擊爆迫於火也鎛鐘磬上橫木也又田器也詩曰庤乃錢鎛㗘㗘㗱㗱皃㗱姊入切上同襮衣領鑮大鍾簙六簙棊類出說文丗夲曰烏曹作簙書本多單作博䗚䗚蟭螗蜋卵也猼犬名䍸䍸䍫獸名似羊九尾四耳其目在背出山海經䍫徒何切欂欂櫨枅也車下索也溥水名䶈䶈䑕餺餺飥䙏短袂衫􅡺蠶具名吳人用諾說文應也奴各切一霍揮霍爾雅曰霍山爲南嶽又姓武王弟霍叔之後虚郭切十二靃地名說文曰飛聲也雨而雙飛者其聲靃然霩雲消皃䁨驚視藿豆葉又香草矐目開彉張也說文曰弩滿也又郭廓二音彍上同攉攉盤手戲瀖瀖泋衆波聲劐裂也癨吐病郭城郭也釋名曰郭廓也廓落在城外也丗本曰鯀作郭亦姓出太原河南潁川東郡馮翊五望本自王季之後又云氏於居者城郭園池是也案說文作爲居作爲氏也古博切十並見上注崞縣名在代州又山名椁禮曰殷人棺椁又木名槨上同彉弓張說文曰弩滿也彍上同埻埻端國名又音蟈耳矌雘丹也烏郭切六蠖蚇蠖屈伸蟲名味薄臒羮肉玉篇云善肉鸌水鳥嬳恐嬳穫刈也胡郭切十鑊鼎鑊㦜心動也檴檴落木名穫禾火穫禾火熱濩說文曰雨流霤下皃擭柞擭淺則施之䨥䨥大雨㾰廓空逺廓空也大也虚也亦州名漢西羌地前涼湟河郡周爲廓州也苦郭切六鞹皮去毛漷水名在魯又許虢切􅒠解也裂也籗爾雅注云捕魚籠亦作籗又仕角切噋𫾣噋噋聲也亦作㗥瓁朴瓁五郭切一硦硦石聲盧穫切音廓一㘀鳴㘀㘀亦作嗽祖郭切一二十陌阡陌南北爲阡東西爲陌莫白切十八帞頭巾袹袹複􅙵靜也㱳上同貘食鐡獸似熊黃黒色一曰白豹蛨虴蛨蟲貊鸞貊佰一百爲一佰也驀騎驀㹮㹮驢父牛母亦作馲􅦢􅦢上同嗼詩云盈盈一水間嗼嗼不得語貉北方獸洦水淺皃擊也越銆銆刃軍器磔張也開也爾雅曰祭風曰磔陟格切十一虴虴蛨舴舴艋小船㹮戇鳥鷄屬馲馲􅦢顱腦蓋黏皃嫡孎嫡窟也杔杔櫨壓酒器也白西方色又告也語也亦姓秦帥有白乙丙傍陌切五帛幣帛尚書大傳曰舜修五禮五玉三帛又姓出吴神仙傳有帛和舶海中大船鮊魚名草爾雅曰帛似帛俗從廾伯長也又侯伯周書曰率衆時作謂之伯亦姓左傳晉有大夫伯宗又漢複姓二氏韓子有伯夫氏墨家流莊子有伯成子髙博陌切八迫逼也近也急也附也敀上同百數名又姓秦有大夫百里奚柏木名五經通義曰諸侯墓樹柏又姓晉趙王倫母曰柏夫人亦作栢湐洦湐淺水􅴓藍之别名㼟㼿㼟井甃劇増也一曰艱也又姓史記燕有劇辛竒逆切六屐履屐車􅤕倦􅤕􅿣勞也㘌戲㘌戟刀戟說文作戟有枝兵也釋名曰戟格也傍有枝格也典略曰昔周有雍狐之戟屈盧之矛孤父之戈几劇切八撠持也大藥名獸相踦丮持也􅿣勞也又其戟切髭􅧞求也山戟切又蘇各切六索上同䞽僵仆溹水名碎石隕聲􅭁煑米多水柵村柵說文曰豎編木測戟切三䜺磨豆簎刺也國語曰籍魚鼈也嚄嚄嘖大喚胡伯切二誇皃嘖側伯切八迮迫迮窄狹窄笮矢箙又屋上版又迫也又姓吴有笮融亦作􅪩㳻遮水諎大聲亦作唶舴舴艋蚱蚱蟬齚齧也鋤陌切五齰上同咋㕭咋多聲㕭烏交切泎瀺泎水落地聲岝岝㟯山皃隙壁孔也怨也閑也綺戟切七郤姓出濟隂河南二望左傳晉有大夫郤獻子俗從吝綌絺綌􅵍廣雅云勞也極也疲也又大笑嫌恨􅽘西方小皃火笑額釋名曰額鄂也有垠鄂也說文作頟顙也五陌切六頟上同䱮􅱚䱮魚名峉岝峉或作㟯詻鄭玄云詻詻教令嚴䩹補履逆也􅚏也亂也范曄漢書周防字偉公少孤微常修逆旅以俟過客而不待其報冝戟切六屰說文曰不順也縌漢書古佩襚也㘙說文云呻也紱維嘔客賔客苦格切四喀吐聲礊堅也揢手把著也啞笑聲烏格切二飢虩懼也許郤切一􅠂裂也亦作坼餘倣此丑格切六半歩腦蓋㿭皴㿭開䪝䪝佩刀飾乙白切一拍打也普伯切十魄魂魄怕憺怕静也皛亦打出蜀都賦又胡了切又莫百切敀大打也疾也又音赴珀琥珀風入水皃破物也洦淺水赫赤也發也明也亦盛皃又虜複姓有赫連氏其先匈奴右賢王去卑之後劉元海之族也勃勃以後魏天賜四年稱王於朔方國号夏都以子從母之姓非禮也乃云王者繼天爲子是爲徽赫實與天連因改姓曰赫連氏呼格切五爀火也嚇怒也􅩴􅩴赤紙目赤垎土乾也胡格切四䞦䞦倒地楁鞍楁輓車當胷橫木格式也度也量也書傳云來也爾雅云至也亦格五博屬行箭但行梟以格殺漢吾丘壽王善之又姓東觀漢記有侍御史東平相格班古伯切十四􅛕至也亦作假茖山葱骼骨骼觡鹿角􅱚􅱚䱮魚名鵅鵋􅠿鳥名挌擊也鬪也止也正也㦴擊也鬪也亦作㪾蛒蠀别名碎麥擊也海魚似鯾肥美鉻陳公鉤也謋謀然虎伯切八諕上同漷水名在東海又音廊砉又呼臭切出莊子飛疾也湱漰湱波激水也硅硅破心驚宅居也說文云宅託也人所投託也釋名曰宅擇也擇吉處而營之也瑒伯切十三㡯古文擇選擇澤潤澤又恩也亦陂澤釋名曰下有水曰澤又州名秦爲上黨郡後魏爲建興郡周爲澤州取濩澤以名之亦姓出姓苑鳥名毛備五色翟陽翟縣名亦姓唐有陜州刺史翟璋又音狄䕪䕪蕮藥草車前別名檡檡棘善理堅刄者可以爲射決出儀禮鸅鸅鸆即護田也􅭕􅭕䪝刀飾蠌螖蠌襗袗襗土得水也虢國名周封虢仲於西虢秦屬三川郡義寧元年爲鳳林郡武德初爲鼎州又爲虢州亦姓左傳晉大夫虢射也古伯切五乎打之類㶁水裂多言皃唬鳥啼擭手取也一虢切五濩濩澤縣在澤州又音護彠視遽䪝刀飾把中皮也㠛陂名又村名在吴王舊城側也蹃踐也女白切二搦捉搦又正也天神蟲名擭切二􅒠解本欂欂櫨戸上木弼㦸切二說文曰壁柱也二十一麥白虎通曰麥金也金王而生火王而死又姓隋有將軍麥鐡杖嶺南人俗作麦莫獲切八說文曰血理之分哀行體者又作脈經典亦作脉周禮曰以鹹養脉釋名曰脉幕也幕絡一體也脉上同衇籕文霢霢霂亦作霡眽說文曰日纔視也覛爾雅云相也說文本莫狄切哀視也籀文獲得也又臧獲方言云荆淮海岱雜齊之間罵奴曰臧罵婢曰獲亦姓宋大夫尹獲之後胡麥切八畫計䇿也分也又胡卦切嫿分明好皃劃錐刀刻鱯魚名彠度也又烏虢切㗲㗲嘖叫也咟上國蟈螻蟈蛙别名古獲切十六馘􅎒耳又獲也或作聝聝上國幗婦人喪冠膕曲腳中也上同埻埻端國名出山海經摑打也亦作漍水挻䂸䂸破慖悖也嘓口嘓嘓煩也䬎䬎赤氣熱風之怪讗讗嚄疾言大血檗黃檗俗作蘗博厄切五擘分擘薜爾雅云山芹當歸也又曰山麻也䑀豆中小硬者出新字林糪飯半生皃䌟織絲爲帶蒲革切四繴罿也翻車欂欂櫨又木名也賾探賾士革切七鰿爾雅曰貝小者鰿郭璞云今細貝亦有紫色者出日南又音迹葃茹菜又音藉㣱容㝷常人矠以又矛取物也耫灰中種也嘖㗲嘖叫也責求也側革切十一頗頭不正皃簀牀簀幘冠幘漢書曰幘古卑賤執事不冠者祈服之說文曰髪有巾曰幘嘖大呼聲謮謮怒說文同上債負財􅜽小貝也子魚子脯出新字林嫧鮮好咋大聲䞰急走也出字林查獲切二䟄䟄黠皃出方言謀也籌也釋名曰䇿書敎令於上所以驅䇿諸下也又馬箠也楚革切十四冊簡冊說文曰符命也諸侯進受於王也象其札一長一短中有二編之形笧古文嫧健急皃䶦齒相值也筴卜筮筴也告也矠矛也憡憡痛皟淨也㥽耿介正也捒扶捒也柵豎木立柵又村柵礊鞭皃楷革切六說文曰裘裏也䙐上同緙紩也又織緯罊器空諽謹也剨破聲呼麥切二十一繣徽繣乖違飛聲㦎不慧又㦎㦎辯快出音譜劃作事又音畫捇捇掘土又裂也掝裂也㖪大笑皃礊鞭聲又口革切䐸曲腳中也焃赤㩇擘也又于馘切裂帛聲辛目病湱漍湱水出西豁痛䦝䦝門水皃䬉熱䬉刀破覈實也下革切九繳衣繳衣領中骨又音酌䃒石地翮鳥羽㮝木名核果中核崔豹古今注云烏孫國有青田核莫測其樹實之形至中國者得其核耳大如六升瓠空之以盛水俄而成酒味甚醇厚燒麥滆湖名在常州義興縣蒚蒲臺頭名隔塞也古核切十六膈胷膈搹㧖也岀儀禮鬲縣名在太原又鬲津九河名又姓殷末賢人膠鬲之後又音歷鼎屬也槅車槅革改也獸皮也兵革也亦姓漢功臣表有煑棗侯革朱子竹障出通俗文智也諽謹也轡首虎聲䨣雨也瞔翅也􅱚魚也嗝雉鳴摘手取也陟革切又他歷切九謫責也又丈厄切讁上同大怒張耳棏蠶棏或作硬皃䊞黏䊞厇張厇矺磓也戹災也說文隘也於革切十四厄上同搤持也握也捉也㧖上同軶車軶阸限也礙也又危也迫也塞也豟爾雅曰豕絶有力豟又云彘大五尺爲豟呝呝喔鳥聲䑕屬貖上同蚅蚅鳥蠋大如指似蠶飢皃啞笑聲視梀木名山責切十四小雨􅱵瘮􅱵寒皃䨛霰摵殞落皃愬驚懼皃又音素擌黐擌捕鳥捒捒擇取物也􅧞求也取也好也索上同溹溹溹雨下皃堅硬􅊒虎驚皃又許逆切㳻說文曰所以􅗙水也􅚹射中聲也普麥切二糪飯半生熟爾雅云米者謂之糪虉爾雅云虉綬虉小草雜色似綬五革切又五狄切四鳽鵁鶄又音堅䩹履頭㣂㣂補也礐礐硞水石聲也力摘切二􅩯􅩯礋打草田器出字林㩇裂聲也簪摑切一𢷾拂著又捎𢷾也岀通俗文砂獲切一足長皃求獲切一疒疾也尼戹切又仕莊切三炙餅餌名眲耳目不相信出列子二十二昔徃也始也爲一昔之期明日也說文作㫺乾肉也又姓漢有烏傷令昔登思積切十四籕文腊乾肉見經典惜悋惜說文痛也潟鹹土磶柱下石舄履也崔豹古今注云以木置履下乾腊不畏泥濕故曰舄也上同蕮車前草鬄說文髲也䯜骻骨間也水鳥焟火乾棤皮甲錯也積聚也資昔切又資賜切十八脊背脊釋名曰脊積也積續骨莭終上下也說文作背吕也蹐蹐地小歩借假借也又資夜切迹足迹跡上同速籕文踖踧踖敬皃又秦昔切鴒一名雝􅖥又名錢毌大於燕頸下有錢文亦作䳭鰿爾雅曰貝小者鰿郭璞云今細貝亦有紫色者出日南􅜽上同􅠧魚名鯽上同蹟詩傳云不蹟不循道也小水襀襞也䃊䃊庴縣在臨卭益増也進也伊昔切八謚笑皃嗌喉也漢宣帝崩昌邑王至京師不哭云嗌痛地名齸爾雅曰麋鹿曰齸牛曰並吞芻而反出嚼之也膉肥也益母草爾雅注只作益䑕名繹理也陳也長也大也終也充也說文云抽絲也羊益切三十三睪引繒皃說文曰司視也从目从㚔令吏將曰捕臯人也亦揔也俗作弈弈美皃又博弈奕大也又輕麗皃又行也盛也帟小幕曰帟譯傳言周禮有象胥傳四夷之言東方曰寄南方曰象西方曰狄鞮北方曰譯懌恱也樂也改也斁猒也驛驛馬嶧山名在魯醳苦酒腋肘腋掖持臂又縣名又掖庭也一曰正門之旁小門也亦姓䘸䘸縫易變易又始也改也奪也轉也亦水名出涿郡安閻山見水經亦州名漢書趙分晉得中山秦爲上谷郡漢置涿郡隋爲易州因水名之又姓齊大夫易牙又盈義切液津液又姓急就章有液客調痬病相染也蜴蜥蜴埸壃埸圛說文云回行也啇書曰圛圛者升雲半有半無襗衣襦射無射九月律墿道也焲火光襗重祭名殷曰肜周曰襗亦作繹㴒浟㴒水皃燡火甚之皃耕也又音釋交㘁㘁川災也出字林光皃釋捨也解也散也清也廢也服也又姓施隻切十六釋說文曰漬米也檡梬棗適樂也善也悟也往也又姓奭盛也又驚視皃又邵公名說文作奭郝人姓又呼各切睗睒睗急視晹日無光嫁也耕皃螫蟲行毒亦作螫􅚎鬀髮又音逖盗竊懷物也從兩入弘農陜字從此冟餅堅柔相著䁺視皃衡雨衣尺家語曰布手知尺舒肱知㝷說苑曰度量衡以粟生之十粟爲一分十分爲一寸十寸爲一尺昌石切十一赤南方色又姓出姓苑又漢複姓二氏莊子有赤張滿稽郭象注云赤張姓也韓子曰智伯以鍾遺仇繇赤章枝諫仇繇令不受烾古文蚇蚇蠖蟲名易亦作尺㡿逐也逺也又㡿候說文曰郤行也从广屰屰音逆斥上同㚖白澤郝郷名滷鹵滷姓也獸也石釋名曰山體爲石亦州名秦伐趙取離石周因邑以名州又姓左傳有衞大夫石碏又漢複姓二氏孔子弟子有石作蜀何氏姓苑有石牛氏常隻切七碩大也祏說文云宗廟主一曰大夫以祏爲主鉐鍮鉐䄷說文云百二十斤也鼫鼫䑕螻蛄䲽鳥名隻一也說文曰鳥一枚也从又持佳持一隹曰隻二隻曰雙之石切十三適往也又施隻切又都歷切炙說文曰炮肉也从肉在火上墌基址摭拾也拓上同蹠足履踐也楚人謂跳躍曰蹠跖上同說文曰足下也䗪􅡂負蟲亦作蟅又音柘䨥䨥大雨䞠行也􅷘仄也䘸袖也擲投也搔也振也直炙切七擿上同岀說文䵂麩䵂躑躑躅行不進也蹢上同蠋蟲名潪土得水也皵皮細起七迹切八磧砂磧刺穿也又七四切趚䟐趚行皃涑水名在北䟄倉卒帬衸嫧嫧娕齊謹席薦席又藉也大戴禮曰武王踐阼有席名亦姓出安定其先姓藉避項羽名改姓席氏晉有席坦祥易切六夕朞也字從半月又姓漢書巴郡蠻渠帥七姓有羅朴督鄂度夕龔也朴普卜切蜀有尚書令夕斌穸窀穸窀厚也穸夜也汐潮汐郷名蓆大也籍簿籍秦音切十三踖踐也上同藉狼藉又姓左傳晉大夫藉談又慈夜切耤耤田耤借也談文曰帝耤千畮也古者使民如借故謂之耤也宋書藉田令古官也於周爲甸師塉薄也瘠病也瘦也庴縣名在清河又七削切猎獸名似能出山海經葃茹草膌膌腹䣢地名在蜀簎打也擗撫心也房益切九椑棺也躃躃倒闢啓也開也辟便辟又法也五刑有大辟從阝辛所以制節其罪也從口用法也㱸㱸㱤欲死之皃弓弭萆雨衣毛役古從人今從彳說文曰戍邊也營隻切十二䓈燕人呼芡又羊捶切疫說文云民皆疾也魚名有四足出文字集略坄喪家塊竈說文曰陶竈䆫也垼上同炈亦同􅝣􅝣鳩鳥鈠小矛䨥大雨豛豬之别名􆈗蟲名瞁驚視許役切二眼也辟爾雅皇王后辟君也亦除也又姓漢有富室辟子方又有辟閭彬必益切七璧白虎通曰璧者外圜象天内方象地爾雅曰肉倍好謂之璧肉邊好孔也鐴鐴土犂耳躄跛躄說文作􅵋人不能行也􅵋上同襞襞衣說曰曰韏衣也治也僻誤也邪僻也芳辟切四辟上同見詩癖腹病廦牆也麝麝香也食亦切又食夜切二射丗本曰逢蒙作射又姓呉有中書郎射慈又神柘切又羊謝羊益二切碧色也說文曰石之靑美者又八品九品服色代靑也紀年曰惠成王七年雨碧于郢彼役切一黏黐竹益切一彳說文云小步也象人脛丑亦切二􅤕瓶也卷之役切一􅡚小動七役切二小行二十三錫賜也與也亦鉛錫玄中記曰鉛錫之精爲婢又姓吳志云漢末有錫光先擊切十三析分也字從木斥破木也又爾雅曰析木謂之津注云即漢津也亦姓風俗通云齊大夫析歸父㭊俗裼袒衣晳人白色也緆細布􅻢說文同上􅔼􅔼蜴菥菥蓂大薺淅淅米惁敬也㱤㱸㱤欲死之皃激疾波又姓淮南王傳有激章古歷切九擊打也墼土墼轚舟車獥狼子敫敬也草名揚皃鸄鳥名似烏霹霹靂普擊切七劈剖也裂也破也澼莊子洴澼絖漂絮者憵急速䤨裁木爲器癖痃癖病僻邪僻靂霹靂郞擊切四十五䟐䟐趚行皃趚七昔切酈縣名在南陽亦姓又力知切癧瘰癧轢車踐又音洛鎘鎘鎗䥶上同礫釋名曰小石曰礫瓅珠瓅秝稀踈櫪馬櫪䍽羖䍽櫟木名柞屬又音藥櫟陽縣名魚名亦作􅱚歷經歷又次也數也近也行也過也又歷日續漢書律歷志云黃帝造歷丗本曰容成造歷尸子曰羲和造歷或作曆曆見上注藶葶藶子瀝滴瀝磿石聲寥寂寥無人又深也又音聊鬲爾雅曰鼎款足者謂之鬲說文作鬲鼎屬實五觳斗二升曰觳象腹交文三足今亦作鬲㽁瓦器說文同上又作䰛蒚山蒜皪的皪白狀視明皃䍥羃䍥煙狀躒動也䟏上同齒病說文云玉名厤治也攊擊口也䮥馬色纏裹䤙䤙酪滓履下䐎強脂下酒㔏劙開鳥名觻角鋒雜糅食名擽捎也濼一名貫衆葉圎銳莖毛黒布地生冬不死一名貫渠又音藥蝷爾雅曰蟿螽螇蝷亦作蚸的指的又明也說文作旳都歷切二十六適從也又之石始石二切嫡正也君也甋瓴甋塼也靮馬韁鏑箭鏃馰馰顱馬白額又作的滴水滴也亦作肑腹下肉也弔至也又音釣芍蓮中子也亦作的見爾雅蹢蹄也詩云有豕白蹢䶂䑕名又音灼玓玓瓅明珠色出說文樀屋梠雉屬􅙏魚擊網也磓上同扚引也量也啇本也魡魚名㣿㣿痛至也杓柄末横木檄符檄說文曰二尺書也胡狄切八覡巫覡男曰巫女曰覡薂的薂蓮實也見爾雅䑕名鸄鳥似烏蒼白色獥狼子又音叫音激椺鐘椺又胡老切䚫以角飾杖策頭鷁水鳥也博物志曰鷁雄雌相視則孕或曰雄鳴上風雌鳴下風亦孕五歷切五鶂上同說文又作鷊艗艗舟舟頭爲鷁首石地惡虉虉綬草荻萑也徒歷切二十九狄北狄又姓春秋時狄國之後漢有博士狄山敵匹也當也輩也主也籊竹竿皃又他歷切翟翟雉又姓漢有上蔡翟方進迪進也道也蹈也覿見也􅹩上同笛樂器風俗通云武帝時丘仲所作也晉協律中郎列和善吹笛也篴上同出周禮糴市穀米又姓國語有晉大夫糴茂籴俗邮郷名在髙陵滌洗也除也淨也蓧盛種器也蔋草木旱死也踧詩曰踧踧周道䌦䌦緑色鰍東海有馬鰍魚䵂䵂麩樀屋梠又音的頔好皃梑臧槹爾雅釋木曰狄臧槹是也䊮穀粟之名䢮雨也㹍特牛苖苖蓨草滷鹹也㣙說文曰行㣙㣙也逖逺也他歷切二十逷古文倜倜儻不羈趯跳皃䢰上同剔解骨上同䛢狡猾惕怵惕憂也又愛也䯜骨閒黃汁硩周禮硩蔟氏掌覆妖鳥之巢又丑列切摘發也動也說文曰拓果樹實也一曰指近之也又張革切踢䟣踢獸名左右有首出山海經䚐說文云目赤也又前歷切􅚎說文云鬀髮也望見火皃蓨苖蓨草籊竹竿皃悐勞也欶也失意視皃績緝也功業也繼也事也成也則歷切四勣功也樍檉木别名鳥也燩乾燥也苦擊切九􅠎傍擊􅌛攻也漢書云攻苦􅌛淡喫喫食上同矛也敕也吹器惄心之飢也憂也思也奴歷切四古文溺溺水古作休又音弱又姓也愵憂皃寂靜也安也前歷切五􅜝上同􅓦亦同嗼無聲䚐目赤又音逖覓求也莫狄切二十三覛上同說文曰衺視也幎覆也亦作幂幦車覆軨也􅍜上同䮭馬多惡也糸細絲也微也連也鼏鼏蓋羃覆食巾又羃䍦婦人所戴汨汨泳永羅水名在豫章屈原所沈之處㵋漞並上同冂文字音義云以巾覆從一下垂䖑說文云白虎也蓂菥蓂白豕黒頭覭小皃䌐綱繩黒靑䈿䈿濗瀝濗水淺蝀蟲名塓塗也甓瓴甓㼾甎扶歷切四鷿鷿鷈鳥名似鳧而小足近尾或作鸊椑大棺㱸㱸㱤欲死之皃壁說文云垣也釋名曰壁辟也辟禦風寒也漢官典職曰省中皆胡粉壁紫素界之畫古烈士亦州名本漢宕渠地武德初爲壁州北激切六鼊鼂鼊似龜而漫胡無指爪其甲有黒珠文如瑇瑁可飾物繴爾雅繴謂之今覆車鳥網也又核切廦室屋綼紷綼絮也邪獸獸身鳥喙闃寂靜也苦鶪切二䠐踞也郹邑名在蔡古闃切七狊說文云犬視皃亦獸名猨屬脣厚而碧色鶪伯勞湨水名在温縣鼳爾雅曰鼠身長須秦人謂之小驢郭璞云似䑕而馬蹄一歳千斤爲物殘賊犑爾雅云犑牛黠戚親戚又姓漢有臨轅侯戚鰓倉歷切十一慼憂也懼也􅿏說文曰夜戒守鼓也鼜上同鏚干鏚斧鉞本亦作戚色敗䙾面柔詩本或作戚施慽慽痛蟾蜍別名草也磩碝磩石次玉也赥笑聲許激切九䦧一也很也戾也又相怨也矛也左思呉都賦云長短兵亦作􅧿沐遽也私訟䈪籮屬㤸心不安也去涕㦦惶恐􅧿矛也呼狊切七砉砉然物相離聲瞁驚視眼也狊犬視也焱火華又火焰也殈鳥卵破也痛也丑歷切又丑力切二福二十四職爾雅云職主也常也博雅云業也字林云記微也又姓周禮有職方氏其後因官爲姓風俗通云漢有山陽令職洪之翼切九軄俗戠說文云一職識字从此織組織說文曰作布帛緫名􅕄油敗蟙蟙䘃蟲蝙蝠別名也草名似酸漿亦作蘵䐈脯長尺有二寸曰䐈儀禮作膱樴樴杙直正也又姓楚人直弓之後漢有御史大夫直不疑除力切四犆犆牛也䐈肥腸山直力筋也又姓黃帝佐力牧之後林直切九朸縣名在平原屴屴崱山皃仂不懈鳨似鳧而小亦作趙魏間呼棘出方言水凝合皃脛交遼東犬名敕誡也正也固也勞也理也書也急也今相承用勑勑本音賚恥力切十四勅上同飭牢密又整備也淔水名趩行聲栻局又木名侙意慎侙又惕也􅠃鸂􅠃鷘上同恜從也慎也慗從也遫張也荲蒴別名㽚田器又地名陟升也進也竹力切二稙早種禾食飲食大戴禮曰食穀者智惠而巧古史考曰古者茹毛飲血燧人鑚火而人始裹肉而燔之曰炮及神農時人方食穀加米干燒石之上而食之及黄帝始有釜甑火食之道成矣又戲名博屬又用也僞也亦姓風俗通云漢有博士食于公河内人乗力切二蝕日蝕也說文云敗瘡也釋名曰日月虧曰蝕稍小侵虧如蟲食草木之葉也息止也又嬎息也說文喘也亦姓姓苑云今襄陽人又漢複姓前漢書有河内息夫躬相即切十一㮩木名鄎新鄎縣在豫州瘜惡肉蒠菲蒠菜熄蓄火􅶘􅶘肉䭒食也㴧水簨鳥食寔實也是也常職切八湜水淸也殖多也生也植種植也立志也置也埴黏土古文㨁拄杖曰㨁遈流行識說文云常也一曰知也賞職切十式法也敬也用也度也又姓出何氏姓苑拭拭刷上同軾車前飾裝飾方言云趙魏閒呼經而未緯者曰機鉽鼎鉽也烒火皃􅱴草名赩大赤也許極切五衋傷痛其心􆉏赤黒皃斜視瞋怒皃崱崱屴山皃士力切四嶷溭溭淢水勢萴草也極中也至也終也窮也髙也逺也說文棟也渠力切一匿藏也微也亡也隱也隂姦也女力切六蟲食病􅉶上同㥾愧也恧慙也又女六切魚名測度也初力切六惻愴也畟畟畟陳器狀說文曰治稼畟畟進也詩云畟畟良耜又音即耜也翼羽翼說文翄也又恭也美也助也亦州名在隴右因翼水爲名又姓晉翼侯之後漢有諫議大夫翼奉說文同上􅢅古文䴬麥䴬隿繳射也或作弋藕翹㚤婦宫也漢有鉤㚤夫人居鉤㚤宫漢書亦作弋潩水名出密縣大隗山杙果名如棃亦橜也芅今羊桃也或曰鬼桃葉似桃而花白㔴說文云田器也􅱸趨進􅱸如也疾趨􅰨黍稷蕃蕪皃亦作翼蛡蛡蛡蟲行皃缻瓮骨也心動瀷水聚缺盆骨也大鼎熼火光釴鼎附耳在外也痒淫蟲也耕也䄩禾䄩行䘝衣䘝䣧酒色即就也今也舎也半也說文作卽食也亦姓風俗通有單父令即賣又漢複姓有城陽相齊人即墨成子力切十六卽上同稷五穀之揔名一曰黍屬周禮注云社稷土穀之神有德者配食焉共工氏之子曰句龍食於社有厲山氏之子曰柱食於稷湯遷之而祀棄俗作稷亦姓后稷之後㮨木名似松㹄牛名蝍蝍蛆蟲名又子結切楖楖裴縣在魏郡裴房非切畟又初力切蹙迫急鯽魚名犬生三子堲風堲又子栗切䐚膏澤唧唧聲也鴒亦作䳭揤捽也逼迫也彼側切十偪上同皕二百幅行縢名楅束也又音福䮠駝䮠湢湢㳁水驚起勢也䫾風也㘠姓也又閉也皀皀粒域居也邦也雨逼切十四蜮短狐蟲又音或罭魚網棫木叢㚜字林云大力皃􅫁鶝􅫁鳥瓦器琙人名漢有公孫琙羔裘之縫又音洫緎縫也亦同上䮙馬走魊小兒鬼淢溭淢波勢叢也洫溝洫況逼切十四侐靜也䦗上同閾門限古文􅴗舉目使人㰲㰲聲吹皃頭痛羔裘之縫緎縫也亦同上羽聲聲也淢疾流赭色堛土田芳逼切十三愊悃愊至誠踾蹋地聲坼也飽皃揊擊聲稫稫稜禾密滿也副析也禮云爲天子削瓜者副之巾以絺畐道滿也䦼地裂也亦作㽬多也密也疈周禮曰以疈辜祭四方百物稄稫稄阻力切十一一本作此􅉴日􅉴又旁也傾也不正也打也仄仄陋說文云側傾也􅻈日在西方㳁湢㳁水勢萴廣雅云附子一歳曰萴子二歳曰烏喙三歳曰附子四歳曰烏頭五歳曰天雄側傍側夨說文云傾頭也籀文愎很也符逼切八腷腷臆意不泄也􅻘火乾肉也􅟺上同版出通俗文馥香又音復踾蹋地聲鶝鶝􅫁鳥嶷岐嶷詩曰克岐克嶷魚力切五薿茂盛㘈說文曰小兒有知也引詩云克岐克㘈懝有所識也觺觺岳角皃堲疾也秦力切又將七切又牆資切三垐以土增道打也又音側丁力切又丁六切三毛少滴水少䁇細視也亡逼切一瀷水潦積聚昌力切又音翼二字統云耕也二十五德德行又惠也升也福也亦州名秦爲齊郡地漢爲平原郡武德初爲德州因安德縣以名之多則切九惪古文觻縣名在張掖漢書作得䙷說文取也今作㝵同得得失淂水皃又丁力切行約也取也則法則子德切三古文􅋿籀文勒鄴中記曰石虎諱勒呼馬勒爲轡盧則切十二肋脅肋釋名曰肋勒也所以檢勒五藏也扐筮者著蓍指閒仂禮祭用數之仂艻蘿艻香草朸說文曰木之理也平原有朸縣􅴯美石次玉玏上同泐凝合㔹功大說文曰材十人也阞地脉理坼竻竹根忒差也他德切六㧹打也慝惡也貣從人求物也䁿欲臥也㥂㥂㥂快也刻刻鏤又剥也苦得切五克能也勝也說文作肩也剋剋己又必也殺也急也勀目強罵女老亦作娔特特牛又獨也亦姓左傳晉大夫特宫徒得切九貣假貣謂從官借本賈也亦從人求物也又音忒􅠀食禾葉蟲􅬑上同樴杙也鈍也棏木名鴏鴏􅠍又徒戴切螣螣蛇黒北方色呼北切三潶水名在雍州㱄唾聲墨筆墨又姓墨翟是也亦即墨縣名莫北切十二默說文曰犬暫逐人也又靜也或作嘿冒干也又莫報切䘃蟙䘃蟲即蝙蝠纆索也万虜複姓北齊特進万俟普俟音其方言同上艒艒釣艇􅾫姓也䁇暫視欲臥也一賊盜也說文作賊則也昨則切七上同鱡烏鱡魚崔豹古今注云一名河伯度事小史鰂上同蠈食禾節蟲亦作賊博雅云測也草名塞滿也窒也隔也蘇則切又蘇載切五上同見說文寨安也㥶實也書曰剛而㥶上同見說文北南北亦奔也又髙麗姓又漢複姓七氏左傳衞大夫北宫貞子莊子有北門成漢有北唐子眞治京氏易丗本云晉有髙人隱於此唐因以爲氏晏子云齊有北郭先生名騷古有北人無擇淸身絜己疾丗之濁自投淸冷之淵姓苑有北郷北野氏博墨切二蟲似蟹四足菔蘆菔蒲北切十三蔔上同僰僰道縣在犍爲又丁壯皃亦醜也亦作􅤵又符逼切匐匍匐上同踣斃也倒也襲因也及也重也合也入也又㭺襲說文曰左衽袍也隰原隰亦州名左傳曰重耳居蒲即隰川縣故蒲城是也漢爲蒲子縣後魏齊周之閒爲沁州隋爲隰州以州前有泉下濕蓋取下濕之義名之又姓齊有大夫隰朋鰼爾雅云鰼鰌今泥鰌也又山海經云鰼魚狀如鵲而有十翼鱗在翼端聲如鵲騽馬豪骭又驪馬黃脊飁颯飁大風槢堅木名􅨊鴣􅨊鳥名茵水草出埤蒼簷修舩具也䒁上同褶袴褶霫雴霫大雨集聚也會也就也成也安也同也衆也本作雧字林云羣鳥駐木上亦州名漢宕渠縣梁爲東巴州恭帝爲集州以有集水名之又姓風俗通云漢有外黃令集一秦入切九輯和也檝舟檝又音接亼說文云三合也从入一象三合之形合僉之類皆从此又子入切說文云詞之集也菩也鏶鐡鍱慹怖也箿箿覆也又子立切入得也内也納也人執切二廿說文云二十并也今作卄直以爲二十字揖揖遜又進也說文云攘也一曰手著胷曰揖伊入切二挹酌也溼水霑也失入切三濕上同見經典又他合切䏉牛耳動也㗱㗘㗱噍皃子入切㗘昔博十一潗泉出䌖合也又蠻夷貨名湒雨皃咠又七入切蓻草生多皃􅸩襟縁葺茨也䁒眨䁒澁俗鈒戟也鋋也雭小雨聲濇不滑㒊不及翜疾飛吸内息許及切十二噏上同歙說文曰縮鼻也後漢有來歙又舒渉切州名翕火炙一曰起也又斂也合也動也聚也盛也言翕言翕䛅語聲也潝水流皃熻熻熱嬆莊嚴翖漢有侯翖地名闟戟名曰闟鳥名戢止也斂也阻立切九淚出皃􅟲角多皃􅋾上同㗊衆口蕺菜名濈和也喻也霵雨下又士邑切邑縣邑周禮曰四井爲邑又漢複姓有邑由氏楚大夫養由氏之後避仇改焉於汲切八悒憂悒唈嗚唈短氣裛裛香又於怯切浥濕潤䓃䓃菸茹熟䭂食䭂湁湁潗沸皃丑入切三雴大雨漐汗出皃煜火皃爲立切四曄曄曄又筠輒切熠熠燿螢火又羊入切騽馬豪骭又音習熠熠燿螢火羊入切二孴多皃孨戢孨聚皃尼立切五㵫潗㵫水文皃濕㘝㘝㘝私取皃又女洽切霵暴雨皃仕戢切二䯂盛衆皃鵖亦鴔皮及切一鵖彼及切二皀穀香也㞚㞚㞏初戢切四􅕜􅕜㙷重累土也䙄重縁行皃卙字統云會聚也昌汁切一二十七合合同亦器名亦六合天地四方對也又州名秦爲巴郡宋爲宕渠郡後魏置合州蓋涪漢二水合流之處因以名之又姓左傳宋有大夫合左師又漢複姓髙帝功臣表有合博虞侯閤切又音閤十一郃郃陽縣在同州又虜複姓後魏書大莫干氏後改爲郃氏又音閤榙榙􅳏果名似李出埤蒼䢔䢔遝行相及也㭘㭘棔木也詥諧也亦作合耠耕也會也齧聲也草盒盒盤覆也閤爾雅曰小閨謂之閤古沓切十九鴿鳥名合合集又音䢔㪉合會也鉿二尺鋌鮯魚名六足鳥尾出山海經蛤蚌蛤郃水名又縣名又音䢔浩浩亹地名亹音門匌周帀也頜頜頷頤傍佮併佮聚㧁閉戸曰㧁􅾄目睫長㭘劔柙又巨業切㠷以席載穀鞈防捍韐韎韐大帶口亦同上答當也亦作荅都合切十二畣爾雅曰俞畣然也􅹍跛行皃撘打也出音譜荅正名云小豆褡横褡小被㜓面㜓姶皃㾑肥㾑㽺出字林嗒舐嗒犬食㿯皮㿯㯚㯚􅳏木名趿進足蘇合切十一颯風聲靸小兒履或作上同馺馬行疾霅廣雅曰雨霅霅又音讋􅧁說文云􅧁三十也今作卅直爲三十字㚫媕㚫女字􅾄􅾄眼睫長衆行皃鈒鈒鏤沓重也合也又語多沓沓也又虜複姓後魏書沓盧氏後改爲沓氏徒合切十八誻譐誻亦作沓􅊱遝䢔遝㧺指㧺㭼柱上木也涾沸溢􅤥馺􅤥馬行龖龍飛之狀􆂆儑􆂆不著事也譶疾言􅳏榙􅳏蹹齧蹹䂿舂巳復擣之爲䂿䜚妄言子絹出字林􅫘東魯人呼蘆菔曰菈􅫘䗘蟲眔目相見錔器物錔頭他合切二十二嚃歠也䓠菜生水中㛥安皃說文曰俛伏也一曰意伏也踏著地帳上覆鞜革履翫飛皃漯水名在平原濕上同㹺犬食􅞌上同䶀鼓聲也佮合也䵬晉書有兖州八伯太山羊曼爲䵬伯食也車釭也㭼柱㭼頭䍝相罯䍝出字林濌積厚鳥名䈋竹名雜帀也集也猝也穿也說文曰五綵相合也徂合切七韴斷聲磼磼嶫山髙雥羣鳥䕹戸簾止也又才含切䣟亭名在貝丘帀遍也周也子荅切十迊上同𠯗入口噆蚊蟲噆人聲魳魚名䍼羊腌嘁歍嘁沞湆沞纔濕䞙䞙急走拉折也敗也摧也盧合切十一搚上同㩉亦同摺敗也飛皃磖磖磼䳴初飛皃菈菈􅫘秦人呼蘿蔔歁不滿㕇石聲納内也又姓出何氏姓苑奴荅切八䪏腝皃蒳字統云香草異物志云葉如栟櫚而小子似㯽榔可食軜驂馬内轡繫軾前者衲補衲紩也魶魚名似鼈無甲有尾口在腹下妠姶妠聚物㨥打㨥溘至也奄也依也口荅切七死見楚詞本作溘㧁閉戸聲山左右有岸容容合相當也匌匌帀也歁歁歞癡皃姶美好皃烏合切十三短氣罨網又一劫切罯覆蓋也又烏敢切媕女有心媕媕也㔩㔩彩婦人髻飾花也庵庵低又屋跛車具又小兒履名􅨢調色畫繒出郭調字指搕以手盍也又搕𢶍糞也鞥皮裏角也佮姓也欱大歠也呼合切四㽺病劣皃瘶㾑寒㾑日中見絲凡作㬎同五合切十礏磼礏哈魚多皃儑􆂆儑衆聲砐峇砐礘動礘礘亦作硆㾑寒㾑病䑥船皃魥魚名䟃走也赴會也七合切二㜗婪㜗遪裹遪士合切一唈爾雅云僾唈也烏荅切一二十八盍何不也說文作盇覆也爾雅合也胡臘切十闔閶闔說文云門扇也一曰閉也俗嗑噬嗑卦名蓋苫蓋靜也篕籧篨也㧁纂文云姓也􅥇說文云地名也熆吹火也臘臘蜡盧盍切十四臈俗齧聲䶘上同鑞錫鑞蠟蜜蠟䗶俗擸折也又擸𢶍破壞也㿴皮瘦寛皃䳴鳥飛搚摺搚相和􅪨飛初起皃繒邋邋遢行皃㿴㿴都搕切十一耷大耳􅒽手打也㩉上同矺擲地聲又竹亞切亦作䂝相著聲一曰鉤也笚竹相擊䓠菜生水中又荷覆水褡橫褡小被䪚熱䪚䪚榻牀也吐盍切十九㯓上同兩槽大船毾毾㲪鰈比目魚別名魼上同鰨魚名似鮎四足􅺀􅺀布傝傝隷亦傝儜劣又傝􅳇不謹皃狧犬食上同多言古盍切莫大羽飛皃鞳鏜鞳鍾聲又他荅切塔浮圖搭摸搭嗒嗒然忘懷也遢邋遢不謹事馬行不進大啜呼盍切三􅾿魶􅾿魚名出山海經㽺肥㽺魶魚名奴盍切三笝纜舟竹索也蹋踐也徒盍切十躢上同見公羊傳闒門樓上屋說文曰樓上戸也爛也墮也忘語也譫多言又作䍇瓶䳴䳴鳥飛䈳䆫扇􅪨􅪨􅳇傝􅳇不謹皃私盍切七食皃𢶍搕𢶍糞又才盍切􅧁三十行皃靸靸鞋起也出新字林儑傝儑不著事也五盍切二睡䪞惡也又姓出纂文今北海有之才盍切二𢶍擸𢶍和雜䫦䫦車頷骨古盍切八多言又音盍嗑上同蓋姓也漢有蓋寛饒字書作􅥇閘閉門鉀鉀鑪䗘䗘􅥇地名榼酒器也苦盍切六磕石聲􅜵􅜵襠㕎㕎崩損也䶀鼓聲䶀􅮣車聲鰪鰪鱂魚名安盍切四盦說文云覆蓋也廅山旁穴短氣也又烏合切囃助舞聲也倉雜切三石多皃䵽鼓聲砝石聲居盍切二鳥名譫多言也章盍切一二十九葉枝葉又姓吳志孫堅傳有都尉葉雄與渉切又式涉切十楪楪榆縣名在雲中揲度揲鍱銅鍱偞偞偞輕薄美好皃枼薄也㯿柶端又力葉切煠煠爚䈎篇簿書䈎說文籥也殜病也接交也持也合也會也又姓三輔決録有接昕子即葉切十一椄續木睫目睫釋名曰捷插也插於眶也說文作䀹目旁毛也䀹上同楫舟楫檝上同婕婕妤亦作倢伃菨莕菨水草可食􅟫􅟫㳧纔有水皃鯜魚名䈉竹䈉又所甲切攝兼也録也書涉切八灄水名在西陽葉縣名在汝州又余涉切歙黟歙又許及切欇爾雅欇虎櫐郭璞云今虎豆纏蔓林樹而生莢有毛刺又音涉目動之皃弽射決張弓又童子佩之韘上同涉歷也徒行渡水也亦漳水別名涉縣是也又姓左傳晉大夫涉佗時攝切四上同出說文欇虎櫐也又書涉切䤮鐵䤮獵取獸白虎通曰四時之田揔名爲獵爲田除害也尸子曰虙羲氏之丗天下多獸故敎人以獵也良涉切二十二鬣須鬣說文曰髮鬣鬣也㲱長毛說文同上又作䝓躐踐也䁽目暗日暗擸說文曰理持也儠說文云長狀儠儠也犣牛牡又旄牛名䪉䪉馬靻也㼲蹈瓦聲䉭編竹爲之鱲魚名齧聲羸􅽳削也擇也邋邁也㯿柶端木也䜲谷名䃳䃳崨山之連接巤本也又䑕毛獦戎姓俗作田獦字非捷獲也佽也疾也剋也勝也成也說文曰獵也軍獲得也春秋傳曰齊人來獻戎捷又姓漢書藝文志捷子齊人著書疾葉切八疌說文疾也寁速也亟也倢斜出也又利也便也崨崨䃳山連延也踕足疾䌖合也逺方物也誱多言也又口誱䐑細切肉也直葉切三㙷下入又直立切殜殗殜病頰面也古協切九籀文鋏長鋏劔名筴箸筴又古洽切梜上同見禮莢蓂莢榆莢又姓出平陽丗本有晉大夫莢成僖子也蛺蛺蝶唊唊唊多言也亦作䛟穧穧音劑愜心伏也又快也苦協切八㥦上同悏快也㾜說文曰病息也匧藏也篋箱篋㤲說文曰思皃㛍得志㛍㛍又呼協切牒書版曰牒又虜姓後魏書牒云氏後改爲牒氏徒協切三十喋便語蹀􅞃蹀諜反閒又譜諜也堞城上垣小走聲㲲細毛布上同褺重衣曡重也墮也明也累也積也說文云楊雄說以爲古理官決罪三日得其宜乃行之从晶从冝亡新以爲曡从三日太盛改爲三田亦州名禹貢梁州之域自秦至魏諸羌據焉周武帝始逐諸羌乃置曡州蓋以山重曡而名之疊上同䥡廣雅鋌也慴懾也說文懼也䠟說文曰䠟足也㥈安也又齒廉切簸牃牀版褋襌衣墊地名在巴中惵思懼皃褶袷也又似入切車聲蝶蛺蝶又丈甲切䴑鳥名狀似鵲赤黒色兩首四足可以禦火出山海經揲摺揲㩹掛㩹黔首出音譜䁋目䁋治苶病劣皃莊子曰苶然疲役奴協切又音涅十五埝陷聲晦冥又私列切聲絶捻指捻錜小釘慹不動皃又之涉切敜說文云塞也書曰敜乃穽攝攝然天下安出漢書㘨深也籋小箱亦作銸鑈上同惗相憶鞍薄也出字林菍草燮和也說文从言又炎蘇協切十六屧屐也履中薦也屟上同躞躞蹀韘韘韝射具􅊅石似玉熟也文字指歸从辛又炎鞢䩞鞢鞍具出新字林徢徢行走皃使也又人耴切牒小契蜨蛺蜨蟲名上同䕈草名洽舟行也㼲蹈瓦聲也盧協切四竹裏黒也多言耳垂聑耳垂皃丁愜切十二多言打也笘折竹箠也喋血流皃又田叶切㝪下也跕墮落䩞䩞鞢鞍具衣領㑙低㑙也䢡走也渉血流皃又時懾切䕹草簾在協切一浹洽也通也徹也浹辰十二日也子協切三又音狎㼪半瓦弽弓弽呼牒切四䁋閉一目㛍少氣皃偞偞卑䢡䢡走也先頰切一三十一洽和也合也霑也侯夾切十四䨐上同狹隘狹陜陿並上同祫祭名峽巫峽山名硤硤石縣亦州名秦將白起攻楚燒夷陵即其地魏武於此置臨江郡後魏爲拓州取開拓之義周以居三峽之口因爲峽州也也齒曲生又缺也相著烚火烚珨霎小雨山洽切七歃歃血又山輒切箑扇之別名䈉上同萐萐莆瑞草王者孝德至則萐莆生於廚其葉大如門不揺自扇飲食喢喢㗙小人言也獸名箚刺著竹洽切三忽觸人也斑身小蟲跛行皃烏洽切四凹下也或作䆟浥波下又濕皃圔圔窊聲下䀴埤蒼云視皃五夾切一五味調肉菜岀文字音義丑㘝切一三十二狎習也說文曰犬可習也胡甲切十一翈翮上短羽霅衆言聲又丈甲切霅陽部在樂浪又音颯冰凍相著柙檻也所以藏虎兕也出說文匣箱匣也虎習搏也􅦆􅦆鞢􅫅􅫅喜炠火皃又呼甲切笚竹名丈甲切六喋啑喋鳧鴈食也啑所甲切擖押擖重接皃霅霅陽縣名又水名在吳興水名鞢􅦆鞢鴨水鳥或作􅝶烏甲切六壓鎭也降也笮也壞也庘屋壞也䆘人神脉刺穴閘開閉門岀說文押押署文字指歸云押字才能也甲甲兵又狎也鎧也亦甲子爾雅曰太歳在甲曰閼逢又姓左傳鄭大夫甲石甫古狎切十胛背胛梜木理亂押押籬壁也山側鉀鎧屬今單作甲玾玉名漢書人名􅷘􅴿􅴿䩖胡履翣翣形如扇以木爲匡禮天子八諸侯六卿大夫四士二丗本曰武王作翣所甲切八豕母啑啑喋帹面衣翜捷也䬊風疾㞚薄㞚􅿉行􅿉􅿉呷喤呷衆聲說文曰吸呷也呼甲切四譀誇誕䛅言翕䛅語聲􅸢􅸢􅸢鼻息三十三業事也大也敘也次也始也敬也嚴也說文作大版也所以飾縣鐘鼓捷業如鋸齒以白畫之象其鉏鋙相承也詩曰巨業維樅又爾雅曰大版謂之業郭璞云築牆版也俗作㸣魚怯切十五㸣見上注鄴縣名在相州又姓風俗通云漢有梁令鄴風驜驜驜馬髙大嶪岌嶪山皃􅱅續也䧨危皃㗼㗼動皃引也樂也䲜魚盛懼也魚名鸈鳥名知人吉凶澲横水大版脅胷脅虚業切九􅫆􅫆氣上同愶以威力相恐也㢵弓弽皃嗋口嗋嚇莊子曰余口張而不嗋熁火氣熁上水流拹說文曰摺也一曰拉也怯畏也去劫切九㹤上同抾挹也呿臥聲又音去魥以竹貫魚爲乾出復州界胠胠篋見莊子厓㾀病劣欠氣劫強取也說文曰人欲劫以力脅止曰劫或曰以力止去曰劫俗作刧居怯切九衱衣領袷上同蜐南越志云石蜐生石上形如龜腳得春雨則生也跲躓也又巨業切鉣帶鐵砝硬也䌜縫也䀷視皃腌鹽漬魚也於業切十四䱒上同罨魚網又烏合切裛書囊也文字集略云裛坌衣香文於及於輒二切䎨耕種殗殗殜不動皃㡋幧頭也浥潤也􅯹相著䤶椎䤶田器車具又於合切臭也餣餌也粢也䁆閉目殜殗殜亦作余業切二樂器跲躓也巨業切五㭘劔匣昅㬤昅极极插笈書笈又初洽其輒二切三十四乏匱也房法切三泛水聲又孚𣑽切姂好皃法則也數也常也又姓左傳齊襄王法章之後秦滅齊子孫不敢稱故以法爲氏宣帝時徙三輔代爲二千石後漢有扶風法雄法子眞並有傳方乏切二灋上同矢皃孚法切一猲恐受財史記云恐猲諸侯起法切又呼葛切二姂好皃䎎飛上皃女法切三水皃靜䎎飛上皃丑法切一廣韻入聲卷第五
