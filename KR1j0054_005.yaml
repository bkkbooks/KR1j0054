front:
  text: 廣韻入聲卷第五烏谷屋第一獨用烏酷沃第二燭同用之欲燭第三古岳覺第四獨用之日質第五術櫛同用食律術第六阻瑟櫛第七文弗物第八獨用許訖迄第九獨用魚厥月第十沒同用莫勃没第十一胡葛曷第十二末同用莫割末第十三胡八黠第十四鎋同用胡瞎鎋第十五先結屑第十六薛同用私列薛第十七以灼藥第十八鐸同用徒各鐸第十九莫白陌第二十麥昔同用莫獲麥第二十一私積昔第二十二先擊錫第二十三獨用之弋職第二十四德同用多則德第二十五七入緝第二十六獨用胡閤合第二十七盍同胡用臘盍第二十八與渉葉第二十九帖同用他恊帖第三十侯夾洽第三十一狎同用胡甲狎第三十二魚劫業第三十三乏同用房法乏第三十四一屋舎也具也淮南子曰舜築牆茨屋風俗通曰屋止也亦虜複姓後魏書官氏志云屋引氏後改爲房氏烏谷切七籀文古文剭鄭玄注周禮云剭誅謂所殺不於市而以適甸師氏又音握􅪧地名墨刑名又音楃䑁䑁膏肥皃獨說文曰犬相得而鬪也羊爲羣犬爲獨一曰獨𤞞獸名如虎白身豕鬛馬尾出北嚻山𤞞音欲亦單獨又虜複姓有獨孤氏後魏書云西方獨孤渾氏後改爲杜氏徒谷切三十黷垢也蒙也黒也讟謗讟髑髑髏䫳上同殰殤胎讀讀誦櫝函也又曰小棺牘簡牘儥見也動也又音育㾄字書云怨痛也贕卵敗碡碌碡田器䢱遦也䮷騼䮷野馬皾滑也獸名如䑕襡襡韜藏又音蜀韣弓衣又之蜀切瓄圭名瀆說文曰溝也一曰邑中溝爾雅曰江河淮濟爲四瀆􅭖說文曰通溝以防水豄古文韇箭筩嬻媟慢犢牛犢􅨰􅨰鳥也罜罜䍡魚罟㒔㒔㑛短醜皃匵匵匱榖五榖也又生也禄也善也說文曰續也百榖之緫名今經典省作榖餘從㱿者並同古禄切十七糓俗轂車轂榖木名瀔水名谷山谷亦善也窮也又姓漢有谷永又欲鹿二音瑴玉名又音角布鳥按爾雅只作榖殐死皃出廣雅䑕名䜼豆名多也䐨足跗𤞞獸如赤豹五尾又音欲動目䀰大目唂鳥名又作唃縠羅縠胡谷切十四槲木名斛十斗又虜複姓二氏後魏有尚書斛斯延齊有丞相咸陽王斛律金􅕪螻蛄水菜可食礐說文云石聲也觳周禮注云受二斗又苦角切蔛石草酒濁穀水聲䶜齒聲㽇瓦坏䈸箱䈸焀火皃哭哀聲空谷切八䍍朱燒瓦㲉卵也餅麴䧊大阜䵈枲未績者㲄土墼麻秃說文云無髮也从人上象禾粟之形文字音義云蒼頡出見秃人伏於禾中因以制字又國語云史伯曰祝融之後八姓已董彭秃妘曹斟芉是也又虜複姓有秃髮氏其先壽􅞔之在孕其母胡棭氏因寢而産於被中朝鮮謂被爲秃髮囚而姓焉秃髮烏孤以後魏元興元年稱王遷于樂都号涼及國滅入魏賜姓源氏他谷切五籀文䛢詆䛢狡猾杖指鵚鵚鶖烏也豰豰榖丁木切八啄啄木鳥䐁尾下竅也俗衣至地也說文音斵擊聲竺竺厚剢刀鋤速疾也召也戚也徴也桑谷切十八遬籀文􅩼古文蔌郭璞云菜茹之揔名也詩云其䔩繼何傳謂菜肴也餗鼎實􅻶說文同上䗱蟲樕槲樕木豰動物豰丁木切㑛㒔㑛又音束梀赤梀木名麋鹿跡也藗白茅也殐殐嗽吮也多也棴棴常樹名涑水名在河東禄俸也善也福也録也又姓紂子禄父之後盧谷切四十七鹿獸名國語曰周穆王征犬戎得四白鹿四白狼而荒服不至又姓風俗通云漢有巴郡太守鹿旗漉滲漉又瀝也說文浚也一曰水下皃渌說文同上觻觻得縣名在張掖睩視皃䚄笑視龣東方音􅪀􅪀轤圎轉也或作樚轆上同㼾㼾甎􅑳舟名琭玉名老子曰琭琭如玉注云琭琭喻少簏箱簏說文云竹髙篋也箓說文同上螰䗱螰蟲蟪蛄也䍡罜䍡麓山足榖梁曰林屬於山曰麓㯟古文碌多石皃盝去水也瀝也竭也或作漉􅜷上同騼野馬磟磟碡又音六逐簶弧簶箭室也出音譜䎼䎼聽似蜥蜴居樹上輒下囓人上樹垂頭聽聞哭聲乃去出字林谷漢書匈奴傳有谷蠡王蠡音离娽埤蒼云顓頊妻名說文云隨從也史記毛遂入楚謂十九人白公等娽娽可謂因人成事耳又力玉切案史記亦作録眼淨也摝振也周禮曰摝鐸鄭玄云掩上振之爲摝祭也捕魚具也吴王孫休三子名白獸廘賈逵曰廘庾也角角里先生漢時四皓名又音覺見鬼录本也亦刻木也濼水名又音朴鏕鉅鏕郡名案漢書只作鹿趢趢趗局小䎑水上飛也􅣗車聲㪖㪖聲􅻫大雨蔍蔍葱草鄜地名嗀歐聲呼木切七豰獸名似豹而小食彌猴又名黃腰案說文作㷤犬屬腰巳上黃腰巳下黒食母猴熇熱皃􅌜羮􅌜又火各切日出赤皃㷤上同嚛大歠聲族宗族昨木切三銼銼􅟋釡屬鑿鑿鏤花葉又音昨瘯瘯瘰皮膚病也千木切六䃚碌䃚石皃蔟𧖟蔟又千候切趗趢趗局小皃梀短椽說文丑録切簇小竹鏃箭鏃作木切二鎐姓也出彭城暴日乾也蒲木切十二曝俗瀑瀑布水流下也䗱䗱蟲名㲫㲢㲫毛不理也樸爾雅云樸􅈪心又音卜僕侍從人也䑑古文短人又倉候切菐瀆業行皃穙穙也扑打也普木切十一醭醋生白醭濼齊魯閒水名左傳云公㑹齊侯于濼墣說文云塊也又匹角切草生穊也䑕名攴擊也凡從攴者作攵同撲拂著骲骨鏃名也淺黲黒也䴆鳥也卜卜筮龜曰卜著曰筮又姓孔子弟子卜商博木切十四濮水名出陳留郡入鉅野亦州名古昆吾之墟左傳齊桓公㑹諸侯於鄄今鄄城縣是後漢獻帝時兖州刺史治於此後魏爲濮陽郡隋初置濮州又姓出何氏姓苑䧤彭䧤蠻夷國名轐車伏免昌意妻也樸棫樸叢木又音僕樸樕小木也獛獛銘南極之夷尾長數寸巢居山林出山海經蹼足指間相著爾雅云鳧鴈醜其足蹼纀爾雅曰裳削幅謂之郭璞云削殺其幅深衣之裳襆上同鬚髯䪁䪁絡頭繩鳪鳪雉􅖂鳥􅖂水鳥似鶂而短頸腹翅紫白背上緑色又音剥木樹木說文曰木冒也冒地而生東方之行又姓木華字玄虚作海賦莫卜切十三沐沐浴說文曰濯髮也禮記曰頭有創則沐又姓風俗通曰漢有東平太守沐寵又漢複姓有沐簡氏何氏姓苑云今任城人朷朷桑毣思皃一曰毛濕也鶩鳧屬霂霡霂車轅名也㡔轅上絲也蓩毒草艒小艖鞪說文曰車軸束也楘屋架五楘詩曰五楘梁輈傳云楘歷録也蚞螇蚞蟲福德也祐也方六切十七腹腹肚複重衣幅絹幅又姓也輻車輻優葍葍爾雅曰葍蕾攵葍􅦣茅蝠說文曰蝙蝠伏翼也崔豹古今注云一名仙䑕實竹鍑說文云􅼤而大口者或作鍢又音富鶝戴勝別名踾踾踧聚皃輹車軸縛也菐瀆菐偪偪陽宋國楅束以木逼於牛角不令牴觸人草名伏匿藏也伺也隱也歷也釋名曰伏者何金氣伏藏之日金畏火故三伏皆庚日又姓出平昌夲自伏犧之後漢有伏勝文帝蒲輪徴不至房六切三十三復返也重也亦州名古竟陵縣春秋時屬楚秦屬南郡隋爲江陽郡或德初爲復州虙古虙犧字說文云虎皃又姓虙子賤是也服服事亦衣服又行也習也用也整也亦姓漢有江夏太守服徹古文茯茯苓馥香氣芬馥鵩不祥鳥鞴韋囊歩靫蕧旋蕧藥名輹車輹免上同澓澓流又姓漢宣帝時有東海澓仲翁椱織椱卷繒者洑洄流箙盛弓弩器上同􅕈車笭閒皮篋也音譜云病重發也鶝即戴勝也􅤻馬也􅠈地窒棴木岀崐崘山也㚆行故道也說文作㚆畐滿也車具絥並上同菔蘆菔菜也匐匍匐伏地皃又蒲北切鰒海魚名見鬼皃栿梁栿縮斂也退也短也亂也所六切十三莤說文曰禮祭束茆加于祼圭而灌鬯酒是爲莤象神歆之也一曰榼上塞也風聲趜體不伸也趜渠六切樎馬櫪謖起也䎘鳥飛㩋擊聲蹜文字義云烏鵲醜其飛蹜在腹下也摍抽也顔叔子納鄰之嫠婦執燭燭盡摍屋以繼之蝍蚇蠖摵到也又子六切謏小也又蘇了切六數也力竹切二十二陸髙平曰陸又髙也厚也亦陸離參差也又姓出吳郡河南二望夲自古天子陸終後戮刑戮說文殺也爾雅病也剹上同勠勠力併力也又音留稑穜稑先種後熟曰穜後種先熟曰稑穋上同鵱鵱鷜野鵝蓼蓼莪詩傳云蓼長大貌上同􅳟􅳟良健馬鯥魚名似牛蛇尾出山海經蔏磟磟碡饘也諊法用亂髪踘踘蹋也閑木名尼也泦水文趜困人又巨竹切麴麴蘖又姓出西平漢有麴演驅匊切五上同說文曰酒母也上同鞠姓也又居六切曲脊又渠六切熟成也殊六切八孰誰也淑善也塾門側堂崔豹古今注云臣來朝君至門外更詳熟所應對之事塾之言塾也上同璹玉名婌後宫女官名䃞石聲俶始也厚也作也動也昌六切五柷柷敔祝作樂也俗作拀又音祝琡璋大八寸曰琡又音祝踧至也埱氣出於地一曰始也育養也長也余六切二十四毓稚也本亦同上鬻賣也亦作粥亦姓周有鬻熊爲文王師案說文鬻夲音麋䭈也粥上同說文鬻也䋭青經白緯䋭陽所織賣也重也長也動也說文衒也或作儥儥上同棛車覆欄也錥鵭錥温器煜火光又燿也焴上同昱日光蒮爾雅云蒮山韭淯水名出攻離山蜟復蜟蟬未蛻者出論衡兩手捧物說文音匊堉地土肥也喅音聲生田􅻂望也又目明也逳歩也轉也行也草名蘛茂也驧馬跳躍也說文曰馬曲脊也渠竹切十二上同趜趜趗䱡魚名鵴鵴鳩鳲鳩又音菊上同鞠蹋鞠以革爲之今通謂之毬子又菊麴二音毱皮毛丸也䗇說文曰䗇鼀蟾蠩以脰鳴者也踘踘蹋也䜯谷名在上艾曲脊皃鼀䗇鼀七宿切三蹴蹋蹴殧殄也肉骨肉如六切俗作宍三衄鼻出血俗作􅗮又尼六切鮞魚子一曰魚名粥糜也之六切五喌呼鷄聲亦作咮祝巫祝又太祝令官名周禮曰太祝掌六祝之辭以事鬼神祈福祥求永貞亦貞亦音呪又姓後漢有司徒中山祝恬柷柷敔又音俶又爾雅曰柷州木髦柔英本亦作祝琡璋大八寸又音俶叔季父亦姓左傳魯公子叔弓之後光武破虜將軍叔壽又漢複姓二氏後漢有犍爲叔先雄左傳魯有大夫叔仲小式竹切十三儵青黒繒倐倐忽大走疾也透驚也又他豆切虪爾雅云虪黒虎又音育跾疾也長也鮛爾雅曰鮥鮛鮪郭璞云鮪鱣屬也大者名王鮪小者名鮛鮪掓拾也疾也翛飛疾之皃又音蕭尗豆也菽上同㶖水波蓄蓄冬菜也許竹切又切六切十稸上同畜養也說文曰田畜也淮南子曰玄田爲畜又丑六許救二切上同說文云魯郊禮畜从田从兹兹益也㜅媚也鄐晉邢侯邑又姓漢有鄐熈爲東海太守荲羊蹄菜又丑六切蓫上同慉起也詩云不我能慉􅰮細視竹說文作冬生草也象形下垂者箁箬也史記曰渭川千畮竹其人與千戸侯等亦姓本姜姓封爲孤竹君至伯夷叔齊之後以竹爲氏今遼西孤竹城是後漢有下邳相竹曽張六切六竺天竺國名又姓岀東莞後漢擬陽侯竺晏本姓竹報怨有仇以胄始名賢不改其族乃加二字以存夷齊而移於琅邪莒縣也又冬毒切厚也俗作笁筑筑似箏十三弦髙漸離善擊筑說文曰以竹爲五弦之樂也又爾雅曰筑拾也又音逐水名築擣也古文茿萹茿也似藜赤莖生道傍可食蹙迫也促也近也急也子六切十七踧踧踖行而謹敬􅠸蝍􅠸蚇蠖也說文嗼也本音寂㗤㗤咨慙也噈歍噈口相就也摵到也槭木可作大車輮殧也􅩃取氣皃說文本才六切歍􅩃也笪也縬縮也又縬文也又側六切欻悲皃䐚膏澤也顣顣頞鼻頥促皃䙘好衣皃蹴蹋也又七六切珿齊也初六切六矗直皃又敕六切􅐅廉謹皃衆也岀字統或作閦小豆䎌飛皃肭朔而月見東方謂之縮肭女六切八恧慙也上同忸忸怩衄鼻出血又挫也又音肉䖡䖡􆀋即蚰蜒也䂇刺也沑蹜沑水文聚縬縬文也側六切二塞也蝮蝮蛇又姓乾封元年改武惟良爲蝮氏芳福切八覆反覆又敗也倒也審也又敷救切蕧蕧盆草又音服􆃹廣雅曰假髻也副剖也又甎救切㙏地室􅠈上同䔰䔰舊草名又音富郁文也亦郁郅縣在北地又姓魯相有郁貢又虜三字姓二氏後魏書云蠕蠕姓郁乆閭氏又北方郁原甄氏後改爲甄氏於六切二十戫有文章也彧上同燠熱也又音奥栯栯李又音有俗作㮋噢噢咿悲也墺墺襄䐿鳥胃薁蘡薁澳隈也水内曰澳隩上同又音奥䉛可以漉米愁皃􆄘姓岀姓苑羔裘之縫又于逼切稶黍稷盛皃懊貪也愛也又音奥㰲吹氣也喉聲温器肅恭也敬也戒也進也疾也又州名古月氏國地漢匈奴昆邪王殺休屠王并其衆來降遂置酒泉郡後魏以酒泉爲甘州隋分福禄縣置肅州亦姓出姓苑息逐切二十三宿素也大也舎也說文作㝛止也左傳曰一宿爲舎再宿爲信又姓風俗通云漢有鴈門太守宿詳又虜複姓後魏未有賊帥勤宿明達又虜三字姓後魏書宿六斤氏後改爲宿氏又息救切蓿苜蓿史記云大宛國馬嗜目蓿漢使所得種於離宫夙早也說文作早敬也从丮持事雖夕不休早敬者也丮音㦸又姓魯大夫季孫夙之後並古文出說文玊朽玉又琢玊工又姓後漢有玊況字文伯光武以爲司徒鷫說文曰鷫鷞也五方神鳥也東方發明南方焦明西方鷫鷞北方幽昌中央鳯皇上同蟰蟰蛸俗呼喜子詩曰蟰蛸在戸又音蕭驌驌騻馬名䎘䎘䎘鳥羽聲又音縮風聲鱐魚腊䃤黒砥石又音篠朽玉又姓也潚深淸也亦姓漢有潚河橚木長皃㩋擊也䑿艒䑿船名㑉傗㑉不伸璛姓也㪩打也目釋名曰目黙也黙而内識也說文曰人眼象形重童子也莫六切十一睦親也敬也又和睦也亦西胡姓穆和也美也敬也厚也淸也又姓漢有穆生苜苜蓿蓿見爾雅注牧養也放也使也察也司也食也說文曰養牛人也又姓風俗通云漢有越嶲太守牧稂㙁㙁野殷近郊地名古文尚書作此㙁說文作坶繆禮記有繆公又姓也又靡㓜切萺萺菜㣎說文曰細文也今作同㾇㾇病囿園囿于六切又于救切二哊吐聲蓄蓄冬菜詩曰我有㫖蓄鄭玄云蓄聚美菜以禦冬月乏無時也本亦作畜丑六切十稸上同滀水聚苗蓨也又他六徒歷二切蓨音桃又音剔荲羊蹄菜蓫上同敊病敊皃傗傗㑉不伸鄐地名在晉矗直也齊也砡齊頭皃魚菊切一􅩃說文曰歍􅩃也才六切二沃灌也說文作又姓太甲子沃丁之後出風俗通烏酷切七鋈白金鱟魚名又音候䑁膏膜又音屋䁷瞋目觷治角也又戸角切䮸馬腹下聲毒痛也害也苦也憎也說文作毒厚也害人之草往往而生徒沃切八見上注􅗨萹竹草蝳蜘蛛瑇瑇瑁又音代纛左纛又徒兮切上同碡碌碡田器篤厚也說文曰馬行頓遟冬毒切十一竺地名說文厚也督率也勸也正也說文察也一曰目痛也又姓風俗通云漢有五原太守督俗作督衣背縫也並上同錖舌瓠玉篇云落石也裻新衣聲又先䔍切凥俗酷虐也說文曰酒味厚也苦沃切六焅熱氣􅮘禾熟嚳帝嚳髙辛氏也說文曰急告之甚也硞碌硞石狀􅴀山皃鵠鳥名又姓姓苑云今東海人胡沃切八㿥鳥白也翯鳥肥澤也詩云白鳥翯翯又音學隺髙也灼也頶鼻髙皃門聲礐石礐僕僮僕說文曰給事者也漢書曰太僕秦官掌輿馬亦姓風俗通云漢有渾梁侯僕多又虜複姓後魏書僕蘭氏後改爲僕氏蒲沃切六瞨古文鏷鏷鍏矢名案左傳曰魯莊公以金僕姑射南官長萬字不從金䗱䗱蠃又䗱􅠠蟲轐車兔也䴆䴆􅖂洬雨聲先篤切二裻新衣聲梏手械紂所作也古沃切九牿牛馬牢也䧼鳱鵠鳥名似鵲䅵禾皮又地名告又音誥告上曰告發下曰誥郜國名又音誥祰說文云告祭也䧊說文云大阜也䶜治象牙也瑁瑇瑁莫沃切又莫代切五􅦲門樞橫梁媢夫妬婦艒艒䑿船名萺草也熇熱也火酷切四臛羮􅌜又音郝嚛食新也歊氣岀皃又音嚻褥小兒衣一曰小兒也内沃切又而蜀切四傉虜三字姓有庫傉官氏耨釋典云阿耨搙捻搙傶邑名又姓將毒切三穿也錊姓也襮黼領博沃切三犦犎牛出合浦郡􅖂鵅烏􅖂水鳥名濼水名在濟陽盧毒切又力各切一白牛五沃切又音岳一三燭燈燭也禮曰嫁女之家三日不息燭丗本曰石季倫以蠟燭炊又姓左傳秦大夫燭之武之欲切十三屬付也足也㑹也官衆也儕等也經典作屬又音蜀属俗矚視也䌵綴帶囑託也鸀鸀鳿鳥䟉小兒行皃㰲吹氣也噣噣鳥名蠾蚤也方言云鼅鼄自關而東趙魏之郊或謂之蠾蝓又音蜀韣弓衣又六欲切蠋螐蠋玉白虎通曰玉者象君子之德燥不輕濕不重是以君子寶之禮記曰執玉不趜又烈火燒之不熱者眞玉也說文本作王隷加點以别王字魚欲切四獄臯陶所造說文确也从㹜从言二犬所以守也鳿鸀鳿鳥頊人頊䪴又音勗旭說文曰日旦岀皃一曰明也許玉切五頊顓頊髙陽氏也又謹敬皃勗勉也顱出聲譜上同輂禹所乗直轅車說文曰大車駕馬也居玉切十二絭纕臂繩也又居願切鋦以鐡縛物挶持也􅍫歛手梮輿食器也䡞說文曰直轅車縳也㮂舉食者名䋰靴䋰子纏連者說文約也拲兩手共梏又巳奉切素屬曲角局曹局又分也說文促也渠玉切五跼踡跼又曲也俛也促也駶馬立不定侷侷促短小䎤耕也蜀巴蜀說文曰葵中蟲也淮南子云𧖟與蜀相類而愛憎異也亦作蠋市王切十二韣弓衣人徒谷切蠾蠾蝓蜘蛛㯮木似柳葉大也䙱玉篇云長襦也連腰衣也襩上同㒔㒔㑛動皃襡短衣又大口切屬附也類也又音燭属俗㻿玉㻿鐲温器又直角切觸突也尺玉切四觕古文歜怒氣亦人名齊宣王時有髙士顔歜或作臅狼臅膏也辱恥辱又汚也惡也又姓出姓苑而蜀切十一蓐草蓐又薦也說文曰陳草復生也一曰蔟也褥氈褥鄏郟鄏地名在河南縟文采溽溽暑濕熱㦺矛㦸技也媷懈憜也嗕囑嗕憐皃又西羌名黒垢大鼎束縛也又姓本自踈氏避難除足姓束左傳晉有束晳書玉切二㑛㒔㑛欲貪欲也余蜀切九浴洗浴說文曰洒身也洒先禮切鵒鴝鵒上同鋊炭鉤又銅屑也漢書曰磨錢取鋊輍車枕前也慾嗜慾𤞞獨𤞞獸谷山谷爾雅曰水注谿曰谷說文曰泉出通川爲谷亦虜三字姓吐谷渾氏又音榖躅躑躅直録切三䠱上同蠋蠋蟲名録采録說文曰金色也又録事職官要録云緫録衆事力玉切十七渌渌水名在湘東又姓何氏姓苑有渌圖爲顓頊師䚄眼曲䚄也緑靑黃色永徽二年始七品六品服緑飾以銀八品九品服靑飾以鍮石至文明元年又改靑服碧色醁美酒騄騄駬駿馬名娽隨從又音鹿菉菉蓐草逯謹也又姓風俗通云漢有大司空逯並後趙録有金紫光禄大夫廣平逯明西征記有逯明壘云是石勒十八騎中人䱚魚名籙圖籙碌碌石綵色本又音禄䟿㳟䟿也􅮮謔也趢趢兒行㫽日暗㪖剥㪖又聲㪖曲委曲說文作象器曲受物之形又姓晉穆侯子成師封於曲沃後氏焉漢有代郡太守曲謙丘玉切四䱡魚名䒼𧖟薄漢書周勃織薄䒼爲生亦作筁匤匤匣也瘃寒瘡也陟玉切七上同孎謹也又陟角切斸斫也又钁也钃上同欘枝上曲一曰斤柄豕行皃又丑足切足爾雅云趾足也又滿也止也從口止即玉切又將喻切二哫楚詞云哫訾憟斯玉逸謂承顔色也贖說文貿也神蜀切又音樹三􅼳􅼳鞮也又似足切䴰姓也梁四公子䴰䵎之後幞帊也又幞頭周武帝所制裁幅巾出四腳以幞頭乃名焉亦曰頭巾房王切二襆上同促近也速也至也迫也七玉切六誎飾也趗趗速迫也丳炙具㹱宋良犬又七雀切續繼也連也又姓舜七友有續牙似足切四俗風俗說文習也藚藚斷藥名一曰牛脣又名水􅼳白􅼳鞮也粟禾子也淮南子曰昔蒼頡作書而天雨粟又姓袁紹魏郡太守粟舉相玉切七􅰲上同見說文憟憟斯涑水名在河東又蘇侯切罽毛玉西番國名亦姓又香救切又新菊切㔄細切䪁絡牛頭封曲切一梀梀樗木名丑玉切七亍彳亍字書曰􅤽損米趢兒行豖行皃又知足切㙇牛馬所蹈之處豖說文曰豕絆足行豖豖也四覺曉也大也明也寤也知也古岳切又古孝切十八斠平斗斛角芒也競也觸也說文曰獸角也又角抵戲漢武帝故事曰未央庭中設角扺戲角抵者六國時所造也使角力相抵觸亦大角軍器徐廣車服儀制曰角前丗書記所不載或云本岀羌胡以驚中國之馬也又姓後漢有角善叔桷椽也較車箱又直也略也又古孝切䡈說文曰車騎上曲銅也與二玉相合爲一與瑴上同䮸馬腹下聲䚫飾杖頭骨又胡歷切榷以木渡水今之略彴也捔掎捔搉揚搉大舉又音確䁷明也梏直也又古沃切傕後漢有李傕䮤馬白額龣樂器嶽五嶽也五角切八岳上同樂音樂周禮有六樂雲門咸池大韶大夏大濩大武又姓出南陽夲自有殷微子之後宋戴公四丗孫樂莒爲大司寇鸑鸑鷟鳯屬國語曰周之興也鸑鷟鳴于岐山俗作說文云面前岳岳也觷爾雅云角謂之觷治角也或作礐又音學捳抨捳㹊說文曰白牛也浞水濕士角切十二丵叢生草鋜銷足灂瀺灂鷟鸑鷟捔攙捔組織亦作澩山下有水冬無水篧魚罩音捉汋說文曰激水聲也一曰井一有水一無水爲瀱汋齺齒相近皃速也或作簎取魚箔也捉捉搦也側角切七穛早熟榖􅧤上同穱稻處種麥斮斬又側略切篧魚罩蒵毒朔月一日又幽朔也命和叔宅朔方北方也又姓何氏姓苑云南陽人俗作所角切十二欶口噏也嗽上同矟矛屬通俗文曰矛丈八者謂之矟槊上同蒴蒴藥也數頻數箾說文曰以竿擊人又舞者所執又蘇彫切緘也㮶木名揱纎也又長臂皃又音消㩋罘䍐斵削也竹角切十九涿郡名諑訴也王逸注楚辭云諑猶僭也㧻擊也推也琢治玉孎謹孎卓髙也又姓蜀有卓王孫桌古文說文曰特止也啄鳥啄也又丁木切斀說文云去隂形啅衆口噣鳥生子能自食龍尾豚上同倬大也晫明也又敕角切打也菿說文云草大也本音一墣塞江圤上同颮颮颮紛紛衆多皃鞄攻皮之工謈自冤本蒲角切火裂玉篇云乆視㺪枇㺪盈財㱿皮甲又說文曰从上擊下也一曰素也苦角切十九毃毃打頭謹也善也愿也誠也搉擊也又音角確靳固也或作碻碻上同皮乾㲉鳥卵觳盛脂器也燩廣雅云火乾物嶨爾雅云山多大石嶨礐上同塙髙也上同至也髙也硞固也說文曰幬帳之象隷省作􅿢埆墝埆不平鞭聲濁不淸也又姓漢書貨殖傳云濁氏以胃脯而連騎直角切十六擢抜也抽也出也濯澣濯又姓風俗通云濯輯之後鵫白鵫鳥嬥直好皃蒴鐲似鈴又音蜀􅠁爾雅云拘􅠁謂之定􅠁鋤也拘音劬本亦作斪斸斸陟玉切㺟獸名鸀小鳥似烏赤喙出西方蠗小蜃名鸐山雉長尾龍不安大雨㪬築也舂也本又敕角切渥霑濡於角切十七握持也偓偓促又姓列仙傳有偓佺箹小籥幄大帷三禮圖曰在上曰弈四旁及上曰帷上下四旁悉周曰幄楃說文曰木帳也喔鷄聲又喔咿強顔皃鷽山鵲又音學葯白芷也腛厚脂刑也又作剭齷齷齪齒相近媉好皃英蒻龏燭蔽誇聲也䮸馬腹下鳴搦持也女角切又女厄切六掉正也又杖弔切䚥屋角一曰調弓也上同搙揾也握也逴逺也一曰驚走又作趠敕角切五趠上同晫明也踔跛也㪬授也刺也㪬敊痛也敊丑六切犖駁犖牛雜色又卓犖也吕角切三䃕䃕確石相扣聲啅有才辯俗學說文與斆同覺悟也斆今音效又姓出姓苑胡覺切九确磽确說文曰礊石也嶨山多大石又音㱿亦作礐鷽山鵲赤喙長尾知來而不知住澩㴄泉觷治角之工㿥鳥白又胡沃切翯鳥肥澤㕰怒聲許角切十豿豕聲急束翯鳥肥澤嗀歐吐左傳褚師聲子韤而登席公怒辭曰臣有足疾君將㱿之說文從口草聲謞讒慝瀥瀥瀑水涌䤕醋味滈水皃娖辯也測角切八䃗䃗礫􅐅齒相近聲娕恭謹皃擉司馬彪住莊子云擉鼈刺鼈又音踔齱漢書云握齱急促也軬帶齪開孔具五質朴也主也信也平也謹也正也又姓漢書貨殖傳云質氏以洒削而鼎食注云理刀劔也之日切又音致十五晊大也郅郁郅古縣名又姓漢有郅都桎桎梏在足曰桎櫍椹行刑用斧櫍蛭水蛭博物志曰水蛭三斷而成三物騭駁馬又書曰惟天隂騭下民傳云騭定也劕劕劑劵也長曰劕短曰劑周禮作劕劑銍縣名䑇䑇䏷刀箭瘡藥鑕斧也野人之言懫止也礩柱下石也侄堅也又牢日說文曰實也太陽精不虧从口一象形人質切五馹驛傳也衵女人近身衣又女乙切㠴枕巾也臸到也實滿也誠也神質切一秩積也次也常也序也書曰望秩于山川直一切十二紩縫紩帙書帙亦謂之書衣又姓出纂文上同柣門限翐翐翐飛皃姪兄弟之子又音迭妷上同豑說文曰爵之次弟也帆索走皃大也悉說文云詳盡也息七切九厀說文曰脛節也膝上同蟋蟋蟀蛬也牛又作本草作膝上同䊝䊝􅔁聲僁僁㣯動也窸从穴出也一數之始也物之極也同也少也初也又虜三字姓後魏書一那婁氏後改爲婁氏於悉切三弌古文壹專壹又合也誠也輩也醇也又虜三字姓後魏書云壹斗眷氏後改爲明氏七數也親吉切十漆水名在岐又姓古有漆沈爲魯相何氏姓苑云今豫章人又漢複姓孔子弟子漆彫開柒俗餘倣此䣛地名在齊鳥名桼膠桼說文曰木汁可以䰍物从木象桼如水滴而下也經典通用漆俗木名可爲杖也草似蘇也
