body:
  text: 壛壛榻也説文同上阽臨危簷屋簷説文曰簷㮰也簷上同櫩亦同步長廊也㶄説文云海岱之間謂相汙曰㶄離鳥自為牝牡也䦲語林云大夫向䦲而立説文曰䦲謂之樀樀廟門也㿕病走進也廉廉儉也釋名曰廉斂也自檢斂也亦姓趙有廉頗力鹽切二十鐮刀鐮也釋名曰鐮廉也薄其所刈似廉也鎌上同久雨簾㡙簾帷也簾簾箔釋名曰簾廉也自障蔽為廉恥也三秦記曰明光宫以金玉珠璣為簾箔薕薑也説文蒹也蘞白蘞藥又音斂蘞蔓草説文同上又音斂奩盛香器也又鏡奩也俗作奩籢上同挑撥朓月出西方又吐了切恌轉薄􅝁斗旁耳又爾雅云􅝁謂之疀古田器也郭音鍬庣不滿之貌銚田器跳雀行又他弔切聎耳疾蓧苗也貂鼠屬出東北夷又姓出姓苑都聊切二十二䯾小兒留髮斷穗刁軍器纂文曰刁斗持時鈴也又姓出渤海風俗通云齊大夫豎刁之後俗作刀雕雕琢凋凋落鯛魚名䂏短尾犬也雕鶚屬又姓漢武帝功臣表有雕延年雕籕文蛁蛁蟟茆中小蟲雕雕刻亦作雕説文云短衣也死人衣苕葦華也又音調葫茭實􅊑吳船鷯剖葦求蟲食似雀青班色㚋大也多也奝上同弴天子弓也説文曰畫弓也詩又作敦又丁昆切瞗熟視迢迢遰徒聊切二十二條小枝也貫也教也爾雅云柚條似橙而實酸又姓左傳殷人七族有條氏後趙録冉閔司空條攸姓苑云安定人樤柚條或從木髫小兒髮俗行齠跳躍也鋚紖頭銅飾䖺䖺䗤狀如黃蛇魚翼出入有光見則大旱出山海經蜩大蟬佻獨行貌詩曰佻佻公子跳説文曰雀行也苕苕菜詩云卭有旨苕芀葦華調和也又姓周禮有調人其後氏焉又徒料切鮡魚名岧岧嶤山髙貌䯾多髮貌又音凋音綢鞗革轡詩云鞗革沖沖嬥聲類云細腰貌田器㲖毛貌􅓒草木實垂􅓒􅓒然也鰷白鰷魚名驍驍武也古堯切九梟説文云不孝鳥也故日至捕梟磔之從鳥頭在木上人姓隋煬帝誅楊玄感改其姓為梟氏到懸首漢書曰三族令先黥劓斬左右趾首𦵔其骨謂之具五刑澆沃也薄也憿憿幸或作僥又作僥幸釗覿也逺也亦弩關一云周康王名又作䙼又指遙切邀遮也又於宵切蟂水蟲似蛇四足能害人也徼求也抄也又音呌聊語助也亦姓風俗通有聊倉為漢侍中著子書又有聊氏為穎川太守著萬姓譜落蕭切四十二耳中鳴也又力刀切膋腸間脂也膫上同飉風也遼逺也又水名憀無憀賴也竂穿也寥空也又寂寥也寥廓也料料理也量也又郎弔切㙩周垣橑蓋骨亦椽也又力道切撩取物又理也摷擊也又側交切廖人名左傳有辛伯廖又力救切僚同官為僚又姓左傳晉陽氏大夫僚安寮上同鐐有孔爐又紫磨金也爾雅曰白金曰銀其美謂之鐐簝宗廟盛肉方竹器豂空谷鷯鷦鷯􅚠竹名璙玉名嫽相嫽戲也又力弔切漻水清也蟟蛁蟟膫目明也䜮谷名草木踈莖細長嶚嶚􅥲山貌翏高飛貌繚繚綾經絲出字林憭空貌獠夜獵也又知卯盧皓二切髎臗骨名􅢏崖虛蟧馬蟧大蟬草器又力戈切􅰴㨂擇嘹嘹亮聞逺聲又力弔切熮説文曰火貌堯至髙之貌諡法曰翊善傳聖曰堯五聊切五嶢嶕嶢山危僥僬僥國名人長一尺五寸一云三尺垚土髙貌顤頭髙長貌膮豕美也詐么切七嘵懼聲詩曰子維音之嘵嘵憢憢憢懼也㚠長大貌臉腫欲潰也䎄䎄毛貌頒大額又去遙切么么麼小也於堯切五怮怮怮憂也又一蚪切葽草盛貌䱂魚名望逺也鄡鄡陽縣名在鄱陽又姓出何氏姓苑苦么切五縣名在巨鹿郡玉篇云擊也墽地名説文磽也寥空也四宵夜也相邀切二十消滅也盡也息也霄近天氣也捎搖捎動也又使交切逍逍遙痟痟渴病也司馬相如所患綃生絲繒也銷鑠也焇上同硝硭蛸藥名蛸螵蛸蟲也爾雅注云一名􅡯蟭亦姓南齊武帝改其子巴東王子響為蛸氏又所交切莦草名又使交切哨口不正也又七笑切鳥毛羽也鮹魚名又所交切􅽌狂也出文字集略䴛煎鹽揱長貌又色交色角二切奎張羽又先準切魈山魈出汀州獨足鬼超説文曰跳也又姓漢有太僕超喜敕肖切六怊悵恨欩健也細絲鳴也䫿涼風朝早也又旦至食時為終朝又朝鮮國名亦姓左傳有蔡大夫朝吳陟遙切又直遙切二古文􅏯蒼頡篇云蟲名亦姓風俗通云衛大夫史􅏯之後漢有􅏯錯直遙切又陟遙切五朝上同鼂古文朝朝廷也禮記曰諸侯於天子五年一朝又姓唐有拾遺朝衛潮潮水嚻喧也許嬌切又五刀切十枵玄枵虛危之次歊熱氣説文曰歊歊氣出貌毊犬磬也爾雅注云形如犂錧以玉石為之又音喬獢猲獢短喙犬也犬黃白色藃草貌又火交切呺㕺然大貌炊氣虈白芷别名樵柴也説文木也昨焦切十五上同劁刈草憔憔悴瘦也憔上同䏆耳中聲又音曹譙國名又姓蜀有譙周嶕嶕嶢􅥲嶚巢山髙貌又音巢鐎又音焦􅼜縣名僬又音焦䩌面枯貌又音焦撨取也菬草名驕馬髙六尺舉喬切九嬌女字亦態憍憐也恣也本亦作驕穚禾秀鷮鷮似雉而小走鳴長尾蕎藥名一名大戟喬爾雅云句如羽喬郭璞曰樹枝曲卷似鳥毛羽簥大管名也嬌舉手焦傷火也又姓周武王封神農之後於焦後以國為氏出南安即消切十七籀文㲬兜鍪上毛飾蕉芭蕉膲人之三膲鷦鷦鵬南方神鳥似鳯又鷦鷯小鳥上同椒木名爾雅云檓大椒又椒榝醜莍莍實也應劭漢官儀曰皇后稱椒房以椒塗壁取其溫也又山巔亦姓楚有大夫椒舉茮上同噍啁噍聲鐎刀斗也溫器三足而有柄蟭􅡯蟭螳蜋卵也䩌面䩌枯也灼龜不兆也亦作龜僬義見僥字燋傷火説文曰所以然持火也𦅃生枲也饒益也飽也餘也又姓風俗通云漢有饒斌為漁陽太守如招切六橈楫也又女教也襓劒衣牛馴伏又而紹切蟯人腹中蟲蕘芻蕘燒火也然也式招切又式照切二瓜名遙逺也行也餘昭切三十六媱美好徭使也役也又喜也或作繇於也由也喜也詩云我歌且繇颻飄颻氣出貌窯燒瓦窯也窰上同䔄蒲葉也又草也芅萇楚今羊桃也爾雅作銚珧玉珧蜃甲鰩文鰩魚鳥翼能飛白首赤喙常遊西海夜飛向北海銚燒器亦古田器又姓後漢衛尉潁川銚期又徒弔切姚姚恱美好貌又舜姓今出吳興南安二望左傳有鄭大夫姚句耳搖動也作也又姓東越王搖句踐之後謡謡歌也爾雅云徒歌謂之謡軺説文曰小車也又音韶愮憂也悸也邪也惑也恌上同疾行又音由或作繇陶臯陶舜臣又徒刀切蘨草茂也又音由瓜也鷂大雉名爾雅云青質五彩皆備成章曰鷂又音曜洮五湖名風土記云陽羡縣西有洮湖别名長塘湖義興記曰太湖射湖貴湖陽湖洮湖是為五湖烑光也座也弓利㫍旗旒榣木名嗂樂也説又喜也䠛跳䠛行步貌瑶美玉猺獸名又獏猺狗種也餆餆餌食褕褕狄后衣亦作榆韶舜樂也紹也市昭切十㲈上同紹廟紹穆也或作昭父昭子穆孝經疏云昭明也穆敬也故昭南向穆北向孫從父坐又市沼切草名卜問玿美玉擊也軺使車又音遙柖説文曰樹貌又射的也㸛㸛牀别名昭明也光也著也覿也又姓楚詞昭屈景三族戰國䇿楚有昭奚恤止遙切七鵃鶻鵃鳥也又竹交切鉊淮南呼鎌招招呼也來也又姓漢有大鴻臚招猛釗逺也見也勉也亦弩牙又周康王名盄玉篇器也皽皮上膜飊風也俗作飈甫遙切十五標舉也又木杪也又必小切猋群犬走貌杓北斗柄星天文志云一至四為魁五志七為杓又音漂瘭瘭疸病名幖頭上幟也熛飛火㟽山峯輕行蔈爾雅曰黃華蔈郭璞云苕華色異名也驫衆馬走貌腫欲潰也旌飛揚貌贆貝居陸也髟髮長貌又所銜切鑣馬銜甫嬌切七上同臕脂臕肥貌儦行貌詩云行人儦儦瀌雪貌詩云雨雪瀌瀌􅵲除田薉也亦作穮藨萑葦秀爾雅云猋蔍芀瓢瓠也方言云蠡或謂之瓢論語曰一瓢飲符霄切六飄老子曰飄風不終朝注云疾風也剽爾雅云中鏞謂之剽又小輕也或作薸方言云江東謂浮萍為薸槖也又公浪切螵螵蛸蟲名又撫招切蜱蟲名彌遙切五䖢𧖟初生也篻竹名紗玉篇云細網也工雀苗田苗亦夏獵曰苗又求也衆也未秀也亦姓風俗通云楚大夫伯棼之後賁皇奔晉食采於苗因而氏焉武儦切五描描畫也又音茅緢説文曰旄絲也貓獸捕鼠又爾雅曰虎竊毛謂之虦貓又武交切貓俗要俗言要勒説文曰身中也象人要貌由之形今作腰又姓吳人要離之後漢有河南令要兢於霄切又一笑切九腰見上注亦作腰葽秀葽草也喓蟲聲蛇名䙅䙅襻邀邀遮又音梟䳩鳥名似山雞而長尾蟯腹中蟲又如消切梟鴟梟于嬌切二鄉名在淯陽喬髙也説文曰髙而曲也又虜姓前代録云胸奴貴姓喬氏代為輔相巨嬌切十六橋水梁也又姓出梁國後漢有太尉橋玄趫善走又去遙切僑寄也客也僑上同鐈似鼎長足鷮雉名又音驕嶠亦作嶠山鋭而髙又其廟切毊大磬又虛驕切轎小車嬌廣雅云禹妃之名又音驕蕎蕎麥又音驕蟜蠪蟜蟻也蠪音龍蹻驕也慢也又巨虐切飛貌䀉盂也鍬臿也亦作􅯘七遙切七鐰上同篍吹竹䇶又音秋幧斂髮謂之幧頭亦作幓幧上同生麻抄飯匙妖妖豔也説文作􅯾巧也今從夭餘同於喬切五祅祅災枖説文云木盛貌詩云桃之枖枖本亦作夭訞巧言貌夭和舒之貌又乙矯切蹻舉足髙去遙切又其略切六繑説文云褲紐也趬行輕貌蹺揭足頒額大貌又火么切㚠長大貌又火條切怊奢也尺招切又敕朝切二弨弓弛貌詩云彤弓弨兮説文曰火飛也周禮注云輕土地之輕脆也今作票同撫招切二十一漂浮也亦作杓北斗柄星􅥝風吹貌嫖身輕便貌旚旌旗動貌犥牛黃白色也又敷沼切鏢刀劒鞘下飾也僄輕也又匹妙切􅝎鳥飛飄飄颻慓急也彯彯彯長組之貌摽字統云擊也説文曰輕行也上同翲鳥飛瞟瞟睽明視螵螵蛸嘌疾吹之貌腫欲潰也翹舉也懸也危也又鳥尾也渠遙切六荍草名今荆葵也蓮草也嘺不知䎗側飛凡也燎庭火也力昭切又力照切二髎髖骨也又音聊趫善走又緣木也起嚻切又巨憍切四憍紆也橇踏樀行又禹所乘也橇上同五肴骨醴也又葅也凡非榖而食曰肴亦啖也胡茅切十九肴上同崤崤函山名在弘農茅根殽溷殽雜也和也亂也洨水名出常山又縣名在沛郡筊竹索姣姣媱猇虎聲又縣名在濟南又直支切㮁㮁桃梔子爻易卦六爻淆混淆濁水笅小簫一十六管膠字書云膠聲也􅾖沽也絞黃色倄痛聲恔快也䂚石名交戾也共也合也領也古肴切二十二蛟龍屬漢書曰武帝元封五年自於尋陽浮江親射蛟江中獲之茭説文曰乾芻也又爾雅曰茭牛蘄郭璞云今馬蘄葉細鋭似芹亦可食鵁鵁鶄鳥膠膠漆亦大學也又姓史記紂臣膠鬲鮫魚名皮有文可飾刀咬鳥聲郊邑外曰郊䍊樂器以土為之雙相黏為䍊也轇轇轕戟形漻㶀㵧水貌䢒説文會也教效也又古孝切䉰竹圍索名米餅摎束也撓也又音留鉸鉸刀又古卯切佼交也又古卯切芁秦芁藥名詨誇語也又音哮嘐詩云雞鳴嘐嘐囊也巢説文曰鳥在木上曰巢在穴曰窠爾雅曰大笙謂之巢又縣名在廬江亦姓有巢氏之後左傳楚有巢牛臣鉏交切八轈兵車若巢以望敵也勦輕捷也又子小切􅥲山髙貌蒜束樔説文曰澤中守草樓􅳖地名在聊城鄛鄉名在南郡鐃鐃似鈴無舌女交切九呶喧呶譊爭也又恚呼也怓心亂䴃鳭䴃鳥名也鳭音嘲沙藥名上同􅼌􅼌捽也㺜犬多毛又奴刀切梢船舵尾也又枝梢也所交切十七捎蒲捎良馬名也亦芟也又音霄髾髮尾輎兵車旓旌旗旒也弰弓弰筲飯帚筲斗筲竹器鞘鞭鞘蛸蠨蛸喜子鮹海魚形如鞭鞘䘯衣袵綃帆維又音宵颵風聲莦説文惡草貌又音消娋小娋偷也􅸧齊人呼姊茅草名左氏傳曰前茅慮無明又姓史記秦有茅焦莫交切八蝥螌蝥蟲名貓又武瀌切犛牛名又力之切罞麋罟也鶜鶜鴟鳥也描打也出玉篇媌美好貌虓虎聲許交切十六猇上同髇髇箭藃禾傷肥又音嚻穘上同窙髙氣嗃嗃謈恚也䬘風䬘䬘也哮哮闞庨庨豁宫殿形狀灱乾也又熱也涍水名在南嘐誇語也顤䫜顤胡人面也鴟似鳧腳近後不能行哮豕驚包包裹亦姓楚大夫申包胥之後後漢有大鴻臚包咸布交切五胞胞胎又匹交切枹爾雅注曰樹木叢生枝節盤結詩云枹有三枿又楊枹菜苞叢生也豐也茂也又苞筍又姓包包也象曲身貌胞胞胎匹交切九邑名説文布交切地名罦覆車網也又縛謀切脬腹中水府拋拋擲泡水上浮漚説文曰水出山陽平樂東北入泗又音庖􅫋盛也擊也藥名𫾣擊頭也口交切十一跤脛骨近足細處骹上同膠面不平也巧巧㤉伏態貌磽石地䂭䂭礉戍名今濟州是也出音譜礉上同鄗邑名又杜預云山名在滎陽縣西北又音郝墝墝埆塉土頝頝䫜頭不媚也聱不聽也五交切又五勞切語彪切四謷不肖也又五勞切磝䂭磝蒼頡篇云擊也􅸞耳中聲側交切五罺抄網􅎲􅎲掐小兒聲摷擊也嘲言相調也陟交切五䞴䞴趟跳躍趟竹窅切啁説文曰啁嘐也鳭鳭䴃黃鳥鵃鶻鵃似山鵲而小短尾至春多聲䜈代人説也楚交切六抄略也又初教切鈔上同􅬿􅬿取訬健也䰫疾貌庖食厨也薄交切十七咆咆虓熊虎聲匏瓠也可為笙竽炮合毛炙物也一曰裹物燒炮上同刨刨刷匏似瓠可為飲器麃獸名似鹿掊手掊猋風聲鞄鞄皮説文云柔革工也狍獸名羊身人面目在腋下跑足跑地也捊引取亦作抱尥牛脛相交也又力釣切泡水名又匹交切㯡赤黑之漆䫜頭凹也於交切九㕭㕭咋多聲坳地不平也窅深目貌又烏了切軪軪軋竒貌文車聲也眑靣目不平又於糾切咬淫聲梎梎柌鐮柄目深䫸熱風敕交切二嘮嘮呶歡也顟顤顟胡人面狀力嘲切四􅫋盛也窖深空之貌賿謎語云錢又力絞切䄻禾穭生直交切穭音吕一六豪豪俠説文曰豕鬣如筆管者亦州名屬九江郡古鍾離國與吳爭桑而滅隋改為州山海經云渠豬之山多豪魚赤尾赤喙有羽胡刀切十三號大呼也又哭也詩云或號或呼易云先號咷而後笑又乎到切毫長毛嘷熊虎聲嗥上同濠城濠又水名壕上同大面貌音刀木名崤山名在弘農又胡交切鄉名在南陽􅭍俊健壑髙上也崇也逺也敬也又姓齊太公之後食采於髙因氏焉出渤海漁陽遼東廣陵河南五望又漢復姓髙堂氏出泰山古勞切二十一膏脂也元命包曰膏者神之液也又澤也肥也皋髙也局也澤也詩云鶴鳴九臯言九折澤也又姓皋陶之後左傳有越大夫臯如皋上同羔羊子糕糕糜􅟬㟉古亭櫜韜也一曰車上囊咎臯陶舜臣古作咎繇鼛役事車鼓長丈二尺詩曰鼓鐘伐鼛傳云鼛大鼓也鷱􅟇鷱鳥名篙進船竿橰桔橰見也葛之白花笨知也局也䆁今之糖䬾曰䆁格木名咱毀也䓘白䓘草食之不飢鄉名在范陽勞羌又清汰也韜藏也寬也説文曰劒衣也縚上同諂疑也滔漫也又水流貌叨叨濫韜弓衣馬行貌㹗牛羊無子又昌來切牛行遲貌慆恱樂絛編絲繩也幍上同䀺目通白也槄木名爾雅云槄山耰今山楸也蜪爾雅曰蝝蝮蜪郭璞曰蝗子未有翅者又音陶夲説文曰進趣也從大十大十者猶兼十人也上同綢爾雅曰素錦綢杠郭璞曰以白地錦韜旗之竿又音紬搯搯捾周書云師乃搯捾捾烏活切翢羽葆幢又徒刀切瑫玉名􅠭􅠭滑也又腰鼓大頭名䈱牛􅞠古器詜詜䛬言不節挑挑達往來相見貌詩曰挑兮達兮又條了切刀釋名曰刀到也以斬伐到其所也説文云兵也都牢切七魛魚名忉憂心貌裯説文曰袛裯短衣又直流切襌被也舠小船大面貌朷木心騷愁也蘇遭切十三搔爮刮繅繹繭為絲繅上同俗又作縿縿本音杉臊腥臊鰠魚名溞淅米颾風聲鱢鯹臭説文曰船總名也亦作搜艘上同亦作艘驕也慅恐懼袍長襦也薄褒切三袌上同軳戾也又車軫也褒進揚美也説文作衣博裾也又姓禹後因國為氏博毛切四褒俗吳主四子字名盟也地名陶陶甄尸子曰夏桀臣昆吾作陶周書神農作瓦器又陶正官名齊職儀曰左右甄官署掌磚瓦之任也又喜也正也化也亦姓陶唐之後今出丹陽徒刀切二十五䛬詜䛬言不節説文曰往來言也一曰小兒未能正言也一曰祝也䛬上同咷號咷桃果木名鄴中記石虎苑中有句鼻桃重二斤又姓何氏姓苑云今西陽人後趙石勒將有桃豹綯爾雅曰綯絞也謂糾絞繩索也燾覆燾也又徒到切逃去也避也亡也鼗大者謂之麻小者謂之料又小鼓著柄者鞀鞉並上同濤波濤掏掏擇檮春秋傳云檮杌杜預曰凶頑無儔匹之貌騊説文曰騊駼北野之良馬又山海經曰北海有獸狀如馬名騊駼萄蒲萄翿纛也亦作翢舞者所執也又音導䬞大風陶養也啕多言翢羽葆幢又音􅠭錭錭鈍也駣馬四歲也蜪蝗子裪橘裪衣袖糟粕也作曹切九􅙤上同糟俗遭遭逢㷮火餘木也槽果華實相半也又才刀切傮終也上同褿藉也敖遊也説文作􅨝亦姓顓頊大敖之後或作遨五勞切二十五遨上同翶翶翔聱不聽又五交切驁駿馬熬煎也嶅山多小石獒犬髙匹尺滶水名出南陽魯陽縣蔜繁縷蔓生或曰雞腸草也鷔不祥鳥白身赤口也鼇海中大鼇螯蟹屬謷不省語也又哭不止悲嗸衆口愁也嗷上同䫨髙頭也􅷈戟鋒摮擊貌嫯慢也䦋長大貌船接頭木上同􅚺蟹大腳也鰲魚名曹曹局也又輩也衆也群也亦州名蓋取古國以名之又姓本自顓頊玄孫陸終之子六安是為曹姓周武王封曹挾於邾故邾曹姓也魏武作家傳自云曹叔振鐸之後周武王封母弟振鐸於曹後以國為氏出譙國彭城髙平巨鹿四望昨勞切十四􅔟古文槽馬槽螬蠐螬蟲嘈喧嘈鐰鐡剛折也䄚祭也先也艚船艚䏆耳鳴髙也䐬䐬脆蓸草名漕衛邑名又水運曰漕又昨到切褿裙也􅠉埋物灰中令熟於刀切三鐭銅瓫説文云溫器也鏖上同猱猴也奴刀切八㺜長毛大又音鐃上同巎山名嶩平嶩山名在齊出地理志峱上同玉名獿獸名尻説文脽也苦刀切二訄戲言操操持七刀切又七到切四幧所以裹髻又七搖切􅛴平持褿藉也㯱囊張大貌普枹切四藨醋莓可食䫽輕貌毛起貌出聲譜七歌禮記曰舜作五弦之琴以歌南風釋名曰人聲曰歌歌者柯也以聲吟詠上下如草木之有柯葉兖冀言歌聲如柯古俄切十一歌上同柯枝柯又斧柯又姓吳公子柯盧之後何氏姓苑云吳人也又虜姓後魏書柯拔氏後改為柯氏望在河南妿女師以教女子㤎法也棤也菏澤水在山陽湖陵縣牁所以繫舟又牂牁郡名戕陸云上同滒多汁哥古作歌字今呼為兄也鴚鴚鵝蹉蹉跌也七何切七瑳玉色鮮白也又七可切搓手搓碎也磋治象牙曰磋溠水名在義陽傞舞不止貌又素何切齒跌出字統多衆也重也又貝多樹名葉如枇杷葉得何切三姓也漢有宗上同娑婆娑舞者之容素何切十一挲摩挲挲上同傞舞不止貌又千何切􅶶􅶶鞄樂器亦謂馬尾獻獻鐏見禮記亦作犧䓾䓾蔢草木盛貌行也又舞不正桫桫㦬木名出昆崘山䤬䤬鑼銅器渻偷視也駝駱駝外國圖云大秦國人長一丈五尺好騎駱駝俗從色餘同徒河切三十三駝俗鼉説文曰水蟲也似蜥蜴而長大􆂈􆂈貟紽絲數詩云素絲五紽鮀魚名陀陂陀不平之貌陂普何切驒連錢驄説文曰驒騱野馬也又丁年切䍫似羊四耳九尾沱滂沱大雨也詩云月離于畢俾滂沱矣又爾雅云江為沱謂江水出别為沱也跎蹉跎詑欺也池呼池水名在并州界出周禮又音馳酡飲酒朱顔貌瓵瓦碗馱馱騎也迱逶迱行貌鼧鼠名又託何切袉裾也又達可切緧䡐疾馳􅥰如人羊角虎瓜他委委他他美也又託何切醝白酒也昨何切十九㽨殘薉田也瘥病也又初介切䣜䣜縣名在譙郡或作鄼鄼本音贊􅦹小疫病也鹺禮云鹽曰鹹鹺嵳嵳峩蒫薺實又子邪切􅓕籠屬艖小舸蔖爾雅曰蓾蔖郭璞曰作履苴草又采古切蓾音魯䴾榖麥淨也暛搗也䠡踏也躦上同虘虎不柔也又才都切齒跌齹齒本䰈髮多貌莪草名似斜蒿詩云蓼蓼者莪五何切十三哦吟哦娥美好也又姓後魏將軍娥清娥上同峩嵳峩鵝説文曰鴚鵝也俄俄頃速也齊也蛾𧖟蛾又姓左傳晉大夫蛾析禮記又音蟻睋視也涐水名在汶江誐嘉善也詩云誐以謐我硪説文曰石巖也他非我也亦虜三字姓後魏書他駱技氏後改為駱氏託何切七他俗今通用拖曵也俗作拖它説文曰蟲也從蟲而長象冕曲垂尾形上古草居患它故相問無它乎蛇説文同上今市遮切痑馬病又力極也文叨丹切鼧鼠名羅羅綺也古者芒氏初作羅爾雅鳥罟謂之羅又姓出長沙夲自顓頊未胤受封於羅國今房州也為楚所滅子孫以為氏魯何切十蘿女蘿籮篩籮儸儸出玉篇饠饆饠泳永羅汨泳永羅水名屈原沈處欏桫欏木名出昆崘山囉羅歌詞又嘍囉也亦小兒語也鑼䤬鑼器也剆擊也那何也都也於也盡也詩云受福不那那多也亦朝那縣名在安定又姓西魏揚州刺史那椿諾何切九㔮獸名似鼠班題食之明目似牛白尾挪搓挪儺驅疫上同多也纂文云人值鬼驚聲臡麋鹿骨醬何辝也説文儋也又姓出自周成王母弟唐叔虞後封於韓韓滅子孫分散江淮間音以韓為何字隨音變遂為何氏出廬江東海陳郡三望胡歌切七河水名出積石山海經云河出昆崘西北隅發源注海亦州取水以名之爾雅有九河徒駭太史馬頰覆釡胡蘇澗潔鉤盤鬲津荷爾雅曰荷芙蕖又胡哿切菏菏蔔草也苛政煩也怒也説文曰小草也蚵蜉蠪魺魚名訶責也怒也虎何切五呵上同傾頭訶止也抲擔抲俗珂馬腦苦何切四問口聲髂膝骨軻又苦賀切阿曲也近也倚也爾雅云大陵曰阿亦姓風俗通云阿衡伊尹號其後氏焉又虜三字姓匹氏後魏書云阿伏于氏後改為阿氏阿鹿桓氏後改為鹿氏又有阿史那氏阿史德氏烏何切七婀媕婀不決媕音痾痾亦作疴病也妸女字妿女師又音哥䋪繒之細者鈳鈳䥈小釡八戈干戈説文云平頭戟也天授年置司戈八品武職古禾切十五過經也又過所也釋名曰過所至關津以示之也或曰傳過也移所在識以為信也亦姓風俗通云過國夏諸侯後因為氏漢有兖州刺史過栩渦亦作濄水名出淮陽扶溝浪蕩渠又姓三輔決録有扶風太守渦尚鍋溫器􅬈車盛膏器楇上同一曰紡車收絲具瘑瘡也瘑上同􅰍説文曰秦名土釡曰􅰍􅸮上同㗻小兒相應也又音禾緺綬名堝甘堝鳥名螳蜋别名遳脆也七戈切一堆丁戈切二桗木桗也莎草名亦樹似桄榔其樹出麵蘇禾切十二鯊魚名莏手挼莏也􅟗􅟗題縣名在涿郡趖趖疾蓑草名可為雨衣唆㗻唆小兒相應􅲲佞也髿鬖髿髮貌梭織具晉書陶侃少時漁於雷澤嘗網得一梭以挂於壁上須臾雷雨暴至乃化為龍而去上同㛗女字穆天子傳云盛姬喪天子三女叔㛗為王也婆老母稱也薄波切九媻説文曰奢也鄱鄱陽縣名在饒州皤老人白也勇舞貌説文同上繁姓也左傳殷人七族有繁氏漢有御史大夫繁延壽又音煩搬除也潘嶽射雉賦云搬場拄翳又披散也亦音盤蔢蔢䓾草木盛貌碆纜繳石又音盤犐牛無角也徒和切三碢碾碢堶飛磚戲也摩研摩又滅也隱也追也莫婆切十一􅪪􅪪食也出異字苑􅡸杯也又莫加切嬤嬤尼魔鬼魔髍偏病磨磨礪爾雅曰石謂之磨劘削也漏病上同䭧咂貌矬短也昨禾切五痤癤也銼銼􅟋小釡㭫爾雅云㭫椄慮李今麥李也或從木睉小目訛謬也化也動也五禾切七訛吪並上同鈋刓也去角也囮網鳥者媒魤魚名木節詑欺也説文曰兖州謂欺曰詑土禾切五俗唾水在西河䛢䛢詆䜏退言獸名魚身鳥翼落戈切十六摞理也騾騾馬也蜀志云後主乘騾車降鄧艾也騾上同盛土草器鸁桑飛鳥也木名可為箭笴螺蚌屬螺上同榖積也或作上同草名生水中􅟋銼􅟋小釡也或作鏍覼覼縷委曲腡手指文也蠡瓠瓢也又禮鹿二音捼捼莏説文曰摧也一曰兩手相切摩也俗作挼奴禾切二懦丸熟波波浪博禾切六皤老人白貌又音婆紴錦類又絛屬也嶓嶓冢山名番書曰番番良士爾雅曰番番矯矯勇也碆石可為矢鏃也頗説文曰頭偏也滂禾切又匹我切四坡坡坂陀不平玻玻璃玉西國寶和爾雅云笙之小者謂之和和順也諎也不堅不柔也亦州名在淮南漢九江都尉居之屬九江郡齊為和州又姓出汝南河南二望本自羲和之後一云卞和之後晉有和嶠又虜復姓和稽氏後改為緩氏戶戈切九和古文棺頭禾粟苗和諧也合也或曰古和字鉌鉌鑾亦作和莫草名㗻小兒相應盉調五味器科程也條也本也品也又科斷也苦禾切又苦臥切十四窠窠窟又巢薖草名又寬大貌稞青稞麥名萪萪生海邊葉韌可為篾也蝌蝌蚪蟲名爾雅曰科斗活東蝦蟆子也字林從蟲犐牛無角也犐上同課課差又苦臥切簻簻軸又陟瓜切䈖竹名瘑秃瘡又古禾切髁膝骨説文口臥切髀骨也􅧷美也倭東海中國烏禾切七濄水回渦水坳涹濁也地撾窟也踒躅也燕人云多鞾鞾鞋釋名曰鞾本胡服趙武靈王所服許戈切四靴上同撝也㗾道經疏云吐氣聲也手足曲病於靴切二癡貌出釋典手足疾貌去靴切二上同伽伽藍求迦切三茄茄子菜可食又音加枷刑具又音加佉丘伽切四呿張口貌呿欠去迦釋迦出釋典居伽切又音加一脞脆也醋伽切二㛗訬疾侳安也子切二骨出異字苑瘸腳手病巨靴切一驢腸胃也縷切一九麻麻紵亦姓風俗通云齊大夫麻嬰之後漢有麻達注論語莫霞切八犘犘牛重千斤出巴中蟆蝦蟆亦作蟇􅠦􅡷􅠦似􅔢鼊生海邊沙中肉甚美多膏䫗難語出陸善經字林淋淋風熱病􅡸杯也又莫何切𩔶𩔶愍車古史考曰黃帝作車引重致逺少昊時加牛禹時奚仲加馬周公作指南車又姓出魯國南平淮南河南四望本自舜後陳敬仲奔齊為田氏至漢丞相田千秋以年老得乘小車出入省中時人謂之車丞相子孫因以為氏漢末避地於魯又復姓二氏丗本有齊臨湽大夫車遽氏又有車成氏亦虜復姓魏獻帝命踈屬車焜氏後改為車氏尺遮切又音居二硨硨磲奢張也侈也勝也式車切三賖不交也畬燒種田又音余邪琅邪郡名俗作耶瑘亦語助以遮切又似嗟切十三耶瑘並見上注釾鏌釾鎁上同椰椰子木名出交州其葉皆面相似擨擨歈舉手相弄斜斜谷在武功西南入谷百里而至説文杆也又似嗟切䓉草名􅺡木名皮可為索䔑穗也枲屬竹名生臨海遮斷也正奢切四儸健而不德㸙吳人呼父諸姓也漢有洛陽令諸於何氏姓苑云吳人又職余切嗟咨也子邪切十二上同罝免罟也詩有免罝篇蒫薺實又昨何切謯説文詠也瘥爾雅云病也又在何切􅜚長歎袓縣名又似與切㜘憍也怛上同􅦹小疫嗟嗟丘山在海東蛇毒蟲又姓後秦録姚萇后蛇氏也南安人食遮切又音它三蛇俗荼爾雅云䔁荂荼即艻也又音徒荂音呼華草盛也色也説文作華榮也崔豹古今注曰堯設誹謗木今之華表也西京記謂交午柱戶花切又呼瓜戶化二切十驊驊騮周穆王馬鷨鳥名似雉蟲名似蛇字林云大蛇也出魏興啖小蛇及蝮但張口小蛇自入也鋘鋘鍬鏵上同釫亦同上樺木名又戶化切華西嶽名也又戶化切划划撥進船也瓜説文蓏也廣雅云龍蹄獸掌羊駮兔頭挂髓蜜䇶小青大班皆瓜名亦州名本古西戎地左傳范宣子數戎子駒支曰昔秦人迫逐乃袓吾離于瓜州又漢復姓王莽傳有盜賊臨淮瓜田儀古華切七騧黃馬黑喙緺青緺綬也婐女侍又於果切蝸蝸牛小螺媧古女后也􅎲引也擊也華爾雅云華荂也呼瓜切四花俗今通用譁喧譁􅹨上同誇大言也苦瓜切八䠸䠸體柔也爾雅作夸毗夸奢也姱姱奢貌跨吳人云坐胯兩股間也􅏠􅏠邪離絶之貌䯞額上骨也拏牽也女加切九詉詉語貌張加切拿絲絮相牽又女書切摣取也蒘蕏蒘草衣敝絲語不解也爬以收除也笯鳥籠又乃胡切嘉善也美也又姓左傳周大夫嘉父古牙切二十六家居也爾雅云扆內謂之家又姓風俗通漢有家羡為劇令加增也上也陵也葭葭蘆也説文曰葦之未秀者又音遐笳笳簫卷蘆葉吹之也麚牡鹿麚上同豭豕也子路佩豭説文曰牡豕也猳俗痂瘡痂鴐鴐鵝鳥枷枷鎖又連枷打榖具袈袈裟袈裟毛衣跏跏趺坐也􅰿不得進也玃加蟲米中黑蟲茄荷莖又漢復姓有茄羅氏迦漢復姓有迦葉氏又居伽切珈婦人首飾瘕病也犌牛絶有力幏説文曰南郡蠻夷賨布貑貑熊又貑貜也並見爾雅注蟼爾雅云蟼蟆蛙類也又音荆遐逺也胡加切十四蝦蝦蟆煆錏煆霞赤氣騰為雲又漢復姓有霞露氏瑕玉病也過也又姓左傳周大夫瑕禽又漢復姓有瑕吕氏騢馬赤白雜色蝦大鯢䠍腳下䫗䫛䫗言語無度碬礪石也春秋傳曰鄭公孫碬字子石𩏇履跟後帖上同赮日朝赤色蕸荷葉葩花也又草花白亦作皅普巴切七耙方言云江東呼鎞箭妑字林云女字也蚆貝也爾雅曰蚆博而頯郭璞云頯者中央廣兩頭鋭吧吧呀大口貌舥舥腳船也牛角闊也鴉烏别名於加切八鴉上同錏錏煆㝞㝞作姿態貌音宅加切丫方言云江東言樹枝為丫扠也丫象物開之形䃁碨䃁地形不平􅤏自刎巴巴蜀又州取國以名焉三巴記云閬白水東南流曲折三回如巴字亦蟲名又姓後漢有楊州刺史巴祗伯加切八耙兵車又音葩笆有刺竹籬豝豕也芭芭蕉疤疤皻鼻病蚆又匹加切義見上文吧吧呀小兒忿爭叉交手初牙切九杈杈杷田器説文曰杈枝也差擇也又差舛也靫靫鞴弓箭室也鎈錢異名出字諟䐤腵䐤脯也㔆物艖小船名艖上同鯊魚名今之吹鯊小魚是也所加切十一鯊上同沙沙汰説文曰水散石也爾雅曰潁為沙謂大水溢出别為小水之名亦州取沙角山為名即三秦記鳴沙山也又姓何氏姓苑云東莞人又漢復姓二氏左傳齊有夙沙衛神農時夙沙氏之後漢書功臣表有昭沙掉尾又百濟有沙吒氏砂俗裟袈裟㲚㲚毛衣桬桬棠木名出昆崘山紗絹屬一曰紡纑也髿髮髿垂貌􅶶􅴿􅶶素􅝿履也硰硰石地名見漢書牙牙齒又牙旗吳志曰孫權因瑞作黃龍大牙常在軍中諸軍進退視其所向又姓風俗通云周大司徒君牙之後五加切七衙縣名在馮翊亦衙府又姓秦穆公子食采於衙因氏焉蜀志有晉督護衙傳又音語音魚芽萌芽齖䶥齖齒不平正呀吧呀丫杈丫吾漢書金城郡有允吾縣允音船樝似梨而酸或作柤側加切十二柤上同又煎藥滓芹楚葵生水中以指按也䶥䶥齖皻皰鼻抯説文挹也溠水名出義陽又側稼切渣上同瘡痂甲也􅺥赤􅺥稻名浾棠汁㝞宅加切十五躇躇跱行難貌荼苦菜又音徒䣝亭名在郃陽􅟒春藏葉可以為飲巴南人曰葭􅟒茶俗秅説文曰秭也周禮云聘禮曰十斗曰斛十六斗曰籔十籔曰秉四秉曰筥十筥曰稯十稯曰秅美也􅵅瘢􅵅瘡痕含舌貌窊深貌塗塗飾又音徒丘名梌吳人云刺木曰梌也䅊開張屋也又縣名説文作㢉邪不正也似嗟切四斜上同邪鬼病亦不正也論語曰思無邪䔑䔑蒿闍闉闍城上重門也視遮切又德胡切五余姓也見姓苑出南昌郡匜短豫又音夷鍦並上同窊凹也説文曰汚下也烏瓜切六窪深也亦渥窪水名又於佳切畖畖留地名在絳州蛙蝦蟆屬也窪深也説文曰淸水也一曰窊也又水名哇淫聲髽婦人喪髻莊華切一檛捶也左氏傳曰繞朝贈之以䇿杜預云馬檛也或作簻陟瓜切四簻上同􅥺亦同膼膇也爬搔也或作把又姓本杷東樓公之後避難改焉西魏襄州刺史把秀蒲巴切三杷枇杷木名説文曰收麥器也琶琵琶樂器楂水中浮木又姓出何氏姓苑鉏加切六查槎二同䶥䶥齖又音樝㢒壞也淮南子云虘屋之下不可坐也苴詩傳云水中浮草也侘侘傺失意敕加切傺丑例切四哆張口也癡貌也㗬緩口又厚脣也奓張也陟加切八詉語不正也觰角上廣也䅊開張屋也又縣名􅵅瘡痕吒達利吒出釋典本音去聲噍聲䐒不密又黏也煆火氣猛也許加切又呼嫁切六呀唅呀張口貌又呀呷也谺字統云谽谺谷中大空貌疨疨病岈㟏岈山深之狀颬吐氣又風貌䶗大齧也苦加切三㤉巧㤉伏態之貌巧苦交切􅯼㝞􅯼女作姿態查大口貌才邪切一若蜀地名出巴中記人賖切又惹弱二音二婼婼羌西域國名些少也寫邪切一爹羌人呼父也陟邪切一歄猶歄姽也五瓜切二䯞髂骨乞加切一十陽隂陽説文曰髙明也爾雅云山東曰朝陽山西曰夕陽又姓出右北平本自周景王封少子於陽樊後裔避周之亂適燕家於無終因邑命氏秦置右北平子孫仍屬焉又漢復姓二十二氏歐陽氏越王句踐之後封于烏程歐陽亭後因為氏望出長沙吕氏香秋有辨士髙陽魋帝顓頊髙陽氏之後漢有東海王中尉靑陽精少昊靑陽氏之後又有御史孫陽放秦穆公時孫陽伯樂之後魯之公族有名子陽者及衛公于趙陽之後並以名為氏漢有周陽由淮南王舅周陽侯趙兼之後又駙馬都尉涇陽準秦涇陽君之後丗本云逼陽妘姓國為晉所滅子孫因氏焉左傳晉有梗陽巫皋衛有戲陽速漢有博士中山鮭陽鴻又有葉陽氏秦葉陽君之後列仙傳有沛國陵陽子明止陵陽山得仙其後因山為氏漢有楊州刺史鮮陽戩後漢有櫟陽侯景丹曽孫汾避亂隴西封為氏又長沙太守濮陽逸陳留人也神仙傳有太陽子白日升天春秋釋例周有老陽子修黃老術漢有安陽護軍河東成陽恢何氏姓苑有朱陽氏索陽氏與章切三十一眻日出眻谷楊赤莖柳爾雅曰楊蒲柳又姓出弘農天水二望本自周宣王子尚父幽王邑諸楊號曰楊侯後并於晉因為氏也揚舉也説也導也明也又州名禹貢曰淮海惟揚州李巡曰江南之氣躁徑厥性輕揚故曰揚州揚風所飛揚昜飛也又曲昜縣在交址羊牛羊禮記凡祭羊曰柔毛崔豹古今注云羊一名髯須主簿又姓出泰山本自羊舌大夫之後戰國䇿有羊千者著書顯名又漢復姓二氏列士傳有羊角哀左傳晉大夫有羊舌職樣廣雅云樣槌也方言曰懸𧖟柱齊謂之樣眻美目又餘亮切佯詐也或作詳詳上同本音祥徉忀徉徙倚洋水流貌又海名又音祥煬焇煬出陸善經字林煬釋金又音恙鍚兵名又馬額飾馬額上靻輰輰䡵車也揚明揚瘍瘍傷也説文云瘍頭瘡也周禮療瘍以五毒攻之鴹􅫫鴹一足鳥舞則天下雨出字統鰑赤鱺鸉白鷢蛘蟲名禓道上祭一曰道神又舒羊切崵説文曰崵山在遼西諹歡也又音恙瑒玉名􅦝杯也􅰠􅰠葲藥名多也詳審也論也諟也似羊切八洋水名出齊郡臨朐縣北亦州名本漢成固縣秦為漢中郡魏置洋州翔翶翔庠説文曰禮官養老夏曰校商曰庠周曰序祥吉也善也􅟸趨行􅷕女鬼古作祥禫字癢病也良賢也善也首也長也又姓左傳鄭大夫良霄鄭穆公之子子良之後吕張切十八梁梁棟又州名書曰華陽黑水惟梁州晉太康記云梁者言西方金剛之氣強梁故因名之舜置也秦為漢中郡後其入蜀魏末克蜀分廣漢三巴涪陵以北七郡為梁州梁大同年復移在南鄭亦姓出安定天水河南三望本自秦仲周平王封其少子康於夏陽梁山是為梁伯後為秦并子孫奔晉以國為氏又漢復姓十二氏左傳有梁其脛魯伯禽庶子梁其之後又魯有仲梁懷晉有梁餘子養梁由靡秦有強梁皋莊子有十梁倚楚文王庶子有食邑諸梁者其後為氏魯有榖梁赤治春秋史記有將梁氏漢光武時有侍御史梁垣烈新垣衍之後漢明帝時有梁成恢善歷數粱稻粱廣志曰遼東有赤粱魏武以為粥也俗作粱糧糧食糧上同涼薄也亦寒涼也又州名禹貢雍州之域古西戎地也六國時至秦屬戎狄月氏居焉秦置三十六郡西北唯有隴西北地二郡於漢屬涼州部至武帝改雍州為涼州後獻帝分渭川河西四郡為雍州建安十八年復改為涼州又姓魏志有太子太傅山陽涼茂涼俗北風也又力向切量量度又力向切蜋蜣蜋蟲一名蛣蜣又音郎踉跳踉也又音郎椋木名䀶賦也綡冠纚􅮓薄也又力尚切㹁牻牛駁色䣼漿水輬輼輬車名香説文作芳也漢書云尚書郎懷香握蘭許良切五皀稻香薌榖氣鄉鄉黨釋名曰萬二千五百家為鄉鄉向也衆所向也又姓出姓苑膷牛羹商金音度也張也降也常也亦州名即古商國後魏置洛州周為商州取商於地為名又姓家語有商瞿式羊切十八説文曰行賈也典籍通用商漢書曰通財鬻貨曰商白虎通云居賣曰賈通物曰商俗作傷傷損傷也又且羊切殤殤夭慯憂貌觴酒器俗作􅜠湯湯湯流貌本他郎切蔏蔏陸草也􅫫􅫫鶊又􅫫鴹也螪螪蛘蟲涊水名䵮説文云赤黑色又餘諒切禓道上祭也又以章切餉饋也又式尚切鬺煮也亦作場耕場􅡡上同房房室亦州名即春秋時防渚也秦為房陵郡唐武德為房州又姓出淸河濟南河南三望本自堯子丹朱舜封為房邑侯子陵以父封為氏陵四十八代孫雅王莽未為淸河太守始居淸河雅十九代孫諶隨慕容德南遷因居濟南郡生四子豫坦邃煕號四龍今稱四祖房氏符方切七防防禦也隄防也坊上同見禮又音方魴魚名方方與縣名又府良切肪䐗肪又音方鴋澤鸆也又音方章篇章又章甫殷冠名禮記曰孔子長居宋冠章甫之冠又明也采也程也又姓秦將有章邯諸良切十五漳水名山海經曰漳水出荆山南注于沮水樟豫樟木名慞懼也璋半圭曰璋詩云乃生男子載弄之璋彰明也墇壅也又之尚切障隔也又丘山頂上平又音去聲麞鹿屬獐上同彰邑名在紀蔁蔁柳當陸别名􅝄吳人呼水雞為􅝄渠泥鞍飾暲日明昌盛也説文曰美言也一曰日光也又姓後漢有東海相昌狶尺良切八裮衣披不帶倡樂也優也又音唱猖猖狂閶閶闔琩耳璫鯧鯧鯸魚名菖菖蒲藥也羌章也強也發語端也説文云西戎牧羊人字從人羊又姓晉有石冰將羌迪去羊切四猐上同或從犬古文蜣蜣蜋薑菜名説文云御濕之菜史記云千畦薑韭與千戶侯等居良切十五薑上同疆説文界也疆上同壃俗畕説文曰比田也㹔牛長脊一曰白脊牛韁馬組韁上同殭死不朽也礓礓石橿一名檍萬年木又云鋤橿鋤柄也薑姓也出天水齊姓本自炎帝居於薑水因為氏漢初以豪族徙關中遂居天水也䗵𧖟白僵仆也長久也逺也常也永也直良切又直向丁丈二切八萇萇楚蔓生如桃又姓左傳周有大夫萇弘腸腸胃釋名曰腸暢也通暢胃氣也場祭神道處又治榖地也䠆䠆跪方言曰東齊北燕之間謂跪曰䠆㙊道也䗅蚰蜒别名瓺缶也又除向切張張施也又姓出清河南陽吳郡安定燉煌武滅范陽犍為沛國梁國中山汲郡河內髙平十四望本自軒轅第五子揮始造弦實張網羅丗掌官職後因氏焉風俗傳云張王李趙黃帝賜姓也陟良切四餦餦餭餳也粻食米漲水大貌又音帳穰禾莖也又姓齊將穰苴之後何氏姓苑云今髙平人汝陽切十七禳除殃祭也攘以手禦又竊也除也遂也止也揎袂出臂曰攘又音讓􅜙盜也鑲鉤鑲兵器又息羊切縣名在南陽躟疾行瀼露濃貌上同獽戎屬儴爾雅曰因也蘘蘘荷䉴䉴䉛􅜷米竹器鬤鬤亂也勷劻勷迫貌瓤瓜實也又女良切娘亂也又女良切方四方也正也道也比也類也法術也亦官名續漢書曰尚方令掌上手工巧作御刀劒諸好器物也又姓史記周大夫方叔之後府良切十三汸併船也説文本作方或從水坊坊巷亦州名本上郡地周於今州界置馬坊武德初置坊州因馬坊為名漢宫有太子坊坊亦省名又音房蚄虸蚄蟲名肪脂肪邡什邡縣在漢州鴋鷝鴋鳥名人面鳥身枋木名可以作車又蜀以木偃魚為枋鈁鑊屬牥牛名趽趼也説文曰曲脛馬也䄱禾名匚受物之器又一斗曰匚也襄除也上也駕也返也亦州名本楚之西津魏武置襄陽郡西魏改為襄州因水立名又姓魯莊公子襄仲之後子孫以諡為氏後漢有襄楷息良切十三廂廊也亦曰東西室湘水名在零陵相共供也瞻視也崔豹古今注云相風烏夏禹作亦相思木名又姓出姓苑又息亮切緗淺黃纕馬腹帶國語云忀挾纓纕忀忀徉驤馬騰躍又速也低昂也馳駕也鑲兵器又女羊切瓖馬帶飾東京賦曰鉤膺玉瓖欀欀木皮中有如白米屑搗之可為麵箱箱籠葙青葙子也將送也行也大也助也辝也又姓後趙録有常山太守將容即良切又子諒切六漿漿水鱂鰪鱂魚名鰪烏盍切蔣菰蔣草又音奬螿寒螿蟬屬説文云扶也字林又作摪創説文曰傷也禮曰頭有創則沐今作瘡初良切又初亮切三瘡上同俗亡無也滅也逃也説文正作亡武方切十一芒草端也莣爾雅曰莣桂榮郭璞云今莣草似茅可以為繩索履屩鋩刃端硭硭硝杗屋梁又莫郎切朚忘也又莫郎切邙縣名在沛郡又洛北山名又音忙郡名也又鄉名望看望又音妄望弦望又音妄娘母稱女良切四娘少女之號瓤瓜實也又音穰鑲兵器牀簀也易曰遜于牀下士莊切三床俗疒病也又女厄切莊嚴也又莊田爾雅曰六達謂之莊亦姓莊周著書也側羊切五莊俗妝女字又飾也裝裝束又側亮切妝粉飾也常倍尋曰常又官名漢書曰奉常秦官掌宗廟禮儀景帝六年更名太常也釋名曰九旗之名日月為常謂畫日月於其端天子所建言常明也亦姓出河內漢有常惠市羊切十尚尚書官名又時仗切裳上曰衣下曰裳嘗試也曽也説文本作嘗口味之也又姓風俗通云齊孟嘗君之後嘗上同鋿車鋿輪鐡鱨魚名償報也還也當也復也又音尚𨿿鳥名徜徜徉猶徘徊也霜凝露也又姓色莊切七鸘鷫鸘鷞上同孀寡婦驦驌驦及馬騻上同蠰爾雅云齧桑䗅也又傷餉二音牆牆爾雅云牆謂之墉説文曰牆垣薇也在良切十牆上同墻俗佯弱也嬙嬪嬙婦人官名檣船檣薔薔薇又東薔子十月熟可食出河西子虛賦云東薔雕胡蘠上同戕殺也又他國臣來殺君也妄強犬也又徂朗切鏘鏗鏘七羊切十二瑲玉聲槍矟也通俗文云剡葦傷盜謂之槍説文曰距也蹌説文曰動也詩曰巧趨蹌兮蹡行貌上同斨斧斨説文云方銎斧也牄説文云鳥獸來食聲嶈山髙貌門聲和也傷也又式羊切搶拒也突也匡輔助也正也又姓風俗通云匡魯邑也句須為之宰其後氏焉漢有匡衡去王切十三邼邑名説文曰河東聞喜鄉也筐筐籠䖱海中大蝦框棺門恇怯也劻劻勷鬤洭水名出桂陽含洭縣軭車戾眶目眶䒰草名􅫬耳曲王大也君也字林云王者天地人一貫三為王天下所法又姓出太原琅邪周靈王太子晉之後北海陳留齊王出和之後東海出自姬姓髙平京兆魏信陵君之後天水東平新蔡新野山陽中山章武東萊河東者殷王子比干為紂所害子孫以王者之後號曰王氏金城廣漢長沙堂邑河南共二十一望又漢復姓王氏左傳晉有樂王鮒小王桃甲賈執英賢傳云東莞有五王氏史記云出齊威王至建王五王之後風俗通云漢有中郎威王弼出自楚威王後漢有新豐令王史音雨方切又雨誑切四蚟蚟孫蟲名又蜻蛚即今促織也鮹魚名彺急行央中央一曰久也於良切九鴦鴛鴦匹鳥又烏郎切殃禍也各也罰也敗也殃上同鉠鈴聲又音英秧蒔秧又於丈切霙霙霙白雲貌又音英胦脬胦泱水流貌又烏朗切強健也暴也説文曰蚚也又姓後漢有強華奉赤伏符巨良切四疆與強通用説文曰弓有力也鯨鯨魚别名又其京切勥迫也􅛅草名禇羊切三倀失道貌又狂也鼚鼓聲芳芬芳亦州地多芳草故以名之置在常芳縣又姓風俗通云漢幽州刺史芳乘敷方切三妨妨害淓水名狂病也韓子曰心不能審得失之地則謂之狂也巨王切五軖紡車也軭説文曰車戾也又去王切鵟鴟屬草木妄生狂匡往皆從此十一唐説文曰大言也又州春秋時楚地戰國時屬晉後入於韓秦屬南陽郡後魏為淮州隋為顯州貞觀改為唐州因唐城山為名即髙鳯隱所亦姓唐堯之後子孫氏焉出晉昌北海魯國三望徒郎切四十啺並古文煻煻煨火糖餄也糛上同堂堂除亦屋白虎通曰天子之堂髙九尺天子尊故極陽之數九尺也堂之為言明也所以明禮義也禮記曰天子之堂九尺諸侯七尺大夫五尺士三尺又姓風俗通云堂楚邑大夫五尚為之其後氏焉坣古文䶈鼠一月三易腸棠棠梨又桬棠木生昆崘山黃色赤實味如李食之使人不溺亦姓左傳齊大夫棠無咎又漢復姓吳王闔閭弟夫溉奔楚為棠溪氏搪搪揬蓎蓎蒙女蘿案爾雅作唐蒙不從草瑭玉名糖糖䬾黍膏䬾杜兮切篖筕篖竹笪螳蜩螳牛上同螳螳蜋禮記仲夏月螳蜋生塘陂塘碭芒碭山名又音宕鶶鶶鷵鳥名似烏蒼白色􅷼魚名踼踼跌頓伏貌又吐郎切闛説文曰闛闛盛貌又他郎切赯赯赤色磄磄石也溏池也䣘地名搪搪不遜隚殿基塘隄塘髙門也鎕鎕銻火齊䉎罩也􅸽􅸽輬軘軨橖車橖榶榶棣木名案爾雅曰唐棣栘不從木㲥㲥眊罽也瓷器郎官名又魯邑又姓出中山魏郡二望魯當切三十蓈説文曰禾粟之穗生而不成者謂之董蓈稂草名似莠説文同二桹桄桹木名廊廡也文穎曰廊殿下外屋也榔檳榔鋃鋃鐺鎖頭一曰鍾聲硠硠磕石聲􅟇􅟇鷱鳥名浪滄浪水名又盧宕切䯖䯑䯖股肉䯑苦光切蜋螳蜋魚脂琅琅玕玉名爾雅曰西北之美者有昆崘璆琳琅玕焉又琅邪郡名今沂州也又姓齊有大夫琅過琅琅邪郡名俗作琅瑘㝗㝩㝗宫室空貌狼豺狼説文曰豺似犬鋭頭而白頰髙前廣後帝王丗紀曰有神牽白狼銜鉤入殷朝又姓左傳晉有大夫狼瞫欴欴㰠貪貌􅚄􅚄毒藥名踉踉䠙行貌莨草名㟍峻㟍山名冬曰所入輬􅸽輬軘軨艆海中大船駺馬尾白躴躴躿身長貌筤車籃一名笑笑音替短矛閬當門又盧宕切喨喨吭吹貌當敵也直也主也值也亦州本羌地周置同昌郡隋改為嘉城鎮貞觀中改為當州蓋取燒當羌以名之又姓也都郎切十一鐺鋃鐺簹篔簹竹名襠兩襠衣璫耳珠車檔木名出文字音義儅止也又丁宕切耳耳下㼕㼕瓤瓜中蟷蟷蠰螳蜋别名亦作倉倉庾也亦官名齊職儀曰大倉令周司徒屬官有廪人倉人則其職也釋名曰倉藏也藏榖物也漢書曰耿壽昌奏設常平倉又姓黃帝史官倉頡之後七岡切七蒼蒼色也又姓漢江夏太守蒼英鶬鶬鶊鳥名説文同上滄滄浪亦州後魏所置蓋取滄海為名餐寒貌古器也出説文岡爾雅曰山脊岡古郎切十六岡又作堽並俗剛強也俗掆舉也笐説文曰竹列也又爾雅曰仲無笐竹類也鋼鋼鐡綱綱紀説文曰維紘繩也亢星名一曰亢父縣説文人頸也犅特牛缸甕也􅣙上同牨水牛苀爾雅釋草曰苀東蠡又音杭魧魚名爾雅云大貝本杭沆二音迒獸迹又音抗桑木名史記曰齊魯千畝桑麻其人與千戶侯等又姓秦大夫子桑之後漢有御史大夫桑弘羊息郎切六桑俗亡也死也又姓楚大夫左又息浪切喪上同淺黃馬色康和也樂也又姓衛康叔之後亦西胡姓苦岡切十四粳榖皮粳俗㱂榖不升謂之㱂㝩㝩㝗槺槺梁虛梁也見文選賦傳云雄曰鳯雌曰皇偟偟暇媓女媓堯妻獚犬名蟥蛂蟥蛢甲蟲也韹韹樂鐘聲也又音橫􅙉古縣名皇羽舞名䅣䅭䅣穄名榮也葟上同趪趪趪舞貌又張設貌光明也亦州名漢西陽縣地屬江夏郡梁置光州因浮光山為名又姓田光之後秦未子孫避地以光為氏晉有樂安光逸古黃切十四光上同洸水名又烏光切桄桄桹木名胱膀胱水府垙垙陌􅵬車下橫木輄上同橫長安門名又戶觥切􅼶決􅼶馬旋毛在脊也恍武也茪茪草名僙僙僙武貌侊盛貌湯熱水又姓宋有沙門湯休有文集吐郎切十一簜水名在鄴今簜隂縣單作鏜以鐡貫物説文曰鼓鐘聲也闛盛貌又音唐䞶䞶走貌踼踼跌又杜郎切蕩蕩突又徒郎切蝪蛈蝪蟲名鼞鼓聲薚蓫薚馬尾􅛅上同滂滂沱普郎切七鎊鎊削雱雱霈大雨雱雨雪盛貌詩曰雨雪其䨦䨦上同磅石聲量溢也汪水深廣又姓汪芒氏之胤姓苑云新安人也烏光切五兀曲脛俗作尤尪尪弱説文同上洸水名又音光雉鳴鴦鴛鴦匹鳥烏郎切又一良切七佒體不申也咉應聲􅧯貉屬𧲱上同眏眏目貌姎女人自稱又烏朗切煮肱呼郎切又苦朗切四㰠欴㰠㬻狼㬻南夷國名慷咉慷狼戻航船也胡郎切十八筕筕篖桁械也行伍也列也又戶庚戶浪戶孟三切迒獸迹又古郎切上同頏頡頏詩傳云飛而上曰頡飛而下曰頏説文音剛與亢同飛髙下也魧魚名又大貝胻脛也邟餘邟縣名在吳興又音伉杭州名古於濳餘邟皆别名今餘杭於濳縣並在杭州沆渡也又胡郎切蚢爾雅蚢蕭繭郭璞曰食蕭葉者皆𧖟類骯骯大脈也苀東蠡草名抗舉也又苦浪切吭鳥喉又下浪切滄茫莫郎切十四吂不知也䀮目不明也汒谷名在京北恾怖也忙上同朚遽也邙北邙山名又武方切芒草端亦姓史記有魏相芒卯又音亡碭山名史記本只作芒杗大梁又武方切蘉勉也寐語鄉名在藍田臧善也厚也又姓出東莞本自魯孝公子臧僖伯之後則郎切六古文牂牡羊戕戕牁亦作牂贓納賄曰贓樣槌也出廣雅囊袋也説文曰囊橐也又姓楚莊王子子囊之後以王父字為氏奴當切二蠰蟷蠰即螳蜋也傍亦作旁側也説文曰近也又羌姓步光切十三倣倣徨膀膀胱膀上同䠙踉䠙急行趽膝脛曲貌房阿房宮名旁爾雅曰二達謂之岐旁謂岐道旁出也説文曰薄也篣竹箕又薄庚切亭名在汝南螃螃蟹本只名蟹俗加螃字䅭䅭䅣穄名騯馬盛貌又甫盲薄庚二切卬髙也我也又姓漢有御史大夫卬祗五剛切又魚兩切七䭹千里駒説文又五浪切䭹䭹馬怒貌枊繫馬柱也劉備縛督卸者又五浪切昂舉也䒢昌蒲别名又魚兩切㭿飛㭿斜桷䩕履頭藏隱也匿也昨郎切又徂浪切一䯑䯑䯖苦光切一幫衣治鞋履出文字集略博旁切五縍上同㨍捍也衛也加杯上酒鞤鞋革皮用十二庚更也償也爾雅云太歲在庚曰上章又姓唐有太常博士庚季良又漢復姓莊子有庚桑楚古行切十二鶊鶬鶊更代也償也改也又古孟切迒兔徑粳粳稻粳上同粳俗賡續也經也償也羹羮􅌜爾雅曰肉謂之羮古文埂秦人謂坑也浭水名出北平坑爾雅曰虛也郭璞云坑塹也客庚切六坑上同硎亦同矒視不分明砊砊硠石聲劥劥有力盲目無童子武庚切八虻蟲也鄳縣名在江夏􅟑􅟑盯直視莔貝母草􅸁古縣名在義昌䥰䥰銷竹名橫縱橫也又姓風俗通云韓王子成號橫陽君其後為氏戶盲切十六黌學也蝗蟲又音皇鐄六鐘瑝玉聲説文音皇喤泣聲鍠和也樂也又鐘聲説文音皇䬝䬝䫻暴風㶇方舟也一曰荆州人呼渡津舫為㶇或作䄓䄘䄓祭名褡小被瓦也織也憕韹聲也彋弸彋帷帳起貌閍宫中門也一曰巷門甫盲切六祊廟門傍祭􅤶上同騯騯騯馬行又音傍音彭嗙喝聲㔙大也諻語聲虎橫切五䎕䎕然飛聲謍謍謍小聲嚝鼓鐘聲喤喤呷也又音橫觥觥角為酒器受七升罰失禮者古橫切六觥上同侊小貌春秋國語曰侊飯不及壷餐吳主孫休二子名䍔網滿上同彭行也道也盛也説文曰鼓聲也又姓大彭之後左傳楚有令尹彭仲爽漢有大司空彭宣薄庚切十七澎地名又擊水勢又撫庚切膨膨脝脹貌蟛蟛螖似蟹而小䰃䰃鬤亂髮貌鬤乃庚切棚棧也閣也榜説文曰所以輔弓弩也又甫孟切䄘䄘䄓祭名搒笞打説文又北孟切掩也蒡菜一名隱荵似蘇可為葅篣籠又音旁􆄊􆄊馞大香騯馬行盛貌憉憉悙自強量溢輣兵車又樓車也上同脝膨脝脹也許庚切三悙憉悙自強亨通也或作又匹庚許兩二切瞪直視貌丑庚切五橕撥也又橕柱也樘上同説文曰邪柱也䟓字書跉䟓行遲貌竀正視鎗鼎類楚庚切四鐺俗本音當槍欃槍祅星琤玉聲傖楚人别種也助庚切五䚘角長貌鬡亂髮貌鬇上同崢崢嶸山貌霙雨雪雜也於驚切十鉠鈴聲韺五韺髙陽氏樂亦作英渶水名出青丘山鶧繼鶧鳥名英華也榮而不實曰英也又英俊亦姓漢有英布瑛玉光㿮青貌媖女人稱美楧楧梅今之雀梅磅小石落聲撫庚切四恲滿也亨煮也俗作烹又許庚許兩二切澎澎􅗍水貌又音彭平正也和也易也亦州名古山戎孤竹白狄肥子二國之地秦為遼西郡隋為北平郡武德初為平州有盧龍塞又姓齊相晏平仲之後漢相丞相平當又漢復姓何氏姓苑云有平陵平寧二氏符兵切八評評量亦評事大理寺官唐初置十二貟又音病蘋葭一曰蒲白又曰萍别名又云藾蕭也枰枰仲木名又博局也泙水名説文谷也坪地平胓牛羊脂也蚲蚲驚懼也説文曰馬駭也舉卿切七京大也廣雅曰四起曰京風俗通曰京非人力所成天地性自然也京義亦取此公羊曰京者大也師者衆也天子之居必以衆大之辝言之又姓風俗通云鄭武公子假封於京號京城大叔其後氏焉漢有京房荆荆楚亦木名可染又州名夏及周並為州秦為南郡即郢都之渚宫又姓燕刺客荆軻麠獸名一角似麋牛尾麖上同鶁羌鶁鳥蟼蟼蛙明光也昭也通也發也又姓出平原河南山公集有平原明普武兵切五盟盟約殺牲歃血也周禮有司盟􅰀上同鵬鷦鵬似鳯南方神鳥鳴嘶鳴又姓出姓苑棖門兩旁木直庚切七盯􅟑盯視貌澄水清定又音懲掁掁觸䟫距也周禮曰唯角䟫之挰舉也憕憕失志又音懲趟䞴趟躍跳竹盲切趟陟交切二䬝狂風榮榮華又姓漢有榮啓期永兵切六禜祭名又音詠蠑蠑螈蜥蜴别名瑩王色詩云充耳秀瑩又烏定切揘拔也嶸崢嶸又戶萌切兵戎也周禮有司兵掌五兵五盾丗本曰蚩尤以金作兵器也甫明切一兄爾雅男子先生曰兄説文長也許榮切一卿説文章也公卿春秋漢含孳曰三公象五嶽九卿法河海三公法三台九卿法北斗釋名曰漢置十二卿正卿九太常光祿衛尉太僕廷尉鴻臚宗正司農少府又姓風俗通云趙相虞卿之後去京切一生生長也易曰天地之大德曰生又姓出姓苑所庚切十笙樂器也禮記女媧造笙簧釋名曰笙生也象物貫地而生也又簟也吳都賦曰桃笙象簟牲犧牲猩猩猩能言似猿聲如小兒也狌上同鉎鐡鉎甥外甥又姓風俗通云晉大夫吕甥之後䴤獸名大如兔也鼪鼪鼬鼠也珄金色擎舉也渠京切十一勍強力黥黑刑在面黥剠並上同鯨大魚雄曰鯨雌曰鯢鯨上同檠所以正弓樈鑿柄葝山薤䫆頸也迎逢也語京切一行行步也適也往也去也又姓周有大行人之官其後氏焉戶庚切又戶剛戶浪下孟三切十衡橫也平也又姓風俗通云阿衡伊尹之後又云衡魯公字後乃氏焉䯒牛脊後骨胻牛勢胻也洐溝水也筕筕篖行笪珩佩上玉桁屋桁蘅杜蘅香草大者曰杜若也爾雅注曰杜衡似葵而香字不從草熟肉鬤䰃鬤亂髮貌乃庚切六㲰犬多毛貌説文云亂也一曰窒獰惡也榖芒長也説文曰牂可以作縻綆十三耕犂也周書曰神農之時天雨粟神農耕田而種之古莖切一鏗鏗鏘金石聲也口莖切十五銵上同轂車鞕又車堅牢鳽雍渠鳥名誙莊子曰誙誙如也牼牛膝骨又人名宋有司馬牼􅠌或作硎谷名在麗山昔秦密種瓜處硻説文云餘堅也殸敵也鏗琴聲䡩車聲硜硜硜小人貌摼撞也㰢㰠㰢羥羊名甍屋棟也莫耕切十一上同䉚竹筒萌萌牙氓民也氓上同嫇嫈嫇新婦貌蕄爾雅云存存蕄蕄在也又莫登切本亦作萌又作􅽪􅟑􅟑盯苕可為帚視不分明濱布耕切安船溝又布耿切二捠冢口穴也宏大也戶萌切十六紘冠卷也又八紘紭網紭閎爾雅曰弄門謂之閎郭璞云閎弄頭門又曰所以止扉謂之閎郭璞云門辟旁長橛也又姓漢有閎孺嶸崢嶸山峻嵤上同􆁢谷中響一曰谷名也耾耳語翃蟲飛浤浤浤汩汩水波之勢竑量度周禮考工曰故竑其輻宖屋響又烏宏切鈜金聲吰噌吰鐘音􅥁玉篇云石聲也彋弸彋開張也莖草木幹也戶耕切三䪫樂名亦作莖牼牛膝下骨又苦耕切朾伐木聲也中莖切七丁上同詩曰伐木丁丁玎玎玲王聲又齊太公子伋諡玎公出説文也不仁也出聲譜􆄦􆄦設幕出字林䟓跉䟓腳細長也䆸䆸宏闊大貌罌瓦器烏莖切十三罌上同罃説文曰備火長頸瓶也鶯鳥羽文也嚶鳥聲櫻含桃嫈嫈嫇又於營切又乙諍切鸚鸚鵡能言之貌譻譻􅘱小聲鶯黃鶯褮鬼衣􅞑芟除林木也出齊人要術莖爾雅釋草云姚莖塗薺崢崢嶸七耕切六􅯇􅯇薴草亂貌鬇鬇鬡毛髮亂貌埩魯城北門池也説文作淨鏳鏳鎗王聲崝淮南子云崝峭也琤玉聲楚耕切五錚金聲淨冷也出字書棦木束噲噲吰鐘音儜困也弱也女耕切七薴􅯇薴鬡鬇鬡􅘱􅘱鑏鐡鑏䭢充食嬣嬣體怦心急又中直貌普耕切十一姘齊與女交罰金四雨曰姘蒼頡篇曰男女私合曰姘閛門扉聲牛色駁如星也伻使人弸弸彋也䍬使羊㛁急也匉匉訇大聲抨彈也砰砰磕如雷之聲轟群車聲呼宏切十輷上同䎕群鳥弄翅揈擊聲訇匉訇大聲又姓蜀録關中流人訇琦訇廣鍧鏗鍧鐘鼓聲相雜也訇水石聲又大也飛聲石落聲恲好嗔貌繃束兒衣墨子云禹葬會稽桐棺三寸葛以繃束也北萌切五絣振繩墨也上同拼爾雅云使也又從也䑫櫓䑫舟具橙抽屬宅耕切十二揨撞也觸也並上同湞水名出南海朾爾雅曰蠪朾蟻郭璞云赤駁蚍蜉虰上同憕失志貌又音澄瞪直視貌響也䁎安審視也䆑小突泓水深也烏宏切四謍謍􅘱宖屋響又戶萌切試力士錘輣兵車薄萌切五棚棧也弸弓弱貌恲恲好嗔貌莊平也亦作娙身長好貌漢書曰娙娥婦官也武帝邢夫人號娙娥五莖切二徑急也爭競也引也側莖切七箏樂器秦蒙恬所造埩埋也治也綪禮云齊則綪結佩䋫縈也猙獸名似豹一角五尾又音淨䱢魚名十四淸山海經曰大畤之山淸水出焉釋名曰淸靑也去濁逺穢色如靑也又靜也澄也潔也七情切二圊廁也情靜也説文曰人之隂氣有所欲也疾盈切五晴天晴請受也又在性七井二切夝説文曰雨而夜除見星也䝼䝼受賜也精明也正也善也好也説文曰擇也易曰純粹精也子盈切十五氏狋氏縣名狋音權箐䉑箐菜也鶄鵁鶄鳥也蜻蜻􅖹蟋蟀也晶光也鼱鼱鼩小鼠婧竦立也又慈性切睛目珠子也水名在南郡旌旌旗周禮曰析羽為旌爾雅曰注旄首曰旌旍上同見禮箐笭箐小籠䫢頭也聙聰聽也盈充也滿也又姓出姓苑以成切十二嬴秦姓嬴美好貌瀛大海亦州名漢河間王國後魏於此立瀛州蓋以瀛海為名籝籠也説文笭也漢書曰遺子黃金滿籝不如教子一經亦作籝楹柱也孔子曰夢奠於兩楹贏利也益也有餘也財長也􅭬似狐色黃菊花一名帝女花􅱡姓也出姓苑魯大夫名攍擔也營造也度也説文曰市居也亦州名舜分靑州為營州爾雅曰齊曰營州今靑州也又姓風俗通云周成王卿士營伯之後漢有京兆尹營郃余傾切六鎣采鐡又音營塋墓域䁝惑也又戶扃切濴波勢回貌謍説文曰小聲也引詩云謍謍靑蠅嬰蒼頡篇云女曰嬰馬曰兒又姓風俗通云晉大夫季嬰之後於盈切七瓔瓔珞纓冠纓禮記玉藻曰玄冠朱組纓攖亂也地名又一井切賏具飾櫻櫻薁藤也貞正也陟盈切六楨楨幹題曰楨旁曰幹又女楨冬不凋木也禎善也祥也􅬬地名又直貞切湞湞陽縣名湞水所出丘名柳木名説文云河柳也丑貞切八偵偵候又丑鄭切赬赤色俗作頳赬上同䟓跉䟓行不正竀正視蟶蚌屬虰蟻也成畢也就也平也善也亦州名古西戎地州南八十里有仇池山晉改為仇池郡後為南秦州梁廢帝改為成州又姓出上谷東郡二望本自周文王子成伯之後又漢復姓十五氏莊子有務成子廣成子顔成子遊伯成子髙韓子有容成子列子有考成子國語晉卻犨食采苦成後因以為氏丗本曰宋有大夫老成方盆成括仕於齊晉有英成僖子漢有廣漢太守古成雲古音枯髙祖功臣有陽成延後漢有密縣上成公白日升天晉戊己校尉燉煌車成將古成氏之後史記有邢成氏是征切十古文城城郭崔豹古今注云城者盛也所以盛受民物也又淮南子曰鮌作城亦姓風俗通云氏於事者城郭園池是也誠審也敬也信也宬屋容受也郕地名也在東平筬筬筐織具盛盛受也黍稷在器也又時正切珹珠類䫆頸也呈示也平也見也直貞切七程期也式也限也品也又姓出廣平安定一望本自顓頊重黎之後周宣王時程伯休父入為大司馬封于程後遂為氏與司馬氏同酲酒病􅬬地名又音貞珵玉名䇸筵也裎佩帶又恥領切聲聲音又姓左傳蔡大夫聲子書盈切一征行也諸盈切十三延上同鯖煮魚煎食曰五侯鯖又倉經切􅙰並上同鉦鐃也似鈴怔怔忪懼貌正正朔本音政鴊方言云齊魯間謂題肩為鴊鳥䋊乘輿馬飾眐獨視貌衳小兒衣出字林佂佂伀遽行貌輕輕重去盈切三􅚢一足跳行鑋説文曰金聲也名名字春秋説題曰名成也大也功也號也説文曰自命也從夕口夕者冥不相見故以口自名也又姓左傳楚大夫彭名之後武并切二洺水名在易陽亦州名春秋時為赤狄之地後屬晉秦為邯鄲郡周於此置洺州以洺水為名跉跉䟓吕貞切二令使也又吕鄫郎丁二切并合也亦州名舜分兾州為幽州并州春秋時為晉國後屬趙秦為太原郡魏復置并州又姓出姓苑府盈切四栟栟櫚木名箳箳篁車轓屏屏盈倣徨又餅萍二音傾側也伏也敬也去營切二頃西頃地名出地理志説文曰頭不正也又去潁切餳飴也徐盈切一縈繞也於營切五褮説文云鬼衣也嫈小心態又烏莖切䪯聲也覆也瓊玉名渠營切十七璚上同煢獨也一曰回飛也焭上同睘驚視惸無弟兄也博豫一名投豫藑藑茅草也嬛好也􅑱上同赹獨行貌憌憂也上同草旋上同車輮規一曰輪車也煢特也騂馬赤色也息營切四上同垶赤土觪角弓頸項也頸在前項在後巨成切又居郢切五魚名葝鼠尾草又山薤又音擎􅹦上同貨也火營切一十五靑東方色也亦州名九州之一禹貢曰海岱惟靑州又男靑女靑皆木名出羅浮山記亦姓出何氏姓苑又漢復姓三氏風俗通云漢有靑烏子善數術又有青牛氏青陽氏倉經切五鶄鶄鶴鳥也出南海又音精鯖魚名又諸盈切蜻蜻蜓蟲方言曰蜻蛉謂蛉也六足四翼又音精靘䒌靘無色經常也絞也徑也亦經緯又姓出何氏姓苑古靈切又音徑四涇水名淮南子云涇水出薄洛之山鵛鸒鵛鷋也巠直波為巠説文曰水脈也㓝説文曰罰罪也今只用下文刑戶經切十七刑法也禮曰刑者侀也侀者成也一成而不可變故君子盡心焉説文剄也形容也常也邢地名在鄭亦州名古邢侯國也項羽為襄國隋為邢州取國以名之又姓出河間也本周之㣧邢侯為衛所滅後遂為氏漢有侍中邢辟直道忤時謫為河間鄭令因家焉小瓜䣆鄉名在密桯牀前長几又音廳鉶祭器型鑄鐡模也又作陘連山中絶又姓陘晉邑也其大夫氏焉今有井陘縣侀成也硎砥石娙女長貌又五莖切鈃酒器似鐘而長頸也鈃並同上鋞説文曰溫器也圜而直上庭門庭又直也亦州名即漢車師後王庭之地本烏孫國土也其前王庭即交河縣是也特丁切二十一停息也定也止也鼮鼮鼠豹文漢武帝得此鼠孝廉郎終軍識之賜絹百匹莛草莖葶葶藶筳竹筳亭今亭子名釋名曰亭停也人所停集也漢典職曰洛陽二十街街一亭十二城門門一亭也聤耳出惡水霆雷霆渟水止魚名綎綬也娗好貌㼗甎也定息挺縣名在膠東又徒頂切楟山梨木名蜓蜻蜓亦蟪姑别名廷風俗通云廷者平也又正也國家朝廷也釋名曰廷停也人所停集之處漢書曰廷尉秦官也應劭曰古官也㹶猱㹶猿屬埤蒼云𧖟二眠丁當也亦辰名爾雅云太歲在丁曰強圉又姓本自薑姓齊太公子伋謐丁公因以命族出濟陽濟隂二望當經切八釘又都定切玎玉聲䦺丘名靪補履下也虰爾雅曰虰蛵負勞郭璞云或即蜻蛉也仃伶仃獨也叮叮嚀馨香也呼刑切三􅠒説文聲也蛵虰蛵星星宿説文曰萬物之精上為列星淮南子曰日月之淫氣精者為星辰也又姓羊氏家傳曰南陽太守羊續娶濟北星重女桑經切十二曐上同出説文腥豕息肉又先定切勝犬膏臭也鮏説文云魚臭也鯹上同稀醒酒醒又思挺先定二切鉎鐡鉎篂箳篂别駕車轓猩説文曰猩猩犬吠聲又音生惺惺憽了慧貌出聲類竮竛竮行不正亦作伶俜普丁切八俜見上注又匹正切甹甹夆掣曵説文曰亟詞也或曰甹俠也三輔謂輕財者為甹使也艵縹色頩面色又普冷切姘男女會合覮淮南子云覮然能聽靈神也善也巫也寵也福也亦州名漢北郡富平縣地赫連勃勃之果園也後魏置靈州取靈武縣名為之又姓風俗通云齊靈公之後或云宋公子靈圍龜之後晉有餓者靈輒郎丁切八十七霛並古文靈廣雅曰玉名説文曰巫以玉事神也與靈同舲舟上有窗齡年也麢大羊上同囹囹圄鴒鶺鴒䉁竹名蛉蜻蛉鈴似鐘而小霝落也墮也説文曰雨也從雨􅮎象雨形或作零醽渌酒苓茯苓櫺窗櫺又櫺檻階際欄柃説文木也空也伶樂人泠清泠水也又水名出丹陽又姓左傳周大夫泠州鳩瓴瓴甋一曰似罌有耳􅘾説文曰螟􅘾桑蟲也或作蛉拎手懸捻物刢刢利性人也似虎而小出南海通俗文云豬糞曰小瓜名出安南玲朎朧玉聲􆁓似瓶有耳瘦也𩖊上同聆以耳取聲竛竛竮字類撞蘦菜名似葵可食軨車闌軨上同笭笭箐小籠零落也説文曰徐雨也又姓出姓苑孁女字令漢復姓有令狐氏本自畢萬之後國語云晉大夫令狐文子即魏顆也自漢已後丗本太原至邁為王莽所誅邁少子始居燉煌也􅤜􅤜班鼠靈字類云小熱貌食飽􅛗山海經曰神名人面獸身或作龗一曰龍名龗説文龍也翎鳥羽閝門上小窗出崔浩女儀鹷壃鹷䴇䴇鳥鶴别名也昤昤曨日光出道書駖駖蓋車騎聲螢也器名又人名也蕶草蕶落也酃地名在湘東詅詅音相次出異字音彾彾俜行貌䯍骨呤埤蒼云呤吟語也跉徐行不正貌出異字音狑犬名上同爧火光貌冷冷澤吳人云水凌又力頂切憐心了黠貌􅮎衆鳥也從三口􅫲􅫲艦有屋舟名插空又力定切澪水名鏻健也草莖踈也秢穗熟玉篇云年也苓鼠耳草也本亦作苓獜玉篇云獜獜犬聲又力仁切嶺山深貌魿魚連行貌毛結不理玉篇云長毛也餌也紷綼絲一百升又絮名䉁竹名砱石砱阾阪名羚羊子姈女字㸳牛名寧安也説文曰願詞也亦州名禹貢古西戎地秦為北地郡亦為豳州又為寧州奴丁切九寧説文曰安也從宀心在皿上皿人之食飲器所以安人也鸋爾雅曰鴟梟鸋鴂又曰鴽子鸋䆨天也告也又乃定切鄉名在馮翊谷口又奴顚切螻蛄嚀叮嚀聹耳垢又乃鼎切汀水際平沙也他丁切十四訂平議也又徒頂他頂二切桯碓桯綎絲綬帶綎聽聆也又湯定切廰廰屋町田處又徒頂切艼草名罟也綎皮帶綎也鞓上同䋼縚屬説文緩也􅮲上同廳平廳冥暗也幽也又姓禹後因國為氏風俗通云漢有冥都為丞相莫經切十五榠榠樝果木銘銘記釋名曰銘名也記名其功也鄍晉邑溟溟濛小雨又溟海也䫤眉目間也螟螟蛉桑蟲説文曰蟲食榖葉者吏冥冥犯法即生螟小豚猽上同蓂蓂萊堯時生於庭隨月雕榮瞑合目瞑瞑又亡千切漬米嫇好貌覭小見也又爾雅曰覭髳弗離也又莫的切暝晦暝也瓶汲水器也又姓風俗通云漢有太子少傅瓶守後趙録有北海瓶子然二姓蓋别薄經切十五瓶上同蛢以翼鳴蟲䶄鼠子説文云䶄令鼠屏三禮圖曰扆從廣八尺畫斧文今之屏風則遺象也又必郢切荓荓馬帚似蓍又荓翳雨師名也笄竹名軿輺軿兵車萍水上浮萍蓱上同竮竛竮又普經切郱郱城在東莞織蒲為器洴莊子曰有洴澼絖造絮者也箳箳篂别駕車名熒光也明也戶扃切六褮衣開孔也又音縈鬼衣也螢螢火禮記云季夏月腐草為螢一名丹良又名蚈滎小水也又水名在鄭州䁝䁝惑也又余傾切貨也扃戶外閉關古螢切八駉駿馬也詩曰駉駉牡馬傳云良馬腹幹肥張也駫馬肥盛也坰野外曰林林外曰坰坰古文􅫪􅫪􅤜班鼠絅引急也木名十六蒸衆也進也君也又麁曰薪細曰蒸説文曰析麻中幹也又爾雅曰冬祭曰蒸經典亦作蒸煮仍切七蒸説文同上蒸説文曰火氣上行也熟也𧗆𦵔也篜玉篇云竹也脀癡貌承次也奉也受也又姓後漢有承宫署陵切三丞佐也翊也物理論曰髙祖定天下置丞相以統文德立大司馬以整武事為二府也􅹊軺車後登也出字林澄清也直陵切五澄上同瞪直視也又直庚切憕平也又竹萌切懲戒也止也陵大阜曰陵釋名曰陵崇也體崇髙也又犯也侮也侵也遲也又漢復姓六氏吳延陵季子之後有延陵氏髙士傳有於陵子仲戰國䇿有安陵丑吕氏春秋有鉛陵卓子漢有髙陵顯秦昭王弟髙陵君之後楚有公子食采於鄧陵後以為氏力膺切十八淩歷也又水名出臨淮亦姓吳將有淩統夌説文越也綾綾紈凌冰凌上同菱芰也菱菱並同㥄憐也鯪臨海風土記曰鯪魚腹背皆有刺如三角菱也崚崚嶒山貌㱥㱥殑鬼出貌崚去也説文曰馬食榖多氣流四下也本力甑切掕止也又力證切祾祭名神靈之福欺俗膺胸也親也於陵切四應當也又姓出南頓本自周武王後左傳曰邦晉應韓武之穆也漢有應曜隱於淮陽山中與四皓俱徴曜獨不至時人語之曰南山四皓不如淮陽一老八代孫劭集解漢書􅣒寒蟬鷹鳥名月令曰驚蟄之日鷹化為鳩憑依几也扶冰切五馮周禮馮相氏鄭玄云馮乘也相視也丗登髙臺以視天文又防戎切憑憑託淜説文曰無舟渡河也㵗水聲冰水凍也説文本作仌筆陵切三冰上同説文本魚陵切掤説文曰所以覆矢也詩云抑釋掤忌蠅蟲也詩云螢螢青蠅余陵切一繩直也又繩索俗作繩食陵切十二譝稱舉憴上同鱦小魚乘駕也勝也登也守也説文作乘覆也又姓漢有乘昌為煮棗侯乘上同古文澠水名在齊左傳云有酒如澠又泯緬二音溗波前後相淩也塍稻田畦也畔也塖上同騬犗馬升十合也成也又布八十縷為升識蒸切五升日上本亦作升詩曰如日之升升出也俗加日升登也躋也勝任也舉也説文本從舟經典省作月他皆倣此又漢復姓何氏姓苑有勝屠公為河東太守又書證切拯上舉易曰拯馬壯吉説文音蒸上聲仍因也就也重也頻也又姓出何氏姓苑如乘切七艿草名謂陳根草不芟新草又生相因艿也所謂燒火艿者也䚮厚也辸往也礽福也扔引也㭁木名兢兢兢戒慎居陵切二矜本矛柄也巨巾切字樣借為矜憐字徵召也明也成也證也經典省作徵又姓吳太子率更今河南徵崇陟陵切四古國名癥腹病旌旗柱説文本丑善切旌旗杠貌繒繒帛又姓漢功臣表有繒賀疾陵切六鄫國名也在琅邪驓馬名四骹皆白橧豖所寢也竲髙貌嶒崚嶒山貌凝水結也又成也魚陵切一興盛也舉也善也説文曰起也從舁從同同力也亦州名戰國時為白馬互之地漢置武都郡魏立東益州梁為興州因武興山而名虛陵切又許應切三嬹女字説文曰地名也稱知輕重也説文曰銓也又姓漢功臣表有新山侯稱忠處陵切又昌證切三爯并舉也稱宣揚美事又言也好也楊也舉也足也殑殑殑欲死狀其矜切又其拯切二䔷草名根可緣竹器又音琴㱡㱡㱡山矜切一硱硱磳石貌綺兢切又苦夲切一僜醉行貌丑升切三庱亭名在吳興孫權射虎處又丑拯切睖睖瞪直視磳硱磳仕兢切一砅水擊山巖聲披冰切一十七登成也升也進也衆也説文曰上車也亦州名漢文帝封悼惠王子為牟平侯即此地也周為登州取文登山而名又姓蜀有關中流人始平登定都滕切八璒石似玉也燈燈火簦長柄笠也㲪毾㲪䔲金䔲草㽅瓦器䳾䳾鶛鳥也楞四方木也魯登切六稜上同又威稜又柧稜木也稜俗輘車聲倰倰儯長貌祾祭也福也靈也僧沙門也梵音云僧伽蘇增切三鬙鬅鬙髮短䒏䒐甑神不爽也崩説文云山壞也北滕切一增益也加也重也又埋幣曰增作滕切十二憎憎疾磳硱磳石貌又土殑切曽則也亦姓曽參之後漢有尚書曽偉古作曽又音層矰弋射矢也罾魚網熷蜀人取生肉於竹中炙䎖舉也又飛鳥貌竲巢髙橧禮運曰夏則居橧巢譄加言也菎草瞢目不明武登切四蕄爾雅云存有蕄蕄在也䒐䒐䒏神不爽也穢也層重屋也昨稜切又作滕切三曽經也又作滕切䁬目小作態瞢䁬也朋朋黨也五貝曰朋書云武王恱箕子之對賜十朋也步崩切六堋射堋鵬大鳥棚棚閣又薄庚切倗輔也又姓漢書王尊傳云南山羣盜倗宗等又匹等切鬅鬅鬙被髮弘大也又姓衛有弘演胡肱切三鞃鞃軾中靶也苰藤苰胡麻也肱臂也古弘切二軾中靶也薨説文云公侯卒也呼肱切五説文曰惛也􅲰惛迷也大風也􅪋水聲能工善也又獸名熊屬足似鹿亦賢能也奴登切又奴代奴來二切一騰馳也躍也説文曰傳也曰犗馬也徒登切十二滕國名亦姓滕侯之後以國為氏縢行縢幐囊可帶者螣螣蛇或曰食禾蟲藤藤苰又藤蘿謄移書謄上黑虎也儯倰儯長也􅺤􅺤痛鰧魚名蒼身赤尾美目貌恆常也久也亦州名春秋時鮮虞國地漢為恆山郡周武帝置恆州因山以為名爾雅曰恆山為北嶽又姓楚有大夫恆思公胡登切三古文峘爾雅曰小山岌大山峘郭璞云岌謂髙也搄急也淮南子云大弦搄則小弦絶也古恆切三縆大索絙上同鼟鼟鼟鼓聲他登切四膯飽也吳人云出方言小水相添益貌上同漰漰渤水擊聲普朋切二堋堋振動貌十八尤過也椹也怨也多也説文異也又姓出姓苑羽也切九枕木名腄縣名在東萊疣結病也釋名曰疣丘也出皮上聚髙如地之有丘也疣上同籕文沋水名在髙密郵境上舍亦督郵古官號釋名曰督郵主諸縣罰貟郵殿糾攝之又姓西京雜記有郵長倩訧過也博雅曰惡也憂愁也又姓出姓苑於求切十七優饒也亦優倡又姓史記楚賢臣優孟瀀瀀渥遊本亦作優詩云愼爾優遊麀牝鹿上同耰鉏也又打塊捶鄾邑名在鄧􅖨微小怮含怒不言嚘欭嚘歎也覆種出王篇獶獶犬名菜名纋笄中嚘氣逆妋鼻目間恨劉剋也陳也殺也亦劉子木名實如梨核堅味酸美出交址又姓出彭城沛國弘農河間中山梁郡頓丘南陽東平髙平東莞平原廣陵臨淮琅邪蘭陵東海丹陽宣城南郡髙堂髙密竟陵長沙河南等二十五望並自陶唐氏既衰其後劉纍學擾龍事孔甲范氏其後也唯河南一望即虜姓也後魏書官氏志獨孤氏後改為劉氏力求切四十四留住也止也説文作留亦姓出會稽本自衛大夫留封人之後後漢末避地會稽遂居東陽為郡豪族吳志有左將留贊蒥蒥荑藥名勠并力也又力逐切摎絞縛殺也又姓魏有河內太守摎尚鶹鶹離鳥名少美長醜亦作流騮驊騮周穆王馬駵赤馬黑髦尾疁田不耕而火種􅦴麩􅦴饊也流演也求也覃也放也説文曰水行也㳅古文飂髙風也飀上同瘤肉起疾也釋名曰瘤流也流聚而生腫也榴石榴果名博物志云張騫使西域回所得瑬美金説文曰垂玉也冕飾今典籍用下文旒旒旗旒廣雅天子十二旒至地諸侯九旒至軫大夫七旒至轂士三旒至肩琉琉璃食竹根鼠又音柳􅥡上同䉧説文云竹聲也又音柳竹名出玉篇瀏水清又音柳飀風行聲又音柳鰡魚名鰡同上嵧岣嵧羅君山峯􅼻扶􅼻藤名緣木生其味辛可食其花實似蒟醬鎦殺也綺别名也斬刺殺也懰烈也餾飯氣蒸也又力救切䖻蜉䖻蟲本作蜉蝣蝣音遊裗爾雅曰衣裗謂之䘽郭璞云衣縷也齊人謂之攣或曰袿衣之飾􅽑飛鸓鳥名麻也硫石硫黃藥名遛逗遛䚧觩䚧角貌憀悲恨也又音聊鏐美金曰鏐即紫磨金也秋春秋説文曰禾榖熟也又姓宋中書舍人秋當七由切十七秋古文鞦車鞦緧上同説又曰馬紂也上同周禮曰必其牛後鞦亦上同又鞦韆繩戲古今藝術圖曰鞦韆北方山戎戲以習輕趫者湫水池名北人呼鶖秃鶖鳥亦作樢鰍魚屬亦作鰌楸木名萩蕭似蒿也􅖚爾雅曰鼁􅖚蟾蝫郭璞云似蝦蟆居陸地淮南謂之去蚥鼀上同蟗爾雅曰次蟗鼅蛛鶖雞雛篍説文云吹筒也玉篇云吹簫也趥説文曰行貌猷謀也已也圖也若也道也説文曰玃屬一曰隴西謂犬子為猷以周切四十五猶上同又尚也似也悠逺也遐也思也憂也油水名出武陵又油脂由從也經也用也行也又姓史記有由余攸所也又姓北燕尚書攸邁蕕水蕕草又臭草浟水流貌氣行貌或作逌􅟧歋􅟧以手相弄冘冘豫不定行也輶輶車又易受移授二切蘨草盛也秞禾盛貌蚰蚰蜒蝣蜉蝣朝生夕死柚木名出昆崘山楢積也又音酉水草一名軒于斿旌旗之末垂者遊浮也放也又姓出馮翊廣平前燕慕容廆以廣平遊邃為股肱遊上同古文卣中樽樽有三品上曰彞中曰卣下曰罍謠從也鮋鮂鮋小魚䱔上同抌杼曰出周禮揄上同又音俞舀上同又以沼切偤侍也出文字辨疑䍃瓦器遺玉又弋九切郵亭名在髙陵繇猶也皂也𤸈病也又息惡肉囮鳥媒囮上同庮久屋木周禮曰牛夜鳴則𤸈鄭司農云庮杇木臭也又弋久切空也説文云生條也引書云若顚木之有枿又胡感切上同下視深也説文草也牛大牲也丗本曰黃帝臣胲作服牛史記曰紂倒曵九牛又姓出隴西本自殷周封微子於宋其裔司冦牛父帥師敗狄長丘死之子孫以玉父字為氏風俗通云漢有牛崇為隴西主簿馬文淵為太守羊喜為功曹涼部云三牲備具語求切一遒盡也即由切又自秋切十一鮂烏化為魚頂上有細骨如禽毛䎿耳鳴聲蝤蝤蛑似蟹而大生海邊也又自秋切啾啾唧小聲逎縣名在燕又迫也促也接髮揂聚也揫束也聚也湫水名又子小切聚也又束枲也酋長也説文曰繹酒也禮有大酋掌酒官也自秋切十㥢慠也遒盡也又即由切䎿耳中聲也又即由切崷崷崒山峻貌鰌魚名二月有之蝤蝤蠐蝎也煪煪熮隿射收繳角也􅙤􅙤液周禮音糟修脯也又長也又姓漢有屯騎校尉修炳姓苑云今臨川人息流切七修理也説文飾也羞恥也進也又致滋味為羞􅧮􅧮饙􆁟上同䡭䡭䡜載喪車樇木名抽拔也引也或作紬紬引其端緒也丑鳩切八上同抽上同見説文婤好貌又音周失意視貌惆惆悵瘳病愈妯詩曰憂心且妯妯動也悼也恘戾也去秋切三上同㲃㲃屈犫白色牛説文曰牛息聲也又姓風俗通云晉大夫郤犫之後吕氏春秋云陳留有惡人焉曰敦洽犫糜狹顙廣額顔色如漆陳侯恱之赤周切二犨上同周周匝也又至也備也遍也密也又姓出汝南廬江尋陽臨川陳留沛國泰山河南等八望夲自周平王子别封汝川人謂之周家因氏焉一云赧王為秦所滅黜為庶人百姓稱為周家因而氏焉魏官氏志獻帝次兄普氏後改為周氏又漢復姓魏初徴士燉煌周生烈晉武帝中經簿云周生姓烈名職流切十州州郡周禮曰五黨為州又姓左傳晉大夫州綽校米粉餅出字林輖重載也洲洲渚也爾雅曰水中可居曰洲賙贍也喌呼雞聲又音祝舟舟船墨子曰工倕作舟吕氏春秋曰虞姁作舟丗本曰共鼓貨狄作舟二人並黃帝臣又姓左傳晉大夫舟之僑郮黃帝後所封國婤女字左傳衛襄公有嬖人婤姶又音抽讎匹也仇也市流切十懸擊也上同説文棄也鮋魚名又直留切酬周也報也以財貨曰酬又酬酢酬上同説文本作主人送客也酬以言答之又之又切雔説文曰雙鳥也又爾雅曰雔由樗繭郭璞云食樗葉俗作雔魗惡也棄也又音醜􅗪蜀江源地又音儔柔順也安也説文曰木曲直也耳由切十六鍒鐡之耎也㽥良田騥馬青驪也蝚爾雅云蛭蝚至掌又云蝚蛖螻蛭音質蹂踐榖又而九切葇香葇菜鞣熟皮鰇魚名瑈玉名也見聲類腬肥貌鶔鷗鶔鳥揉捻也又順也詩曰揉此萬邦箋云揉順也又汝又切䰆馬之繁鬣鄉名䐓面和收斂也捕也又夏冕名史記曰堯黃收純衣俗作收式州切一丘聚也空也大也又丘陵爾雅非人為之曰丘郭璞云地自然生説文作丠亦姓出吳興河南二望風俗通曰魯左丘明之後又云齊太公封於營丘支孫以地為氏代居扶風漢末丘俊持節江淮屬王莽篡位遂留江左居吳興也又漢復姓四十四氏左傳齊有藉丘子鉏梁丘據閭丘嬰莒有著丘公渠丘父後並因邑為氏晉有虞丘書為乘馬御祖氏家記有太中大夫東安於丘淵史記有狐丘子林楚有苞丘先生齊桓公至麥丘麥丘人年八十三祝桓公封於麥丘其後氏焉孟子齊有曼丘不擇又有咸丘蒙隱居列仙傳有浮丘公梁州刺史莊丘黑魯莊公庶子食采於瑕丘其後氏焉齊有勇士葘丘訴神仙傳漢有稷丘子又有廪丘充隱居齊魯之間楚有列威將軍何丘寄楚文王庶子食采於軒丘其後為氏周宣王支庶食采於謝丘其後為氏漢有趙人吾丘壽王又有曹丘先生侍御史余丘炳巨鹿太守莊丘勝以勇力聞安丘望之注老子列仙傳有髙邑人商丘子胥藝文志有桑丘公漢有吳人龍丘萇隱居不屈濟北蛇丘惑為河內太守魏有幽豫二州刺史毌丘儉吳有平原陶丘洪晉有雍丘洛以武力聞何氏姓苑云漢有司隸校尉水丘岑古有蔡丘欣喪馬淮陽東海北丘氏又有羌丘常丘﨑丘獻丘陽丘逢丘厚丘泥丘等氏又虜復姓二氏後魏獻帝次弟丘敦氏後改為丘氏丘林氏後改為林氏去鳩切六丠古文蓲烏蓲草名蚯蚯蚓蟲名禮記孟夏月蚯蚓出邱地名訄追也䬌風吹貌匹尤切七秠一稃二米又芳鄙切寐作聲衃疑血胚孕一月又普回普來二切紑説文云白鮮衣貌又甫鳩切醅醉飽又普裴切鳩鳥名又聚也居求切十秦藥名又居由切大力朻髙木又居虯切䡂車軫長也㽱腹中急痛又古巧切􅍐鬪取也又音糾丩相糾繚也龜又居危切勼説文聚也不弗也又姓晉書有汲郡人不準盜發六國時魏王冢得古文竹書今之汲冢記也甫鳩切又甫九甫救二切五哹吹氣紑詩傳云潔鮮貌䍍未燒瓦器鴀鴀鳩鳥也􅊧索也求也聚也所鳩切十七搜上同凡從叟者作叟同􆄖飯壞􅷒􅷒飋風貌􅘞小便鎪馬金耳飾廋匿也論語曰仁焉廋哉搜茅搜草又春獵曰搜􅭚雞腸草也獀獶獀南越人犬名䐹乾魚北方國名螋蛷螋蟲亦名蠷螋蕃中大馬犙牛三歲也又息含切白酒趨不進搊手搊楚鳩切七俗餘倣此篘酒篘醔上同㮲板木不正粉謅謅隂私小言鄒縣名屬兖州又姓漢有鄒陽側鳩切十四鄹上同郰説文云孔子之鄉也論語作鄹騶廄御亦騶虞仁獸又姓越王之後齱齱齵齒偏陬鄉名一曰隅也緅靑赤色也又子侯切䑼艆䑼海船名獸足也菆草名又矢之善者説文曰麻蒸也一曰蓐也棷薪之别名又又苟切箃竹柴别名小兒聲黀聚麻愁憂也悲也苦也士尤切二㵞腹中有水氣也休美也善也慶也息也又木名許尤切十三貅貔貅猛獸貅上同鵂鵂鶹鳥也馬名㾋下病庥爾雅曰庇庥廕也郭璞曰今俗呼樹蔭為庥脙瘠也俗作脙又音求上同髤周禮駹車有髤飾注謂髤漆赤多黑少也或作髹上同咻口病聲也㵻汗面亦作膄囚拘也繫也似由切六泅人浮水上汓古文苬芮芝瑞草一歲三華又音由慒慮也又在冬切鮂白鯈儔儔侣也直由切二十七檮剛木也躊躊躇幬説文作襌帳也上同裯襌被􅔧咨也説文誰也又作疇誰也等也壅也田疇也又疇昔説文作耕治之田也紬大絲繒又音抽綢綢繆猶纒綿也稠穊也多也燽著也薵薵藉蔥名鯈魚子又魚名也籌籌算雉爾雅云南方曰􅔧字或從鳥上同棸字統云姓也又側鳩切椆木名不凋怞朗也臘脯也懤愁毒貌鮋魚名又音由䬞風颸菗荼菜􅗪蜀江原地又上牛切説文云籌箸也輈車轅也張流切十一盩盩厔縣在京兆府水曲曰盩山曲曰厔又云引擊也啁啁噍鳥聲譸譸張誑也爾雅亦作侜侜壅蔽也騪蕃中大馬調朝也詩云惄如調飢本又音條咮曲喙又張救切行不進也射馬箭也矪上同皮衣詩云取彼狐狸為公子又姓本作仇避讎改作巨鳩切四十四裘上同仇讎也又姓左傳宋大夫仇牧之後又漢復姓有章仇仇尼二氏隋有章仇大翼善天文厹漢書地理志厹猶縣屬臨淮郡又詩曰厹矛鋈錞傳云厹三隅矛又説文曰髙氣也厹上同求索也又姓三輔決録云漢有求仲上同頄頰間骨也又求龜切蛷蛷螋蟲上同説文云多足蟲也逑匹也球美玉説又曰玉磬也璆上同又渠幽切艽逺荒之地詩云至于艽野又獸蓐也鼽月令云人多鼽嚔説文云寒鼻塞也莍椒也䣇地名賕財賄殏也梂説文曰櫟實也一曰鑿首朹爾雅曰朹檕梅郭璞云朹樹狀似梅子如指頭赤色似小㮈可食𣓕荆𣓕亭名俅戴也脙瘠也又音休上同馗爾雅曰中馗菌今土菌可食又音逵䊵急引也絿上同䜪䜱䜪亭名扏緩也銶鑿屬廣蒼云戴也籠也毬毛毬打者䟵䟵踏也犰犰狳獸似魚蛇尾豕目見人則佯死違也訅安也謀也釚弩牙救長匕貌詩曰有救棘匕傳云救長貌肍乾肉醬也怨仇也又其九切白芷訄迫也又去牛切浮㲹也縳謀切二十四哹吹氣又拂謀切桴齊人云屋棟曰桴也枹鼓槌竹有文者罦覆車網也罦上同琈玉名麩麩􅦴䳕䳕鳩罘兔罟䱐魚名涪水名在巴西芣芣苡車前也江東謂之蝦蟆衣蜉蚍蜉大蟻烰火氣爾雅曰烰烰蒸也郭璞云氣出盛鉜鉜鏂大釭􅾬多也􅸛姓也出纂文艀舟也棓杖也又音棒掊把也瓿小缶䨗雨雪貌謀謀計也又姓風俗通云周卿士祭公謀父之後莫浮切二十四䱕魚名雺天氣下地不應又莫貢切又莫紅切眸目童子牟説文曰牛鳴又過也陪也進也大也亦牟平縣屬登州又姓風俗通云牟子國祝融之後後因氏焉漢有太尉牟融又漢復姓三氏東萊先賢傳有兖州刺史平昌曹牟君卿禮記云魯有賔牟賈何氏姓苑有彌牟氏侔等也均也齊也矛戈矛説文曰酋矛也建於兵車長二丈象形吳越春秋曰越王以屈盧之矛步光之劒獻於吳王古文鍪兜鍪首鎧説文曰鍑屬也鞪上同漢書云鞮鞪牟大麥又短粒麥上同堥堆堥小隴劺勉也􅛙􅛙䤅榆人醬蝥食穀蟲説文本又作蟊蟲食草根者吏抵冒取民財則生蟊上同説文曰蠿蟊也鷚鷚鸙鳥也􅼘髮至眉或作髳䋷縛也恈愛也鴾鶉之别名蛑蝤蛑似蟹而大繆絲千纍十九侯候也何也美也辝也爾雅曰父侯君也又乃也又周禮司裘氏王大射則共虎侯熊侯豹侯諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠鄭司農云方十尺曰侯四尺曰鵠説文本作侯從人從象張布之狀矢在其下又姓出上谷河南二望亦漢復姓八氏夏侯氏出自夏禹之後杞簡公為楚所滅其弟他奔魯魯悼公以他出自夏后氏受爵為侯謂之夏侯因而命氏後有去魯之沛者分沛立譙遂有譙魯二望羅國為楚所滅其後號羅侯氏韓詩外傳云周宣王大夫韓侯子有賢德史記魏有屈侯鮒左傳曹有豎侯氏孺漢有尚書郎柏侯雋吳有張昭師白侯子安又虜三字姓二氏周書有侯莫陳氏侯崇傳云其先魏之别部也又周有大將軍伏侯龍氏名恩戶鉤切二十四矦見上注古文帿射侯見上注俗從巾鄇地名䫛䫛䫘大言鍭箭鏃銗鏂銗錏煆猴獼猴猱也糇糇糧翭説文曰羽本也一曰羽初生貌翵上同餱乾食喉咽喉篌箜篌鯸鯸䱌魚名㮢㮢桃文㮢櫟木也谷名在成臯亦作瘊疣癭䗔蟲名葔葔莎草骺骨骺睺半盲又胡遘切䙈䙈褕小衫謳吟也歌也烏侯切十六嘔嘔唲小兒語也歐歐陽復姓出長沙郡甌瓦器亦甌閩又姓出姓苑區姓也古善劒區冶子之後今郴州有之漚浮漚鷗水鳥説文云水梟也䁱深目貌又若侯切瞘上同櫙木名爾雅曰櫙荎今之刺榆蓲上同醧酒甘剾剾㓱又格侯切䙔小兒涎衣鏂鏂銗膒久脂羺羺胡羊奴鉤切四獳犬怒䨲兔子䰰鬼魅聲䰰䰰不止也出説文樓亦作婁重屋也亦姓夏少康之裔周封為東樓公子孫因氏焉漢末樓秦自譙徙居會稽因以東陽為望也又虜復姓有蓋樓氏賀樓氏落侯切二十九婁空也又星名亦姓邾婁國之後漢有婁敬又漢復姓五氏左傳齊大夫工婁灑漢書藝文志有齊隱士贛婁子著書何氏姓苑云母婁氏今琅邪人又有精婁氏邾婁氏又虜復姓二氏後魏獻帝次弟為伊婁氏又有匹婁氏後並改為婁氏説文作婁今作婁並同䣚鄉名又力于切􅖮縣名􅌣􅌝􅌣土瓜蔞爾雅曰購蔏蔞蔞蒿也生下田初出可啖詩云言采其蔞又力朱切􅸺頭􅸺小穿䝏求子豬也土似羊四角其鋭難當觸物則斃食人出山海經僂躽僂又力主切艛舟名耬種具髏髑髏膢八月祭名又力于切􅕕􅕕苦􅕕樓廲樓綺剅小穿又音兜摟探取嘍嘍唳鳥聲瞜視貌螻螻蛄一名仙蛄一名石鼠爾雅曰天螻又曰蝚蛖螻簍籠也鞻鞮鞻氏掌四夷之樂慺慺慺謹敬之貌鷜爾雅曰鵱鷜鵝即今之野鵝䱾魚名褸衣襟又力主切遱説文曰連遱也嘍説文云謰嘍也涑浣也速侯切八鏉刻鏤䩳軟皮上同白頭人也摗摟摗取也出陸氏字林今欶女字彄弓彄恪侯切八摳摳衣挈衣也剾宛裏也又乙侯切韝射韝臂捍也又古侯切指滱水名在北地又音寇夠多也䁱目深瞘䁱齁齁䶎鼻息也呼侯切二鳥青色似䳕鳩也麻幹子也侯切五緅青赤色也再染曰緅三入成纁陬隅也又聚居棷薪别名掫説文云夜戒守有所繫也偷盜也爾雅云佻偷也謂苟且託侯切四鍮鍮石似金陶之則分鋀上同偷薄也又巧黠也頭説文云頭首也釋名云頭獨也於體髙而獨也度侯切十五㓱剾㓱足節又刀剜物投託也棄也合也説文擲也亦姓郇伯周畿內侯桓王伐鄭投先驅以䇿其後氏焉漢有光祿投調又漢復姓有投壷氏風俗通云晉中行穆子相投壷因以氏焉姓苑云東莞人也字書云麻一潔説文云屬或作䵉骰骰子博陸采具出聲譜遙擊貌坄陶窗牏築垣短版又羊朱切䤅􅛙䤅醬也㢏㢏行圊廁揄引也又欲朱切窬穿也又羊朱切緰布也歈歌也又羊朱切鴢頭鵁似鳧腳近尾齵齱齵五婁切又牛俱切一鉤曲也又劒屬字樣句之類並無著某者古侯切十八􅧉説文云關西呼鎌為􅧉也溝溝渠爾雅云水注谷曰溝釋名曰田間之水曰溝溝搆也縱橫相交搆也褠襌衣韝臂捍又苦侯切緱緱氏縣屬河南府又姓孝子傳陳留緱氏女名王亦刀劒頭纏絲為緱篝燻籠􅱥桃枝竹名􅔢􅔢鼊似龜説文其俱切屬頭有兩角出遼東亦作㗕唱㗕􅕕䑦䑦􅑳船名冓數名十秭曰冓枸曲木又木名也句説文曲也又髙句驪遼東國名又句龍社神名亦姓史記有句疆又九遇古候二切軥車軥心木又夏后之輅曰軥也夠多也鴝鴝鵒鳥又音衢兜兜鍪首鎧也當侯切十侸占侸垂下貌占丁兼切吺輕出言貌飼馬籠也眵目汁疑眵赤支切剅小穿又音婁或作説文云目蔽垢也小裂貌郖説文云弘農縣庾地白頭㔌細斷徂鉤切二鯫魚名又士苟切又小人之貌也裒聚也薄侯切九䯽説文云髮貌捊説文云引取也抔手掬物也掊詩曰曽是掊克謂聚斂也䏽豕肉醬也飫曰食也瓿説文云小缶也箁説文云竹箁也䜅就也千侯切一呣慮也亡侯切一二十幽深也微也隱也亦州名釋名曰幽州在北幽昧之地故曰幽禹貢兾州之域舜以兾州南北廣大分燕北為幽州又北方曰幽都又姓出姓苑於虯切七泑澤在昆崘山下呦鹿鳴上同􅝦􅝦蟉龍貌又一糾切怮説文憂貌􅖨微也虯無角龍也渠幽切又居幽切七觩上曲貌璆玉名觓角爵貌鷚爾雅云鷚天鸙郭璞云大如鷃雀色似鶉好髙飛作聲又音繆蟉􅝦蟉龍貌角貌彪虎文也甫烋切三髟髮垂貌又標彡二音驫馬走貌又音標鏐紫磨金也力幽切二蟉􅝦蟉又翹糾切樛説文曰下句曰樛詩曰南有樛木傳云木下曲也居虯切五説文曰相糾繚也今作丩同草之相糾繚也朻説文云髙大也㽱腹急病也淲水流貌亦作滮皮彪切三瀌雨雷貌又音鏕風貌稵禾生也子幽切一犙牛三歲山幽切一聱聱取魚鳥狀語虯切又玉苞切一飍驚風香幽切又風幽切二烋美也福祿也慶善也出玉篇又火交切繆詩傳云綢繆猶纒綿也説文曰枲十潔也武彪切又目謬二音三鷚天鸙鳥也又音虯䋷縛也二十一侵漸進也説文作侵又姓三輔決録有侵恭七林切七上同駸馬行疾也浸浸淫也又子鴆切䜷野生豆也錐也綅説文曰絳線也詩曰貝胄朱綅又子心息廉二切尋長也又尋常六尺曰尋倍尋曰常山海經曰尋木長千里生河邊又姓晉有尋曽字子貢徐林切十六上同出説文鐔劔鼻又姓漢有鐔顯又覃淫二音潯傍深又水涯也鱏魚名口在腹下又音淫樳木名似槐鄩地名在鞏又姓左傳有周大夫鄩肝小堆阜也􅴙姓也出纂文􅴋姓也姓苑云汝南人襑衣博大也枔木葉撏取也灊水名出巴郡又才心昨鹽二切鬵鼎大上小下又才心昨鹽二切續也林林木爾雅曰野外謂之林説文曰平土有叢木曰林又姓風俗通曰林放之後力尋切八琳玉名淋以水沃也臨蒞也大也監也又姓後趙録有秦州刺史臨深也淋淋病籃籃箊竹名瀶水出貌説文云谷也一曰寒也霖久雨琛琛寶也丑林切七棽木枝長又林森二音䑣船行私出頭視也又丑鴆切綝繕也郴縣名在桂陽又姓陶侃别傳有江夏郴寶賝賝賮也斟斟酌也益也又姓國語云祝融之後侯伯八姓斟姓無後賈逵注云斟姓是曹姓之後又漢復姓有斟弋氏出史記職深切九針針線針上同説文曰所以縫也鴜鳥名針針規也又姓風俗通云有衛大夫針莊子葴酸蔣草也瑊廣雅曰瑊石次玉也郭璞云瑊似玉之石司馬相如子虛賦曰其石則瑊玄礪鱵魚名斟斟鄩古國名沈沒也説文曰陵上滈水也又漢復姓魯有沈猶氏常朝飲其道何氏姓苑云今泰山人直深切又尸甚切九沉俗水牛莐爾雅曰􅙛莐藩郭璞云生山上葉如韭莐上同又羊針都敢二切霃久隂湛漢書曰旦從俗浮湛又徒減切枕繫牛杙也鈂鍾屬砧搗衣石也知林切五砧上同椹鈇椹斫木質文字指歸俗用為桑椹字非枮上同坫權安厝也諶誠也爾雅云信也氏任切七愖上同諶上同説文曰燕代東齊謂信曰諶忱上同煁煁烓行竈烓鳥圭切瘎腹內故病瘎上同任堪也保也當也又姓出樂安黃帝二十五子十二人各以德為姓第一為任氏如林切七鵀戴勝鳥也頭上毛似勝又女今切恁信也又音荏壬倿也又辰名爾雅曰太歲在壬曰玄􅘬紝織任亦作紝銋銋濡廣雅韏也䛘信也念也深逺也又水名出桂陽南平式針切二蒲蒻淫久雨曰淫書曰罔淫于樂傳云淫過也餘針切十五霪久雨淫淫蕩竹名蟫白魚蟲鷣鷂之别名莐熱也冘行貌上同䤁熟麴又昨淫切撢探也地名㸒貪也又延求切鐔劒鼻又尋覃二音鱏魚名又徐林切心火藏釋名曰心纎也所識纖微無不貫也息林切四久緩貌車軥木杺木名其心黃愔靖也挹淫切二韾聲和靖也祲日傍氣也子心切又子禁切九梫木名兓銘意埐説文地也又昨淫切雞之别名髙鼻綅縫線錐也魚名大魚曰鮓小魚曰一曰北方曰鮓南方曰昨淫切十鱗上同見説文鬵説文曰大釡也一曰鼎大上小下苦甑曰鬵嶜嶜嵒梣木名埐地名又子心切掘也鈂上同又直林切灊水名出巴郡䤁熟麴又餘針切䛘䛘詉喉聲女心切三紝紝織也齊也或作紝鵀戴勝琴樂器神農作之本五弦周加文武二絃白虎通曰琴禁也以禁止淫邪正人心也又姓左傳琴張也巨金切二十二擒急持擒上同擒亦同黔黑而黃亦姓齊有黔熬又巨炎切禽二足而羽者曰禽又姓髙士傳有禽慶芩黃芩藥名亭名檎林禽果名㕋説文云石地也鵭鶨鳥亦作鳹䔷草名根可緣竹器出玉篇澿水名凛寒狀又力甚切庈人名庈父雂鳥名又巨炎切㪁持也㱽禁也又竹甚切黚黃黑色又巨炎切䅾禾欲秀也耹音也靲靲鞻四夷樂也欽敬也又姓何氏姓苑云吳人也去金切五菳草名似蒿衾被也嶔嶔崟顉曲頥又五感切吟歎也説文云呻吟也魚金切十訡上同古文吟亦古吟字説文又巨錦切崟嶔崟水菜似蒜碞僭差􅷰霖雨又牛皆切乑衆立貌􅫏崟􅫏山崖狀也又口敢切歆神食氣也許金切四廞爾雅曰興也亦陳車服也亦廞巇山險貌又許錦切嬜愛也又火甘切㽎火盛貌金金寶説文曰五色金也黃為之長久薶不生衣百錬不輕從革不違西方之行生於土亦州名周為附庸國魏於委康縣置東梁州後周改金州又金鼓釋名曰金禁也為進退之禁也又姓古天子金天氏之後也又漢復姓有金留氏出姓苑居吟切九今對古之稱説文云是時也黅黃色襟衣小帶也又其禁切襟袍襦前袂䘳上同禁力所加也勝也又居蔭切𢙿心𢙿貌淺黃色説文云黃黑也又古咸切音説文曰聲也生於心有節於外謂之音宫商角徴羽聲也絲竹金石匏土革木音也於金切八隂隂陽也説文作隂暗也水之南山之北也又姓出武威風俗通云管修自齊適楚為隂大夫其後氏焉隌爾雅云暗也注謂隌然冥貌又烏感切瘖瘖啞文子曰皋陶瘖霠雲覆日又姓出纂文䜾䜷豆喑極啼無聲又於含切䤃醉聲又於南切森長木貌所今切十參參星亦姓丗本云祝融之後又蒼含切曑上同蔘人蔘藥也參古文槮樹長貌襳襳襹毛羽衣貌突也穼上同棽木枝長也又丑林切岑山小而髙又姓出南陽風俗通云古岑子國之後後漢有岑彭鋤針切九涔涔陽地名又管涔山名又蹄涔不容尺鯉蹄牛馬迹㞥入山深貌梣青皮木名又子心切上同雨聲魚名䅾禾欲秀笒竹名説文曰首笄也側吟切四簪上同㻸石似玉也撍速也嵾嵾差不齊貌亦作參楚簪切六參上同梫梫桂木花白也又音寢字書云禾長貌駸馬行疾貌槮木長貌説文云內視也充針切一二十二覃及也延也又姓梁東寧州刺史覃旡先徒含切二十邱丘覃邱丘覃城縣名潭水名出武陵郡潭城縣東入鬱林又深水貌曇雲布藫水衣橝木名灰可染也蟫白魚蟲又音淫談大也又姓漢有河南尹談閎𧽼䟃𧽼走貌燂火爇壜甒屬鐔劒口又音尋耽視近而志逺又音耽㽎㽎㽎室深貌聒也􅴭馣􅴭香氣􅙛草名爾雅曰􅙛莐藩蕁上同䊤糝也醰長味又徒紞切參參承參覲也俗作參倉含切五驂驂馬䟃䟃𧽼傪好貌㜗玉篇云婪㜗也南火方亦果名臨海異物志云多南子大如指紫色味甘似梅又姓魯大夫南遺也又漢復姓九氏左傳齊有南史氏其後為姓又魯有南宫敬叔晉國髙士全隱於南鄉因以為氏六國時有南公子著書言五行隂陽事莊子有南郭子綦又有南榮趎古有善暴背於南榮之者獻之於君其後為氏又有南伯子蔡姓苑有南野氏又有南門氏那含切七男男子也又所封爵也環齊要略曰男任詔事受王命為君柟木名又人詹切楠俗抩併持也又他含切䶲龜有距也又如詹切上同諳記也憶也烏含切十二䳺䳺鶉字林作䨄媕媕婀不決庵小草舍也腤煮魚肉也菴菴䕡草又菴羅果也㞄蹇跛之貌馣香也嬜貪愛韽聲小又於林切盦説文曰覆蓋也喑啼泣無聲含説文銜也胡男切二十二涵涵泳筨實中竹名筨上同梒梒桃禮亦作含函鎧別名孟子云矢人豈不仁於函人哉矢人唯恐不傷人函人唯恐傷人函容也禮云席間函丈顄顄頥上同蜬爾雅云螺小者曰蜬頷説文曰面黃也又胡感切涵水澤多貌鋡受也似瓶有耳船沒䶃鼠屬又古南切函銜也説文舌也肣排囊柄也説文同上䨡久雨上同􅝟説文曰嘾也草木之華未發函然象形又下感切寒貌婪貪也盧含切六婪上同燣焦色嵐州名近太原因岢嵐山為名有渥窪池出良馬亦山氣也葻草得風貌啉酒巡匝曰啉出酒律亦作𧖟吐絲蟲俗作蠶非昨含切四撏取也䣟亭名止也簪作含切又側岑切七撍盡也篸所以綴衣又作感切䐶腤䐶䍼羊腌鐕無蓋釘也探取也説文作逺取之也他含切三撢周禮有撢人貪貪婪也釋名曰貪探也探入他分也耽説文曰耳大垂也又耽樂也詩曰無與士耽或作耽丁含切九湛湛樂亦見詩耽視近而志逺也鴆嗜酒妉妉樂甔大罌可受一石媅淫過説文樂也內視又大含切多也龕塔也亦曰龍貌又云塔下室口含切十􅨹殺也刺也醜貌堪任也勝也克也説文曰地突也又姓風俗通云八元仲堪之後戡勝也克也和也又紅談古三二切嵁嵁崿又五男切瓨瓦器撖挂也㪁敧多也㟏大谷也火含切八􅤇面紅馠小香含笑貌谽谽谺谷空唅唅呀不脫冠帶而寐也􅵸上同毿長毛貌蘇含切三蔘蔘綏垂貌犙牛也弇同也蓋覆也後漢有耿弇古南切又音掩五䶃鼠名淦水入船中又最也泥也汲也又甘暗切吉州有新淦縣水所出入湖或作汵𣤭持意也又呼兼切蜬螺小者又貝居水者肉如科斗但有頭尾䜙不惠也又謔弄言五含切三寐中言語嵁嵁崿又苦男切二十三談談話又言論也戲調也又姓蜀録云晉有征東將軍談巴徒甘切十一郯國名其後以國為姓春秋時郯子入魯辨古官與孔子相遇姓苑云沛人惔憂也錟長矛淡水貌又徒覽徒濫二切痰胸上水病淡漢復姓孔子弟子有淡臺滅明又徒覽徒濫二切倓恬也安也靜也又徒監徒坎二切餤進也詩曰亂是用餤又徒濫切刮馬箆也㶣小熱甘説文作甘美也又隴右州本月支國漢胸奴觻得王所居後魏為張掖郡又改為州取甘峻山名之界有弱水祁連山上有松柏五木美水茂草冬溫夏涼又有仙樹人行山中飢即食之輒飽不得持去平居時亦不可見也又姓武丁臣甘盤之後又漢復姓有甘莊甘士甘先三氏古三切七柑木名似橘䇞䇞竹苷苷草藥出洮州泔米汁和也媣媣媞也擔擔負釋名曰擔任也任力所勝也都甘切五儋説文何也亦姓左傳周有大夫儋翩聸説文曰垂耳也南方有聸耳之國頕頰緩甔小罌三數名又漢復姓五氏三閭氏三閭大夫屈原之後也沛上計三烏群三烏大夫之後也三飯尞之後有三飯氏三州孝子之後有三州氏後單姓州蜀志有三丘務蘇甘切五參上同又七南所今二切俗作叄弎古文􅻋衣破襤􅻋鬖䰐鬖毛垂藍染草又姓戰國策有中山大夫藍諸魯甘切十一襤襤褸䰐鬢髮踈貌攬攬持籃籃籠長面􅬹􅬹鷜鳥名今俗呼郭公也懢懢貪貌䆾䆾䆱薄大儖儖儳形貌惡也灆瓜葅坩坩甒苦甘切一舑吐舌也他酣切九聃耳漫無輪又老氏名又姓左傳周大夫聃啓􅡭俗緂色鮮坍水衝岸壞𦶈蔥别名䆱䆾䆱薄大㴂㴥㴂峻波也􅶽蘫􅶽瓜葅慙愧也昨甘切五慚上同鏨小鑿䳻鶚别名㨻説文暫也酣酣飲應劭曰洽也張晏曰中酒曰酣又樂也胡甘切八甝白虎蚶桑蟲魽蛤也和也又口含古三二切煔火上行貌炶上同邯江湘人言也又音寒姏老女稱武酣切一長面貌昨三切一蚶蚌屬爾雅曰魁陸本草云魁狀如海蛤貟而厚外有文縱橫即今蚶也亦作魽呼談切五戲乞人物亦作斂嬜貪妄又一含切斂欲也憨癡也二十四鹽説文曰鹹也古者宿沙初作煮海為鹽亦州近北鹽池因以名之又姓魯國先賢傳有北海相鹽津余廉切十五鹽俗木名閻里中門又姓出天水河南二望壛壛榻也説文同上阽臨危簷屋簷説文曰簷㮰也簷上同櫩亦同步長廊也㶄説文云海岱之間謂相汙曰㶄離鳥自為牝牡也䦲語林云大夫向䦲而立説文曰䦲謂之樀樀廟門也㿕病走進也廉廉儉也釋名曰廉斂也自檢斂也亦姓趙有廉頗力鹽切二十鐮刀鐮也釋名曰鐮廉也薄其所刈似廉也鎌上同久雨簾㡙簾帷也簾簾箔釋名曰簾廉也自障蔽為廉恥也三秦記曰明光宫以金玉珠璣為簾箔薕薑也説文蒹也蘞白蘞藥又音斂蘞蔓草説文同上又音斂奩盛香器也又鏡奩也俗作奩籢上同赤礪石獫犬長喙又力劒切又音險獫狁也蠊蜚蠊蟲名説文作螊海蟲也長寸而白可食稴禾名車輞􅣠􅣠鼓鼓初打也簾靑簾酒家望子鬑鬋也一曰長貌覝察也砭以石刺病府廉切又方驗切二古文銛銛利也説文曰臿屬纂文曰鐵有距施竹頭以擲魚為銛也息廉切十三暹日光進也枮木名綅白經黑緯上同細又山韭也今通作韯凡從者倣此襳小襦纖細也微也憸利口孅鋭也細也䯹髮也彡毛飾又所銜切􅧴疾利口也籤説文驗也一曰鋭也貫也七廉切十臉臉􅌜也䑎上同鹼水和鹽又工斬切槧削皮又才敢七豔二切憸㤿憸詖也㤿音猒僉咸也皆也切割也㡨幖㡨記出字林譣譣詖詹至也應劭漢官曰詹事秦官也又姓楚詞有詹尹俗作詹職廉切六瞻瞻視占視兆也亦姓陳大夫子占之後又章豔切蟾蟾蜍蝦蟆也張衡靈憲曰羿請不死之藥於西王母恆娥竊之奔月宫遂託身於月是為蟾蜍抱朴子云蟾蜍壽三千歲者頭上有角頷下有丹書八字玄中記云蟾蜍頭生角者食之壽千歲也噡噡言語也厃説文云仰也一曰屋招也秦謂之桷齊謂之厃本魚毀切棎果名似奈而酸視占切三撏撏取也蟾蟾光月彩又職廉切苫草覆屋又凶服者以為覆席也又姓左傳魯季氏家臣苫夷失廉切三痁病又音店􅨺妗􅨺善笑貌又丑兼切䪜屏也處占切十一㚲㚲侈輕薄貌又尺涉切幨幨幃釋名曰牀前帷曰幨襜襜褕蔽膝裧上同􅢹􅢹􅢹衣動貌㾆皮剝也緂衣色鮮妗妗􅨺善笑貌又許兼切懘音不和也禮記作怗㡙也􅛂説文曰頰須也汝鹽切十二髯上同蚺大蛇呥噍貌柟梅也子如杏而醋􅠗多言蛅爾雅曰蟔蛅蟴郭璞云蠔屬也今靑州人呼蠔為蛅蟴冉説文云毛冉冉也亦作冉袡衣緣䶲有距龜㾆皮剝又處占切舑舚舑長舌黏黏麴女廉切三粘俗䬯南楚呼食麥粥炎熱也説文曰火光上也于廉切一霑霑濕也又濡也漬也張廉切三沾水名在上黨説文他兼切黃也覘窺視也丑廉切又丑豔切二􅨺􅨺妗喜貌淹漬也滯也久留也敗也央炎切六菴菴䕡草又音諳崦崦嵫山下有虞泉日所入又於檢切醃鹽醃又葅也䣍邑名閹男無勢精閉者􅢯􅢯㥓意不安也丘廉切二曲頭鑿􅬺齒差語廉切一尖鋭也子廉切十一殲盡也滅也瀸漬也沒也洽也又泉水出微貌㡨拭也􅳅􅳅㖩不廉又將艷切㖩子俱切漸入也漬也又慈染切虃百足草熸火滅㦰刺也鋭意也又持戈説文絶也􅬆小雨又霑也鑯説文曰鐵器也一曰鐫也鋟以瓜刻匱版也􅨾漬也或作又所咸切潛水伏流又藏也亦水名又姓姓苑云臨川人昨鹽切九朁於朁縣名屬杭州今作潛鬵甑也又才林切􅻔漂絮簀又音前灊水名在巴郡宕渠又古縣名在廬江又才林切䁮閉目內思燂周禮注云炙爛也古文螹螹蟲名箝鎖頭亦作鉗晉律曰鉗重二斤翹長一尺五寸又羌復姓有鉗耳氏説文籋也巨淹切十一鉗上同説文曰以鐡有所劫束也絹鉆持鐵者説文又敕淹切鐵鋤也一曰膏車鐵鉆黚淺黃黑色又古黚陽縣在武陵又巨今切拑脅持也黔黑黃色説文曰黎也秦謂民為黔首謂黑色也周謂之黎民又音琴羬羊六尺為羬鳹白喙鳥雂上同針針虎人名又之林切鈐兵鈐以閉房神府以備非常又鉤鈐星名説文曰鈐􅣾大犂也懕安也一鹽切七猒飽也又於豔切饜上同嬮和靜㤿㤿憸䅧䅧䅧苗美也含怒也又魚檢切燅説文曰湯中爚肉也徐鹽切九説文同上燖爓並同上蕁山菜摘物出字諟及聲類杉木細葉也小巾襳襳毛羽衣史炎切一㶣字林云小熱也直廉切三埤蒼云赤黃色誗言利美也又人名字書無針巨鹽切又音針一二十五添益也他兼切四沾説文曰水出壺關東入淇一曰沾益也黇黃色舚舚舑吐舌鬑鬢髮踈薄貌丁兼切八敁敁敠稱量占占侸輕薄也詀轉語㤴衣領又丁頰切􅙭上同耳小垂覘目垂又丁念切甜甘也徒兼切五恬靖也湉木靖菾菜名藥名鬑鬑勒兼切六薕薕蒹秀了荻草熑煣軔説文曰火煣車網絶也溓大水中絶小水出也説文曰薄水也一曰中絶小水濂薄也燫火不絶貌謙敬也讓也苦兼切二𣤭堅持意又呼廉切兼説文曰并也兼持二禾秉持一禾又姓衛公子兼之後古甜切七縑絹也説文曰并絲繒也鶼比翼鳥靑稻白米蒹荻未秀絲網鰜比目魚嫌説文曰不平於心一曰疑也戶兼切一稴稻不黏者又力兼切鮎魚名奴兼切三䬯説文曰相謁食麥也拈指取物也馦香氣許兼切七㿌㾰㿌病也䵌赤黃色馦香美欦貪欲也又笑也𣤭堅持意又契兼切妗美也二十六咸皆也同也悉也亦姓姓苑云巫咸之後今東海有之胡讒切十一鹹不淡醎俗函函谷關名又函書亦姓漢有豫章太守函熙又漢復姓漢末有黃門侍郎函治子覺又音含歡古縣名漢書只作咸諴和也鰜魚名稴不作稻也緘杯也緘上同輱車聲緘緘封古咸切七𣤭慳吝又堅持意口閉也瑊美石次玉玪上同尲尲尬行不正也黬釡底黑也説文曰雖晳而黑也古人名字晳攕女手貌所咸切十一摻上同詩曰摻摻女手又所減切檆木名似松爾雅又作煔杉上同櫼上同説文音尖楔也􅨾雨貌説文曰微雨也或作又子廉切微雨𥊀瞻視又所儳切車聲鞍垂貌㺑犬容頭進也􅰉犬吠聲乙咸切又乙陷切三淹淹沒黯深黑也又乙減切嵒巖也又嶄嵒山髙貌亦地名五咸切十䫡面長貌又丘檻切黬釡底黑也又音緘羬山羊熊虎絶有力也麙上同􅬺齒貌碞僣差又牛金切㺂羊有力也和也又戲言也𣢺笑貌許咸切五􅒕似蛤出海中也妗喜貌又香兼切􅢋􅢋谺谷空貌䩂出頭貌詀詀喃語聲竹咸切又尺涉切四䩇䩇䩂出頭貌鵮鳥啄物也又苦咸切鹹味喃詀喃也女咸切二喃上同讒譖也士咸切又士銜切十三獑獑猢似猿而曰又士銜切鏨小鑿又才三切饞不廉毚狡毚㺥上同鼻髙貌欃檀木別名攙刺也又楚銜切鼠名又埤蒼云鼠貌􅺜鳥􅺜物也儳儖儳貌惡也又仕陷切酁宋地名鵮鳥鵮物苦咸切五上同嵁嵁巖不平正貌厱山崖空穴間貌䫡長面二十七銜説文曰馬勒口中從金從行銜行馬者户監切二甉乾瓦屋也巉險也鋤銜切八嶄嶄嵒山貌劖刺也説文曰斷也一曰剽也艬合木船鑱吳人云犂鐵説文鋭也又士懺切獑獑猢又士咸切毚又士咸切饞饞氣説文曰小也一曰喙也又音懺巖峯也險也峻廊也五銜切三礹上同呻吟攙攙搶祅星爾雅作欃槍楚銜切又士咸切一衫衫衣所銜切八才帛靑色又音裁髟屋翼也又長髮貌縿絳帛説文曰旌旗遊也彡毛長芟刈草穇稴穇穗不實見齊人要術又所咸切監領也察也説文云臨下也古銜切又古懴切五礛礛䃴青礪視也鑑鑑諸以取月中水又明也㔋細切步渡水白銜切一嵌巖山也口銜切一二十八嚴嚴毅也威也敬也説文曰嚴令急也亦姓本姓莊避漢明帝諱改姓嚴語切二䉷射翳胡被也虛嚴切五杴鍬屬古作或作杴方言云青齊呼意所好為杴㿌㿌物在喉也禾傷肥也蘞芋之辛味曰蘞醃鹽漬魚也於嚴切二腌上同㪁㪁欹不齊丘嚴切又丘廣切二厱山側空處也二十九凡常也皆也輕也非一也又姓周公子凡伯之後姓苑云晉陵人符咸切七帆船上幔也亦作帆又扶泛切􅚁輕也又孚劒切􅻽船舷泛國名又姓出燉煌濟北二望皇甫謐云本姓凡氏遭秦亂避地於泛水因改焉漢有泛勝之撰書言種植之事子輯為燉煌太守子孫因家焉又音泛帆馬疾步柉木皮可以為索䒦草浮水貌匹凡切二多智慧也廣韻下平聲卷第二新添類隔今更音和切綿名延切中全切閍北盲切平僕兵切凡符芝切䒦敷凡切
