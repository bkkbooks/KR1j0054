  text: 廣韻下平聲卷第二蘇前先第一仙同用相然仙第二蘇凋蕭第三宵同用相焦宵第四胡茅肴第五獨用胡刀豪第六獨用古俄歌第七戈同用古和戈第八莫霞麻第九獨用與章陽第十唐同用徒郎唐第十一古行庚第十二耕淸同用古莖耕第十三七情淸第十四倉經青第十五獨用煑仍蒸第十六登同用都滕登第十七羽求尤第十八侯幽同用胡鉤侯第十九於虯幽第二十七林侵第二十一獨用徒含覃第二十二談同用徒甘談第二十三余廉鹽第二十四添同用他兼添第二十五胡讒咸第二十六銜同用戸監銜第二十七語嚴第二十八凡同用符咸凡第二十九一先先後也又姓左傳晉有先軫蘇前切又蘇薦切四躚蹁躚旋行皃蹮上同􅪗石次玉也前先也昨先切六歬古文騚馬四蹄皆白也湔湔葫藥名􅻔說文曰蔽絮簀也或作上同千十百也又漢複姓有千乗氏出何氏姓苑蒼先切九圱三里爲圱阡阡陌南北爲阡東西爲陌汘水名仟千人長也又仟眠廣逺也芊草盛谸說文曰望山谷之谸青也迁伺候也進也又迁葬又標記也杄木名箋說文曰表識書也則前切十五牋上同㮍古文瀳水名說文曰水至也又才薦切帴小兒藉也韉鞍韉淺淺淺流疾皃又倉翦切湔水名出蜀郡玉壘山旛幟小栗名趙魏閒語也轃大車簀也濺濺疾流皃又子賤切籛楚人革馬簻鞍韉又彭祖姓𣝕香木埤蒼云至也說文云自進極也天上玄也說文曰顚也至髙無上从一大也爾雅曰春爲蒼天夏爲昊天秋爲旻天冬爲上天他前切六􅔹䒶並古文􅨵􅨵􅨏語不正也吞姓也漢有吞景雲又湯門切詽詽訶皃堅固也長也強也又姓漢二十八將有揚化將軍潁川堅鐔古賢切十七鋻剛也又古宴切縣名在東萊又音弦㡉布名幵說文曰平也兩干對舉又羌名今作开同又音牽肩項下又任也克也作也媵也又姓出姓苑鳽鵁鳽鳥名又五革五堅二切豜大豕也一曰豕三歳􅢢上同猏俗菺茙葵也今蜀葵鹿有力又音牽麉上同鵳鶙鵳鷂屬鰹鮦大曰鰹小曰鮵鮵音奪䶬說文曰龍鬐脊上䶬䶬䌑緊也賢善也能也大也亦姓胡田切十七臤古文又口閒切弦弓弦五經文字曰其琴瑟亦用此字作絃者非說文作又姓風俗通云弦子後左傳鄭有商人弦髙晉有弦超絃俗見上注舷舩舷胘肚胘牛百葉也蚿馬蚿蟲一名百足亭名在密縣說文云急也􅿦自刎頸也伭說文作很也縣名又音堅草名婱婦人守志疾走礥艱險又剛強也痃痃癖病㘋難也煙火氣也烏前切十二烟上同古文籀文燕國名亦州又姓邵公奭封燕爲秦所滅子孫以國爲氏漢有燕倉又於薦切咽咽喉橪橪支香草驠馬竅白湮爾雅云落也又音因胭胭頂竹名閼閼氏單于適妻也氏音支蓮爾雅云荷芙蕖其實蓮落賢切八憐愛也又哀矜也怜俗嗹嗹嘍言語䌓絮皃縺縺縷寒具􅢑􅢑􅞻餅也􅖮縣在交趾零漢書云先零西羌也本力丁切田釋名曰土已耕者曰田田塡也五稼塡滿其中也又姓出北平敬仲自陳適齊後改田氏九代遂有齊國徒年切十九佃作田也說文云中也春秋傳曰乗中佃一轅車古輕車也又音甸畋取禽獸也又音甸盷地名在絳塡塞也加也滿也又陟陳切寘上同字統云寘顔府在北州闐轟轟闐闐盛皃䟧蹋地聲􅨏􅨏􅨵語不正也又他丹切鈿金花又音甸䡘䡘䡘衆車聲沺字林云沺沺水勢廣大無際之皃磌柱礎鷆蚊母鳥也嗔說文曰盛气也􅚳吕氏春秋云天子􅚳􅚳敐敐莫不載恱敐音軫滇滇汚次水皃又都年切貚貙屬搷擊也秊榖熟曰秊奴顚切三年上同郷名在馮翊顚頂也又姓左傳晉有顚頡都年切十五㒹上同齻牙齻儀禮曰右齻左齻鄭玄云齒堅也􅗬馬額白今戴星馬槇木上瘨病也癲上同滇滇池在䢖寧􅠆走頓巓山頂也驒驒騱野馬隕也又倒也傎上同蹎蹎仆說文跋也厧厧冢牽引也挽也連也亦姓晉有牽秀何氏姓苑云武邑人苦堅切九縴縴􅮗惡絮邢地名在河内􅊈水名在安定說文曰水出扶風西北入渭爾雅云􅊈出不流又苦薦切蚈螢火又古奚切鹿之絶有力者亦作麉掔固也厚也持也又音慳岍山名在京兆書曰導岍及𡵨雃說文曰石鳥一名雝􅖥一曰精􅍌又秦公子名士雃妍浄也美也好也五堅切八鳽鵁鶄也又古賢五革二切研磨也􅒍上同揅破醆也趼獸跡俓急也又牛耕切眠寐也莫賢切七瞑上同說文曰翕目也又音麵䏃埤蒼云注意而聽也矏爾雅曰密也上同䰓燒煙畫眉㝰不見蹁蹁蹮旋行皃部田切十二蠙蠙珠骿骿肋軿四面屏蔽婦人車又房丁切駢并駕二馬㼐黄瓜名胼胼胝皮上堅也跰上同楄木名食不噎又杜預云楄部棺中露牀也賆益也玭班珠或與蠙同琕上同淵深也管子曰水岀而不流曰淵又姓丗本有齊大夫淵湫烏玄切十􅺶上同囦古文㾓骨節疼也弲弓勢剈曲翦鼘鼓聲行皃䨊鳥羣蜎蜎蠉又歐泫切㳙說文曰小流也又姓列仙傳有齊人㳙子古玄切八睊視皃蠲除也潔也明也說文曰馬蠲蟲明堂月令曰腐草爲蠲草名䅌麥莖䳌杜䳌鳥焆明也鞙鞙馬尾也又胡犬切鋗銅銚火玄切五駽爾雅曰青驪駽郭璞云今之鐡騘㘣規也又辭㳂切梋椀屬矎直視邊畔也又邊陲也近也厓也方也又姓出陳留北平二望陳留風俗傳云祖干宋平公布玄切十四籩竹器水名出畨侯山甂小盆蝙蝙蝠仙䑕又名伏翼猵獺屬籬上豆也又北典切編次也又方泫切萹萹竹草又北泫切􅹿足趾不正身不正也牑牀上版也䟍說文走意蹁行不正皃又薄邊切玄黒也寂也幽逺也又姓列仙傳有玄俗河間人無影胡㳙切十三縣說文云繫也相承借爲州縣字懸俗今通用眩亂也又胡練切䮄馬一歳玹石次玉兹說文曰黒也春秋傳曰何故使君水兹本亦音滋按本經只作滋吴王次子名目童子也說文很也盷目大皃胘牛百葉又音弦訇說文云漢中西城有訇郷祅胡神官品令有祅正呼煙切二訮訶也怒也獸似豹而少文崇玄切一二仙神仙釋名曰老而不死曰仙仙遷也遷入山也故字從人旁山相然切十二僊上同又僊僊舞皃古文㲍罽也䉳竹名又音癬苮草名似莞躚舞皃秈秈稻鮮鮮㓗也善也又鮮卑山因爲國号亦水名水經曰北鮮之山鮮水出焉又姓後蜀録李壽司空鮮思明又漢複姓鮮于氏硟衦繒石也鱻說文曰新魚精也廯倉廩錢周禮注云錢泉也其藏曰泉其行曰布取名流行無不徧也又姓晉有歷陽太守錢鳯昨仙切二􅰏方言云鳴蟬也遷去下之髙也詩云遷于喬木七然切八古文上同􅿭地名櫏桾櫏木名䉦䇹䉦竹名韆鞦韆繩戲㿊痛也煎熟煑子仙切四湔洗也一曰水名出蜀玉壘山葏草茂皃出字林鬋女鬢垂皃然語助又如也是也說文曰燒也俗作燃又姓左傳楚有然舟何氏姓苑云今蒼梧人如延切九燃俗見上注􅛊猓􅛊獸名似猿白質黒文㜣姓也肰犬肉繎絲勞皃竹名䕼草名陸佐公石闕銘云刑酷炭延稅也逺也進也長也陳也言也亦州漢髙如縣取延川爲延安郡又姓漢有延篤南陽人爲京兆尹殺梁兾使者以然切十三埏際也地也又墓道亦地有八極八埏又音羶筵席也鋪陳曰筵藉之曰席狿獌狿大獸名郔地名在鄭綖冠上覆也蜒䖵蜒䘰㠾䘰牛領上衣鋋小矛又市連切䀽相顧視也上同䢭行皃莚草名􅊡厚粥也諸延切八饘上同旃之也爾雅曰因草爲旃郭璞云以帛練爲旒因其文章不復畫之也丗本曰黄帝作旃亦曲旗以招士衆也或作旜又姓出姓苑旜上同栴栴檀香木氈席也周禮曰秋斂皮冬斂革供其毳毛爲氈鸇晨風鳥􅷵江湘間人謂額也甄察也一曰免也居延切又章鄰切三薽草名一曰豕首又名彘盧籈竹器邅迍邅也又移也張連切又直連雉戰二切五同行難也說文曰赺也又直然切驙馬載重行難又白馬黒脊曰驙又徒安切鱣詩云鱣鮪發發江東呼爲黃魚上同潺潺湲水流皃士連切五孱不肖也漢書曰吾王孱王也小鑿䡲軒輞門聚羶羊臭也式連切八埏打瓦也老子注云和也挻柔也繫也和也取也長也或作煽扇扇涼又式戰切煽火盛也又式戰切鯅魚醬脠生肉醬又丑延切䘰㠾䘰牛領上衣又音延脠魚醢也說文云肉醬丑延切四梴木長鏈鉛礦也又力延切㢟說文曰安歩㢟㢟也鋋小矛方言曰五湖之間謂矛爲鋋市連切又以然切九單單于又丹善二音蟬蜩也禮記仲夏之月蟬始鳴季秋之月寒蟬鳴援神契曰蟬無力故不食也撣撣援牽引儃態也僤上同禪静也又市戰切澶杜預云澶淵地名在頓丘縣南又音纏嬋嬋姢好皃纏繞也又姓漢書藝文志有纒子著書直連切十緾俗餘皆倣此躔日月行也說文曰踐也瀍水名在河南鄽市鄽市門移也又張連切􅫢守宫别名廛居也說文曰一晦半也一家之居也㙻上同嘕笑皃許延切四仚輕舉皃說文曰人在山上也嫣長皃好皃又於䢖於逺二切􅲏飛皃連合也續也還也又姓左傳齊有連稱又虜複姓六氏西秦丞相出連乞都後魏書官氏志云南方宥連氏後改爲雲氏是連氏改爲連氏費連氏改爲費氏綦連氏改爲綦氏又有赫連氏力延切十三聮聮綿不絶說文作聮漣漣漪風動水皃翴翴翩飛相及皃鰱魚名㺦㺦猭兔走皃令漢書云金城郡有令居縣顔師古又音零鏈鉛礦又丑延切䃛上同㦁說文曰泣下也槤簃也又横關柱又木名齒露也㶌㶌水名出王屋山篇篇什也又姓周大夫史篇之後芳連切七偏不正也鄙也衺也又姓急就章有偏吕張翩飛皃媥身輕便皃㾫身枯扁小舟萹萹茿可食又補殄切便辯也僻也安也又姓漢有少府便樂成房連切又去聲九緶縫也楩木名平書傳云平平辨治也又皮明切諞巧言又符蹇切㛹㛹姢美好箯竹輿􅵙􅵙䗠沙蝨也亦作楄木名食之不咽緜精曰緜麤曰絮說文曰聮微也又姓晉張方以綿思爲腹心武延切十七綿上同棉屋聮棉又木棉樹名吴録云其實如酒杯中有棉如𧖟綿可作布又名曰繅羅浮山記曰正月花如芙蓉結子方生葉子内綿至𧖟成即熟廣州記云枝似桐枝葉如胡桃葉而稍大也謾欺也矊瞳子黒又矊眇逺視蝒馬蜩蟬中最大上同說文曰􅢤蚗蟬屬矏密緻皃忘也芇說文曰相當也今人賭物相折謂之芇宀深屋䫵雙生櫋說文曰屋聮櫋也木名臱視逺之皃㮌木名密也全完也具也又姓吴有大司馬全琮疾縁切七仝上同見說文泉水源也又錢別名貝也白質黄文牷牛全色書傳云體完曰牷䀬目眇視皃葲􅰠葲草也宣布也明也徧也通也緩也散也須縁切九揎手發衣也㩊上同䳦䳦小鳥音旬愃吴人語快說文曰寛􅈺心腹皃面圎也頭圎也瑄爾雅曰璧大六寸謂之瑄郭璞曰漢書所云塇玉是也䳦䳦額鐫鑚也斵也子泉切四鋑古文朘縮肭剶􅽒也又丑全切翾小飛許縁切九儇智也疾也利也慧也又舞皃弲角弓皃蠉蟲行皃疾走皃嬛便嬛輕麗皃又音姢音瓊譞智也頨頨妍美頭目童子也堧江河邊地又廟垣或從需餘同而縁切六䙇促衣縫也田耎城下田也瑌瑌珉也士佩也撋摧物也繎繎絲難理穿通也孔也昌縁切三川山川也蔡邕月令章句曰衆流注海曰川釋名曰川者穿也穿地而流也灥三泉沿從流而下也與專切十二㳂上同鉛說文曰青金也一曰錫之類也鈆上同櫞拘櫞樹皮可作粽埤蒼云果名似橘捐弃也鳶鴟類也蝝蝗子一曰蟻子縁縁由又羊絹切䱲魚名檀也單也政也誠也獨也自是也亦姓吴刺客專諸職縁切十二甎甎瓦古吏考曰烏曹作甎顓顓頊又姓神仙傳有太玄女姓顓頊名和篿楚詞云索瓊茅以筵篿王逸云折竹卜曰篿又音團嫥可愛之皃諯說文曰數也一曰相讓又尺絹市專二切湍水名在鄧州又音煓膞膞鳥胃也鱄魚名專諸吴刺客或作鱄鷒鳥名又徒端切斷首出玉篇鄟邾䣚邑名遄速也疾也市縁切八篅說文曰以判竹圜以盛榖也圌上同諯又職縁尺絹二切輲無輪車名輇上同椯木名歂字林云口氣引也又姓史記有歂師貟說文作員物數也王權切又云連二音四圜天體圎上同湲潺湲恮曲卷也莊縁切四跧屈也伏也蹴也䀬目眇視也蟤蜿蟤蛇名栓木丁也山貟切二車軸也猭㺦猭兔走皃丑縁切二剶去木枝也乾天也君也堅也渠焉切又音干九虔恭也固也殺也說文曰虎行皃又姓陳留風俗傳云虔氏祖於黄帝犍犍爲縣在嘉州鰬魚名聚名在河東聞喜也騝騮馬黄脊榩廩也構木爲之鍵鑰也又音件揵小鑿䳻鶚别名㨻說文暫也酣酣飲應劭曰洽也張晏曰中酒曰酣又樂也胡甘切八甝白虎䗣桑蟲魽蛤也和也又口含古三二切煔火上行皃炶上同邯江湘人言也又音寒姏老女稱武酣切一長面皃昨三切一蚶蚌屬爾雅曰魁陸本草云魁狀如海蛤貟而厚外有文縱横即今蚶也亦作魽呼談切五戲乞人物亦作歛嬜貪妄又一含切歛欲也憨癡也二十四鹽說文曰鹹也古者宿沙初作煑海爲鹽亦州近北鹽池因以名之又姓魯國先賢傳有北海相鹽津余廉切十五塩俗木名閻里中門又姓出天水河南二望
