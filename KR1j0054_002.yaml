body:
  text: 壛壛榻也說文同上阽臨危檐屋檐說文曰檐㮰也簷上同櫩亦同步長廊也㶄說文云海岱之閒謂相汙曰㶄離鳥自爲牝牡也䦲語林云大夫向䦲而立說文曰䦲謂之樀樀廟門也㿕病走進也廉廉儉也釋名曰廉斂也自檢斂也亦姓趙有廉頗力鹽切二十鐮刀鐮也釋名曰鐮廉也薄其所刈似廉也鎌上同久雨㡘㡙㡘帷也簾簾箔釋名曰簾廉也自障蔽爲廉恥也三秦記曰明光宫以金玉珠璣爲簾箔薕薑也說文蒹也薟白薟藥又音斂蘞蔓草說文同上又音斂匳盛香器也又鏡匳也俗作奩籢上同挑撥朓月出西方又吐了切恌轉薄􅝁斗旁耳又爾雅云􅝁謂之疀古田器也郭音鍫庣不滿之皃銚田器趒雀行又他弔切聎耳疾蓧苗也貂䑕屬出東北夷又姓出姓苑都聊切二十二䯾小兒留髮斷穗刁軍器纂文曰刁斗持時鈴也又姓出渤海風俗通云齊大夫豎刁之後俗作刀琱琱琢凋凋落鯛魚名䂏短尾犬也雕鶚屬又姓漢武帝功臣表有雕延年鵰籕文蛁蛁蟟茆中小蟲彫彫刻亦作雕說文云短衣也死人衣䒒葦華也又音調葫茭實􅊑吴船鷯剖葦求蟲食似雀青班色㚋大也多也奝上同弴天子弓也說文曰畫弓也詩又作敦又丁昆切瞗熟視迢迢遰徒聊切二十二條小枝也貫也教也爾雅云柚條似橙而實酸又姓左傳殷人七族有條氏後趙録冉閔司空條攸姓苑云安定人樤柚條或從木髫小兒髪俗行齠跳躍也鋚紖頭銅飾䖺䖺䗤狀如黄蛇魚翼出入有光見則大旱出山海經蜩大蟬佻獨行皃詩曰佻佻公子趒說文曰雀行也苕苕菜詩云卭有旨苕芀葦華調和也又姓周禮有調人其後氏焉又徒料切鮡魚名岧岧嶤山髙皃䯾多髪皃又音凋音綢䩦革轡詩云䩦革沖沖嬥聲類云細腰皃田器㲖毛皃􅓒草木實垂􅓒􅓒然也鰷白鰷魚名驍驍武也古堯切九梟說文云不孝鳥也故日至捕梟磔之从鳥頭在木上人姓隋煬帝誅楊玄感改其姓爲梟氏到懸首漢書曰三族令先黥劓斬左右趾首𦵔其骨謂之具五刑澆沃也薄也憿憿幸或作儌又作僥倖釗覿也逺也亦弩關一云周康王名又作䙼又指遥切邀遮也又於宵切蟂水蟲似蛇四足能害人也徼求也抄也又音呌聊語助也亦姓風俗通有聊倉爲漢侍中著子書又有聊氏爲穎川太守著萬姓譜落蕭切四十二耳中鳴也又力刀切膋腸間脂也膫上同飉風也遼逺也又水名憀無憀賴也竂穿也寥空也又寂寥也寥廓也料料理也量也又郎弔切㙩周垣橑蓋骨亦椽也又力道切撩取物又理也摷擊也又側交切廖人名左傳有辛伯廖又力救切僚同官爲僚又姓左傳晉陽氏大夫僚安寮上同鐐有孔鑪又紫磨金也爾雅曰白金曰銀其美謂之鐐簝宗廟盛肉方竹器豂空谷鷯鷦鷯􅚠竹名璙玉名嫽相嫽戲也又力弔切漻水清也蟟蛁蟟膫目明也䜮谷名草木踈莖細長嶚嶚􅥲山皃翏高飛皃繚繚綾經絲出字林憭空皃獠夜獵也又知卯盧皓二切髎臗骨名􅢏崖虚蟧馬蟧大蟬草器又力戈切􅰴㨂擇嘹嘹亮聞逺聲又力弔切熮說文曰火皃堯至髙之皃謚法曰翊善傳聖曰堯五聊切五嶢嶕嶢山危僥僬僥國名人長一尺五寸一云三尺垚土髙皃顤頭髙長皃膮豕美也詐幺切七嘵懼聲詩曰子維音之嘵嘵憢憢憢懼也㚠長大皃臉腫欲潰也䎄䎄毛皃䫞大額又去遥切幺幺麼小也於堯切五怮怮怮憂也又一蚪切葽草盛皃䱂魚名望逺也鄡鄡陽縣名在鄱陽又姓出何氏姓苑苦幺切五縣名在鉅鹿郡玉篇云擊也墽地名說文磽也寥空也四宵夜也相邀切二十消滅也盡也息也霄近天氣也捎摇捎動也又使交切逍逍遥痟痟渇病也司馬相如所患綃生絲繒也銷鑠也焇上同硝硭蛸藥名蛸螵蛸蟲也爾雅注云一名􅡯蟭亦姓南齊武帝改其子巴東王子響爲蛸氏又所交切莦草名又使交切哨口不正也又七笑切鳥毛羽也鮹魚名又所交切􅽌狂也出文字集略䴛煎鹽揱長皃又色交色角二切奞張羽又先準切魈山魈出汀州獨足鬼超說文曰跳也又姓漢有太僕超喜敕肖切六怊悵恨欩健也細絲鳴也䫿凉風朝早也又旦至食時爲終朝又朝鮮國名亦姓左傳有蔡大夫朝吴陟遥切又直遥切二古文􅏯蒼頡篇云蟲名亦姓風俗通云衞大夫史􅏯之後漢有􅏯錯直遥切又陟遥切五晁上同鼂古文朝朝廷也禮記曰諸侯於天子五年一朝又姓唐有拾遺朝衞潮潮水嚻喧也許嬌切又五刀切十枵玄枵虚危之次歊熱氣說文曰歊歊氣出皃毊犬磬也爾雅注云形如犂錧以玉石爲之又音喬獢猲獢短喙犬也犬黄白色藃草皃又火交切呺㕺然大皃炊氣虈白芷别名樵柴也說文木也昨焦切十五上同劁刈草憔憔悴瘦也顦上同䏆耳中聲又音曹譙國名又姓蜀有譙周嶕嶕嶢􅥲嶚巢山髙皃又音巢鐎又音焦􅼜縣名僬又音焦䩌面枯皃又音焦撨取也菬草名驕馬髙六尺舉喬切九嬌女字亦態憍憐也恣也本亦作驕穚禾秀鷮鷮似雉而小走鳴長尾蕎藥名一名大㦸喬爾雅云句如羽喬郭璞曰樹枝曲卷似鳥毛羽簥大管名也撟舉手焦傷火也又姓周武王封神農之後於焦後以國爲氏出南安即消切十七籀文㲬兠鍪上毛飾蕉芭蕉膲人之三膲鷦鷦鵬南方神鳥似鳯又鷦鷯小鳥上同椒木名爾雅云檓大椒又椒榝醜莍莍實也應劭漢官儀曰皇后稱椒房以椒塗壁取其温也又山巓亦姓楚有大夫椒舉茮上同噍啁噍聲鐎刀斗也温器三足而有柄蟭􅡯蟭螗蜋卵也䩌面䩌枯也灼龜不兆也亦作龜僬義見僥字燋傷火說文曰所以然持火也䌭生枲也饒益也飽也餘也又姓風俗通云漢有饒斌爲漁陽太守如招切六橈楫也又女教也襓劒衣牛馴伏又而紹切蟯人腹中蟲蕘蒭蕘燒火也然也式招切又式照切二瓜名遥逺也行也餘昭切三十六媱美好傜使也役也又喜也或作繇於也由也喜也詩云我歌且繇颻飄颻氣出皃窯燒瓦窯也窰上同䔄蒲葉也又草也芅萇楚今羊桃也爾雅作銚珧玉珧蜃甲鰩文鰩魚鳥翼能飛白首赤喙常游西海夜飛向北海銚燒器亦古田器又姓後漢衛尉潁川銚期又徒弔切姚姚恱美好皃又舜姓今出吴興南安二望左傳有鄭大夫姚句耳摇動也作也又姓東越王摇句踐之後謡謡歌也爾雅云徒歌謂之謡軺說文曰小車也又音韶愮憂也悸也邪也惑也恌上同疾行又音由或作繇陶臯陶舜臣又徒刀切蘨草茂也又音由瓜也鷂大雉名爾雅云青質五彩皆備成章曰鷂又音曜洮五湖名風土記云陽羡縣西有洮湖别名長塘湖義興記曰太湖射湖貴湖陽湖洮湖是爲五湖烑光也座也弓利㫍旗旒榣木名嗂樂也說又喜也䠛跳䠛行歩皃瑶羙玉猺獸名又獏猺狗種也餆餆餌食褕褕狄后衣亦作榆韶舜樂也紹也市昭切十㲈上同佋廟佋穆也或作昭父昭子穆孝經䟽云昭明也穆敬也故昭南向穆北向孫從父坐又市沼切草名卜問玿美玉擊也軺使車又音遥柖說文曰樹皃又射的也㸛㸛牀别名昭明也光也著也覿也又姓楚詞昭屈景三族戰國䇿楚有昭奚恤止遥切七鵃鶻鵃鳥也又竹交切鉊淮南呼鎌招招呼也來也又姓漢有大鴻臚招猛釗逺也見也勉也亦弩牙又周康王名盄玉篇器也皽皮上膜飊風也俗作飈甫遥切十五標舉也又木杪也又必小切猋群犬走皃杓北斗柄星天文志云一至四爲魁五志七爲杓又音漂瘭瘭疸病名幖頭上幟也熛飛火㠒山峯輕行蔈爾雅曰黄華蔈郭璞云苕華色異名也驫衆馬走皃腫欲潰也旌飛揚皃贆貝居陸也髟髪長皃又所銜切鑣馬銜甫嬌切七上同臕脂臕肥皃儦行皃詩云行人儦儦瀌雪皃詩云雨雪瀌瀌􅵲除田薉也亦作穮藨萑葦秀爾雅云猋蔍芀瓢瓠也方言云蠡或謂之瓢論語曰一瓢飲符霄切六飄老子曰飄風不終朝注云疾風也剽爾雅云中鏞謂之剽又小輕也或作薸方言云江東謂浮萍爲薸槖也又公浪切螵螵蛸蟲名又撫招切蜱蟲名彌遥切五䖢𧖟初生也篻竹名㠺玉篇云細網也工雀苗田苗亦夏獵曰苗又求也衆也未秀也亦姓風俗通云楚大夫伯棼之後賁皇奔晉食采於苗因而氏焉武儦切五描描畫也又音茅緢說文曰旄絲也貓獸捕䑕又爾雅曰虎竊毛謂之虦猫又武交切猫俗要俗言要勒說文曰身中也象人要皃由之形今作腰又姓吴人要離之後漢有河南令要兢於霄切又一笑切九腰見上注亦作腰葽秀葽草也喓蟲聲蛇名䙅䙅襻邀邀遮又音梟䳩鳥名似山鷄而長尾蟯腹中蟲又如消切鴞鴟鴞于嬌切二郷名在淯陽喬髙也說文曰髙而曲也又虜姓前代録云匈奴貴姓喬氏代爲輔相巨嬌切十六橋水梁也又姓出梁國後漢有太尉橋玄趫善走又去遥切僑寄也客也㝯上同鐈似鼎長足鷮雉名又音驕㠐亦作嶠山銳而髙又其廟切毊大磬又虚驕切轎小車嬌廣雅云禹妃之名又音驕蕎蕎麥又音驕蟜蠪蟜螘也蠪音龍蹻驕也慢也又巨虐切飛皃䀉盂也鍫臿也亦作􅯘七遥切七鐰上同篍吹竹䇶又音秋幧歛髮謂之幧頭亦作幓㡑上同生麻抄飯匙妖妖豔也說文作􅯾巧也今從夭餘同於喬切五祅祅災枖說文云木盛皃詩云桃之枖枖本亦作夭訞巧言皃夭和舒之皃又乙矯切蹻舉足髙去遥切又其略切六繑說文云絝紐也趬行輕皃蹺揭足䫞額大皃又火幺切㚠長大皃又火條切怊奢也尺招切又敕朝切二弨弓弛皃詩云彤弓弨兮說文曰火飛也周禮注云輕土地之輕脃也今作票同撫招切二十一漂浮也亦作杓北斗柄星􅥝風吹皃嫖身輕便皃旚旌旗動皃犥牛黄白色也又敷沼切鏢刀劒鞘下飾也僄輕也又匹妙切􅝎鳥飛飄飄颻慓急也彯彯彯長組之皃摽字統云擊也說文曰輕行也上同翲鳥飛瞟瞟睽明視螵螵蛸嘌疾吹之皃腫欲潰也翹舉也懸也危也又鳥尾也渠遥切六荍草名今荆葵也蓮草也嘺不知䎗側飛凡也燎庭火也力昭切又力照切二髎髖骨也又音聊趫善走又縁木也起嚻切又巨憍切四憍紆也橇蹋樀行又禹所乗也鞽上同五肴骨醴也又葅也凡非榖而食曰肴亦啖也胡茅切十九餚上同崤崤函山名在弘農茅根殽溷殽雜也和也亂也洨水名出常山又縣名在沛郡筊竹索姣姣媱猇虎聲又縣名在濟南又直支切㮁㮁桃梔子爻易卦六爻淆混淆濁水笅小簫一十六管胶字書云胶聲也􅾖沽也䋂黄色倄痛聲㤊快也䂚石名交戾也共也合也領也古肴切二十二蛟龍屬漢書曰武帝元封五年自於㝷陽浮江親射蛟江中獲之茭說文曰乾芻也又爾雅曰茭牛蘄郭璞云今馬蘄葉細銳似芹亦可食鵁鵁鶄鳥膠膠漆亦大學也又姓史記紂臣膠鬲鮫魚名皮有文可飾刀咬鳥聲郊邑外曰郊䍊樂器以土爲之雙相黏爲䍊也轇轇轕㦸形漻㶀㵧水皃䢒說文㑹也敎效也又古孝切䉰竹圍索名米餅摎束也撓也又音留鉸鉸刀又古卯切佼交也又古卯切芁秦芁藥名詨誇語也又音哮嘐詩云雞鳴嘐嘐囊也巢說文曰鳥在木上曰巢在穴曰窠爾雅曰大笙謂之巢又縣名在廬江亦姓有巢氏之後左傳楚有巢牛臣鉏交切八轈兵車若巢以望敵也勦輕捷也又子小切􅥲山髙皃蒜束樔說文曰澤中守艸樓􅳖地名在聊城鄛鄉名在南郡鐃鐃似鈴無舌女交切九呶喧呶譊爭也又恚呼也怓心亂䴃鳭䴃鳥名也鳭音嘲沙藥名上同􅼌􅼌捽也㺜犬多毛又奴刀切梢船舵尾也又枝梢也所交切十七捎蒲捎良馬名也亦芟也又音霄髾髮尾輎兵車旓旌旗旒也弰弓弰䈰飯帚筲斗筲竹器鞘鞭鞘蛸蠨蛸喜子鮹海魚形如鞭鞘䘯衣袵綃帆維又音宵颵風聲莦說文惡草皃又音消娋小娋偷也􅸧齊人呼姊茅草名左氏傳曰前茅慮無明又姓史記秦有茅焦莫交切八蝥螌蝥蟲名貓又武瀌切犛牛名又力之切罞麋罟也鶜鶜鴟鳥也描打也出玉篇媌美好皃虓虎聲許交切十六猇上同髇髇箭藃禾傷肥又音嚻穘上同窙髙氣嗃嗃謈恚也䬘風䬘䬘也哮哮闞庨庨豁宫殿形狀灱乾也又熱也涍水名在南嘐誇語也顤䫜顤胡人面也鴟似鳧腳近後不能行㹲豕驚包包裹亦姓楚大夫申包胥之後後漢有大鴻臚包咸布交切五胞胞胎又匹交切枹爾雅注曰樹木叢生枝節盤結詩云枹有三枿又楊枹菜苞叢生也豐也茂也又苞筍又姓勹包也象曲身皃胞胞胎匹交切九邑名說文布交切地名䍖覆車網也又縛謀切脬腹中水府拋拋擲泡水上浮漚說文曰水出山陽平樂東北入泗又音庖􅫋盛也擊也藥名𫾣擊頭也口交切十一跤脛骨近足細處骹上同膠面不平也㤍㤍㤉伏態皃磽石地䂭䂭礉戍名今濟州是也出音譜礉上同鄗邑名又杜預云山名在滎陽縣西北又音郝墝墝埆塉土頝頝䫜頭不媚也聱不聽也五交切又五勞切語彪切四謷不肖也又五勞切磝䂭磝蒼頡篇云擊也􅸞耳中聲側交切五罺抄網􅎲􅎲掐小兒聲摷擊也嘲言相調也陟交切五䞴䞴趟跳躍趟竹窅切啁說文曰啁嘐也鳭鳭䴃黄鳥鵃鶻鵃似山鵲而小短尾至春多聲䜈代人說也楚交切六抄略也又初敎切鈔上同􅬿􅬿取訬徤也䰫疾皃庖食厨也薄交切十七咆咆虓熊虎聲匏瓠也可爲笙竽炮合毛炙物也一曰裹物燒炰上同鉋鉋刷瓟似瓠可爲飲器麃獸名似鹿掊手掊颮風聲鞄鞄皮說文云柔革工也狍獸名羊身人面目在腋下跑足跑地也捊引取亦作抱尥牛脛相交也又力釣切泡水名又匹交切㯡赤黒之漆䫜頭凹也於交切九㕭㕭咋多聲坳地不平也窅深目皃又烏了切軪軪軋竒皃文車聲也眑靣目不平又於糾切咬滛聲梎梎柌鐮柄目深䫸熱風敕交切二嘮嘮呶讙也顟顤顟胡人面狀力嘲切四􅫋盛也窌深空之皃賿謎語云錢又力絞切䄻禾穭生直交切穭音吕一六豪豪俠說文曰豕鬣如筆管者亦州名屬九江郡古鍾離國與吴爭桑而滅隋改爲州山海經云渠猪之山多豪魚赤尾赤喙有羽胡刀切十三號大呼也又哭也詩云或號或呼易云先號咷而後笑又乎到切毫長毛嘷熊虎聲獋上同濠城濠又水名壕上同大面皃音刀木名崤山名在弘農又胡交切郷名在南陽􅭍俊健壑髙上也崇也逺也敬也又姓齊太公之後食采於髙因氏焉出渤海漁陽遼東廣陵河南五望又漢複姓髙堂氏出泰山古勞切二十一膏脂也元命包曰膏者神之液也又澤也肥也皐髙也局也澤也詩云鶴鳴九臯言九折澤也又姓皐陶之後左傳有越大夫臯如皋上同羔羊子餻餻糜􅟬㟉古亭櫜韜也一曰車上囊咎臯陶舜臣古作咎繇鼛役事車鼔長丈二尺詩曰鼔鐘伐鼛傳云鼛大鼓也鷱􅟇鷱鳥名篙進船竿橰桔橰見也葛之白花㤓知也局也䆁今之餹䬾曰䆁格木名倃毀也䓘白䓘草食之不飢郷名在范陽勞羌又清汰也韜藏也寛也說文曰劒衣也縚上同謟疑也滔漫也又水流皃叨叨濫弢弓衣馬行皃㹗牛羊無子又昌來切牛行遟皃慆恱樂絛編絲繩也幍上同䀺目通白也槄木名爾雅云槄山櫌今山楸也蜪爾雅曰蝝蝮蜪郭璞曰蝗子未有翅者又音陶夲說文曰進趣也从大十大十者猶兼十人也上同綢爾雅曰素錦綢杠郭璞曰以白地錦韜旗之竿又音紬搯搯捾周書云師乃搯捾捾烏活切翢羽葆幢又徒刀切瑫玉名􅠭􅠭滑也又腰鼔大頭名䈱牛􅞠古器詜詜䛬言不節挑挑達往來相見皃詩曰挑兮達兮又條了切刀釋名曰刀到也以斬伐到其所也說文云兵也都牢切七魛魚名忉憂心皃裯說文曰袛裯短衣又直流切襌被也舠小船大面皃朷木心騷愁也蘇遭切十三搔爮刮繅繹繭爲絲繰上同俗又作縿縿本音杉臊腥臊鰠魚名溞淅米颾風聲鱢鯹臭說文曰船緫名也亦作搜䑹上同亦作艘驕也慅恐懼袍長襦也薄襃切三袌上同軳戾也又車軫也襃進揚美也說文作衣博裾也又姓禹後因國爲氏博毛切四褒俗吴主四子字名盟也地名陶陶甄尸子曰夏桀臣昆吾作陶周書神農作瓦器又陶正官名齊職儀曰左右甄官署掌塼瓦之任也又喜也正也化也亦姓陶唐之後今出丹陽徒刀切二十五䛬詜䛬言不節說文曰往來言也一曰小兒未能正言也一曰祝也䛌上同咷號咷桃果木名鄴中記石虎苑中有句鼻桃重二斤又姓何氏姓苑云今西陽人後趙石勒將有桃豹綯爾雅曰綯絞也謂糾絞繩索也燾覆燾也又徒到切逃去也避也亡也鼗大者謂之麻小者謂之料又小鼓著柄者鞀鞉並上同濤波濤掏掏擇檮春秋傳云檮杌杜預曰凶頑無儔匹之皃騊說文曰騊駼北野之良馬又山海經曰北海有獸狀如馬名騊駼萄蒲萄翿纛也亦作翢舞者所執也又音導䬞大風匋養也啕多言翢羽葆幢又音􅠭錭錭鈍也駣馬四歳也蜪蝗子裪橘裪衣袖糟粕也作曹切九􅙤上同醩俗遭遭逢㷮火餘木也槽果華實相半也又才刀切傮終也上同㡟藉也敖㳺也說文作􅨝亦姓顓頊大敖之後或作遨五勞切二十五遨上同翶翶翔聱不聽又五交切驁駿馬熬煎也嶅山多小石獒犬髙匹尺滶水名出南陽魯陽縣蔜䌓縷蔓生或曰雞腸草也鷔不祥鳥白身赤口也鼇海中大鼇螯蟹屬謷不省語也又哭不止悲嗸衆口愁也嗷上同䫨髙頭也􅷈戟鋒摮擊皃嫯慢也䦋長大皃船接頭木上同􅚺蟹大腳也鰲魚名曹曹局也又輩也衆也群也亦州名蓋取古國以名之又姓本自顓頊玄孫陸終之子六安是爲曹姓周武王封曹挾於邾故邾曹姓也魏武作家傳自云曹叔振鐸之後周武王封母弟振鐸於曹後以國爲氏出譙國彭城髙平鉅鹿四望昨勞切十四􅔟古文槽馬槽螬蠐螬蟲嘈喧嘈鐰鐡剛折也䄚祭也先也艚船艚䏆耳鳴髙也䐬䐬脃蓸草名漕衞邑名又水運曰漕又昨到切褿帬也􅠉埋物灰中令熟於刀切三䥝銅瓫說文云温器也鏖上同猱猴也奴刀切八㺜長毛大又音鐃上同巎山名嶩平嶩山名在齊出地理志峱上同玉名獿獸名尻說文脽也苦刀切二訄戲言操操持七刀切又七到切四幧所以裹髻又七摇切􅛴平持㡟藉也㯱囊張大皃普枹切四藨醋莓可食䫽輕皃毛起皃出聲譜七歌禮記曰舜作五弦之琴以歌南風釋名曰人聲曰歌歌者柯也以聲吟詠上下如草木之有柯葉兖冀言歌聲如柯古俄切十一謌上同柯枝柯又斧柯又姓吴公子柯盧之後何氏姓苑云吴人也又虜姓後魏書柯拔氏後改爲柯氏望在河南妿女師以敎女子㤎法也棤也菏澤水在山陽湖陵縣牁所以繫舟又牂牁郡名戕陸云上同滒多汁哥古作歌字今呼爲兄也鴚鴚鵝蹉蹉跌也七何切七瑳玉色鮮白也又七可切搓手搓碎也磋治象牙曰磋溠水名在義陽傞舞不止皃又素何切齒跌出字統多衆也重也又貝多樹名葉如枇杷葉得何切三姓也漢有宗上同娑婆娑舞者之容素何切十一挱摩挱挲上同傞舞不止皃又千何切􅶶􅶶鞄樂器亦謂馬尾獻獻鐏見禮記亦作犠䓾䓾蔢草木盛皃行也又舞不正桫桫㦬木名出崐崘山䤬䤬鑼銅器渻偷視也駝駱駝外國圖云大秦國人長一丈五尺好騎駱駝俗從㐌餘同徒河切三十三駞俗鼉說文曰水蟲也似蜥蜴而長大􆂈􆂈貟紽絲數詩云素絲五紽鮀魚名陀陂陀不平之皃陂普何切驒連錢騘說文曰驒騱野馬也又丁年切䍫似羊四耳九尾沱滂沱大雨也詩云月離于畢俾滂沱矣又爾雅云江爲沱謂江水出别爲沱也跎蹉跎詑欺也池虖池水名在并州界出周禮又音馳酡飲酒朱顔皃㼠瓦盌䭾䭾騎也迱逶迱行皃鼧䑕名又託何切袉裾也又達可切緧䡐疾馳􅥰如人羊角虎瓜佗委委佗佗美也又託何切醝白酒也昨何切十九㽨殘薉田也瘥病也又初介切䣜䣜縣名在譙郡或作鄼鄼本音賛􅦹小疫病也鹺禮云鹽曰鹹鹺嵳嵳峩蒫薺實又子邪切􅓕籠屬艖小舸蔖爾雅曰蓾蔖郭璞曰作履苴草又采古切蓾音魯䴾榖麥浄也暛擣也䠡蹋也躦上同虘虎不柔也又才都切齒跌齹齒本䰈髮多皃莪草名似斜蒿詩云蓼蓼者莪五何切十三哦吟哦娥美好也又姓後魏將軍娥清䄉上同峩嵳峩鵝說文曰鴚鵝也俄俄頃速也齊也蛾𧖟蛾又姓左傳晉大夫蛾析禮記又音蟻睋視也涐水名在汶江誐嘉善也詩云誐以謐我硪說文曰石巖也佗非我也亦虜三字姓後魏書佗駱技氏後改爲駱氏託何切七他俗今通用拕曵也俗作拖它說文曰虫也从虫而長象冕曲垂尾形上古艸居患它故相問無它乎蛇說文同上今市遮切痑馬病又力極也文叨丹切鼧䑕名羅羅綺也古者芒氏初作羅爾雅鳥罟謂之羅又姓出長沙夲自顓頊未胤受封於羅國今房州也爲楚所滅子孫以爲氏魯何切十蘿女蘿籮篩籮儸儸出玉篇饠饆饠泳永羅汨泳永羅水名屈原沈處欏桫欏木名出崐崘山囉羅歌詞又嘍囉也亦小兒語也鑼䤬鑼器也剆擊也那何也都也於也盡也詩云受福不那那多也亦朝那縣名在安定又姓西魏揚州刺史那椿諾何切九㔮獸名似䑕班題食之明目似牛白尾挪搓挪儺驅疫上同多也纂文云人值鬼驚聲臡麋鹿骨醬何辝也說文儋也又姓出自周成王母弟唐叔虞後封於韓韓滅子孫分散江淮間音以韓爲何字隨音變遂爲何氏出廬江東海陳郡三望胡歌切七河水名出積石山海經云河出崐崘西北隅發源注海亦州取水以名之爾雅有九河徒駭太史馬頰覆釡胡蘇澗㓗鉤盤鬲津荷爾雅曰荷芙蕖又胡哿切菏菏菔草也苛政煩也怒也說文曰小艸也蚵蜉蠪魺魚名訶責也怒也虎何切五呵上同傾頭㱒止也抲擔抲俗珂馬腦苦何切四問口聲䯊膝骨軻又苦賀切阿曲也近也倚也爾雅云大陵曰阿亦姓風俗通云阿衡伊尹号其後氏焉又虜三字姓匹氏後魏書云阿伏于氏後改爲阿氏阿鹿桓氏後改爲鹿氏又有阿史那氏阿史德氏烏何切七娿媕娿不決媕音痾痾亦作疴病也妸女字妿女師又音哥䋪繒之細者鈳鈳䥈小釡八戈干戈說文云平頭戟也天授年置司戈八品武職古禾切十五過經也又過所也釋名曰過所至關津以示之也或曰傳過也移所在識以爲信也亦姓風俗通云過國夏諸侯後因爲氏漢有兖州刺史過栩渦亦作濄水名出淮陽扶溝浪蕩渠又姓三輔決録有扶風太守渦尚鍋温器􅬈車盛膏器楇上同一曰紡車收絲具瘑瘡也㽿上同􅰍說文曰秦名土釡曰􅰍􅸮上同㗻小兒相應也又音禾緺綬名堝甘堝鳥名螗蜋别名遳脃也七戈切一堆丁戈切二桗木桗也莎草名亦樹似桄榔其樹出麫蘇禾切十二魦魚名莏手挼莏也􅟗􅟗題縣名在涿郡趖趖疾蓑草名可爲雨衣唆㗻唆小兒相應􅲲佞也髿鬖髿髪皃梭織具晉書陶侃少時漁於雷澤甞網得一梭以挂於壁上須臾雷雨暴至乃化爲龍而去上同㛗女字穆天子傳云盛姬喪天子三女叔㛗爲王也婆老母稱也薄波切九媻說文曰奢也鄱鄱陽縣名在饒州皤老人白也勇舞皃說文同上繁姓也左傳殷人七族有繁氏漢有御史大夫繁延壽又音煩搫除也潘岳射雉賦云搫場拄翳又披散也亦音盤蔢蔢䓾草木盛皃碆纜繳石又音盤㸰牛無角也徒和切三碢碾碢堶飛塼戲也摩研摩又滅也隱也追也莫婆切十一􅪪􅪪食也出異字苑􅡸杯也又莫加切𡡉𡡉尼魔鬼魔䯢偏病磨磨礪爾雅曰石謂之磨劘削也漏病上同䭩𠯗皃矬短也昨禾切五痤癤也銼銼􅟋小釡㭫爾雅云㭫椄慮李今麥李也或從木睉小目訛謬也化也動也五禾切七譌吪並上同鈋刓也去角也囮網鳥者媒魤魚名木節詑欺也說文曰兖州謂欺曰詑土禾切五俗涶水在西河䛢䛢詆䜏退言獸名魚身鳥翼落戈切十六摞理也騾騾馬也蜀志云後主乗騾車降鄧艾也驘上同盛土草器鸁桑飛鳥也木名可爲箭笴螺蜯屬蠃上同榖積也或作上同草名生水中􅟋銼􅟋小釡也或作鏍覼覼縷委曲腡手指文也蠡瓠瓢也又禮鹿二音捼捼莏說文曰摧也一曰兩手相切摩也俗作挼奴禾切二䎠丸熟波波浪博禾切六皤老人白皃又音婆紴錦類又絛屬也嶓嶓冢山名番書曰番番良士爾雅曰番番矯矯勇也碆石可爲矢鏃也頗說文曰頭偏也滂禾切又匹我切四坡坡坂陀不平玻玻瓈玉西國寳和爾雅云笙之小者謂之和和順也諎也不堅不柔也亦州名在淮南漢九江都尉居之屬九江郡齊爲和州又姓出汝南河南二望本自羲和之後一云卞和之後晉有和嶠又虜複姓和稽氏後改爲緩氏戸戈切九咊古文棺頭禾粟苗龢諧也合也或曰古和字鉌鉌鑾亦作和䒩草名㗻小兒相應盉調五味器科程也條也本也品也又科斷也苦禾切又苦臥切十四窠窠窟又巢薖草名又寛大皃稞青稞麥名萪萪生海邊葉肕可爲篾也蝌蝌蚪蟲名爾雅曰科斗活東蝦蟆子也字林從虫㸰牛無角也犐上同課課差又苦臥切簻簻軸又陟瓜切䈖竹名㽿秃瘡又古禾切髁膝骨說文口臥切髀骨也􅧷美也倭東海中國烏禾切七濄水回渦水坳涹濁也地撾窟也踒躅也燕人云多鞾鞾鞋釋名曰鞾本胡服趙武靈王所服許戈切四靴上同撝也㗾道經䟽云吐氣聲也手足曲病於靴切二癡皃出釋典手足疾皃去靴切二上同伽伽藍求迦切三茄茄子菜可食又音加枷刑具又音加佉丘伽切四呿張口皃㰦欠去迦釋迦出釋典居伽切又音加一脞脃也醋伽切二㛗訬疾侳安也子切二骨出異字苑瘸腳手病巨靴切一驢腸胃也縷切一九麻麻紵亦姓風俗通云齊大夫麻嬰之後漢有麻達注論語莫霞切八犘犘牛重千斤出巴中蟆蝦蟆亦作蟇􅠦􅡷􅠦似􅔢鼊生海邊沙中肉甚美多膏䫗難語出陸善經字林痳痳風熱病􅡸杯也又莫何切㦄㦄愍車古史考曰黄帝作車引重致逺少昊時加牛禹時奚仲加馬周公作指南車又姓出魯國南平淮南河南四望本自舜後陳敬仲奔齊爲田氏至漢丞相田千秋以年老得乗小車出入省中時人謂之車丞相子孫因以爲氏漢末避地於魯又複姓二氏丗本有齊臨湽大夫車遽氏又有車成氏亦虜複姓魏獻帝命踈屬車焜氏後改爲車氏尺遮切又音居二硨硨磲奢張也侈也勝也式車切三賖不交也畬燒種田又音余邪琅邪郡名俗作耶瑘亦語助以遮切又似嗟切十三耶瑘並見上注釾鏌釾鎁上同椰椰子木名出交州其葉皆面相似擨擨歈舉手相弄斜斜谷在武功西南入谷百里而至說文杆也又似嗟切䓉草名􅺡木名皮可爲索䔑穗也枲屬竹名生臨海遮斷也正奢切四儸健而不德㸙吴人呼父諸姓也漢有洛陽令諸於何氏姓苑云吴人又職余切嗟咨也子邪切十二上同罝免罟也詩有免罝篇蒫薺實又昨何切謯說文詠也瘥爾雅云病也又在何切􅜚長歎袓縣名又似與切㜘憍也怛上同􅦹小疫䦈䦈丘山在海東蛇毒蟲又姓後秦録姚萇后蛇氏也南安人食遮切又音它三虵俗荼爾雅云䔁荂荼即艻也又音徒荂音呼華草盛也色也說文作䔢榮也崔豹古今注曰堯設誹謗木今之華表也西京記謂交午柱戸花切又呼瓜戸化二切十驊驊騮周穆王馬鷨鳥名似雉蟲名似蛇字林云大蛇也出魏興啖小蛇及蝮但張口小蛇自入也鋘鋘鍫鏵上同釫亦同上樺木名又戸化切崋西嶽名也又戸化切划划撥進船也瓜說文蓏也廣雅云龍蹄獸掌羊駮兔頭挂髓蜜䇶小青大班皆瓜名亦州名本古西戎地左傳范宣子數戎子駒支曰昔秦人迫逐乃袓吾離于瓜州又漢複姓王莽傳有盗賊臨淮瓜田儀古華切七騧黄馬黒喙緺青緺綬也婐女侍又於果切蝸蝸牛小螺媧古女后也􅎲引也擊也華爾雅云華荂也呼瓜切四花俗今通用譁諠譁􅹨上同誇大言也苦瓜切八䠸䠸體柔也爾雅作夸毗夸奢也姱姱奢皃跨吴人云坐胯兩股間也􅏠􅏠邪離絶之皃䯞額上骨也拏牽也女加切九詉詉語皃張加切挐絲絮相牽又女書切摣取也蒘蕏蒘草衣敝絲語不解也爬以收除也笯鳥籠又乃胡切嘉善也美也又姓左傳周大夫嘉父古牙切二十六家居也爾雅云扆内謂之家又姓風俗通漢有家羡爲劇令加増也上也陵也葭葭蘆也說文曰葦之未秀者又音遐笳笳簫卷蘆葉吹之也麚牡鹿䴥上同豭豕也子路佩豭說文曰牡豕也猳俗痂瘡痂鴐鴐鵞鳥枷枷鎖又連枷打榖具袈袈裟袈裟毛衣跏跏趺坐也􅰿不得進也玃加虫米中黒蟲茄荷莖又漢複姓有茄羅氏迦漢複姓有迦葉氏又居伽切珈婦人首飾瘕病也犌牛絶有力幏說文曰南郡蠻夷賨布貑貑熊又貑貜也並見爾雅注蟼爾雅云蟼蟆蛙類也又音荆遐逺也胡加切十四蝦蝦蟆鍜錏鍜霞赤氣騰爲雲又漢複姓有霞露氏瑕玉病也過也又姓左傳周大夫瑕禽又漢複姓有瑕吕氏騢馬赤白雜色鰕大鯢䠍腳下䫗䫛䫗言語無度碬礪石也春秋傳曰鄭公孫碬字子石䪗履跟後帖上同赮日朝赤色蕸荷葉葩花也又草花白亦作皅普巴切七鈀方言云江東呼鎞箭妑字林云女字也蚆貝也爾雅曰蚆博而頯郭璞云頯者中央廣兩頭銳吧吧呀大口皃舥舥腳船也牛角闊也鴉烏别名於加切八鵶上同錏錏鍜㝞㝞作姿態皃音宅加切椏方言云江東言樹枝爲椏扠也丫象物開之形䃁碨䃁地形不平􅤏自刎巴巴蜀又州取國以名焉三巴記云閬白水東南流曲折三迴如巴字亦蟲名又姓後漢有楊州刺史巴祗伯加切八鈀兵車又音葩笆有刺竹籬豝豕也芭芭蕉㿬㿬皻鼻病蚆又匹加切義見上文吧吧呀小兒忿爭叉交手初牙切九杈杈杷田器說文曰杈枝也差擇也又差舛也靫靫鞴弓箭室也鎈錢異名出字諟䐤腵䐤脯也㔆物䑡小船名艖上同鯊魚名今之吹鯊小魚是也所加切十一魦上同沙沙汰說文曰水散石也爾雅曰潁爲沙謂大水溢出别爲小水之名亦州取沙角山爲名即三秦記鳴沙山也又姓何氏姓苑云東莞人又漢複姓二氏左傳齊有夙沙衞神農時夙沙氏之後漢書功臣表有昭沙掉尾又百濟有沙吒氏砂俗裟袈裟㲚㲚毛衣桬桬棠木名出崐崘山紗絹屬一曰紡纑也髿髪髿垂皃􅶶􅴿􅶶素􅝿履也硰硰石地名見漢書牙牙齒又牙旗吴志曰孫權因瑞作黄龍大牙常在軍中諸軍進退視其所向又姓風俗通云周大司徒君牙之後五加切七衙縣名在馮翊亦衙府又姓秦穆公子食采於衙因氏焉蜀志有晉督護衙傳又音語音魚芽萌芽齖䶥齖齒不平正呀吧呀枒杈枒吾漢書金城郡有允吾縣允音船樝似梨而酸或作柤側加切十二柤上同又煎藥滓芹楚葵生水中以指按也䶥䶥齖皻皰鼻抯說文挹也溠水名出義陽又側稼切渣上同瘡痂甲也􅺥赤􅺥稻名浾棠汁㝞宅加切十五䠧䠧跱行難皃荼苦菜又音徒䣝亭名在郃陽􅟒春藏葉可以爲飲巴南人曰葭􅟒茶俗秅說文曰秭也周禮云聘禮曰十斗曰斛十六斗曰籔十籔曰秉四秉曰筥十筥曰稯十稯曰秅美也􅵅瘢􅵅瘡痕含舌皃窊深皃塗塗飾又音徒丘名梌吴人云刺木曰梌也䅊開張屋也又縣名說文作㢉衺不正也似嗟切四斜上同邪鬼病亦不正也論語曰思無邪䔑䔑蒿闍闉闍城上重門也視遮切又德胡切五余姓也見姓苑出南昌郡鉈短予又音夷鍦並上同窊凹也說文曰汚下也烏瓜切六洼深也亦渥洼水名又於佳切畖畖留地名在絳州蛙蝦蟆屬也窪深也說文曰淸水也一曰窊也又水名哇婬聲髽婦人喪髻莊華切一檛棰也左氏傳曰繞朝贈之以䇿杜預云馬檛也或作簻陟瓜切四簻上同􅥺亦同膼膇也爬搔也或作把又姓本杷東樓公之後避難改焉西魏襄州刺史把秀蒲巴切三杷枇杷木名說文曰收麥器也琶琵琶樂器楂水中浮木又姓出何氏姓苑鉏加切六查槎二同䶥䶥齖又音樝㢒壞也淮南子云虘屋之下不可坐也苴詩傳云水中浮草也侘侘傺失意敕加切傺丑例切四哆張口也癡皃也㗬緩口又厚脣也奓張也陟加切八詉語不正也觰角上廣也䅊開張屋也又縣名􅵅瘡痕咤達利咤出釋典本音去聲噍聲䐒不密又黏也煆火氣猛也許加切又呼嫁切六呀唅呀張口皃又呀呷也谺字統云谽谺谷中大空皃疨疨病岈㟏岈山深之狀颬吐氣又風皃䶗大齧也苦加切三㤉㤍㤉伏態之皃㤍苦交切􅯼㝞􅯼女作姿態查大口皃才邪切一若蜀地名出巴中記人賖切又惹弱二音二婼婼羌西域國名些少也寫邪切一爹羌人呼父也陟邪切一歄猶歄姽也五瓜切二䯞髂骨乞加切一十陽隂陽說文曰髙明也爾雅云山東曰朝陽山西曰夕陽又姓出右北平本自周景王封少子於陽樊後裔避周之亂適燕家於無終因邑命氏秦置右北平子孫仍屬焉又漢複姓二十二氏歐陽氏越王句踐之後封于烏程歐陽亭後因爲氏望出長沙吕氏香秋有辯士髙陽魋帝顓頊髙陽氏之後漢有東海王中尉靑陽精少昊靑陽氏之後又有御史孫陽放秦穆公時孫陽伯樂之後魯之公族有名子陽者及衞公于趙陽之後並以名爲氏漢有周陽由淮南王舅周陽侯趙兼之後又駙馬都尉涇陽準秦涇陽君之後丗本云偪陽妘姓國爲晉所滅子孫因氏焉左傳晉有梗陽巫皐衞有戲陽速漢有博士中山鮭陽鴻又有葉陽氏秦葉陽君之後列仙傳有沛國陵陽子明止陵陽山得仙其後因山爲氏漢有楊州刺史鮮陽戩後漢有櫟陽侯景丹曽孫汾避亂隴西封爲氏又長沙太守濮陽逸陳留人也神仙傳有太陽子白日升天春秋釋例周有老陽子修黄老術漢有安陽護軍河東成陽恢何氏姓苑有朱陽氏索陽氏與章切三十一䁑日出䁑谷楊赤莖柳爾雅曰楊蒲柳又姓出弘農天水二望本自周宣王子尚父幽王邑諸楊号曰楊侯後并於晉因爲氏也揚舉也說也導也明也又州名禹貢曰淮海惟揚州李巡曰江南之氣躁勁厥性輕揚故曰揚州颺風所飛颺昜飛也又曲昜縣在交阯羊牛羊禮記凡祭羊曰柔毛崔豹古今注云羊一名髯須主簿又姓出泰山本自羊舌大夫之後戰國䇿有羊千者著書顯名又漢複姓二氏列士傳有羊角哀左傳晉大夫有羊舌職样廣雅云样槌也方言曰懸𧖟柱齊謂之样眻美目又餘亮切佯詐也或作詳詳上同本音祥徉忀徉徙倚洋水流皃又海名又音祥烊焇烊出陸善經字林煬釋金又音恙鍚兵名又馬額飾馬額上靻輰輰䡵車也敭明敭瘍瘍傷也說文云瘍頭瘡也周禮療瘍以五毒攻之鴹􅫫鴹一足鳥舞則天下雨出字統鰑赤鱺鸉白鷢蛘蟲名禓道上祭一曰道神又舒羊切崵說文曰崵山在遼西諹讙也又音恙瑒玉名􅦝杯也􅰠􅰠葲藥名多也詳審也論也諟也似羊切八洋水名出齊郡臨朐縣北亦州名本漢成固縣秦爲漢中郡魏置洋州翔翶翔庠說文曰禮官養老夏曰校商曰庠周曰序祥吉也善也􅟸趨行􅷕女鬼古作祥禫字痒病也良賢也善也首也長也又姓左傳鄭大夫良霄鄭穆公之子子良之後吕張切十八梁梁棟又州名書曰華陽黒水惟梁州晉太康記云梁者言西方金剛之氣強梁故因名之舜置也秦爲漢中郡後其入蜀魏末克蜀分廣漢三巴涪陵以北七郡爲梁州梁大同年復移在南鄭亦姓出安定天水河南三望本自秦仲周平王封其少子康於夏陽梁山是爲梁伯後爲秦并子孫奔晉以國爲氏又漢複姓十二氏左傳有梁其踁魯伯禽庶子梁其之後又魯有仲梁懷晉有梁餘子養梁由靡秦有強梁皐莊子有十梁倚楚文王庶子有食邑諸梁者其後爲氏魯有榖梁赤治春秋史記有將梁氏漢光武時有侍御史梁垣烈新垣衍之後漢明帝時有梁成恢善歴數粱稻粱廣志曰遼東有赤粱魏武以爲粥也俗作粱粮粮食糧上同涼薄也亦寒涼也又州名禹貢雍州之域古西戎地也六國時至秦屬戎狄月氏居焉秦置三十六郡西北唯有隴西北地二郡於漢屬涼州部至武帝改雍州爲涼州後獻帝分渭川河西四郡爲雍州䢖安十八年復改爲涼州又姓魏志有太子太傅山陽涼茂凉俗北風也又力向切量量度又力向切蜋蜣蜋蟲一名蛣蜣又音郎踉跳踉也又音郎椋木名䁁賦也綡冠纚􅮓薄也又力尚切㹁牻牛駁色䣼漿水輬輼輬車名香說文作芳也漢書云尚書郎懷香握蘭許良切五皀稻香薌榖氣郷郷黨釋名曰萬二千五百家爲郷郷向也衆所向也又姓出姓苑膷牛羹商金音度也張也降也常也亦州名即古商國後魏置洛州周爲商州取商於地爲名又姓家語有商瞿式羊切十八說文曰行賈也典籍通用商漢書曰通財鬻貨曰商白虎通云居賣曰賈通物曰商俗作傷傷損傷也又且羊切殤殤夭慯憂皃觴酒器俗作􅜠湯湯湯流皃本他郎切蔏蔏陸草也􅫫􅫫鶊又􅫫鴹也螪螪蛘蟲㲽水名䵮說文云赤黒色又餘諒切禓道上祭也又以章切饟饋也又式尚切䵼煑也亦作塲耕塲􅡡上同房房室亦州名即春秋時防渚也秦爲房陵郡唐武德爲房州又姓出淸河濟南河南三望本自堯子丹朱舜封爲房邑侯子陵以父封爲氏陵四十八代孫雅王莽未爲淸河太守始居淸河雅十九代孫諶隨慕容德南遷因居濟南郡生四子豫坦邃煕号四龍今稱四祖房氏符方切七防防禦也隄防也坊上同見禮又音方魴魚名方方與縣名又府良切肪䐗肪又音方鴋澤鸆也又音方章篇章又章甫殷冠名禮記曰孔子長居宋冠章甫之冠又明也采也程也又姓秦將有章邯諸良切十五漳水名山海經曰漳水出荆山南注于沮水樟豫樟木名慞懼也璋半珪曰璋詩云乃生男子載弄之璋彰明也墇壅也又之尚切障隔也又丘山頂上平又音去聲麞鹿屬獐上同彰邑名在紀蔁蔁柳當陸别名􅝄吴人呼水鷄爲􅝄渠泥鞍飾暲日明昌盛也說文曰美言也一曰日光也又姓後漢有東海相昌狶尺良切八裮衣披不帶倡樂也優也又音唱猖猖狂閶閶闔琩耳璫鯧鯧鯸魚名菖菖蒲藥也羌章也強也發語端也說文云西戎牧羊人字从人羊又姓晉有石冰將羌迪去羊切四猐上同或從犬古文蜣蜣蜋薑菜名說文云御濕之菜史記云千畦薑韭與千戸侯等居良切十五䕬上同畺說文界也疆上同壃俗畕說文曰比田也㹔牛長脊一曰白脊牛繮馬組韁上同殭死不朽也礓礓石橿一名檍萬年木又云鋤橿鋤柄也姜姓也岀天水齊姓本自炎帝居於姜水因爲氏漢初以豪族徙關中遂居天水也䗵𧖟白僵仆也長乆也逺也常也永也直良切又直向丁丈二切八萇萇楚蔓生如桃又姓左傳周有大夫萇弘腸腸胃釋名曰腸暢也通暢胃氣也場祭神道處又治榖地也䠆䠆跪方言曰東齊北燕之間謂跪曰䠆㙊道也䗅蚰蜒别名瓺缻也又除向切張張施也又姓出清河南陽吴郡安定燉煌武烕范陽犍爲沛國梁國中山汲郡河内髙平十四望本自軒轅第五子揮始造弦寔張網羅丗掌官職後因氏焉風俗傳云張王李趙黄帝賜姓也陟良切四餦餦餭餳也粻食米漲水大皃又音帳穰禾莖也又姓齊將穰苴之後何氏姓苑云今髙平人汝陽切十七禳除殃祭也攘以手禦又竊也除也遂也止也揎袂出臂曰攘又音讓􅜙盗也鑲鉤鑲兵器又息羊切縣名在南陽躟疾行瀼露濃皃上同獽戎屬儴爾雅曰因也蘘蘘荷䉴䉴䉛􅜷米竹器鬤鬤亂也勷劻勷迫皃瓤瓜實也又女良切孃亂也又女良切方四方也正也道也比也類也法術也亦官名續漢書曰尚方令掌上手工巧作御刀劒諸好器物也又姓史記周大夫方叔之後府良切十三汸併船也說文本作方或從水坊坊巷亦州名本上郡地周於今州界置馬坊武德初置坊州因馬坊爲名漢宫有太子坊坊亦省名又音房蚄虸蚄蟲名肪脂肪邡什邡縣在漢州鴋鷝鴋鳥名人面鳥身枋木名可以作車又蜀以木偃魚爲枋鈁鑊屬牥牛名趽趼也說文曰曲脛馬也䄱禾名匚受物之器又一斗曰匚也襄除也上也駕也返也亦州名本楚之西津魏武置襄陽郡西魏改爲襄州因水立名又姓魯莊公子襄仲之後子孫以謚爲氏後漢有襄楷息良切十三廂廊也亦曰東西室湘水名在零陵相共供也瞻視也崔豹古今注云相風烏夏禹作亦相思木名又姓出姓苑又息亮切緗淺黄纕馬腹帶國語云忀挾纓纕忀忀徉驤馬騰躍又速也低昂也馳駕也鑲兵器又女羊切瓖馬帶飾東京賦曰鉤膺玉瓖欀欀木皮中有如白米屑擣之可爲麵箱箱籠葙青葙子也將送也行也大也助也辝也又姓後趙録有常山太守將容即良切又子諒切六漿漿水鱂鰪鱂魚名鰪烏盍切蔣菰蔣草又音奬螿寒螿蟬屬說文云扶也字林又作摪創說文曰傷也禮曰頭有創則沐今作瘡初良切又初亮切三瘡上同俗亡無也滅也逃也說文正作亾武方切十一芒草端也莣爾雅曰莣桂榮郭璞云今莣草似茅可以爲繩索履屩鋩刃端硭硭硝杗屋梁又莫郎切朚忘也又莫郎切邙縣名在沛郡又洛北山名又音忙郡名也又郷名望看望又音妄朢弦朢又音妄孃母稱女良切四娘少女之号瓤瓜實也又音穰鑲兵器牀簀也易曰遜于牀下士莊切三床俗疒病也又女戹切莊嚴也又莊田爾雅曰六達謂之莊亦姓莊周著書也側羊切五㽵俗妝女字又飾也裝裝束又側亮切䊋粉飾也常倍尋曰常又官名漢書曰奉常秦官掌宗廟禮儀景帝六年更名太常也釋名曰九旂之名日月爲常謂畫日月於其端天子所䢖言常明也亦姓出河内漢有常惠市羊切十尚尚書官名又時仗切裳上曰衣下曰裳甞試也曽也說文本作嘗口味之也又姓風俗通云齊孟甞君之後嘗上同鋿車鋿輪鐡鱨魚名償報也還也當也復也又音尙䳯鳥名徜徜徉猶徘徊也霜凝露也又姓色莊切七鸘鷫鸘鷞上同孀寡婦驦驌驦及馬騻上同蠰爾雅云齧桑䗅也又傷餉二音牆牆爾雅云牆謂之墉說文曰牆垣薇也在良切十廧上同墻俗佯弱也嬙嬪嬙婦人官名檣船檣薔薔薇又東薔子十月熟可食出河西子虚賦云東薔彫胡蘠上同戕殺也又他國臣來殺君也妄強犬也又徂朗切鏘鏗鏘七羊切十二瑲玉聲槍矟也通俗文云剡葦傷盗謂之槍說文曰距也蹌說文曰動也詩曰巧趨蹌兮蹡行皃上同斨斧斨說文云方銎斧也牄說文云鳥獸來食聲嶈山髙皃門聲和也傷也又式羊切搶拒也突也匡輔助也正也又姓風俗通云匡魯邑也句須爲之宰其後氏焉漢有匡衡去王切十三邼邑名說文曰河東聞喜郷也筐筐籠䖱海中大蝦框棺門恇怯也劻劻勷鬤洭水名出桂陽含洭縣軭車戾眶目眶䒰草名􅫬耳曲王大也君也字林云王者天地人一貫三爲王天下所法又姓出太原琅邪周靈王太子晉之後北海陳留齊王出和之後東海出自姬姓髙平京兆魏信陵君之後天水東平新蔡新野山陽中山章武東萊河東者殷王子比干爲紂所害子孫以王者之後号曰王氏金城廣漢長沙堂邑河南共二十一望又漢複姓王氏左傳晉有樂王鮒小王桃甲賈執英賢傳云東莞有五王氏史記云出齊威王至䢖王五王之後風俗通云漢有中郎威王弼出自楚威王後漢有新豊令王史音雨方切又雨誑切四蚟蚟孫蟲名又蜻蛚即今促織也鮹魚名彺急行央中央一曰乆也於良切九鴦鴛鴦匹鳥又烏郎切殃禍也各也罰也敗也䄃上同鉠鈴聲又音英秧蒔秧又於丈切霙霙霙白雲皃又音英胦脬胦泱水流皃又烏朗切強健也暴也說文曰蚚也又姓後漢有強華奉赤伏符巨良切四疆與強通用說文曰弓有力也䲔鯨魚别名又其京切勥迫也􅛅草名禇羊切三倀失道皃又狂也鼚鼓聲芳芬芳亦州地多芳草故以名之置在常芳縣又姓風俗通云漢幽州刺史芳乗敷方切三妨妨害淓水名狂病也韓子曰心不能審得失之地則謂之狂也巨王切五軖紡車也軭說文曰車戾也又去王切鵟鴟屬草木妄生狂匡往皆從此十一唐說文曰大言也又州春秋時楚地戰國時屬晉後入於韓秦屬南陽郡後魏爲淮州隋爲顯州貞觀改爲唐州因唐城山爲名即髙鳯隱所亦姓唐堯之後子孫氏焉出晉昌北海魯國三望徒郎切四十啺並古文煻煻煨火糖餄也糛上同堂堂除亦屋白虎通曰天子之堂髙九尺天子尊故極陽之數九尺也堂之爲言明也所以明禮義也禮記曰天子之堂九尺諸侯七尺大夫五尺士三尺又姓風俗通云堂楚邑大夫五尚爲之其後氏焉坣古文䶈䑕一月三易膓棠棠棃又桬棠木生崐崘山黄色赤實味如李食之使人不溺亦姓左傳齊大夫棠無咎又漢複姓吴王闔閭弟夫漑奔楚爲棠谿氏搪搪揬蓎蓎蒙女蘿案爾雅作唐蒙不從艸瑭玉名餹餹䬾黍膏䬾杜兮切篖筕篖竹笪螗蜩螗牛上同螳螳蜋禮記仲夏月螳蜋生塘陂塘碭芒碭山名又音宕鶶鶶鷵鳥名似烏蒼白色􅷼魚名踼踼跌頓伏皃又吐郎切闛說文曰闛闛盛皃又他郎切赯赯赤色磄磄石也溏池也䣘地名傏傏不遜隚殿基䧜隄䧜髙門也鎕鎕銻火齊䉎罩也􅸽􅸽䡙軘軨橖車橖榶榶棣木名案爾雅曰唐棣栘不從木㲥㲥眊罽也瓷器郎官名又魯邑又姓出中山魏郡二望魯當切三十蓈說文曰禾粟之穗生而不成者謂之董蓈稂草名似莠說文同二桹桄桹木名廊廡也文穎曰廊殿下外屋也榔㯽榔鋃鋃鐺鎖頭一曰鍾聲硠硠磕石聲􅟇􅟇鷱鳥名浪滄浪水名又盧宕切䯖䯑䯖股肉䯑苦光切蜋螳蜋魚脂琅琅玕玉名爾雅曰西北之美者有崐崘璆琳琅玕焉又琅邪郡名今沂州也又姓齊有大夫琅過瑯琅邪郡名俗作瑯瑘㝗㝩㝗宫室空皃狼犲狼說文曰犲似犬銳頭而白頰髙前廣後帝王丗紀曰有神牽白狼銜鉤入殷朝又姓左傳晉有大夫狼瞫欴欴㰠貪皃􅚄􅚄毒藥名踉踉䠙行皃莨草名㟍峻㟍山名冬曰所入䡙􅸽䡙軘軨艆海中大船駺馬尾白躴躴躿身長皃筤車籃一名笑笑音替短矛閬當門又盧宕切哴哴吭吹皃當敵也直也主也值也亦州本羌地周置同昌郡隋改爲嘉城鎮貞觀中改爲當州蓋取燒當羌以名之又姓也都郎切十一鐺鋃鐺簹篔簹竹名襠兩襠衣璫耳珠車檔木名出文字音義儅止也又丁宕切耳耳下㼕㼕瓤瓜中蟷蟷蠰螗蜋别名亦作倉倉庾也亦官名齊職儀曰大倉令周司徒屬官有廪人倉人則其職也釋名曰倉藏也藏榖物也漢書曰耿壽昌奏設常平倉又姓黄帝史官倉頡之後七岡切七蒼蒼色也又姓漢江夏太守蒼英鶬鶬鶊鳥名說文同上滄滄浪亦州後魏所置蓋取滄海爲名飡寒皃古器也出說文岡爾雅曰山脊岡古郎切十六崗又作堽並俗剛強也俗掆舉也笐說文曰竹列也又爾雅曰仲無笐竹類也鋼鋼鐡綱綱紀說文曰維紘繩也亢星名一曰亢父縣說文人頸也犅特牛堈甕也􅣙上同牨水牛苀爾雅釋草曰苀東蠡又音杭魧魚名爾雅云大貝本杭沆二音迒獸跡又音抗桑木名史記曰齊魯千畝桑麻其人與千戸侯等又姓秦大夫子桑之後漢有御史大夫桑弘羊息郎切六桒俗亡也死也又姓楚大夫左又息浪切喪上同淺黄馬色康和也樂也又姓衞康叔之後亦西胡姓苦岡切十四穅榖皮糠俗㱂榖不升謂之㱂㝩㝩㝗槺槺梁虚梁也見文選賦傳云雄曰鳯雌曰皇偟偟暇媓女媓堯妻獚犬名蟥蛂蟥蛢甲蟲也韹韹樂鐘聲也又音横􅙉古縣名䍿羽舞名䅣䅭䅣穄名榮也葟上同趪趪趪舞皃又張設皃光明也亦州名漢西陽縣地屬江夏郡梁置光州因浮光山爲名又姓田光之後秦未子孫避地以光爲氏晉有樂安光逸古黄切十四光上同洸水名又烏光切桄桄桹木名胱膀胱水府垙垙陌􅵬車下横木輄上同横長安門名又戸觥切􅼶決􅼶馬旋毛在脊也恍武也茪茪草名僙僙僙武皃侊盛皃湯熱水又姓宋有沙門湯休有文集吐郎切十一簜水名在鄴今簜隂縣單作鏜以鐡貫物說文曰鼔鐘聲也闛盛皃又音唐䞶䞶走皃踼踼跌又杜郎切盪盪突又徒郎切蝪蛈蝪蟲名鼞鼔聲薚蓫薚馬尾􅛅上同滂滂沱普郎切七鎊鎊削霶霶霈大雨雱雨雪盛皃詩曰雨雪其䨦䨦上同磅石聲量溢也汪水深廣又姓汪芒氏之胤姓苑云新安人也烏光切五兀曲脛俗作尤尪尪弱說文同上洸水名又音光雉鳴鴦鴛鴦匹鳥烏郎切又一良切七佒體不申也咉應聲􅧯貉屬㹧上同眏眏目皃姎女人自稱又烏朗切煑肱呼郎切又苦朗切四㰠欴㰠㬻狼㬻南夷國名忼咉忼狼戻航船也胡郎切十八筕筕篖桁械也行伍也列也又戸庚戸浪戸孟三切迒獸迹又古郎切上同頏頡頏詩傳云飛而上曰頡飛而下曰頏說文音剛與亢同飛髙下也魧魚名又大貝胻脛也邟餘邟縣名在吴興又音伉杭州名古於濳餘邟皆别名今餘杭於濳縣並在杭州沆渡也又胡郎切蚢爾雅蚢蕭繭郭璞曰食蕭葉者皆𧖟類肮肮大脈也苀東蠡草名抗舉也又苦浪切吭鳥喉又下浪切滄茫莫郎切十四吂不知也䀮目不明也汒谷名在京北恾怖也忙上同朚遽也邙北邙山名又武方切芒草端亦姓史記有魏相芒卯又音亡碭山名史記本只作芒杗大梁又武方切蘉勉也寐語郷名在藍田臧善也厚也又姓出東莞本自魯孝公子臧僖伯之後則郎切六古文䍧牡羊戕戕牁亦作牂贓納賄曰贓样槌也出廣雅囊袋也說文曰囊橐也又姓楚莊王子子囊之後以王父字爲氏奴當切二蠰蟷蠰即螗蜋也傍亦作旁側也說文曰近也又羌姓歩光切十三彷彷徨膀膀胱髈上同䠙踉䠙急行趽膝脛曲皃房阿房宮名旁爾雅曰二達謂之岐旁謂岐道旁出也說文曰薄也篣竹箕又薄庚切亭名在汝南螃螃蟹本只名蟹俗加螃字䅭䅭䅣穄名騯馬盛皃又甫盲薄庚二切卬髙也我也又姓漢有御史大夫卬祗五剛切又魚兩切七䭹千里駒說文又五浪切䭹䭹馬怒皃枊繫馬柱也劉備縛督卸者又五浪切昂舉也䒢昌蒲别名又魚兩切㭿飛㭿斜桷䩕履頭藏隱也匿也昨郞切又徂浪切一䯑䯑䯖苦光切一幫衣治鞋履出文字集略博旁切五縍上同㨍捍也衞也加杯上酒鞤鞋革皮用十二庚更也償也爾雅云太歳在庚曰上章又姓唐有太常博士庚季良又漢複姓莊子有庚桑楚古行切十二鶊鶬鶊更代也償也改也又古孟切䢚兔徑秔秔稻稉上同粳俗賡續也經也償也羹羮􅌜爾雅曰肉謂之羮古文埂秦人謂坑也浭水名出北平阬爾雅曰虚也郭璞云阬壍也客庚切六坑上同硎亦同矒視不分明砊砊硠石聲劥劥有力盲目無童子武庚切八蝱蟲也鄳縣名在江夏􅟑􅟑盯直視莔貝母草􅸁古縣名在義昌䥰䥰銷竹名横縱横也又姓風俗通云韓王子成號横陽君其後爲氏戸盲切十六黌學也蝗蟲又音皇鐄六鐘瑝玉聲說文音皇喤泣聲鍠和也樂也又鐘聲說文音皇䬝䬝䫻暴風㶇方舟也一曰荆州人呼渡津舫爲㶇或作䄓䄘䄓祭名褡小被瓦也織也憕韹聲也彋弸彋帷帳起皃閍宫中門也一曰巷門甫盲切六祊廟門傍祭􅤶上同騯騯騯馬行又音傍音彭嗙喝聲㔙大也諻語聲虎横切五䎕䎕然飛聲謍謍謍小聲嚝鼓鐘聲喤喤呷也又音横觵觵角爲酒器受七升罰失禮者古横切六觥上同侊小皃春秋國語曰侊飯不及壷飡吴主孫休二子名䍔網滿上同彭行也道也盛也說文曰鼓聲也又姓大彭之後左傳楚有令尹彭仲爽漢有大司空彭宣薄庚切十七澎地名又擊水勢又撫庚切膨膨脝脹皃蟚蟚螖似蟹而小䰃䰃鬤亂髮皃鬤乃庚切棚棧也閣也榜說文曰所以輔弓弩也又甫孟切䄘䄘䄓祭名搒笞打說文又北孟切掩也蒡菜一名隱荵似蘇可爲葅篣籠又音旁􆄊􆄊馞大香騯馬行盛皃憉憉悙自強量溢輣兵車又樓車也上同脝膨脝脹也許庚切三悙憉悙自強亨通也或作又匹庚許兩二切瞠直視皃丑庚切五橕撥也又橕柱也樘上同說文曰衺柱也䟓字書跉䟓行遟皃竀正視鎗鼎類楚庚切四鐺俗本音當槍欃槍祅星琤玉聲傖楚人别種也助庚切五䚘角長皃鬡亂髮皃鬇上同崢崢嶸山皃霙雨雪雜也於驚切十鉠鈴聲韺五韺髙陽氏樂亦作英渶水名出青丘山鶧繼鶧鳥名英華也榮而不實曰英也又英俊亦姓漢有英布瑛玉光㿮青皃媖女人稱美楧楧梅今之雀梅磅小石落聲撫庚切四恲滿也亨煑也俗作烹又許庚許兩二切澎澎􅗍水皃又音彭平正也和也易也亦州名古山戎孤竹白狄肥子二國之地秦爲遼西郡隋爲北平郡武德初爲平州有盧龍塞又姓齊相晏平仲之後漢相丞相平當又漢複姓何氏姓苑云有平陵平寧二氏符兵切八評評量亦評事大理寺官唐初置十二貟又音病苹葭一曰蒲白又曰萍别名又云藾蕭也枰枰仲木名又博局也泙水名說文谷也坪地平胓牛羊脂也蚲蚲驚懼也說文曰馬駭也舉卿切七京大也廣雅曰四起曰京風俗通曰京非人力所成天地性自然也京義亦取此公羊曰京者大也師者衆也天子之居必以衆大之辝言之又姓風俗通云鄭武公子叚封於京號京城大叔其後氏焉漢有京房荆荆楚亦木名可染又州名夏及周並爲州秦爲南郡即郢都之渚宫又姓燕刺客荆軻麠獸名一角似麋牛尾麖上同鶁羌鶁鳥蟼蟼蛙明光也昭也通也發也又姓出平原河南山公集有平原明普武兵切五盟盟約殺牲歃血也周禮有司盟􅰀上同鵬鷦鵬似鳯南方神鳥鳴嘶鳴又姓出姓苑棖門兩旁木直庚切七盯􅟑盯視皃澄水清定又音懲掁掁觸䟫距也周禮曰唯角䟫之挰舉也憕憕失志又音懲趟䞴趟躍跳竹盲切趟陟交切二䬝狂風榮榮華又姓漢有榮啓期永兵切六禜祭名又音詠蠑蠑螈蜥蜴别名瑩王色詩云充耳秀瑩又烏定切揘拔也嶸崢嶸又戸萌切兵戎也周禮有司兵掌五兵五盾丗本曰蚩尤以金作兵器也甫明切一兄爾雅男子先生曰兄說文長也許榮切一卿說文章也公卿春秋漢含孳曰三公象五岳九卿法河海三公法三台九卿法北斗釋名曰漢置十二卿正卿九太常光禄衞尉太僕廷尉鴻臚宗正司農少府又姓風俗通云趙相虞卿之後去京切一生生長也易曰天地之大德曰生又姓出姓苑所庚切十笙樂器也禮記女媧造笙簧釋名曰笙生也象物貫地而生也又簟也吴都賦曰桃笙象簟牲犧牲猩猩猩能言似猿聲如小兒也狌上同鉎鐡鉎甥外甥又姓風俗通云晉大夫吕甥之後䴤獸名大如兔也鼪鼪鼬䑕也珄金色擎舉也渠京切十一勍強力黥黒刑在面䵞剠並上同䲔大魚雄曰䲔雌曰鯢鯨上同檠所以正弓樈鑿柄葝山薤䫆頸也迎逢也語京切一行行歩也適也往也去也又姓周有大行人之官其後氏焉戸庚切又戸剛戸浪下孟三切十衡横也平也又姓風俗通云阿衡伊尹之後又云衡魯公字後乃氏焉䯒牛脊後骨胻牛勢胻也洐溝水也筕筕篖行笪珩佩上玉桁屋桁蘅杜蘅香草大者曰杜若也爾雅注曰杜衡似葵而香字不從卄熟肉鬤䰃鬤亂髮皃乃庚切六㲰犬多毛皃說文云亂也一曰窒獰惡也榖芒長也說文曰牂可以作縻綆十三耕犂也周書曰神農之時天雨粟神農耕田而種之古莖切一鏗鏗鏘金石聲也口莖切十五銵上同䡰車鞕又車堅牢鳽雝渠鳥名誙莊子曰誙誙如也牼牛膝骨又人名宋有司馬牼􅠌或作硎谷名在麗山昔秦密種瓜處硻說文云餘堅也殸敵也㧶琴聲䡩車聲硜硜硜小人皃摼撞也㰢㰠㰢羥羊名甍屋棟也莫耕切十一上同䉚竹筒萌萌牙氓民也甿上同嫇嫈嫇新婦皃蕄爾雅云存存蕄蕄在也又莫登切本亦作萌又作􅽪􅟑􅟑盯苕可爲帚視不分明浜布耕切安船溝又布耿切二捠冢口穴也宏大也戸萌切十六紘冠卷也又八紘紭網紭閎爾雅曰衖門謂之閎郭璞云閎衖頭門又曰所以止扉謂之閎郭璞云門辟旁長橛也又姓漢有閎孺嶸崢嶸山峻嵤上同􆁢谷中響一曰谷名也耾耳語翃蟲飛浤浤浤汩汩水波之勢竑量度周禮考工曰故竑其輻宖屋響又烏宏切鈜金聲吰噌吰鐘音􅥁玉篇云石聲也彋弸彋開張也莖草木榦也戸耕切三䪫樂名亦作莖牼牛膝下骨又苦耕切朾伐木聲也中莖切七丁上同詩曰伐木丁丁玎玎玲王聲又齊太公子伋謚玎公出說文也不仁也出聲譜􆄦􆄦設幕出字林䟓跉䟓腳細長也䆸䆸宏闊大皃甖瓦器烏莖切十三罌上同罃說文曰備火長頸缾也鶯鳥羽文也嚶鳥聲櫻含桃嫈嫈嫇又於營切又乙諍切鸚鸚鵡能言之皃譻譻􅘱小聲鸎黄鸎褮鬼衣􅞑芟除林木也出齊人要術莖爾雅釋草云姚莖涂薺崢崢嶸七耕切六􅯇􅯇薴草亂皃鬇鬇鬡毛髮亂皃埩魯城北門池也說文作淨鏳鏳鎗王聲崝淮南子云崝陗也琤玉聲楚耕切五錚金聲凈冷也出字書棦木束噲噲吰鐘音儜困也弱也女耕切七薴􅯇薴鬡鬇鬡􅘱􅘱鑏鐡鑏䭢充食嬣嬣体怦心急又中直皃普耕切十一姘齊與女交罰金四雨曰姘蒼頡篇曰男女私合曰姘閛門扉聲牛色駁如星也伻使人弸弸彋也䍬使羊㛁急也匉匉訇大聲抨彈也砰砰磕如雷之聲轟群車聲呼宏切十輷上同䎕群鳥弄翅揈擊聲訇匉訇大聲又姓蜀録關中流人訇琦訇廣鍧鏗鍧鐘鼓聲相雜也渹水石聲又大也飛聲石落聲㥊好嗔皃繃束兒衣墨子云禹葬㑹稽桐棺三寸葛以繃束也北萌切五絣振繩墨也上同拼爾雅云使也又從也䑫艣䑫舟具橙抽屬宅耕切十二揨撞也觸也並上同湞水名出南海朾爾雅曰蠪朾螘郭璞云赤駁蚍蜉虰上同憕失志皃又音澄瞪直視皃響也䁎安審視也䆑小突泓水深也烏宏切四謍謍􅘱宖屋響又戸萌切試力士錘輣兵車薄萌切五棚棧也弸弓弱皃㥊㥊好嗔皃庄平也亦作娙身長好皃漢書曰娙娥婦官也武帝邢夫人號娙娥五莖切二俓急也爭競也引也側莖切七箏樂器秦蒙恬所造埩埋也治也綪禮云齊則綪結佩䋫縈也猙獸名似豹一角五尾又音浄䱢魚名十四淸山海經曰大畤之山淸水出焉釋名曰淸靑也去濁逺穢色如靑也又靜也澄也潔也七情切二圊廁也情静也說文曰人之隂气有所欲也疾盈切五晴天晴請受也又在性七井二切夝說文曰雨而夜除見星也䝼䝼受賜也精明也正也善也好也說文曰擇也易曰純粹精也子盈切十五氏狋氏縣名狋音權箐䉑箐菜也鶄鵁鶄鳥也蜻蜻􅖹蟋蟀也晶光也鼱鼱鼩小鼠婧竦立也又慈性切睛目珠子也水名在南郡旌旌旗周禮曰析羽爲旌爾雅曰注旄首曰旌旍上同見禮箐笭箐小籠䫢頭也聙聦聽也盈充也滿也又姓出姓苑以成切十二嬴秦姓㜲美好皃瀛大海亦州名漢河間王國後魏於此立瀛州蓋以瀛海爲名籝籠也說文笭也漢書曰遺子黄金滿籝不如敎子一經亦作籝楹柱也孔子曰夢奠於兩楹贏利也益也有餘也財長也􅭬似狐色黄菊花一名帝女花􅱡姓也出姓苑魯大夫名攍擔也營造也度也說文曰市居也亦州名舜分靑州爲營州爾雅曰齊曰營州今靑州也又姓風俗通云周成王卿士營伯之後漢有京兆尹營郃余傾切六鎣采鐡又音營塋墓域䁝惑也又戸扃切濴波勢回皃謍說文曰小聲也引詩云謍謍靑蠅嬰蒼頡篇云女曰嬰馬曰兒又姓風俗通云晉大夫季嬰之後於盈切七瓔瓔珞纓冠纓禮記玉藻曰玄冠朱組纓攖亂也地名又一井切賏具飾蘡蘡薁藤也貞正也陟盈切六楨楨榦題曰楨旁曰榦又女楨冬不凋木也禎善也祥也􅬬地名又直貞切湞湞陽縣名湞水所岀丘名檉木名說文云河柳也丑貞切八偵偵候又丑鄭切赬赤色俗作頳䞓上同䟓跉䟓行不正竀正視蟶蚌屬虰螘也成畢也就也平也善也亦州名古西戎地州南八十里有仇池山晉改爲仇池郡後爲南秦州梁廢帝改爲成州又姓出上谷東郡二望本自周文王子成伯之後又漢複姓十五氏莊子有務成子廣成子顔成子游伯成子髙韓子有容成子列子有考成子國語晉卻犨食采苦成後因以爲氏丗本曰宋有大夫老成方盆成括仕於齊晉有英成僖子漢有廣漢太守古成雲古音枯髙祖功臣有陽成延後漢有密縣上成公白日升天晉戊己校尉燉煌車成將古成氏之後史記有邢成氏是征切十古文城城郭崔豹古今注云城者盛也所以盛受民物也又淮南子曰鮌作城亦姓風俗通云氏於事者城郭園池是也誠審也敬也信也宬屋容受也郕地名也在東平筬筬筐織具盛盛受也黍稷在器也又時正切珹珠類䫆頸也呈示也平也見也直貞切七程期也式也限也品也又姓出廣平安定一望本自顓頊重黎之後周宣王時程伯休父入爲大司馬封于程後遂爲氏與司馬氏同酲酒病􅬬地名又音貞珵玉名䇸筵也裎佩帶又恥領切聲聲音又姓左傳蔡大夫聲子書盈切一征行也諸盈切十三延上同鯖煑魚煎食曰五侯鯖又倉經切􅙰並上同鉦鐃也似鈴怔怔忪懼皃正正朔本音政鴊方言云齊魯間謂題肩爲鴊鳥䋊乗輿馬飾眐獨視皃衳小兒衣出字林佂佂伀遽行皃輕輕重去盈切三􅚢一足跳行鑋說文曰金聲也名名字春秋說題曰名成也大也功也号也說文曰自命也从夕口夕者冥不相見故以口自名也又姓左傳楚大夫彭名之後武并切二洺水名在易陽亦州名春秋時爲赤狄之地後屬晉秦爲邯鄲郡周於此置洺州以洺水爲名跉跉䟓吕貞切二令使也又吕鄫郎丁二切并合也亦州名舜分兾州爲幽州并州春秋時爲晉國後屬趙秦爲太原郡魏復置并州又姓出姓苑府盈切四栟栟櫚木名箳箳篁車轓屏屏盈徬徨又餅萍二音傾側也伏也敬也去營切二頃西頃地名出地理志說文曰頭不正也又去潁切餳飴也徐盈切一縈繞也於營切五褮說文云鬼衣也嫈小心態又烏莖切䪯聲也覆也瓊玉名渠營切十七璚上同煢獨也一曰迴飛也焭上同睘驚視惸無弟兄也博予一名投予藑藑茅草也嬛好也􅑱上同赹獨行皃憌憂也上同草旋上同車輮規一曰輪車也㒌特也騂馬赤色也息營切四上同垶赤土觪角弓頸項也頸在前項在後巨成切又居郢切五魚名葝䑕尾草又山薤又音擎􅹦上同貨也火營切一十五靑東方色也亦州名九州之一禹貢曰海岱惟靑州又男靑女靑皆木名出羅浮山記亦姓出何氏姓苑又漢複姓三氏風俗通云漢有靑烏子善數術又有青牛氏青陽氏倉經切五鶄鶄鶴鳥也出南海又音精鯖魚名又諸盈切蜻蜻蜓蟲方言曰蜻蛉謂蛉也六足四翼又音精靘䒌靘無色經常也絞也徑也亦經緯又姓出何氏姓苑古靈切又音徑四涇水名淮南子云涇水出薄洛之山鵛鸒鵛鷋也巠直波爲巠說文曰水脈也㓝說文曰罰辠也今只用下文刑戸經切十七刑法也禮曰刑者侀也侀者成也一成而不可變故君子盡心焉說文剄也形容也常也邢地名在鄭亦州名古邢侯國也項羽爲襄國隋爲邢州取國以名之又姓出河間也本周之㣧邢侯爲衞所滅後遂爲氏漢有侍中邢辟直道忤時讁爲河間鄭令因家焉小瓜䣆郷名在密桯牀前長几又音㕔鉶祭器型鑄鐡模也又作陘連山中絶又姓陘晉邑也其大夫氏焉今有井陘縣侀成也硎砥石娙女長皃又五莖切鈃酒器似鐘而長頸也㼛並同上鋞說文曰温器也圜而直上庭門庭又直也亦州名即漢車師後王庭之地本烏孫國土也其前王庭即交河縣是也特丁切二十一停息也定也止也鼮鼮䑕豹文漢武帝得此䑕孝廉郎終軍識之賜絹百匹莛草莖葶葶藶筳竹筳亭今亭子名釋名曰亭停也人所停集也漢典職曰洛陽二十街街一亭十二城門門一亭也聤耳出惡水霆雷霆渟水止魚名綎綬也娗好皃㼗甎也定息挺縣名在膠東又徒頂切楟山棃木名蜓蜻蜓亦蟪姑别名廷風俗通云廷者平也又正也國家朝廷也釋名曰廷停也人所停集之處漢書曰廷尉秦官也應劭曰古官也㹶猱㹶猨屬埤蒼云𧖟二眠丁當也亦辰名爾雅云太歳在丁曰強圉又姓本自姜姓齊太公子伋謐丁公因以命族出濟陽濟隂二望當經切八釘又都定切玎玉聲䦺丘名靪補履下也虰爾雅曰虰蛵負勞郭璞云或即蜻蛉也仃伶仃獨也叮叮嚀馨香也呼刑切三􅠒說文聲也蛵虰蛵星星宿說文曰萬物之精上爲列星淮南子曰日月之淫氣精者爲星辰也又姓羊氏家傳曰南陽太守羊續娶濟北星重女桑經切十二曐上同出說文腥豕息肉又先定切胜犬膏臭也鮏說文云魚臭也鯹上同稀醒酒醒又思挺先定二切鉎鐡鉎篂箳篂别駕車轓猩說文曰猩猩犬吠聲又音生惺惺憽了慧皃出聲類竮竛竮行不正亦作伶俜普丁切八俜見上注又匹正切甹甹夆掣曵說文曰亟詞也或曰甹俠也三輔謂輕財者爲甹使也艵縹色頩面色又普冷切姘男女㑹合覮淮南子云覮然能聽靈神也善也巫也寵也福也亦州名漢北郡富平縣地赫連㪍㪍之果園也後魏置靈州取靈武縣名爲之又姓風俗通云齊靈公之後或云宋公子靈圍龜之後晉有餓者靈輒郎丁切八十七霛並古文靈廣雅曰玉名說文曰巫以玉事神也與靈同舲舟上有䆫齡年也麢大羊上同囹囹圄鴒䳭鴒䉁竹名蛉蜻蛉鈴似鐘而小霝落也墮也說文曰雨也从雨􅮎象雨形或作零醽渌酒苓茯苓櫺䆫櫺又櫺檻階際欄柃說文木也空也伶樂人泠清泠水也又水名出丹陽又姓左傳周大夫泠州鳩瓴瓴甋一曰似甖有耳􅘾說文曰螟􅘾桑蟲也或作蛉拎手懸捻物刢刢利性人也似虎而小出南海通俗文云猪糞曰小瓜名出安南玲朎朧玉聲􆁓似瓶有耳瘦也㾉上同聆以耳取聲竛竛竮字類撞蘦菜名似葵可食軨車闌䡼上同笭笭箐小籠零落也說文曰徐雨也又姓出姓苑孁女字令漢複姓有令狐氏本自畢萬之後國語云晉大夫令狐文子即魏顆也自漢已後丗本太原至邁爲王莽所誅邁少子始居燉煌也􅤜􅤜班䑕灵字類云小熱皃食飽􅛗山海經曰神名人面獸身或作龗一曰龍名龗說文龍也翎鳥羽閝門上小䆫出崔浩女儀鹷壃鹷䴇䴇鳥鶴别名也昤昤曨日光出道書駖駖蓋車騎聲螢也器名又人名也蕶草蕶落也酃地名在湘東詅詅音相次出異字音彾彾俜行皃䯍骨呤埤蒼云呤吟語也跉徐行不正皃出異字音狑犬名上同爧火光皃冷冷澤吴人云水凌又力頂切怜心了黠皃􅮎衆鳥也從三口􅫲􅫲艦有屋舟名插空又力定切澪水名鏻健也草莖踈也秢穗熟玉篇云年也䕘䑕耳草也本亦作苓獜玉篇云獜獜犬聲又力仁切岭山深皃魿魚連行皃毛結不理玉篇云長毛也餌也紷綼絲一百升又絮名䉹竹名砱石砱阾阪名羚羊子姈女字㸳牛名寧安也說文曰願詞也亦州名禹貢古西戎地秦爲北地郡亦爲豳州又爲寧州奴丁切九寍說文曰安也从宀心在皿上皿人之食飲器所以安人也鸋爾雅曰鴟鴞鸋鴂又曰鴽子鸋䆨天也告也又乃定切郷名在馮翊谷口又奴顚切螻蛄嚀叮嚀聹耳垢又乃鼎切汀水際平沙也他丁切十四訂平議也又徒頂他頂二切桯碓桯綎絲綬帶綎聽聆也又湯定切廰廰屋町田處又徒頂切艼草名罟也䩠皮帶䩠也鞓上同䋼縚屬說文緩也􅮲上同庁平庁冥暗也幽也又姓禹後因國爲氏風俗通云漢有冥都爲丞相莫經切十五榠榠樝果木銘銘記釋名曰銘名也記名其功也鄍晉邑溟溟濛小雨又溟海也䫤眉目間也螟螟蛉桑蟲說文曰蟲食榖葉者吏冥冥犯法即生螟小豚猽上同蓂蓂萊堯時生於庭隨月彫榮瞑合目瞑瞑又亡千切漬米嫇好皃覭小見也又爾雅曰覭髳弗離也又莫的切暝晦暝也瓶汲水器也又姓風俗通云漢有太子少傅瓶守後趙録有北海瓶子然二姓蓋别薄經切十五缾上同蛢以翼鳴蟲䶄䑕子說文云䶄令䑕屏三禮圖曰扆從廣八尺畫斧文今之屏風則遺象也又必郢切荓荓馬帚似蓍又荓翳雨師名也䈂竹名軿輺軿兵車萍水上浮萍蓱上同竮竛竮又普經切郱郱城在東莞織蒲爲器洴莊子曰有洴澼絖造絮者也箳箳篂别駕車名熒光也明也戸扃切六褮衣開孔也又音縈鬼衣也螢螢火禮記云季夏月腐草爲螢一名丹良又名蚈滎小水也又水名在鄭州䁝䁝惑也又余傾切貨也扃戸外閉關古螢切八駉駿馬也詩曰駉駉牡馬傳云良馬腹幹肥張也駫馬肥盛也坰野外曰林林外曰坰冋古文􅫪􅫪􅤜班䑕絅引急也木名十六蒸衆也進也君也又麁曰薪細曰蒸說文曰析麻中幹也又爾雅曰冬祭曰蒸經典亦作烝煑仍切七䒱說文同上烝說文曰火氣上行也熟也䕄𦵔也篜玉篇云竹也脀癡皃承次也奉也受也又姓後漢有承宫署陵切三丞佐也翊也物理論曰髙祖定天下置丞相以統文德立大司馬以整武事爲二府也􅹊軺車後登也出字林澂清也直陵切五澄上同瞪直視也又直庚切憕平也又竹萌切懲戒也止也陵大阜曰陵釋名曰陵崇也體崇髙也又犯也侮也侵也遟也又漢複姓六氏吴延陵季子之後有延陵氏髙士傳有於陵子仲戰國䇿有安陵丑吕氏春秋有鉛陵卓子漢有髙陵顯秦昭王弟髙陵君之後楚有公子食采於鄧陵後以爲氏力膺切十八淩歴也又水名岀臨淮亦姓吴將有淩統夌說文越也綾綾紈凌冰凌上同蔆芰也菱䔖並同㥄怜也鯪臨海風土記曰鯪魚腹背皆有刺如三角菱也崚崚嶒山皃㱥㱥殑鬼出皃崚去也說文曰馬食榖多氣流四下也本力甑切掕止也又力證切祾祭名神靈之福欺俗膺胷也親也於陵切四應當也又姓出南頓本自周武王後左傳曰邦晉應韓武之穆也漢有應曜隱於淮陽山中與四皓俱徴曜獨不至時人語之曰南山四皓不如淮陽一老八代孫劭集解漢書􅣒寒蟬鷹鳥名月令曰驚蟄之日鷹化爲鳩凭依几也扶冰切五馮周禮馮相氏鄭玄云馮乗也相視也丗登髙臺以視天文又防戎切憑憑託淜說文曰無舟渡河也㵗水聲冫水凍也說文本作仌筆陵切三冰上同說文本魚陵切掤說文曰所以覆矢也詩云抑釋掤忌蠅蟲也詩云螢螢青蠅余陵切一繩直也又繩索俗作縄食陵切十二譝稱舉憴上同鱦小魚乗駕也勝也登也守也說文作椉覆也又姓漢有乗昌爲煑棗侯椉上同古文澠水名在齊左傳云有酒如澠又泯緬二音溗波前後相淩也塍稻田畦也畔也塖上同騬犗馬升十合也成也又布八十縷爲升識蒸切五昇日上本亦作升詩曰如日之升升出也俗加日陞登也躋也勝任也舉也說文本从舟經典省作月他皆倣此又漢複姓何氏姓苑有勝屠公爲河東太守又書證切抍上舉易曰抍馬壯吉說文音蒸上聲仍因也就也重也頻也又姓出何氏姓苑如乗切七艿草名謂陳根草不芟新草又生相因艿也所謂燒火艿者也䚮厚也辸往也礽福也扔引也㭁木名兢兢兢戒慎居陵切二矜本矛柄也巨巾切字様借爲矜憐字徵召也明也成也證也經典省作徵又姓吴太子率更今河南徵崇陟陵切四古國名癥腹病旌旗柱說文本丑善切旌旗杠皃繒繒帛又姓漢功臣表有繒賀疾陵切六鄫國名也在琅邪驓馬名四骹皆白橧豖所寢也竲髙皃嶒崚嶒山皃凝水結也又成也魚陵切一興盛也舉也善也說文曰起也从舁从同同力也亦州名戰國時爲白馬互之地漢置武都郡魏立東益州梁爲興州因武興山而名虚陵切又許應切三嬹女字說文曰地名也稱知輕重也說文曰銓也又姓漢功臣表有新山侯稱忠處陵切又昌證切三爯并舉也偁宣揚美事又言也好也楊也舉也足也殑殑殑欲死狀其矜切又其拯切二䔷草名根可縁竹器又音琴㱡㱡㱡山矜切一硱硱磳石皃綺兢切又苦夲切一僜醉行皃丑升切三庱亭名在吴興孫權射虎處又丑拯切睖睖瞪直視磳硱磳仕兢切一砅水擊山巖聲披冰切一十七登成也升也進也衆也說文曰上車也亦州名漢文帝封悼惠王子爲牟平侯即此地也周爲登州取文登山而名又姓蜀有關中流人始平登定都滕切八璒石似玉也燈燈火簦長柄笠也㲪毾㲪䔲金䔲草㽅瓦器䳾䳾鶛鳥也楞四方木也魯登切六棱上同又威棱又柧稜木也稜俗輘車聲倰倰儯長皃祾祭也福也靈也僧沙門也梵音云僧伽蘇増切三鬙鬅鬙髮短䒏䒐甑神不爽也崩說文云山壊也北滕切一増益也加也重也又埋幣曰増作滕切十二憎憎疾磳硱磳石皃又土殑切曽則也亦姓曽參之後漢有尚書曽偉古作曽又音層矰弋射矢也罾魚網熷蜀人取生肉於竹中炙䎖舉也又飛鳥皃竲巢髙橧禮運曰夏則居橧巢譄加言也菎草瞢目不明武登切四蕄爾雅云存有蕄蕄在也䒐䒐䒏神不爽也穢也層重屋也昨棱切又作滕切三曽經也又作滕切䁬目小作態瞢䁬也朋朋黨也五貝曰朋書云武王恱箕子之對賜十朋也步崩切六堋射堋鵬大鳥棚棚閣又薄庚切倗輔也又姓漢書王尊傳云南山羣盗倗宗等又匹等切鬅鬅鬙被髮弘大也又姓衞有弘演胡肱切三鞃鞃軾中靶也苰藤苰胡麻也肱臂也古弘切二軾中靶也薨說文云公侯卒也呼肱切五說文曰惛也􅲰惛迷也大風也􅪋水聲能工善也又獸名熊屬足似鹿亦賢能也奴登切又奴代奴來二切一騰馳也躍也說文曰傳也曰犗馬也徒登切十二滕國名亦姓滕侯之後以國爲氏縢行縢㬺囊可帶者螣螣蛇或曰食禾蟲藤藤苰又藤蘿謄移書謄上黑虎也儯倰儯長也􅺤􅺤痛鰧魚名蒼身赤尾美目皃恒常也乆也亦州名春秋時鮮虞國地漢爲恒山郡周武帝置恒州因山以爲名爾雅曰恒山爲北嶽又姓楚有大夫恒思公胡登切三古文峘爾雅曰小山岌大山峘郭璞云岌謂髙也搄急也淮南子云大弦搄則小弦絶也古恒切三縆大索絙上同鼟鼟鼟鼓聲他登切四膯飽也吴人云出方言小水相添益皃上同漰漰㴾水擊聲普朋切二堋堋振動皃十八尤過也葚也怨也多也說文異也又姓出姓苑羽也切九枕木名腄縣名在東萊疣結病也釋名曰疣丘也出皮上聚髙如地之有丘也肬上同籕文沋水名在髙密郵境上舎亦督郵古官号釋名曰督郵主諸縣罰貟郵殿糾攝之又姓西京雜記有郵長倩訧過也博雅曰惡也憂愁也又姓出姓苑於求切十七優饒也亦優倡又姓史記楚賢臣優孟瀀瀀渥游本亦作優詩云愼爾優游麀牝鹿上同櫌鉏也又打塊搥鄾邑名在鄧􅖨微小怮含怒不言嚘欭嚘歎也覆種出王篇獶獶犬名菜名纋笄中㱊氣逆妋鼻目間恨劉剋也陳也殺也亦劉子木名實如棃核堅味酸美出交阯又姓出彭城沛國弘農河間中山梁郡頓丘南陽東平髙平東莞平原廣陵臨淮琅邪蘭陵東海丹陽宣城南郡髙堂髙密竟陵長沙河南等二十五望並自陶唐氏旣衰其後劉累學擾龍事孔甲范氏其後也唯河南一望即虜姓也後魏書官氏志獨孤氏後改爲劉氏力求切四十四留住也止也說文作畱亦姓出㑹稽本自衞大夫留封人之後後漢末避地㑹稽遂居東陽爲郡豪族吴志有左將留賛蒥蒥荑藥名勠并力也又力逐切摎絞縛殺也又姓魏有河内太守摎尚鶹鶹離鳥名少美長醜亦作流騮驊騮周穆王馬駵赤馬黒髦尾疁田不耕而火種􅦴粰􅦴饊也流演也求也覃也放也說文曰水行也㳅古文飂髙風也飀上同瘤肉起疾也釋名曰瘤流也流聚而生腫也榴石榴果名博物志云張騫使西域迴所得瑬美金說文曰垂玉也冕飾今典籍用下文旒旒旗旒廣雅天子十二旒至地諸侯九旒至軫大夫七旒至轂士三旒至肩瑠瑠璃食竹根䑕又音柳􅥡上同䉧說文云竹聲也又音柳竹名出玉篇瀏水清又音柳䬟風行聲又音柳䱖魚名鰡同上嵧岣嵧羅君山峯􅼻扶􅼻藤名縁木生其味辛可食其花實似蒟醬鎦殺也綺别名也斬刺殺也懰烈也餾飯氣蒸也又力救切䖻蜉䖻蟲本作蜉蝣蝣音游裗爾雅曰衣裗謂之䘽郭璞云衣縷也齊人謂之攣或曰袿衣之飾􅽑飛鸓鳥名麻也硫石硫黄藥名遛逗遛䚧觩䚧角皃憀悲恨也又音聊鏐美金曰鏐即紫磨金也秋春秋說文曰禾榖熟也又姓宋中書舎人秋當七由切十七秌古文鞧車鞧緧上同說又曰馬紂也上同周禮曰必其牛後鞦亦上同又鞦韆繩戲古今蓺術圖曰鞦韆北方山戎戲以習輕趫者湫水池名北人呼鶖秃鶖鳥亦作樢鰍魚屬亦作鰌楸木名萩蕭似蒿也􅖚爾雅曰鼁􅖚蟾蝫郭璞云似蝦蟆居陸地淮南謂之去蚥䵸上同蟗爾雅曰次蟗鼅鼄䨂雞雛篍說文云吹筩也玉篇云吹簫也趥說文曰行皃猷謀也已也圖也若也道也說文曰玃屬一曰隴西謂犬子爲猷以周切四十五猶上同又尚也似也悠逺也遐也思也憂也油水名出武陵又油脂由從也經也用也行也又姓史記有由余攸所也又姓北燕尚書攸邁蕕水蕕草又臭草浟水流皃氣行皃或作逌􅟧歋􅟧以手相弄冘冘䂊不定行也輶輶車又易受移授二切蘨草盛也秞禾盛皃蚰蚰蜒蝣蜉蝣朝生夕死櫾木名出崐崘山楢積也又音酉水草一名軒于斿旌旗之末垂者游浮也放也又姓出馮翊廣平前燕慕容廆以廣平游邃爲股肱遊上同古文卣中樽樽有三品上曰彞中曰卣下曰罍䚻從也鮋鮂鮋小魚䱔上同抌杼曰出周禮揄上同又音俞舀上同又以沼切偤侍也出文字辨疑䍃瓦器遺玉又弋九切邮亭名在髙陵繇猶也皁也㾞病也又息惡肉囮鳥媒㘥上同庮乆屋木周禮曰牛夜鳴則㾞鄭司農云庮杇木臭也又弋乆切空也說文云生條也引書云若顚木之有枿又胡感切上同下視深也說文草也牛大牲也丗本曰黄帝臣胲作服牛史記曰紂倒曵九牛又姓出隴西本自殷周封微子於宋其裔司冦牛父帥師敗狄長丘死之子孫以玉父字爲氏風俗通云漢有牛崇爲隴西主簿馬文淵爲太守羊喜爲功曹涼部云三牲備具語求切一遒盡也即由切又自秋切十一鮂烏化爲魚頂上有細骨如禽毛䎿耳鳴聲蝤蝤蛑似蟹而大生海邊也又自秋切啾啾唧小聲逎縣名在燕又迫也促也接髮揂聚也揫束也聚也湫水名又子小切聚也又束枲也酋長也說文曰繹酒也禮有大酋掌酒官也自秋切十㥢慠也遒盡也又即由切䎿耳中聲也又即由切崷崷崪山峻皃鰌魚名二月有之蝤蝤蠐蝎也煪煪熮隿射收繳角也􅙤􅙤液周禮音糟脩脯也又長也又姓漢有屯騎校尉脩炳姓苑云今臨川人息流切七修理也說文飾也羞恥也進也又致滋味爲羞􅧮􅧮饙􆁟上同䡭䡭䡜載喪車樇木名抽抜也引也或作紬紬引其端緒也丑鳩切八上同㨨上同見說文婤好皃又音周失意視皃惆惆悵瘳病愈妯詩曰憂心且妯妯動也悼也恘戾也去秋切三上同㲃㲃屈犫白色牛說文曰牛息聲也又姓風俗通云晉大夫郤犫之後吕氏春秋云陳留有惡人焉曰敦洽犫糜狹顙廣額顔色如漆陳侯恱之赤周切二犨上同周周帀也又至也備也徧也密也又姓出汝南廬江尋陽臨川陳留沛國泰山河南等八望夲自周平王子别封汝川人謂之周家因氏焉一云赧王爲秦所滅黜爲庶人百姓稱爲周家因而氏焉魏官氏志獻帝次兄普氏後改爲周氏又漢複姓魏初徴士燉煌周生烈晉武帝中經簿云周生姓烈名職流切十州州郡周禮曰五黨爲州又姓左傳晉大夫州綽校米粉餅出字林輖重載也洲洲渚也爾雅曰水中可居曰洲賙贍也喌呼雞聲又音祝舟舟船墨子曰工倕作舟吕氏春秋曰虞姁作舟丗本曰共鼓貨狄作舟二人並黄帝臣又姓左傳晉大夫舟之僑郮黄帝後所封國婤女字左傳衛襄公有嬖人婤姶又音抽讎匹也仇也市流切十懸擊也上同說文棄也鮋魚名又直留切酬周也報也以財貨曰酬又酬酢醻上同說文本作主人送客也詶以言荅之又之又切雔說文曰雙鳥也又爾雅曰雔由樗繭郭璞云食樗葉俗作㘜魗惡也棄也又音醜􅗪蜀江源地又音儔柔順也安也說文曰木曲直也耳由切十六鍒鐡之耎也㽥良田騥馬青驪也蝚爾雅云蛭蝚至掌又云蝚蛖螻蛭音質蹂踐榖又而九切葇香葇菜鞣熟皮鰇魚名瑈玉名也見聲類腬肥皃鶔鷗鶔鳥揉捻也又順也詩曰揉此萬邦箋云揉順也又汝又切䰆馬之繁鬣郷名䐓面和收歛也捕也又夏冕名史記曰堯黄收純衣俗作收式州切一丘聚也空也大也又丘陵爾雅非人爲之曰丘郭璞云地自然生說文作丠亦姓岀吴興河南二望風俗通曰魯左丘明之後又云齊太公封於營丘支孫以地爲氏代居扶風漢末丘俊持節江淮屬王莽篡位遂留江左居吴興也又漢複姓四十四氏左傳齊有藉丘子鉏梁丘據閭丘嬰莒有著丘公渠丘父後並因邑爲氏晉有虞丘書爲乗馬御祖氏家記有太中大夫東安於丘淵史記有狐丘子林楚有苞丘先生齊桓公至麥丘麥丘人年八十三祝桓公封於麥丘其後氏焉孟子齊有曼丘不擇又有咸丘蒙隱居列仙傳有浮丘公梁州刺史莊丘黒魯莊公庶子食采於瑕丘其後氏焉齊有勇士葘丘訴神仙傳漢有稷丘子又有廪丘充隱居齊魯之間楚有列威將軍何丘寄楚文王庶子食采於軒丘其後爲氏周宣王支庶食采於謝丘其後爲氏漢有趙人吾丘壽王又有曹丘先生侍御史余丘炳鉅鹿太守莊丘勝以勇力聞安丘望之注老子列仙傳有髙邑人商丘子胥藝文志有桑丘公漢有吴人龍丘萇隱居不屈濟北蛇丘惑爲河内太守魏有幽豫二州刺史毌丘儉吴有平原陶丘洪晉有雍丘洛以武力聞何氏姓苑云漢有司隷校尉水丘岑古有蔡丘欣喪馬淮陽東海北丘氏又有羌丘常丘﨑丘獻丘陽丘逢丘厚丘泥丘等氏又虜複姓二氏後魏獻帝次弟丘敦氏後改爲丘氏丘林氏後改爲林氏去鳩切六丠古文蓲烏蓲草名蚯蚯蚓蟲名禮記孟夏月蚯蚓岀邱地名訄追也䬌風吹皃匹尤切七秠一稃二米又芳鄙切寐作聲衃疑血肧孕一月又普回普來二切紑說文云白鮮衣皃又甫鳩切醅醉飽又普裴切鳩鳥名又聚也居求切十秦藥名又居由切大力朻髙木又居虯切䡂車軫長也㽱腹中急痛又古巧切􅍐鬪取也又音糾丩相糾繚也龜又居危切勼說文聚也不弗也又姓晉書有汲郡人不準盗發六國時魏王冢得古文竹書今之汲冢記也甫鳩切又甫九甫救二切五哹吹氣紑詩傳云㓗鮮貌䍍未燒瓦器鴀鴀鳩鳥也􅊧索也求也聚也所鳩切十七搜上同凡從叜者作叟同􆄖飯壊􅷒􅷒飋風皃􅘞小便䤹馬金耳飾廋匿也論語曰仁焉廋哉蒐茅蒐草又春獵曰蒐􅭚鷄腸草也獀獶獀南越人犬名䐹乾魚北方國名䗏蛷䗏蟲亦名蠷䗏蕃中大馬犙牛三歳也又息含切白酒趨不進搊手搊楚鳩切七俗餘倣此篘酒篘醔上同㮲板木不正粉謅謅隂私小言鄒縣名屬兖州又姓漢有鄒陽側鳩切十四鄹上同郰說文云孔子之郷也論語作鄹騶廐御亦騶虞仁獸又姓越王之後齱齱齵齒偏陬郷名一曰隅也緅靑赤色也又子侯切䑼艆䑼海船名獸足也菆草名又矢之善者說文曰麻蒸也一曰蓐也棷薪之别名又又苟切箃竹柴别名小兒聲黀聚麻愁憂也悲也苦也士尤切二㵞腹中有水氣也休美也善也慶也息也又木名許尤切十三貅貔貅猛獸㹯上同鵂鵂鶹鳥也馬名㾋下病庥爾雅曰庇庥廕也郭璞曰今俗呼樹䕃爲庥脙瘠也俗作䏫又音求上同髤周禮駹車有髤飾注謂髤漆赤多黒少也或作髹上同咻口病聲也㵻汗面亦作膄囚拘也繫也似由切六泅人浮水上汓古文苬芮芝瑞草一歳三華又音由慒慮也又在冬切鮂白鯈儔儔侣也直由切二十七檮剛木也躊躊躇幬說文作襌帳也上同裯襌被􅔧咨也說文誰也又作疇誰也等也壅也田疇也又疇昔說文作耕治之田也紬大絲繒又音抽綢綢繆猶纒綿也稠穊也多也燽著也薵薵藉葱名鯈魚子又魚名也籌籌筭雉爾雅云南方曰􅔧字或從鳥上同棸字統云姓也又側鳩切椆木名不凋怞朗也腊脯也懤愁毒皃鮋魚名又音由䬞風颸菗荼菜􅗪蜀江原地又上牛切說文云籌箸也輈車轅也張流切十一盩盩厔縣在京兆府水曲曰盩山曲曰厔又云引擊也啁啁噍鳥聲譸譸張誑也爾雅亦作侜侜壅蔽也騪蕃中大馬調朝也詩云惄如調飢本又音條咮曲喙又張救切行不進也射馬箭也矪上同皮衣詩云取彼狐狸爲公子又姓本作仇避讎改作巨鳩切四十四裘上同仇讎也又姓左傳宋大夫仇牧之後又漢複姓有章仇仇尼二氏隋有章仇大翼善天文叴漢書地理志叴猶縣屬臨淮郡又詩曰叴矛鋈錞傳云叴三隅矛又說文曰髙氣也叴上同求索也又姓三輔決録云漢有求仲上同頄頰間骨也又求龜切蛷蛷螋蟲上同說文云多足蟲也逑匹也球美玉說又曰玉磬也璆上同又渠幽切艽逺荒之地詩云至于艽野又獸蓐也鼽月令云人多鼽嚔說文云寒鼻塞也莍椒也䣇地名賕財賄殏也梂說文曰櫟實也一曰鑿首朹爾雅曰朹檕梅郭璞云朹樹狀似梅子如指頭赤色似小㮈可食㭝荆㭝亭名俅戴也脙瘠也又音休上同馗爾雅曰中馗菌今土菌可食又音逵䊵急引也絿上同䜪䜱䜪亭名扏緩也銶鑿屬廣蒼云戴也籠也毬毛毬打者䟵䟵蹋也犰犰狳獸似魚蛇尾豕目見人則佯死違也訅安也謀也釚弩牙捄長匕皃詩曰有捄棘匕傳云捄長皃肍乾肉醬也怨仇也又其九切白芷訄迫也又去牛切浮㲹也縳謀切二十四哹吹氣又拂謀切桴齊人云屋棟曰桴也枹鼓槌竹有文者罦覆車網也䍖上同琈玉名粰粰􅦴䳕䳕鳩罘兔罟䱐魚名涪水名在巴西芣芣苢車前也江東謂之蝦蟆衣蜉蚍蜉大螘烰火氣爾雅曰烰烰烝也郭璞云氣出盛鉜鉜鏂大釭􅾬多也􅸛姓也出纂文艀舟也棓杖也又音棒掊把也䍌小缶䨗雨雪皃謀謀計也又姓風俗通云周卿士祭公謀父之後莫浮切二十四䱕魚名雺天氣下地不應又莫貢切又莫紅切眸目童子牟說文曰牛鳴又過也陪也進也大也亦牟平縣屬登州又姓風俗通云牟子國祝融之後後因氏焉漢有太尉牟融又漢複姓三氏東萊先賢傳有兖州刺史平昌曹牟君卿禮記云魯有賔牟賈何氏姓苑有彌牟氏侔等也均也齊也矛戈矛說文曰酋矛也建於兵車長二丈象形吴越春秋曰越王以屈盧之矛歩光之劒獻於吴王古文鍪兠鍪首鎧說文曰鍑屬也鞪上同漢書云鞮鞪麰大麥又短粒麥上同堥堆堥小隴劺勉也􅛙􅛙䤅榆人醬蝥食穀蟲說文本又作蟊蟲食艸根者吏抵冒取民財則生蟊上同說文曰蠿蟊也鷚鷚鸙鳥也􅼘髮至眉或作髳䋷縛也恈愛也鴾鶉之别名蛑蝤蛑似蟹而大繆絲千累十九侯候也何也美也辝也爾雅曰父侯君也又乃也又周禮司裘氏王大射則共虎侯熊侯豹侯諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠鄭司農云方十尺曰侯四尺曰鵠說文本作侯从人从象張布之狀矢在其下又姓出上谷河南二望亦漢複姓八氏夏侯氏出自夏禹之後杞簡公爲楚所滅其弟佗奔魯魯悼公以佗出自夏后氏受爵爲侯謂之夏侯因而命氏後有去魯之沛者分沛立譙遂有譙魯二望羅國爲楚所滅其後号羅侯氏韓詩外傳云周宣王大夫韓侯子有賢德史記魏有屈侯鮒左傳曹有豎侯氏孺漢有尚書郎栢侯雋吴有張昭師白侯子安又虜三字姓二氏周書有侯莫陳氏侯崇傳云其先魏之别部也又周有大將軍伏侯龍氏名恩戸鉤切二十四矦見上注古文帿射侯見上注俗從巾鄇地名䫛䫛䫘大言鍭箭鏃銗鏂銗錏鍜猴獼猴猱也糇糇粮翭說文曰羽本也一曰羽初生皃翵上同餱乾食喉咽喉篌箜篌鯸鯸䱌魚名㮢㮢桃文㮢櫟木也谷名在成臯亦作瘊疣癭䗔蟲名葔葔莎草骺骨骺睺半盲又胡遘切䙈䙈褕小衫謳吟也歌也烏侯切十六嘔嘔唲小兒語也歐歐陽複姓出長沙郡甌瓦器亦甌閩又姓出姓苑區姓也古善劒區冶子之後今郴州有之漚浮漚鷗水鳥說文云水鴞也䁱深目皃又若侯切瞘上同櫙木名爾雅曰櫙荎今之刺榆蓲上同醧酒甘剾剾㓱又格侯切䙔小兒涎衣鏂鏂銗膒乆脂羺羺胡羊奴鉤切四獳犬怒䨲兔子䰰鬼鬽聲䰰䰰不止也出說文樓亦作婁重屋也亦姓夏少康之裔周封爲東樓公子孫因氏焉漢末樓秦自譙徙居㑹稽因以東陽爲望也又虜複姓有蓋樓氏賀樓氏落侯切二十九婁空也又星名亦姓邾婁國之後漢有婁敬又漢複姓五氏左傳齊大夫工婁灑漢書藝文志有齊隱士贛婁子著書何氏姓苑云母婁氏今琅邪人又有精婁氏邾婁氏又虜複姓二氏後魏獻帝次弟爲伊婁氏又有匹婁氏後並改爲婁氏說文作婁今作婁並同䣚郷名又力于切􅖮縣名􅌣􅌝􅌣土瓜蔞爾雅曰購蔏蔞蔞蒿也生下田初出可啖詩云言采其蔞又力朱切􅸺頭􅸺小穿䝏求子豬也土似羊四角其銳難當觸物則斃食人出山海經僂躽僂又力主切艛舟名耬種具髏髑髏膢八月祭名又力于切􅕕􅕕苦􅕕廔廲廔綺剅小穿又音兠摟探取嘍嘍唳鳥聲瞜視皃螻螻蛄一名仙蛄一名石䑕爾雅曰天螻又曰蝚蛖螻簍籠也鞻鞮鞻氏掌四夷之樂慺慺慺謹敬之皃鷜爾雅曰鵱鷜鵞即今之野鵞䱾魚名褸衣襟又力主切遱說文曰連遱也謱說文云謰謱也涑澣也速侯切八鏉刻鏤䩳軟皮上同白頭人也摗摟摗取也出陸氏字林今欶女字彄弓彄恪侯切八摳摳衣挈衣也剾宛裏也又乙侯切韝射韝臂捍也又古侯切指滱水名在北地又音寇夠多也䁱目深瞘䁱齁齁䶎鼻息也呼侯切二鳥青色似䳕鳩也麻幹子也侯切五緅青赤色也再染曰緅三入成纁陬隅也又聚居棷薪别名掫說文云夜戒守有所繫也偷盗也爾雅云佻偷也謂苟且託侯切四鍮鍮石似金陶之則分鋀上同媮薄也又巧黠也頭說文云頭首也釋名云頭獨也於體髙而獨也度侯切十五㓱剾㓱足節又刀剜物投託也弃也合也說文擿也亦姓郇伯周畿内侯桓王伐鄭投先驅以䇿其後氏焉漢有光禄投調又漢複姓有投壷氏風俗通云晉中行穆子相投壷因以氏焉姓苑云東莞人也字書云麻一絜說文云屬或作䵉骰骰子博陸采具出聲譜遥擊皃坄陶䆫牏築垣短版又羊朱切䤅􅛙䤅醬也㢏㢏行圊廁揄引也又欲朱切窬穿也又羊朱切緰布也歈歌也又羊朱切鴢頭鵁似鳧腳近尾齵齱齵五婁切又牛俱切一鉤曲也又劒屬字樣句之類並無著厶者古侯切十八􅧉說文云關西呼鎌爲􅧉也溝溝渠爾雅云水注谷曰溝釋名曰田間之水曰溝溝搆也縱横相交搆也褠襌衣韝臂捍又苦侯切緱緱氏縣屬河南府又姓孝子傳陳留緱氏女名王亦刀劒頭纏絲爲緱篝燻籠􅱥桃枝竹名􅔢􅔢鼊似龜說文其俱切屬頭有兩角出遼東亦作㗕唱㗕􅕕䑦䑦􅑳船名冓數名十秭曰冓枸曲木又木名也句說文曲也又髙句驪遼東國名又句龍社神名亦姓史記有句疆又九遇古候二切軥車軥心木又夏后之輅曰軥也夠多也鴝鴝鵒鳥又音衢兠兠鍪首鎧也當侯切十侸佔侸垂下皃佔丁兼切吺輕出言皃飼馬籠也眵目汁疑眵赤支切剅小穿又音婁或作說文云目蔽垢也小裂皃郖說文云弘農縣庾地白頭㔌細斷徂鉤切二鯫魚名又士苟切又小人之皃也裒聚也薄侯切九䯽說文云髮皃捊說文云引取也抔手掬物也掊詩曰曽是掊克謂聚斂也䏽豕肉醬也饇曰食也䍌說文云小缶也箁說文云竹箁也䜅就也千侯切一呣慮也亡侯切一二十幽深也微也隱也亦州名釋名曰幽州在北幽昧之地故曰幽禹貢兾州之域舜以兾州南北廣大分燕北爲幽州又北方曰幽都又姓出姓苑於虯切七泑澤在崐崘山下呦鹿鳴上同􅝦􅝦蟉龍皃又一糾切怮說文憂皃􅖨微也虯無角龍也渠幽切又居幽切七觩上曲皃璆玉名觓角爵皃鷚爾雅云鷚天鸙郭璞云大如鷃雀色似鶉好髙飛作聲又音繆蟉􅝦蟉龍皃角皃彪虎文也甫烋切三髟髪垂皃又標彡二音驫馬走皃又音標鏐紫磨金也力幽切二蟉􅝦蟉又翹糾切樛說文曰下句曰樛詩曰南有樛木傳云木下曲也居虯切五說文曰相糾繚也今作丩同草之相糾繚也朻說文云髙大也㽱腹急病也淲水流皃亦作滮皮彪切三瀌雨雷皃又音鏕風皃稵禾生也子幽切一犙牛三歳山幽切一聱聱取魚鳥狀語虯切又玉苞切一飍驚風香幽切又風幽切二烋美也福禄也慶善也出玉篇又火交切繆詩傳云綢繆猶纒緜也說文曰枲十絜也武彪切又目謬二音三鷚天鸙鳥也又音虯䋷縛也二十一侵漸進也說文作㑴又姓三輔決録有侵恭七林切七上同駸馬行疾也浸浸滛也又子鴆切䜷野生豆也錐也綅說文曰絳綫也詩曰貝胄朱綅又子心息廉二切尋長也又尋常六尺曰尋倍尋曰常山海經曰尋木長千里生河邊又姓晉有尋曽字子貢徐林切十六上同出說文鐔劔鼻又姓漢有鐔顯又覃淫二音潯傍深又水涯也鱏魚名口在腹下又音淫樳木名似槐鄩地名在鞏又姓左傳有周大夫鄩肝小堆阜也􅴙姓也出纂文􅴋姓也姓苑云汝南人襑衣博大也枔木葉撏取也灊水名岀巴郡又才心昨鹽二切鬵鼎大上小下又才心昨鹽二切續也林林木爾雅曰野外謂之林說文曰平土有叢木曰林又姓風俗通曰林放之後力尋切八琳玉名淋以水沃也臨莅也大也監也又姓後趙録有秦州刺史臨深也痳痳病箖箖箊竹名瀶水出皃說文云谷也一曰寒也霖乆雨琛琛寶也丑林切七棽木枝長又林森二音䑣船行私岀頭視也又丑鴆切綝繕也郴縣名在桂陽又姓陶偘别傳有江夏郴寶賝賝賮也斟斟酌也益也又姓國語云祝融之後侯伯八姓斟姓無後賈逵注云斟姓是曹姓之後又漢複姓有斟弋氏岀史記職深切九針針線鍼上同說文曰所以縫也鴜鳥名箴箴規也又姓風俗通云有衞大夫箴莊子葴酸蔣草也瑊廣雅曰瑊石次玉也郭璞云瑊似玉之石司馬相如子虚賦曰其石則瑊玄礪鱵魚名㘰㘰鄩古國名沈沒也說文曰陵上滈水也又漢複姓魯有沈猶氏常朝飲其道何氏姓苑云今泰山人直深切又尸甚切九沉俗水牛莐爾雅曰􅙛莐藩郭璞云生山上葉如韭䒞上同又羊針都敢二切霃乆隂湛漢書曰旦從俗浮湛又徒減切枕繫牛杙也鈂鍾屬碪擣衣石也知林切五砧上同椹鈇椹斫木質文字指歸俗用爲桑椹字非枮上同坫權安厝也諶誠也爾雅云信也氏任切七愖上同訦上同說文曰燕代東齊謂信曰訦忱上同煁煁烓行竈烓鳥珪切瘎腹内故病㽸上同任堪也保也當也又姓出樂安黄帝二十五子十二人各以德爲姓第一爲任氏如林切七鵀戴勝鳥也頭上毛似勝又女今切恁信也又音荏壬倿也又辰名爾雅曰太歳在壬曰玄􅘬紝織任亦作䋕銋銋濡廣雅韏也䛘信也念也深逺也又水名出桂陽南平式針切二蒲蒻淫乆雨曰淫書曰罔淫于樂傳云淫過也餘針切十五霪乆雨婬婬蕩竹名蟫白魚蟲鷣鷂之别名䒞熱也冘行皃上同䤁熟麴又昨淫切撢探也地名㸒貪也又延求切鐔劒鼻又尋覃二音鱏魚名又徐林切心火藏釋名曰心纎也所識纖微無不貫也息林切四乆緩皃車軥木杺木名其心黄愔靖也挹淫切二韾聲和靖也祲日傍氣也子心切又子禁切九梫木名兓銘意埐說文地也又昨淫切雞之别名髙鼻綅縫線錐也魚名大魚曰鮓小魚曰一曰北方曰鮓南方曰昨淫切十䰼上同見說文鬵說文曰大釡也一曰鼎大上小下苦甑曰鬵嶜嶜嵒梣木名埐地名又子心切掘也鈂上同又直林切灊水名出巴郡䤁熟麴又餘針切䛘䛘詉喉聲女心切三䋻䋻織也齊也或作紝鵀戴勝琴樂器神農作之本五弦周加文武二絃白虎通曰琴禁也以禁止淫邪正人心也又姓左傳琴張也巨金切二十二㩒急持捦上同擒亦同黔黒而黄亦姓齊有黔熬又巨炎切禽二足而羽者曰禽又姓髙士傳有禽慶芩黄芩藥名亭名檎林禽果名㕋說文云石地也鵭鶨鳥亦作鳹䔷草名根可縁竹器出玉篇澿水名凛寒狀又力甚切庈人名庈父雂鳥名又巨炎切㪁持也㱽禁也又竹甚切黚黄黒色又巨炎切䅾禾欲秀也耹音也靲靲鞻四夷樂也欽敬也又姓何氏姓苑云吴人也去金切五菳草名似蒿衾被也嶔嶔崟顉曲頥又五感切吟歎也說文云呻吟也魚金切十訡上同古文唫亦古吟字說文又巨錦切崟嶔崟水菜似䔉碞僭差􅷰霖雨又牛皆切乑衆立皃􅫏崟􅫏山崖狀也又口敢切歆神食氣也許金切四廞爾雅曰興也亦陳車服也亦廞巇山險皃又許錦切嬜愛也又火甘切㽎火盛皃金金寶說文曰五色金也黄爲之長乆薶不生衣百錬不輕从革不違西方之行生於土亦州名周爲附庸國魏於委康縣置東梁州後周改金州又金鼔釋名曰金禁也爲進退之禁也又姓古天子金天氏之後也又漢複姓有金留氏出姓苑居吟切九今對古之稱說文云是時也黅黄色衿衣小帶也又其禁切襟袍襦前袂䘳上同禁力所加也勝也又居䕃切㦗心㦗皃淺黄色說文云黄黒也又古咸切音說文曰聲也生於心有節於外謂之音宫商角徴羽聲也絲竹金石匏土革木音也於金切八隂隂陽也說文作隂闇也水之南山之北也又姓出武威風俗通云管修自齊適楚爲隂大夫其後氏焉隌爾雅云闇也注謂隌然冥貌又烏感切瘖瘖瘂文子曰皐陶瘖霠雲覆日又姓出纂文䜾䜷豆喑極啼無聲又於含切䤃醉聲又於南切森長木皃所今切十參參星亦姓丗本云祝融之後又蒼含切曑上同蔘人蔘藥也薓古文槮樹長皃襳襳襹毛羽衣皃突也穼上同棽木枝長也又丑林切岑山小而髙又姓出南陽風俗通云古岑子國之後後漢有岑彭鋤針切九涔涔陽地名又管涔山名又蹄涔不容尺鯉蹄牛馬跡㞥入山深皃梣青皮木名又子心切上同雨聲魚名䅾禾欲秀笒竹名說文曰首笄也側吟切四簪上同㻸石似玉也撍速也嵾嵾差不齊皃亦作參楚簪切六參上同梫梫桂木花白也又音寢字書云禾長皃駸馬行疾皃槮木長皃說文云内視也充針切一二十二覃及也延也又姓梁東寧州刺史覃旡先徒含切二十邱丘覃邱丘覃城縣名潭水名出武陵郡潭城縣東入鬱林又深水皃曇雲布藫水衣橝木名灰可染也蟫白魚蟲又音淫譚大也又姓漢有河南尹譚閎𧽼䟃𧽼走皃燂火爇壜甒屬鐔劒口又音尋眈視近而志逺又音耽㽎㽎㽎室深皃聒也􅴭馣􅴭香氣􅙛草名爾雅曰􅙛莐藩蕁上同䊤糝也㽑長味又徒紞切參參承參覲也俗作叅倉含切五驂驂馬䟃䟃𧽼傪好皃㜗玉篇云婪㜗也南火方亦果名臨海異物志云多南子大如指紫色味甘似梅又姓魯大夫南遺也又漢複姓九氏左傳齊有南史氏其後爲姓又魯有南宫敬叔晉國髙士全隱於南郷因以爲氏六國時有南公子著書言五行隂陽事莊子有南郭子綦又有南榮趎古有善暴背於南榮之者獻之於君其後爲氏又有南伯子蔡姓苑有南野氏又有南門氏那含切七男男子也又所封爵也環齊要略曰男任詔事受王命爲君柟木名又人詹切楠俗抩併持也又他含切䶲龜有距也又如詹切上同諳記也憶也烏含切十二䳺䳺鶉字林作䨄媕媕娿不決庵小草舎也腤煑魚肉也菴菴䕡草又菴羅果也㞄蹇跛之皃馣香也嬜貪愛韽聲小又於林切盦說文曰覆蓋也喑啼泣無聲含說文銜也胡男切二十二涵涵泳䈄實中竹名筨上同梒梒桃禮亦作含䤴鎧別名孟子云矢人豈不仁於䤴人哉矢人唯恐不傷人䤴人唯恐傷人函容也禮云席閒函丈顄顄頥上同蜬爾雅云蠃小者曰蜬頷說文曰面黄也又胡感切涵水澤多皃鋡受也似瓶有耳船沒䶃䑕屬又古南切圅銜也說文舌也肣排囊柄也說文同上䨡久雨上同􅝟說文曰嘾也艸木之華未發圅然象形又下感切寒皃婪貪也盧含切六惏上同燣焦色嵐州名近太原因岢嵐山爲名有渥洼池出良馬亦山氣也葻草得風皃啉酒巡匝曰啉出酒律亦作𧖟吐絲蟲俗作蚕非昨含切四撏取也䣟亭名止也簪作含切又側岑切七撍盡也篸所以綴衣又作感切䐶腤䐶䍼羊腌鐕無蓋釘也探取也說文作逺取之也他含切三撢周禮有撢人貪貪婪也釋名曰貪探也探入他分也耽說文曰耳大垂也又耽樂也詩曰無與士耽或作躭丁含切九湛湛樂亦見詩眈視近而志逺也酖嗜酒妉妉樂甔大甖可受一石媅婬過說文樂也内視又大含切多也龕塔也亦曰龍皃又云塔下室口含切十􅨹殺也刺也醜皃堪任也勝也克也說文曰地突也又姓風俗通云八元仲堪之後戡勝也克也和也又紅談古三二切嵁嵁崿又五男切𤬪瓦器撖挂也㪁敧多也㟏大谷也火含切八􅤇面紅馠小香含笑皃谽谽谺谷空唅唅呀不脫冠帶而寐也􅵸上同毿長毛皃蘇含切三蔘蔘綏垂皃犙牛也弇同也蓋覆也後漢有耿弇古南切又音掩五䶃䑕名淦水入船中又最也泥也汲也又甘暗切吉州有新淦縣水所出入湖或作汵䌠持意也又呼兼切蜬蠃小者又貝居水者肉如科斗但有頭尾䜙不惠也又謔弄言五含切三寐中言語嵁嵁㟧又苦男切二十三談談話又言論也戲調也又姓蜀録云晉有征東將軍談巴徒甘切十一郯國名其後以國爲姓春秋時郯子入魯辨古官與孔子相遇姓苑云沛人惔憂也錟長矛淡水皃又徒覽徒濫二切痰胷上水病澹漢複姓孔子弟子有澹臺滅明又徒覽徒濫二切倓恬也安也靜也又徒監徒坎二切餤進也詩曰亂是用餤又徒濫切刮馬箆也㶣小熱甘說文作甘美也又隴右州本月支國漢匈奴觻得王所居後魏爲張掖郡又改爲州取甘峻山名之界有弱水祁連山上有松栢五木美水茂草冬温夏涼又有仙樹人行山中飢即食之輒飽不得持去平居時亦不可見也又姓武丁臣甘盤之後又漢複姓有甘莊甘士甘先三氏古三切七柑木名似橘䇞䇞竹苷苷草藥出洮州泔米汁和也媣媣媞也擔擔負釋名曰擔任也任力所勝也都甘切五儋說文何也亦姓左傳周有大夫儋翩聸說文曰垂耳也南方有聸耳之國頕頰緩甔小甖三數名又漢複姓五氏三閭氏三閭大夫屈原之後也沛上計三烏群三烏大夫之後也三飯尞之後有三飯氏三州孝子之後有三州氏後單姓州蜀志有三丘務蘇甘切五參上同又七南所今二切俗作叄弎古文􅻋衣破襤􅻋鬖䰐鬖毛垂藍染草又姓戰國策有中山大夫藍諸魯甘切十一襤襤褸䰐鬢髮踈皃㩜㩜持籃籃籠長面􅬹􅬹鷜鳥名今俗呼郭公也懢懢貪皃䆾䆾䆱薄大儖儖儳形皃惡也灆瓜葅坩坩甒苦甘切一舑吐舌也他酣切九聃耳漫無輪又老氏名又姓左傳周大夫聃啓􅡭俗緂色鮮㘱水衝岸壞䔜葱别名䆱䆾䆱薄大㴂㴥㴂峻波也􅶽蘫􅶽瓜葅慙愧也昨甘切五慚上同鏨小鑿䳻鶚别名㨻說文暫也酣酣飲應劭曰洽也張晏曰中酒曰酣又樂也胡甘切八甝白虎䗣桑蟲魽蛤也和也又口含古三二切煔火上行皃炶上同邯江湘人言也又音寒姏老女稱武酣切一長面皃昨三切一蚶蚌屬爾雅曰魁陸本草云魁狀如海蛤貟而厚外有文縱横即今蚶也亦作魽呼談切五戲乞人物亦作歛嬜貪妄又一含切歛欲也憨癡也二十四鹽說文曰鹹也古者宿沙初作煑海爲鹽亦州近北鹽池因以名之又姓魯國先賢傳有北海相鹽津余廉切十五塩俗木名閻里中門又姓出天水河南二望壛壛榻也說文同上阽臨危檐屋檐說文曰檐㮰也簷上同櫩亦同步長廊也㶄說文云海岱之閒謂相汙曰㶄離鳥自爲牝牡也䦲語林云大夫向䦲而立說文曰䦲謂之樀樀廟門也㿕病走進也廉廉儉也釋名曰廉斂也自檢斂也亦姓趙有廉頗力鹽切二十鐮刀鐮也釋名曰鐮廉也薄其所刈似廉也鎌上同久雨㡘㡙㡘帷也簾簾箔釋名曰簾廉也自障蔽爲廉恥也三秦記曰明光宫以金玉珠璣爲簾箔薕薑也說文蒹也薟白薟藥又音斂蘞蔓草說文同上又音斂匳盛香器也又鏡匳也俗作奩籢上同赤礪石獫犬長喙又力劒切又音險獫狁也蠊蜚蠊蟲名說文作螊海蟲也長寸而白可食䆂禾名車輞􅣠􅣠鼓鼓初打也帘靑帘酒家望子鬑鬋也一曰長皃覝察也砭以石刺病府廉切又方驗切二古文銛銛利也說文曰臿屬纂文曰鐵有距施竹頭以擲魚爲銛也息廉切十三暹日光進也枮木名綅白經黒緯上同細又山韭也今通作韯凡從者倣此襳小襦纖細也微也憸利口孅銳也細也䯹髮也彡毛飾又所銜切􅧴疾利口也籤說文驗也一曰銳也貫也七廉切十臉臉􅌜也䑎上同鹼水和鹽又工斬切槧削皮又才敢七豔二切憸㤿憸詖也㤿音猒僉咸也皆也切割也㡨幖㡨記出字林譣譣詖詹至也應劭漢官曰詹事秦官也又姓楚詞有詹尹俗作詹職廉切六瞻瞻視占視兆也亦姓陳大夫子占之後又章豔切蟾蟾蠩蝦蟆也張衡靈憲曰羿請不死之藥於西王母恒娥竊之奔月宫遂託身於月是爲蟾蠩抱朴子云蟾蠩壽三千歳者頭上有角頷下有丹書八字玄中記云蟾蠩頭生角者食之壽千歳也噡噡言語也厃說文云仰也一曰屋招也秦謂之桷齊謂之厃本魚毀切棎果名似柰而酸視占切三撏撏取也蟾蟾光月彩又職廉切苫草覆屋又凶服者以爲覆席也又姓左傳魯季氏家臣苫夷失廉切三痁病又音店􅨺妗􅨺善笑皃又丑兼切䪜屏也處占切十一㚲㚲侈輕薄皃又尺渉切幨幨幃釋名曰牀前帷曰幨襜襜褕蔽膝裧上同􅢹􅢹􅢹衣動皃㾆皮剥也緂衣色鮮妗妗􅨺善笑皃又許兼切懘音不和也禮記作怗㡙也􅛂說文曰頰須也汝鹽切十二髯上同蚺大蛇呥噍皃柟梅也子如杏而醋􅠗多言蛅爾雅曰蟔蛅蟴郭璞云蛓屬也今靑州人呼蛓爲蛅蟴冉說文云毛冉冉也亦作冄袡衣縁䶲有距龜㾆皮剥又處占切舑舚舑長舌黏黏麴女廉切三粘俗䬯南楚呼食麥粥炎熱也說文曰火光上也于廉切一霑霑濕也又濡也漬也張廉切三沾水名在上黨說文他兼切黄也覘闚視也丑廉切又丑豔切二􅨺􅨺妗喜皃淹漬也滯也久留也敗也央炎切六菴菴䕡草又音諳崦崦嵫山下有虞泉日所入又於檢切醃鹽醃又葅也䣍邑名閹男無勢精閉者􅢯􅢯㥓意不安也丘廉切二曲頭鑿􅬺齒差語廉切一尖銳也子廉切十一殲盡也滅也瀸漬也沒也洽也又泉水出微皃㡨拭也􅳅􅳅㖩不廉又將豓切㖩子俱切漸入也漬也又慈染切虃百足草熸火滅䇝刺也銳意也又持戈說文絶也􅬆小雨又霑也鑯說文曰鐵器也一曰鐫也鋟以瓜刻櫃版也􅨾漬也或作又所咸切潛水伏流又藏也亦水名又姓姓苑云臨川人昨鹽切九朁於朁縣名屬杭州今作潛鬵甑也又才林切􅻔漂絮簀又音前灊水名在巴郡宕渠又古縣名在廬江又才林切䁮閉目内思燂周禮注云炙爛也古文螹螹蟲名箝鎖頭亦作鉗晉律曰鉗重二斤翹長一尺五寸又羌複姓有鉗耳氏說文籋也巨淹切十一鉗上同說文曰以鐡有所劫束也絹鉆持鐵者說文又敕淹切鐵鋤也一曰膏車鐵鉆黚淺黃黒色又古黚陽縣在武陵又巨今切拑脅持也黔黒黄色說文曰黎也秦謂民爲黔首謂黒色也周謂之黎民又音琴羬羊六尺爲羬鳹白喙鳥雂上同鍼鍼虎人名又之林切鈐兵鈐以閉房神府以備非常又鉤鈐星名說文曰鈐􅣾大犂也懕安也一鹽切七猒飽也又於豔切饜上同嬮和靜㤿㤿憸䅧䅧䅧苗美也含怒也又魚檢切燅說文曰湯中爚肉也徐鹽切九說文同上燖爓並同上䕭山菜摘物岀字諟及聲類㰊木細葉也小巾襳襳毛羽衣史炎切一㶣字林云小熱也直廉切三埤蒼云赤黄色誗言利美也又人名字書無鍼巨鹽切又音針一二十五添益也他兼切四沾說文曰水出壺關東入淇一曰沾益也黇黄色舚舚舑吐舌鬑鬢髮踈薄皃丁兼切八敁敁敠稱量佔佔侸輕薄也詀轉語㤴衣領又丁頰切􅙭上同耳小垂䀡目垂又丁念切甜甘也徒兼切五恬靖也湉木靖菾菜名藥名鬑鬑勒兼切六薕薕蒹秀了荻草熑煣軔說文曰火煣車網絕也溓大水中絕小水出也說文曰薄水也一曰中絕小水濂薄也燫火不絕皃謙敬也讓也苦兼切二䌠堅持意又呼廉切兼說文曰并也兼持二禾秉持一禾又姓衞公子兼之後古甜切七縑絹也說文曰并絲繒也鶼比翼鳥靑稻白米蒹荻未秀絲網鰜比目魚嫌說文曰不平於心一曰疑也戸兼切一稴稻不黏者又力兼切鮎魚名奴兼切三䬯說文曰相謁食麥也拈指取物也馦香氣許兼切七㾾㾰㾾病也䵌赤黄色㽐香美欦貪慾也又笑也䌠堅持意又契兼切妗美也二十六咸皆也同也悉也亦姓姓苑云巫咸之後今東海有之胡讒切十一鹹不淡醎俗函函谷關名又函書亦姓漢有豫章太守函熈又漢複姓漢末有黄門侍郎函治子覺又音含驩古縣名漢書只作咸諴和也鰜魚名稴不作稻也椷杯也㮭上同輱車聲緘緘封古咸切七䌠慳悋又堅持意口閉也瑊美石次玉玪上同尲尲尬行不正也黬釡底黒也說文曰雖晳而黒也古人名字晳攕女手皃所咸切十一摻上同詩曰摻摻女手又所減切檆木名似松爾雅又作煔杉上同櫼上同說文音尖楔也􅨾雨皃說文曰微雨也或作又子廉切微雨䀐瞻視又所儳切車聲鞍垂皃㺑犬容頭進也􅰉犬吠聲乙咸切又乙陷切三淊淊沒黯深黑也又乙減切嵒巖也又嶃嵒山髙皃亦地名五咸切十䫡面長皃又丘檻切黬釡底黒也又音緘羬山羊熊虎絕有力也麙上同􅬺齒皃碞僣差又牛金切㺂羊有力也和也又戲言也㰹笑皃許咸切五􅒕似蛤出海中也妗喜皃又香兼切􅢋􅢋谺谷空皃䩂出頭皃詀詀諵語聲竹咸切又尺渉切四䩇䩇䩂出頭皃鵮鳥啄物也又苦咸切鹹味諵詀諵也女咸切二喃上同讒譖也士咸切又士銜切十三獑獑猢似猿而曰又士銜切鏨小鑿又才三切饞不廉毚狡毚㺥上同鼻髙皃欃檀木別名攙刺也又楚銜切䑕名又埤蒼云䑕皃􅺜鳥􅺜物也儳儖儳皃惡也又仕陷切酁宋地名鵮鳥鵮物苦咸切五上同嵁嵁巖不平正皃厱山崖空穴閒皃䫡長面二十七銜說文曰馬勒口中从金从行銜行馬者户監切二甉乾瓦屋也巉險也鋤銜切八嶃嶃嵒山皃劖刺也說文曰斷也一曰剽也艬合木船鑱呉人云犂鐵說文銳也又士懺切獑獑猢又士咸切毚又士咸切嚵嚵氣說文曰小也一曰喙也又音懺巖峯也險也峻廊也五銜切三礹上同呻吟攙攙搶祅星爾雅作欃槍楚銜切又士咸切一衫衫衣所銜切八纔帛靑色又音裁髟屋翼也又長髮皃縿絳帛說文曰旌旗游也彡毛長芟刈草穇稴穇穗不實見齊人要術又所咸切監領也察也說文云臨下也古銜切又古懴切五礛礛䃴青礪視也鑑鑑諸以取月中水又明也㔋細切步渡水白銜切一嵌巖山也口銜切一二十八嚴嚴毅也威也敬也說文曰嚴令急也亦姓本姓莊避漢明帝諱改姓嚴語切二䉷射翳胡被也虚嚴切五杴鍬屬古作或作㸝方言云青齊呼意所好爲杴㿌㿌物在喉也禾傷肥也蘞芋之辛味曰蘞醃鹽漬魚也於嚴切二腌上同㪁㪁欹不齊丘嚴切又丘广切二厱山側空處也二十九凡常也皆也輕也非一也又姓周公子凡伯之後姓苑云晉陵人符咸切七帆船上幔也亦作颿又扶汎切􅚁輕也又孚劒切􅻽船舷氾國名又姓出燉煌濟北二望皇甫謐云本姓凡氏遭秦亂避地於氾水因改焉漢有氾勝之撰書言種植之事子輯爲燉煌太守子孫因家焉又音汎颿馬疾步柉木皮可以爲索䒦草浮水皃匹凡切二多智慧也廣韻下平聲卷第二新添類隔今更音和切緜名延切中全切閍北盲切平僕兵切凡符芝切䒦敷凡切
