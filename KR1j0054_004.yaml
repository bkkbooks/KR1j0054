body:
  text: 廣韻去聲卷第四蘇弄送第一獨用蘇統宋第二用同用余共用第三古巷絳第四獨用支豉寘第五至志同用之利至第六之吏志第七無沸未第八獨用魚據御第九獨用愚樹遇第十暮同用莫故暮第十一子計霽第十二祭同用子例祭第十三他蓋泰第十四獨用古賣卦第十五怪夬同用古壞怪第十六古邁夬第十七徒對隊第十八代同用徒戴代第十九方肺廢第二十獨用職刃震第二十一稕同用之閏稕第二十二無運問第二十三獨用許靳焮第二十四獨用魚怨願第二十五慁恨同用乎困慁第二十六乎艮恨第二十七乎旦翰第二十八換同用乎喚換第二十九古晏諫第三十襉同用古莧襉第三十一蘇見霰第三十二線同用私箭線第三十三蘇弔嘯第三十四笑同用私妙笑第三十五乎敎效第三十六獨用乎到号第三十七獨用古賀箇第三十八過同用古臥過第三十九莫駕禡第四十獨用余亮漾第四十一宕同杜用浪宕第四十二於敬映第四十三諍勁側同用迸諍第四十四居政勁第四十五古定徑第四十六獨用諸應證第四十七嶝同都用鄧嶝第四十八于救宥第四十九候幼乎同用遘候第五十幽謬幼第四十一七鴆沁第五十二獨用苦紺勘第五十三闞同苦用濫闞第五十四以贍豔第五十五㮇釅他同用念㮇第五十六魚欠釅第五十七戸韽䧟第五十八鑑梵同用古懴鑑第五十九扶汎梵第六十一送遣也蘇弄切三鬆鬆髮皃凇凍凇冰也鳳爾雅曰鶠鳯其雌皇郭璞云瑞應鳥雞頭蛇鵛燕頷龜背魚尾五彩色髙六尺許孔演圖曰鳯爲火精說文曰神鳥也亦州在秦隴西郡地漢改雍州爲涼州魏其地沒蜀蜀平屬雍州本自白馬互羗所居晉爲仇池國後魏置固道郡又爲南𡵨州又改爲鳳州馮貢切二古文貢獻也薦也又姓漢有琅邪貢禹古送切十贛賜也泳永貢水名出豫章虹縣名在泗州今音絳羾至也甘泉宫賦云登椽欒而羾天門􅞼從􅞼山名又戸工切䇨杯笿名㔶小杯名又音感㯯格木說文同上薏苡別名弄說文玩也盧貢切七贛愚也梇梇棟古縣名在益州礱磨礱又音聾哢郭公鳥吟㢅㢅屏㳥水名涷瀑雨又水名出發鳩山多貢切又音東七凍冰凍又音東棟屋棟爾雅曰棟謂之桴湩乳汁巨蒐民取牛馬湩以洗穆天子之足㼯㼯鬆髮皃䍶獸名似羊一角一目出秦戲山又音東控引也告也苦貢切六倥倥偬困皃悾誠心又苦紅切鞚馬鞚空空缺又苦紅切㸜穿垣出文字集略糉蘆葉裹米作弄切七粽俗䁓竊視偬倥偬㚇斂足又子貢切鯼石首魚又子工切緵小魚罟也又子工切瓮說文罌也烏貢切五甕上同􅜍瓶也說文曰汲缾也罋上同􅙄鼻塞曰􅙄􅢽􅢽詷言急俗作千弄切二愡愡恫洞空也又洞庭湖徒弄切十六恫愡恫不得志眮轉目絧相通之皃㓊冷也峒磵深詷􅢽詷胴大腸慟慟哭哀過也筒簫達又音同駧馬急走也衕通街迵過也說文迭也戙舩纜所繫㗢大歌聲出埤蒼又戸冬戸宋二切鐘聲痛病也傷也姓出姓苑他貢切一仲中也爾雅曰中籥謂之仲亦姓風俗通云凡氏於字伯仲叔季是也湯左相有仲虺又漢複姓四氏左傳衛大夫仲叔圉魯有仲顔莊叔宋有司馬仲行寅後漢有山陽仲長統直衆切三蟲蟲食物又音冲或作蚛􆄺鳥名諷諷刺方鳯切二風上同見詩焪火乾物也去仲切三䛪䛪多言也又詢問也䠻使役也亦作㑋㝱寐中神游說文云寐而有覺周禮以日月星辰占六㝱之吉凶一曰正㝱無所感動平安自㝱二曰愕㝱驚愕而㝱三曰思㝱覺時所思念之而㝱四曰寤㝱覺時所道之而㝱五曰喜㝱喜恱而㝱六曰懼㝱恐懼而㝱亦作夢莫鳯切五夢上同又亡中切瞢雲瞢澤在南郡亦作夢鄸邑名在曹䠢䠢􅸱疲行皃􅸱䠢􅸱香仲切二䠗跳皃又丘幼切􅞲􅞲縠蓋中也莫弄切三霿天氣下地不應曰霿艨艨艟戰舩又音蒙趥行皃千仲切一賵賵賻撫鳯切二麷熬麥敠不迎自來徂送切二聚也中當也陟仲切又陟冲切二衷又陟冲切哄唱聲胡貢切五烘火皃港港洞開通鬨兵鬭也又下降切俗作􆄅蕻草菜心長齈多涕鼻疾奴凍切二癑痛也衆多也三人爲衆又姓左傳魯大夫衆仲之仲切又音終一銃銎也充仲切一㓽鍤屬仕仲切一烘火乾也呼貢切二戇戇愚人二宋州也即閼伯之啇丘也微子封宋二十餘丗爲齊楚魏所滅魏得其梁陳留齊得濟隂東平楚得沛梁即今郡地是也隋置宋州爾雅曰宋有孟諸之藪今爲睢陽縣地又姓取微子之所封遂爲氏出西河廣平燉煌河南扶風五望蘇統切一綜織縷子宋切三䝋牡豕錝金毛統揔也紀也又姓他綜切二􅳱黃色雺地氣上天不應莫綜切一䃔石聲乎宋切二㗢大聲三用使也貨也通也以也庸也又姓漢有用蚪爲髙唐令余頌切一頌歌也詩云吉甫作頌穆如清風又姓出何氏姓苑似用切四誦讀誦訟爭罪曰獄爭財曰訟吅爭言也出文字音義又宣喧二音俸俸秩也扶用切四㡝款書縫衣縫又房容切摓灼龜視兆也說文父容切奉也共同也皆也渠用切一葑菰根也今江東有葑田方用切亦作湗二封又方容切供設也居用切又居容切二龏又九容切雍九州名雍擁也東崤西漢南商北居庸四山之所擁翳也又姓風俗通云文王子雍伯之後於用切又於容切三灉河水決出還入爲灉又義容切㙲加土㙲田湩乳汁竹用切又都貢切三堹池塘塍埂諥言相觸也縱放縱說文緩也一曰舎也子用切又子容切二瘲病也蹱躘蹱行不正也丑用切二憃愚也又丑江切䩸毳飾而用切三上同鮐魚種種植也之用切又之隴切三偅儱偅不遇皃㼿甕屬重更爲也柱用切又直容切三緟繒縷婦人娠也贚貧也良用切三躘躘踵儱儱偅恐疑也區用切三古文藺蕩從隨行也疾用切又才容切一推也穠用切一四絳赤色又州詩譜云晉穆侯遷都於絳曾孫孝侯改爲翼翼晉之舊都後獻公又命爲絳邑秦爲河東郡後魏置東雍州周爲絳州又姓古巷切五虹又音紅降下也歸也落也又音缸伏也上同洚水流不遵道巷街巷又姓詩云巷伯胡絳切三衖上同亦作鬨說文云鬬也孟子鄒與魯鬨俗作􆄅戇愚也陟降切一䡴衝城戰車直絳切六憧戇憧兇頑皃又尺容切上同幢后妃車幰又宅江切撞撞鐘又直江切艟短船名􅷃直視丑絳切二䚎視不明也又丑江切漴水所衝也士絳切一肨脹臭皃匹絳切一䎫不耕而種楚絳切一淙水出皃色絳切二㦼捍船木也五寘止也置也廢也支義切八忮忮害心說文很也伎傷害也詩云鞫人伎忒亦作忮觶爵受曰升或作觝伿惰也又以智切䚳快也㩼多也山名避違也迴也毗義切一惴憂心也之睡切三杵擊上同詈罵詈力智切六荔荔支樹名葉緑實赤味甘髙五六丈子似石榴出廣志又音隷離去也又力知切㿛痩黒又力計切珕刀飾也又力許切䉣豉鹽豉廣雅云苦李作䜴是義切六敊上同青州人云彈鯷魚名重千斤郭璞云鮎之别名又音提音是䩃䩃面皃出新字林䊓黏皃積委積也子智切又子昔切四㰣歐也積草名羊相䍴賜與也惠也又姓丗本云齊大夫簡子賜之後斯義切六草名澌盡也禮注云死之言澌也上同儩上同杫肉机後漢之亂尚書郎無被枕杫也爲助也于僞切又允危切一䞈賭也詭僞切五垝坫堂隅可致物㩻痩極又去竒切攱攱戴物又居委切毀也帔衣帔披義切三秛禾租襬衣也賁卦名賁飾也亦姓漢有賁赫彼義切又肥墳奔三音七佊哀也論語云子西佊哉詖譣詖又慧也佞也貱益也陂傾也易曰無平不陂又音埤跛偏任又波我切藣草名又旄牛尾舞者所執又音陂髲頭髮也南越志云開平縣出髲平義切六被被服也覆也書曰光被四表又平彼切寢衣也鞁裝束鞁馬㢰㢰弓旇埤蒼云旌旗又衣服皃累縁坐也良僞切一寄寄附說文託也居義切二䐀肉四䐀徛石杠聚石以爲步渡臂肱也卑義切一芰菱也竒寄切八騎騎乗又姓燕有騎劫又音竒鬾鬼服又音竒輢枕輢又於綺切䝸䝸具四向用也㧘積也又前智切汥水戾䛋謀也刺針刺爾雅曰刺殺也釋名曰書姓名於奏白曰刺漢武帝初置部刺史掌奉詔察州成帝更名牧哀帝復爲刺史七賜切又七亦切十刾俗㢀偏㢀舎也朿木芒㡺人相依㡺誎數諫也莿草木針也庛周禮車人爲耒庛長尺有一寸鄭玄云耒下前曲接耜者蛓毛蟲䛋謀也易難易也簡易也又禮云易墓非古也易謂芟除草木以豉切又以益切六㑥相輕慢也貤物之重次也伿惰也㒾㒾􅼹面衣又失智切敡輕簡爲敡議謀也擇也評也語也宜寄切六誼人所宜也又善也竩上同􅔲正也止也䩃面皃出新字林義仁義從虫翅鳥翼施智切十三翄􅢄並上同施易曰雲行雨施又式支切馶馬強啻不啻鍦短矛䗐爾雅曰蛄䗐強䖹郭璞云今米穀中蠹小黑蟲是也建平人呼爲䖹子䧴鳥名本又音支卶有大慶也几也㒾㒾􅼹雨衣翨鳥翮又居豉切屣履不躡跟孟子曰舜去天下如脫敝屣所寄切又所綺切五灑灑埽說文汎也􅨌靴屬襹褷襹毛羽衣皃曬暴也觖望也窺瑞切又音決一餧餧飯也於僞切四萎萎牛䍴羊相䍴又音委􅖖禮記注益州有鹿􅖖僞假也欺也詐也危睡切一毀男八歳女七歳而毀齒沉僞切一恚怒恨也於避切二㜇說文曰不說也睡眠睡是僞切四瑞祥瑞也符也應也說文曰以玉爲信又姓出姓苑雅鳥别名又音垂䅜小積馶強也居企切二翨鳥翮說文云鳥之彊羽猛者周禮翨氏掌攻猛鳥又音翅䄲内也而瑞切一卶充豉切有大慶也一䅗禾四把也思累切二瀡滑也娷竹恚切飢聲二諈諈諉累也瓗玉名以睡切四纗絃中絶也䜜䜜恨也贀贀㛪也諉諈諉累也女恚切三㨅内也又姓㢻㢻㢰弓皃瞡規恚切視也一爭義切衣不展也二皺皮不展也孈呼恚切過也一㞆跛也卿義切二掎跛也說文曰偏引也又居綺切六至到也說文曰鳥飛从髙下至地也篆文象形脂利切十三摯國名亦持也又姓左傳周禮有摯荒贄執贄也周禮云以禽作六贄以等諸臣孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執鷄夲亦作摯鷙擊鳥礩柱下石又音質䥍田器說文曰羊箠也端有鐡又先列切鴲雀􅑹懥怒也䲀魚名杠絲名亦作􅶮􅶮上同禮巾􅧈至也位正也列也莅也中庭之左右謂之位于愧切一郿縣名在岐州明祕切又音眉十媚嫵媚魅魑魅鬽上同篃竹名蝞蝞似蝦寄生龜殻中食之益人顔色嚜嚜尿小兒多詐獪䉋笋冬生名煝焅熱娓從也又音眉音尾遂達也進也成也安也止也往也從志也又州名又姓岀姓苑徐醉切二十四彗帚也一曰妖星又音歳又囚芮切隧埏隧墓道也俗作𡑞襚贈襚旞羽繫旌上璲玉也詩曰鞙鞙佩璲鄭玄謂以瑞玉爲佩檖陽檖木名一曰赤羅子似梨小酢可食詩云隰有樹檖上同說文曰塞上亭守㷭者􅥂上同燧上同又論語云鑚燧改火澻田間小溝䡵輰䡵車也鐆陽鐆可取火於日中鐩上同穟禾秀說文曰禾穗之皃上同蔧王蔧草佩玉也㒸從意也􅣴禾稷成皃說文曰禾成秀人所收从爪禾穗上同䉌蘧篨囊組名或作􅗗醉說文曰醉卒也各卒其度量不至於亂也將遂切二檇左氏傳曰越敗吴於檇李又遵爲切邃深也逺也雖遂切九祟禍祟誶言也詩云歌以誶止粹易曰純粹精也睟視皃又潤澤皃說文云楚人謂卜問吉凶曰賥貨也譢讓也諫也告也問也意思深也類善也法也等也種也說文云種類相似唯犬爲甚从犬頪力遂切九淚涕淚俗作㴃瓃玉器又力追切血祭說文音律垒垒墼也岀字林蘱爾雅曰蘱薡蕫郭璞云似蒲而細纍係也䇐臨也又力地切禷祭名祕宻也神也視也勞也又姓西秦録有僕射祕冝俗作秘兵媚切十五告也愼也一曰逺也閟閟閉轡馬轡說文作柲戟柄左傳有鏚柲鉍上同泌泉皃鄪邑名在魯費上同䀣直視也䪐弓洩邲好皃粊惡米又魯東郊地名說文作菜粊上同女子匱竭也乏也說文曰匣也又姓何氏姓苑云今廬江人求位切十一蕢草器也臾上同今作虫貴皆從之饋餉也餽上同織餘櫃櫃篋樻木名又腫節名又口愧切鞼繡韋也盾綴革也亦作簣土籠馬韁濞水聲匹備切六嚊喘聲䑄盛肥㿙氣滿敗皃又魚名淠水名在汝南備備具也防也咸也皆也副也慎也成也又姓風俗通云宋封人備之後平祕切十七俻俗􅴻說文具也古文怒也又一曰迫也奰上同見經典省䑄壯大糒糗也犕牛具齒絥說文曰車絥也鞴上同上同贔贔屓壯士作力皃􅚰木名出蜀其穗可食㣁以筋帖弓䨽鳥如梟又非尾切㸢牑模媿慙媿俱位切六愧聭謉並上同騩馬色淺黒䁛大視帥將帥也曹憲文字指歸云佩巾也所類切又所律切二率鳥網也又所律切喟大息也丘愧切又苦拜切九嘳上同樻樻梧木腫節可爲杖䯣膝加地也䰎髻屈髮也腃筋節急也䙡紐也俗又作尯㝿也地名在洛陽豷豕息也許位切二燹火也字統音嗜嗜慾常利切六並上同視看視又音是眎眂並古文利吉也說文銛也亦州名華陽國志昔蜀王封弟於漢中号曰苴侯因命其邑曰葭萌秦滅蜀置巴蜀二郡先主改葭萌爲漢夀屬梓桐郡晉爲晉壽南齊分置東晉壽郡於烏奴今州城是又於其郡置西益州梁改爲秦州元帝又改爲利州又舎利獸名亦姓風俗通云漢有利乾爲中山相力至切八古文䬆烈風說文音栗莅臨也亦作涖涖涖涖水聲痢病也䚕求也䇐臨也膩肥膩女利切四上同出道書䁊目深皃又一活切䣵重釀酒也屁氣下洩也匹寐切二䊧上同劓割鼻漢文帝除肉刑劓者笞三百魚器切一致至也說文曰送詣也陟利切十五懫止也疐礙不行也又頓也詩曰載疐其尾疐跲也􅸤􅠶並俗躓礙也頓也說文跲也車前重也輊上同鷙馬腳屈也䞃賑也亦貝也赴也又於進也懥怒也恨也㨖刺也又劫財也質交質又物相贅又之日切駤駤棄說文捐也詰利切五弃古文夡夡多㞓身欹坐一曰㞍蟿蟿螽蟲名緻密也直利切十二稚幼稚亦小也晚也又姓史記云湯後因國爲姓遟待也又直尸切稺晚禾刺針縫也魚名治理也又直之切􅥚㑹物樲當也對也謘語謘履底也上同寐寢也卧也息也彌二切二媢夫妬婦又音冒杘籰柄也又杘嚜多詐丑利切八上同誺不知叨也訵隂知亦作呬分𧖟跮跮踱乍前乍卻笑也冀九州名爾雅曰兩河間曰冀州續漢書安平國故信都郡光武師薊南行太守任光開門出迎今州城是又姓左傳晉大夫冀芮几利切八兾上同見經典省覬覬覦希望穊稠也驥騏驥􅚮上同洎肉汁又音臮懻強力皃臮衆與詞也其冀切七曁及也至也与也鱀魚名鼻在額上又音忌洎潤也及也垍堅土墍息也又仰塗也水名悸心動也其季切五左右兩視也猤壯勇皃痵病中恐也熟寐也翠字林云靑羽雀又翠微亦姓急就章有翠鴛鴦七醉切三濢下濕臎鳥尾上肉二說文云地之數也而至切五弍古文貳副也亦攜貳變異也疑也敵也又姓後秦録有後魏平陽太守貳塵樲酸棗髶髮飾恣縱也資四切二說文曰戰見血曰傷亂或爲惛死而復生爲㰷又七利切次次第也亦三宿曰次又姓吕氏春秋荆有勇士次非七四切九䳐鳥名似梟人面山居所經國國必亡岀山海經佽佽飛漢武官名又助也利也代也遞也及也以漆塗器絘績所未緝者鳥名蟲似蜘蛛又資四切載見上文䯸髮也懿美也大也温柔聖克也又姓秦録有吏部懿橫乙兾切七饐食傷熟也㙪隂皃欭喑欭歎也鷧鷧鸕鶿鳥撎拜舉手左傳注云若今之揖亄貪也四說文曰隂數也象四分之形息利切十四亖籀文古文肆陳也恣也極也放也說文从隶極陳也又姓何氏姓苑有漁陽太守肆敏上同柶角匕大喪用之泗水名在魯說文曰受沛水東入淮又涕泗也牭牛四歳􅡐爾雅云狸子􅡐㣈䑕名說文曰㣇屬㣇羊至切俗作隷駟一乗四馬􅮸腦蓋蕼革也說文曰赤蕼也肂埋棺坎下器器血史記曰舜作什器於壽丘又姓岀姓苑去冀切一季昆季也又少也小稱也亦姓左傳魯有季友又漢複姓四氏晉有唐邑大夫季連齊古鬼方氏第六子名季連其後氏焉晉有祁邑大夫季瓜忽宋有季隨逢丗本云周有八士季隨季騧之後騧或作瓜又有魯大夫齊季窺昔齊公子季奔于楚楚遂号爲齊季氏居悸切二瞡視皃鼻說文曰引气自卑也毗至切十比近也又阿黨也又房脂必履扶必三切枇細節足氣不生坒地相次坒也亦音邲襣司馬相如著犢襣裩以豚祠司命也䫀首也䑄盛也芘草名䁤恚視也香季切三婎醜也又許葵切睢恣睢暴戾又許葵切痹腳冷濕病必至切六卑与也庇庇廕䑕莞可爲席䃾以豚祠司命也比近也併也萃集也聚也秦醉切六顇顦顇悴憔悴憂愁㱖止卒䆊稻禾黏也瘁病也地土地說文曰元气初分輕清陽爲天重濁隂爲地萬物所陳􅍌也元命包曰地者易也言養萬物懷任交易變化含吐應節故立字從大一一者爲地又虜複姓有地連氏地倫氏徒四切二籕文齂鼻息也虚器切六㕧呻也又火尸切屓贔屓呬息也又丑致切隂知也􅜦夏后氏有澆􅜦寒浞子名䨳說文云見雨而止息曰䨳肄習也嫩條也羊至切八殔釋名曰假葬於道曰殔說文云瘞也㡼倉也貤重物次第勩勞也隶本也及也又音代說文曰滫豪獸一曰何内名豕也又徒計切爾雅作貄重多示垂示神至切五易名又申也說文作謚謚上同又音益眎呈也貤重物次第自從也用也由也率也疾二切二嫉妬也又音疾墜落也直類切三懟怨也鎚好銅半熟出尺類切又昌律切一遺贈也以醉切又音惟七淸侯岀漢書王子侯表忘也出廣雅蜼爾雅曰蜼仰鼻而長尾雄似獮猴鼻露向上尾長數尺末有岐雨中自縣於樹以尾塞鼻又余救切瞶目疾􅖆蜩䗽蛘䗽蟲名侐静也詩云閟宮有侐火季切又火逼切一轛車橫軨追萃切一痓惡也充自切一屍似皴皃也矢利切二䛈䛈忘㿷粟體楚愧切一㽷病皃釋類切二方言云深也趙魏間語七志意慕也詩云在心爲志爾雅曰骨鏇不翦羽謂之志職吏切七娡有萃氏之女􅦡娶之謂之女娡䓌逺䓌誌記誌痣黒子織織文錦綺屬又音職識標識見禮本音式值持也措也捨也當也直吏切五植種也又市力切治理也又丈之切㨁㨁投或也寺寺者司也官之所止有九寺釋名曰寺嗣也治事者相嗣續於其内又漢西域白馬駝經來初止於鴻臚寺遂取寺名刱置白馬寺祥吏切五嗣繼也又姓風俗通云衞嗣君後孠古文飤食也飼上同蛓蛓毛蟲有毒七吏切四蚝螆並上同笥篋也圎曰簞方曰笥竹器也相吏切四伺伺候也察也思念也又音司覗覗覷也試用也式吏切四弑大逆亦作殺幟旗幟又音熾僿史記云小人以僿胾大臠也側吏切六􅯦木立死亦作檣事事刃又作剚倳剚上同倳上同又置也鶅東方雉名又音甾吏說文曰治人者也力置切二憂也字春秋說題辝曰字者飾也說文乳也又愛也疾置切六牸牝牛孳孳尾乳化曰孳交接曰尾茡爾雅曰茡麻母郭璞云苴麻成子者芓上同孖雙生子又音咨眙任視丑吏切五佁佁儗不前䰡癘鬼忿戾誺不知餌食也說文粉餅也仍吏切十六上同珥珥飾衈開刑書殺雞血祭名周禮注云云割牲耳血及毛祭以爲刉衈毦􅌁毦羽毛餌也咡口刎刵􅎒耳佴次也誀誘也洱水名䎶以牲告神神欲聽曰䎶也㛅女字䏪筋健䣵重釀眲耳目不相信也聽音不敢言也疾也踈吏切七使又色里切水名在河南􅤘郭璞曰今江東呼貉爲􅤘􅤩列也山阜突也穴也廁說文圊也釋名曰廁雜也言人雜廁其上也又閒也次也初吏切一異竒也說文分也羊吏切七异异哉歎也退也舉也潩水名在河南密縣出文字音義食人名漢有酈食其又音蝕巳過事語辝又去也弃也成也䔬連翹草名廙恭也敬也置安置也驛也設也說文赦也陟吏切二靑州呼彈弓侍近也從也承也時吏切三蒔種蒔秲上同事使也立也由也鉏吏切又側吏切二玉篇云嗜食忌忌諱又畏也敬也止也憎惡也亦姓周公忌父之後出風俗通渠記切十三邔古縣名在襄陽惎教也一曰謀也說文毒也䋟連針鱀魚名又音臮鵋鵋䳢鵂鶹鳥今之角鴟􅡐狸子也又音四誋告也信也說文誠也諅志也說文忌也周書曰上不諅于凶德梞梞柎畁舉也說文音其帺繫也又音其竹名熾盛也昌志切八饎方言云熟食也說文云酒食也說文同上糦大祭亦稷也說文同上幟又音試音志赤土哆哆聲埴黏土意志也又姓於記切四鷾鷾鴯玄鳥也岀莊子􆅄貪也又音乙䵝深黑記記志也說文䟽也居吏切一憙好也許紀切二嬉可嬉美姿顔也又音熙䰯恐也魚記切六豙豕怒毛豎也出說文㘈唭㘈無聞見也譺啁譺㽈大甖儗佁儗不前亟數也遽也去吏切又紀力切三唭唭㘈無聞見也䀈䀈居獸名似蝟而赤尾八未辰名爾雅曰太歳在未曰恊治無沸切八味五味酸醎甘苦辛周禮瘍醫以酸養骨以辛養筋以醎養脉以苦養氣以甘養肉以滑養竅菋五味子藥名五行之精面前䊊饘也亦作沬水名鮇魚名山名貴尊也髙也釋名曰貴歸也物所歸仰也說文作䝿亦姓出自陸終之後風俗通有貴遷爲廬江太守居胃切三瞶極視使也胃腸胃說文作榖府也于貴切十七謂言也告也說文報也㥜悱㥜不安也媦楚人呼妹公羊傳曰楚王之妻媦運船緯經緯又姓彚類也說文作蟲也似豪豬而小爾雅曰彚毛刺是也蝟說文同上渭水名亦州名書曰終南敦物至于鳥䑕鳥䑕山名渭所出也秦伐義渠始置隴西郡後魏莊帝置渭州因水爲名也煟火光魚名山海經曰樂游之山桃水多魚似蛇而四足獸似䑕緭緭繒也􅡔草木􅡔字也􅥖草名䬑大風圍繞也又音韋魏魏闕又州名夏觀扈之國春秋時晉地秦爲東郡隋爲武陽郡武德初平竇建德改置魏州亦姓本自周武王母弟受封於畢至畢萬仕晉封魏城後因氏焉出鉅鹿任城二望魚貴切二犩夔牛肉重千斤又魚歸切沸詩曰觱沸檻泉箋云觱沸者謂泉涌出皃方味切十一疿熱生小瘡芾毛萇詩傳曰蔽芾小皃茀上同誹謗人又音非鯡魚子㹃覆耕􅘺湯􅘺蔽膝䛍言急䟛行疾費耗也惠也芳未切又房未冰備二切六髴髣髴靅靉靅雲布狀也木名昲日光又物乾也䊧失氣細米丘畏切三䙡䙡紐俗尉候也說文作尉云从上案下也从􅊂又持火所以申繒也風俗通云火斗曰尉俗作熨又尉氏縣鄭大夫尉氏邑也亦云鄭之别獄又姓左傳鄭大夫尉止於胃切又紆物切十二㷉出說文熨俗見上注慰安慰畏畏懼罻罻網犚牛也蔚茺蔚螱飛蟻上同褽衣袵也䲁魚名諱說文誋也許貴切四卉草揔名詩曰卉木萋萋又音虺芔古文泋水波汶也􅩀獸名說文曰周成王時州靡國獻􅩀人身反踵自笑笑即上脣掩其目食人北方謂之土塿爾雅曰狒狒如人被髮迅走一名梟羊俗謂之山都今交州南康山中有之郭璞讃云狒狒怪獸被髮握竹獲人則笑脣蔽其目終乃號咷反爲我戮扶涕切二十四狒並上同㵒㵒渭水溢腓又音肥怫怫㥜又扶物切菲菜可食又霏斐二音屝草屬黃帝臣於則所造也蜚蜚盧蟲也一名蜰即負盤臭蟲也又獸名山海經曰蜚如牛白首一目蛇尾行水則竭行草則枯見則有兵役郭璞讃云蜚之無名體似無害所經枯竭甚於䲴厲萬物攸懼思尒遐逝上同䨾隱也陋也翡赤羽雀也􅟓塵也萉枲屬隱痱熱瘡䠊刖足亦作剕㔗壯勇之皃䆏稻不黏也費姓也夏禹之後出江夏後漢汝南費長房孫盛蜀譜云益州諸費有名位者多又後魏書費連氏後改爲費氏􅖆神蛇􅲺目不明或作睇黂爾雅曰黂枲實禮曰苴麻之有黂又音肥蟦螬蟲也旣已也盡也又姓吴王夫旣之後居豙切七曁諸曁縣在越州又其冀切禨福祥漑漑灌又古代切􅺨幸也不便言也旡飲食逆氣不得息也蔇說文曰艸多皃毅果敢也魚旣切七怒也豙豕怒毛豎也􅱣說文曰煎茱茰也藙上同顡說文曰癡頭不聦明也䉨竹名氣氣息也去旣切說文本音欷五炁同上出道書气与人物也說文曰雲气也今作乞又去訖切㫓姓也出纂文䀈䀈居獸似蝟毛赤也欷歔欷許旣切十八唏啼也墍仰塗愾大息也又苦愛切氣說文曰饋客芻米春秋傳曰齊人來氣諸侯餼䊠並上同見說文鎎怒戰息也熂燹火黖黖菲黑也霼靉霼雲狀摡拭也䀈獸名又音氣􅺞豕息䮎馬走犔牛病忥靜也說文曰癡皃䤒秫酒名其旣切二幾未巳又音蟣音機衣衣著於旣切又音依一九御理也侍也進也使也又姓左傳有大夫御叔牛倨切三馭使馬也語說也告也又魚巨切慮思也又姓良倨切九勴助也􅰢舟中簀􅰢見方言助也導也鑢錯也櫖林櫖山林又山櫐也傳馬山名網據依也引也案也亦姓出姓苑居御切十鋸刀鋸古史考曰孟莊子作鋸倨倨傲踞蹲又踑踞大坐椐靈壽木名又居袪二音鐻樂器形似夾鐘削木爲之出埤蒼說文与同澽乾水又音遽角似雞距䱟魚名豦獸大如狗似猴多髯好奮迅其頭能投石擲人出建平山又音渠覰伺視也七慮切六䁦上同刞耕土起亦作耝坥螾場又七余切䏣蠅䏣又七余切蜡周禮有蜡氏又音乍㰦欠㰦丘倨切九去離也又郤吕切麮麥汁呿卧聲鼁鼁似蝦蟆居陸地胠脅也又去魚切㧁閉也又口荅切䒧草名鳥名署書也又部署也常恕切四藷藷藇又音諸薯薯蕷俗曙曉也恕仁恕商署切四庶衆也冀也侈也幸也又庶幾也亦姓樜木名㵂水名著明也處也立也補也成也定也陟慮切又張略長略二切二箸上同䬡飛舉也章恕切九翥上同􅦽筐􅦽䭖犬糜又豕食䘄蟲名爾雅云翥醜鏬剖母背而生或作䘄庶周禮有庶氏掌除毒蟲又音恕畚也畚也㫂斫也䟽記也亦作踈所去切三捒裝捒又色句切㫹明也飫飽也厭也賜也說文本作燕食也依倨切十􅷩上同瘀血瘀鄔縣名在太原又音塢醧私醼擊淤濁水中泥也又音於菸臭草棜無足樽也假寐也箸匙箸遟倨切四筯上同㾻痴㾻不達又丑御切除去也見詩遽急也疾也亦戰慄也窘也卒也其據切五勮勤務也又懼也疾也詎又其吕切醵歛錢飲酒又音渠又其虐切澽乾澽絮說文曰敝緜也息據切又抽據尼恕二切一助佐也益也牀據切三耡又士魚切麆爾雅云麕牝麌牝麋其子麆怚憍也將預切二沮沮洳漸濕亦作詛呪詛亦作􅳊莊助切二阻馬阻蹄又莊所切洳沮洳說文作漸濕也人恕切三茹飯牛又菜茹也如又尒諸切豫逸也備先也辨也早也安也猒也敘也又州名尚書禹貢曰荆河爲豫州釋名云豫州在九州中京師東常安豫也秦爲三川郡漢爲河南郡後魏置司州又改爲豫州亦獸名象屬又姓晉有豫讓羊洳切二十預安也先也廁也樂也佚也猒也怠也譽稱美也又姓晉書有平原太守譽粹又音余礜礜石藥名𧖟食之肥䑕食之死馬疾行皃輿車輿又方輿縣名又音余鸒爾雅曰鸒斯鵯鶋郭璞曰雅烏也小而多羣腹下白悆恱也􅪲大鹿舁食者或作轝藇藷藇又音序蕷薯蕷俗穥穥穥黍稷美也履屬忬安也歟歎也又音余悇憂懼與參與也澦灩澦水名􅘏髙平嘘吹嘘許御切又音虚一女以女妻人也尼據切二絮姓也漢有絮舜楚楚利又木名出歷山瘡據切又瘡所切三儊儊不滑也處處所也昌據切又音杵二豦俗絮和調食也抽據切三悇憛悇憂也㾻痴瘵不達屐履屬徐預切一十遇不期而㑹又姓何氏姓苑云東苑人風俗通云漢有遇沖爲河内太守牛具切七寓寄也庽上同媀媀妬也女子妬男子􅸳疣病禺獸名母猴屬也又音愚䴁䴁䑕鳥名嫗老嫗也衣遇切三蓲荎也饇飽饇樹木揔名也立曰又姓姓苑云今江東有之後魏官氏志樹洛干氏後改爲樹氏常句切五老人行皃澍時雨又音注尌立也又音住上同住止也又姓出姓苑持遇切三牏築垣短板逗姓也出何承天纂文又音豆附寄附又姓晉書有附都符遇切十一坿白坿說文益也祔祭名亦合葬也賻贈死也助也駙駙馬都尉官名漢武帝置掌駙馬晉尚公主者並加之駙副馬也一曰近也又疾也鮒魚名䠵䠵䠼著衣也蚹蚹蛇腹下横鱗可行者又爾雅曰蚹嬴䗂蝓即蝸牛也跗古之醫人俞跗出史記小巵有蓋胕肺胕心膂注灌注也又注記也之戍切十六疰疰病罜小罟㹥黃犬黑頭鑄鎔鑄又姓堯後以國爲氏馵馬後左足白註註射出埤蒼又音駐炷燈炷澍時雨又殊遇切霔霖霔㺛郷名在河南䎷䎷又音赴祩詛也祝也邑名䪒皮袴蛀蛀蟲屨履屬方言曰履自關而西謂之屨九遇切十句章句又音溝音構蒟蒟醬又音矩絇絲絇瞿視皃又音衢目驚然出埤蒼怐恐怐䈮竹名邭邑名䀠左右視也昫日光說文曰日出温也北地有昫衍縣香句切六煦上同酗醉怒亦作䣱呴吐沫姁姁嫗幺𧖟戍遏也舎也從人荷戈也傷遇切八腧五藏腧也輸送也又式朱切􅦇馬􅦇前也䩱刀䩙隃鴈門䠼䠵䠼㲓㲓毛裕饒也道也容也寛也羊戍切七䘱上同覦覬覦又音俞諭譬諭也諫也又姓東晉有諭歸撰西河記二卷何承天云喻音樹豫章人喻上同籲呼也又和也見書傳􅼹面衣孺稚也爾雅曰屬也說文曰乳子也一曰輸孺尚小也而遇切四孑焉正俗擩擩莝手進物也㹘牛莖赴奔赴爾雅曰至也說文曰趨也芳遇切十一急疾也䞯上同䎷䎷也又音注豧豕聲簠簠簋又甫于方武二切訃告喪也又至也䞳僵也說文音匐仆僵仆說文曰頓也䟔說文曰趣越皃婏兔子曰婏又孚万切務事務也又強也遽也趣也又姓列仙傳有務光亡遇切十四婺婺女星名霧元命包曰隂陽亂爲霧爾雅曰地氣發天下應曰霧釋名曰霧冒也氣蒙冒覆地之物也霚上同見說文騖馳也奔也驅也􅧌六月生羔䨁雞雛蝥蠡名亦作􅭣長跪又拜繅淹餘也㡔髮巾嵍丘也敄說文強也鶩鳥名又音目緅靑赤色子句切又子侯切二足足添物也本音入聲懼怖懼其遇切四具備也辨也又姓左傳有具丙埧堤塘臞瘦又音瞿芋一名蹲鴟廣雅云蜀漢以芋爲資凡十四等大如斗魁其車聲鋸子旁巨靑鳥等四等多子王遇切五雨詩曰雨雪其霶又音禹羽鳥翅也又五聲宫商角徴羽晉書樂志云宫中也中和之道無往而不理啇強也謂金性之堅強角觸也象諸陽氣觸動而生徴止也言物盛則止羽舒也陽氣將復萬物孳育而舒生又音禹䨒說文曰水音也吁疑怪辭也埾垛也才句切二聚又秦雨切捒裝捒色句切又所據切三數筭數周禮有九數方田粟米差分少廣商功均輸方程贏不足旁要也丗本曰隷首作數又色矩色角二切均又音速㡏裁殘帛也付与也方遇切六賦賦頌詩有六義二曰賦釋名曰敷布其義謂之賦漢書曰不歌而頌曰賦又斂也量也班也稅也傅相也亦姓本自傅說出傳巖因以爲氏岀北地清河二望四露髻陚兵名搏擊也又布莫切娶說文曰取婦也七句切二趣趣向又親足七俱倉苟三切註解也中句切又音注九鉒置也又送死人物也駐止馬軴車軴住停手又長句切􅼛不行壴說文云陳樂也咮鳥聲亍歩止也驅區遇切又羌愚切二牛名菆鳥窠芻注切三勇䐢膳也䦌直開也丑注切二同上尠思句切少也又息淺切一屢數也疾也良遇切二吴人呼狗方言也十一暮日晚也冥也又姓出何氏姓苑莫故切六慕思慕又虜複姓二氏前燕録云昔髙辛氏游於海濵留少子厭越以居北夷邑于紫蒙之野号曰東胡秦西漢之際爲匈奴所敗分保鮮卑山因山爲号至魏初莫護跋率部落入居遼西時燕代多冠歩揺冠跋好之乃斂髮襲冠諸部因謂之歩揺後音訛爲慕容焉跋孫渉歸進拜單于遵循華俗自云慕二儀之德繼三光之容以爲氏歸子廆據遼東稱王僣号燕後又有將軍墓輿䖍募召也墓墳墓慔勉也竹筥渡濟也過也去也徒故切五斁猒也一曰終也詩云服之無斁又音亦鍍金飾物也度法度又姓岀後漢荆州刺史度尚又徒各切𧖟路道路亦大也周禮曰合方氏掌達天下之道路爾雅曰一達謂之道路又姓本自帝摯之後出陽平襄城陳留安定東陽河南等六望洛故切十三露說文曰露潤澤也五經通義曰和氣津凝爲露也蔡邕月令曰露者隂之液也又露見也亦姓風俗通云漢有上黨都尉路平潞水名又州名春秋時初爲黎國後爲狄境古黎亭也周爲潞州隋爲韓州又爲上黨郡唐爲潞州開元中陞爲大都督府又縣名在幽州輅車輅釋名曰天子乗玉輅以玉飾車也輅亦車也謂之輅者言行於道路也鷺爾雅曰鷺春鉏郭璞云白鷺也頭翅背上皆有長翰毛江東人取以爲睫攡名之曰白鷺縗璐玉名賂遺賂也簬竹名簵上同虂蔠葵蘩虂痞病㿖上同䍛取魚具也妒妒忌當故切十一妬上同秅禾束又縣名在濟隂或作秺秺上同奼美女􅞷􅞷􅍺腹大乳病㓃奠酒爵也蠧食木蟲也螙古文敗也斁上同菟菟絲草名又虜複姓後魏書有菟賴氏湯故切四兔獸名崔豹古今注云兔口有缺尻有九孔論衡曰兔舐毫而孕及其生子從口而岀說文曰象踞後其尾形兔頭與㲋頭同吐歐也又湯古切鵵木鵵鳥有毛角顧迴視也眷也又姓出吴郡古暮切十五䫃俗雇本音戸九雇鳥也相承借爲雇賃字稒稒陽縣在五原故舊也事也常也又姓出姓苑酤賣也又音姑沽上同痼乆病固堅也一也常也故也四塞也錮錮鑄又禁錮也亦鑄塞也㽽小兒口瘡鯝魚肚中腸䍛䍛取魚具也棝射䑕斗也凅凝也閉也誤謬誤五故切十四悮上同寤覺寤忤逆也啎上同迕遇也遻上同晤明也朗也悟心了逜干逜窹廣雅云竈名捂斜拄也又枝捂也娱娱樂也又五于切䎸聽也護救也助也胡誤切十七瓠匏也又瓠子隄名亦姓淮南子有瓠巴善鼔琴嫭美好婟婟嫪戀惜也岀聲類頀大頀湯樂周禮作濩互差互俗作㸦餘倣此濩布濩䇘所以收絲冱褰凝枑門外行馬䨼青屬韄佩刀飾也誌也認也鱯魚名擭布擭猶分解也兔網草名訴訟也毀也說文作告也桑故切十五愬譛也說文同上􅬫向也說文同上泝逆流而上廣雅曰泝斗舟中抒水斗遡說文同上素列子曰太素者質之始也又空也故也帛也說文作白緻繒也又虜複姓二氏後趙録有宜陽公素和明又後魏書云素黎氏後改爲黎氏傃向也嗉鳥嗉膆上同玉名塑塑像也岀周公夢書塐揑土容出古今竒字䛾諳䛾牲白也亦作素㨞暗取物也祚福也禄也位也昨誤切七胙祭餘阼阼階東階魚醬飵相謁食也往也秨禾稼皃又音昨笯盛鳥籠也乃故切又音奴二怒恚也又音努布布帛也又陳也周禮錢行之曰布藏之曰泉又姓陶偘列傳有江夏布興博故切六圃園圃說文曰種菜曰圃又音補佈佈徧也抪抪持裁刀蝜蟲也汙染也烏路切又音烏四惡懀惡也又烏各切噁喑噁怒皃䜑相毀說文作䛩怖惶懼也普故切五悑上同見說文鋪設也又普胡切誧謀也痞病又音歩厝置也倉故切五措舉也投也說文置也醋醬醋說文作酢錯金塗又姓宋太宰之後又千各切㳻壅水絝說文曰脛衣也苦故切七袴上同庫貯物舎也又姓風俗通云古守庫大夫之後以官爲氏後漢輔義侯庫鈞亦虜複姓二氏周有少師庫狄峙又有庫門氏亦虜三字姓前燕録有岷山桓公庫傉官泥胯股也韓信出於胯下䔯醋葅苦困也今人苦車是跨踞也捕捉也薄故切十三哺食在口也歩行歩爾雅曰堂下謂之歩白虎通曰人踐三尺法天地人再舉足歩備隂陽也又姓左傳晉有歩揚食采於歩後因氏焉又虜三字姓三氏後魏書歩六孤氏後改爲陸氏又西方歩鹿根氏後改爲歩氏北齊書有歩大汗氏鞴鞴靫盛箭室餔餹餔又作糒鮬魚名馬習馬案左傳曰左師見夫人之歩馬字不從馬䒀船亭名鵏鵏䜴鳥痞病又音怖荹亂草說文曰亂藁也馬名謼號謼亦作呼荒故切又火姑切二戽戽斗水器也作造也臧祚切一十二霽雨止也子計切八隮升也又子奚切躋上同濟渡也定也止也又卦名旣濟又子禮切擠排盪又將西反䰏婦人束小髻也又音祭音節䶓䶓緝麻紵名出異字苑穧穫也又音劑帝說文曰諦也王天下之號也爾雅曰君也都計切二十三諦審也嚏鼻氣也啑俗柢木根柢也蔕草木綴實螮螮蝀蝃上同見詩摕撮取􅯕􅯕艡水戰舩出字林䠠姓也漢書王莽傳有中常侍䠠憚疐疐柢也爾雅棗曰疐之謂去抵也骶背也僀俊也兩手急持人也䟡也瓽大瓮偙偙儶腣胅腹皃又當兮切趆趍走皃蝭寒蟬又音啼䩚補履下也渧埤蒼云渧漉也嚌甞至齒也在詣切十劑分劑又子隨切穧刈禾把數􅟍鹹也眥目際又才賜切齊火齊似雲母重沓而開色黃赤似金出日南又齊和又徂兮切齌吹餔疾也癠病也懠怒也䶩䶩替廢也代也滅也說文夲作普廢一偏下也他計切二十暜㬱並上同出說文鬀說文曰􅚎髮也大人曰髡小兒曰鬀盡及身毛曰􅚎剃上同戾車楴楴枝整髮釵也涕涕淚洟鼻洟䎮不耕而種􅦘履中薦也亦作屟屜达足滑薙除草寧心安補也殢極困唾聲笑車節也第次第說文本作弟韋束之次弟也今爲兄弟字又漢複姓二氏後漢書第五倫傳云齊諸田徙園陵者多故以次第爲氏有第五第八等氏特計切二十九弟見上注又音上聲遰迢遰又底隷切去也避也髢髲也鬀上同說文音剃締結也睇睇視悌孝悌又音上聲娣娣姒禘大祭五年一禘軑說文曰車輨也釱以鎖加足說文鐵鉗也又音大鷤鷤鴂鳥又音啼棣車下木又常棣子似櫻桃可食又姓王莽司馬棣並杕木盛皃踶蹋題又徒雞切遞更遞視皃㣇說文曰脩豪獸也一曰河内名豕也㲅係也盡也蒵屧蒵胡計切十四䐼喉脈上同系緒也又姓楚有系益籀文妎心不了也說文妬也又音害禊拔除不祥也又禊飲繫易之繫辭瘛小兒病又尺制切慀恨足㨙㨙換盻恨視又五計切䦏門扇又胡介切稧稧事換秧契契約苦計切又苦結切十栔刻也罊說文云器中盡䏿字林云腨腸蟿蟿螽螇蚚舟名􅱂劇也又怖也難也䫔恐也䁈省視翳羽葆也又隱也奄也鄣也又鳥名似鳯於計切十七曀隂風詩曰終風且曀枍枍栺㥷静也安也恭也㝣安也靜也㙠塵也殪殪死瞖目瞖医藏弓弩矢器嫕婉嫕柔順皃蘙蘙薈縊自縊豷豕息繄是也賴縚走絲也㙪天隂塵也􅰾􅰾諦殹擊中聲也謎隱言也莫計切二㩢裁也閉掩閉說文曰闔門也博計切五閉俗嬖愛也卑也妾也箅甑箅也說文蔽也所以蔽甑底又必至切㪏㪏㪒毀也又𥙷米切慧解也胡桂切十三憓憓愛也潓水名惠仁也亦惠然順也又姓出琅邪周惠王之後梁有惠施蟪蟪蛄蕙香草蘭屬橞木名繐繐帳又音歳㩨㩨裂儶偙儶譓多謀智曰譓也鏸銳也又三隅矛􅙆羽􅙆桂木名叢生合浦已南山峯間無雜木葉長尺餘冬夏長靑其花白山海經曰八樹成林又姓後漢太尉陳球碑有城陽炅橫漢末𬒳誅有四子一守墳墓姓炅一子避難居徐州姓昋一子居幽州姓桂一子居華陽姓炔此四字皆九畫古惠切九昋炅炔並見上注筀竹名罣挂也田極妖也死皃也䳏䳏即杜䳌也嘒聲急說文小聲也亦作嘒呼惠切三嚖上同暳小星詩亦作嘒媲配也匹詣切七䠘上同見管子睥睥睨渒水名在汝南濞水名又芳備切水聲斫薜薜荔蒲計切五䥍所以理苗殺草弋鳥具也醬也木名麗美也著也又姓出姓苑郎計切三十三戾乖也待也利也立也罪也來也至也定也又很戾說文曲也从犬出戸下戾者身戾曲也㑦很㑦俗隸僕隸隷上同俗作儷伉儷盭緑色又綬名或作綟又云弼也綟草也衣也劙割破􅟮上同唳鶴鳴曰唳蜧大蝦蟆也䓞紫草沴妖氣說文曰水不利也荔薜荔香草又羌複姓有荔非氏捩琵琶撥也欐梁棟之名也又師禮二音埤蒼云渧漉也札也涖汔也又力二切悷𢤱悷多惡又懔悷悲吟也栛小槤木名本也又鹿皮蜦神蛇又音倫㸚止也係也珕刀飾又力智切􅷭視竊也㿛瘦黒又力翅切䚕求視又師蟻切䕻草木生亞土也急風離漢書云附離著也木名胡竹名也杖也丑戾切一泥滯陷不通詩云致逺恐泥奴計切又奴低切五埿俗音慢又相摩也迡近也濘濘陷㰥氣越名呼計切三㚛肥大殢殢極困也十三祭享也祀也薦也至也察也子例切七際邊也畔也㑹也穄黍穄吕氏春秋曰飯之美者有山陽之穄說文曰􅓱也􅓱音縻鰶魚名䰏露髻又音霽㦣寐言穧穫也又才計切歳釋名曰歳越也越故限也從歩戌相銳切四櫘小棺又篲衞二首布縷細也繐上同衞護也垂也加也亦州名殷所都也本衞國爲翟所滅齊桓公代翟遷衞于河南秦屬東郡魏文置朝歌郡晉爲汲郡東魏爲義州周武改爲衞州亦官名漢書曰衞尉秦官掌宫門衞屯兵又姓周文王子衞康叔之後國滅因氏焉出河東陳留二望又精衞鳥名山海經云狀如鳥白首赤喙其鳴自呼取西山木石以塡東海于歳切十三軎說文曰車軸耑也从車象形轊上同璏劒鼻王莽碎玉劒璏􅟳竹名豚屬上同槥小棺彗日中必彗㦣寐言讏上同牛蹄熭曬乾芮草生狀又姓周司徒芮伯之後而銳切六汭水曲說文曰水相入皃枘柄枘蜹蚊蜹又音爇笍竹名鈉銳鈉贅贅肉也又最也聚也又贅衣官名也之芮切二卜問吉凶小歠也山芮切一毳細毛也又姓出姓苑此芮切又楚稅切十二韢囊屬以盛賊頭又音遂脃說文曰小耎易斷也膬上同又七劣切脆俗帨佩中又音稅竁葬穿壙也又楚稅切斷也蟲名㓹小割㯔重檮又楚稅切飲也銳利也又姓姓苑云升平中鮮卑有御史中丞銳管以芮切六銴銅生五色叡聖也睿上同䓲草生狀蜹毒蟲又而稅切綴連綴陟衞切又丁劣切十一醊祭也畷禮注云井田間道吴都賦云畛畷無數又張劣切笍小車具也䄌重祭啜甞也餟說文曰祭酹也司馬禎曰漢志作腏字通腏上同又皮腏著也錣針也卂釣也輟車小缺也稅斂也舎也又姓盛弘之荆州記云建平信陵縣有稅氏舒芮切九說說誘裞衣送死也又禮注云日月已過乃聞喪而服曰祱又他活切又他外切蛻蛻皮又他卧切又他外切帨佩巾也又音脃說文曰禮巾也涗温水又清也䬽小餟也又郎外切䭨上同弊困也惡也說文曰頓仆也俗作弊毗祭切五斃死也說文同上幣幣帛㡀說文曰敗衣也从巾象敗衣之形又匹丗切敝說文曰也一曰敗衣也又姓左傳齊有敝無存㯔重檮楚稅切四斷竁葬穿壙也毳細毛篲埽帚爾雅曰葥王篲夲亦從卝祥歳切九古文鏏大鼎彗星名又音遂䵻小鼎槥小棺軎車軸頭也又音衞轊上同布巾蔽掩也必袂切四鄨縣名在牂牁又音鼈鷩爾雅曰鷩雉郭璞云似山雞而小冠周禮云王享先公饗射則鷩冕又音鼈彆弓彆劌傷也割也居衞切六鱖魚名大口細鱗有班文一曰婢魚也􅕻剖􅕻斷割也爾雅云洩苦棗亦作蹶蹶行急遽皃曲禮曰足無蹶又居月切跟牛展足袂袖也彌弊切一㡜殘帛所例切三鎩矛戟類又所戒切蔱椒蔱又所八切掣掣曵尺制切又尺折切八瘛小兒驚懘惉懘音不和也惉樂記作帖痸郭璞云癩病􅪴上同說文曰小怒也銐除利也狂犬別名制禁制又斷也止也勝也說文作利裁也从刀从未物有滋味可裁斷也征例切十八見上注魚醬亦作􆈋淛水名製製作又裁也䎺入意一曰聞也晢星光也亦作晣又音折䇽方言云自關而西謂簟或謂之䇽婦孕病皃㝂蝗子䱥魚名可爲醬䀸目光也又丑丗切狾狂犬矛也䩢刀鞞䭁臭敗之味古人姓迣迾也度也逝往也行也去也時制切十三忕忕習觢牛角豎也噬齧噬誓誓約古文筮龜曰卜蓍曰筮巫威作筮筮決也簭上同見周禮澨水名書曰過三澨銴車樘結一曰銅生五色又音銳遾逮也踰也割肉曵牽也引也餘制切二十九裔邊也苗裔也又容裔也說文曰衣裾也俗作裔􅞓石之次玉也勩勞也泄水名在九江又音薛洩上同病也䎈鳥飛枻檝枻詍多言􅞥明也一曰習也􅙆鳳六翮靾以馬鞍贈亡人跇超踰又丑例切􅛣施明也又身皃袣長被又衣長皃䄿自䄿稻名鳥名㵝容㵝水皃㑜合板㑜縫抴數也㛳婦人病胎䇩長也㹭狸子丿至地㵩蒸也又葱㵩也裂也呭呭樂說文曰多言也亦作㖂䕍草名䋵急也一曰不成也於罽切五瘞埋也餲又於葛於介二切􅠽􅠽臆䔽清也又音藹藝才能也静也常也準也又姓出姓苑魚祭切八埶說文穜也周禮音丗蓺上同䆿睡語㦣上同囈亦同槸樹枝相摩褹字林云複襦也滯廢也止也凝乆也直例切七彘豕也又姓左傳有彘恭子蹛蹛林又音帶銐除利也璏劒鼻玉也草補鈌魚名例比也皆也力制切二十五厲惡也亦嚴整也烈也猛也又姓漢有魏郡太守厲温礪砥石勵勸勉無後鬼也癘疫癘㾐上同鮤魚名又音列濿以衣渡水由膝已上爲濿亦作厲詩曰深則厲淺則揭說文又作砅履石渡水也砅義上見注蠣牡蠣蚌屬蠇上同櫔木名馬馳䮋上同䅀黍穰上同貨糲麤也又力達切巁巍也犡牛白脊栵栭栗又音列帛餘亦作裂恐人洌淸水又音列一憩息也云例切六上同䔾䔾車草愒爾雅貪也說文息也揭褰衣渡水由膝已下曰揭甈爾雅康瓠謂之甈郭璞云瓠壺也賈誼曰寳康瓠是也丗代也又姓風俗通云戰國時有秦大夫丗鈞舒制切三勢形勢貰賖也貸也又時夜切猘狂犬宋書云張收甞爲猘犬所傷食蝦蟆鱠而愈居例切八􅖯氈類織毛爲之說文曰西胡毳布也罽上同說文曰魚网也亦同瀱泉出皃訐持人短又居列切􅵡彚頭說文作􅵡云豕之頭象其銳而上見也蘮蘮蒘似芹㿃赤白痢亦作䐭竹例切又音帶一偈偈句其憇切一啜甞也甞芮切又臣劣切一跇跳也踰也丑例切十二上同傺侘傺佗敕加切􅞥習也慸困劣㑜㑜侅䀸瞥也䚢也又丑列切揥佩飾䟷躍皃渡也􅕉視也曲刀也削竹也除芮切一㓷去鼻也牛例切一蕝束茅表位子芮切又子恱切三蟲名又作會切㨹裂也潎魚游水也匹蔽切一䂕短皃丘吠切一䂕短皃呼吠切一十四泰大也通也古作太他蓋切四忕奢也又逝大二音太甚也大也通也周禮曰太史掌建邦之六典宋書曰太史掌歴數靈臺專候日月星氣焉經典本作大亦漢複姓六氏漢有尚書太叔雄古今人表有太師亭何氏姓苑云太征氏下邳人太士氏永嘉人又有太室氏太祝氏汰太過也蓋覆也掩也通俗文曰張帛也禮記曰敝蓋不棄爲埋狗也又發語端也說文曰苫也俗作盖古太切三匃乞也丏上同本又音緬艾草名一名冰臺又老也長也養也亦姓風俗通云龐儉母艾氏五蓋切三猳豕鴱巧婦別名藹晻藹樹繁荗又姓晉南海太守藹奐於蓋切十壒塵也馤香也靄雲狀又於葛切日色䔽覆也清也微也說文蓋也死也清謹小鼠相銜而行曖曖柰果木名廣志曰柰有靑赤白三種俗作㮏奴帶切五奈如也遇也那也本亦作奈又致箇切多毛魚名渿說文曰沛之也大小大也說文曰天大地大人亦大故大象人形又漢複如五氏晉獻公娶大狐氏楚襄王時有黃邑大夫大心子成史記秦將軍大羅洪周禮大羅氏掌鳥獸者其後氏焉又大庭氏古天子之号其後氏焉又有大叔氏又虜複姓後魏末有南州刺史大野拔又虜三字姓周書蔡祐賜姓大利稽氏周末有尉回將軍大莫千玄稽後魏書南方大洛稽氏後改爲章徒蓋切八汏濤汏說文曰浙㶕也軑車轄釱鉗也又大計切䲦鳥也黑跡忕奢忕伏地名在海中害傷也胡蓋切四夆相遮也妎字林云疾妎妬也快也帶衣帶說文曰紳也男子鞶革婦人鞶絲象繫佩之形帶有巾故从巾易曰或錫之鞶帶又蛇别名莊子云蝍蛆甘帶也當蓋切七跢倒跢㿃㿃下病也蹛匈奴傳有蹛林又音滯􅙮􅙮方山名艜艇船摕槌也貝說文曰海介蟲也居陸名猋在水名蜬象形古者貨貝而寶龜亦州名春秋時屬晉七國屬趙秦爲鉅鹿郡漢爲淸河郡周置貝州以貝丘爲名愽蓋切十四沛郡名又姓出姓苑又匹蓋切上同鋇鋇柔鋌也芾小皃又方味切䟺歩行躐跋狽狼狽㸬牛二歳也爾雅云體長㸬伂顚伂之亦作沛䰽魚名食之殺人茷草木葉多多毛目不明皃又音霈行皃霈霶霈普蓋切五浿水在樂浪沛流皃亦滂沛又水名岀遼東又音貝眛目不明也㤄恨怒㑹合也古作㑹亦州秦屬隴西郡漢分爲金城郡周爲防隋爲鎭武德初平李軌置㑹州又姓漢有㑹栩黄外切又音儈五䢈說文曰日月合宿爲䢈說文云無違也禬除殃祭也又古外切繪繪五采也兊突也又卦名說文本作兌說也又姓杜外切五􅯍補􅯍綐細紬銳矛也又弋稅切㟋山名儈合市也晉令儈賣者皆當著巾白帖頟言所儈賣及姓名一足白履一足黒履古外切十八膾魚膾說文曰細切肉也鱠上同襘說文曰帶所結也禬福祭檜桕葉松身又古活切旝水置石杸敵也巜說文曰水流澮澮也方百里有巜廣二尋深二切澮上同爾雅曰水注溝曰澮又木名在平陽鄶國名在滎陽廥芻槀藏也䯤五綵束髮說文曰骨㰅之可㑹髮者詩云䯤弁如星鬠上同劊說文曰斷也㑹會稽山名又黃外切䐴腰痛􅝸收也獪狡獪小皃戲最極也俗作㝡祖外切三五色采也蟲也又山芮切衆聲呼㑹切六噦鳥聲翽鳥飛聲鐬鈴聲渙水名在譙又音喚濊說文曰水多皃又烏㑹切檜麤糠苦㑹切一酹以酒沃地郎外切五頪說文曰難曉也一曰鮮白㲕馬色班也䬽門祭㱻疫病又力卧切外表也逺也五㑹切一祋祋祤縣名在馮翊又祋殳也丁外切一懀惡也烏外切七濊汪濊深廣又呼會切薈草盛嬒婦人名也䶐息也瞺眉目之間䵳淺黒色蕞小皃才外切二䇻小石光外切三瘦病流盻襊衣游縫也麤最切三行塞外道也旆旗也繫旐曰旆蒲蓋切三䟺頼䟺行不正也軷祭道神又蒲葛切磕硠磕石聲苦蓋切九䳚䳚鳥又音渴轄車聲愒貪也公羊傳云不及時而葬曰愒愒急也溘船著沙也子屬擊也㪡伐也擊也􅥇地名戓作蔡龜也亦國名又姓出濟陽周蔡叔之後也倉大切三古文鳩鳥賴蒙也利也善也幸也恃也又姓風俗通云漢有交阯太守賴先落蓋切十四籟籥三孔也癩疾也說文作癘惡疾也今爲疫癘字瀬湍瀬糲麤米又力達切䄤墮壞藾藾蒿䓶上同犡牛名說文曰牛白脊䲚魚名跛行皃㸊火之毒鵣鳥名聲餀食臭呼艾切五上同㺔獸名岀音譜病魚名娧他外切五蛻蛇易皮又音稅駾奔突也詩云昆夷駾矣毻鳥易毛又音唾裞送死衣也昧眛目不明也莫貝切三沬水名㭑木名春小也七外切一十五卦說文曰筮也易䟽云挂也懸挂萬象於其上八卦者八方之卦也乾坎艮震巽离坤兊古賣切六挂懸挂又剛挂弩矢鏃名潘岳射雉賦云岀剛挂以潜擬掛俗詿誤也又胡卦切盾握也罣罣擬又胡卦切懈懶也怠也古隘切六解除也繲繲浣衣岀埤蒼廨公廨薢薢茩藥名㾏病也隘陜也陿也烏懈切六古文阸阻塞又阸㠔山形或與隘同㿄病聲䅬稻小把也賹賹記人物邂邂逅胡懈切二解曲解亦縣名在蒲州又古賣古買胡買三切賣說文作賣出物也莫懈切一畫釋名曰畫挂也以五色挂物象也俗作畫胡卦切又胡麥切九詿礙也罣同上絓絲結澅水名在齊黊鮮黄色繣繣微乖違纗弦中絶也孈愚戇又多態也差病除也楚懈切又楚冝楚皆初牙三切七瘥上同又音醝衩衣衩杈杈杷平田具也又音叉㳗浦㳗訍訍持短又疑心名也異言睚目際又睚眦怨也五懈切又五佳切謑怒言火懈切又胡禮切一庍到别方卦切一粺精米傍卦切四稗稻也又稗草似榖黍屬又音俾杷田具本又音琶㾹疾也士懈切二眦睚眦派分流也俗作派匹卦切七􅏨說文曰水之衺流别也末緝麻也說文曰散絲也麻紵㵺說文曰水在丹陽㭛藤屬蜀人以織布岀埤蒼分枲皮也又匹刃切債徴財側賣切一難也苦賣切又音契二郷名曬暴也所賣切又所寄丑離二切五䵘不黏之皃或與曬同簀酒汛水皃說文灑也本又音信洒洒埽又先禮切諣疾言呼卦切一㠔阸㠔山形方賣切一膪亦作䐱腏肉也竹賣切又竹亞切膪肥皃二歩立皃岀聲譜十六怪怪異也古壞切八恠俗石似玉􅸬草名􅭔毀也壞上同又胡怪切大皃㧔訬也噫噫氣烏界切二呃不平聲瘵病也側界切三祭周大夫邑名又姓周公第五子祭伯其後以爲氏說文曰周邑也誡言警也古拜切二十三戒慎也具也備也警也易注云洗心曰齋防患曰戒界境也垂也介大也助也佑也甲也閱也耿介也說文曰分畫也俗作又姓介之推也届至也舎也說文曰行不便也一曰極也疥瘡疥玠大珪長尺二寸㝏獨居㠹幘也砎硬也魪比目魚也尬尲尬行不正尲音緘价善也又佋价也䯰簪結悈飾也司馬法曰有虞氏悈於中國䲸䲸雀也似鶡而靑出羌中艐爾雅云至也亦云古届字䁓怒也芥辛菜名又草芥衸布衣幅也又胡介切丰草介到􅧊􅧊馬馬尾結也褹紩布襦女介切一譮怒聲許介切九欸上同㖑喝㖑齂鼻息噧髙聲皃又多言䜕譀䜕㞒臥息說文曰瞋大聲也􅢚說文曰忽也孟子曰孝子心不若是􅢚械器械又杻械胡介切十一䪥葷菜也葉似韭薤俗齘䫴齘切齒怒䫴于禁切䦏門扇瀣沆瀣北方夜半之氣又胡代切㒠俠也韰韰惈猶果敢也雌狢衸補膝裙也說文祐也㳦水名不聽五介切四譺誡譺忦慳悋人也蟲名𠯗食草木葉也蒯茅類又姓岀襄陽漢有蒯通或作苦怪切九喟歎也又丘愧切嬇女字㕟太息䈛箭竹名也簣籠也嘳譏他人也蕢杜蕢蕢尚並見禮記墤俗云土塊夲音隤􅉔周禮曰大祝辯九􅉔一曰稽首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰襃􅉔九曰肅􅉔博怪切三拜上同扒拔也詩云勿剪勿扒案本亦作拜湃滂湃普拜切二浿水名在樂浪壞自破也胡怪切三古文烏薞草聵聾也五怪切三說文同上顡說文曰頭蒯顡病也說文􅱂也蒲拜切八憊並同上韛韋囊吹火上同􅸄船後􅸄木棑木名㶔水波䀛䀛眼乆視莫拜切三頑惡韎東夷樂也火怪切五躛過也木名皮可牽船􅲜水聲咶鼻息鎩翦翮說文曰鈹有鐔也所拜切又所八切四衣􆁫縫也殺殺害又疾也猛也亦降殺周禮注云殺衰小之也又所八切上同亦見周禮烗熾也盛也苦戒切四上同劾勤力作也揩鼓名又客皆切顡顔惡也辿怪切說文五怪切癡頭不聦明也一十七夬決也亦卦名古賣切三獪狡獪䈛䈛竹名快稱心也喜也可也又姓漢有快欽苦夬切五噲咽也又人名漢有樊噲又姓孝子傳有噲參鵠衘珠與之麤糠駃駃馬日行千里璯姓也晉有璯錢邁行也逺也莫話切四勱勉也強也䜕誇誕又火㮫切佅僸佅話語話說文作䛡合㑹善言也下快切一敗自破曰敗說文毀也薄邁切又北邁切四籀文䢙散走唄梵音䵳淺黑色烏快切又烏外切三䶐喘息聲又烏外切懀惡見嘬一舉盡臠曲禮曰無嘬炙楚夬切四䴝南方呼醬齧也上同犗犍牛古喝切二衣上也亦作􅜵蠆毒蟲丑犗切二慸極也劣也又慸芥喝唭聲於犗切五餲飢臭又於罽切嗄聲敗又所嫁切䬵通食氣也欬上同喝所犗切一犬臭又事露也除邁切一䜕譀䜕火犗切譀火懴切二臭皃咶息聲火夬切一敗破他曰敗補邁切又音唄一啐啗也倉夬切一寨羊栖宿處犲夬切二砦山居以木柵㕢纔然何犗切一十八隊羣隊徒對切十二䨴黮䨴雲狀薱草盛憝怨也惡也周書曰元惡大憝憞上同譈亦同鐓矛下銅也曲禮曰進矛㦸者前其錞錞上同䃍礧䃍物墜也䯟䯟愚人􅕖也濧清也濡也佩玉之帶也說文曰大帶佩也从人从凡从巾佩必有巾巾謂之飾禮曰凡帶必有佩玉蒲昧切十二珮玉佩俗孛星也又蒲没切鄁紂之畿内國名東曰衞南曰鄘北曰鄁邶上同偝向偝誖言亂又補内蒲没二切悖心亂又蒲没切背弃背又姓也又補妹切㻗埤蒼云珠百枚曰㻗遜權貢珠百㻗㻗貫也又云珠五百枚也亦作琲又蒲罪切􅼰拂取苝爾雅曰苝山䪥案本亦作葝葝音勍妹姊妹莫佩切十一昧暗昧眛目暗每數也又武罪切痗病也又音晦瑁瑇瑁亦作蝐又莫沃切黴點筆又武悲切莓莓子木名似葚又莫杯切䍙鳥網脢背肉也又莫杯切䆀禾傷雨則生黑班也配匹也合也滂佩切四朏向曙色也妃妃偶也又匹非切嶏崩聲誨教訓也荒内切十一悔改悔晦冥也又月盡也􅩔易卦上體靧洗面頮上同秏稻名出南海又火号切痗病也面肥也詯休市大清說文曰靑黑皃今作㳷對荅也當也配也揚也應也古作􅍟漢文責而面言多謂非誠􅍟故去其口以從土也都隊切六見上注碓杵臼廣雅曰碓也通俗文云水碓曰轓車杜預作連機碓孔融論曰水碓之巧勝於聖人之斷水掘地車箱考工記云立曰横曰軹轛上同帀倅副也七内切五淬染也犯也寒也焠作刀鋻也大官書曰火與水合爲焠䃀䃀磨啐甞入口又先對切晬周年子也子對切七祽月祭名也說文曰㑹五綵繒也綷上同亦同捘推也夎失容節拜又子臥切廢風苦慹烏繢切三㕈隱翳隈字林云映隈也退郤也說文作他内切五上同退古文㥆肆也又他没切憒心亂也古對切十幗婦人喪冠又古獲切刏刏刀使利慖恨也䵋黃色又于鄙切䐴腰忽痛也簂筐也亦作慖䈐篷也病皃蔮儀禮注云滕薛名蔮爲頍潰逃散又亂也胡對切十三迴曲也又音回又作匯繢畫也嬇女字殨肉爛闠闤闠市門䔇草名吕氏春秋云菜之美者有雲夢之䔇螝蟲蛹詯胡市膭肥大僓長也䜋覺悟說文曰中止也司馬法曰師多則民䜋䜋止也䛛市䛛塊土塊苦對切三􅒘上同說文曰墣也禮曰寢苫而枕􅒘堁塵起又於卧切碎細破也蘇内切五􅷢說文破也誶告也啐送酒聲繀織繀說文曰著絲於筟車内入也奴對切一纇麤絲也盧對切十四耒耒耜丗本曰倕作耒古史考曰神農作來說文云耕曲木也儽極困也攂攂鼔酹酹酒蘱草名似蒲一云似茅㔣推也䒹耕多草􅢸秲􅢸稻名塊土皃礧礧䃍重也䣂䣂陽縣漢書作耒銇銇鑚錑平板背脊背補妹切三輩等輩又比也類也俗作軰誖亂也磑磨也丗夲曰公輸般作之五對切蚚爾雅曰強蚚胡輩切又音祈一十九代更代年代亦州名春秋時屬晉其後趙襄子以銅斗擊殺代王取其地至秦隷太原郡漢置雲中鴈門代郡魏爲州又姓史記趙有代舉徒耐切十三岱泰山黛眉黛黱上同逮及也又徒帝切埭以土堨水上同帒囊屬袋上同甙甘也酨醋也又昨代切瑇瑇瑁亦作蝳異物志云如龜生南海大者如籧篨背上有鱗鱗大如扇有文章將作器則煑其鱗如柔皮俗又作玳又徒督切靆靉靆雲狀載年也事也則也乗也始也盟辭也又姓風俗通云姬姓之後作代切又材代切六再重也兩也縡事也出字林古國名說文曰設餁也䵧染䵧䆀禾傷雨莫代切又莫亥切二脄背側肉也賽報也先代切四簺格五戲說文云行棊相塞故曰簺也塞邊塞又蘇則切寛也實也貸借也施也假也他代切四儓儓儗癡皃態意態亦作㑷曃曖曃不明皃出王篇漑灌也又水名出東海桑瀆縣覆甑山古代切六槩平斗斛米摡滌也詩云摡之釡鬵㕢深堅意又偶也主也㧉磨也慨慷慨苦蓋切六愾大息欬欬瘶鎧甲也管子曰葛盧之山發而出黃金蚩尤制以爲鎧也闓開也又音開嘅嘅嘆礙止也距也五漑切七硋上同釋典云旡也閡外閉儗儓儗懝騃也禾水曲頭不出又音礙愛憐也說文作行皃烏代切九㤅惠也古文曖日不明又晻曖暗皃僾隱也􅽇隱也爾雅作薆靉靉靆雲狀薆薆對草盛璦珠璦玉篇云美玉也瀣沆瀣氣也胡㮣切三㤥患苦劾椎劾耐忍也奴代切七螚小䖟蟲也鼐大鼎能技能又能何氏姓苑云長廣人佴姓也山公集有佴湛􅧵日無光也耏􅓄也又如之切戴荷戴又姓出濟北本自宋戴穆公之後風俗通云凡氏於謚戴武宣穆是也都代切一賚與也賜也洛代切九萊查也又音來睞傍視徠勞也勑上同㾢惡病誺誤也䚅内視逨就也又音來菜草可食者皆名菜倉代切五埰古者卿大夫食采地郭璞云采地葬之因以名棌木名䰂髻也䐆大腹載運也昨代切七裁製裁纔僅也在所在酨醋醬栽築牆長板測也儗儓儗癡也海愛切又音礙一二十廢止也大也方肺切九癈固病賦斂橃木似柚也祓福也除惡祭也又敷物切􅲵蘆􅲵䉬上同䚨說文云弋射收繳具也砩以石遏水曰砩肺金藏方廢切四柿所木札也㤄怒也䑔䑗也又音代穢惡也於廢切六薉荒薉說文蕪也濊濊貊夫餘國名或作穢貊又汪濊又烏外切獩見上注饖飯臭䮹䮹䮭馬怒吠犬聲符廢切四茷草葉多也又方大切魚名鼣䑕名如大吠也喙口喙許穢切又昌芮切六􅦤困極也詩云昆夷􅦤矣夲亦作喙􅡅上同行走之皃餯飯臭顪頰也牛觸人渠穢切一刈刈穫魚肺切八又才也㲼水名㣻困患爲戒爾雅云桃蟲鷦其雌刈俗呼爲巧婦亦作鴱又音艾艾治也見詩䖊虎皃䢃才人名二十一震雷震也又動也懼也起也威也草刃切十一振奮也裂也舉也整也救也又之人切賑贍也娠妊娠又音身侲侲子逐厲鬼童子也挋說文云給也一曰約也又爾雅曰相拭刷淸也袗玄服須須類頭少髮說文曰顔色䫰順事也頁皆在左䟴動也䢻地名又音辰䳲䳲鷺信忠信又驗也極也用也重也誠也又姓魏信陵君無忌之後又漢複姓何氏姓苑有信都信平二氏息晉切十一訊問也告也訅上同迅疾也又私閏切說文曰頭㑹腦蓋也顖上同卂疾飛而羽不見汛說文灑也小獸有臭居澤色黃食鼠奞奮奞毛阠八陵名爾雅曰東陵阠又所臻切刃刀刃而振切十一認識也肕牢肕韌柔韌亦與肕同仞七尺曰仞軔礙車輪木牣滿也詩曰於牣魚躍杒木名訒難言枕巾䀼眩懣胤繼也嗣也亦姓羊晉切十一酳酒漱口也靷引軸引又羊忍切􅉧小鼔在大鼓上擊之以引樂亦作濥說文云水膎行池中濥濥然䏖脊肉又直忍切伸也洕小水鈏鐡鈏車名遴行難也又姓良刃切二十八吝悔吝又惜也恨也俗作吝悋鄙悋本亦作吝磷薄石閵閵鵲鳥名似鴝鵒而黃􅦖竹名堅中粦說文作粦鬼火也兵死及牛馬血爲之燐上同藺草名莞屬亦縣名在西河又姓出西河本自有周晉穆公少子成師封韓韓獻子玄孫曰康食邑於藺因氏焉轥􅞂轢車踐轔上同䗲螢火須一曰頭少髮獸名似彘身黃尾白麐牡麟又音鄰䉮損也草名瞵視不明皃橉木名鏻鏻健甐器也貪也蟁也火皃疄田壟撛扶也又力盡切㔂水在石間躙蹂躙儐儐相也說文導也必刃切七擯擯斥殯殯殮鬢頰上髮也覕不相見也上同䚔䚔見又匹人切敶列也直刃切五陳上同見經典陣俗今通用診候胍又之忍切登也愼誠也謹也亦姓古有愼到著書又漢複姓家語魯有愼潰氏奢侈逾法時刃切三昚古文亦姓蜃蛟蜃又縣名眒張目試刃切三阠東方陵名抻抻物長也菣香蒿可煑食去刃切又苦見切三行皃臤堅也賮琛賮又財貨也㑹禮也徐刃切又疾刃切六燼燭餘㶳上同藎進也詩云王之藎臣一曰草名濜水名壗石似王憗且也一曰傷也又曰閑也魚覲切三猌犬張齗怒皃垽滓也晉進也又州名堯所都平陽禹貢兾州之城春秋時晉地秦屬河東郡後魏爲唐州又爲晉州爾雅晉有大陸之藪今鉅鹿是也亦姓本自唐叔虞之後以晉爲氏魏有晉鄙即刃切十㬜上同出說文搢搢紳之士搢笏而垂紳又揷也縉淺絳色又古有縉雲氏䗯蟲名又蛤屬進前也善也升也登也又姓出何氏姓苑枃凡織先經以枃梳絲使不亂出埤蒼瑨美石次玉璡上同又音津羊名又亭名衅牲血塗器祭也計覲切三釁上同又罪也瑕釁也舋俗鎭壓也周禮有四鎮揚州之㑹稽靑州之沂山幽州之醫無閭兾州之霍山又姓出姓苑陟刃切三瑱玉充耳又吐甸切塡定也亦星名又音田僅餘也纔也劣也少也渠遴切十一覲見也殣埋也瑾美玉名饉無穀曰飢無菜曰饉㝻少也廑小屋瘽病也墐塗也詩曰塞向墐戸割也又去槿切歏歏欠櫬空棺也初覲切七瀙水名嚫親施䞋上同襯近身衣儭裏也齔說文曰毀齒也男八月而齒生八歳而齔女七月而齒生七歳而齔俗作齔又初忍切印符印也印信也亦因也封物相因付又漢官儀曰諸王侯黃金橐駝鈕文曰璽列侯黃金龜鈕文曰章御史大夫金印紫綬文曰章中二千石銀印龜鈕文曰章千石至四百石皆銅印文曰印又姓左傳鄭大夫印叚岀自穆公子印以王父字爲氏於刃切四鮣魚名身上如印㲳又音致氣行疢病也俗作疹丑刃切二趁趁逐俗作趂麻片撫刃切三鬪也䚔暫見親親家七遴切又七鄰切四寴屋空皃說文至也儭至也又畏也瀙水名螼螼蚓一名蜸蚕蚯蚓也羌印切蜸苦典切一呁唁也九峻切二欺言二十二稕束稈也之閏切六上同諄吿之丁寧􅾛鈍目盹上同訰訰訰亂也􅤆髙也長也險也峭也速也私閏切十三峻上同濬深也浚水名在衞亦浚儀縣名陖亭名在馮翊說文曰陗髙也埈上同迅疾也又音信鵕鵕䴊似鳯說文曰鷩也漢初侍中服鵕䴊冠弓蕭奞奮奞鳥張羽毛也益晙早也又音俊迿出表詞也殉以人送死辭閏切四徇自衒名行侚以身從物巡師宣令又從也或作徇儁智過千人曰儁又羌複姓有儁蒙氏子峻切十二俊上同晙早也餕食餘畯田畯農夫詩傳曰田大夫也駿馬之俊周穆王有八駿驊騮騄駬赤驥白兎犧渠黃踰盗驪山子又音峻㕙㕙古東郭之狡兔名又音逡􅥨石䑕岀蜀毛可作筆寯人中最才焌然火獵之韋袴說文曰柔韋也又音耎上同又而隴切舜虞舜仁聖盛明曰舜說文作䑞艸也楚謂之葍秦謂之藑蔓地連華象形舒閏切八䑞見上注蕣木槿瞬瞬目目動也瞚眴並上同䀢亦同見公羊傳鬊毛皃禮注云亂髮也閠閠餘也易曰五歳再閠史記曰黃帝起消息正閏餘漢書音義曰以歳之餘爲閠如順切三潤潤澤也又益也䏰漢朐䏰縣名地下濕多朐䏰蟲朐音蠢順從也食閠切二揗說文摩也二十三問訊也又姓今襄州有之亡運切十一璺破璺亦作㼂方言曰秦晉器破而未離謂之㼂絻喪服亦作免汶水名紊亂也聞名達詩曰令聞令望莬新生草也脕上同詩曰微亦柔止鄭玄云柔謂脃脕之時抆拭也鼤䑕文娩生也又音免運逺也動也轉輸也國語云廣運百里東西爲廣南北爲運又姓出姓苑又漢複姓二氏史記云秦後以國爲姓有運奄氏後漢梁鴻改姓爲運期氏王問切十六暈日月傍氣餫野餉䩵理鼓工考工記云䩵人爲臯陶臯陶鼓木也又況万切韗上同鄆邑名又州名魯太昊之後風姓禹貢兖州之城即魯之附庸須句國也秦爲薛郡地漢爲東平國武帝爲大河郡隋爲鄆州亦姓魯大夫食采於鄆後因氏焉貟姓也前涼録有金城貟敞唐有棣州刺史貟半千䲰鳥名似烏一名同力忶心悶鶤雞三尺曰鶤又音昆􆄴物數亂也韻韻和也䚋衆視上同􅯠病也又尤粉切緷說文緯也訓誡也男曰教女曰訓又姓許運切五爋火乾物臐羊羹薫薫香又許云切鐼鐡類湓含水潠也匹問切四忿怒也魵小魚瀵水浸也又音奮糞穢也方問切八上同埽除也拚上同見禮僨僵也奮揚也鳥張毛羽奮奞也又姓左傳楚有司馬奮揚瀵水名有三眼一在蒲州泉眼大如車輪濆沸湧出一在同州界夾黃河一在河中央皆潛通大小並相似伹深不測又音湓㱵㱵也醖醖釀於問切又於刎切四愠怒也緼亂麻蕰習也俗作藴又音上聲攈說文拾也居運切五捃上同皸足坼又居云切豕求食也又衢物切䝍小野豕名郡說文曰周制天子地方千里分爲百縣縣有四郡故春秋傳曰上大夫受郡是也至秦初置三十六郡以監其縣釋名曰郡羣也人所羣聚也渠運切一分分劑扶問切又方文切五㿎㿎㾙瘡悶滿而裂秎穧秎穫也坋塵也又房粉切二十四焮火氣香靳切六炘上同㾙瘡中冷庍並上同脪說文曰瘡肉反出也靳靳固又姓楚有大夫靳尚居焮切五斤爾雅曰明明斤斤察也又居勤切㧆覆巾名㨷說文拭也劤多力皃近附也巨靳切又巨隱切一㒚依人也於靳切八懚上同隱隈隱之皃又於謹切檼屋脊又棟也所依據也㥯說文謹也㶏水名又於覲切㡥㡥裏相著垽爾雅曰澱謂之垽吾靳切一二十五願欲也念也思也說文云大頭也魚怨切四上同說文云顚頂也傆說文黠也愿敬也善也謹也怨恨也說文恚也於願切二䛄從也說文慰也又於阮切販買賤賣貴也方願切二畈田畈劵劵約說文契也釋名曰劵綣也相約束繾綣爲恨也去願切六絭束腰繩也勸獎勸也勉也助也教也又姓虇萌筍又蘆牙綣繾綣志盟又去阮切韏曲也又革中辨也說文又九萬切万十千又虜三字姓二氏西魏有柱國万忸于謹周書唐瑾樊深並賜姓万紐子氏無販切十八萬萬舞字林云萬蟲名也亦州名自漢及梁猶爲朐䏰縣地後魏分置萬川郡及魚泉縣武德初割信州南浦置浦州貞觀改爲萬州又姓孟軻門人萬章輓輓車也亦作挽本又音晚蔓瓜蔓又姓左傳楚有蔓成然曼長也蟃螟蛉蟲鰻魚名蜀有郷娩纂文云姓也古萬字獌獌狿獸長百尋說文曰狼屬也爾雅曰􅓔獌似狸䝡貙獌似狸或作此䝡䨲姓梁公子䨲杰之後挽舟繩也贎贈貨䡬戰車以遮矢也㿸皮帨又無逺切脕肌澤鬗髮長飯周書云黄帝始炊穀爲飯符万切六􅽁上同俗又作飰閞門欂櫨也粉㶗泉水蟲名㛯㛯息也一曰鳥伏乍岀說文曰生子齊均也或作㛯芳万切十㽹吐㽹一宿酒上同小舂㤆急性娩說文云免子也娩疾也說文云其義闕卛量也又居願切汳水在睢陽建立也樹也至也又木名在弱水直上百仞無枝又姓楚王子建之後漢元后傳有建公又州名居万切二旔捷也堰堰水也於建切十鄢地名在楚郾上同䞁引與爲價又於面切傿上同褗郭璞云衣領也㰽大呼用力漹水名在襄陽宜城入漢江也嫣長皃說文曰大皃也獻進也禮云大曰羮獻又姓風俗通有秦大夫獻則許建切四憲法也又姓也姓苑􅞚走意瀗水名楥靴履楥又法也虚願切四楦俗韗攻皮治鼓工也亦作䩵又音運􅽂俗健伉也易曰天行健渠建切二腱筋本也小舂也亦作䊲又方切一逺離也千愿切一瓢也語偃切二鬳鬲屬圈邑名曰万切一卛物也說文曰抒滿也居願切二絭弦也二十六慁悶亂也說文憂也一曰擾也又禮云儒有不慁君王慁猶辱也亦作㥵胡困切四溷濁也俒全一圂厠也一云豕所居也頓說文云下首也亦姓魏志華佗傳有督郵頓子獻都困切三扽撼扽敦豎也又都昆徒官二切巽卦名說文具也亦作巽蘇困切六顨說文云巽也比易顨卦爲長女爲風者潠潠水上同遜遁也從也伏也恭也愻順也困亂也逃也病之甚也悴也極也苦悶切四􅳒古文涃水名耳門又苦根切嫰弱也奴困切四媆上同腝肉腝抐揾抐按物水中揾烏困切二䭡相謁食又於恨切悶說文曰懣也易曰遯丗無悶莫困切二懣煩也又莫緩亡損二切鐏說文曰柲下銅也曲禮曰進戈者前其罇徂悶切五臶人名魏時張臶又至也栫大名船底孔也鱒魚名又魚入泥睔大目露睛古困切七睴視皃琯出光也又音管璭俗㴫水名摩人也謴順言謔弄皃出聲譜噴吐氣普悶切三歕上同湓水聲鈍不利也頑也徒困切五遁逃也隱也去也遯上同鶨癡鳥顐寸說苑曰度量衡以粟生之十粟爲一分十分爲一寸十寸爲一尺家語云孔子曰布指知寸倉困切二䍎瓦器又千見切坌塵也亦作坋蒲悶切二水聲顐秃也五困切二諢玉篇云弄言論議也盧困切又虜昆切三溣水中曵船曰溣碖大小匀皃又盧本切奔甫悶切又音犇一惛迷忘也呼悶切又呼昆切一焌然火周禮云遂龡其焌子寸切三委髮也捘左傳曰渉佗捘衞侯之手二十七恨怨也胡艮切一艮卦名也止也說文限也古恨切四茛草名珢石次玉詪語也䭓飽也五恨切一䭡䭡䭓飽也烏恨切一二十八翰鳥羽也髙飛也亦辭翰說文曰天雞赤羽也又姓左傳曹大夫翰胡侯旰切二十五捍抵捍扞以手扞又衞也鼾鼾睡螒螒天雞爾雅注云小蟲黒身赤頭一名莎雞垾小堤豻野狗又音岸釬釬金銀令相著亦作銲汗熱汗悍猛悍瀚瀚海北海閈里也居也垣也說文曰閭也汝南平輿里門曰閈射以皮臂駻馬髙六尺說文曰馬突也雗雗鵲鷽别名䮧馬毛長也馯姓也草名又音寒䏷䑇䏷刀箭瘡藥出古兵格忓善也㢨拒也又關名在巫縣矸磓也㲦長毛㪋說文上也魚名炭火炭又姓西京雜記有長安炭虯他旦切六歎歎息嘆上同湠湠漫水廣皃出字林無文章皃㛶㛶無宣適也按抑也止也烏旰切七案几屬也史記曰髙祖過趙趙王張敖自持案進食又曹公作欹案卧梘書又察行也考也驗也洝說文曰渜水也晏晚也又於諫切荌草也䢿里名案轢禾旦早也得按切八疸黃病鴠䳚鴠鳥名觛小觶又丁但切狚獵狚獸名似狼􅘔傷也笪笞也㡺小舎憚難也又忌惡也徒案切六彈行丸又徒丹切澶澶漫僤疾也周禮云句兵欲無僤但辤也又徒亶切撣撣觸也又徒干切旰日晚也晏也古案切十一榦楨榦築垣板倝說文曰日始出光倝倝也俗作􅩾幹莖幹又強也又姓杆檀木赤色也盰說文曰目多白也一曰張目也骭脅也􅥉滮滮􅥉􅥉水流疾皃布袋矸石淨岸水涯髙者五旰切九犴獄也又五干切豻野狗頇頭無髮也䮗䭽䮗馬行又馬白額至脣㷳說文云火色也讀若鴈􆀚厝也喭弔失容又五弁切長文侃正也苦旰切又苦旱切六偘上同靬乾革看又苦干切衎樂也䳚䳚鴠鳥名漢水名又姓姓苑云東莞人呼旰切九暵日氣乾耕田熯火乾又人善切䍐枹䍐縣在河州亦作罕枹音扶呼也水濡乾也䎯冬耕地厂山石之崖爛火熟又明也郎旰切七爤上同見說文瀾波也又音蘭粲文章皃􅶊飯相著爾雅曰摶者謂之糷鑭光鑭讕逸言又蘭嬾二音攤按攤也奴案切又他丹切六灘水奔又他丹切難患也又奴丹切緼也㬮說文曰安㬮温也巾捫又塗著也粲鮮好皃又優也察也明也亦作粲又姓出姓苑蒼案切六㛑詩傳云三女爲㛑又美皃好詩夲亦作粲說文又作燦明浄皃璨美玉又璀璨薒草可爲席鳥名蓋也蘇旰切又蘇旱切六散分離也布也說文作􅤖分離也散雜肉也今通作散又蘇旱切散見上注帴二幅說文帬也䈀說文曰竹器也說文曰繳也一曰飛散也賛佐也出也助也見也說文夲作贊則旰切十一讃稱人之美鄼縣名在南陽羮和飯也䟎散走濽水濺􅖸食也㜺女從䰖髮光澤也禶衣好皃攅訟也㜺不謹也一曰美好皃徂賛切五䏼禽獸食餘同上穳禾肥死又在丸切噆譏噆嘲也也才葛切二十九換易也胡玩切九逭逃也迭也轉也歩也周也上同肒皰肒垸漆骨垸也䯘上同漶漫漶不可知也䀓睕䀓轉自又大目皃􅪵癰疽屬也􅗋鋋也子筭切二鑚錐鑚惋驚歎烏貫切六腕手腕上同捥亦同睕睕䀓大目琬琬圭又於阮切貫事也穿也累也行也又姓漢有趙相貫髙古玩切二十八矔張目祼祭石說文曰灌祭也館館舎也周禮五十里有市市有館館有積以待朝聘之客俗作舘瓘王升左傳曰瓘斚玉瓉杜預云瓘珪也鑵汲水器也􅵳病也痯上同灌水名在廬江又聚也澆也漬也又姓漢有灌嬰雚雚雀鳥鸛上同樌木叢生也鏆臂鐶㷄楚人云火懽憂無告也錧車軸頭鐡一曰江南人呼犂刃爟烽火說文曰取水於日官名舉火曰爟周禮曰司爟掌行火之政令遦行也冠冠束白虎通曰男子幼娶必冠女子幼嫁必笄又姓列仙傳有仙人冠先又音官觀樓觀釋名曰觀者於上觀望也說文曰諦視也爾雅曰觀謂之闕亦姓左傳楚有觀起又音官涫佛也悹憂也悺上同盥說文曰澡手也从臼水臨血也春秋傳曰奉匜沃盥棺殮屍又音官毌穿也婠好皃䘾袴别名竄逃也誅也放也藏也匿也從䑕在穴中七亂切五鑹小矟爨炊爨又姓華陽國志云昌寧大姓有㸑習蜀志云建寧大姓蜀録有交州刺史爨深殩殩孝秦人云饋喪家食􅗋鋋也本音鑚俗爲槍􅗋字玩弄也五換切五貦說文上同翫習也妧好皃忨忨貪段分段也又姓出武威本自鄭共叔段之後風俗通云段干木之後段氏有出遼西者本鮮卑檀右槐之後晉將段匹磾徒玩切三毈卵壊椴大名亂理也又兵㓂也不理也俗作乱郎段切四灓絶水渡也亦作亂􅴛煩也􅜆理也鍜打鐡丁貫切六腵籤脯碬礪石斷決斷俗作㫁断石之似玉踹足踹彖易有彖象通貫切四褖后衣貒野豚湪水名喚呼也火貫切八嚾上同上同出說文煥火光奐文彩明皃又姓渙水散又音翽國在流沙東喛恚也又虚元切筭計也數也說文曰筭長六寸計歷數者也又有九章術漢許商杜忠吴陳熾魏王粲並善之丗本曰黃帝時隷首作數蘇貫切四蒜葷菜也張騫使西域得大蒜胡荽笇竹器祘明也縵說文曰繒無文也漢律曰賜衣者縵表白裏莫半切十幔帷幔漫大水不蒔田也獌狼屬又音萬䝢上同墁所以塗飾牆又莫干切鏝上同又鏝刀工人器謾欺也又莫干切半物中分也博慢切七絆羈絆靽上同姅傷孕䮗馬行㪵五升喭失容判剖判又分也普半切八泮泮宫禮記作類頖見上注沜水涯眫牲之半體姅傷孕人音半冸冰散牉牉合夫婦也夲亦作判周禮云媒氏掌萬民之判叛奔他國薄半切四㛶無冝適也畔田界也伴伴奐見詩偄偄弱也奴亂切五愞上同稬稻稬也渜浴餘汁也說文曰鹿麛也攅聚也在玩切一䥗燒鐡炙也口喚切二魚撞罩聲三十諫諫諍直言以悟人也又姓風俗通云漢有治書侍史諫忠古晏切三澗溝澗爾雅曰山夾水澗亦作磵𡼏鐧車間鐡也鴈禮曰孟春之月鴻鴈來賔白虎通曰鷙用鴈者取其隨時五晏切六鳫上同雁鳥也出說文贗僞物偐上同逐獸犬晏柔也天淸也又晚也又姓左傳齊有晏氏代爲大夫烏澗切五騴馬尾白也䁙目相戲也鴳爾雅曰鳸鴳郭璞云今鴳雀鷃上同訕謗也所晏切又所攀切七汕魚乗水上㹪獸名似狼說文曰惡健犬也取魚網也疝病也又所姦切柵籬柵又又革切䴮餅麴骭脛骨下晏切又音旰二娨慢也慢怠也倨也易也俗作謨晏切五嫚侮易謾欺謾縵緩縵㾺牛馬病又莫駕切綰鉤繫烏患切三贃支財貨出文字指歸面曲皃患病也亦禍也憂也惡也苦也又姓出何氏姓苑胡慣切九古文擐擐甲宦仕宦亦閹宦又學也左傳云宦三年矣轘車裂人又音還豢榖養畜又牛馬曰芻犬豕曰豢䍺獸名似羊無口出山海經槵無槵木名繯縞文慣習也古患切六丱總角也幼稚也摜摜帶倌主駕官也又音官串穿也習也矔矔眮轉目㝈雙生子亦作孿生患切又所眷切二涮涮洗也篡奪也逆也初患切一薍菼薍五患切一輚卧車又寢車亦作轏士諫切三棧木棧道又士限切虥虎淺毛又士限切谷在上艾䗃馬䗃蟲名襻衣襻普患切一奻訟也女患切一鏟削木噐初鴈切又初限切三䴼榖麥䴼也羼羊相間也㬄赤色也丑晏切三㾺牛馬病三十一襇襇裙古莧切六逐虎犬間廁也瘳也代也送也迭也隔也又音平聲覸視也醎也古衣莧菜名侯襇切三藖堇餘也粯粉頭粯子瓣瓜瓠瓣也薄莧切五辨具也周禮曰以辨民噐又步免切辦俗小見釆說文云辨別也象獸指瓜分別也盻美目匹莧切二小兒白眼視也幻幻化胡辨切一蔄人姓亡莧切一袒衣縫解又作䘺丈莧切三綻上同䋎補縫扮打扮晡幻切一鰥鰥視古幻切一三十二霰雨雪雜又作䨘釋名曰霰星也水雪相摶如星而散說文云霰稷雪也蘇田切九䨘並同上㪇散也舎也亦作先先後猶娣姒又姓出河東又蘇前切汛灑汛又所隘息進二切軐轉軐車迹紡也蒨草盛倉甸切十三茜草名可染絳色輤載柩車蓋大夫以布士以葦席綪青赤色倩倩利又巧笑皃芊芊萰草木相雜皃䛹䛹散棈木名􅱄㡋也又幧頭也䍎紡綞說文曰瓦噐也又七鈍切䑶輕舟篟靑竹絢文彩皃許縣切八絃上同夐營求也又休娉切眴目動又音舜駽青驪馬也走皃㧦擊也讂流言有所求也又古縣切縣郡縣也釋名曰縣懸也懸於郡也古作寰楚莊王滅陳爲縣縣名自此始也又姓孔子門人縣單父黄練切十五寰古文袨好衣眩瞑眩書曰若藥弗瞑眩厥疾弗瘳炫明也火光也衒自媒􅸹上同䝮行䝮賣贙獸名又音泫顋後迿出表辝姰狂也又相倫切玹玉名䀏目揺眴上同睊視皃古縣切十一讂流言瓹盆底孔䣺說文曰酒也音歷鳥羅罥綰也懁急性䡓車揺獧躍也狷急也又音絹㢾也電隂陽激曜釋名曰電殄也乍見則殄滅也堂練切十八殿宮殿風俗通云殿堂象東井形刻爲荷菱荷菱水物所以厭火又都甸切奠設奠禮注云薦也陳也書傳云定也畋平皃澱澱宰亦藍澱也淀陂淀泊屬甸郊甸書曰五百里甸服佃營田鈿寶鈿以寶飾器又音田闐于闐國在西域域或作寘又音田涏美好皃􅱙藍􅱙染者也塡塞塡寘上同壂堂基㞟待也又音頂髀也􅠆走也瑱玉名說文曰以玉充耳也詩曰玉之瑱也他甸切又音田四上同滇滇眄大水又音田睼迎視又音啼練白練又姓何氏姓苑云南康人郎甸切十五浰水疾流皃鍊鍊金揀揀擇楝木名鵷鶵食其實㼑瓜㼑鰊魚名似鱦僆釋采成也萰草名堜堜塘墟名在吴郡湅熟絲也周禮曰㡛氏湅絲熟㪝搥打物也奥𧖟木解理也見視也又姓出姓苑古電切又胡電切二鋻鋻鐡晛日光奴甸切四上同㜣姓也㲽說文曰水也俔罄也譬也苦甸切八牽牽挽也又苦堅切菣爾雅曰蒿菣又去刃切蜆爾雅曰蜆縊女郭璞曰小黑蟲赤頭喜自經故曰縊女又音哯㯠橫㯠木涀水名􅊈泉出不流䵖穄也又口典切見露也胡甸切四現俗涀水名無也硯筆硯釋名云硯研也研墨使和濡也吾甸切六研磨研又音平聲行不正也逐虎犬也豜爾雅云麕絶有力􅜏趼趼骨宴安也息也於甸切十三驠馬名燕說文云玄鳥也作巢避戊巳鷰俗今通用醼醼飮周禮云以饗燕之禮視四方之賔客詩云鹿鳴燕羣臣嘉賔也古無酉今通用亦作宴讌讌㑹本亦同上嬿嬿婉並也又於典切嚥吞也咽上同㬫星無雲出說文溎大水皃酀邑名視也或作曣薦薦席又薦進也說文曰獸之所食艸古者神人以廌遺黃帝帝曰何食何處曰食薦夏處川澤冬處松柏又姓出姓苑作甸切廌丈買切二􅏪畜食麪束晳麪賦云重羅之麪塵飛雪白莫甸切八麵上同瞑瞑眩眄斜視㴐滇㴐水大皃􅳃冥合炫汗血􅬒屑米片半也判也析木也普麵切三䏒半體也㸤爾雅革中絶謂之㸤革車轡勒也本亦作辨荐重也仍也再也在甸切七洊水荒曰洊亦再也易曰洊雷震臶重至又魏有髙士張臶戴鵀之鳥巢其門隂者又徂問切栫圍也左傳云栫之以棘瀳水名袸小帶門次䬼饜飽烏縣切四裫廣雅云衣衿袖曲處噮噮甘不猒也䏍小蟲又空也殿軍在前曰啓後曰殿又殿最漢書音義云上功曰最下功曰殿都甸切又堂練切三唸唸㕧呻也亦作經典又作殿屎見上注在背曰亦作韅呼甸切又呼典切一三十三線線縷也周禮云縫人掌王宫縫線之事以役女御縫王及后衣服私箭切四綫細絲出文字指歸說文同上惗思惗鮮姓也本音平聲戰懼也恐也又性之膳切二顫四皮寒動繕補也時戰切十二鄯鄯善西域國名擅專也膳食也饍上同僐廣雅云姿態襌圭襌又禪讓傳受䄠古文單單父縣亦姓器縁上同嬗說文緩也一曰傳也漢書霍去病子名嬗彦美士魚變切六唁弔失國說文曰弔生也詩曰歸唁衞侯喭上同甗甑也諺俗言這迎也譴問也責也怒也讓也亦姓去戰切五遣人臣賜車馬曰遣車又去尠切䪈腰帶晵雨而晝止繾又去演切絹縑也廣雅曰繁緫鮮支縠絹也吉掾切五狷褊急又古縣切鄄鄄城縣在濮州㯞㯞青木皮葉可作衣似絹出西域烏耆國䚈視也瑗玉名干眷切又干願切五援接援救助也亦姓媛淑媛褑佩帶院垣院面向也前也說文作顔前也俗作靣彌箭切二偭說文曰郷也引禮少儀云尊壷者偭其鼻釧鐶釧續漢書曰孫程十九人立順帝各賜金釧指鐶尺絹切四竁穿也又初稅切穿貫也又音川諯相讓也掾官名以絹切四縁衣縁弓䬇再揚穀又小風也𩥇馬土浴陟扇切三周禮王后之六服其一曰衣襢上同田耎城下田人絹切又而兖切一箭箭竹髙一丈節間三尺可爲矢爾雅曰東南之美者有㑹稽之竹箭子賤切九古文鬋女鬢垂皃葥草名湔水名在蜀木名籛陸終子名又子田切濺濺水又作甸切煎甲煎又將仙切硟展繒石昌戰切一扇崔豹古今注舜作五明扇說文扉也式戰切六煽火盛皃又音羶傓熾盛蠅動翅也說文曰蠅醜草名竹怒瞋於扇切三視皃又於殄切堰堰埭眷眷屬說文顧也居倦切十五睠上同捲西捲縣名在日南弮曲也又書弮今作卷卷上同桊牛枸帣囊也亦三石爲一帣絭連弩三十絭共一臂犈爾雅云牛腳黒犈又音權觠爾雅云羊屬角三觠羷郭璞云觠角三匝黃豆又求晚切飬祭名䖭䖭蠾蜘蛛别名說文曰博飯也隷省作􅫦眷字類從此俗作灷勬勤也又居貟切倦疲也猒也懈也說文又作劵勞也或作渠卷切五縁鞾縫也韏上同襈重繒淃水名戀棊也力卷切四灓又音亂􅒋何承天云姓也漢有􅒋秘爲南郡太守孌順也猭獸走草丑戀切二鶨鳥名又音彖變化也通也易也又姓出姓苑彼眷切一車軸所眷切二㝈一乳兩子亦作孿又生患切縓絳色七絹切又七全切三諯相責更視見皃說文作相顧視而行也又戈絹切卞縣名在魯又姓出濟隂本自有周曹叔振鐸之後曹之支子封于卞遂以建族皮變切十五拚擊手抃上同弁周冠名㝸上同汴水名在陳留亦州名秦屬三川郡漢爲陳留郡留鄭邑爲陳所并遂名之東魏置梁州周改爲汴州㺕大鬪声閞門欂櫨又音飯昪日光皃匥笥也䒪雀草笲竹器㺹玉名忭喜皃䪻傾冠㳬回泉辝戀切九鏇轉軸裁器縼長繩繫牛馬放上同旋遶也嫙好皃䍻羊也大也短者選息絹切八飲也口含水濆䍻羊也罥獸足網䠣上同繏索也渲小水䉵說文曰具食也七戀切九饌上同􅍧上同見儀禮襈縁也僎具也譔專敬珍僝見也具也具也孨譁也莊眷切一傳訓也釋名曰傳傳也以傳示後人也直戀切又直專丁戀二切二繞也賤輕賤又姓風俗通云漢有北平太守賤瓊才線切三諓巧䜛皃餞酒食送人羡貪慕又餘也又姓列仙傳有羡門似面切二䢭遮也騗躍上馬匹戰切二偏又音篇縣繩望時釧切二叀說文曰專小謹也輾水輾女箭切二碾上同囀韻也又鳥吟知戀切三傳郵馬釋名曰傳傳也人所止息去後人復來轉轉相傳無常人也又直專直戀二切轉流轉又張兖切衍水也溢也豐也于線切又以淺切八莚蔓莚嘂犬壎說文曰髙聲也一曰大呼獥狼子敫歌也鸄爾雅云鸄鶶鷵似鳥而蒼白色車轊尿小便也或作溺奴弔切二㞙古文藋藜藋也徒弔切七銚燒器又音姚掉振也揺也又徒了切調選也韻調也又音苕莜草田器又音苕上同嬥嬥嬈不仁又徒了切竅穴也苦弔切二􅠎旁擊亦作檄顤長頭力弔切九尥牛脛交嫽嫽悷又音僚料料度量也又音僚嘹病呼鐐美金又音僚璙玉名􅴔魚網炓大光顤五弔切五獟狂犬澆韓浞子方又音梟􅡩仰鼻又牛救切􅻌叫也窔隱暗處亦作㝔東南隅謂之㝔俗作突烏叫切二篠幽深皃又音杳說文云悲意也火弔切三嬈嬥嬈不仁又而沼切娎娎㛍喜皃三十五笑欣也喜也亦作笑私妙切五㗛俗肖似也小也法也像也韒刀韒鞘上同照明也之少切三炤上同詔上命釋名曰詔照也照人暗不見事以此示之使昭然也又告也敎也隄也界也卜問也又音邵燿熠燿說文照也弋照切十七鷂鷙鳥也莊子曰鷂爲鸇鸇爲布穀此物變也摇摇動又音遥覞普視說文曰並視也上同耀光耀曜日光也又照也視誤也上同㞁行不正也遺玉又音由筄屋上薄也趡走也鷣一名負雀䔄菟絲也又帝女花也艞對艞江中大船讑誤言皃要約也於笑切又於招切三葽草盛皃又於招切約又於略切召呼也直照切一邵邑名又姓出魏郡周文王子邵公奭之後寔照切七召上同劭自強也卜問也又音韶倒懸鉤也䬰小食又尺邵切卲髙也嶠山道又山銳而髙渠廟切又音喬二轎􅬉車也又音喬剽強取又輕也匹妙切十一彯彯畫㬓置風日中今乾漂水中打絮韓信寄食於漂母又撫招切僄僄狡輕迅翲飛皃䏇聽纔聞出字林勡劫也摽摽落嫖身輕便也慓急疾噍嚼也才笑切又子幺子由二切四誚責也顦刈也趡走也妙好也彌笑切三玅上同篎爾雅云小管也陗山峻亦作峭七肖切八峭上同篍竹簫洛陽亭長所吹又七流切㴥峻波哨壷口黯者名也俏俏醋好皃帩帩縛䵴說文曰祡祭天也凡從尞者作同力照切八燎照也一曰宵田又放火也又九小切㙩周垣􅓼􅓼病說文治也療上同熮火皃膫炙也鷯爾雅云鶉一名鷯其雄曰鵲又音僚趬行輕皃丘召切五􅙚􅙚􅚤不安㢗玉篇云髙屋譑譑弄㚁髙㚁􅚤􅙚􅚤牛召切一醮祭也子肖切十一上同釂飲酒盡也皭白色潐盡也爝火也䩌面不光僬行容止皃禮曰庶人僬僬趭走皃􅧎物縮小又作癄䂃目瞑廟皃也齊職儀曰周有守禮之官掌先王之宗廟也亦作庿眉召切二庿上同驃驃騎官名又馬黃白色毗召切又卑笑切又匹召切一少幼少漢書曰少府秦官掌山海池澤之稅以給供養又漢複姓五氏說苑趙簡子御有少室周魯惠公子施叔之後有少施氏家語魯有少正卯孔子弟子有少叔乗何氏姓苑有少師氏失照切又失沼切二燒放火又失昭切朓祭也丑召切一裱領巾也方廟切二俵俵散翹尾起也巨要切又巨堯切一饒益饒人要切又人招切二繞卷取物皃三十六效具也學也象也又效力效驗也胡教切八効俗校校尉官名亦周禮校人之後又音敎斆學也書曰惟斆學半㤊快也出孟子傚敎也詩曰是則是傚毛萇云言可法傚也誤也詨詨叫敎敎訓也又法也語也元命包云天垂文象人行其事謂之敎敎之爲言傚也古孝切十一古文窖倉窖校檢校又考校鉸鉸刀又裝鉸酵酒酵覺睡覺又音角膠膠黏物又音交較不等又音角􅥽又音交珓杯珓古者以玉爲之孝孝順爾雅曰善父母爲孝孝經左契曰元氣混沌孝在其中天子孝龍負圖庶人孝林澤茂又姓風俗通云齊孝公之後呼教切六哮喚也又音虓涍水名在南陽嗃大噑又呼各切詨上同解薦屬又音敎罩竹籠取魚具也都敎切五䈇上同䍜說文曰覆鳥令不得飛走也䞴䞴趟跳皃鵫鵫雉今白雉也豹獸名崔豹古今注曰豹尾車周制也象君子豹變尾言謙也古軍正建之令唯乗輿建焉廣志曰狐死首丘豹死首山又姓風俗通曰八元叔豹之後北敎切五譟惡也直吏官爆火裂又音駮䶂䑕屬能飛食虎豹出胡地又音酌𫾣擊也苦敎切又苦交切三礉礉磽又口交切巧巧僞山海經曰義均始爲巧倕作百巧也又苦絞切皃儀皃莫敎切七䫉說文同上貌籀文䡚引也幗也緢旄雜絲也說文音苗綵雜文也奅起􅩯亦大也匹皃切六窌上同說文窖也炮灼皃又歩交切拋拋車又普交切皰面生氣也又旁敎切礮礮石軍戰石也趠行皃丑敎切二踔猨跳稍均也小也說文曰出物有漸也所敎切七潲豕食又雨濺也揱木上小或作揱上同娋小娋侵也大夫食邑種棹檝也直敎切四櫂上同濯浣衣又直角切火急煎皃橈木曲奴敎切又如昭切四淖泥淖不靜又猥也擾也閙上同抓爪刺也側敎切三癄縮也小也亦作㾭笊笊籬靤面瘡防敎切五皰面生氣也鞄持皮鉋鉋刀治木器也骲手擊抄略取也初敎切八鈔上同縐惡絹也又初爪切又側救切耖重耕田也仯仯仯小子觘角上浪也船不安也罺小網靿靴靿於敎切五袎襪袎㑃很也房也出字林箹竹節又於角切軪車有機樂好也五敎切又岳洛二音三磽礉磽又五交切醜皃巢棧閣也士稍切又士交切一三十七号号令又召也呼也謚也亦作號胡倒切六號上同又乎刀切石似玉也㙱土釡相欺女字導引也徒到切十四翿舞者所執纛左纛以犛牛尾爲之大如斗繫於左騑馬軛上悼傷悼蹈踐也盜盜賊壽覆也又徒刀切幬上同䆃嘉禾一莖六穗儔隱也長皃年九十或作䊭黏也䌦不靑不黃到至也又姓出彭城本自髙陽氏楚令尹屈到之後漢有東平太守到質都導切六禱祭也請也文字音義云得福曰祠求福曰禱又當老切倒倒懸又當老切姓也出河内衣背縫菿大也誥告也謹也古到切七郜國名在濟隂又姓晉有髙昌長郜玖告報也說文作告又音捁縞白縑又音蒿膏髙車又音髙苦木烄交木然也傲慢也倨也說文作傲餘倣此五到切八嫯慢也䫨頭長鏊餅鏊驁馬名奡陸地行舟人也謷志逺皃魚鳥狀也曰說文曰小兒蠻夷頭衣也莫報切十九帽頭帽耄老耄亦作見經典省上同見說文芼菜食又擇也搴也謂拔取菜也芼以蘋蘩爲羮亦草覆蔓眊目少睛瑁圭名天子所執㺺古文冒覆也渉也又莫北切􅰮低目細視旄狗足旄毛毛毛鷹鷂鸇媢夫妬婦出說文鳥輕毛也手扶之也覒邪視也亦作㲝鳥毛盛也䋃刺也絹帛䋃起如刺也􅦲說文曰門樞之横梁嫪悋物又姓郎到切八澇淹也又水名或作潦潦上同勞勞慰又郎刀切僗俗髝髝髞麤急皃又音牢癆癆痢惡人說文曰朝鮮謂飲藥毒曰癆麻莖大也又施絞於也操持也又志操七到切又七刀切七造至也又所早切艁古文慥言行急㿷米榖雜糙上同鄵鄭地名暴侵暴猝也急也又晞也案說文作疾有所趣也又作暴晞也今通作暴亦姓漢有繡衣使者暴勝之薄報切九虣上同周禮曰以刑敎中則民不虣曝曝乾俗瀑瀑雨勽說文覆也菢鳥伏卵也袌衣前襟又云今朝服垂衣又薄髙切􅸣姓也出姓苑􅖂鳥名又博木切報報告又下婬曰報博耗切一漕水運榖在到切二􅵝手攪也奥深也内也主也藏也爾雅曰西南隅謂之奥烏到切十一懊懊悔䐿藏肉埤蒼云鳥胃也妬食隩說文曰水隈崖也燠燠釡以水添釡䜒語也镺長也墺四墺四方土又於六切􅧖小鰌名澳澳深又水名喿羣鳥聲蘇到切九譟羣呼噪上同瘙疥瘙㿋上同髞髝髞埽埽灑說文棄也又桑道切掃上同情性踈皃餉軍苦到切五犒上同稾稾飫書篇名靠相違也䯪䯪䫨大頭竈淮南子曰炎帝作火死而爲竈則到切三躁動也趮疾也秏減也亦稻屬吕氏春秋云飯之美者南海之耗又姓出何氏姓苑俗作耗呼到切四好愛好亦壁孔也見周禮又姓出纂文又呼老切􅤋姓也或作藃藃縮也腝臂節那到切三長皃腦瀀皮也三十八箇箇數又枚也凡也古賀切三个明堂四面偏室曰左个也個偏也賀慶也擔也勞也加也亦姓出㑹稽河南二望本齊之公族慶封之後漢侍中慶純避安帝諱改爲賀氏又虜複姓九氏北俗謂忠貞爲賀若魏孝文以其先祖有忠貞之稱遂以賀若爲氏周書賀蘭祥傳曰其先與魏俱起有紇伏者爲賀蘭莫何弗因以爲氏賀拔勝傳云其先與魏俱出隂山代爲酋長北方謂土爲拔爲其楤有地土時人相賀因爲賀拔氏後自武川徙居河南也南燕録有輔國大將軍賀賴盧後魏書有賀葛賀婁賀兒賀遂賀悅等氏胡箇切四䘸袖也袔上同㵑水名佐助也則箇切六左左右又作可切副也㝾行不正也袏禪衣作造也本臧洛切跢小兒行也丁佐切四癉勞也痑病也哆語助聲邏游兵也郎佐切三􅘼婦人衣㿚病也坷坎坷不平也口箇切四軻轗軻不遇也孟子居貧轗軻故名軻字子居又苦哥切蚵爾雅商蚵蟲一名蛶又胡哥切艐船著沙不行也餓不飽也五个切一䭾負䭾唐佐切二大又唐蓋切奈奈何奴箇切又奴帶切二那語助又奴哥切些楚語辝蘇箇切又音細一呵嘘氣呼箇切又呼哥切二㰤㰤㰤大笑拖牽車吐邏切一三十九過誤也越也責也度也古卧切七裹包也又音果鐹鎌也亦作划划上同蟷蠰也即螗蜋㳀水名食也出玉篇和聲相應胡卧切又音禾三盉調味俰和也挫摧也則卧切三夎拜失容又詐也經典作蓌侳安也有也課稅也試也第也苦卧切七堁堀堁塵起皃㪙研治髁髁骨也上同㾧秃㾧科滋生也又音窠唾說文云口液也湯卧切七涶上同毻鳥易毛也蛻蛻去皮嫷好皃毤落毛無袂衣也播揚也放也弃也說文曰撞也一曰布也又姓播武殷賢人補過切五古文簸簸揚又布火切番獸走譒敷也謡也剉破也麤卧切三莝斬草銼蜀呼鈷䥈磨磑也摸卧切又莫禾切四䃺上同塺塵也摩按摩又莫禾切愞弱也或從需下文同乃卧切又乃亂切四堧沙土又而縁如兖二切稬秫名田耎城下田又隍池内也破破壞又虜三字姓三氏北齊書有破六韓常後魏書有北境賊破六汗拔陵又西方破多羅氏後改爲潘氏普過切二頗又普禾切座牀座徂卧切二坐被罪又藏果切臥寢也釋名曰臥化也精氣變化不與覺時同也說文曰休也从人臣取其伏也吾貨切一諎諎磨千過切二拭貨財也蔡氏化淸經曰貨者化也變化反易之物故字有化也呼臥切一惰惰懈也徒臥切四媠嬾婦人也䙃無袂衣也􅷱猪别名也縛符臥切一䇔痿病也魯過切七擊物之名䌴不訓也又不均也㱻畜産疫病膝病摞理也弱也桗木本都唾切四㛆量也刴刴斫剉也挅落帆磋磨磋治象牙七過切一䐝䑁膏也先臥切一侉痛呼也安賀切一涴泥著物也亦作汚烏臥切又烏官切又於阮切一四十禡師旅所止地祭名莫駕切九榪牀頭橫木鬕婦人結帶㾺牛馬病又音慢說文曰目病一曰惡气著身也一曰蝕創罵惡言䣕縣名在犍爲又音馬多言䧞増益又巧也傌齊大夫名駕行也乗也說文曰馬在軶中也古訝切十二稼稼穡種曰稼歛曰穡嫁家也故婦人謂嫁曰歸瘕腹病架架屋亦作枷禮記曰不同揓枷􆄫舉閣價價數假借也至也易也休假也又古雅切幏蠻夷賨布屋間也䐒不密賈賈人知善惡亞次也就也醜也衣嫁切十俹倚俹姓也㰳欭㰳驢鳴欭乙利切稏𥝧稏稻名膪肥皃啞啞啞鳥聲婭爾雅曰兩壻相謂爲亞或作婭䢝次第行也覀覆也覆覈覂賈從此又許下切嚇笑聲呼訝切又呼格切八罅孔罅唬虎聲誑㙤地名在晉謑怒言煆赫也熱也乾也㗿詬㗿責怒迓迎也吾駕切六訝嗟訝亦上同犽獸名齖齰齖不相得也枒木名一云車輞合處砑碾砑詫誑也丑亞切三侘侘傺失志見楚詞相誤吒吒歎說文曰噴也叱怒也陟駕切十二咤上同禮記曰無咤食姹美女又丁故切灹火聲哆哆㕦大口奓張也開也又陟加切䐒䐒䏧相黏也歩肥也膪膪肥也䒲䒲葿黃芩别名㓃祭奠酒爵又丁故切上同詐僞也側駕切六溠周禮職方氏云河南曰豫州其浸波溠春秋傳云楚子除道梁溠咋咋語聲笮笮酒器也􅶻壓酒具也出證俗文榨打油具也出證俗文乍鋤駕切五䄍年終祭名或作蜡廣雅曰夏曰淸祀殷曰嘉平周曰大􅹒秦曰臘也蜡上同齰齰齖說文曰慙語也謝辝謝又姓出陳郡㑹稽二望辝夜切三榭臺榭爾雅曰有木者謂之榭㴬水名髂腰骨枯駕切六上同疴小兒驚詬巧言才也㰤大笑歎聲暇閑也書曰不敢自暇俗作暇胡駕切四夏春夏又胡雅㓛下行下又胡雅切芐蒲苹草褯小兒褯慈夜切五藉以蘭茅藉地又慈亦切躤踐也䤳鏡䤳䣠亭名在貝丘也夜舎也暮也君子有四時朝以聽政晝以訪問夕以修令夜以安身又姓羊謝切三射僕射鵺鳥名似雉䞣怒也一曰牽也充夜切又丑格切二斥山名爾雅曰東方之美者有斥山之文皮焉又音尺蝑鹽藏蟹司夜切又司余切四缷缷馬去鞍瀉吐瀉又音寫䉣笘䉣柘木名亦姓之夜切七樜上同鷓鷓鴣鳥似雉南飛䗪􅡂蝜蟲名亦作蟅也嗻多語之皃炙炙肉周書曰黃帝始燔肉爲炙又之石切蔗甘蔗唶歎聲子夜切二借假借又將昔切舎屋也又姓古作舎始夜切五赦赦宥騇牡馬涻文字音義云涻水出北嚻山也厙姓也出姓苑今台括有之又昌舎切射射弓也周禮有五射白矢參逺剡注讓尺井儀又姓三輔決録云漢末有大鴻臚射咸本姓謝名服天子以爲將軍出征姓謝名服不祥改之爲射氏名咸神夜切又音石又音夜僕射也四䠶上同見說文麝獸名爾雅曰麝父麕足又華山之隂多麝貰貰賖也貸也霸國語曰霸把也把持諸侯之權又姓益部耆舊傳有霸相必駕切七俗弝弓弝欛刀柄名靶轡革灞水名垻蜀人謂平川爲垻帊帊幞通俗文曰帛三幅曰帊帊衣襆也普駕切二怕怕懼摦寛也大也胡化切七㕦大口崋崋山西嶽亦州名春秋時秦晉之公境後魏置東雍州改爲崋州又姓出平原殷湯之後宋戴公考父食采於崋後氏焉華上同樺木名鱯魚名似鮎白大檴亦木名又胡郭切一化德化變化禮記曰田䑕化爲鴽紀年曰周宣王時馬化爲狐又姓呼霸切六匕變也從到人諣疾言鬼變魚名杹木名皮可爲索跨越也又兩股間苦化切三胯兩股間也㐄一步也又口瓦切誜桂也所化切二傻傻偢不仁獸名似狼白駕切六杷田器又白巴切海魚色不眞也跁跁踦短人𥝧𥝧稏稻名䏧膩也乃亞切二絮絲結亂也笪斜逆也遷謝切二䞣䞣脚立也嗄老子曰終曰號而不嗄注云聲不變也所嫁切又於介切三􅰤姓也沙周禮云鳥皫色而沙鳴注云沙嘶也又所加切坬土埵古駕切二相誤也䖳水母也一名蟦形如羊胃無目以蝦爲目除駕切二䅊開張屋皃瓦泥瓦屋五化切一攨吴人云牽亦爲攨也烏㕦切三窊下處也䠚䠚蹃踏地用力四十一漾水名在隴西餘亮切十二恙憂也病也又噬蟲善食人心也羕長大也颺風飛煬炙也向也暴也㨾式樣養供養眻美目皃諹謹也讙也䭐餌也㺊㺊獸如師子食虎豹及人瀁水溢蕩皃亮朗也導也亦姓出姓苑力讓切十五諒信也相也佐也又姓後漢有諒輔掠笞也奪也取也治也悢悢恨悲也緉履屐雙也㹁牛色雜也兩車數踉踉蹡行不迅也量合斗斛字統云事有不善曰薄北風又音涼䁁目病䀶上同哴唴哴啼也涼薄也又吕張切狀形狀鋤亮切一讓退讓責讓又交讓木名兩樹相對一枯則一生岷山有之人㨾切三欀道木攘文字指歸云揖攘又音穰懹憚也餉餉饋式亮切十傷未成人或作殤又音商向人姓岀河内本自有殷宋文公支子向文旰旰孫戍以王父字爲氏又許亮切蟓桑繭即桑𧖟也曏少時也不乆也慯憂也上同饟爾雅曰饁饟饋也又自家之野曰饟蠰食桑蟲似天牛珦玉名帳帷帳釋名曰小帳曰斗帳形如覆斗也漢書曰東方朔云陛下誠能用臣朔之計推甲乙之帳知亮切五脹脹滿痮上同漲大水又陟良切張張施又陟良切悵失志丑亮切十暢通暢又達也亦姓陳留風俗傳曰暢氏岀齊鬯匕鬯又香草韔弓衣䩨上同􅳵草盛昶逮也日長也通逺也又丑兩切畼不生也穧也籀文廠露舎倡導引先又音昌初也說文曰造法剏業也初亮切四創上同又初良切愴悽愴滄寒也醤說文作醬醢也漢書武帝使唐蒙風曉南越南越食蒙蜀䈮醬子亮切四籀文古文將將帥轎魚向切二仰又魚兩切訪謀也敷亮切三妨妨礙又敷方切邡邑名妄虚妄又亂也誣也巫放切六望看望說文曰出亡在外望其還也亦祭名又姓何氏姓苑云魏興人又音亡朢弦朢說文曰月滿與日相朢以朝君也又音亡忘遺忘又音亡汒谷名在京兆也責也況匹擬也善也矧也說文曰寒水也亦脩况琴名又姓何氏姓苑云今盧江人許訪切四况俗山名貺賜也與也誑欺也居況切四㤮㤮惑也往也又逺行也臦乖也迋往也勞也于放切五旺美光暀上同㤮誤人王霸王又盛也又于方切放逐也去也甫妄切四舫並兩船又音謗趽曲脛馬名鳥名相視也助也扶也仲虺爲湯左相漢書曰相國丞相皆秦官金印紫綬掌丞天子助理万物亦州名春秋時屬晉秦邯鄲郡地魏初以東部爲陽平郡西部爲廣平郡兼魏王都爲三魏後魏置相州取河亶甲居相之義周自故鄴移於安陽城也又姓後秦録有馮翊相雲作德獵賦又漢複姓三氏前趙録有衛將軍相里覽又務相成廪君之姓也晉惠時空相機殺平南將軍孟觀息亮切又息良切一彊屍勁硬也居亮切一唴唴哴小兒啼也丘亮切三䁁目病羻陳桓子名蹡踉蹡行不正皃七亮切一狂輒爲也渠放切二誆謬言防守禦也符況切一四十二宕洞室一曰過也亦州名禹貢梁州之域秦漢魏晉諸羌處之後魏内附置蕃鎮周爲宕州也徒浪切七踼跌踼行失正又音唐碭石又山名又縣名在梁郡又音唐逿過也𦿆䕞𦿆毒藥碎石聲嵣嵣硭山皃浪波浪謔浪游浪又姓晉永嘉末張平保靑州爲其下浪逢所殺來宕切又魯當切五閬髙門又閬中地名在蜀又閬風崑崙峯名也埌冢也䕞䕞𦿆蒗蒗蕩渠名在譙吭鳥咽下浪切三行次第笐衣架盎盆也又姓出姓苑烏浪切一醠濁酒枊繫馬柱吾浪切三䭹馬怒又五郎五朗二切􅢐山名在越剡縣界葬葬藏也則浪切一傍蒲光切又蒲郎切二徬徬附藏通俗文曰庫藏曰帑浪切又郎切三奘說文曰大也修車譡言中丁浪切六儅不中瓽大甕一曰井甃說文云大盆也又姓姚弋仲將瓽耐虎當主當又底也亦音璫擋摒擋闣閃闣人抗以手抗舉也縣也振也苦浪切十二閌閌閬門高炕火炕犺猰犺不順伉伉儷敵也又姓漢有伉喜爲漢中大夫出風俗通亢髙也旱也亦姓出姓苑蚢蟲名爾雅云蚢蕭繭砊砊硠石聲邟邑名黃色阬門也又口庚切頏咽頏螃蟲名似蝦蟆補曠切四榜棹舩一歇舫舫人習水者也謗誹謗儻倖也他浪切六摥排摥湯熱湯也又他郎切蕩蒗蕩渠又土郎徒朗二切盪盪行又度朗切工人治木器曠空明也逺也大也乆也又姓苦謗切五爌上同矌目無䀕也壙墓穴纊絮也又細緜也禹貢豫州厥貢厥篚纎纊又作絖儾緩也奴浪切三灢泱灢濁㚂坱㚂塵也喪亡也蘇浪切又音桑二上同攩廣雅云搥打也胡曠切四擴上同潢釋名曰染書也又音黃暀暀明桄織機桄古曠切又古黃切二光上色又古黃切鋼古浪切又古郎切二掆捎掆㫒也出字林荒草多皃呼浪切一漭漭浪大野莫浪切三吂老人不知㟐㟐嵣山皃汪水臭也烏浪切二䤑潑䤑酒四十三映明也隱也於敬切四暎上同賏頸飾詇早知也又音怏敬㳟也肅也慎也又姓陳敬什之後出風俗通後漢有揚州刺史敬歆居慶切四竟窮也終也又姓出何氏姓苑鏡拾遺録曰穆王時渠國貢火齊鏡廣三尺六寸暗中視如晝人向鏡語則鏡中響應之晉鎮南大將軍甘卓照鏡不覩其頭視庭樹而頭在樹上獍獸名食人競爭也強也逐也高也遽也渠敬切七􅔡俗誩爭言倞強也檠檠子疊名儆儆愼又音警曔明也慶賀也福也亦州名周之先不窋之所居春秋爲義渠戎國城本漢郁郅縣魏文置朔州隋爲慶州州立嘉名也亦姓左傳齊大夫慶封又漢複姓有慶師慶忌慶父三氏出姓苑丘敬切一更易也改也說文作㪅古孟切又古衡切一命使也敎也道也信也計也召也眉病切一病憂也苦也說文曰疾加也皮命切四評平言又音平地名說文作坪地平地枰神聖母感天而生子故稱天子女女生聲又姓漢書貨殖傳臨葘姓偉貲五千万令善也命也律也法也力政切又力盈切又歴丁切二詅自衒賣也聘聘問也訪也匹正切三娉娶也俜伶俜夐逺也休止切四詷自言長醟酗酒又爲命切矎直視皃摒摒除也卑政切三併兼也並也皆也并專也偋偋隱僻也無人處字統云厠也防正切又蒲徑切二庰上同淨無垢也疾政切八㵾古文穽䧟穽又音靜􅵊䝼賜靚裝飾也古奉朝請亦作此字請延請亦朝請漢官名張禹首爲之又秦盈親井二切婧竦立首說文好皃盛多也長也又姓後漢西羌傳有北海太守盛苞其先姓奭避元帝諱改姓盛承政切又音成三墭塸器晟明也熾也器也詺詺目或單作名彌正切一輕墟正切又去盈切一含笑也許令切二面也精強也子姓切又音旌一四十六徑歩道古定切七經經緯又古靈切逕近也􅺎猿聲俓直也􆄿隔也桱桱木似杉而硬寗邑名亦姓說文作􅑔所願也乃定切四佞諂也一曰才也俗作佞濘泥濘鸋爾雅鸋鴂鴟屬也楚詞云鸋鴞之鳴腥豕息肉肉中似米蘇佞切又音星三醒酒醒又蘇丁先頂二切睲目睲脛腳脛釋名曰脛莖也直而長似物莖也胡定切二踁上同定安也亦州名帝堯始封唐國之城秦爲趙郡鉅鹿二郡漢爲中山郡後魏置安州又改爲定州以安定天下爲名徒徑切四掟天掟出道書廷朝廷又音亭錠錫屬矴矴石丁定切九釘又得亭切訂字林云逗遛也定題額詩云定方之中定營室也又徒徑切飣貯食奠上同亦同顁題錠豆有足曰錠無足曰鐙罄盡也說文曰器中空也苦定切七說文空也磬磬石樂器周禮曰磬人爲磬殸籀文爾雅云鹿絶有力又堅牽二音􅚢一足行鑋金聲聽待也聆也謀也他定切又音㕔三汀汀瀅不遂志又音㕔侹俓侹直也代也儆也靘䒌靘青黒千定切三掅捽也䒌莫定切二瞑夕也鎣鎣飾也烏定切四瑩上同說文曰玉色一曰石之次玉者志恨也瀅小水零零落郞定切又魯丁切三揷空皃又魯丁切令令支縣在遼西郡四十七證驗也諸應切二烝熱又音蒸孕懷孕以證切七䵴面黒子賸増益一曰送也又物相贈媵送女從嫁㑞㑞送行也鱦小魚膡大視又雙也乗車乗也寶證切又食陵切七鱦魚子媵又音孕􅤟孕也􅌘山名在剡縣也賸又音孕剰剰長也認認物而證切又而振切四扔強牽引又音仍芿草不翦㭁上車又木名應物相應也說文作應當也於證切又音膺三譍以言對也噟上同甑古史考曰黃帝始作甑子孕切四䰝上同籀文䙢汗襦興許應切又許陵切三臖腫起嬹恱也喜也勝勝負又加也克也亦州名春秋時戎狄地戰國時晉趙地漢雲中五原也隋置榆林鎮屬雲州唐武德中改爲勝州詩證切又詩陵切四膡美目蕂苣蕂胡麻榺織禨滕也瞪直視皃陸本作眙丈證切三米黒壞雲色馬食榖多氣流四下也黒甑切一凭依􅕇也皮證切又皮陵切二靐靐靐雷聲也稱愜意又是也等也銓也度也俗作秤云正斤兩也昌孕切又昌陵切二秤俗凝牛切又牛凌切一丞縣名在沂州匡衡所居常證切又音承一覴直視丑證切一殑釋典殑伽其切又其陵切一四十八嶝小坂都鄧切八鐙鞍鐙隥梯隥橙兀橙凳牀凳出字林夢夕登􅿊夢夕登祭食磴巖磴贈玩也好也相送也昨亘切二􅍍皯􅍍亘通也遍也竟也出方言古鄧切六堩路搄急引又古登切縆急張亦作絙䱎魚名石蓮皃蹭蹭蹬千鄧切二刀割過也鄧國名周爲申國平王母申后之家戰國時地楚昭襄王取韓置南陽郡釋名曰在楚地昭襄王取韓置南陽郡釋名曰在南中而居陽地故以爲名始皇三十六郡即其一焉隋以南陽爲縣改爲鄧州取鄧國名之又姓出南陽安定二望殷王武丁封叔父於河北是爲鄧侯後因氏焉徒亘切六蹬蹭蹬僜倰僜不著事㱥困病䮴行欲倒也幐囊屬悶也武亘切五䲛魚名懜不明重鐶􅿊􅿊夢夕登新睡起束棺下之說文作堋喪葬下土也方隥切二堋上同又壅江水灌漑曰堋倗輔也父鄧切一倰倰蹬行皃曽鄧切二㱥㱥増剰也子鄧切一􅿊睡覺思贈切一小水相益台鄧切一四十九宥寛也于救切十六又又猶更也佑佐也助也右左右又于乆切祐神助䀁抒水器也上同酭報也說文顫也上同囿說文曰苑有垣一曰禽獸有囿又于目切姷偶也忧動也䞥走皃侑勸食爾雅曰酬酢侑報也草名救護也止也又姓風俗通漢有諫議大夫救仁居祐切十一灸灼也又居有切廏馬舎釋名曰廏聚也生馬之所聚也又灸廐並姓出姓苑俗作廏究窮也深也謀也盡也㝌說文云貧病也疚病也㲃強擊􆂄說文飽也􅦔文字音義云止也禁也助也猶爾雅云猶如麂善登木又音由音柚㳟謹行也胄胄子國子也說文曰裔也又姓出姓苑直祐切十三介說文曰兠鍪也古文酎三重釀酒宙宇宙繇卦兆辝也籀史籀周宣王太史名造大篆伷系也䛆詶也疛心腹疾也㿒上同駎競馳馬也懤愁毒晝日中又姓晝邑大夫之後因氏焉出風俗通陟救切三咮鳥口又鬪卓二音噣上同狩冬獵舒救切五獸說文曰守備者周禮曰獸人掌罟田獸辨其物名字林曰兩足曰禽四足曰獸守太守首自首前罪收穫多臭凡氣之揔名俗作臰尺救切二殠腐臭岫山有穴曰岫似祐切四籀文袖衣袂也亦作褏褎牰牛黒眥齅以鼻取氣亦作嗅許救切三嘼嘼産亦作畜珛朽玉呪呪詛職救切四䯾髮多椆木椆船篙木也祝說文曰祭王贊詞又音粥舊故也亦姓出姓苑巨救切三柩尸柩禮注曰在牀曰尸在棺曰柩匶古文􅍸􅍸損說文臞也所祐切四瘦上同漱漱口鏉鐡姓鏉皺面皺俗作側救切五㾭縮小甃并甃縐衣不申又絺之細者䐢字書云䐢脯也副貳也佐也又虜姓後魏書副吕氏後改爲副氏敷救切七仆前倒􆃹假髻又敷六切覆蓋也又敷六切病重發也㤱小怒也福衣一福今作副簉簉倅一曰齊也初救切三䔏上同又草根遚不進富豐於財又姓左傳周大夫富辰方副切四輻輻湊競聚又音福鍑釡而大口一曰小釡䔰嘉膳猱爾雅曰猱蝯善援又奴刀切狃習也就也又狐狸也復又也返也往來也安也白也告也扶富切又音服八古文再病伏鳥菢子又音服椱機時繒者􅤦兩阜間也覆伏兵曰覆複重複狖獸名似猨余救切十四貁上同鼬蟲名似䑕槱積薪燒之柚似橘而大廣志曰城都柚大如斗爾雅注柚似橙而醋岀江南蜼似獼猴鼻露向上尾長四五尺有岐雨則自懸於樹以尾塞鼻又以季切褎服飾盛皃油雚子桐花曰油猶獸似麂善登木䑕櫾木名輶輶車又音由牰牛黒眥蜏不知晦朔又音酉授付也又姓出何氏姓苑承呪切六詶荅也又市州切㖟口㖟壽壽考售賣物出手綬綵衣皃輮車輞人又切四蹂蹂踐煣蒸木使曲也鞣絮皮又音柔莓覆盆草也亡救切一􅡩仰鼻牛救切一􅡩仰鼻丘救切一䞭進也七溜切一五十候伺候又姓周禮有候人其後氏焉胡遘切十五鮜魚名鄇地名在晉逅邂逅訽罵訽睺半盲后君也皇后也後方言云先後猶娣姒堠今封堠也鱟郭璞注山海經云形如車文靑黒色十二足長五六尺似蟹雌常負雄漁者取之必得其雙子如麻子南人爲醬鍭爾雅曰金鏃翦羽厚厚薄䞧蹇行又蒲北切䞀䞀貪財之皃石蜜膜也寇鈔也暴也又姓出馮翊河南二望陳留風俗傳云浚儀有寇氏黃帝之後風俗通云蘇忿生爲武王司寇後以官爲氏苦候切十滱水名在代郡怐怐愗愚皃扣扣擊鷇鳥子亦作㲉生而須哺曰鷇自食曰鶵㜌㜌瞀無暇䍍說文曰未燒瓦器也簆織具瞉瞉瞀詬罵又巧言茂卉木盛也古作懋莫候切十五貿交易也市賣也又姓出姓苑東莞人鄮縣名在㑹稽亦姓出姓苑戊辰名愗怐愗袤廣袤東西曰廣南北曰袤楙爾雅曰楙大瓜實如小瓜味酢可食懋美也勉也瞀瞉瞀䓮細草叢生姆女師說文作娒苺苺子即覆盆草名􅜪重覆又亡保切雺地氣發天不應仆倒也匹候切又匐覆二音五踣上同䞳僵也㰴語而不受豧豕息豆榖豆物理論云菽者衆荳之名也又姓後魏有將軍豆代田候切十六竇空也穴也水竇也又姓出扶風觀津河南三望風俗通云夏帝相遭有窮氏之難其妃方娠逃出自竇而生少康其後氏焉窬禮曰蓽門圭窬又音俞逗逗遛又住也止也酘酘酉荳荳蔻脰項脰郖地名梪籩豆或作梪古食肉器也餖飣餖浢水浢䄈祭䄈毭􅪭罽車鞁具木名㛒嫗㛒語帖也鬥說文曰兩士相對兵仗在後象門之形凡從門者今與門戸字同都豆切九鬪鬪競說文遇也又姓左傳楚有大夫鬪伯比闘俗噣鳥口或作咮又丁救切䛠䛠譳不能言也􅔀􅔀尾張衡東京賦云日月㑹於龍􅔀斣斠也用力走也又相易物俱等襡衣袖又時燭切䬦䬦飣搙說文曰薅器也纂文曰耨如鏟柄長三尺刃廣二寸以刺地除草奴豆切六鎒上同亦出說文耨上同五經文字云經典相承從耒衣故不可改乳也擩搆擩不解事譳詛譳瘶欬瘶蘇奏切七嗽上同欶上氣漱漱又音痩鏉􅘜利謏諵謏怒言也嗾使狗奏進也說文作則候切二走釋名曰疾趨曰走又祖苟切透跳也他候切又書育切五咅說文作相與語唾而不受也隷變如上㰯說文同上俗又作哣䟝索彄䟝也自投下或作漚乆漬也烏候切三䙔頭衣地名又市由切遘遇也古候切二十􅌟架也合也成也蓋也亂也媾重㛰覯見也姤卦名姤遇也又偶也購購贖䝭稟給雊雉鳴彀張弓取牛羊乳亦作句句當又姓華陽國志云王平句枎張翼廖化並爲大將軍時人曰前有王句後有張廖俗作勾軥軥槅挽車也㝤夜也搆搆擩也怐怐愗愚皃又苦候切煹舉火也䃓甃井也又罰也冓數也㝅說文曰乳也一曰㝅瞀也綿輳輻輳亦作湊倉奏切八腠膚腠湊水㑹也聚也嗾使犬南夷名鹽蔟太蔟律名又倉谷切楱橘屬温豕陋踈惡也說文曰阸陜也盧候切十三漏漏刻說文曰漏以銅受水刻節晝夜百刻爾雅曰西北隅謂之屋漏又禹耳三漏鏤彫鏤書傳云鏤剛鐡也又鏤漏並姓出何氏姓苑又力誅切屚說文曰屋穿水下也从雨在尸下尸屋也一曰笱屚縣名在交阯瘻瘡也蘆䞀貪財􅘜鏉􅘜蔄姓也㰯小兒兇惡詬忽怒􅸺􅸺㔌細切僂僂佝短醜皃蔲荳蔲呼漏切十豞豕聲字統云勤作詬怒也訽上同吼聲也又呼後切㰯數㰯㖃恥辱佝僂佝怐上同䏽豕肉醬也蒲侯切二尻衣偶不期也五遘切一㔌細切才奏切三楱􅘜楱鐡齒杷名䠫醉倒皃出埤蒼五十一幼少也伊謬切一謬誤也詐也差也欺也靡幼切二繆紕繆又姓漢書儒林傳有申公弟子繆生䠗䠗蹌行皃丘謬切一䠗醜行之皃巨幼切一五十二沁水名在上黨亦州名本漢榖逺縣後魏置沁源縣武德初置州因沁水以名之七鴆切四冷吣犬吐䈜䈜墨工人具浸漬也漸也子鴆切四濅上同出說文􅐛上同出字林祲祅氣也又子心切妊妊身懷孕汝鴆切五絍識納亦作紝䋕鵀戴鵀鳥任已上四字並又音壬衽衣衿鴆鳥名廣志云其鳥大如鴞紫緑色有毒頸長七八寸食蛇蝮雄名運曰雌名隂諧以其毛歷飲食則殺人直禁切三沈又直壬切㼉靑皮瓜名枕枕頭也論語曰飲水曲肱而枕之之任切又之稔切二針又之林切􅤉牛舌下病巨禁切十䶖並上同噤說文曰口閉也蜀人呼舟紟紟帶或作襟又音今鈘說文云持止也讀若琴亦作㯲凚寒凚笒笒籛齽齒向裏禁制也謹也止也避王莽家諱改曰省又姓何氏姓苑云今吴興人居䕃切三僸北夷樂名又居林切㯲格也賃傭賃也借也乃禁切一䕃說文曰草隂地也於禁切七䅧上同窨地屋喑聲也心中病亦作庇廕飲又於錦切滲滲漉所禁切二罧爾雅曰槮謂之涔郭璞云今之作罧者聚積柴木於水中魚得寒入其裏藏隱因以簿圍捕取又息甚切槮與罧同也闖馬出門皃丑禁切二私出頭視譖讒也毀也莊䕃切一讖讖書釋名曰讖纖也其義纎微楚譛切一吟長詠冝禁切一揕擬擊史記曰右手揕其胷知鴆切二㓄掘也㓄又赤黒色臨哭臨又偏向良鴆切又音林二侺頭向前甚太過時鴆切二侺侺䫴䫴䶖切齒怒皃于禁切二鼔聲見兵書深不淺也式禁切又式今切二􅵹廕􅵹大屋五十三勘校也苦紺切七䘓凝血上同鹹味厚轗轗軻坎壈也竷擊也磡巖崖之下紺靑赤色也古暗切五淦新淦縣在豫章薏苡别名灨縣名記云章貢二水合流因其處立縣便以爲名在南康郡亦作贑贛贛愉縣在琅邪郡憾恨也胡紺切七琀送死口中玉亦作含浛水和物唅哺唅蜭有毛之蟲莟苗莟心欲秀也䐄食肉不猒暗日無光又黙也深也貧也不明也烏紺切二闇冥也說文曰閉門也僋僋俕癡皃他紺切八㶒㶒汎水浮皃撢深取㐁無光又舌出皃又吐念切傝傝儑不自安又吐盍切䐺食味美憛憛悇懷憂誩競言也又渠仰渠政二切俕僋俕蘇紺切四閐閐覆蓋也㤾憛㤾失志䫅顉䫅揺頭皃謲相怒也七紺切三參參鼓俗作參㽩田隴聮也醰酒味不長徒紺切又音譚五贉買物預付錢也沈水底没瞫括也又徒南切䀍羊血凝儑傝儑五紺切一馾冠幘近前丁紺切三頭劣皃鵧鵧鳥妠取也奴紺切一顲面色黄皃郎紺切三僋僋伸皃又僋俕不淨㶒浮皃䫲面虚黃色呼紺切二食不飽也篸以針篸物作紺切二撍手撼五十四闞魯邑亦視也又姓左傳齊大夫闞止苦濫切五瞰視也日出皃嚂可也又工覽切味苦濫叨濫汎濫盧瞰切九㔋刀利觴說文曰泛齊行酒也纜維舟吴書曰甘寧常以繒錦維舟去輒割弃以示奢爁火皃㜮貪也失禮也過差也俗作從水懢貪也䆾䆾䆱不平嚂食皃賧夷人以財贖罪吐濫切七􅲃􅷮􅲃無味䆱䆾䆱不平無味睒候視澉薄味舕舚舕舌出􅷮􅷮􅲃無味古蹔切二味苦乞戲物或作斂呼濫切三蘫爪葅也出說文䖔虎怒憨害也果決也下瞰切又呼甘切六㺖犬吠聲譀誇誕凍觀漢記曰雖誇譀猶令人熱又呼甲切䗣爪蟲䐄炙令熟或作上同憺恬靜徒濫切又徒敢切八惔上同澹水揺動皃腅相飯也或作啖淡水味啗噉也食也啖誑也倓安也靜也恬也亦作澹暫左傳云婦人暫而免諸國暫猶卒也藏濫切三蹔上同鏨鐫石又音𧖟擔貟也都濫切二甔甔石大甖又都甘切三三思蘇暫切又蘇甘切一五十五豔美色也以贍切九艶俗爓光也焰上同焱火華也􅼬豔也鹽以鹽醃也本音平聲上同灩瀲豔水波動皃贍賙也時豔切一染而豔切又如檢切二髯髯頷毛又人占切厭論語曰食不厭精於豔切五􅰪快也又於驗切猒飽也又於廉切饜上同嬮嬮嬱美女窆下棺方驗切又方亘切二砭石針說文曰以石刺病也又甫兼切驗證也徴也效也說文云馬名也魚窆切三噞噞喁魚口􅺧證也閃說文曰闚頭門中也舒贍切又舒斂切四煔火行皃苫以草覆屋掞舒藻􅳅􅳅噉不廉子豔切又子廉切一壍坑也遶城水也七豔切四塹上同出說文槧揷也論衡曰斷木爲槧釋名曰槧版長三尺者也槧漸也言漸漸然長也又七廉切又才敢切嬱嬮嬱美女皃殮殯殮力驗切七斂聚也又力琰切瀲泛瀲一曰水波也亦作澰爁爁焱火延􅚲市先入直也􅬆小雨獫長喙犬名覘候也說文云闚視也春秋傳曰公使覘之丑豔切二䀡視也䠨音譜云馬急行昌豔切八幨披衣或作襜裧襜裧並上同韂鞍小障泥䪜上同㙴蔽也䦲闚䦲􅰪快也於驗切亦作㡋二俺大也潛藏也慈豔切一占固也章豔切又職鹽切一五十六㮇火杖他念切六舚舌出皃忝辱也又他玷切亭名在京兆煔火光㐁無光說文曰舌皃念思也又姓西魏太傅念賢奴店切二􅨿字林云挽船篾也店店舎崔豹古今注云店置也所以置貨鬻物也都念切十一坫墇也屏也沾水名在上黨說文他兼切痁病也又式詹切墊下也又墊江在巴陵又徒協切早霜寒唸呻吟㝪窮也說文曰屋傾下也埝下也􅫎老人面黒皃䀡目垂皃又丁炎切䃸䃸磹電光先念切二䆎禾草不實稴䆎之皃磹徒念切二㼭支也出通俗文趝疾行皃紀念切一酓苦味於念切一僭擬也差也子念切一䁮閉目思也漸念切一兼古念切又古嫌切二䱤魚名傔傔從苦念切一稴稴䆎力店切一五十七釅酒醋味厚魚欠切二􅬺齒皃脅妨也許欠切二姭好皃㪁厓下也丘釅切二􅺮似瓶有耳􅼠草木無蔓也亡劒切一五十八陷入地隤也戸韽切五䱤魚名又古念切臽小坑䐄說文云食肉不猒也又膇脂也錎車鐶韽下入聲俗作韽於陷切四􅰉犬吠又乙咸切淊水沒揞吴人云抛也蘸以物内水莊陷切一鹹多陟陷切三站俗言獨立又作江岸上地名也出活州記歉歉喙口陷切又口感切二䫡䫡顑面長皃又公陷切重買佇陷切三詀被誑譧俗儳輕言仕陷切三陷也䪌韀之短也􅷮鹹味公陷切二䫡䫡胡劑面也諵尼賺切一顑顑長面也玉陷切一五十九鑑鏡也誡也昭也亦作監格懴切又古銜切五鑒上同監領也亦姓風俗通云衞康叔爲連屬之監其後氏焉又古銜切瞻也㔋利也又細切也懺自陳悔也楚鑒切六儳雜言又食陷切摲投甖屬㺖小犬聲嚵試人食覱覱㒈髙危皃子鑑切三長面皃又昨三切􅬆以物内水中出音譜釤大鎌所鑑切三䀐暫見㣌相接物也又利也出字諟㒈覱㒈許鑑切三譀譀呼戒切闞犬聲埿深泥也蒲鑑切二湴上同㽉大瓮似盆績漢書云盜伏於㽉下胡懴切二㯺大櫃又下斬切鑱鑱士具士懴切又士銜切六䪌䪌韀欃水門又作㸥䳻似鵰而斑白出音譜讒譖也又士衫切艬艬船黑敢叫呼仿佛黑敢然自得音黯去聲一六十梵梵聲扶泛切三帆船使風又音凡颿上同說文曰馬疾歩也汎浮皃孚梵切八泛上同􅚁輕也䀀杯也上同氾濫也䒦草浮水皃又匹凡切姂好皃劒釋名曰劒檢也所以防檢非常也廣雅曰龍泉太阿干將鏌釾斷蛇魚腸純鋼燕支葵偷屬陳于隊堂谿墨陽巨闕辟閭並劒名也崔豹古今注云吴大皇帝有寶劒六一曰白虹二曰紫電三曰辟邪四曰流星五曰靑冥六曰百里列子云孔周有三劒一曰含光二曰承影三曰霄陳吴王賜子胥屬鏤之劒而死周穆王有銀鋙劒切玉如泥居欠切一欠欠伸說文曰張口气悟也今借爲欠少字去劒切二㐸俗俺大也於劒切八㤿甘心淹沒也又繅絲一淹也劒羽㛪誣挐裺衣寛䛳䛳匿覎覎口墟名在富春清上也廣韻去聲卷第四新添類隔更音和切裱賔廟切窆班驗切
