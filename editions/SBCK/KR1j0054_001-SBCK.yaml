  text: 大宋重修廣韻一部
  hash: sha256:f6ab59956df24933dc8e9646afb5e5b45d91a76f3ae8fc8898e600f7a3656d49
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0054_SBCK_001-1a}
body:
  text: 凡二万六千一百九十四言注一十九万一千六百九十二字準景德四年十一月十五日勅四聲成文六書垂法乃經籍之資始寔􅂤􅁽之攸先自呉楚辨音隷古分體年祀濅逺攻習多門偏旁由是差譌傳寫以之漏落矧注解之未備諒敎授之何從爰命討論特加刊正仍令摹印用廣頒行期後學之無疑俾永代而作則宜令崇文院雕印送國子監依九經書例施行牒至準勅故牒又準大中祥符元年六月五日勅道有形器之適物有象數之滋一爻始畫於龍圖八體遂生於鳥跡書契是造文字㪍興踵事増華觸類浸長􅆓賡載以變本尚辝律之諧音集韻成書抑亦久矣朕聿遵先志導揚素風設敎崇文懸科取士考覈程準兹實用焉而舊本旣譌學者多誤必豕魚之盡革乃朱紫以洞分爰擇儒臣叶宣精力校讎増損質正刊修綜其綱條灼然敘列俾之摹刻垂于將來仍特換於新名庶永昭於成績宜改爲大宋重修廣韻牒至準勅故牒陸法言撰本長孫訥言箋注儀同三司劉臻外史顔之推著作郎魏淵武陽太守盧思道散騎常侍李若國子博士蕭該蜀王諮議參軍辛德源吏部侍郎薛道衡已上八人同撰集郭知􅀇拾遺緒正更以朱箋三百字關亮増加字薛峋増加字王仁煦増加字祝尚丘増加字孫愐増加字嚴寶文増加字裴務齊増加字陳道固増加字更有諸家増字及義理釋訓悉纂略備載卷中勒成一部進上勅賜絹五百疋昔開皇初有儀同劉臻等八人同詣法言門宿夜永酒闌論及音韻以今聲調旣自有別諸家取捨亦復不同呉楚則時傷輕淺燕趙則多傷重濁秦隴則去聲爲入梁益則平聲似去又支章移切脂旨夷切魚語居切虞遇俱切共爲一韻先蘇前切仙相然切尤于求切侯胡溝切俱論是切欲廣文路自可淸濁皆通若賞知音即須輕重有異吕靜韻集夏侯該韻略陽休之韻略周思言音韻李季節音譜杜臺卿韻略等各有乖互江東取韻與河北復殊因論南北是非古今通塞欲更捃選精切除削䟽緩蕭顔多所決定魏著作謂法言曰向來論難疑處悉盡何不隨口記之我輩數人定則定矣法言即燭下握筆略記綱紀博問英辯殆得精華於是更渉餘學兼從薄宦十數年閒不遑修集今返初服私訓諸弟子凡有文藻即須眀聲韻屏居山野交游阻絕疑惑之所質問無從亡者則生死路殊空懷可作之歎存者則貴賤禮隔以報絕交之旨遂取諸家音韻古今字書以前所記者定之爲切韻五卷剖析豪氂分別黍累何煩泣玉未得縣金藏之名山昔怪馬遷之言大持以蓋醬今歎楊雄之口吃非是小子專輒乃述羣賢遺意寧敢施行人丗直欲不出戸庭于時歳次辛酉大隋仁壽元年訥言曰此製酌古􅆓今無以加也然古傳之已久多失本源差之一畫詎惟千里見炙從肉莫究厥由輒意形聲固當從夕及其晤矣彼乃乖斯若靡馮焉他皆倣此頃佩經之􅂩沐雨之餘楷其紕繆疇兹得失銀鉤創閱晉豕成羣盪櫛行披魯魚盈貫遂徵金􅂐遐泝石渠略題㑹意之辝仍記所由之典亦有一文兩體不復備陳數字同歸惟其擇善勿謂有増有減便慮不同一􅀧一畫咸資别據其有類雜竝爲訓解傳之不謬庶埒箋云于時歳次丁丑大唐儀鳳二年前費州多田縣丞郭知􅀇拾遺緒正更以朱箋三百字其新加無反音皆同上音也陳州司法孫愐唐韻序蓋聞文字聿興音韻乃作蒼頡爾雅爲首詩頌次之則有字統字林韻集韻略述作頗衆得失互分惟陸生切韻盛行於丗然隨珠尚纇虹玉仍瑕注有差錯文復漏誤若無刋正何以討論我國家偃武修文大崇儒術置集賢之院召才學之流自開闢以來未有如今日之盛上行下效比屋可封輒罄謏聞敢補遺闕兼習諸書具爲訓解州縣名号亦據今時字體從木從著彳著亻施殳施攴安尒安禾並悉具言庶無紕繆其有異聞奇怪傳􅀃姓氏原由土地物産山河草木鳥獸蟲魚備載其閒皆引馮據隨韻編紀添彼數家勒成一書名曰唐韻蓋取周易周禮之義也及案三蒼爾雅字統字林􅀃文玉篇石經聲韻聲譜九經諸子史漢三國志晉宋後魏周隋陳宋兩齊書本草姓苑風俗通古今注賈執姓氏英賢傳王僧孺百家譜周何潔集文選諸集孝子傳輿地志及武德已來創置迄開元三十年並列注中等夫輿誦流汗交集愧以上陳天心又有元靑子吉成子者則汝陽侯榮之曽孫卓尒好古博通内外遁禄巖嶺吐納自然抗志鈐鍵棲神梵宇淡泊無事希夷絕塵倏忽風雲靈燄怡懌考窮史籍廣覽羣書欲令淸濁昭然學之上有終日而忘食有連宵而不寐案搜神記精怪圖山海經博物志四夷傳大荒經南越志西域記西壑傳漢纂藥論證俗方言御覽字府及九經三史諸子中遺漏要字訓義解釋多有不載必具言之子細研窮究其巢穴澄凝微思鄭重詳思輕重斯分不令慁糅緘之金篋珍之寶之而巳哉寧辝阻險敢不躬談一訴愚心克諧雅況依次編記而不別番其一字數訓則執優而尸之劣而副之其有或假不失元本以四聲尋譯冀覽者去疑宿滯者豁如也又紐其脣齒喉舌牙部仵而次之有可紐不可行之及古體有依約之並采以爲證庶無壅而昭其馮起終五年精成一部前後緫加四萬二千三百八十三言仍􅂐隷石經勒存正體幸不譏繁于時歳次辛卯天寶十載也論曰切韻者本乎四聲紐以雙聲疊韻欲使文章麗則韻調精眀於古人耳或人不達文性便格於五音爲足夫五音者五行之響八音之和四聲閒迭在其中矣必以五音爲定則參宫參羽半徵半商引字調音各自有淸濁若細分其條目則令韻部繁碎徒拘桎於文辝耳廣韻上平聲卷第一德紅東第一獨用都宗冬第二鍾同用職容鍾第三古􅀟江第四獨用章移支第五脂之同用旨夷脂第六止而之第七無非微第八獨用語居魚第九獨用遇俱虞第十模同用莫胡模第十一但奚齊第十二獨用古膎佳第十三皆同古用諧皆第十四呼恢灰第十五咍同呼用來咍第十六職鄰眞第十七諄臻之同用純諄第十八側侁臻第十九武分文第二十欣同用許巾欣第二十一語􅀽元第二十二魂痕同用戸昆魂第二十三戸恩痕第二十四胡安寒第二十五桓同用乎官桓第二十六所姦刪第二十七山同所用間山第二十八東春方也􅀃文曰動也从日在木中亦東風菜廣州記云陸地生莖赤和肉作羮味如酪香似蘭吴都賦云草則東風扶留又姓舜七支有東不訾又漢複姓十三氏左傳魯卿東門襄仲後因氏焉齊有大夫東郭偃又有東宫得臣􅀳有東關嬖五神仙傳有廣陵人東陵聖母適杜氏齊景公時有􅀮居東陵者乃以爲氏丗本宋大夫東郷爲賈執英賢傳云今髙密有東郷姓宋有貟外郎東陽無疑撰齊諧記七卷昔有東閭子甞富貴後乞於道云吾爲相六年来薦一士夏禹之後東樓公封于􅂎後以爲氏莊子東野稷漢有平原東方朔曹瞞傳有南陽太守東里昆何氏姓苑有東萊氏德紅切十七菄東風菜義見上注俗加艹鶇鶇鵍鳥名美形出廣雅亦作䍶獸名山海經曰秦戲山有獸狀如羊一角一目目在耳後其名曰䍶又音陳音棟儱倲儜劣皃出字諟倲上同地理志云東郡館名古文見道經涷瀧涷沾漬􅀃文曰水出發鳩山入於河又都貢切蝀螮蝀虹也又音董凍凍凌又都貢切鯟魚名似鯉行皃崠崠如山名埬上埬地名蛞科斗蟲也案爾雅曰科斗活東郭璞云蝦蟆子也字俗從䖵䰤醜皃同齊也共也輩也合也律歴有六同亦州春秋時晉夷吾獻其西河地於秦七國時屬魏秦并天下爲内史之地漢武更名馮翊又有九龍泉泉有九源同爲一流因以名之又羗複姓有同蹄氏望在勃海徒紅切四十五仝古文出道書童童獨也言童子未有室家也又姓出東莞漢有琅邪内史童仲玉僮僮僕又頑也癡也又姓漢有交阯刺史僮尹出風俗通銅金之一品桐木名月令曰清眀之日桐始華又桐廬縣在嚴州亦姓有桐君藥録兩卷峒崆峒山名硐磨也􅔓􅔓舩􅻝獸似豕出泰山筒竹筒又竹名射筒吴都賦曰其竹則桂箭射筒瞳目瞳㼧㼧瓦􅝕上同罿車上網又音衝犝犝牛無角筩竹筩潼水名出廣漢郡亦關名又通衝二音曈曈曨日欲明也又他孔切洞洪洞縣名在晉州北又徒弄切侗楊子法言云倥侗顓蒙橦木名花可爲布出字書又鍾幢二音烔熱氣烔烔出字林䴀鸏䴀水鳥黄喙喙長尺餘南人以爲酒器出劉欣期交州記挏引也漢官名有挏馬又音動酮馬酪又音動鮦爾雅云鰹大鮦又直冡直柳二切㼿井甓一云甃也􅩫無角羊上同眮目眶又徒揔切蕫草名又多動切穜穜稑先種後熟謂之穜後種先熟謂之稑又音重衕通街也鞁具飾也地下應聲䆚通䆚也哃哃􅿝大言弓飾絧布名郷名􅥧地名又姓鼔聲黒虎黒皃中平也成也宜也堪也任也和也半也又姓漢少府卿中京出風俗通又漢複姓有七氏漢有諫議大夫中行彪晉中行偃之後虞有五英之樂掌中英者因以爲氏古有隱者中梁子漢書藝文志有室中周著書十篇賈執英賢傳云路中大夫之後以路中爲氏張晏云姓路爲中大夫何氏姓苑有中壘氏中野氏陟弓切又陟仲切四衷善也正也適也中也又衷衣褻衣也忠無􅀻也敬也直也厚也亦州名本漢臨江縣屬巴郡後魏置臨州貞觀爲忠州草名又音沖蟲爾雅曰有足曰蟲無足曰豸又姓漢功臣表有曲成侯蟲進直弓切七沖和也深也种稚也或作沖亦姓後漢司徒河南种暠盅器虚也又敕中切爞爾雅云爞爞炎炎熏也草名又音中翀直上飛也終極也窮也竟也又姓漢有濟南終軍又漢複姓二氏東觀漢記有終利恭何氏姓苑云今下邳人也左傳殷人七族有終葵氏職戎切十五衆又之仲切潨小水入大水又徂紅在冬二切歿也螽螽斯蟲也􅏑上同鼨豹文䑕也蔠蔠葵蘩露也柊木名又齊人謂椎爲柊楑也小雨䶱字書云􅀛名也鴤鳥名䈺篋䈺戎人呼之泈水名在襄陽䝦獸如豹忡憂也敕中切三浺浺瀜水平逺之皃又音蟲盅器虚也又音蟲崇髙也敬也就也聚也又姓鋤弓切四崈上同㓽鍾屬饞貪食也出古今字音嵩山髙也又山名又姓史記有嵩極玄子或作崧息弓切九崧上同􅱜似鷹而小能捕雀也娀有娀氏女簡狄帝嚳次妃吞乙卵生契菘菜名硹地名在遼㣝姓也蟲名細毛戎戎狄亦助也􅀃文作􅞯兵也又姓漢宣帝戎婕好生中山哀王竟如融切九􅞯上同茙茙葵蜀葵也又虜姓後魏書官氏志云南方有茙眷氏改爲茙氏也㭜木名駥馬八尺也小竹可爲矢人身有三角也狨細布絨上同弓弓矢釋名曰弓穹也張之穹穹然也其未曰簫又謂之弭以骨爲之滑弭弭也中央曰弣弣撫也人所撫持也簫弣之間曰淵淵宛也言曲宛然也丗本曰黄帝臣揮作弓墨子曰羿作弓孫子曰傜作弓又姓魯大夫叔弓之後居戎切六躳身也親也又姓出姓苑躬上同㴦縣名在酒泉宫白虎通曰黄帝作宫室以避寒暑宫之言中也丗本曰禹作宫亦官名漢書曰少府官有守宫令主御筆墨􅁓封書泥也又姓左傳虞有宫之竒匑謹敬之皃又音穹和也朗也􅀃文曰炊气上出也又姓丗本云古天子祝之後以戎切四融上同肜祭名又敕林切瀜沖瀜大水皃雄雄雌也亦姓舜友有雄陶羽弓切二熊獸名似豕魏略曰大秦之國出玄熊亦姓左傳賢者熊冝僚又漢複姓左傳楚大夫熊率且比瞢目不明莫中切六夢􅀃文曰不明也又武仲切邑名在魯郡懜慙也國語云君使臣懜醜皃獸似豕目在耳出崐崘穹髙也去宫切七憂也焪乾也芎芎藭香草根曰芎藭苗曰糜蕪似蛇􅇃上同匑謹敬之皃􅦶􅦶籠也又去龍切窮窮極也又窮竒獸名聞人􅃲乃助不直者渠弓切三藭芎窮羿所封國馮馮翊郡名又姓畢公髙之後食采於馮城因而命氏出杜陵及長樂房戎切七堸蟲室汎浮也又孚劒切芃草盛也又音蓬姬姓之國渢弘大聲也梵木得風皃又防泛切風教也佚也告也聲也河圖曰風者天地之使元命包曰隂陽怒而爲風方戎切七飌古文楓木名子可爲式爾雅云楓有脂而香孫炎云攝攝生江上有竒生枝髙三四尺生毛一名楓子天旱以泥泥之即雨山海經云黄帝殺􅃖尤棄其桎梏變爲楓木脂入地千年化爲虎魄猦猦母狀如猿逢人則叩頭小打便死得風還活出異物志偑地名檒檒梵聲也竹名出南海豐大也多也茂也盛也又酒噐豆屬又姓鄭公子豐之後敷空切八酆邑名亦姓左傳有狄相酆舒蘴蕪菁苗也灃水名在咸陽寷大屋麷煑麥㒥偓㒥仙人㠦山名充美也塞也行也滿也昌終切七珫珫耳玉名詩傳云充耳謂之瑱字俗從玉茺茺蔚草也㤝心動䘪䘪襌衣也􅳱黄色又音統㳘水聲隆盛也豐也大也力中切六癃病也亦作􅜡鼓聲俗作窿穹隆天􅀔俗加穴霳豐隆雷師俗加雨㚅多㚅礼天空空虚書曰伯禹作司空又漢複姓有空桐空相二氏苦紅切十四箜箜篌樂噐釋名云師延所作靡靡之音出桑間濮上續漢書云靈帝胡服作箜篌也崆崆峒椌噐物朴也又丘江切硿硿青色也䅝稻稈悾悾悾信也慤也埪土埪龕也倥倥侗涳涳濛小雨又口江切鵼怪鳥出字統心草也悾衣􅃑蟬脫皮公通也父也正也共也官也三公論道又公者無私也從八從厶厶音私八背意也背厶爲公也亦姓漢有主爵都尉公儉又漢複姓八十五氏左傳魯有公冉務人公歛陽公何􅚄公父歜公賔庚公思展公鉏極公申叔子費宰公山弗擾公甲叔公巫召伯䘙有公文要戰國䇿齊威王時有左執法公旗蕃左傳齊悼子公旗之後左傳季武子庶子公沮後以爲氏孟子有公行子著書左傳晉成公以卿之庶子爲公行大夫其後氏焉孔子家語魯有公冶長又公索氏將祭而亡其牲者魯有公愼氏出婬妻又有公罔之裘揚觶者孔子弟子齊人公晳哀陳人公良儒公西赤公祖句兹公肩定漢書藝文志有公檮子著書又有公勝生著書濟南公玉帶上明堂圖功臣表有公師壹晉穆公子成師之後又有公扈滿意後漢有零陵太守公仇稱晉穆公子仇之後又弘農令北海公沙穆山陽公堵恭魏志有公夏浩晉書有征虜長史太山公正羣成都王帳下督公帥蕃本姓公師避晉景帝諱改爲公帥氏前趙録有大中大夫公帥式子夏門人齊人公羊髙作春秋傳列女傳有公乗之姒墨子魯有公輸班衞大夫公叔文子史記有魯相公儀休孔子門人公休哀又有公祈哀禮記魯大夫公明儀何氏姓苑云今髙平人衞大夫公南文子魯有公荆皎衞大夫公子荆之後魯大夫公襄昭魯襄公太子野之後魯大夫公伯寮何氏姓苑云彭城人趙平陵太守公休勝魯士官公爲珍魯昭公子公爲之後楚公大夫朱髙宋公子子朱之後公車氏秦公子伯車之後淮南子有公牛哀病七日化爲虎齊公子牛之後吕氏春秋有邴大夫公息忘孟子稱公都子有學業楚公子田食采於都邑後氏焉公劉氏后稷公劉之後古今人表有公房皮楚公子房之後郭泰别傳有渤海公族進階衞大夫有公上王世本有魯大夫公之文晉蒲邑大夫公佗世卿秦公子金之後有公金氏齊公子成之後有公牽氏何氏姓苑云公右氏今琅邪人公左氏今髙平人又有公言公孟公獻公留公石公旅公仲等氏又左傳衞有􅁃公差以善射聞祭公謀父出自姜姓申公子福楚申公巫臣之後衞有尹公佗楚大夫逢公子仲楚白公勝之後有白公氏文字志云魏文侯時有古樂人竇公氏獻古文樂書一篇秦有博士黃公庇古今人表神農之後有公幹仕齊爲大夫其後氏焉丗本有大公叔頴又有公紀氏衞有大夫左公子洩右公子職漢四晧有園公先生尚書僕射東郡成公敞古紅切十三功功績也􅀃文曰以勞定國曰功又漢複姓何氏姓苑云漢營陵令成功恢禹治水吿成功後爲氏俗作㓛工官也又工巧也疘文字集略云脫疘下部病也蚣蜈蚣蟲玒玉名又音江釭車釭􅀃文曰車轂中鐵也又古雙切魟䱑魟江蟲形似蟹可食又音烘攻攻擊㓚銍穫也愩憒也碽擊聲篢篢笠方言蒙覆也奄也爾雅􅇚草曰蒙王女也莫紅切二十六冡􅀃文覆也濛涳濛細雨􅐒驢子曰􅐒艨艨艟戰􅂳又武用切朦大皃矇矇瞽饛盛食滿皃䰒馬垂鬣也檬似槐葉黃麴生衣皃䴿上同亦上同鸏鸏䴀鳥也幪覆也蓋衣也又幪縠罞爾雅曰麋􅅈謂之罞􅞲􅀃文云蓋衣也又莫弄切髳爾雅釋詁曰覭髳茀離也蠓蠓蠛似蚊又莫孔切草可爲帚雺天氣下地不應曰雺又莫侯切霿霚並上同朦朦朧月下䀄器滿懜心悶闇也靀小雨籠西京雜記曰漢制天子以象牙爲火籠盧紅切又力董切二十七豅大谷㰍􅀃文云房室之䟽也亦作朧朦朧大聲龓龓頭䪊上同瀧瀧涷沽漬􅀃文曰雨瀧瀧也聾耳聾左傳云不聽五聲之和曰聾釋名曰聾籠也如在蒙籠之内不可察也軸頭礱磨也䆍禾病上同嚨喉嚨蘢蘢古草名又音龍櫳檻也養獸所也字書云築土襲穀巃巃嵸山皃嵸祖紅切又音竉揔襱襱裙上同瓏玲瓏玉聲曨日欲出也鸗鳥名餅蠪蠪蛭如狐九尾虎爪音如小兒食人一名䗁蠪又爾雅曰蠪朾螘郭璞云赤駁蚍蜉㟅崆㟅山皃屸山形洪大也亦姓共工氏之後本姓共氏後改爲洪氏戸公切二十二鉷弩牙訌潰也詩曰蟊賊内訌紅色也又姓虹螮蝀也又古巷切仜身肥大也鴻詩傳云大曰鴻小曰鴈又姓左傳衞大夫鴻聊魋葒水草一曰蘢古詩云隰有游龍傳曰龍即紅草也字或從卄葓上同谼大壑又谼谷寺在相州䉺陳赤米也烘字林云燎也又呼紅切洚􅀃文曰水不遵道一曰下也又戸冬下江二切渱潰渱水沸湧也􅞼從􅞼山名在雲南魟魟白魚又音烘䧆坑也䪦大聲飛聲䫹大風䂫石聲􅭐鳥肥大􅭐􅭐然叢聚也徂紅切五藂俗䕺草䕺生皃潨水㑹也􅮵籠􅮵取魚器俗翁老稱也亦鳥頸毛又姓漢書貨殖傳有翁伯販脂而傾縣邑烏紅切八螉蠮螉蟲名細􅆎螽也䱵魚名蓊蓊鬱草木盛皃又烏桶切䈵竹盛皃䩺吴人靴靿曰䩺㮬水㮬子果名出南州頸毛也怱速也倉紅切十五忩俗葱葷菜楤尖頭擔也􅯶轞車載囚聦聞也明也察也聽也殷仲堪父患耳聦聞牀下蟻動謂之牛鬭出􅀳書繱色青黄文細絹􅋛石似玉也騘馬青白雜色䗓蜻蜓淮南子曰蝦蟆爲鶉水蠆爲䗓囱竈突濁酒鍯大鑿平木器㷓煴也又子孔切屋中符又子孔切通逹也三禮圖曰通天冠一名髙山冠上之所服也亦州名本漢宕渠縣内有地萬餘頃因名爲萬州後魏以萬州居四達之路改爲通州又姓出姓苑他紅切九蓪蓪草藥名中有小孔通氣侗大也恫痛也痌上同曈朧朧欲明之皃俑俑偶人又音勇獸名似豕出泰山又音同走皃葼木細枝也子紅切二十一鬷釡屬又姓左傳鄭大夫鬷明嵕九嵕山名猣犬生三子豵豕生三子鯼石首魚者椶椶櫚一名蒲葵騣馬鬣􅙎上同䗥螉䗥蟲名嵸巃嵸又作孔切艐書傳云三艐國名􅀃文云舩著沙不行也蝬三蝬蛤屬出臨海異物志堫種也石也翪聳翅上皃緵縷也又作弄切㚇飛而斂足又子貢切㣭數也稯禾束鬉毛亂蓬草名亦州名周割巴州之伏虞郡於此置蓬州因蓬山而名之薄紅切十車軬篷織竹夾箬覆舟也髼髼䯳髮亂皃蜂蟲名出蒼頡篇又音峯芃芃芃草盛皃又音馮爾雅曰困亦作又音䧏韸鼔聲䮾充塞皃又音龍風皃又歩留切烘火皃呼東切又音紅六叿叿叿市人聲魟河魚似鼈谾谷空皃出字林䪦大聲大風㟅崆㟅山皃五東切又魚江切一檧小籠蘇公切又先孔切三憽惺憽了慧人也㬝㬝白皃出聲譜二冬四時之末尸子曰冬爲信北方爲冬冬終也又姓前燕慕容皝左司馬冬壽都宗切七古文苳草名䳉䳉鳥好入水食似鳧形小笗竹名􅜾雨皃獸如豹有角彤赤也丹飾也亦姓彤伯爲成王宗枝徒冬切二十二疼痛也佟姓也北燕録有遼東佟萬以文章知名炵火威皃又他冬切䳋鳥名䳋渠狀如山雞黒身赤足出山海經也鼕鼔聲􅍵􅍵􅍵憂也出楚詞擊空聲爞旱􅀬㤏惶也痋動病䂈刺矛鉵大鉏赤色黑虎浵水名亦水皃䶱􅀛名又音終庝楚云深屋鉖釣鉖古國名㠽戎云幡也赨赤蟲賨戎稅􅀃文曰南蠻賦也藏宗切十一琮􅀃文云琮瑞玉大八寸似車釭周禮曰以黄琮禮地悰慮也一曰樂也潨小水入大水也又徂紅職戎二切淙水聲又土江切慒謀也又似由切鬃髙䯻又士江切㼻甖屬又士江切孮族盛孮郷誴謀誴樂也帛又布名農田䢉也􅀃文作農耕也亦官名漢書曰治粟内史秦官也景帝更名大司農又姓風俗通云神農之後又羌複姓有蘇農氏奴冬切十二䢉上同辳古文籀文䭢強食䭢女耕切噥多言不中露多憹㦀憹恱也㺜多毛犬也又乃刀切儂我也􅀃文曰腫血也膿上同攻治也作也擊也伐也古冬切二釭燈也又音江䃧石落戸冬切四洚􅀃文曰水不遵道一曰下也孟子曰洚水警予㗢歌也又胡宋徒宋二切大風䃧力冬切三䥢鼔聲聲也宗衆也本也尊也亦官名漢書宗正秦官也掌親屬亦姓周卿宗伯之後出南陽又漢複姓二氏前漢有宗伯鳯南燕録有宗正謙善卜相作冬切二倧上古神人鬆髼鬆髪亂皃私宗切二䯳上同炵火色他冬切一三鍾當也酒器也又量名左傳曰釡十則鍾亦姓出頴川又漢複姓有鍾離氏丗本云與秦同祖其後因封爲姓職容切十八鐘樂器也吕氏春秋云黄帝命伶倫鑄十二器丗本曰垂作憧蚣䘀螽蟲忪心動皃䇗長節竹也蹱躘蹱小兒行皃彸征彸行皃衳小褌也伀志及眾也橦字樣云本音同今借爲木橦字籦籠籦竹名廣志云可爲􅅇妐夫之兄也㕬衆口也舉角也炂􅀬仆也草名門外開鈆鐵鈆龍通也和也寵也鱗蟲之長也易曰雲從龍又姓舜納言龍之後力鍾切九􅶱圭爲龍文躘躘蹱鸗鳥名驡野馬巫也籠􅦶籠竹車軬亦籦籠竹又力東力董二切􅧼小舩上安蓋者蘢蘢古草舂丗本曰雍父作舂吕氏春秋曰赤兾作舂書容切六蜙蝑俗呼􅡂樁撞也踳蹋也􅱝􅨰􅱝鳥名憃愚也松木名􅀇中託曰松脂淪入地千歳爲茯苓亦州舜竄三苗於三危河關之西南羌是也後魏末始統其城改置州焉祥容切四㮤古文淞凍落皃又先㳟切訟爭獄又徐用切􅓘當也向也突也􅀃文曰通道也尺容切十一衝上同罿縱也又音童憧憧憧往來皃䡴陷陣車艟艟艨戰􅂳潼河潼又音同褈褈褣衣也􅩶刺也同上䂌短矛也容盛也儀也受也爾雅曰容謂之防郭璞云形如今牀頭小曲屏風唱䠶者所以自防隱司馬法云軍容不入國國容不入軍是也又州名又姓八凱仲容之後禮記有徐大夫容居餘封切三十五溶水皃又音勇滽水名出冝蘇山庸常也用也功也和也次也易也又姓漢有庸光古文獸似牛領有肉也㺎􅥠並上同墉城也垣也鎔鎔鑄鏞大鐘銿上同􅀃文與鐘同鄘國名傭傭賃又丑凶切􅼵鳥名似鴨雞足也㼸甖也同上鱅魚名又音慵蓉芙蓉䗤䖺䗤色如黄蛇有羽傛傛華縣也又漢書婦官有傛華褣􅥗褣搈不安瑢瑽瑢佩玉行也䈶䈶䇯又矢嵱山名在容州山下有鬼市頌形頌又似用切㝐㝐盛也􅀃文云古文容䡆車行皃㟾山㟾在䢖州餝鸀槦㮧槦木中箭笴㣑重影一曰形㣑􅱬􅱬戣兵器封大也國也厚也爵也亦姓望出渤海本姜姓炎帝之後封鉅爲黄帝師又望出河南後魏官氏志云是賁氏後改爲封氏府容切五古文犎野牛葑菜名詩云采葑采菲崶山名一名龍門山在封州大魚上化爲龍上不得㸃額流血水謂丹色也胷膺也亦作匈􅇩許容切十凶凶禍􅓇古文銎懼也又斤斧柄孔又曲㳟切洶水勢也恟懼也􆈅訟也兇惡也訩衆語匈匈奴顒仰也爾雅云顒顒卭卭君之德也􅀃文云大頭也魚容切四上同見廣蒼鰅魚名􅀃文曰皮有文出樂浪又音隅喁噞喁邕􅀃文曰四方有水自邕成池者是也於容切十六雍和也與邕略同又雍奴縣名在幽州水經云四方有水曰雍不流曰奴亦姓左傳有雍糾又於用切噰鳥聲嗈上同郺郺􅳉多皃澭水名在宋灉上同爾雅曰水自河出爲灉癰癰癤罋汲器廱辟廱天子教官饔熟食壅塞又音擁雝爾雅曰䳭領雝渠上同㻾玉器獸似猨也醲厚酒六容切八􅳉郺􅳉濃厚也襛襛華又衣厚皃又而容切穠花木厚又而容切檂木名鏞多也重複也疊也宜容切又直勇直用二切六穜先種晚熟曰穜緟􅀃文云增益也褈複也䳯䳯鳥名蝩蠶晚生者從就也又姓漢有將軍從公何氏姓苑云今東莞人疾容切又即容七㳟秦用三切三从古文􅀃文曰相德也方言云南楚人謂雞蹱躘踵丑凶切七傭均也直也又音容上同馬不行也䝑土精如㹠在地下也地名又直容切深穴中黒也逢值也迎也符容切八縫紩又音俸漨水名䩼鼓聲􅪕矛也夆掣也又敷㳟切䙜大黄􅀒山伸能動天地氣昔孔甲遇之捀􅀃文曰奉也又符用切峯山峯也敷容切十六鋒劒刃鋒也丰丰茸美好􅀃文本作􅺵草盛􅺵也從生上下達也上同使也妦好皃蠭􅀃文曰螫人飛蟲也孝經援神契曰蠭䘍垂芒爲其毒在後蜂上同􅑣古文蘴菜名又音豐桻木上㷭㷭火夜曰㷭晝曰燧烽上同莑草牙始生岀音譜仹仙人㸼㸼牛縱縱横也即容切又子用切九毾㲪也蹤蹤跡䡮車跡樅木名又七㳟切磫磫􅮍礪石豵豕生三子熧火行穴中急行也又此從切茸草生皃而容切十䩸毳飭髶髮多亂皃䇯竹頭有文襛華皃又厚衣皃又女容切穠花木厚也又女容切搑擣也􅪕􅪕矛也榵木名似檀穁禾梢蛩蛩蛩巨虚獸也􅀃文云一曰秦謂蟬蛻曰蛩渠容切十六邛勞也病也又臨卭縣亦邛僰又姓列仙傳有周封史卭䟽舼舼􅂳􅞤上同筇竹名可爲杖張騫至大宛得之輁輁軸所以支棺也又音拱􅟏蓂莢實也􅦶籠􅦶蛩水㠀石也又居勇切蛬蟋蟀又音拱􅮜􅮜倯可憎之皃鬆髮亂也桏桏柳䅃稰也又巨壠切佩獸如馬而青一走千里也鱅魚名似牛音如豕蜀庸切又音庸三慵嬾也通俗文云牽乾也恭恭敬也􅀃文本作肅也又姓晉太子申生號恭君其後氏焉出國語九容切陸以恭蜙縱等入冬韻非也十龔姓也漢有龔遂供奉也具也設也給也進也又居用切珙璧也又音拱䢼邑名出異苑又亭名出􅀳書共共城縣在衞州又渠用切㽤也卄竦手也􅀃文本居竦切髸髸䯳䳍鳥似雉鳴自呼蜙蜙蝑蟲名息㳟切六淞水名在吴又音松凇凍落之皃鬆髮亂皃亦作䯳倯倯㳟怯皃小行恐皃樅木名松葉栢身七恭切又音蹤十二鏦短矛又音䆫從從容又疾容秦用二切暰光也張景陽七命云怒目電暰是也䗥螉䗥小蜂生牛馬皮中也瑽瑽瑢佩玉行皃摐打也又音䆫䐫肥病治禾移急行也又音蹤鬆髪亂又息恭切遷銎斤斧受柄處也曲恭切又許容切二􅦶􅦶籠四江江海書有九江㝷陽記云烏江蚌江烏白江嘉靡江畎江􅃆江廪江提江菌江亦姓出陳留本顓頊􅀇孫伯益之後爵封於江陵爲楚所㓕後以國爲氏古􅀟切十一扛舉鼎􅀃文云扛横關對舉也秦武王與孟􅀃扛龍文之鼎脫臏而死杠旌旗飾一曰牀前横茳茳蘺香草釭燈又音工矼石矼石橋也爾雅曰石杠謂之徛字俗從石豇豇豆蔓生白色肛胮肛脹大又許江切玒玉名又音工舉角䜫䜫谷在南郡厖厚也犬也莫江切十四駹黒馬白面狵犬多毛亦作尨尨上同浝水名哤語雜亂曰哤牻牛白黒雜娏女神名䵨隂私事也㟌五㟌山名在蜀蛖蛖螻螻蛄􅀋􅲹目不明痝病困􅷗不媚耳中聲也女江切八髪多涳姓出纂文又音噥噥嗔語出字林強食鬞亂髮䁸目不明鴻􅀃文曰在牆曰牖在屋曰楚江切九䆫􅀃文作窻通孔也釋名曰䆫聦也於内見外之聦明也牎上同窓俗䎫種也堫上同摐打鐘鼔也鏦打鐘鼔也上同􅀖國也又姓出何氏姓苑􅀶江切四古文梆木名挷土精如手在地中食之無病栙栙䉶帆未張下江切八䜶䜶􅭽胡豆降降伏又古巷切缸甖缸缻上同洚􅀃文曰水不遵道曰下也又古巷切夅服也跭跭􅭽堅立也胮胮張匹江切又音龐五􅻏上同鼓聲􅽶上同黒皃瀧南人名湍亦州在嶺南吕江切又音􅀟二䮾充塞之皃􅀟偶也兩􅃗也又姓出姓苑後魏有將軍􅀟仕洛所江切七艭舽艭船名䉶帆也􅋏懼也左傳云駟氏􅋏䝄豆也瀧水名在郴州界􅭽跭􅭽立也龐姓也出南安南陽二望本周文王子畢公髙後封於龐因氏焉魏有龐㳙薄江切五逄姓也出北海左傳齊有逄丑父胮胮肛脹大皃鼓聲舽舽舡􅂳皃肛許江切四啌啌瞋語出聲譜谾空谷兒舡舽舡􅂳皃胦胦肛不伏人握江切一腔羊腔也苦江切十二上同羫古文控打也又苦貢切椌椌楬悾信也慤也又音空跫蹋地聲涳直流崆崆㟅山皃又音空凥骨㾤喉中病㼹㼹甎甗也幢旛幢釋名曰幢幢也其皃幢幢然也宅江切六撞撞突也學記曰善待問者如撞鐘撞擊也橦木名又音鍾童旌旗斿皃出􅀃文又丑善切噇喫皃凥骨憃愚也丑江切又丑龍切又抽用切五䚎視不明也一曰直視又丑巷切􅁰不實也䄝祠不敬也短敝衣也樁撅也都江切二􅀷水立㟅五江切一淙水流皃土江切又才宗切四鬃髻髙皃㼻甖也出方言饞愛食五支支度也支持也亦姓何氏姓苑云琅邪人後趙録有司空支雄又漢複姓莊子有支離益善屠龍章移切二十九縴挽􅂳繩也只專辭又之爾切汥水都名㲍㲔㲍者輕毛皃巵酒器梔梔子木實可染黄枝枝柯又漢複姓左傳楚大夫枝如子弓衹適也又巨支切㽻疾也衼祇䃽泥法衣也祇音岐肢肢體胑並同上禔福也又是支切馶馬強氏月氏國名又閼氏匈奴皇后也又精是二音疻毀傷㩼多也又音寘鳷鳥名漢武帝造鳷鵲觀在雲陽甘泉宫外䧴上同觶本音寘今作奉觶字榰爾雅曰榰柱也謂相榰拄也㯄玉篇云木盛土精如鴈一足黄色毀之殺人蟲名似蜴能吞人眵目汁凝又尺支切䡋䡋軝長轂皮鞁移遷也遺也延也徙也易也􅀃文曰禾相􅀝移也又官曹公府不相臨敬則爲移書蔑長之􅀋也亦姓風俗通云漢有弘農太守移良弋支切三十二䄬上同迻􅀃文遷也􅀃文歠也杝木名鉹方言云涼州呼甑又音侈袲宋地名又音侈箷衣架上同又榻前几㥴忯㥴不憂事詑詑詑自得皃又淺意也簃樓閣邊小屋又音池䔟萎䔟草熪燫熪火不絶皃扅扅扅戸扃衪衣袖暆東暆縣在樂浪迆逶迆又移爾切􅦺獸名似犬尾白目喙赤出則大兵栘扶栘木名又成兮切歋歋􅟧手相弄人亦作擨又以􅃒切酏酒也又羊氏切匜杯匜似桸可以注水又羊氏切拸加也誃埤蒼云冰室門名上同蛇蜲虵莊子所謂紫衣而朱冠又蛇丘縣名又神遮切虵俗螔爾雅曰蚹蠃螔蝓注謂即蝸牛也􅀏䬁小旋風咸陽有之小䬁於地也爲爾雅曰作造爲也􅀃文曰母猴也又姓風俗通云漢有南郡太守爲昆薳支切又王僞切六為俗潙水名在新陽䧦阪名在鄭又王詭切鄬地名􅥸大魚又許爲切嬀水名亦州春秋時屬燕秦爲上谷郡漢爲潘縣武德初置北燕州貞觀改爲嬀州因水爲名又姓文士傳有嬀覧居爲切二潙水名又音爲􅀃文曰旌旗所以指也亦作麾許爲切六麾上同噅口不言正撝􅀃文曰裂也易曰撝謙注謂指撝皆謙也􅥸大魚又音爲䧦鄭地逶逶迆於爲切十一􅖖枯死萎蔫也㮃田器覣好視蜲蜲蛇痿痺濕病也倭慎皃委委委佗佗美也䴧鹿肉蟡涸水精一身兩頭似蛇以名呼之可取魚鼈糜糜粥靡爲切九縻繫也又縻爵亦作靡㸏㸏爛散也蘼薔蘼虋冬也又亡彼切䊳䊳碎􅓱􅓱穄别名􅭷乗輿金耳醿酴醿酒也隓毀也􅀃文曰敗城􅊟曰隓許規切九墮上同隳俗眭眭盰健皃又息爲切盱音吁觿角錐童子佩之􅀃文曰觿角銳耑可以解結也文戸圭切睢仰目也䜐相毀之言鑴大鍾又戸圭切蘳華黄也又果實也鬌髪落直垂切又大果切三錘八銖又馳僞切甀甖也幾也疆也􅀃文曰逺邊也是爲切十垂上同陲邊也􅀃文危也倕重也黄帝時巧人名倕小口甖也雅鳥圌山名在吴都又市縁切篅盛榖圎􅖧上同草木葉縣羸瘦也力爲切二膝病吹吹嘘昌垂切又尺僞切三炊炊爨䶴習管古文作龡又尺僞切鈹大針也又劒如刀裝者敷羈切十二帔又芳髲切鮍魚鮍披又作翍開也分也散也耕也耚上同狓狓猖皃出新字林翍翍張之皃旇旗靡秛禾租器破而未離又皮美切㱟開肉又匹靡切陂書傳云澤障曰陂彼爲切十一詖辯辭又音祕碑釋名曰本葬時所設㠯子追述君父之功以書其上羆爾雅曰罷如熊黄白文孝經援神契曰赤羆見則姦宄自逺也古文玉篇云耜屬也牛名又音皮鋸鉏也竹名襬關東人呼裙也藣草名又彼義切隨從也順也又姓風俗通云隨侯之後漢有博士隨何後漢有扶風隨蕃旬爲切三隋國名本作隨左傳曰漢東之國隨爲大漢初爲縣後魏爲郡又改爲州隋文帝去走􅼢􅼢籠虧缺也俗作虧去爲切一闚小視去隨切二窺上同竒異也􅀃文作奇又虜複姓後魏書竒斤氏後改爲竒氏渠羈切又居宜切十􅄾玉名􅀐􅀃文曰跨馬也又其􅀉切鵸鵸䳜鳥似烏三首六尾自爲牝牡善􅀏䳜音余出山海經弜強也又其丈切小兒􅀑碕曲岸又巨支切木别生也㩽上同又横首皃錡釡屬又魚綺切祇地祗神也巨支切二十五示上同見周禮本又時至切衹衹衼尼法衣岐山名亦州春秋及戰國時爲秦都漢爲右扶風魏置雍城鎮又改爲岐州因山而名又姓黄帝時有岐伯歧歧路􅑢邑名在扶風馶勁皃疧病也詩云俾我疧兮蚑蚑蚑蟲行皃又長蚑蠨蛸别名出崔豹古今注忯爾雅云忯忯惕惕愛也䞚􅀃文曰縁大木也一曰行皃翄翄翄飛皃弓硬皃軝􅀃文曰長轂之軝以朱約之詩曰約軝錯衡上同芪藥草􅀃文曰芪母也汥􅀃文曰水都也又音支跂行皃又音企䲬雞又云鴈蚔蝱也䉻赤米繰絲鉤緒伎舒散又音枝長國名髪長於身􆁚參差也犧犧牲書傳曰色純曰犧許羈切十八羲姓風俗通云尭卿羲仲之後焁焁欨貪者欲食皃桸杓也􅇖􅇖嶮羛地各在魏戲於戲歎辭又姓虙戲氏之後又喜義切水名在新豐曦日光􆁗擊也蠡名䚙角匕又火元切䖒古陶器也㺣獸名又曰豕也吹嚱口聲相􅀏之皃㚀毀也隵上同㩻不正也去竒切十一觭角一俯一仰也踦腳跛又居綺切㱦死也􅀃文棄也俗語謂死曰大㱦﨑﨑嶇一􅃗碕石橋虎牙㥓􅢯㥓儉急䗁長腳鼅鼄攲宗廟宥座之器􅀃文又居宜切持去也宜說文本作所安也俗作冝亦姓出姓苑魚羈切十一上同㝖並古文儀儀容又義也正也亦州名本漢涅縣地秦爲上山梨鸝鸝黄鵹上同􅾶上同又􅾶自爲牝牡縭婦人香纓褵玉篇云衣帶也蘺江蘺蘪蕪别名䕻草木附地生也麗東夷國名又盧計切离明也又卦名案易本作離又丑知切䍦接䍦白帽㰚柴㰚也蠡匈奴傳有谷蠡也又音鹿䅻長沙人謂禾二把爲䅻孋孋姬本亦作驪漓水滲入地灕淋灕秋雨也􅫡蜒蚰别名㷰帷中火也又丑知切螹蟲名攡太玄經云張也黐黏也又丑知切矖矖瞜也穲穲穲黍稷行列多端又思之也上同謧弄語劙分破也疪黒病疾移切八骴殘骨又音自玼玉病又七禮切茈􅝀茈草􅫩無􅫩木一名榆胔人子腸名飺嫌食皃鴜􅰌鴜水鳥似魚虎蒼黑色又即知切貲貲也財也即移切十六頿􅀃文云口上須俗作髭鴜􅰌鴜又疾移切䑕名似雞鮆魚名又才禮切訾思也又姓何氏姓苑云今齊人本姓􅀕氏漢元帝功臣表有樓虚侯訾順鄑鄑城名在海北㠿布名媊􅀃文云甘氏星經曰太白上公妻曰女媊居南斗食厲天下􅀕之曰明星又音前出姓苑䴻麥麵紕飾縁邊也䌳繒似布􅀃文曰粗緒也式支切十二絁俗施施設亦姓左傳魯大夫施伯何氏姓苑云今沛人又式豉以寘二切葹卷葹草名抜心不死䙾䙾面柔也本亦作戚施鍦短矛鉈上同􅀃文本食􅃒切鸍似鴨而小又音彌􅠴􅖚􅠴蟾蜍别名䗐米榖中蟲誘􅴬􅀃文敷也斯此也􅀃文曰析也詩曰斧以斯之姓呉志賀齊傳有剡縣史斯從息移切二十六虒似虎有角能行水中小雨榹榹桃山桃㴲涯也又水名出趙國廝廝養也役也使也㒋上同凘凌凘磃館名㾷痠㾷疼痛又斯齊切傂傂祁地名在絳西臨汾水本亦作俿謕數諫也諒也鼶䑕名又音啼􅠿鸒􅠿雅烏蟴爾雅曰蟔蛅蟴郭璞曰蛓屬也今青州人呼蛓爲蛅蟴蛓音刺㽄甕破螔守官别名䫢䫢頭不正也音精䌳經緯不同又式支切䔮草生水中其花可食菥葴菥草似燕麥磨蜤爾雅曰蜤螽蜙蝑郭璞云蜙䗥也俗呼蝽􅡂燍火焦􅆨也禠福也鐁平木器也差次也不齊等也楚宜切又楚佳楚懈二切四嵯㠁嵯山不齊又在河切􅚖齒參差縒參縒也摛舒也丑知切九螭螭無角如龍而黄北方謂之地螻誺不知又洛代切魑魑魅黐所以粘鳥文吕攴切㷰火焱离猛獸􅀃文作山神獸也又吕知切上同彲獸名文王􅁲獵于渭陽所獲非龍非彲彌益也長也乆也亦姓三輔決録有新豐彌􅂛又羌複姓後秦將軍彌姐婆觸武移切十七上同鸍鴆鳥名又名沈鳧似鴨而小也又式支切镾長乆䍘罟也上同汙面皃又莫結切瓕玉名獼獼猴篾竹亦作擟擟拘山名麊縣名在交趾冞冞入也冒也周行也㜷齊人呼母䥸青州人云鐮矛也瀰渺瀰大水皃雌牝曰􅀃文曰鳥母也此移切五􅗃小腸姕婦人皃又即移疾移二切鈭鈭錍斧也又即移切􅀃文曰羊名蹏皮可以割黍知覺也欲也陟離切六䵹􅀃文曰䵹鼄蟊也鼅上同蜘亦同䣽酒也䝷質當也亦作漪於離切水文也十一猗長也􅀝也施也又犗犬出字林或作椅木名梓實桐皮旖旖旎旗舒皃又音上聲禕美也珍也陭陭氏縣名欹歎辝㾨身急又弱也犄犗也􅀏容皃也檹􅀃文曰木檹施也賈侍中􅀃檹即椅也可作琴馳馳騖也疾驅也又姓出姓苑直離切十三趍􅀃文曰趍趙乆也池停水曰池廣雅曰沼也又姓漢有中牟令池瑗出風俗通又有池仲魚城門失火仲魚燒死故諺曰城門失火殃及池魚簃連閣又音移篪樂器以竹爲之長尺四寸小者尺二寸七孔世本曰蘇成公所作也䶵上同踟踟蹰褫蓐衣又曰褫氈􅀃文曰奪衣也又救爾直爾二切䪧咸䪧黄帝樂名樂記作池䶔齒齗誃别也亦作謻傂佌傂參差也又息移除爾二切䞾輕薄皃眭姓也出趙郡息爲切一危疾也隤也不正也不安也魚爲切四㕒厜㕒洈水名在南郡峗三峗山名詑自多皃俗作訑香支切又湯何切二焁焁欨乞人見食皃釃下酒所宜切又山爾切七簁下物竹器又所綺切欐梁棟别名又禮麗二音襹􅗒襹毛羽衣皃褷上同􅫡蚰蜒别名籭􅜷也又山佳切䪎鞍鞘一曰垂皃山垂切二䭨小餟之皃痿濕病一曰兩足不能相及人垂切又於佳切二䬐風緩之皃厜厜㕒山巓狀姊宜切六觜星名纗細繩惢善也􅀃文曰心疑也又桑果才捶二切嫢盈姿皃㭰鳥喙􅀃文曰小頭也居隋切七上同槻木名木名堪作弓材規圎也字統云丈夫識用必合規矩故規從夫也鬹三足釡有柄也􅨼鷒䳏鳥名摫裁摫方言曰梁益間裂帛爲衣曰摫劑劵也遵爲切又在細切六㭰廣雅云石針也地䓴臇􅌜也又子兖切㷷並上同衰小也減也殺也楚危切又所危切二夂夂行遟皃腄瘢胝竹垂切三箠節也又之壘切㩾敆㩾不齊䮔馬小皃子垂切又之壘切一眵目汁凝也叱支切二䌳粗緒又式支息移二切齜開口見齒側宜切一器破也匹支切一䔺恱吹切藍蓼秀又羊箠切六􅀃文云飛也蠵觜蠵大􅀛欈欈木名實可食也小豶也䝐上同齹土宜切齒參差亦作􅚖又楚宜切一六脂脂膏也釋名曰脂砥也著面軟滑如砥石也􅀃文云戴角者脂無角者膏又姓魏略有中大夫京兆脂習字元升旨夷切十祗敬也俗從互餘同汦水名又音遲石細於礪又音旨栺栺栭木名亦栺栭柱鴲小青雀也㴯水名疻積血腫皃䓜䓜也上同姨母之姊妹又爾雅曰妻之姊妹同出爲姨以脂切二十六彞常也法也亦酒樽也寅敬也亦辰名爾雅云大歳在寅曰攝提格又引人切夷夷猶等也滅也易也􅀃文平也从大弓又曰南蠻從虫北狄從犬西羌從羊唯東夷從大人俗仁而壽有君子不死之國亦姓齊大夫夷仲年又漢複姓六氏史記范蠡適齊爲鴟夷子左傳宋公子目夷之後以目夷爲氏祝融後董父之胤其後以融夷爲氏淮夷虎夷皆國名後並爲氏秦末虎夷渠帥助番君攻秦丗本云宋襄公子墨夷湏爲大司馬其後有墨夷皐峓嵎峓山名書作嵎夷傳云東表之地恞恱樂眱熟視不言㰘木名珆石似玉也蔩莬􅀲又羊善弋仁二切􅊂陽􅊂地名本古文夷字痍瘡痍䧅隇䧅險阻荑莁荑桋木名蛦蛦蟲名又􅨧蛦山雞也胰夾脊骨也鮧鮧鹽藏魚腸又魚名也羠廣雅云健羊也羨沙羨邑名在江夏岀地理志又羊箭祥靣二切鏔㦸之無刃者出方言􅜃􅀃文曰行平易也鴺鴺一名飛生踞蟲名鵧鳥名咨嗟也謀也即夷切十五資助也機也貨也又姓陳留風俗傳云黄帝之後粢􅀕飯上同􅒥􅒥縗經典通用齊上同諮諮謀姿姿態齍黍稷在器澬水名在邵陵又音茨具山在榮陽出山海經齎齎持也又子兮切蒫蒫薺實也􅨽雨聲上同飢飢餓也又姓左傳殷人七族有飢氏居夷切四机木名似榆又音几肌肌膚虮密虮蟲名鴟一名鳶也處脂切七上同鵄亦同胵膍胵鳥藏魚名怒也􆁍走皃絺細􅁑也丑飢切七辴􅀏皃又敕辰抽敏二切郗邑名又姓出髙平竹器脪􆄻脪牛馬子腸瓻酒器大者一石小者五斗古之借書盛酒瓶訵隂知也出字林郪縣名在梓州取私切又七西切九趑趑趐趨不進也􅀃文作連車也一曰郤車抵堂又士佳疾資二切趀􅀃文云倉卒也上同盗視上同亦此也此也蠀蝎化也茨茅茨又姓後漢有茨光亦漢複姓晉有茨芘仲疾資切十三薋蒺蔾詩作茨􅀃文又作薺薺上同又才禮切餈飯餅也上同垐以土増道䆅積禾螬又疾兮切瓷瓦器澬水名在常山郡又涔􅓵乆雨又音資補連車又七茨切又士佳切􅨽涔􅨽乆雨尼和也女夷切八柅木名又女履切怩忸怩心慙也蚭字林云北燕人謂蜒蚰爲䖡蚭也跜躨跜虯龍動皃見文選呢言不了呢喃也餌䝚獸名墀􅀃文云墀塗地也禮天子有赤墀漢典職曰以丹漆地故稱丹墀漢書曰王根作赤墀直尼切十五上同坻小渚俗從互餘同汦水名在常山陳餘死處也又旨夷切遲徐也乆也緩也亦姓晉湘東太守遲超又虜姓後魏書尉遲氏後改爲尉氏又音稺遟上同蚳蟻卯岻山名彽彽徊猶徘徊也阺字統云秦謂陵阪爲阺也荎爾雅云藲荎今之刺榆也菭水衣也又徒來切謘語諄謘也莉姓也出淮南貾貝之黄質有白􅀧者私不公也􅀃文曰禾也息夷切五鋖平木器也亦作鐁厶自營爲厶也􅀃文曰姦袤也􅺁􅀃文曰茅莠也㺨石似玉者尸主也陳也利也又姓秦有尸伎爲啇君師著書式之切四鳲鳲鳩鴶鵴今布榖也也常傾葉向日不令照其根渠追切八鄈鄈丘地在陳留又在河東漢􅀕后土處楑柊楑魚名􅭛悚也又祇癸切􅢦䑏􅢦醜也䳫䳫鳩鳥蟲名追逐也隨也陟隹切三䨨雷也出韓詩娺疾也􅀛􅀃􅁐曰靈􅀛五色似玉似金背隂向陽上髙象天下平法地易号爲􅀛大戴禮曰田蟲三百六十四神􅀛爲之長居追切六龜上同古文䟸曲脛螝爾雅云􅁞蛹騩馬淺黒色蕤葳蕤草木華皃又蕤賔五月律儒佳切七甤􅀃文曰草木實甤甤也緌緌纓擩染也又而樹切桵白桵木也䅑禾四把也又息遺切捼摧也又奴禾切俗作挼衰微也所追切三榱屋􅀃文曰秦名爲屋椽周謂之榱齊魯謂之桷病也􅀃文減也一曰耗也惟謀也思也以追切十二旌也維豈也隅也持也繫也􅀃文曰車蓋維也遺失也亡也贈也加也又姓急就章有遺餘又以醉切濰水在琅邪壝埒也壇也又以癸切目病蓶菜名似韮而黄䜅就也又士佳切琟石似玉也唯獨也又以癸切􅖆􅖆神蛇一首兩身六足四翼見則其國大旱湯時見於陽山出山海經㶟水名在鴈門力追切十三纍纍索也亦作縲又姓晉七輿大夫纍虎虆蔓草欙山行乗欙亦作樏求子牛㟪又力罪切㠥上同祖黄帝妃亦作嫘瓃玉器視皃鸓飛生鳥也又力水切儽嬾懈皃亦作傫又力罪切纝網絡論語注云黒索也亦作縲綏安也􅀃文曰車中靶也又州名春秋時爲白翟所居秦并天下爲上郡後魏廢郡置州取綏德縣以爲名息遺切十二雖語助也本蟲名似蜥蜴而有文荾胡荾香菜博物志曰張騫西域得胡荾石虎鄴中記曰石勒改胡荾爲香荾荽上同䒘亦同葰亦同􅀃文曰薑屬可以香口浽浽溦小雨奞􅀃文曰鳥張毛羽自奮奞也又戍閏切夂行遟皃又楚危切水名在梁郡又許葵切濉上同䅑禾四把長沙云又儒佳切逵隱也爾雅曰九達謂之逵渠追切十九夔夔龍亦州名春秋時魚國漢爲魚復縣梁隋皆爲巴東郡唐初改爲信州又改爲夔州取夔國名之又獸名似牛一足無角其音如雷皮可以冒鼔俗俗馗􅀃文曰九達道也與逵同又鍾馗俗以辟惡戣兵器㦸屬鍨上同騤強也盛也又馬行皃犪犪牛出岷山􅁏重數千斤出山海經躨躨跜見文選􅢦䑏􅢦醜皃艽埤蒼云逺荒又音求䟸左脛曲也左右視也顧皃頯小頭使也􅁋視又丘韋切􅶐持也頄面顴也又音求眉􅀃文作睂目上毛也武悲切二十睂見上注嵋山形湄釋名曰湄眉也臨水如眉也爾雅曰水草交爲湄上同鶥鳥名爾雅曰鶬麋鴰今呼鶬鴰字林作鶥楣戸楣釋名云楣近前各兩若面之有眉瑂石似玉也矀伺視覹上同䉠竹名又音微黴黴黧垢腐皃又莫背切麋鹿屬冬至解其角又姓蜀將東海麋竺也蘪蘪蕪香草即江籬也郿縣名在􅄮州㵟爾雅曰谷者㵟郭璞云通於谷也薇爾雅曰薇垂水謂生於水邊􅭷金飾馬耳又武卑切葿䒲葿草攗水芰名也悲痛也府眉切一錐􅀃文銳也職追切八隹􅀃文曰鳥之短尾者緫名􅬨鹿一歳騅馬蒼白雜毛又姓左傳晉七輿大夫騅也㮅木名似桂䶆䑕名萑萑蓷茺蔚又名益母鵻鳥名誰何也視佳切三䜅就也又以佳切脽􅀃文也亦汾脽巨靈所坐也帷說文曰在旁曰帷釋名曰帷圍也以自障圍也有悲切一邳下邳縣名在泗州又姓風俗通云奚仲爲夏車正自薛封邳其後爲氏後漢有信都邳彤符悲切六鉟刃戈又音丕䲹鶚也岯山再成也魾大鱯也又音丕䫠􅀃文云短須髮皃又音丕丕大也亦姓左傳晉大夫丕鄭敷悲切十二㔻上同伾有力秠黒黍一稃二米又匹凡切䪹大面駓桃花馬色怌怌怌恐也䫠短須髪皃豾狸子髬髬髵猛獸奮鬣皃魾大鱯鉟刃戈倠仳倠醜面許維切六婎上同睢睢盱視皃眭眭盱健皃姿上同鎚金鎚又權也文字音義云從垂亦通直追切五椎椎鈍不曲橈亦棒椎也又椎髻槌上同又直畏切桘俗顀項顀推排也义佳切又湯回切二蓷萑蓷又湯回切胝皮厚也俗作丁尼切四疷上同秪榖始熟也氐氐池縣名又音低紕繒欲壊也匹夷切六㩺二同謬也悂上同惡性也嶉髙皃醉綏切二檇以木有所擣又地名左傳越敗吴於檇李又音醉巋小山而衆丘追切又丘誄切二蘬蘢古大者曰蘬狋犬怒皃牛肌切又巨圎切一咦􅀏皃喜夷切五忾廣雅云喜皃䐅臋之别名呻吟聲屎上同七之適也往也間也亦姓出姓苑上而切四臸到也又如一也芝芝草論衡曰芝生於土土氣和故芝草生古瑞命記曰王者慈仁則芝草生也㞢􅂐文象芝草形􅃖從此也飴􅄳也與之切二十七籕文䬮古文怡和也恱也又姓周書怡峯傳云本姓黙台避難改焉弓名出韻略媐􅀃文云恱樂也异已也又音異㼢㽃㼢甎也􅂳欿水斗鏔㦸無刃也圯土橋名在泗州貽貺也遺也巸長也美也廣􅒳也洍水名詩云江有洍又音似毛詩作汜􅒳􅀃文曰顄也籀文頥頥養也􅀃文亦上同詒贈言㺿玉名沶水名宧室東北隅􅏬豕息肉今謂之豬􅏬䱌鯸䱌魚也姬王妻别名本又音基台我也又姓出姓苑又音胎眙盱眙縣在楚州瓵爾雅云甌瓿也時辰也廣雅曰時伺也又善也中也是也又姓良吏傳有時苗何氏姓苑云今鉅鹿人市之切七峕古文塒穿垣棲雞鼭䑕名榯樹木立也蒔蒔蘿子又音示鰣魚名似魴肥美江東四月有之疑不定也恐也惑也嫌也語其切三嶷九嶷山名亦作疑又魚力切觺觺觺獸角皃又魚力切思思念也息兹切又息吏切十五恖上同司主也亦姓左傳鄭有司臣又漢複姓八氏司馬氏本自重􅀺程伯休甫之後出河内丗本士丏弟佗爲晉司功囚官爲氏及司徒司㓂司空並以官爲氏漢有朝議郎司國吉諫議大夫司鴻儀左傳宋大夫司城子罕其後氏焉罳罘罳屏也崔豹古今注云罘罳復思也謂臣來朝君行至内屏外復思惟故曰罘罳也伺伺候又息吏切絲􅀃文云􅁞所吐也又一􅁞爲忽十忽爲絲淮南子曰􅁞餌絲則商􅃶紹緦緦麻􅓁竹名有毒傷人即死禗不安欲去覗覻也㺇辯獄相察姦視蕬菟蕬草名案爾雅云女蘿菟絲字不从卄偲論語曰朋友切切偲偲楒相楒木輺楚持切又側持切義見下文二颸風也其辭也亦姓陽阿侯其石是也又漢複姓六氏左傳邾庶其之後以庶其爲氏丗本楚大夫渉其帑漢清河都尉祝其承先王僧孺百家譜蘭陵蕭休緒娶髙密侍其義叔女何氏姓苑有行其氏令其氏渠之切又音基三十期期信也㑹也限也要也又姓風俗通有期思國又漢複姓二氏後漢梁鴻改姓運期氏古仙人有安期生賈執英賢傳云今琅邪人旗旌旗釋名曰熊虎爲旗將軍所建象其猛如虎與衆期之於下也戰國䇿曰建七星之旗天子之位也又姓齊卿子旗之後漢有九江太守旗光綦履飾又蒼白色巾也詩曰縞衣綦巾又姓何氏姓苑云義興人綨上同俗萁豆萁上同蜝蟛蜝似蟹而小晉蔡謨食之殆死也琪玉也麒麒麟騏騏􅂹淇水名出沮洳之山􅀃文曰淇水出河内共北山東入河䳢鳥名錤鎡錤鋤別名也藄紫藄似蕨菜棊博物志曰舜造圍棊丹朱善之櫀上同碁亦同􅋒弁飾璂上同鯕編魚蘄州名漢蘄春縣也晉孝武鄭后諱春改爲蘄陽周平淮南改爲州因蘄水以爲名又姓也祺祥也吉也禥籀文踑踑馴跡也艃舟名䑴上同舉也䶞齧也詩􅀃文曰志也詩序云發言爲詩釋名曰詩之也志之所之也書之切六邿地名齝􅀃文曰吐而噍也又敕􅁵切呞並上同䀢䀢的也見聲􅀋而語助􅀃文曰􅀋毛也如之切二十一栭木名似栗而小一曰梁上柱也􆁼木耳别名地名又險也陾上同又音仍陑上同髵須也髬髵也峏山名喪車輀上同􅳺煑熟胹並上同籀文洏漣洏涕流皃鮞魚子耏獸多毛亦作髵又姓左傳宋有耏班咡吻又音餌丸之熟也又音丸誀誘也又音餌鴯莊子云鳥莫智於鷾鴯鷾鴯􅀇鳥也欺詐也去其切十一娸姓一曰醜也䫥大頭䫏方相􅀃文曰醜也今逐疫有䫏頭上同魌亦同僛醉舞皃􅠿鵂鶹鳥亦作䳢廣雅云多䶞齧也抾把也又丘之切姬周姓也居之切十二朞周年又復時也稘上同基經也業也址也始也設也箕箕帚也丗本曰箕帚少康作也又姓左傳晉有大夫箕鄭萁菜似蕨又音期䇫可以取蟣也諅謀也􅀃文忌也本渠記切其不其邑名在琅邪又人名漢有酈食其錤鎡錤大鉏居語助見禮諆謀也􅀃文欺也本去其切詞請也􅀃也吿也􅀃文曰意内而言外也似兹切七祠􅀕名柌鎌柄辭辭訟􅀃文曰辭􅀃也辤上同􅀃文曰不受也受辛宜辤之辝籕文補也釐理也一曰福也里之切二十貍野猫狸俗氂十毫嫠無夫剺剥也梩從士轝出六韜又都皆切犛犛牛又音茅字􅀃云微畫也倈倈來見楚詞艃艃􅂳名毛起也又音來孷孷孳雙生子也愁憂之皃髬髪起㾖病也又音里筣竹名斄􅀃文曰強曲毛也可以著起衣古文􆇂引也葘􅀃文曰不耕田也爾雅曰田一歳曰葘側持切又音栽十五甾上同又􅀃文曰東楚名缶曰甾􅫱亦同湽水名亦州名春秋時屬齊漢爲濟南郡宋又帝改清河郡隋置湽州因水以名焉古通用葘手足生皮堅也茬茬丘名案漢書地理志泰山郡有茬縣顔師古又士疑切亦姓輺輺軿車鍿鍿銖鶅東方雉也緇黒色繒也䊷上同􅯦木立死鯔魚名䎩耕也䣎郷名僖樂也又姓姓苑云彭城人許其切十五歖卒喜煕和也廣也長也嬉美也一曰游也禧福也吉也媐善也恱也譆痛聲􅫕坼也瞦目睛㶼火盛熹盛也􅀶也熱也熾也或作熺嘻噫嘻歎也􅧏喜􅀏娭婦人賤稱出蒼頡篇誒􅀃文云可惡之詞也醫醫療也亦官名漢太常屬官有太醫令續漢書曰秩六百石有藥丞主藥方􅀃文曰巫彭初作醫於其切五毉上同譩忿也㿄羸也又乙賣切噫恨聲癡不慧也丑之切四齝牛吐食而復嚼也笞捶擊痴痴㾻不達之皃治水名出東萊亦理也直之切三持執持莉姓也姓苑云淮南人蚩蟲名亦輕侮字從出赤之切七嗤􅀏也俗又作􅸅妛輕侮媸媸妍羽盛告也又乃經切目汁凝慈愛也亦州名春秋時晉之屈邑夷吾所居西魏改爲汾州開皇初爲耿州武德改爲慈州因慈氏縣名之疾之切五礠礠石可引針也鶿鸕鶿鳥亦作鷀不􅆑生口吐其鶵又子之切濨澗水名也兹􅀛兹國名􅀛音丘兹此也又姓左傳魯大夫兹無還子之切十四孳孳息嵫崦嵫山名日所入處孜處也力篤愛也滋水名出髙麗山又旨也蒔也多也藩也液也嗞嗞嗟憂聲也染黒鎡鎡錤孖􅀟生子也鼒小鼎鰦魚名仔克也鶿鸕鶿鳥稵禾生皃茬􅀃文曰草皃濟北有茬平縣俗作茌士之切一漦涎洙也又順流也俟甾切一抾挹也丘之切一䀵眴也式其切一八微妙也細也小也􅀃文曰􅀮行也無非切八􅀃文曰妙也㵟浽㵟小雨薇菜也䉠竹名又武悲切䥩埤蒼云懸物鉤癓三蒼云足上瘡矀伺視又武悲切揮揮霍亦奮也灑也振也動也許歸切十三煇光也輝上同暉亦同又曰色徽美也又三糾繩也翬飛皃又雉五色備也褘后􅀕服也鰴魚有力也楎橛也在牆曰楎又犂頭也幑幡也瀈竭也㫎動旗􅏈山􅏈獸名似犬見人則􅀏行疾如風又胡昆切幃香囊也一􅀃單帳也雨非切又許歸切十五韋柔皮也又姓出自顓頊大彭之後夏封於豕韋苗裔以國爲氏因家彭城至楚太􅀓韋孟遷于魯孟􅀇孫賢爲漢丞相始遷京兆之杜陵也闈宫中門也圍守也圜也遶也䙟重衣束也違背也湋水名囗文字音義云回也象圍市之形也鍏方言云宋魏呼臿也潿水不流濁皃婔江婔神女裏也衺也戾霏雪皃芳非切九䬠上同妃嘉偶曰妃􅀃文匹也又音配菲芳菲又芳尾切䩁細毛婓婓婓往來皃一曰醜騑騑騑馬行皃裶衣長皃大目又方巾切猆姓左傳晉有豹甫微切十二飛飛翔亦漢複姓史記有飛廉氏古通用蜚扉戸扉緋絳色獸如牛白首一目非不是也責也違也亦姓風俗通有非子伯益之後馡香也􅭡魚名騛騛兎馬而免走騑驂旁馬也又音菲誹誹謗又方未切餥糇也又方尾切肥肥腯􅀃文曰多肉也亦姓左傳有肥義符非切十一腓腳腨腸也䈈竹名淝水名在廬江本作肥風病也痱上同蜰蟲名即負盤蟲􅖦蠧􅖦鳥名如梟人面一足冬見夏蟄著其毛令人不畏雷出山海經蟦蠐螬賁姓也出姓苑又布昆彼羲符文三切裴即裴縣名案漢書地理志在魏郡應劭音非本又音陪威威儀又姓風俗通云齊威王之後於非切八葳葳蕤隇隇陳險也㟪㟪􅓓也又於􅀑烏罪二切蝛蛜蝛蟲也一名􅡂蝜鰄魚名媁美也楲決塘木也又楲窬褻器也祈求也報也告也渠希切十九頎長皃旂爾雅曰有鈴曰旂釋名曰交龍曰旂旂􅀝也畫作兩龍相依􅀝也通以赤爲之無文彩諸侯所䢖也􅷛􅀑俗畿王畿㙨上同﨑曲岸碕上同圻亦上同又書傳爲京圻字又魚斤切刏以血塗門又居依古對二切􅠟危也􅀃文曰訖事之樂也又公哀切頰肉俟虜複姓北齊有特進方俟普万音墨幾近也又居依居豈二切蚚蟲也爾雅云強蚚玂大生一子蟣爾雅云蛭蟣又居豈切岓山傍石也齒也機㑹也萬機也􅀃文云主發謂之機書曰若虞機張傳云機弩牙也居依切十六譏諫也誹也譴也問也蘄縣名在徐州亦草名又音其芹嘰口醜􅀃文云小食也菹草磯大石激水鞿繫馬饑榖不熟禨祥也幾庻幾又祈蟣二音䟇走也鐖鉤逆鋩淮南子曰無鐖之鉤不可以得魚僟精也明堂月令曰歳將僟終璣珠不圎也刏斷切也刺也刲傷也􅤀血􅀕希止也望也散也施也爾雅罕也又姓三輔決録有希海字子江香衣切十二晞日氣乾也莃莬葵鵗北方雉睎視也盻也望也稀稀踈豨豬也又虚豈切從刀衣蓋裁衣之初楚居切二呵叱人也書丗本曰沮誦蒼頡作書釋名曰書庻也紀庶物也亦言著也著之簡紙求不滅也傷魚切七鵨鳥似鳧也瑹美玉名案禮記注云笏也本亦作荼舒緩也遟也伸也徐也敘也亦州名春秋時晥國晉於晥縣置懷寧縣武德改爲舒州亦姓何氏姓苑云廬江人􅫟魚薺紓緩也舒地名在廬江居當也處也安也九魚切十四􅩇􅩇儲据手病詩云予手拮据毛萇曰拮据撠挶也裾衣裾琚玉名䝻貯也鶋鶢鶋海鳥車車輅又昌遮切蜛蜛蠩崌崌崍山也椐木名涺水名苴草也腒鳥腊又音渠渠溝渠也亦州名宋置宕渠郡周仍爲郡武德初改置州亦有宕渠山又姓左傳衞有渠孔御戎強魚切二十六車輞履飾璩玉也磲硨磲美石次玉蕖芙蕖籧籧篨􅞠牛筐淭淭挐方言云把宋魏之間謂之淭挐醵合錢飲酒又巨略切腒鳥腊􅼵􅖥鳥螶􅀃文云螶也一曰蜉蝣朝生暮死者爾雅作渠略蟝上同䝣䝣獀獸名食猛獸出山海經豦獸名􅀃文曰􅃲相丮不解也从豕虍豕虍之􅃲不相捨司馬相如􅀃豦封豕之屬一曰虎兩足舉又音據蘧蘧麥又姓鐻鐻耳之傑璖耳環聚名㯫㯫枯藩籬名䟊小走皃􅛧􅛧菜似蘇又音巨䆽穴􅀋繫懅怯也又音遽余我也又姓風俗通云秦由余之後何氏姓苑云今新安人以諸切三十蜍蜘蛛又常魚切藇芞藇香草㶛水名餘殘也賸也皆也饒也又姓晉有餘頠又漢複姓三氏晉卿韓宣子之後有名餘子者奔於齊號韓餘氏又􅀓餘氏本自􅀓􅀃􅀃旣爲相其後有留於􅀓巖者因號傅餘氏秦亂自清河入吴漢興還本郡餘不還者曰􅀓氏今吴郡有之風俗通云呉公子夫概奔楚其子在國以夫餘爲氏今百濟王夫餘氏也輿車輿又多也又權輿始也續漢書輿服志曰上古聖人觀轉蓬始以爲輪輪行不可載因物生智後爲之與又姓周大夫伯輿之後旟周禮曰鳥隼曰旟州里所䢖也爾雅曰錯革鳥曰旟郭璞云此謂合剥鳥皮毛置之竿頭鵌鳥名與䑕同穴又大都切璵魯之寶玉艅艅艎吴王􅂳名畬田三歳也上同水名歟􅀃文云安气也又語未之辭亦作與與上同本又餘佇切譽稱也又音預嬩女字舁對舉擧上同妤婕妤婦人官也亦作倢伃伃上同㦛恭敬􅪲􅀃文云似鹿而大又弋庶切予我也又餘佇切㺞獸名馬行皃安行皃狳獸名山海經云餘我之山有獸如兔鳥喙鴟目蛇尾遇人則眠名曰犰狳見則有螽蝗爲害也鸒爾雅云鸒斯雅烏又羊庶切雓爾雅曰雞大者蜀蜀子雓胥相也􅀃文曰蟹醢也又姓晉有大夫胥童何氏姓苑云琅邪人也俗作相居切又息吕切十一䱬魚名䈝竹名稰落也楈木名藇姓出纂文本又音序諝有才智稱又息吕切㥠上同湑露皃又息吕切蝑蜙蝑蟲揟取水其也疽癰疽也七余切十六岨石上戴土砠上同䢸郷名在鄠縣又子余切趄趑趄苴履中藉又子魚切沮止也非也又水名在房陵所謂沮漳亦云漆沮旣從並在此地又子魚側魚疾與子預四切狙猿也又七預切䏣蟲在肉中蛆俗雎雎鳩鳥蒩苞蒩又則吾切􅥻􅀃文云水出北地直路西東入洛伹拙人坥螾􅂣又七預切此也鉏誅也又田器釋名曰鉏助也去穢助苗也􅀃文曰立薅斫也又姓左傳有鉏麑土魚切六鋤上同耡周禮曰以興耡利氓又音助豠豕屬上同鳥白鷺也爾雅作春鉏攄舒也丑居切四㯉惡木筡竹篾名也摴摴蒲戲又姓史記秦相摴里疾䟽通也除也分也逺也䆫也又姓漢有太子太􅀓東海䟽廣或作䟽俗作踈所􅉁切又所助切十一梳梳櫛􅀃文曰理髪也綀綀􅁑􅂼菜􅂼踈稀踈繼釃下酒上同通也㽰青䟽疋足也古爲雅字虚空虚也亦姓出何氏姓苑杇居切又音祛六驉駏驉畜似騾也歔歔欷噓吹噓魖魖耗􅀑又夔魖罔象木石之怪也上同出字書徐緩也􅀃文安行也亦州名古之彭國禹爲徐州秦屬泗水郡漢爲郡復置徐州又姓自顓頊之後春秋時徐偃王行仁義爲楚文王所滅其後氏焉出東海髙平東莞珠邪濮陽六望似魚切四䣄地名又音徒䍱野羊俆􅀃文緩也於居也代也語辭也又商於地名亦姓今淮南有之央居切又音烏五扵俗箊竹名淤淤泥又依倨切唹􅀏皃豬爾雅曰豕子豬陟魚切六䐗上同猪俗瀦水所停也櫫掲櫫有所表識藸藸蒘草又音除臚皮臚腹前曰臚又鴻臚寺漢書曰典客秦官武帝更名大鴻臚韋昭曰鴻大也臚陳序也欲以禮大陳序賔客也力居切十七閭侶也居也又閭閻周禮曰五家爲比使之相保五比爲閭使之相受也又姓出衛國頓丘二望又漢複姓四氏凡閭氏出自晉唐叔賈執英賢傳云今東莞有之林閭氏出自嬴姓文字志云後漢有蜀郡林閭翁孺􅀶學善書藝文志云占有將閭子名菟好學著書晉有寧州刺史樂安辟閭彬䰕毛也􅀃文鬛也廬􅀉也舍也周禮曰凡國十里有廬廬有飲食亦州名春秋時舒地秦爲合肥縣梁以爲合州隋爲廬州又山名廬山記云周威王時有匡俗廬君故山取其號蘆漏蘆草又音盧櫚栟櫚木名有葉無枝博雅曰栟櫚椶也驢畜也藘蕠藘草䕡菴䕡草爈火燒山界􅦎浘􅦎海水􅂥處案莊子作尾閭㠠玉篇云山名櫖諸櫖山櫐爾雅作慮璷字林云玉名傳馬名􅰣􅰣䈝竹名憂也諸之也旃也辯也非一也又姓漢有洛陽令諸於岀風俗通又漢複姓有諸􅁑氏吴書曰其先􅁑氏本琅邪諸縣人徙陽都先姓􅁑時人謂徙居者爲諸􅁑氏因爲氏焉風俗通云􅁑嬰爲陳渉將有功而誅孝文追録封諸縣侯因并氏焉章魚切七櫧木名㶆水名在北嶽藷藷蔗甘蔗􅘂薯蕷别名䃴礛䃴青礪也蠩蜛蠩一頭數尾長二三尺左右有腳狀如􅁞可食也除階也又去也直魚切十三躇躊躇儲儲副又姓後漢有儲太伯涂水名在堂邑又直胡切篨籧篨蘆䕠也薵葱名宁門屏間又音佇㾻瘢也著爾雅云太歳在戊曰著雍又直略陟慮陟略三切滁水名出簸箕山入海亦州春秋時楚地梁爲南譙州齊改爲臨滁郡開皇改爲滁州蒢草名可染又蕖蒢口柔也屠匈奴傳有休屠王又音徒藸爾雅曰菋荎藸郭璞云五味也蔓生子叢在莖頭如而也均也似也謀也往也若也又姓晉中經部魏有陳郡丞馮翊如淳注漢書又虜姓後魏書如羅氏後改爲如氏人諸切八蕠蕠藘草也亦作茹地名洳水名在南郡又人慮切鴽鴿也上同假寐也又如與切茹恣也相牽引皃也易曰抜茅連茹又虜複姓後魏書普陋茹氏後改爲茹氏又如慮切又而與切且語辭也􅀃文薦也子魚切又七也切四蛆蝍蛆食蛇蟲蜈蚣是也爾雅曰蒺藜蝍蛆郭璞云似蝗大腹長角能食蛇腦苴苞苴亦姓漢書貨殖傳有平陵苴氏又音疽沮虜複姓有沮渠氏其先丗爲匈奴左沮渠遂以官爲氏沮渠蒙遜以後魏天興四年僭號於張掖稱北涼虚􅀃文曰大丘也去魚切又許魚切十二墟上同􅠚飯器袪袖也舉也阹依山谷爲牛馬之圈椐木名又音居胠腋下又胠篋莊子篇名魼比目魚又他合切㠊㠊崎山路擊也㭕板置驢上負物䒧草器菹􅀃文曰酢菜也亦作􅉁側魚切四上同䶥齒不齊皃沮人姓丗本云沮誦蒼頡作書並黄帝時史官蜍蟾蜍也署魚切又音余二􅘂似薯蕷而大或作稌袽易曰繻有衣袽女余切又音如六帤幡巾犬多毛也蒘藸蒘草名􅹭淭􅹭杷名挐牽引十虞度也􅀃文曰騶虞仁獸白虎黒文尾長於身不食生物俗作􆄃又周禮有山虞澤虞掌山澤之官也亦姓出㑹稽濟陽二望風俗通云凡氏之興九事一氏於號唐虞夏殷是也遇俱切二十􆄃俗見上注愚愚憃􅀃文曰戇也从心禺禺母猴屬獸之愚者娯娯樂湡齊藪名亦作隅爾雅曰齊有海湡又水名在襄國堣堣夷日所出處書亦作嵎􅯝鳥名狀如梟人面四目而有耳見則天下大旱出山海經嵎山名在呉髃骨名在膊前又五苟切禺番禺縣在南海亦姓出姓苑本又音遇母猴屬也隅角也陬也䴁鳥似秃􅒗鰅魚名有文出樂浪鍝鋸也澞爾雅曰山夾水㵎陵夾水澞􅘿搜神記曰􅝒􅘿似蟬而長味辛美可食一名靑蚨異物志云􅝒􅘿子如􅁞子著草葉得其子母自飛來就之㷒拔器煑食齵齵齒重生鸆鸅鸆一名婟澤地名芻芻豢􅀃文云刈草也俗作蒭亦姓出何氏姓苑測隅切二犓養牛曰犓無有無也亦漢複姓二氏楚熊渠之後號無庸其後爲氏又有無鉤氏出自楚姓武夫切二十一毋止之辝亦姓毋丘或爲毋氏又漢複姓人氏漢書貨殖傳有毋鹽氏巨富齊毋鹽邑大夫之後漢有執金吾東海母將隆將作大匠母丘興風俗通有樂安母車伯奇爲下邳相有主簿步邵南時人稱母車府君歩主簿何氏姓苑有母終氏左傳魯大夫兹母還晉大夫綦母張漢書有巨母霸王莽改爲巨母氏瞴瞴瞜又亡撫切膴無骨腊又荒烏亡甫二切蕪荒蕪誣誣枉巫巫覡周禮春官曰司巫掌羣巫之政令若國大旱則帥巫而舞雩亦山名又姓風俗通云氏於事巫卜陶匠是也漢有冀州刺史巫捷莁莁荑璑三采玉地名在􅀪農䉑黒皮竹也鷡鷡鴽鳥名罟屬又音武蝥爾雅云䵹鼄鼄蝥又音牟􅤷爾雅云愛也又音武无虚无之道又漢複姓左傳莒有大夫无婁修胡􅰸欲空之皃譕譕誘詞也墲冢也鵐鳥名雀屬憮空也又音武䍢雉網也于曰也於也􅀃文本作亐凡從于者作亐同又姓周武王子邘叔子孫以國爲氏其後去邑單爲于漢有丞相東海于定國又望出河南者即後魏書万忸于氏後改爲于氏凡諸姓望在後而稱河南者皆虜姓後魏孝文詔南遷者死不得還北即葬洛陽故虜姓皆稱河南焉又漢複姓五氏後漢特進漁陽鮮于輔􅀽紹大將軍淳于瓊劉元海太史令宣于修之何氏姓苑有多于氏􅃲于氏羽俱切二十迂逺也曲也又憂俱切盂盤盂􅀃文曰飯器也又姓左傳晉有盂丙邘地名在河内又姓漢有邘侯爲上谷太守雩請雨􅀕名又沉于切􅟔飛皃􅀃文曰雩羽舞也或以羽同上竽笙竽丗本曰隨作竽玗玉名芋草盛皃又王遇切汙水名又屋孤烏故二切䣿宴也杅因杅匈奴地名釪錞釪形如鐘以和鼔袌衣骬􅐳骬缺盆骨也􅒧􅀃文云草木華也本音吁謣妄言䩒車環靻也䢓䆫䢓牀也葅似韭訏大也況于切二十吁歎也雩雩婁古縣名在廬江欨吹欨一曰􅀏意又况宇切㽳病也盱舉目又盱眙縣在楚州大袑衣也瞜􅀏皃姁姁媮美態殷冠名又音詡扜􅀃文云指摩也文憶俱切􅒧草木華也上同又音敷􅸶憂也䣿宴也旴日始出皃䩒䩒靻㰭㰭樂虖虎吼又虎乎切臿屬又矩于衢街衢爾雅曰四達謂之衢其俱切三十六劬勞也軥車軛氍聲􅀋曰氍毹毛席也風俗通云織毛褥謂之氍毹亦作眗脯也一曰屈也亦山名在東海又姓出姓苑䧁地名在河東臞瘠也癯上同鴝鴝鵒亦作鸜周禮曰鸜鵒不踰濟鸜上同亦鸜鵲又漢複姓莊子有鸜鵲子灈水名在汝南躣行皃楚詞曰右蒼龍之躣躣忂上同馬左足白爾雅云馬後足皆白本作翑鼩鼱鼩小䑕蘧蘧麥又巨居切斪鉏屬句􅁈句縣名在曹州又九遇古侯二切蠷蠷螋蟲瞿鷹隼視也又姓王僧孺百家譜曰裴桃兒取蒼梧瞿寶女又有瞿曇氏西國姓又力遇切欋釋名曰齊魯間謂四齒把爲欋葋爾雅云葋艼熒翵鳥羽翑上同蚼蚼蚌蚍蜉屬􅀃文云頭有兩角出遼東亦作􅔢音奚趯走顧之皃䞤上同脯名絇履頭飾也上同聲􅀋云樹種也􅮍磫􅮍青礪戵㦸屬鑺上同姁姁然樂也又况羽切儒柔也人朱切十六獳朱獳獸名似狐而魚翼出則國有恐又女侯切濡水名出涿郡又霑濡襦􅀃文云短衣也俗作懦弱也又乃亂切嚅囁嚅多言鱬朱鱬魚名魚身人面􅣩鹿子又相俞切嬬妻名繻易曰繻有衣袽亦見周禮注又音須顬顳顬耳前動䞕火色臑嫰耎皃醹厚酒又音乳柔皮又而兖切䰰􅀑魅聲顬顬不止又乃侯切須意所欲也􅀃文曰面毛也俗作鬚又姓風俗通云太昊之後史記魏有須賈又漢複姓左傳遂人四族有須遂氏又虜複姓匈奴貴姓有湏十氏相俞切十四鬚俗嬃女字􅓄待也上同繻傳符帛􅔮頭􅔮􅣩鹿子也又音儒需卦名娶荀卿子曰􅕡娶之媒又七句切緰彩緰帛也蕦薞蕪别名鑐鎖中鑐也隃北陵名又式注式朱二切株木根也陟輸切十一誅責也釋名曰罪及餘曰誅如誅大樹枝葉盡落邾國名鼄鼅鼄網蟲亦作蜘蛛蛛上同跦行皃袾字統云朱衣曰袾又昌朱切列列殺字從歹歹五割切㦵上同鴸鳥名似鴟人首黏皃貙獸名似貍敕俱切二􅓔俗殊異也死也市朱切十二銖錙銖八銖爲錙二十四銖爲兩洙水名在魯茱茱茰㼡小甖殳兵器釋名曰殳殊也長一丈二尺無刃有所撞挃於車上使殊離也詩云伯也執殳又姓舜典有殳斨上同出道書㸡㸡所以遏水八􅀲杖也陎陎􅖮縣名几􅀃文云鳥之短羽飛几几也象形杸􅀃文曰軍中士所持殳也司馬法曰執羽從杸逾越也羊朱切四十五踰上同窬門邊小竇又穿窬也􅁷善也亦須􅁷又姓左傳晉大夫􅁷駢楰木名又音瘐􅃾肥􅃾䛕謟䛕隃隃麋古縣在扶風鄃地名在涿郡又音輸覦覬覦欲得􅎿窺也俞然也荅也􅀃文作俞空中木爲舟也又姓又恥呪切歈巴歈歌也愉恱也和也樂也􅟧邪􅟧舉手相弄或作歋歈揄揄􅀭詭言也又侏侏儒短人絑繒純赤色秼詛也又音注咮讋咮多言皃鴸鳥名似鴟人首鮢似蝦無足獳硃硃研朱砂趨走也七逾切三趍俗本音池鯫淺鯫小人不耐事皃又土后切慺恱也力朱切又落侯切十六蔞蔞蒿又虜姓官氏志云一郍蔞氏後改爲蔞氏氀毛布瞜瞴瞜又落侯切䱾魚名㟺山頂䝏求子豬也又落侯切㺏上同摟曳也鷜鵱鷜野鵝又落侯切鏤屬鏤劒名又盧豆切䣚郷名又落侯切婁詩曰弗曵弗婁傳曰婁亦曵也又落侯切瘻瘻痀曲瘠㸡所以遏水膢飲食􅀕也冀州八月楚俗二月扶扶持也佐也漢三輔有扶風郡扶助也風化也魏爲􅄮州又扶州在隴右元魏置管同昌怡夷二縣又姓漢有廷尉扶嘉防無切二十六古文芙芙蓉符符契河圖曰􅀇女出兵符與黄帝戰􅃖尤􅀃文曰符信也漢制以竹長六寸分而相合又姓魯頃公之孫雅仕秦爲符璽令因而氏焉琅邪人也颫颫風大風鳧野鴨榑榑桑海外大桑日所出也苻苻􅀑目草又姓晉有苻洪武都互人本姓蒲氏因其孫堅背文有草付之祥改姓苻氏洪子健以晉穆帝永和七年僭号於長安稱秦蚨青蚨蟲子母不相離夫語助又府符切􅝀􅝀茈草也案爾雅曰芍鳧茈不從甘􅻴水名抱抱罕縣名在河州罕音漢瓿甌瓿瓶也詞枎枎䟽盛也坿白石英也泭水上泭漚􅀃文曰編木以渡也本音孚或作􅕵􅕵見上注小畚器也草木子房水名其中有神古人心明飛皃望也玸玉文䅳稷穰仕子切四雛鵷鶵爾雅曰生噣雛謂鳥子能自食俗作噣音卓鶵籀又媰崔子玉清河王誄云惠於媰孀􅀃文曰婦人姙娠也本側鳩切􅰊纂文云偛􅰊小人皃莊俱切偛側治切二搊解也敷散也􅀃文从􅌹施也芳無切三十六麩麥皮也麱上同孚信也木名郛郛郭鄜鄜州漢鄜縣今鄜城是隋改作鄜州鋪又普胡切筟織緯者俘囚也痡病也殍餓死怤思也恱也翮下羽也􅞉花葉布也孵卯化豧豕息尃布也䱐魚名罦車上網以捕鳥稃榖皮上同莩漢書云非有葭莩之親張晏云莩者葭中白皮泭小木栰也􅀃文云編木以渡也郙郷名又云亭名在汝南又方矩切㕊石間見也桴屋棟又音浮䒀䒀艇舩也㩤張也姇姇恱榮之皃又音吁紨布也又細紬也䓵䓵萮花皃㲗毛解䓏花盛秿禾也又扶甫切諏謀也子于切又子侯切七㖩􅳅㖩不廉嵎娵娵觜星名陬陬隅又子侯切嗺髙皃掫擊也又子侯切跗足止也甫無切二十一趺上同又跏趺大坐膚皮膚又美也􅀓也肤上同邞古縣名在琅邪鈇鈇􅃏衭衣前襟㠸上同玞珷玞美石次玉􅝐䳤􅝐鳥名三首六足六目三翼地藥名簠簠簋􅀕器又方羽切夫丈夫又羌複姓後秦䢖威將軍夫蒙大羌鳺䳕鳩鳥柎欄足扶公羊傳云扶寸而合注云側手曰扶案指曰寸髻本也􅱈􅱈鯕魚名䄮里䄮玉篇云再生稻也䃿􅀕名妋玉篇云貪皃紆縈也曲也詘也勞也又姓後秦有肥郷侯始平紆邈憶俱切十二䩒鞶革又音于陓陽陓澤名扜􅀃文云指麾也䩽鞬也䙔編枲頭衣又烏侯切蓲草名又去鳩烏侯二切迂曲也又音于䣿能者飲不能者中也又音于㝼盤旋虶蚰蜒別名䨕䨕注雨皃輸盡也寫也墮也􅀃文曰委輸也式朱切又式注切三鄃縣名在貝州隃北陵名又相俞式注二切樞本也爾雅曰樞謂之椳郭璞云門戸扉樞也昌朱切五姝美好骨袾朱衣䇬䇬䇿廚􅀃文曰庖屋也俗作厨直誅切五蹰踟蹰行不進皃趎人名莊子有南榮趎帳也似􅌮形也出陸該字林裯禪衣也又直休切拘執也舉朱切十四駒馬駒䀠左右視也眗上同岣岣嶁衡山別名㪺挹也酌也上同捄盛土詩云捄之陾陾跔手足寒也鮈􅾾鮈魚名俱皆也具也又姓南涼録有將軍俱延痀曲脊􅀃文目邪也􅮍磫􅮍礪石毹氍毹也山芻切四㡏裂繒橾􅀃文曰車轂中空也螋蠷螋蟲又所留切十一模法也形也規也莫胡切十二橅上同出漢書摸以手摸也亦作摹又音莫嫫嫫母黄帝妻皃甚醜亦作􅙵㡔車衡上衣􅛙􅛙輸榆子醬也䤅大胡切謨謀也亦作謩古文墲規墓狐氏代爲卿大夫瓳㽃瓳博雅曰㼾甎也餬􅀉食又糜也使餬其口於四方是也或作瑚瑚璉湖江湖廣曰湖也鶘鵜鶘鳥名猢獑猢獸名似猨醐醍醐酥屬黏也䊀上同􅭢糊並俗弧弓乎乎極也辭也􅴺古文似猨身白􅆎手有長白毛善超坂絶巖也亦作瓠瓠􆇳瓢也又音護葫葫􅀲又草名㾰㾰物在喉中魱當魱魚名箶箶簏箭室又竹名䉉稜也被也出韻略䘸棗名也大而􅀃上者本作壷見爾雅虖歎也􅀌􅀌子又虜複姓有獨􅀌温􅀌歩鹿􅀌歩六􅀌乙速􅀌氏古胡切二十八􅋎􅀃文曰雕􅋎一名蔣也菰上同􅍺􅍺肫大腹大皃姑舅姑又父之姊妹也辜罪也􅈱啼聲􅂀水在鴈門酤酤酒又胡五昆互二切觚酒爵蛄螻蛄蟲箛竹名鴣鷓鴣鳥橭木名漢書越王巫祠在雲陽亦小兒病􅀑也沽水名在髙密柧棱柧􅣏字林曰􅣏魯矢左傳作僕姑䉉方也本亦作觚息禮記作姑盬陳楚人謂鹽池爲盬出方言又音古嫴􅀃文曰保任也罛魚罟軱大骨也出莊子又盤骨箍以篾束物出異字苑䐻䐻脯㼋􅀲也徒黨也又歩行也空也􅀠也同都切三十一􅞁上同屠殺也裂也刳也尸子曰屠者割肉知牛之長少史記樊噲少屠狗亦姓左傳晉有屠岸賈又音除瘏病也塗塗泥也路也亦姓風俗通云漢諌議大夫塗禪途道也酴酒名駼騊駼馬山海經曰北海有獸狀如馬名曰騊駼黄牛虎文鵌鳥名與䑕同穴涂水名在益州梌木名㭸上同荼苦菜圖爾雅曰謀也􅀃文曰畫計難也啚俗本音鄙廜㢝草菴通俗文曰屋平曰䣝郷名菟菟丘地名又音吐捈捈引䣄下邑地名䅷穗也嵞嵞山古國名禹所娶也􅀃文云㑹稽山也一曰九江當嵞也亦作峹又書塗作峹上同􅟒楸木别名鍍以金飾物又音度䤅􅛙䤅醬也虎杖䖘烏䖘楚謂虎也左傳作於菟鷵爾雅曰鶩鶶鷵郭璞云似烏倉白色筡爾雅曰簢筡中言其中空竹􅀋奴人之下也乃都切十㚢古文砮礪也駑体馬字林曰駘也帑􅀃文曰金幣所藏也又他朗切孥妻孥書傳云孥子也笯籠鳥呼喚也􅀃文曰外息也又姓列仙傳有仙人呼子先又虜複姓二氏前趙録例奴貴姓有呼延氏後漢書匈奴四姓有呼衍氏荒烏切又父故切十七嘑哮嘑周禮曰雞人掌大􅀕祀夜嘑旦以嘂百官虖姓也􅀃文曰哮虖也􅨜亦喚也歑温吹氣息也戲古文呼字謼大叫又火故切膴無骨腊又音無幠大也葫大蒜也張騫使大宛所得之食之損人目恗怯也軤姓也虍字林云虎文也苸草多雐鳥名䰧􅀑皃滹滹池水名周禮作虖也吾我也漢改中尉爲執金吾吾御也執金革以御非常亦姓漢有廣陵令吾扈文漢複姓五氏鄭公子有食采於徐吾之郷後以爲氏左傳有鍾吾子其後氏焉昆吾氏昆吾國之後由吾氏秦相由余之後古有肩吾子隱者五乎切二十一鼯似䑕一曰飛生亦作並上同吳吳越又姓本自太伯之後始封於吴因以命氏後季札避國子孫家于魯衞之間今望在濮陽浯水名草名似艾㹳猿屬㻍琨㻍美石珸上同蜈蜈蚣郚郷名在東莞齬齟齬又音語鯃魚名娪美女鋘云癰􅀋㭔黄枰木可染也䰕䰕鬣飯器􅀃又曰缻也上同罏籀文蠦蠦蜰一名蜚又名蠜㪭敃也㪆音邸㑹藥名蘇紫蘇草也蘇木也滿也俁也又姓出扶風武邑二望素姑切四穌息也舒恱也死而更生也㢝廜㢝草菴又廜㢝酒元日飲之可除温氣酥酥酪徂往也昨胡切四䢐上同殂死也古文烏安也語辭也􅀃文曰孝烏也小爾雅曰純黒而返哺者謂之烏小而不返哺者謂之鵶又姓左傳齊大夫烏枚嗚又虜姓周上開府烏丸泥又虜三字姓北齊有烏郍羅愛後魏書有烏石蘭氏烏落蘭氏哀都切二十一嗚嗚呼洿􅀃文曰濁水下流者汚上同又一故切杇泥鏝圬釫並上同鰞鰞鰂魚月令云九月有寒烏入水化爲烏鰂魚歍口相就也鎢鎢錥温器㢪滿挽弓有所向於古作於戲今作嗚呼瑦美石鄔縣名又音塢盓盤盓旋流也又憂切螐蚅螐蠋蟲也大如指白色惡安也扝引也蓲荻也㮧㮧椑青􅏄鴮鴮鸅鵜鶘別名俗謂之掬河也逋逋懸也博孤切十三餔􅀃文云申時食也又音歩籕文晡申時庯屋上平陠上同鵏鵏叔鳥名䞮伏地峬峬峭好形皃出字林誧諫也秿刈禾治秿鯆鯆䱐魚名亦作抪展舒也又布也枯枯朽也苦胡切十一刳剖破又判也屠也扝揚也郀地名軲車也又山名亦姓出字統㱠㱠瘁􅀃文枯也跍跍蹲皃挎空也坼也㢪又注乎切橭木四布也鮬婢妾魚名麤􅀃文云行超逺也又字統云警防也鹿之性相背而食慮人獸之害也故從三鹿倉胡切六麁踈也大也物不精也本亦作麤􅀃文云草履也米不精也觕公羊傳曰觕者曰侵精者曰伐皮皵惡也㻌美玉他胡切十二稌稻也又他古切悇廣雅云懷憂皃嶀山名㻯玉名山名庩庯庩屋不平也䞮䞮伏地梌銳也㻬㻬琈玉名捈臥引䩣􅫜䩣屧都都猶揔也尚書大傳十邑爲都帝王丗紀曰天子所宫曰都又姓有臨晉侯都稽何氏姓苑云今吴興人當􅀌切七竹名闍闉闍城上重門又市遮切􅞷􅞷􅍺大腹賭勝出新字林醏醴醏醬也䩲析皮具牛牽􅂳出通俗文􅿕豆也普胡切十二鋪鋪設也陳也布也又音孚鯆魚名又江豚別名天欲風則見鱄上同􅘠馬蹀跡也痡病也又音孚誧諫也又音普豧豕名陠衺也墲規墓地也䮒馬名屋壊十二齊整也中也莊也好也疾也等也亦州名春秋時齊國秦爲郡後魏置州因齊地以名之又姓風俗通氏姓篇序曰四氏於國齊魯宋衛是也徂奚切九臍膍臍􅀃文作􅴡齎麡麡狼似鹿而角向前入林則挂其角故常在淺草中逐入林則􅅮之出異物志又隮豺二首蠐蠐螬蟲等也懠詩云于之方懠懠怒也又音劑䶒好皃又子兮側皆二切癠病也又音劑利也又子兮切􅀺衆也又姓􅀺侯國之後郎奚切二十一犂墾田器亦耕也山海經曰后稷之孫叔均所作魏略曰皇甫隆爲燉煌太守教民作樓犂也上同莉芘莉織荆黧黒而黃也藜藜藿鯬鯬􅮗縴􅮗惡絮盠以瓢爲飲器也邌徐行皃􅧰亭名在上黨廲廲廔綺䆫蔾蔾蘆藥名筣竹名驪穆天子駿馬名盗驪緑耳又力知切瓈玻瓈寶玉􅱏􅱏視􅷪馬屬亦作㦒㦒扡欺慢之語出方言謧弄言又力支切黄鳥妻齊也七稽切又七計切十萋草盛皃淒雲皃又千弟切凄寒也悽悲也痛也鶈鳥名郪縣名在梓州緀緀斐文章相錯皃齌􅀃文云炊餔疾本子兮切又才細切霋􅀃文云霽謂之霋低低昂也俛也垂也都奚切俗作仾二十三氐氐羌􅀃文至也袛袛裯短衣磾漢有金日磾􅀃文云染繒黒石出琅邪山鞮革履腣腣胿胅腹胿音奚羝羝羊眡視也隄防也堤上同岻山谷䧑纂入云姓也奃大也趆趨也􅀃文云㝿不能行爲人所引曰鍉歃血器柢木根也又音帝䐎暦䐎強脂䚣獸角不正􅁓絲滓揥指也㓳剅㓳以刀解物䬫䬫餬嗁泣也􅀃文曰號也杜奚切六十啼㖒並上同蹏足也蹄上同竹名提提攜詆詞也又音底瑅玉名隄隄封漢書作提桋樹之長條題書題􅀃文頟媞美好皃爾雅云媞媞安也􅀃文又時􅈛切諦也一曰妍􅃛現也􅀃文顯也綈厚繒也罤兔網研米槌也上同締結又音悌蕛爾雅曰蕛苵也郭璞云蕛似稗布地生穢草也或作稊稊易曰枯楊生稊稊楊之秀也草也䬾餹䬾醍醍醐褆衣服好皃又是豸二音鵜鵜鶘荑荑秀褆福也䱱魚黒色崹崥崹山皃緹周禮注緹衣古兵服之遺色又音體鷤鷤䳏鳥又音遰鼶爾雅曰鼶䑕夏小正曰鼶鼬則穴又音斯騠駃騠馬名又丁奚切折禮記云吉事欲其折折爾謂安舒貌䨑霽雲出字林銕字林云鐡名又􅀃文云古鐡字䱱魚四足者卧也又音梯視困皃䬫字林云􅀉食䚣獸角不正又音低乆待謕轉語又他兮切㝿行皃厗磄厗石也鶗鶗鴃鳥春三月鳴也鶙鶙鵳鳥又音低蝭蝭蟧又音帝器也鴺鷩鴺山鷄名㡗㡗帷銻鎕銻火齊鮷大鱧趧趧鞻四夷樂也􅡻螗􅡻小蟬鮧鮎也鯷上同䐎逺視也又坐見豍豆名邊兮切十六㡙車㡙螕牛蝨㯅㯅㯕小樹又樹裁也麻蓖上同謬也又芳脂切篦眉篦梐門外行馬又防啓切短皃􅩪􅀃文曰牢也所以拘非也狴上同又狴犴獸也箄冠飾鎞鎞􅁫悂誤也䚜横角牛名雞􅀃文曰知時畜也易曰巽爲雞古奚切十鷄籕文稽考也同也當也留止也又山名亦姓吕氏春秋有秦賢者稽黄枅承衡木也笄女十有五而笄也稽稽風扶杓木也䗗螢火卟字書云問小也禾木不長也又音礙堅也奚何也􅀃文曰大腹也又東北夷名亦姓夏車止奚仲又虜複姓後魏書有達奚薄奚統奚吐奚等四氏胡雞切十八豯豕生三月徯有所望也又胡禮切㜎女奴蹊徑路螇螇螰似蟬榽榽蘇木名似檀騱馬前足白又驒騱野馬名驒音壇胿腣胿獸跡亦邑名在洛陽郋里名水蟲傒東北夷名嵆山名亦姓出譙郡河南二望兮語助鼷䑕名一名甘口䑕食人及鳥獸至盡皆不痛蒵卓名貕幽州藪澤曰貕養出周禮鷖鳧屬烏奚切十二翳蔽也又烏計切􅬢相言應辭嫛人始生曰嫛婗出釋名黳小黒􅱤黑羊㙠塵埃䃜美石黒色黟􅀃文黒木也丹陽有黟縣繄是也辭也又赤里繒亦㦸衣也䚷誠也又於米切㯕弩楔木也倪莊子云大倪自然之分亦姓後漢有揚州刺史倪諺五稽切十八蜺似蟬而小霓雌虹又五結五繫二切郳郳城在東海齯老人齒落復生婗嫛婗輗車轅端持衡木棿上同猊狻猊師子屬一走五百里麑上同貎亦同鯢雌鯨兒姓也漢御史大夫兒寛千乗人䘽衣裗謂之䘽也又妍啓切㑮佯不知皃觬角不正皃又研啓切㯕弩褉㪒㪒皃又五禮切醯酢味也俗作醯呼雞切六䒊痛聲黄病色也㡗􅩴赤紙出埤蒼橀木名忚欺慢之皃西秋方􅀃文曰鳥在巢上也日在西方而鳥西故因以爲東西之西􅂐文作象形亦州名本漢車師國之地至貞觀討平以其地爲西州亦姓又漢複姓十一氏左傳秦師西乞術宋大夫西鉏吾西郷錯出丗本又黄帝娶西陵氏爲妃名纍祖史記魏文侯鄴令西門豹周末分爲東西二周武公庶子西周爲氏晉有北海西郭陽何承天以爲西朝名士慕容廆以北平西方䖍爲肱何氏姓苑有西野氏西宫氏王符濳夫論姓氏志曰如有東門西郭南宫北郭皆是因居也先稽切十六卤籒文􅒾古文棲鳥棲􅀃文曰或从木西栖上同㽄瓦破聲犀犀牛似豕角生鼻上又姓秦有犀首嘶馬嘶撕提撕㾷痠㾷疼痛亦作􅤙􅤙上同㯕椑㯕屖瓠屖􅀃文遟也悲聲粞碎米􅩊梯􅀃文云木階也土雞切九睇視也又徒計切鷈鷈似鳧而小臥也上同㔸匾㔸薄也􅿆􅿆蹋謕轉相誘語一遍鼙􅀐上鼔釋名曰鼙禆也禆助鼔節也吕氏春秋曰帝嚳令人作鼙鼔之樂也部迷切七鞞上同椑圎榼漢書云美酒一椑膍膍臍􅀃文曰牛百葉也一曰鳥膍胵也亦作肶又音毗崥崥崹㼰瓦器笓取蝦竹器磇磇霜石藥出道書匹迷切七􅩪牢也所以拘罪人也􅧠􅧠斫􅬩􅬩鵊鳥名錍錍斧又方支切批擊也推也轉也示也鈚鈚箭齎持也付也遺也裝也送也相稽切十五賷俗薑蒜爲之齏上同􅐽􅐽菜俗利也又祖兮切櫅櫅榆堪作車轂爾雅云白􅀥也䂑䂑擠排擠齌炊餔疾也又才細切躋登也􅂛也又音霽隮上同麡又音齊音豺義見齊字申疑人方言云吳一云之啙弱也又兹比切迷惑也莫兮切六齊人呼母䤍醭䤍醬上白也麛鹿子病人視皃􅡷􅡷􅠦似􅀛堪啖多膏泥水和土也􅀃文云水出郁郅北蠻中詩䟽云泥中衞之小邑又姓出姓苑奴低切又奴計切四埿塗也俗屔受水丘也爾雅曰水潦所止爲屔丘郭璞云頂上汚下者亦作泥臡雞骨醬也谿爾雅曰水注川曰谿苦奚切八嵠溪磎並上同鸂鸂鷘水鳥檕爾雅云􅚴檕梅子如小柰也螇土螽似蝗小畚圭圭璧􅀃文曰瑞玉也上圜下方公執桓圭九寸侯執信圭伯執躬圭皆七寸子執榖璧男執蒲璧皆五寸周禮以青圭禮東方又孟子曰六十四黍爲一圭十圭爲一合古攜切十五珪古文邽下邽縣在馮翊上邽縣在隴西閨閨閤袿釋名曰婦人上服曰袿廣雅曰袿長襦也窐甑下孔楚詞云珪璋雜於甑窐又音攜亦作鮭魚名又音奎鹿屬洼姓也漢有大鴻臚洼丹又音哇谷名裂也胿腣胿田器㰪十三佳善也大也好也古膎切二街道也􅀃文云街四通道也風俗通云街攜也離也四岀之路攜離而别也㥟心不平又恨也戸佳切八鮭魚名出呉志膎脯也肉食肴也鞵屩也鞋上同㨙挾物䙎袖也榽榽棱牌牌牓也薄佳切七䱝魚名廣雅云黒鯉謂之䱝􅑉大桴曰􅑉郫縣名在蜀又音皮蠯江東呼蚌長而狹者爲蠯棑排筏又音敗犤牛也媧女媧㐲羲之妹古蛙切七緺青緺綬也惰腡牛理也蝸蝸手小螺騧馬淺黄色歄歄蛙蝦蟆屬烏媧切二鼃上同又戸媧切咼口戻也苦緺切六喎上同絓惡絲䓙䓙雜斜絶斜䦱斜開門國語云䦱門而與之言又王詭切柴薪也又姓髙柴之後士佳切八祡􅀕天燔柴齒不正也茈茈葫藥㧘積也詩云助我舉㧘㾹瘦也連車也一曰郤車抵堂也查查郎又七瑕切釵婦人岐笄也楚佳切九靫鞴靫盛箭室鞴音歩頷頥傍叉兩枝也􅀃文曰手指相錯也芆􅀑芆草名䐤䐤腵脯腊㼮㼮屑瓦洗器差差殊又不齊小矛又㔆也竵物不正火媧切四舛雜之皃口偏消食䍲羺䍲胡羊㚷佳切三掜掜搦皃誽言不正也崖髙崖也五佳切七涯水際啀大􅃲猚􅀃文云鳥名又水名在睢陽厓山邊􅷰雨聲娃美女皃於佳切五洼水名哇淫聲㰪邪皃又音圭嘔小皃言也崽呼彼之稱山佳切又山皆切三籭竹名諰語失也又思耳切㗨􅀏皃火佳切二㰨郟㰨氣逆病㰰昏狹切扠以拳加人亦作搋丑佳切一䁲視皃莫佳切二鞵履也鼃蛙屬戸媧切一十四皆􅀃文作皆俱詞也古諧切十九偕俱也䕸麻稈稭上同又古八切喈鳥聲階階級也􅀃文曰階陛釋名曰階梯也如梯之等差也瘦也薢薢茩藥名決明子是也又音懈荄草根痎瘧􅔂二日一發堦堦砌楷􅀃文云木名孔子冢蓋樹也廣志云孔子冢上特多楷樹鶛爾雅云鷯鶉其雄鶛湝水流皃又戸皆切街又音佳牡瓦􅱟疾風蝔蟲名淮南子曰蝔知雨至蝔蟲大如筆管長三寸代謂之猥犳知天雨則於草木下藏其身又音諧鍇鐡也􅵶推也亦背負皃乙諧切一諧和也合也調也偶也戸皆切九馬性和也骸骸骨瑎黒石湝風雨不止龤􅀃文曰樂和龤也蝔又音皆鞋履也又音膎䓳䓳菔草排推排釋名曰彭排軍器也彭旁也在旁排敵御攻也歩皆切六俳俳優輫車箱牌又薄佳切狎短頭狗也曲頤皃乖睽也離也戾也背也古懷切四上同􅀃文曰背吕也脊字從此㾩惡瘡懐抱也和也來也思也亦州名春秋時野王邑漢爲河内郡武德初於相崖城置懐州又姓吴志顧雍傳有尚書郎懐叙戸乖切十二褱俠也苞也歸也櫰爾雅云槐大葉而黒曰櫰槐木名又音回㜳和也戎狄鹽㠢崴㠢不平皃似牛四角人目淮水名出桐栢又姓也褢􅀃文藏也上同瀤北方水名匯澤名苦淮切又胡罪切三㨤指摩㔞劥㔞人有力也豺狼屬禮記云仲秋之月豺􅀕獸士皆切四儕等也輩也􅀋也麡又音齊音隮義見齊字中􅿪山名在平林差簡也楚皆切又楚宜楚牙楚懈三切二䞗起去也虺虺􅯁馬病呼懐切又灰毀二音一􅯁柱懐切二頭胅也出聲􅀋埋瘞也藏也莫皆切四薶上同霾爾雅曰風而雨土爲霾釋名曰霾晦也如物塵晦之色也㦟慧也齋齋潔也亦莊也敬也經典通用齊也側皆切一崴崴乙皆切四碨碨䃁不平也䃁音鴉䴜鹽也亦作溾溾涹穢濁齧也卓皆切二榸枯木根岀聲􅀋唻唱歌聲賴諧切一揩揩摨摩拭口皆切四􅵭大絲俳行惡米之别名摨諧皆切一崽方言云江湘間凡言是子謂之嵐自髙而侮人也山皆切又山佳切二籮古以爲玉柱故字從玉今俗作簁􅷰雨聲擬皆切二娾醜女皃搋以拳如物丑皆切一俙訟也喜皆切一䐯䐯膗形皃惡力懐切一膗仕懐切二倒損岀方言十五灰􅀃文曰死火也淮南子云女媧積蘆灰而止淫水呼恢切六䖶豕掘地也鼿上同豗相豗擊㾯馬病虺虺􅯁恢大也苦回切八詼詼調悝病也憂也一曰悲也亦大也又音里魁魁師一曰北斗星箭竹㷇多也顝大頭盔盔器盂盛者也隈水曲也烏恢切十一煨煻煨火䋿五色絲飾渨渨沒椳戸樞偎愛也亦國名風低皃揋揋掎曲角中也葨山草鰃魚也回違也轉也邪也又回中地名亦姓古賢者方回之後戸恢切十三洄逆流迴還也槐木名五經通義曰士之冢樹槐春秋􅀃題辭曰槐木者虚星之精也又姓晉大夫富槐之後徊徘徊瑰玟瑰火齊珠也又古回切蚘人腹中長蟲蛕上同佪玉篇云佪佪惛也烠光色郷名在濉陽􅬼馬名茴茴香草名枚枝也亦姓漢有淮南枚乗莫杯切十五梅果名又姓岀汝南本自子姓殷有梅伯爲紂所醢漢有梅鋗媒媒衒􅀃文曰謀也謀合二姓也玟玟槐煤炱煤灰集屋也炱杜來切脢脊側之肉又亡代切脄上同腜孕始兆也禖郊禖求子􅀕也䍙雉網莓莓莓美田也塺塵也鋂大鐶詩傳云一環貫二䊈酒母䤂醋之别名傀大皃又美也盛也偉也亦怪異公回切十上同亦同瑰瓊瑰石次玉又音回􅉞上同鞼􅀃文云韋繡也又求位切櫰山海經云中曲山有木如棠而圎葉赤實如木􅀲食之多力又音懐膭肥皃䐩畜胎䕇菜名又乎罪切雷􅀃文作靁云隂陽薄動靁雨生土物者也又姓後漢有雷義魯回切十三古文儡儡同㔣勉也又盧對切瓃玉器櫑􅀃文曰􅀛目酒尊刻木作雲雷之象象施不窮也罍上同鑘劒首飾也亦作櫑􅧡百囊魚網鐳瓶也壷也屋棟瓦也畾田間轠轠轤不絶穨暴風也杜回切十三頽上同㿉隂病隤下墜也墤上同㢈􅐦也魋獸似熊而小又人名􅯁虺􅯁蘈爾雅曰藬牛蘈郭璞云髙尺餘許方莖葉長而銳有穗穗間有華紫縹色譟也􅩓棺覆蹪躓仆􅟜屋破狀崔姓也齊丁公之子食采於崔因以爲氏岀清河博陵二望倉回切六催迫也縗喪衣長六寸傅四寸亦作衰􅬜􅬜崩隤也行急皃逼也磓落也亦作塠都回切十五塠上同頧母頧夏冠名禮記作追䭔餅也堆聚土鴭雀屬撲物也亦作鎚治玉也周禮作追搥摘也䜃上同嵟髙也䩇醜面􅎧􅀃文曰小阜也敦詩曰敦彼獨􅀫坐皃岀聲譜􅟜􅟜素回切六挼擊也䪎鞍邊帶也毸毰毸鳯舞岀楚詞嗺嗺送歌蓑蓑蓑蘂下垂皃本又音莎摧折也阻也昨回切五崔崔嵬又音催慛傷也憂也槯木名堪作杖檇木有所擣也裴衣長皃又姓伯益之後封于􅘌郷因以爲氏後徙封解邑乃去邑從衣至燉煌太守裴遵始自雲巾徙居河東本亦作裵薄回切十二徘徘徊培益也隄也助也治也隨也重也陪陪廁也􅘌郷名在聞喜䣙郷名在扶風婄婦人皃棓姓也前漢爰盎之棓生所問占又龐項切毰毰毸鳯舞版也曲頥也又音牌輫車箱桮􅀃文曰㔶也布回切三杯上同盃俗肧懷胎一月芳肧切八坏未燒瓦也㾦弱也醅酒未漉也衃􅀃文曰凝血也魚名􅀲抔披抔鮠魚名似鮎五灰切五桅小􅂳上檣竿也嵬崔嵬磑磨也又五内切峞髙皃車盛皃他回切七上同㷟㷟燖毛出字林蓷草名推又昌隹切藬牛蘈草也㞜履屬也頸曰㞜古之善塗者乃回切三捼手摩物也又奴和切一飯出字林嗺字書云口嗺頽藏回切四朘赤子隂也䘒上同見老子上同出聲􅀋十六咍􅀏也呼來切三㾂病也􅴶㱾􅴶􅀏聲也開開解亦州名本漢朐䏰縣地蜀置漢豐縣後魏置開州領東關東岡二郡又姓吕氏春秋云開方衞公􅀃文作開經典亦作闓苦哀切五㱾㱾􅴶侅竒侅非常又古哀切奒犬皃㚊多也哀悲哀也又姓漢有哀章烏開切六埃塵埃唉慢膺又於其切㶼􅀬甚欸歎也毐􅀃文云人無行也夲又烏呚切臺土髙四方曰臺又姓漢有侍中臺崇徒哀切十五擡擡舉菭魚衣濕者曰濡菭亦作台􅀃文曰菭水衣苔上同又蘚也炱炱煤嬯鈍劣薹蕓薹䈚竹萌儓輿儓檯木名駘駑馬大黒之皃又都來切籉可禦雨也跆蹋跆連手唱歌鳥名該備也咸也兼也皆也又軍中約也古哀切二十􅘻豕四蹄白垓八極又垓下隄名沛郡項羽敗處也荄草根又古諧切郂郷名在陳留㱯羊胎又音敳剴大鎌一曰摩也又五哀切陔殿階次序姟數也十冓曰姟絯挂也出淮南子晐備也兼也峐爾雅云山無草木峐裓裓夏樂章名侅竒侅非常賅上同又贍也㨟㨟觸也胲足大指毛肉也䬵飴也䶣牙也䐩肥也裁裁衣旺哉切九􅂊僅也又藏代切財貨也賄也才用也質也力也文才也􅀃文作才艸木之初也材木挺也䴭麴也溨水名鼒爾雅注鼎斂上而小口又音兹蔽前草箭來至也及也還也又姓後漢來歙光武姑子蜀志云荆楚各族有黃門侍郎來􅁪俗作來落哀切二十五萊藜草亦州名漢掖縣屬東萊郡秦屬齊郡後魏分青州置光州取界内光水爲名隋改爲萊州又姓左傳晉與秦戰干郩萊駒爲左郲地名騋馬髙七尺崍崍嵦山也斄郷名在扶風又力知切􅀃文云瓄玉也亦作琜貍也猍上同淶水名岀􅃰郡鯠魚名鶆鶆鳩鷹出埤蒼䅘䅘麰之麥一麥二稃周受此瑞麥出埤蒼毛起䋱上同庲舎也㾢惡病棶棶椋木名􅏚􅀜西有長尾牛又音􅁵音茅逨至也又力代切小麥麳上同耕外舊場大黒徠還也又力代切烖天火曰烖祖才切十二灾上同籀文古文栽種也哉語助􅀃文曰害也􅫱上同亦作葘見經典㘽􅀃文曰傷也烖字􅀋從之省文蒔渽水名出國睵睽也或作哉猜疑也恨也倉才切四偲多才能也睵睽也䞗􅀃文曰疑之等赴而去也版也扶來切二䏽姓出姓苑胎始也􅀃文曰婦孕三月也土來切七孡上同鮐魚也台三台星又天台山名邰地名后稷所封在始平或作􅘭􅀃文云黒貝亦珠婦人僞髻岀證俗文孩始生小兒戸來切八咳小兒􅀏皃頦頥下㨟觸也􆄜留意䠽長身䱺䱺雄蟹也􅘻豕四蹄白鰓魚頰蘇來切八揌擡揌粞碎米䚡角中骨顋顋頷俗又作腮愢意不合也鳥名毢毰毢皚霜雪白皃五來切七嵦崍嵦敳有所理又隤敳八元名㱯殺羊出胎隑企立剴又音垓獃獃癡象犬小時未有分别能爾雅謂三足鼈也又獸名禹父所化也奴來切又奴登切二㾍病也大黒皃丁來切二懛懛剴失志皃㹗昌來切牛羊無子一好色皃普才切一十七眞眞僞也又姓風俗通云漢有太尉長史眞祐俗作真側鄰切十六甄姓也陳留風俗傳云舜陶甄河濵其後爲氏出中山河南二望又舉延切振又之刃切以貢受福稹􅀃文云穜穊也又之忍切磌柱下石也畛田界又之忍切籈爾雅云所以鼓敔侲字林云養馬者桭屋梠蒖䒢也唇驚也㖘上同帪馬囊也薽茢薽豕首草也㲀擊也又音辰犬走草狀丑人切三胂申也縝縝紛因託也仍也縁也就也亦姓左傳遂人四族有因氏俗作於眞切二十三茵茵褥􅀃文曰車重席也詩曰文􅌲暢轂文茵虎皮也鞇上同禋􅀕也敬也籕文闉闉闍城上重門駰白馬黒隂又於巾切湮落地沈也烟烟煴天地氣易作絪緼氤氤氲元氣盛也絪絪緼麻泉垔塞也陻㘻並上同堙亦上同又土山也洇水名姻婚姻白虎通曰婦人因人而成故曰姻也字林云婚婦家姻壻家婣古文出周禮諲敬也裀王篇云衣身􅱤黒羊歅秦穆公時有方歅一名臯善相馬也或作諲㧢就也新新故也亦姓國語晉大夫新穆子又複姓二氏何氏姓苑有新和氏陳留風俗傳云畢公封於新垣後因氏焉魏將新垣衍改爲梁垣氏息鄰切三辛薑味也爾雅云太歳在辛曰重光又姓夏啓封支子于莘莘辛聲相近遂爲辛氏漢初辛蒲爲趙魏名將及徙家隴西便爲隴西人薪柴也周禮委人掌􅀕祀之薪詩云翹翹錯薪辰辰象也又辰時也爾雅曰太歳在辰曰執徐植鄰切十三晨早也明也䢅古文擊聲宸屋宇天子所居鷐鷐風鸇也麎牝麋桭兩楹間又音眞苣草名屒重名臣伏也男子賤稱春秋􅀃曰正氣爲帝間氣爲臣孝經􅀃曰臣者堅也䢻地名䣅姓也仁仁賢莊子曰愛人利物謂之仁釋名曰仁忍也好生惡殺善惡含忍也又姓姓苑云彭城人也如鄰切三朲屋上間朲人天地人爲三才亦漢複姓十氏左傳有寺人披齊有徒人費周有王人子突魯有雍人髙宋有􅌮人僕鄭有大夫子人九國語吴有行人儀孔子弟子左人郢漢司空􅁺封人嬰後漢司徒聞人襲神靈也易繫辭曰隂陽不測之謂神亦姓風俗通云神農之後漢有􅀐都尉神曜何氏姓苑云今琅邪人食鄰切二晨又埴鄰切親愛也近也􅀃文至也七人切三寴並古文礥鞭也下珍切又下憐切三䛘也㘋難也申身也伸也重也容也􅂐文作申又辰名太歳在申曰侰灘亦州名春秋時屬楚秦南陽郡後魏爲郢州周爲申州又姓岀魏郡亦漢複姓四氏莊子有申徒狄漢丞相申屠嘉長沙太􅀓申章昌左傳齊有申鮮虞失人切十六伸舒也理也直也信也紳大帶娠孕也又脂刃切呻呻吟並上同眒鳥獸驚皃胂脢也㑗􅀃文曰神也又姓出姓苑􆁠革帶引也身親也躬也柛爾雅木自􅁦曰柛謂􅁦踣也䰠山海經云青要山䰠也􅀃文曰神也訷訷􅀃信也賔敬也迎也列也遵也服也􅀃文作賔所敬也又姓左傳齊有大夫賔須無必鄰切十古文濵水際㯽㯽楖䚔䚔􅳳暫見顮頭憒懣也儐敬也又音殯􅣱􅣱鐡爲刀甚利矉􅀃文曰恨張目也鬼皃㷠􅀑火􅀃文曰兵死及牛馬之血爲㷠今作粦同力珍切又力刃切二十三燐上同鄰近也親也􅀃文曰五家爲鄰俗作隣轔車聲嶙嶙峋􅀷崖狀也粼木在石閒亦作磷又力刃切磷上同疄田壟麟仁獸爾雅云麕身牛尾一角麐上同鱗魚甲又姓左傳宋大夫鱗朱璘璘㻞文皃駗馬色翷翷􅡇飛皃􅡁獸名似豕黄身白首出埤蒼瞵視皃獜獜獜大健也出􅀃文驎騏驎白馬黒脊壣菜畦魚名鏻健皃又力丁切繗紹也潾水名􅚙矛柄也又鉏耰也古作矜巨巾切五㨷拭也堇黏土墐上同魿蟲魚連行又力丁切珍貴也重也寶也俗作珎陟鄰切三鎭戍也又陟刃切塡壓也又音田陳陳列也張也衆也布也故也亦州名本太昊之墟畫八卦之所周武王封舜後胡公滿於陳楚滅陳爲縣漢爲淮陽國隋爲陳州又姓胡公滿之後子孫以國爲氏出穎川汝南下邳廣陵東海河南六望又虜三字姓後魏書有侯莫陳氏直珍切又直刃切五敶古文􅀃文本直刃切􅍌也䍶獸名似羊目在耳後趁越履塵􅀃文本作鹿行揚土也津􅀃文作水渡也將鄰切五古文璡美石次玉濜氣之液也本亦作􅩎飾也瞋怒也􅀃文曰張目也又作瞋昌眞切六嗔上同本又音塡謓亦上同􅀃文恚也䐜肉脹起也纑也縝上同秦州名古西戎地春秋時爲秦國後并天下爲隴西郡漢武分置天水郡後魏改爲秦州因邑以爲名又姓秦自顓頊後子嬰旣滅支庶以爲秦氏也匠鄰切三螓蜻蜻似蟬而小牛名寅辰名􅀃文作寅翼眞切又以之切六夤夤縁連也又敬惕也􅘡脊􅘡蔩蔩菟􅀲螾寒蟬場紉單繩女鄰切一􅌭􅌭紛匹賔切五䎙飛皃􅀃文云􅀑皃又音頻敬也爭􅀃文作􅃲也頻數也急也比也􅀃文作頴水厓人所賔附頻蹙不前而止又姓風俗通云漢有酒泉太守頻暢符眞切十四蘋大萍也又作薲薲上同嬪婦也一曰妻死曰嬪㰋木名玭珠也又歩田切蠙珠母又歩田切獱􅆩之別名顰顰眉蹙也多言嚬笑也䚔􅀑皃擣衣姿銀周禮荆州其利銀爾雅曰白金謂之銀鍾山之寶有銀燭謂有精光如燭銀重八兩爲一流也語巾切十六㹞大聲狺上同䖜兩虎爭聲檭木名色白鄞縣名在㑹稽又音齗圁圁陽縣名在西河誾和也又誾誾中正之皃又姓何氏姓苑云今廣平人訔上同嚚愚也䓄亭名在江夏珢􅀃文云石之似玉者䴦獸名似貉而八目出山海經垠垠岸也􅣬大篪泿水名巾釋名曰巾謹也二十成人士冠庶人巾當自謹修於四教居銀切一麏鹿屬居筠切六麇麕並上同頵大頭莙爾雅云莙牛薻似薻而葉大又渠殞切汮水名筠竹皮之美質也爲贇切四囩田十二頃􅀃文回也縜繩組荺藕根小者囷倉圎曰囷去倫切又咎倫渠殞二切七箘桂又竹名又渠殞切箟箭竹輑車軸相逢大貝又渠殞切峮嶙峮山相連皃􅀃又曰宮中道又苦本切珉美石次玉亦作玟瑉䃉武巾切十九岷山名江水所出亦州名秦隴西郡之臨洮縣也後魏置岷州因山以爲名罠􅇾網閩閩越蛇種也又音文緡錢貫亦絲緒釣魚綸也又姓出何氏姓苑䪸強也笢竹膚又亡忍切旻仁覆愍下謂之旻天旼和也􅢌病也闅亭名在汝南汶汶山郡又音問㨉撫也忞自勉強也盿視皃䁕上同鍲筭稅也鳥似翠而赤喙鈱鈱銳貧乏也少也符巾切二古文鼓聲於巾切三鼘上同又烏􅀇切駰馬隂淺黒色又音因贇美好也於倫切四奫泉水頵􅀃文云頭頵頵大也蝹蝹蝹龍皃彬文質雜半􅀃文云古文份也府巾切十三斌上同份􅀃文曰文質備也玢文采狀也􅃎地名本􅃎國之地又有􅃎城公劉所邑蓋此地也因以名州亦作邠又姓出姓苑邠州名汃西方極逺之國霦璘霦玉光色㻞上同大目皃攽􅀃文分也博雅減也虨虎文俗作又普巾方閑二切砏水名又石民􅀃文曰衆萌也彌鄰切五䦩低目視也䁕視見又音旻泯􅃿也又亡忍切怋亂也十八諄至也誠懇皃也章倫切五惇心實也又音敦􅾛鈍目也又音稕肫鳥藏訰亂言之皃椿木名丑倫切八楯木名輴載柩車也䡅上同鶞爾雅云春鳸鳻鶞鳻音汾杶書曰杶榦括柏櫄􅀃文同上瑃玉名䣩純美酒也直倫切又常倫切二㡒布貯曰㡒荀草名又姓本姓郇後去邑爲荀今出潁川相倫切十四郇地名在河東解縣周文王子封於郇郇以爲氏王莽時有郇越詢咨也眴眩又音舜峋嶙峋珣玉名􅀃文曰大木也可以爲鉏柄又祥勻切洵水名在晉陽恂信也畇爾雅曰畇畇田也謂墾辟也又音勻音旬檈承食案也槆杶木別名姰狂也又音縣㰬氣逆也又信也純篤也至也好也文也大也常倫切十三蓴蒲秀蒓水葵醇厚也醲也鶉䳺鶉也莊子曰田䑕化爲鶉淮南子曰蝦蟆化爲鶉字林作􅙯􅀃文曰孰也凡從􅙯者今作享同陙小阜名也憂悶錞樂器鳴之所以和鼓淳淳也朴也又姓何氏姓苑云今吴人大也焞明也又他昆切䣩美也犉黃牛黒脣如勻切四鷚鷄晚生者瞤目動眴上同脣口脣食倫切五漘水際䔚牛蓐草似蘭青黒色㸪牛行遟也又音廵紃環綵絛也又音巡淪􅃿也力迍切十五倫等也比也道也理也又姓風俗通曰黃帝樂人伶倫氏之後論有言理出字書又盧昆切䑳􅂳䑳輪車輪周禮曰軫之方以象地蓋之圜以象天輪輻三十以象日月陯山阜䧟也鯩魚名蜦神蛇能興雲雨文字集略云蝦蟆六如屨能食蛇也又力計切木名綸絲綸又姓魏志孫文懿臣綸直又音鰥惀欲曉知也侖􅀃文思也踚行也掄擇也周禮曰凡􅀖工入山林而掄林不禁又力昆切䈁䈁子􅂳具屯難也厚也陟綸切又徒渾切四窀窀穸下棺迍迍邅本亦作屯易曰屯如邅如㡒布貯逡逡巡退也七倫切十竣止也倨也一曰改也皴皮細起也東郭古之狡免也又音俊墫舞皃捘推也左傳云捘衞侯之手又子寸切竴喜也踆退也上同夋倨也遵循也率也行也習也將倫切五跧蹙也又阻圎切僎郷飲禮僎者降席而遵法也或作遵又音撰嶟山皃鷷西方雉名春四時之首尚書大傳曰春出也萬物之出也春秋􅀃題曰春蠢也蠢興也春秋繁露曰春喜氣又姓何氏姓苑云春申君黃歇之後昌脣切一鷷西方雉名昨旬切一勻徧也齊也􅀃文少也从勹二羊倫切二畇詩曰畇畇原隰又音荀音旬旬十日曰旬詳遵切十七古文巡逡巡􅀃文曰視行也馴擾也從也善也循善也揗手相安慰㸪牛行遟又音脣紃環綵絛文食倫切䋸縫也䳦小鳥出字統洵均也龕也楯楯闌檻也灥三泉相通㽦均也􅀃文曰走皃也畇墾田䖲蟲名均平也又學曰成均亦州名春秋及戰國時並屬楚秦屬南陽郡隋爲均州取汮水以名之居匀切四鈞三十斤也又姓風俗通云楚大夫元鈞之後漢有侍中鈞喜袀戎衣也左傳曰均服振振字書從衣汮水名出析縣北山入沔今作均行也渠人切又去忍切一砏砏磤大雷普巾切又布巾切二虨虎文也又作十九臻至也乃也側詵切十一蓁草盛皃搸聚也又琴瑟音溱水名在河南潧水名在鄭國出􅀃文此水南入洧詩作溱洧誤栗榛上同樼亦同瀙字林云水名在豫州埤蒼云鑿轃􅀃文曰大車簀也莘地名在虢又姓所臻切二十㜪有㜪國名扟從上擇取物也駪馬多籸粉滓䯂衆盛皃甡衆多皃兟進也詵衆人言也侁行皃詩云侁侁征夫􅱛魚尾長也詩云有莘其尾字書從魚屾􅀃文云二山也􅢲多也燊熾也羽多往來之皃􅯗方言云杠東齊海岱之間謂之􅯗杠牀前横也阠八陵東名阠又息進切姺女字㾕寒病木叢生士臻切三㲀吕氏春秋注云㲀㲀動而喜皃又音眞帘幕也又音廉二十文文章也又美也善也兆也亦州名禹貢梁州之域自戰國時宋及齊梁皆諸羌所據後魏平蜀始置州亦姓漢有廬江文翁無分切十六聞􅀃文曰知聲也又音問古文彣青與赤雜紋綾也雯雲文馼馬赤鬣縞身目如黃金文王以獻紂蟁爾雅曰鷏蟁母郭璞云似烏􅖂而大黃白雜文鳴如鴿今江東呼爲蚊母俗􅀃此鳥常吐蚊因名云􅀃文曰齧人飛蟲也蚊上同䘇亦同出漢書䰚摩上鳼鳥也爾雅曰鶉子鳼闅俗作閿􅀃文曰低目視也弘農湖孫有闅郷汝南西平有闅亭汶黏唾又音旻問鼤班䑕閩閩越也又音旻雲􅀃文云山川气也从雨云象雲回轉形河圖曰雲者天地之本傅子曰以雲母飾車謂之雲母車臣不得乗之又姓縉雲氏之後又後魏書宥連氏後改爲雲氏王分切二十二芸香草也􅀃文云似目宿淮南王􅀃芸草可以死復生雜禮圖曰芸蒿也葉似邪蒿香美可食也蕓蕓薹菜名􅜶􅀃文曰除苗間穢也上同耘亦同鄖國名妘女字又姓紜紛紜溳水名在南陽一云在美陽澐江水大波云辭也言也􅀃文古文雲字亦姓出自祝融之後篔篔竹名䢵邑名貟益也􅀃文作員物數也又音圎又音運姓也籀文愪憂也沄􅀃文云轉流也􆄴亂也耺耳中聲橒木名䉙竹名煴烟煴天地氣也易作絪緼於云切十氲氤氲元氣緼亂麻又於粉切馧香也蒀葐蒀盛皃上同䡝轒䡝兵車又於粉切藴藴積也又於粉切蝹龍皃㚃鬱也汾水名在太原本漢兹氏縣地屬西河郡魏於兹氏縣置西河郡今州城是也符分切三十七墳墳籍又墓也氛氛氲祥氣俗鼖大鼓周禮鼓人掌六鼓以鼖鼓掌軍事䩿上同􅬧亦同濆水際也又水名焚焚燒燌上同羒白羝羊也豶豕也頒魚大首亦衆皃又布還切羵土中怪羊䴅似鵠曰身三目赤尾六足枌白榆木名鳻春鳸鳻鶞亦作又􅀃文曰鳥聚皃一曰飛皃蕡草木多實古文橨枰仲木别名出埤蒼棼複屋棟也賁三足􅀛葐葐蒀魵魚名谷名在臨汾妢周禮考工記云妢胡之笴棻香木名也梤上同朌大首皃䫶醜皃鐼飾也􅀃文曰鐡􅀋讀若熏又音訓馩馩馧香氣馚上同草初生香分布也又音芬鼢田中䑕又音憤蚡上同轒轒軶兵車分賦也施也與也􅀃文别也府文切六饙一蒸飯也上同扮掘也埽棄之也又方問切􅪭􅪭毭罽也羣羣隊也􅀃文輩也亦作群渠云切五帬􅀃文曰下裳也釋名曰帬羣也連接羣幅也裠上同亦作裙宭羣居也又音君􅍙也薫香草韻略曰薫陸香出大秦國亦姓出何氏姓苑許云切十二曛日入也又黃昏時勲功勲也勛古文熏火氣盛皃燻上同獯北方胡名夏曰獯鬻周曰獫狁漢曰匈奴纁三染絳醺著酒葷臭菜焄禮曰焄蒿悽愴鄭􅀇云焄謂香臭也臐儀禮鄭􅀇注云羊曰臐豕曰膮皆香美之名膮呼堯切君白虎通曰君者羣也羣下之歸心也荀卿子曰君者儀也民者影也儀正則影正君者盤也民者水也盤圎則水圎又君者民之源也源清則流清源濁則流濁舉云切八軍軍旅也周禮夏官司馬曰凡制軍萬有二千五百人爲軍王六軍大國三軍次國二軍小國一軍軍將皆命卿又漢複姓二氏禮記有將軍文子晉有太傅􅂙軍襄城冠軍夷皸足坼桾桾櫏木也䇹竹名莙牛藻菜也宭羣居鮶蟲名水鮶如魚乗焉芬芬芳又姓戰國䇿晉有大夫芬質府又切十三紛紛紜衆也亂也􅜳中也亦作帉􅦷毛落衯􅀃文曰長衣皃􅡇翻􅡇飛皃棻􅀃文云香木也砏砏汃水石草木初生香分布也氛氛侵妖氣雰上同又霧氣也之皃錀埤蒼云兔奄錀二十一欣喜也亦州名本漢陽曲縣地隋置欣州因欣口爲名許斤切六忻上同昕日欲出也訢喜也炘􅀬皃邤邤鄰地名殷衆也正也大也中也􅀃文从云作樂之盛稱殷亦姓武王剋紂子孫分散以殷爲氏出陳郡於斤切四慇慇懃㶏水名在潁川溵上同勤勞也盡也巨斤切八芹水菜食之冝丈夫吕氏春秋曰菜之美者雲夢之芹懃慇懃慬憂哀懄上同瘽病也􅚙矛柄古作矜蘄草也又巨希切斤十六兩也􅀃文曰斫木也又虜複姓二氏後魏書去斤氏後改爲艾氏奇斤氏後改爲奇氏舉欣切四筋筋骨也􅀃文曰肉之力也从力肉竹竹物之多筋者又姓出姓苑䈥俗釿􅀃文云劑斷也本宜引切䖐虎聲語斤切十二㹜犬相吠也圻圻堮又岸也垠上同齗齒根肉也齦上同䴦獸似貉也斦二斤􅣬大篪䓄亭名在江夏郡狺犬爭鄞縣名在會㮷郡二十二元大也始也長也氣也又姓左傳衞大夫元咺又後魏孝文改拓拔爲元氏望在河南愚􅀽切二十二原廣平曰原亦州名漢髙平縣魏爲鎭州又改原州蓋取髙平曰原爲名又姓孔子弟子有原憲􅀃文本作邍原即與厵同邍周禮有邍師注云邍地之廣平者源水原曰源又姓秃髮傉擅之子賀入後魏魏太武謂之曰與卿同源可爲源氏􅀃文本作厵􅂐文省作原後人加水厵上同杬木名出豫章煎汁藏果及􅆑不壞嫄姜嫄帝嚳元妃沅水名在象郡鐔淫城西亦云在牂牁騵赤馬白腹黿似鼈而大紀年曰穆王十七年起師至九江以黿爲梁羱羱羊角大者可爲器又五丸切蚖蠑蚖蜥蜴也一名守宫字林云在壁曰蝘蜓在洲曰蜥蜴􅤊晚􅁞周禮榮原􅁞鄭注云原再也俗從䖵芫草名有毒可爲藥也邧地名榞實如甘蕉而皮可食謜徐語孟子云故謜謜而來㹉獸如牛也䬧䬧餌又五丸切獂豕屬又音􅁊阮五阮郡出史記又元逺切蒝莖葉布也􅀽姓出陳郡汝南彭城三望本自胡公之後雨元切十六爰於也行也爲也哀也引也亦姓出濮陽亦舜裔胡公之後􅀽或作爰垣垣墉也又姓漢西河太守洛陽垣恭也籀文園園圃亦姓援援引也又爲眷切榬絡絲籰轅車轅方言云轅楚衞謂之輈又姓左傳陳大夫轅濤塗之後又漢複姓有軒轅氏鶢鶢鶋海鳥媛媈媛枝相連引又爲眷切洹水名亦縣名在相州又音􅁊溒纂文云姓也玉篇云水流皃􅧱易田名也蝯蝯猴五百歳化爲玃爾雅曰猱蝯善援猨上同猿俗煩勞也􅀃文曰熱頭痛也附􅀽切三十八番􅀃文曰獸足謂之番經典作番又翻盤潘三音書亦音波􅫯足有文也􅀃文同上蹯亦同上見左傳繁穊也多也蘩皤蒿薠似蘋而大樊樊籠亦姓周宣王封仲山甫於樊後因氏焉今在南陽捼也繙繙㠾亂取㠾於元切燔炙也膰祭餘熟肉瀿水名玉篇云水暴溢也羳羊黃腹也􅭹百合蒜也鷭鷭鵃鳥蟠􅡂負又扶干切蕃茂也息也滋也又音藩蠜䘀螽礬礬石䑕名郷名在京兆杜陵鐇廣刃斧璠璠璵魯之寶玉笲竹器禮記云婦執笲􆀸稻也出齊人種術㺕犬􅃲也襎襎裷幭也袢絺綌詩云是紲袢也棥藩屏緐馬飾名也􅩕上同墦冢也生養也䮳上同旛旐也􅳳䚔􅳳藩􅙛䒞葉如韭又音翻飜覆也飛也孚􅀽切十翻上同旛旌旐揔名番數也遞也又盤潘煩三音幡􅀃文曰書兒拭觚布俗通爲幡􅡶大波􅱪米汁轓車大箱也繙􅌭繙風吹旗皃反斷獄平反又方晚切暄温也況􅀽切十九煖上同喛恐懼萱忘憂草􅀃文又作藼蕿䁔大目諼詐也塤􅀃文作壎樂器也以土爲之六孔釋名曰塤喧也聲濁喧然丗本曰暴辛公作塤壎上同䳦䳦鴝鳥名吅喚聲又私全切貆獸名詩云有縣貆兮又丸歡二音喧大語也諠諠譁亦作喧讙愋恨也讙讙囂皃也翧飛來䚭揮角䚙角􅎅又許羈切蝖蠀螬鴛鴛鴦匹鳥於􅀽切十八冤屈也枉也曲也又冤句縣在曹州句音劬㠾幡㠾鵷鵷鶵似鳳水名惌惌枉鋤頭曲鐵宛屈草自覆又宛縣在南陽又音苑蜿蜿蜿龍狀也又音苑貪也蒬棘蒬草名怨怨讎又於願切美也葾敗也䡝兵車䩩量物之具又於阮切裷襎裷眢目空皃又一丸切言言語也字林云直言曰言荅難曰語釋名曰言宣也宣彼之意也又姓孔子弟子有言偃語軒切五琂石似玉甗無底甑也又語戰切䇾大簫䓂草名攑舉也丘言切二䞿走皃又虚言切軒軒車又姓軒轅之後漢有諫大夫軒和虚言切六掀以手髙舉鶱飛舉皃䡣車前輕也蓒蓒芋草名䞿走皃子摴蒱采名居言切十二􅦻上同靬乾革又驪靬縣在張掖又下憚切又口旦切鞬馬上盛弓矢器上同㓺以刀去牛􅀔或作犍犍犗牛名又犍爲郡腱筋也一曰筋頭騝驑馬黄脊曰騝䭈粥也亦作飦上同籀文蔫蔫箊也謁言切二焉安也又不言也蕃蕃屏甫煩切六藩籬也亦藩屏也轓車箱又音幡鱕魚有横骨在鼻前如斤斧籓大箕一曰蔽也鐇廣刃斧也筋鳴也巨言切二赶獸舉尾走樠松心又木名也武元切又莫昆切一二十三䰟魂魄也白虎通曰魂者沄也猶沄沄行不休也魄者迫也猶迫迫然著於人也淮南子曰天氣爲䰟地氣爲魄又反魂樹名在西海中聚窟洲上花葉香聞數百里狀如楓香煎其汁可爲丸名曰震靈丸亦名反生香又名卻死香死屍在地聞氣乃活出十洲記戸昆切二十四㮯大木未剖䮝䮝騱野馬􅏈似犬人面見人則􅀏行疾如風餛餛飩餫上同䴷不破麥也鼲䑕名楎三爪犂曰楎犂上曲木也渾渾濁益部􅂄舊傳曰漢武時洛下閎明曉天文於地中轉渾天定時節亦姓左傳鄭大夫渾罕又胡本切沄水流皃忶埤蒼云心悶也蒲也又胡官切俒全也㑮女字又五昆切䡣還也車相避也堚里名在洛陽悶榾㨡㨡推煇赤色顐顐秃也視琿玉名昆兄也後也同也又姓夏諸侯昆吾之後戰國䇿有齊賢者昆辨古渾切二十晜上同上同􅀃文云周人謂兄曰菎香草㡓䙝衣􅀃文也褌上同崐崐崘山名琨琨㻍玉名鵾鵾雞鶤上同鯤北溟大魚䖵􅀃文曰蟲之緫名也蜫上同惃亂也㱎㱎于不可知也錕錕鋙鐵赤色可爲劒瑻同琨鹿屬猑獸名騉騉駼馬名牛蹄能升髙山􅀃文曰仁也从皿以食囚也今作昷同烏渾切十三温水名出犍爲又和也善也良也柔也暖也又姓唐叔虞之後受封於河内温因以命氏又卻至食采於温亦号温季因以爲族出大原又漢複姓二氏莊子有温伯雪子姓苑又有温稽氏輼輼輬車也蕰蕰藻節中生葉又於殞切驪駿馬殟病也鴛鴛鴦匹鳥又音冤郷名出蜀志豱豕名緼禮曰一命緼韍韞赤色又於粉切㼔􅀲名戎狄云鹽門問也聞也字從兩戸亦姓周禮云公卿之子入王端之左敎以六藝謂之門子其後氏焉又漢複姓十四氏左傳魯卿東門襄仲宋樂大心爲右師居桐門後因氏焉伍子胥抉眼吳門因謂子胥門子孫乃以胥門爲氏呉有胥門巢丗本晉大夫下門聦齊臨淄大夫車門遽陳有􅃲門氏戰國策有雍門周魏侯嬴爲夷門抱關者後姓夷門氏吕氏春秋有陽門介夫後以陽門爲氏古今表有逢門子豹宋諸公子食采於木門者後遂爲氏漢書儒林傳有闕門慶忌何氏姓苑云弋門氏今漁陽人又有剌門氏莫奔切十三捫以手撫持樠木名虋赤􅆝粟也俗作􅚂璊玉色赤也亹浩亹地名出漢書地理志云浩音鴿上同怋怋怋不明又亂也䫒頭多殟䫒􅨷赤色罽名䟂行遟䊟粥凝比翼鳥也孫爾雅釋親曰凡子之子爲孫孫之子爲曾孫曾孫之子爲􅀇孫􅀇孫之子爲來孫來孫之子爲晜孫晜孫之子爲仍孫仍孫之子爲雲孫又岱岳謂之天孫又姓周文王子康叔封于衞至武公子惠孫曾耳爲衞上卿因氏焉後有孫武孫臏俱善兵法各撰書凡太原東莞呉郡安樂四望又漢複姓二十三氏左傳秦大夫逢孫氏魯卿有臧孫辰仲孫何忌魯桓公之子慶父之後有孟孫氏叔孫氏季孫氏同出桓公号爲三桓子孫代爲魯之上卿秦下大夫楊孫氏齊大夫長孫修丗本云食邑於唐其孫仕晉後号唐孫氏衞有王孫賈出自周頃王之後王孫賈之子自以去王室乆改爲賈孫氏晉濟南太守魚孫瑋出自宋魚石奔楚其孫在國者因以魚孫爲氏漢有烏孫昆彌後漢有士孫瑞古封公之後自皆稱公孫故其姓多非一族也孔子弟子有顓孫師國語晉公子利孫夫之後以利孫爲氏何氏姓苑有經孫新孫古孫牟孫室孫長孫叔孫等氏望稱河南之者是虜姓也思渾切六蓀香草飧􅀃文餔也蕵烏蕵草又蕵蕪酸可食也猻猴猻搎捫搎摸􅟥出尊尊卑又重也髙也貴也敬也君父之稱也􅀃文曰酒器也本又作􅷬周禮有司尊彞從土從缶從木後人所加亦姓風俗通云尊盧氏之後祖昆切五罇樽並見上注嶟山皃繜衣也存在也察也恤問也徂尊切五蹲坐也􅀃文踞也拵据也􅛿􅛿䣕縣在戎州袸爾雅云衿謂之袸袸小帶也又音荐敦迫也亦厚也又姓敦洽衞之醜人也都昆切七惇厚也弴畫弓也天子弴弓又丁僚切㢯上同驐去畜勢出字林墩平地有堆器似甌瓿暾日出皃他昆切七燉火色涒涒灘歳在申也禮記孺子之喪也魯公子名亦黃色也噋詩云大車噋噋噋噋重遟皃􅝒􅝒􅘿蟲名黗黃黒色也屯聚也又姓後蜀録有法部尚書屯度徒渾切二十二豚豕子㹠豘並上同窀火見穴中又音迍臀廣雅云臀謂之脽亦謂之􅷥也􅀃文作尻髀也􅷥並同上見􅀃文軘兵車飩餛飩榜也坉以草裹土築城及塡水也沌水勢邨地名亦音村燉火熾又燉煌郡燉大煌盛也忳悶也啍口氣芚菜似菎也庉風與火爲庉又徒損切黃色㼔􅀲名村墅也此尊切一㑮女字又姓出纂文牛昆切又戸昆切四瘒癡皃顐顐秃無髮也梱爾雅釋曰髡梱盆瓦器亦作瓫爾雅曰盆謂之缶􅀃文曰盎也又姓風俗通云盆成括仕齊孟軻知其必死其子逃難改氏成焉蒲奔切四葐覆葐草鳩鳥湓水名在尋陽一曰水涌也奔奔走也􅀃文作奔博昆切四賁勇也周禮有虎賁氏掌先後王而趨以卒伍軍旅會同亦如之舎則守王閑閑梐枑也書云武王伐紂戎車三百兩虎賁三百人亦姓古有勇士賁育又肥祕墳三音䴅䴅如鵲三目六足白身犇牛驚出文字集略論􅀃也議也思也盧昆切又力旬盧鈍二切四崘崐崘掄􅀃文擇也一曰貫也菕菕虂草也坤乾坤苦昆切七巛古文髡去髮顐臗體也臀也髖上同豤齧也昏􅀃文曰日冥也亦作昬呼昆切七惛不明婚婚姻嫁也禮娶以昏時婦人隂也故曰婚棔合棔木名朝舒夕斂閽門守人也殙病也又未立名而死不可知也濆潠也普魂切三噴上同歕吐也又吹氣也黁香也亦人名姚興太史令郭黁奴昆切一二十四痕瘢也戸恩切四鞎車革前飾拫急引㯊所以平量斗斛根根柢也亦姓根牟子古賢者著書出風俗通古痕切四跟足後踵也上同珢石次玉又音銀恩恩澤也惠也愛也隱也亦姓前燕慕容皝東庠祭酒恩茂風俗通云陳大夫成仲不恩之後烏痕切三􅀃文炮炙也以微火温肉煾上同吞咽也吐根切又音天一垠垠㓵五根切又語斤切三圻上同泿水名二十五寒寒暑也釋名曰寒捍也捍格也亦姓後漢博士魯國寒朗武王子寒侯之後也胡安切十二亦作韓井垣也亦國名又姓出自唐叔虞之後曲沃桓叔之子萬食邑於韓因以爲氏代爲晉卿後分晉爲國韓爲秦滅復以國爲氏出潁川後韓騫避王莽亂移居南陽故有潁川南陽二望蔣草也翰天雞羽有五色又音扞鶾上同邯邯鄲縣名又漢複姓漢有衞尉邯鄲義風俗通云因國爲姓也邗邗溝水名在廣陵虷虷蟹一名蜎蟲汗可汗蕃王稱又音犴白草也又何旦切䮧䮂䮧蕃大馬出異字苑豻胡地野狗似狐而小或作犴俄寒切又音岸四犴上同雃雃䲽鳥一名雝􅖥䲽音石山形也單單複也又大也亦虜姓可單氏後改爲單氏都寒切又常演切十襌襌衣鄲邯鄲丹赤也􅀃文曰巴越之赤石也亦州名春秋時白翟所居後魏置汾州廢帝三年以河東汾州同乃改爲丹州亦姓晉有大夫丹木出風俗通殫盡也簞簞笥小篋匰宗廟盛主器出字書㠆㠆􅀌山名癉火癉小兒病也䐷大腹安安徐也寧也止也平也亦州名春秋時鄖國漢屬江夏郡宋分江夏郡爲安陸郡武德年討平王丗充改爲安州有鄖水亦姓風俗通云漢有安成爲太守廬山記有安息國王子安髙又漢複姓有安都氏烏寒切五䀂䀂大盂鞌鞌韀䢿地名在當陽侒􅀃文宴也難艱也不易稱也又木難珠名其色黃生東夷曹植樂府詩曰􅃢瑚閒木難又姓百濟人􅀃文作鳥也本又作那干切又奴肝切四見上注並古文餐􅀃文吞也七安切三湌上同俗作飡䉔䉔笒出異字苑灘水灘爾雅云太歳在申曰涒灘他干切十嘽馬喘嘆長息與歎同又音炭擹擹蒱賭博譠譠慢欺慢言也痑力極攤開也亦緩也􅨏􅨏􅨵言不正也嬗緩也㨏搫㨏婉轉脂肪蘇干切五􅘐蹣􅘐跛行皃􅃢􅃢瑚廣雅曰􅃢瑚珠也􅀃文曰􅃢瑚生海中而色赤也姍詐也䈀竹器壇封土祭處徒干切十五檀木名亦州名春秋時及戰國並爲燕地漢屬漁陽郡隋置檀州取白檀縣爲名又姓太公爲灌檀宰後氏焉禮記魯有檀弓今檀城在瑕丘瑕丘屬山陽魯改山陽爲髙平郡檀氏望在髙平也鷤鸛鷤如鵲短尾射之銜矢射人􅀃文爾雅並作鸛鷒癉風在手足病又都彈切撣觸也太􅀇經云撣繫其名彈糾也射也亦彈棊梁冀傳云冀好彈棊也又徒案切驒連錢騘一曰靑驪白文又丁年切驒駭匈奴畜似馬而小驙白馬黑脊又知連切但語辝亦姓何氏姓苑云漢有但巴爲濟隂太守又徒旱切又徒旦切胆胆口脂澤出證俗文繟寛緩儃態也又市連切聅軍法以矢貫耳曰聅唌歎也貚貙屬殘餘也􅀃文也昨干切七䏼禽獸食餘又徂賛切㱚上同戔傷也又戔戔束帛皃易曰束帛戔戔䀂大盂􅯂穿也帴帗也干求也犯也觸也亦姓左傳宋有干犨又漢複姓何氏姓苑漢有干已衍爲京兆尹古寒切十六乾字様云本音虔今借爲乾濕字又姓出何氏姓苑漧古文竿竹竿肝木藏奸以婬犯也鳱鳱鵲鳥名知未來事噪則行人至鵲字或作䧼䧼古沃切玕琅玕美石次玉邗越別名又音寒江名也汗餘汗縣名又寒翰二音迀進也㿻盤也又大盌名盾忓􅀃文極也地名服蘭香草亦州名古西羌地隋文帝置蘭州取皐蘭山爲名又姓漢有武陵太守蘭廣落干切十一瀾大波闌晚也牢也遮也希也又飲酒半罷曰闌讕逸言又力誕切攔階際木句攔亦作闌妄入宫門籣盛弩矢人所負也䪍上同欄木名躝踰也幱幱衫幱裙㘓㘓哰挐語不可解看視也苦寒切七古文栞槎木也上同靬弓衣臤堅也又口閒口耕二切刊削也剟也頇顓頇大面皃許干切二鼾氣激聲濡水名出涿郡乃官切一二十六􅁊􅁊􅁊武也又姓本自姜姓齊􅁊公後因諡爲氏望出譙郡後漢有太子太傅􅁊榮胡官切二十九完全也䴟鹿一歳䳜鳥烏喙蛇尾也丸彈丸瓛圭名􅀃文曰􅁊圭公所執紈紈素葦易亦作萑俗作雚雚本自音灌萑木兔鳥也洹水名在鄴又于元切汍汍瀾泣淚絙緩也芄芄蘭草名豲豕屬又豲道縣在天水亦作獂梡木名出蒼梧子可食荁堇類莞似藺而圎可爲席又音官綄舩上候風羽楚謂之五兩􆀂山羊細角而形大也萈上同見􅀃文貆􅀃文曰貉之􅀋又音歡狟大犬也周書曰尚狟狟峘爾雅云小山岌大山曰峘又戸登切㿪皮病䎠丸屬垸漆加骨灰上也寏周垣院上同捖揳刮摩也岏㠝岏五丸切十刓圎削园上同忨貪也蚖毒蛇䯈䯊䯈羱羱野羊角大又語􅀽切黿黿似鼈又音元抏挫也䨲端正也直也緒也等也亦姓出姓苑又漢複姓孔子弟子端木賜也多官切十一褍衣長也又衣正幅也剬齊也􅗧角􅗧獸名狀如豕角善爲弓李陵以此遺蘇武耑􅀃文曰物初生之題也上象生形下象其根也鍴鑚也􅱥竹名出南嶺竱齊也又之耎切草名禾垂皃又丁果切偳抄偳又音湍剜刻削也一九切六眢井無水一曰目無睛豌豆也蜿蟠蜿龍皃帵帵子裁餘婠德好皃又古旦切湍急瀨也他端切又音專六貒似豕而肥又他畔切䵎黄黒色黃色又湯門切煓火盛偳人名又多丸切酸醋也素官切五狻狻猊師子猛獸䝜上同痠痠疼小雨團團圎度官切十二慱詩云勞心慱慱篿竹器剸􅎒也鄟邾鄟之邑􅡯魚似鮒而豕尾敦詩云有敦􅀲苦又都昆切漙詩云零露漙兮鷒爾雅曰鸛鷒鶝鶔如鵲短尾射之銜矢射人鳶之別名詩亦作鶉傳云雕也摶􅀃文曰圜也禮云無摶飯露皃櫕木叢也在丸切九㠝㠝岏小山皃車縛軏也又借官切菆菆塗見禮補鄼鄼聚也又音纂音賛秿也又刈禾積也上同􅗴剃髮也又子攅切官官宦左傳曰黄帝以雲紀官炎帝以火紀官大暭以龍紀官少暭以鳥紀官又君也法也事也又複姓三氏左傳晉王官無地御戎魯先賢傳云孔子妻官氏楚莊王少子爲上官大夫以上官爲氏古丸切十悹憂也又古玩切莞草名可以爲席亦云東莞郡名又姓姓苑云今吴人又胡官切棺棺椁禮記曰有虞氏瓦棺夏后氏堲周殷人棺椁􅀃文曰關也所以掩屍也觀視也又音灌貫穿也又音灌冠首飾􅀃文曰絭也所以絭髮弁冕之緫名也亦姓風俗通云古賢者鶡冠子之後又音灌涫樂涫縣在酒泉倌倌人主駕􅀃文曰小臣也詩云命彼倌人毌穿物持也鑾鑾鈴崔豹古今注云五輅衡上金雀者朱鳥也口銜鈴鈴謂之鑾也或謂朱鳥鸞也鸞口銜鈴故謂之鸞落官切十四鸞春秋元命包曰离爲鸞孫氏瑞應圖曰鸞者赤神之精鳳皇之佐也山海經曰女牀山有鳥狀如翟而五采文名曰鸞見則天下太平安寧巒小山而銳欒木名􅀃文曰木似欄禮天子樹松諸侯柏大夫欒士楊又曲枅亦姓代爲晉卿出左傳羉􅇾罟􅝀葵一曰􅈋也䜌南䜌縣在鉅鹿㱍迷惑不解理一曰欠皃臠臠臠病瘠皃灤水名灓􅀃文曰漏流也水沃也漬也病也瘦也圝團圝圎也曫日夕昏時歡喜也呼官切十三懽上同又音貫驩馬名貆貉屬貛牡狼鷤鳥射之則銜矢射人􅀃文爾雅並云鷒鴅鳥名人面鳥喙酄魯郡邑名獾野豚犿上同化也始也出方言讙讙諠兠四凶名古文尚書作鴅寛愛也裕也緩也苦官切二髖髖兩股間也鑚刺也借官切又借玩切六􅀃文曰車衡三束也曲轅縳直轅縛並上同姓出姓苑􅗴剃髮槃器名薄宦切二十二盤籀文鎜古文柈俗瘢瘡痕磻磻溪太公釣處幋大巾磐大石䰉䰉頭曲髮爲之又卧髻也又音班般樂也又博干切釋典又音鉢蹣蹣􅘐跛行皃搫搫㨏婉轉鞶鞶革􅀃文曰大帶也繁繁纓馬飾見左傳􅜥􅜥􅠍異鳥人面出山海經轉目視也媻奢也一曰小妻又媻媻來往皃縏番和縣名在涼州蟠䑕負蟲又龍蟠也下色䈲篾也狐犬也瞞目不明也􅀃文曰平目也曹操一名瞞又姓風俗通云瞞氏荆蠻之後本姓蠻其枝裔隨音變改爲瞞氏母官切二十四顢顢頇大面皃謾欺也慢也蹣踰牆䊡䊡頭餅也饅俗慲忘也鏝泥鏝槾墁並上同㒼無穿孔伏鞔鞔鞋履樠木名松心鰻鰻鯠魚也曼路􅀽蔓蔓菁菜也䜱䜱􅒵亭名在上女􅒵音求䝡獸似狸也䟂行遟皃種遍皃芇相當也又亡殄武仙二切悗惑也鬗長髮絻連也潘浙米汁又姓周文王畢公之子季孫食采於潘因氏焉出廣宗河南二望普官切六㽃㽃􅒤大甎番番禺縣在廣州拌弃也俗作􅂸㢖峙居也弃部黨北潘切四般般運䈲捕魚笥其門可入不可出弃糞器名又姓出姓譜二十七刪除削也又定也所姦切又所晏切五訕謗也潸出涕皃單于別名㹪􅀃文曰惡健犬也又所晏切􅀜􅀃文曰以木潢持門戸也聲􅀋曰􅀜所以閉也又姓風俗通云􅀜令尹喜之後蜀有前將軍􅀜羽河東解人古還切六関俗癏病也擐貫也又音患出文字指歸􅚓二鳥和鳴􅳑織貫杼也彎􅀃文曰持弓􅀜矢也烏􅀜切五灣水曲䘎䗡䘎蟲名􅓣吴王孫休長子名見吴志潫􅔿潫􅀜門機出通俗又數還切一還反也退也顧也復也戸􅀜切又音旋二十環玉環爾雅曰肉好若一謂之環又姓古有楚賢者環淵後有環濟撰要略一部􅯑樸􅯑縣名在武威樸音蒲鬟髻鬟寰王者封畿内縣又􅀇甸切闤闤闠崔豹古今注云闤市垣也闠市門也糫膏糫粔籹鍰六兩曰鍰鍰黄鐡也一曰錢也圜圜圍又王權切鐶指鐶轘轘轅又地名也里名在洛陽䍺獸名似羊而黒色無口不可殺也上同郇姓出絳州又音荀澴水名飛遶皃䭴馬一歳又音弦㡲屋牡瓦名堅班􅀃文曰分瑞玉俗作亦姓出扶風風俗通云楚令尹鬭班之後布還切十三頒布也賜也又音汾鳻大鳩朌大首又音汾螌螌蝥毒蟲斑駮也文也辬上同見􅀃文䰉髮半白又音盤般還師亦作班師又盤鉢三首斒斕斒鯿魚名又音編扳挽也公羊傳云扳隱而立又音攀賤事之皃蠻南夷名亦姓莫還切七鸞似鳧一目一足一翼相得乃飛即比翼鳥也獌狼屬又莫于晚販二切鬘衣出釋典謾方言曰謾台脅䦧懼也燕代之間曰謾台齊楚之間曰脅䦧台音怡䅼赤䅼稻名畫車輪也顔顔容亦顔額又姓出琅邪本自魯伯禽支庶有食采顔邑者因而著族又邾武公名夷字曰顔故公羊傳稱顔公後遂爲氏五姦切二楌木名似橦姦私也詐也古顔切俗作姧四菅草名又姓岀趙郡或作蕳葌香草䔵上同攀引也普班切三扳上同又音班眅目多白皃奻訟也奴還切一􅍙􅍙痹五還切二頑頑愚馯姓也漢書有江東馯辟字子弓傳易丘姦切一豻胡地野犬似狐而小黒喙可顔切又我悍俄寒二十二鬝􅁂秃皃跧跧伏阻頑切一二十八山廣雅曰山産也能産萬物􅀃文曰山宣也宣气􅊌生萬物又姓周有山師之官掌山林後以官爲氏或云古烈山氏之後望出河内所間切三疝疝痂病也邖地名出地理志鰥鰥寡鄭氏云六十無妻曰鰥五十無夫曰寡又魚名古頑切三䤽䤽犂釬也綸爾雅釋草曰綸似綸東海有之􅀃文曰青絲綬也又音倫閒􅂩也近也又中閒亦姓出何氏姓苑古閑切又㵎二音六艱艱難囏古文靬黎靬國名在西域其人善􅅭幻又犍看二首蕑蘭也覵視皃閑闌也防也禦也大也法也習也睱也戸間切九嫺嫺雅癇小兒瘨馬一目白蛝蟲名瞯人目多白又姓史記濟南瞯氏鷴白鷴似雉而尾長四五尺藖莖餘又音莧憪心静􅀃文愉也慳悋也苦閑切八􅵾人名出孟子齊景公勇臣成􅵾􅀃文曰很梘也顅頭髮少皃掔爾雅云固也莊子注牢也鬜􅁂秃皃又苦八切羥羊名臤堅也又口耕切堅破聲虥虎淺毛皃士山切又音棧又昨閑切七潺潺湲水流又士連切孱孱劣皃又士連切僝僝惡罵也䡲䡲軒又士連切小鑿名又士連切門聚又昨閑切羴羊臭許間切又失然切一訮争也五閑切四犬鬭聲也亦作狼㗴訟詞虤虎怒黰染色黒也烏閑切五􅱤黒羊殷赤黒色也左傳云左輪朱殷牛尾色也黫黒色出字林斒斒斕色不純也方閑切二虨虎文又甫巾切斕斕斒力閑切四
